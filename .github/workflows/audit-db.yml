name: Database Quality Audit

permissions: {}

on:
  schedule:
    # Run once after the single daily pipeline (11:00 UTC, finishes ~11:30).
    # The old 19:30/01:30 crons audited a 3x/day cadence that no longer
    # exists -- two of three runs re-audited identical data.
    - cron: '30 12 * * *'     # ~1h after the 11:00 UTC pipeline (7:30 AM Chicago)
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Run in verbose mode'
        type: boolean
        required: false
        default: false
      json_output:
        description: 'Output JSON report'
        type: boolean
        required: false
        default: false

jobs:
  audit-database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run database quality audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi
          if [ "${{ inputs.json_output }}" = "true" ]; then
            ARGS="$ARGS --json"
          fi
          python pipeline/db_reviewer.py $ARGS

      - name: Generate JSON report (on demand)
        if: inputs.json_output
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python pipeline/db_reviewer.py --json > db-audit-report.json
          cat db-audit-report.json

      - name: Upload report artifact
        if: always() && inputs.json_output
        uses: actions/upload-artifact@v4
        with:
          name: db-audit-report
          path: db-audit-report.json
          retention-days: 30

      - name: Comment on PR (if low score)
        if: failure() && github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Database quality audit detected issues. Check the workflow logs for details.'
            })
