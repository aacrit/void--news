name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

# Queue runs per branch; never cancel a run that may be mid-merge.
concurrency:
  group: auto-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install and build
        # Retry twice for flaky network installs, but a third failure FAILS
        # the gate. The old `|| echo "Build flaky but proceeding"` made this
        # job exit 0 on a broken build, so unbuildable code auto-merged to
        # main and deployed.
        run: |
          cd frontend && npm ci
          npx next build || npx next build || npx next build

  # Mirrors validate-bias.yml — duplicated here because branch protection is
  # not configured and the merge job below can only `needs:` jobs in this
  # workflow. Fixture-based, no secrets, ~5 min warm.
  validate-bias:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Cache spaCy model
        id: spacy-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/lib/python3.11/site-packages/en_core_web_sm
          key: spacy-en_core_web_sm-${{ hashFiles('pipeline/requirements.txt') }}
      - name: Download spaCy model
        if: steps.spacy-cache.outputs.cache-hit != 'true'
        run: python -m spacy download en_core_web_sm
      - name: Run bias validation suite
        run: |
          result=$(python pipeline/validation/runner.py 2>&1)
          echo "$result"
          if echo "$result" | grep -qE "CATASTROPHIC:[[:space:]]+[1-9]"; then
            echo "::error::Bias validation found CATASTROPHIC failures"
            exit 1
          fi
          if echo "$result" | grep -qE "WRONG:[[:space:]]+[1-9]"; then
            echo "::error::Bias validation found WRONG scores"
            exit 1
          fi

  # Mirrors validate-clustering.yml (same rationale as validate-bias).
  validate-clustering:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Cache spaCy model
        id: spacy-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/lib/python3.11/site-packages/en_core_web_sm
          key: spacy-en_core_web_sm-${{ hashFiles('pipeline/requirements.txt') }}
      - name: Download spaCy model
        if: steps.spacy-cache.outputs.cache-hit != 'true'
        run: python -m spacy download en_core_web_sm
      - name: Run clustering validation suite
        run: |
          result=$(python -m pipeline.validation.clustering.runner 2>&1)
          echo "$result"
          if echo "$result" | grep -qE "CATASTROPHIC:[[:space:]]+[1-9]"; then
            echo "::error::Clustering validation found CATASTROPHIC failures"
            exit 1
          fi
          if echo "$result" | grep -qE "WRONG:[[:space:]]+[1-9]"; then
            echo "::warning::Clustering suite has pre-existing WRONG cases (not a regression)"
          fi

  auto-merge:
    needs: [build-check, validate-bias, validate-clustering]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Serialize ALL merges to main across branches.
    concurrency:
      group: auto-merge-push-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Merge claude branch into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin ${{ github.ref_name }}
          git merge origin/${{ github.ref_name }} --no-ff -m "Auto-merge ${{ github.ref_name }} into main"
          git push origin main

  # Apply pending migrations AFTER the gated merge lands on main. This job
  # exists here (not only in migrate.yml) because the merge push above uses
  # GITHUB_TOKEN, which does not trigger other workflows — and migrate.yml's
  # push trigger is scoped to main so unmerged/unvalidated branches can no
  # longer mutate the production schema. Idempotent: the _migrations table
  # tracks applied files by name.
  migrate:
    needs: auto-merge
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: migrate-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install psycopg2
        run: pip install psycopg2-binary
      - name: Apply pending migrations
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          python3 << 'PYEOF'
          import psycopg2, os, glob

          ref = os.environ['SUPABASE_PROJECT_REF']
          pw = os.environ['SUPABASE_DB_PASSWORD']

          conn = psycopg2.connect(
              f'postgresql://postgres.{ref}:{pw}@aws-0-us-west-2.pooler.supabase.com:5432/postgres?sslmode=require'
          )
          conn.autocommit = True
          cur = conn.cursor()

          cur.execute("""
              CREATE TABLE IF NOT EXISTS _migrations (
                  name TEXT PRIMARY KEY,
                  applied_at TIMESTAMPTZ DEFAULT now()
              )
          """)
          # Deny PostgREST anon access; the owner connection here bypasses RLS.
          cur.execute("ALTER TABLE _migrations ENABLE ROW LEVEL SECURITY")

          for fpath in sorted(glob.glob('supabase/migrations/*.sql')):
              fname = os.path.basename(fpath)
              cur.execute("SELECT 1 FROM _migrations WHERE name = %s", (fname,))
              if cur.fetchone():
                  print(f'  [skip] {fname} (already applied)')
                  continue
              sql = open(fpath).read()
              try:
                  cur.execute(sql)
                  cur.execute("INSERT INTO _migrations (name) VALUES (%s) ON CONFLICT DO NOTHING", (fname,))
                  print(f'  [ok]   {fname}')
              except Exception as e:
                  err = str(e).lower()
                  if 'already exists' in err or 'duplicate' in err:
                      cur.execute("INSERT INTO _migrations (name) VALUES (%s) ON CONFLICT DO NOTHING", (fname,))
                      print(f'  [skip] {fname} (objects already exist)')
                  else:
                      print(f'  [FAIL] {fname}: {e}')
                      raise

          cur.close()
          conn.close()
          PYEOF
