name: Run Migration
on:
  workflow_dispatch:
    inputs:
      migration:
        description: 'Migration file (e.g., 007_expand_lean_spectrum.sql)'
        required: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install psycopg2
        run: pip install psycopg2-binary
      - name: Run migration
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python3 -c "
          import psycopg2, os
          ref = 'xryzskhgfuafyotrcdvj'
          pw = os.environ['SUPABASE_DB_PASSWORD']
          conn = psycopg2.connect(f'postgresql://postgres.{ref}:{pw}@aws-0-us-west-2.pooler.supabase.com:5432/postgres?sslmode=require')
          conn.autocommit = True
          cur = conn.cursor()
          sql = open(f'supabase/migrations/${{ inputs.migration }}').read()
          cur.execute(sql)
          print('Migration applied successfully')
          cur.close()
          conn.close()
          "
