name: Run Migration
on:
  workflow_dispatch:
    inputs:
      migration:
        description: 'Migration file (e.g., 007_expand_lean_spectrum.sql) or "all" to run all pending'
        required: true
        default: 'all'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install psycopg2
        run: pip install psycopg2-binary
      - name: Run migration
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          python3 << 'PYEOF'
          import psycopg2, os, glob, sys

          db_url = os.environ['SUPABASE_DB_URL']
          if not db_url:
              print("ERROR: SUPABASE_DB_URL secret not set")
              print("Set it to the connection string from Supabase Dashboard → Settings → Database → Connection string → URI")
              sys.exit(1)
          conn = psycopg2.connect(db_url)
          conn.autocommit = True
          cur = conn.cursor()

          # Create tracking table if not exists
          cur.execute("""
              CREATE TABLE IF NOT EXISTS _migrations (
                  name TEXT PRIMARY KEY,
                  applied_at TIMESTAMPTZ DEFAULT now()
              )
          """)

          migration_input = "${{ inputs.migration }}"

          if migration_input == "all":
              files = sorted(glob.glob("supabase/migrations/*.sql"))
          else:
              files = [f"supabase/migrations/{migration_input}"]

          applied = 0
          skipped = 0
          for f in files:
              name = os.path.basename(f)
              cur.execute("SELECT 1 FROM _migrations WHERE name = %s", (name,))
              if cur.fetchone():
                  print(f"SKIP (already applied): {name}")
                  skipped += 1
                  continue
              print(f"APPLYING: {name} ... ", end="", flush=True)
              try:
                  sql = open(f).read()
                  cur.execute(sql)
                  cur.execute("INSERT INTO _migrations (name) VALUES (%s)", (name,))
                  print("OK")
                  applied += 1
              except Exception as e:
                  print(f"FAILED: {e}")
                  sys.exit(1)

          print(f"\nDone. Applied: {applied}, Skipped: {skipped}, Total: {len(files)}")
          cur.close()
          conn.close()
          PYEOF
