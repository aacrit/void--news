name: Run Migration
on:
  workflow_dispatch:
    inputs:
      migration:
        description: 'Migration file (e.g., 007_expand_lean_spectrum.sql) or "all" to run all pending'
        required: true
        default: 'all'
  # Auto-apply pending migrations when a new .sql file lands on a claude
  # branch. The migrate script tracks applied migrations in the
  # _migrations table (CREATE TABLE IF NOT EXISTS) and uses
  # `CREATE ... IF NOT EXISTS` / `ADD COLUMN IF NOT EXISTS` patterns,
  # so re-running an already-applied migration is a no-op. This trigger
  # closes the "I committed a migration but forgot to click the dispatch
  # button" gap without changing existing security posture (same secrets,
  # same script, same idempotency guarantees).
  push:
    branches: ['claude/**', 'main']
    paths:
      - 'supabase/migrations/*.sql'

permissions: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install psycopg2
        run: pip install psycopg2-binary
      - name: Run migration
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          MIGRATION_INPUT: ${{ inputs.migration || 'all' }}
        run: |
          python3 << 'PYEOF'
          import psycopg2, os, glob, re, pathlib

          ref = os.environ['SUPABASE_PROJECT_REF']
          pw = os.environ['SUPABASE_DB_PASSWORD']
          # Empty string on push events (inputs.migration is unset);
          # fall through to 'all' so the run-all-pending path executes.
          migration_input = os.environ.get('MIGRATION_INPUT', 'all') or 'all'

          conn = psycopg2.connect(
              f'postgresql://postgres.{ref}:{pw}@aws-0-us-west-2.pooler.supabase.com:5432/postgres?sslmode=require'
          )
          conn.autocommit = True
          cur = conn.cursor()

          # Ensure migration tracking table exists
          cur.execute("""
              CREATE TABLE IF NOT EXISTS _migrations (
                  name TEXT PRIMARY KEY,
                  applied_at TIMESTAMPTZ DEFAULT now()
              )
          """)

          if migration_input == 'all':
              # Discover all migration files, sorted by numeric prefix
              files = sorted(glob.glob('supabase/migrations/*.sql'))
              if not files:
                  print('No migration files found')
              for fpath in files:
                  fname = os.path.basename(fpath)
                  # Check if already applied
                  cur.execute("SELECT 1 FROM _migrations WHERE name = %s", (fname,))
                  if cur.fetchone():
                      print(f'  [skip] {fname} (already applied)')
                      continue
                  # Run the migration
                  sql = open(fpath).read()
                  try:
                      cur.execute(sql)
                      cur.execute("INSERT INTO _migrations (name) VALUES (%s) ON CONFLICT DO NOTHING", (fname,))
                      print(f'  [ok]   {fname}')
                  except Exception as e:
                      # IF NOT EXISTS / already-exists errors are fine
                      err = str(e).lower()
                      if 'already exists' in err or 'duplicate' in err:
                          cur.execute("ROLLBACK") if not conn.autocommit else None
                          cur.execute("INSERT INTO _migrations (name) VALUES (%s) ON CONFLICT DO NOTHING", (fname,))
                          print(f'  [skip] {fname} (objects already exist)')
                      else:
                          print(f'  [FAIL] {fname}: {e}')
                          raise
          else:
              # Single migration mode — validate path to prevent traversal
              base = pathlib.Path('supabase/migrations').resolve()
              target = (base / os.path.basename(migration_input)).resolve()
              if not target.is_relative_to(base) or target.suffix != '.sql':
                  raise ValueError(f'Invalid migration: {migration_input}')
              fpath = str(target)
              sql = open(fpath).read()
              cur.execute(sql)
              fname = os.path.basename(fpath)
              cur.execute("INSERT INTO _migrations (name) VALUES (%s) ON CONFLICT DO NOTHING", (fname,))
              print(f'Migration applied successfully: {fname}')

          cur.close()
          conn.close()
          PYEOF
