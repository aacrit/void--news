name: News Pipeline

permissions: {}

on:
  schedule:
    # 1x daily, anchored to Chicago (CDT = UTC-5).
    # ~50 Sonnet calls + 1 brief + 1 opinion = ~$1/day at Anthropic Sonnet 4.6 rates.
    - cron: '0 12 * * *'     # 12:00 UTC — 7 AM Chicago, 5:30 PM IST, 2 PM CET
  workflow_dispatch:
    inputs:
      editions:
        description: 'Edition filter (comma-separated: us,india,world). Empty = all.'
        required: false
        default: ''
      brief_only:
        description: 'Regenerate daily brief only (skip full pipeline)'
        type: boolean
        required: false
        default: false
      no_audio:
        description: 'Skip audio synthesis (brief_only mode)'
        type: boolean
        required: false
        default: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt
      - name: Install system dependencies
        if: ${{ !inputs.brief_only }}
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install system dependencies (brief only)
        if: ${{ inputs.brief_only }}
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Install Playwright browser
        if: ${{ !inputs.brief_only }}
        run: playwright install chromium --with-deps
      - name: Cache spaCy model
        if: ${{ !inputs.brief_only }}
        id: spacy-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/lib/python3.11/site-packages/en_core_web_sm
          key: spacy-en_core_web_sm-${{ hashFiles('pipeline/requirements.txt') }}
      - name: Download spaCy model
        if: ${{ !inputs.brief_only && steps.spacy-cache.outputs.cache-hit != 'true' }}
        run: python -m spacy download en_core_web_sm
      - name: Validate editions input
        if: ${{ inputs.editions != '' }}
        run: |
          if [[ ! "${{ inputs.editions }}" =~ ^[a-z,]+$ ]]; then
            echo "::error::Invalid editions input. Only lowercase letters and commas allowed."
            exit 1
          fi
      - name: Determine editions from schedule
        id: editions
        run: |
          if [ -n "${{ inputs.editions }}" ]; then
            echo "filter=${{ inputs.editions }}" >> $GITHUB_OUTPUT
          else
            # All editions run on every scheduled trigger (2x daily)
            echo "filter=" >> $GITHUB_OUTPUT
          fi
      - name: Regenerate daily brief only
        if: ${{ inputs.brief_only }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISABLE_GEMINI_REASONING: "1"
          DISABLE_EDITORIAL_TRIAGE: "1"
        run: |
          EDITIONS="${{ steps.editions.outputs.filter }}"
          ARGS=""
          if [ -n "$EDITIONS" ]; then
            ARGS="--editions $EDITIONS"
          fi
          if [ "${{ inputs.no_audio }}" = "true" ]; then
            ARGS="$ARGS --no-audio"
          fi
          echo "Regenerating daily brief: $ARGS"
          python pipeline/refresh_brief.py $ARGS
      - name: Run pipeline
        if: ${{ !inputs.brief_only }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISABLE_GEMINI_REASONING: "1"
          DISABLE_EDITORIAL_TRIAGE: "1"
        run: |
          EDITIONS="${{ steps.editions.outputs.filter }}"
          if [ -n "$EDITIONS" ]; then
            echo "Running pipeline for editions: $EDITIONS"
            python pipeline/main.py --editions "$EDITIONS"
          else
            echo "Running full pipeline (all editions)"
            python pipeline/main.py
          fi
