name: News Pipeline

permissions: {}

on:
  schedule:
    # 1x daily, anchored to Chicago (CDT = UTC-5).
    # 11:00 UTC = 6 AM Chicago — pipeline finishes by ~11:30 UTC (~25-35 min)
    # so fresh feed lands by 6:30 AM CT. Captures overnight wire + UK/EU
    # morning + AP/Reuters morning desk + US East Coast pre-market.
    # ~50 Sonnet calls + 1 brief + 1 opinion = ~$1/day at Anthropic Sonnet 4.6 rates.
    - cron: '0 11 * * *'     # 11:00 UTC — 6 AM Chicago, 4:30 PM IST, 1 PM CET, 12 PM London
  workflow_dispatch:
    inputs:
      brief_only:
        description: 'Regenerate daily brief only (skip full pipeline)'
        type: boolean
        required: false
        default: false
      no_audio:
        description: 'Skip audio synthesis (brief_only mode)'
        type: boolean
        required: false
        default: false
      recluster_only:
        description: 'Skip fetch+scrape+bias. Recluster + rerank existing articles only ($0, ~5-10 min)'
        type: boolean
        required: false
        default: false
      recluster_window_hours:
        description: 'Article window for --recluster-only (default 48)'
        required: false
        default: '48'
      engine_only:
        description: 'Fresh pipeline run with ALL LLMs disabled (no Anthropic, no Gemini, no audio) — $0, ~25-30 min'
        type: boolean
        required: false
        default: false

# One pipeline run at a time — a manual dispatch overlapping the daily cron
# double-writes clusters/briefs against the same run window.
concurrency:
  group: news-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    # Fresh-DB worst case is ~108 min; a hung fetch must not burn the 6h
    # Actions job default.
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt
      - name: Install system dependencies
        if: ${{ !inputs.brief_only }}
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install system dependencies (brief only)
        if: ${{ inputs.brief_only }}
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Install Playwright browser
        if: ${{ !inputs.brief_only }}
        run: playwright install chromium --with-deps
      - name: Cache spaCy model
        if: ${{ !inputs.brief_only }}
        id: spacy-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/lib/python3.11/site-packages/en_core_web_sm
          key: spacy-en_core_web_sm-${{ hashFiles('pipeline/requirements.txt') }}
      - name: Download spaCy model
        if: ${{ !inputs.brief_only && steps.spacy-cache.outputs.cache-hit != 'true' }}
        run: python -m spacy download en_core_web_sm
      - name: Regenerate daily brief only
        if: ${{ inputs.brief_only }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISABLE_GEMINI_REASONING: "1"
          DISABLE_EDITORIAL_TRIAGE: "1"
          DISABLE_AUDIO: "1"
          # 2026-05-22 cost-emergency kill switch: pauses every Claude call
          # (cluster_summarizer + daily_brief + weekly + ig_caption) via
          # claude_client.is_available() guard. Gemini Flash takes over the
          # daily brief; summaries fall back to rule-based. Remove this line
          # to re-enable Sonnet 4.6 once balance is replenished.
          DISABLE_ANTHROPIC: "1"
        run: |
          ARGS=""
          if [ "${{ inputs.no_audio }}" = "true" ]; then
            ARGS="$ARGS --no-audio"
          fi
          echo "Regenerating daily brief: $ARGS"
          python pipeline/refresh_brief.py $ARGS
      - name: Run pipeline
        if: ${{ !inputs.brief_only }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISABLE_GEMINI_REASONING: "1"
          DISABLE_EDITORIAL_TRIAGE: "1"
          DISABLE_AUDIO: "1"
          # 2026-05-22 cost-emergency kill switch: pauses every Claude call
          # (cluster_summarizer + daily_brief + weekly + ig_caption) via
          # claude_client.is_available() guard. Gemini Flash takes over the
          # daily brief; summaries fall back to rule-based. Remove this line
          # to re-enable Sonnet 4.6 once balance is replenished.
          DISABLE_ANTHROPIC: "1"
        run: |
          ARGS=""
          if [ "${{ inputs.recluster_only }}" = "true" ]; then
            ARGS="$ARGS --recluster-only --recluster-window-hours ${{ inputs.recluster_window_hours || 48 }}"
            echo "Running RECLUSTER-ONLY (skip fetch/scrape/bias; reuse existing articles)"
          elif [ "${{ inputs.engine_only }}" = "true" ]; then
            ARGS="$ARGS --engine-only"
            echo "Running ENGINE-ONLY fresh pipeline (all LLMs disabled)"
          else
            echo "Running full pipeline"
          fi
          python pipeline/main.py $ARGS
