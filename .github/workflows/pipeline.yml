name: News Pipeline
on:
  schedule:
    # 4x daily, every 6 hours — all editions each run.
    # Covers morning + evening for US, India, and EU simultaneously.
    - cron: '0 0 * * *'      # 00:00 UTC — US evening (7 PM ET), India morning (5:30 AM IST)
    - cron: '0 6 * * *'      # 06:00 UTC — EU morning (7 AM CET), India midday (11:30 AM IST)
    - cron: '0 12 * * *'     # 12:00 UTC — US morning (7 AM ET), India evening (5:30 PM IST)
    - cron: '0 18 * * *'     # 18:00 UTC — US afternoon (1 PM ET), EU evening (7 PM CET)
  workflow_dispatch:
    inputs:
      editions:
        description: 'Edition filter (comma-separated: us,india,world). Empty = all.'
        required: false
        default: ''

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Install Playwright browser
        run: playwright install chromium --with-deps
      - name: Cache spaCy model
        id: spacy-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/lib/python3.11/site-packages/en_core_web_sm
          key: spacy-en_core_web_sm-${{ hashFiles('pipeline/requirements.txt') }}
      - name: Download spaCy model
        if: steps.spacy-cache.outputs.cache-hit != 'true'
        run: python -m spacy download en_core_web_sm
      - name: Determine editions from schedule
        id: editions
        run: |
          if [ -n "${{ inputs.editions }}" ]; then
            echo "filter=${{ inputs.editions }}" >> $GITHUB_OUTPUT
          else
            # All editions run on every scheduled trigger (4x daily)
            echo "filter=" >> $GITHUB_OUTPUT
          fi
      - name: Setup Google Cloud TTS credentials
        if: env.GOOGLE_CLOUD_TTS_KEY != ''
        env:
          GOOGLE_CLOUD_TTS_KEY: ${{ secrets.GOOGLE_CLOUD_TTS_KEY }}
        run: |
          echo "$GOOGLE_CLOUD_TTS_KEY" > /tmp/gcloud-tts-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcloud-tts-sa.json" >> $GITHUB_ENV
      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          EDITIONS="${{ steps.editions.outputs.filter }}"
          if [ -n "$EDITIONS" ]; then
            echo "Running pipeline for editions: $EDITIONS"
            python pipeline/main.py --editions "$EDITIONS"
          else
            echo "Running full pipeline (all editions)"
            python pipeline/main.py
          fi
