name: Refresh Audio Brief
on:
  workflow_dispatch:
    inputs:
      editions:
        description: 'Editions to refresh (comma-separated: world,us,india). Default: world.'
        required: false
        default: 'world'

jobs:
  refresh-audio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Run audio refresh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          EDITIONS="${{ inputs.editions }}"
          echo "Refreshing audio for: ${EDITIONS:-world}"
          python pipeline/refresh_audio.py --editions "${EDITIONS:-world}"
