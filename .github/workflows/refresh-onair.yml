name: "Refresh: On Air (Full Audio)"
permissions: {}

on:
  workflow_dispatch:
    inputs:
      editions:
        description: 'Editions (comma-separated: world,us,india,uk,canada)'
        required: false
        default: 'world'

jobs:
  refresh-onair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Regenerate Audio Broadcast
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Regenerating full audio broadcast for: ${{ inputs.editions }}"
          python pipeline/refresh_audio.py --editions "${{ inputs.editions }}"
