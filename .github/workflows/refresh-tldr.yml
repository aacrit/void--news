name: "Refresh: TL;DR"
on:
  workflow_dispatch:
    inputs:
      editions:
        description: 'Editions (comma-separated: world,us,india,uk,canada)'
        required: false
        default: 'world'

jobs:
  refresh-tldr:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Regenerate TL;DR
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Regenerating TL;DR for: ${{ inputs.editions }}"
          python pipeline/refresh_brief.py --editions "${{ inputs.editions }}" --tldr-only --no-audio
