                - generic [ref=e78]: "23"
          - paragraph [ref=e80]: U.S. President Trump arrived in Beijing for a summit with Chinese President Xi, predicting a "long talk" about the ongoing war with Iran, Source 1 reported. Iran's military stated it is trained and ready for any new U.S. assault, according to Source 1. This follows Washington's rejection of Iran's ceasefire proposal as "unacceptable" on May 12, as reported by AP (Source 8). The summit occurs as the war extends into its third month, with China holding significant influence as the largest buyer of Iranian oil and a strategic partner of Tehran, Source 5 reported. This situation, according to Source 5, clips U.S. leverage. U.S. President Trump has reportedly grown impatient with Tehran's negotiating posture, with aides telling CNN that he is closer to resuming war than in recent weeks, though a major decision was unlikely before the China trip, Source 10 stated. Washington's latest proposal, rejected by Trump as "unacceptable," addressed a deal to end the war, reopen the strait, and roll back Iran’s nuclear program, AP reported (Source 8). Sources highlight various agenda items for the Trump-Xi summit. The Virginian-Pilot and Source 6 expect discussions on trade, Taiwan, and the Iran war. Zee News questioned whether Washington is entering a "strategic trap" in Beijing or if Trump still holds an advantage, Source 3 reported. Source 4 raised the prospect of U.S. and European auto markets opening to Chinese EV investment, framing it as a "terrifying prospect." Washington's rejected proposal included a deal to end the war, reopen the strait, and roll back Iran’s nuclear program, AP reported (Source 8). The war is in its third month, according to Source 5. The summit between Trump and Xi is expected to address these complex issues, with Trump anticipating extensive discussions on the Iran conflict, Source 1 noted.
