  - slug: marxist
    name: "Marxist / Revolutionary Socialist"
    ideology: "Marxist"
    color: b
    throughline: "Capitalism is a system of organized exploitation in which those who own the means of production extract surplus value from those who work. The contradictions of capitalism — overproduction, falling rate of profit, immiseration of labor — are structural, not accidental, and will ultimately produce the conditions for its overthrow. The question is not whether capitalism will end, but what replaces it."
    key_thinkers:
