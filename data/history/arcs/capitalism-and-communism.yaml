        role: "Philosopher-economist who developed the labor theory of value and historical materialism"
        active_years: "1818-1883"
      - name: "Vladimir Lenin"
        role: "Revolutionary who theorized imperialism as capitalism's highest stage and built the first communist state"
        active_years: "1870-1924"
      - name: "Rosa Luxemburg"
        role: "Theorist of capitalist accumulation and democratic socialism; critic of both reform and Leninist centralism"
        active_years: "1871-1919"
      - name: "Frantz Fanon"
        role: "Psychiatrist-revolutionary who connected colonialism, capitalism, and racial domination"
        active_years: "1925-1961"
    canonical_works:
