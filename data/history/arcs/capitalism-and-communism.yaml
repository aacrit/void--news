  - slug: social-democrat
    name: "Social Democrat / Third Way"
    ideology: "Social Democrat"
    color: c
    throughline: "Markets generate wealth but distribute it unjustly. The solution is not to abolish markets but to regulate them, redistribute their proceeds through progressive taxation and social insurance, and guarantee a floor of economic security below which no citizen falls. The welfare state is not a compromise between capitalism and socialism — it is a distinct political achievement."
