  - slug: labor
    name: "Labor / Worker"
    ideology: "Labor"
    color: e
    throughline: "The lived experience of working people is the ground truth that all economic theory must answer to. Whether the system is called capitalism, communism, or social democracy, the question is the same: can a worker feed a family, afford a doctor, send a child to school, retire with dignity, and organize collectively without being fired or killed for it? Systems are judged by paychecks, not by theories."
