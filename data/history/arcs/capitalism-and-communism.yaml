  - slug: global-south
    name: "Global South / Dependency Theory"
    ideology: "Dependency / World-Systems"
    color: d
    throughline: "Both capitalism and communism as practiced by great powers have been instruments of extraction from the periphery to the core. The wealth of Europe and North America was not generated domestically — it was accumulated through colonialism, slavery, unequal trade, and structural adjustment programs that locked former colonies into commodity dependence. Neither free markets nor Soviet planning liberated the colonized world."
    key_thinkers:
