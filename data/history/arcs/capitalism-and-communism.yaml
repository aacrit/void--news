perspectives:

  - slug: free-market
    name: "Free Market / Classical Liberal"
    ideology: "Free Market"
    color: a
    throughline: "Markets, when left to operate freely, allocate resources more efficiently than any central authority can. Private property and voluntary exchange are the foundations of both prosperity and individual liberty. Every attempt to replace markets with planning has produced scarcity, corruption, and tyranny."
    key_thinkers:
      - name: "Adam Smith"
        role: "Moral philosopher who articulated the invisible hand and the division of labor"
        active_years: "1723-1790"
      - name: "Friedrich Hayek"
        role: "Economist who argued that central planning requires knowledge no planner can possess"
        active_years: "1899-1992"
      - name: "Milton Friedman"
        role: "Monetarist who reframed capitalism as the precondition for political freedom"
        active_years: "1912-2006"
      - name: "Deirdre McCloskey"
        role: "Economic historian who attributed modern prosperity to bourgeois values, not capital accumulation"
        active_years: "1942-present"
    canonical_works:
      - title: "The Wealth of Nations"
        author: "Adam Smith"
        year: "1776"
        type: book
      - title: "The Road to Serfdom"
