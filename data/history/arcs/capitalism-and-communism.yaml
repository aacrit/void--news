    throughline: "Both capitalism and communism were designed by men, theorized by men, and implemented by men. Both treat the unpaid labor of women — childbearing, childcare, cooking, cleaning, eldercare — as invisible, natural, and free. Any honest accounting of economic systems must include the reproductive labor without which no productive labor is possible. Neither profit nor planning has ever adequately valued the work of sustaining human life."
