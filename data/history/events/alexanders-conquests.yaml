  emphasized:
  - Spread of Hellenistic civilization as a net gain for the ancient world
  - Military genius and personal bravery of Alexander
  - Founding of cities that persisted for centuries as cultural centers
  - Policy of cultural fusion as enlightened governance
  omitted:
