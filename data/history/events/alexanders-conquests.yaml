affected_population: Persian Empire (50 million subjects), Greek city-states, Central Asian kingdoms, northwestern India
duration: 11 years (334-323 BCE)
summary: 'In the spring of 334 BCE, Alexander III of Macedon crossed the Hellespont with 37,000 troops and
  1.5 million pounds of debt. His father Philip II had been assassinated two years earlier, and several
  Greek city-states had revolted. Alexander razed Thebes — 6,000 killed, 30,000 enslaved — and the revolts
  stopped.


  At the Granicus River in May 334, he nearly died in the first cavalry charge. Cleitus the Black cut
  off the arm of a Persian commander swinging at Alexander''s head. Within 18 months, Alexander controlled
  western Anatolia, had cut the Gordian Knot, and met Darius III at Issus in November 333. The Persian king
  fielded perhaps 100,000 troops on a narrow coastal plain — a choice that negated his numerical advantage.
  Darius fled. His mother, wife, and children fell into Alexander''s hands. He treated them with courtesy;
  Plutarch reports he never touched Darius''s wife.


  Tyre refused to surrender. Alexander spent seven months building a half-mile causeway through the sea to
  reach the island city. When Tyre fell in July 332, he crucified 2,000 military-age men along the beach
  and sold 30,000 inhabitants into slavery. Gaza resisted for two months; its commander Batis was dragged
  alive behind a chariot. Egypt welcomed him as a liberator from Persian rule. At the oracle of Siwa, the
  priests addressed him as son of Ammon — a title he never disclaimed.


  The decisive battle came at Gaugamela on October 1, 331 BCE. Darius assembled an army that ancient sources
  number at 250,000, though modern estimates suggest 50,000-100,000. Alexander''s 47,000 troops broke the
  Persian center with an oblique cavalry charge that became a textbook maneuver studied for two millennia.
  Darius fled again. He was murdered by his own satrap Bessus in July 330. Alexander hunted Bessus into
  Central Asia and executed him.


  Between 330 and 326, Alexander campaigned through modern Afghanistan, Uzbekistan, and Tajikistan. He
  founded Alexandria Eschate (modern Khujand) on the Jaxartes River, the northeastern limit of his empire.
  He married Roxana, a Bactrian noblewoman, in 327 — a political union that outraged his Macedonian officers.
  In a drunken rage at Maracanda (Samarkand), he killed Cleitus the Black, the man who had saved his life
  at the Granicus. He wept for three days afterward.


  In India, Alexander defeated King Porus at the Hydaspes River in May 326. The battle featured 200 war
  elephants — the first Alexander had faced in large numbers. He won, but the monsoon, disease, and
  eight years of marching broke his army''s will. At the Hyphasis River, his veterans refused to go further.
  Alexander sulked in his tent for three days, then turned back. The return march through the Gedrosian
  Desert killed a quarter of his army — perhaps 15,000 men — from heat, thirst, and flash floods. He
  reached Babylon in 323 and died on June 10 or 11, aged 32. His empire fractured within hours.

  '
significance: 'Alexander''s empire stretched from the Adriatic Sea to the Indus River — roughly 2 million
  square miles governed by a man who spent his entire adult life marching. The 20-plus cities he founded
  became nodes of Hellenistic civilization. Alexandria in Egypt housed the ancient world''s greatest library
  and remained a center of Greek learning for 900 years. Koine Greek became the lingua franca from Libya
  to Bactria, and the language in which the New Testament was later written.


  His conquests ended the Achaemenid Persian Empire after 220 years, creating a power vacuum that produced
  the Seleucid, Ptolemaic, and Antigonid successor kingdoms. In India, the disruption enabled Chandragupta
  Maurya to overthrow the Nanda dynasty and establish the Maurya Empire within five years of Alexander''s
  departure. The Greco-Bactrian kingdoms persisted in Central Asia for two centuries, producing syncretic
  art that blended Greek aesthetics with Buddhist iconography — the Gandhara style that gave the Buddha his
  first human face.


  The empire he built did not survive him by a single generation. His generals carved it into warring
  kingdoms within 40 years. What survived was not the state but the cultural infrastructure: the cities,
  the trade routes, the shared language, the idea that West and East could be governed as one.

  '
