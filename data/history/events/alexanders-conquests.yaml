    speaker: Alexander, as reported by Plutarch
    context: Before the siege of the Sogdian Rock, 327 BCE
  - text: I am not afraid of an army of lions led by a sheep; I am afraid of an army of sheep led by a lion.
    speaker: Alexander, attributed by multiple ancient sources
