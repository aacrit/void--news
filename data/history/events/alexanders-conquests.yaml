perspectives:
- viewpoint: Greco-Macedonian
  viewpoint_type: victor
  region_origin: europe
  narrative: 'The Macedonian court historians — Callisthenes (until Alexander had him arrested), Ptolemy,
    Aristobulus — framed the campaign as the completion of a Greek civilizational project. Philip II had
    unified Greece by force at Chaeronea in 338 BCE; Alexander carried the war to Persia, which had burned
    Athens in 480 BCE. The crossing of the Hellespont was staged as revenge for Xerxes: Alexander threw a
    spear into Asian soil from his ship and was first ashore.


    Arrian, writing in the 2nd century CE from Ptolemy''s and Aristobulus''s accounts, presents Alexander
    as the ideal Homeric hero — brave to the point of recklessness, generous to the defeated, driven by
    pothos (longing for the unknown). At Issus and Gaugamela, Alexander personally led the Companion cavalry
    into the thickest fighting. He was wounded at least eight times in major engagements. At the Mallian
    fortress in India, an arrow punctured his lung; his bodyguards had to carry him out over the wall.


    The founding of cities is central to this narrative. Each Alexandria was a Greek polis transplanted:
    agora, gymnasium, theater, grid streets. Alexandria in Egypt — planned by Alexander himself, with
    Dinocrates as architect — grew to 300,000 inhabitants within a generation and became the Ptolemaic
    capital. The Mouseion and its Library, built under Ptolemy I and II, attracted scholars from across the
    Mediterranean. Euclid, Archimedes (briefly), Eratosthenes, and later Hypatia all worked there.


    The Greco-Macedonian perspective treats Alexander''s adoption of Persian court customs — proskynesis
    (prostration), Persian dress, the appointment of Persian satraps — as pragmatic governance rather
    than betrayal. Ruling 50 million subjects required Persian administrative infrastructure. The mass
    wedding at Susa in 324 BCE, where Alexander and 80 of his officers married Persian noblewomen, was
    a deliberate policy of fusion. Plutarch reports that Alexander said he wished to be "a common father
    to all" and to mix Greek and barbarian "as in a loving-cup."


    This narrative minimizes or rationalizes the destruction. The burning of Persepolis (330 BCE) is
    presented as either an act of revenge for the burning of the Athenian Acropolis or a drunken accident
    encouraged by the courtesan Thais. The massacres at Tyre, Gaza, and among the Branchidae are noted
    but attributed to the conventions of ancient siege warfare. The murder of Cleitus is treated as a
    tragedy of alcohol, not character — Alexander''s remorse is emphasized more than the killing.

    '
  key_arguments:
  - Campaign was revenge for Xerxes' invasion and a civilizational mission
  - Cities founded became lasting centers of Greek learning and commerce
  - Adoption of Persian customs was pragmatic statecraft, not cultural betrayal
  - Alexander's personal courage and military genius were historically unprecedented
  sources:
  - title: Anabasis of Alexander
    author: Arrian
    year: c. 150 CE
    type: book
  - title: Life of Alexander (Parallel Lives)
    author: Plutarch
    year: c. 100 CE
    type: book
  - title: Alexander of Macedon, 356-323 B.C.
    author: Peter Green
    year: '1991'
    type: book
  notable_quotes:
