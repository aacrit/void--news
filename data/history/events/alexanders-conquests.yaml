  emphasized:
  - Systematic massacres at Thebes, Tyre, Gaza, and among the Branchidae
  - Alcoholism, paranoia, and murder of close companions
  - No administrative structure — empire was a personal military machine
  - Ancient hero narrative is a product of Ptolemaic court propaganda
  omitted:
  - Genuine cultural achievements of the Hellenistic world Alexander initiated
