  - Destruction of Persepolis and its cultural treasures
  - Alcoholism and increasingly erratic behavior in final years
  - Forced deportation of Greek settlers to distant colonies

- viewpoint: Persian / Achaemenid
  viewpoint_type: vanquished
  region_origin: middle-east
  narrative: 'The Achaemenid Empire that Alexander destroyed had governed from the Aegean to the Indus for
    220 years — the largest empire the world had seen. Cyrus the Great''s charter, inscribed on a clay
    cylinder in 539 BCE, declared religious tolerance and the right of displaced peoples to return home.
    The empire maintained 1,677 miles of Royal Road from Susa to Sardis, a postal relay system (the
    angareion) that Herodotus called the fastest in the world, and a sophisticated bureaucracy that
    administered 23 satrapies in multiple languages.


    Alexander''s invasion is framed in Persian and later Iranian historiography not as liberation but as
    catastrophe — the ruin of a civilization by a barbarian from the margins. The Shahnameh of Ferdowsi
    (c. 1010 CE), Iran''s national epic, calls Alexander "Iskandar" and presents him variously as a
    destroyer and, in some manuscripts influenced by the Alexander Romance, as a half-brother of Darius
    and thus a legitimate king. The ambivalence reflects centuries of Iranian negotiation with Greek
    cultural domination.


    The burning of Persepolis in 330 BCE is the central wound. Alexander set fire to the palace complex
    after a banquet — Plutarch and Diodorus Siculus disagree on whether it was planned or spontaneous.
    The Apadana, the Tachara, and the Treasury of Darius burned. Stone reliefs survived; the archives,
    the textiles, the wooden ceilings did not. Curtius Rufus records that Alexander sent 5,000 mules
    and 3,000 camels to carry away the treasure of Persepolis before the burning. Pierre Briant estimates
    the haul at 180,000 talents of silver — roughly 4,700 metric tons.


    Persian sources — or rather their absence — define this perspective. The Achaemenids left
    administrative records (the Persepolis Fortification Tablets, the Treasury Tablets) but no narrative
    history. Everything we know about Darius III comes from Greek and Roman writers. Briant''s From Cyrus
    to Alexander (2002) argues that this archival asymmetry has produced a distorted picture: Darius
    appears as a coward who fled two battles, but the Greek sources had every incentive to diminish the
    defeated king. The Persepolis tablets reveal a functioning state collecting taxes, paying workers,
    and managing grain distribution right up to the conquest.


    What survived Alexander was Persian culture, not Persian power. Zoroastrianism persisted through
    the Seleucid, Parthian, and Sasanian periods. The Persian language re-emerged under the Parthians
    and became the literary lingua franca of the Islamic East. The Sasanian Empire (224-651 CE) explicitly
    claimed Achaemenid heritage and regarded Alexander as a villain — the "accursed Alexander" of
    Zoroastrian tradition, who burned the Avesta and killed the magi.

    '
  key_arguments:
  - The Achaemenid Empire was a functioning, tolerant civilization — not a decadent tyranny awaiting liberation
  - Greek sources control the narrative because Persian archives were destroyed by the conqueror
  - The burning of Persepolis was cultural destruction on a massive scale
  - Persian civilization survived and re-emerged despite two centuries of Hellenistic domination
  sources:
  - title: 'From Cyrus to Alexander: A History of the Persian Empire'
    author: Pierre Briant
    year: '2002'
    type: book
  - title: 'The Shadow of God and the Hidden Imam: Religion, Political Order, and Societal Change in Shi''ite
      Iran from the Beginning to 1890'
    author: Said Amir Arjomand
    year: '1984'
    type: book
  - title: Shahnameh (The Book of Kings)
    author: Ferdowsi
    year: c. 1010 CE
    type: book
  notable_quotes:
  - text: And from that day forth the fortunes of Iran declined.
    speaker: Ferdowsi
    context: Shahnameh, on Alexander's conquest of Persia
  - text: He burned the Avesta which was written on 12,000 ox-hides with golden ink, and slew the priests.
    speaker: Arda Viraf
    context: Arda Viraf Namag (Zoroastrian text, 3rd-7th century CE)
  emphasized:
  - Scale and sophistication of Achaemenid governance destroyed by conquest
  - Burning of Persepolis as irreparable cultural loss
  - Greek monopoly on the historical narrative due to archival destruction
  - Continuity of Persian identity through Zoroastrianism and language
  omitted:
  - Internal weaknesses of the late Achaemenid state, including satrapal revolts
  - Egyptian and Babylonian populations that welcomed Alexander as a liberator
  - Persian imperial violence against subject populations (Ionian revolts, Egyptian rebellions)
  - Alexander's respectful treatment of the Persian royal family

- viewpoint: Indian / Paurava
  viewpoint_type: indigenous
  region_origin: south-asia
  narrative: 'Greek sources call him Porus and describe a giant of a man, over six feet tall, riding the
    largest war elephant on the field. Indian sources do not mention him at all. The Battle of the
    Hydaspes (Jhelum River, May 326 BCE) occupies a central place in Western Alexander narratives but
    barely registers in Indian historical memory. This asymmetry is itself the argument.


    Alexander reached the northwestern edge of the Indian subcontinent after crossing the Hindu Kush and
    subduing Taxila, whose king Ambhi (Omphis in Greek sources) submitted and provided supplies. Porus,
    ruling the territory between the Jhelum and Chenab rivers, refused. The battle that followed was the
    hardest of Alexander''s career. Porus deployed 200 war elephants — animals the Macedonian infantry
    had never faced at this scale. Arrian records that the Macedonian phalanx was initially reluctant to
    advance against the elephant line. Alexander won through a river crossing executed in monsoon rain and
    a double envelopment of Porus''s cavalry, but the fighting was brutal. His beloved horse Bucephalus
    died, either from wounds or exhaustion. Alexander founded a city — Bucephala — at the site.


    The Indian perspective reframes the encounter. Porus fought with his full army and lost; Alexander
    offered him his kingdom back. In Arrian''s account, Alexander asked Porus how he wished to be treated.
    "As a king," Porus answered. Alexander restored him as a vassal ruler. Indian nationalist
    historiography reads this differently: Porus fought the invader to a standstill, Alexander''s army
    mutinied at the next river (the Hyphasis/Beas), and the Macedonians retreated from India. In this
    reading, India was not conquered — it was the place where conquest ended.


    What matters more than the battle is what followed. Within five years of Alexander''s departure,
    Chandragupta Maurya — possibly inspired by or aware of Alexander''s organizational model — overthrew
    the Nanda dynasty and established the Maurya Empire, the first to unify most of the subcontinent.
    Plutarch and Justin record that Chandragupta met Alexander, though this is unverifiable. Seleucus I,
    Alexander''s successor in the east, invaded India around 305 BCE and lost. He ceded territories west
    of the Indus to Chandragupta in exchange for 500 war elephants — a reversal that Indian historiography
    underlines as proof that Alexander''s Indian campaign achieved nothing lasting.


    The Gandhara region, where Alexander''s veterans settled, produced a distinct artistic tradition
    over the following centuries. Greek sculptural techniques merged with Buddhist iconography to create
    the first anthropomorphic representations of the Buddha — previously depicted only by symbols
    (footprints, the Bodhi tree, an empty throne). The Gandhara Buddha, with his wavy hair and draped
    robes, is recognizably Greek in style. This cultural fusion was a byproduct of conquest, not its
    purpose, and Indian scholarship is divided on whether to celebrate or resent it.

    '
  key_arguments:
  - India was where Alexander's army refused to continue — the subcontinent was not conquered
  - Chandragupta Maurya's rise proves the invasion created no lasting political control
  - Seleucus I's defeat by Chandragupta reversed Alexander's gains within a generation
  - Indian sources do not record the Hydaspes as a major event
  sources:
  - title: The Early History of India
    author: Vincent A. Smith
    year: '1904'
    type: book
  - title: 'The Age of the Nandas and Mauryas'
    author: K.A. Nilakanta Sastri (ed.)
    year: '1952'
    type: book
  - title: 'Alexander''s Campaigns in Sind and Baluchistan and the Siege of the Brahmin Town of Harmatelia'
    author: P.H.L. Eggermont
    year: '1975'
    type: book
  notable_quotes:
  - text: How shall I treat you? As a king.
    speaker: Porus, as reported by Arrian
    context: After the Battle of the Hydaspes, when Alexander asked how he wished to be treated
  - text: Chandragupta, who was then a young man, saw Alexander himself.
    speaker: Plutarch
    context: Life of Alexander
  emphasized:
  - Alexander's army mutinied and retreated from India
  - Chandragupta Maurya built a larger empire than Alexander's within a decade
  - Seleucus I lost territories back to the Maurya Empire
  - Indian historical tradition does not center the Macedonian invasion
  omitted:
  - Alexander's tactical victory at the Hydaspes
  - Greek cultural contributions to Gandhara Buddhist art
  - Taxila's voluntary submission to Alexander
  - The lasting Hellenistic influence on northwestern Indian coinage and urban planning

- viewpoint: Modern Central Asian
  viewpoint_type: academic
  region_origin: central-asia
  narrative: 'The cities Alexander founded across Central Asia — Alexandria Eschate (Khujand), Alexandria
    on the Oxus (Ai-Khanoum), Alexandropolis, and half a dozen garrison towns whose locations are disputed —
    became nodes on what would later be called the Silk Road. For 200 years, Greek-speaking communities
    persisted in Bactria (northern Afghanistan) and Sogdiana (Uzbekistan/Tajikistan), producing a hybrid
    civilization that minted coins in Greek script and patronized both Zeus and local fire temples.


    Soviet and post-Soviet Central Asian archaeology has complicated the Greek-centric narrative.
    Excavations at Ai-Khanoum in northern Afghanistan (1964-1978, led by Paul Bernard) revealed a fully
    Hellenistic city — theater, gymnasium, heroon — but also adapted to local conditions. The palace
    combined Greek columns with an oriental audience hall. A treasury inscription was in Greek; the
    administrative archives contained Aramaic documents. The city was destroyed around 145 BCE by nomadic
    invaders, and its ruins lay undisturbed until French archaeologists arrived.


    Central Asian scholarship, particularly from Tajik, Uzbek, and Afghan historians, resists the framing
    of Alexander as a civilizer. Bobomull Gafurov''s Tajiks (1972), the standard Soviet-era national
    history of Tajikistan, presents Alexander as an invader who crushed the Sogdian revolt of Spitamenes
    (329-327 BCE) with extreme violence. Spitamenes, a Sogdian nobleman, led a guerrilla campaign that
    killed 2,000 Macedonian troops in the Zeravshan Valley and forced Alexander into two years of
    counterinsurgency — the longest resistance he faced anywhere. Alexander responded by devastating
    the Sogdian countryside. Curtius records the destruction of agricultural infrastructure, mass
    deportations, and the execution of prisoners.


    The marriage to Roxana is read differently in Central Asian tradition. In Greek sources, it is a love
    match — Alexander saw her at a banquet and was smitten. In Tajik and Afghan tradition, it was a
    political capitulation: Alexander married a local noblewoman to pacify a region he could not subdue
    by force. Roxana''s father Oxyartes received a satrapy; Sogdian resistance ended. The marriage
    produced Alexander''s only legitimate son, Alexander IV, who was murdered at age 13 by Cassander.


    What Central Asian historians emphasize is the continuity of local cultures beneath the Greek veneer.
    The Greco-Bactrian kingdom (c. 256-120 BCE) and the Indo-Greek kingdoms that followed were Greek
    in their elite culture but Central Asian and Indian in their populations, agricultural practices, and
    religious syncretism. Menander I (Milinda), an Indo-Greek king of the 2nd century BCE, became a
    Buddhist — his dialogue with the monk Nagasena is preserved in the Milindapanha, a Pali text. The
    Greek overlay was real but thin; when nomadic confederations swept through in the 2nd-1st centuries
    BCE, the Greek cities fell quickly and the underlying cultures reasserted themselves.

    '
  key_arguments:
  - Greek sources dominate because Persian and Central Asian archives were destroyed by the conqueror
  - Alexander's Central Asian cities became Silk Road nodes but served military not civilizational purposes
  - Sogdian resistance under Spitamenes was the longest guerrilla campaign Alexander faced
  - Local cultures persisted beneath the Hellenistic veneer and re-emerged after Greek power waned
  sources:
  - title: 'Tajiks: Ancient, Medieval, and Modern History'
    author: Bobomull Gafurov
    year: '1972'
    type: book
  - title: 'Ai Khanoum: A Hellenistic City in Central Asia (Proceedings of the British Academy, vol. 53)'
    author: Paul Bernard
    year: '1967'
    type: journal
  - title: 'The Greeks in Bactria and India'
    author: W.W. Tarn
    year: '1951'
    type: book
  notable_quotes:
  - text: Alexander found it easier to conquer Sogdiana than to hold it.
    speaker: Curtius Rufus
    context: Historiae Alexandri Magni, on the Sogdian revolt
  emphasized:
  - Spitamenes' guerrilla resistance as the most effective opposition Alexander faced
  - Archival asymmetry — Greek sources survive, local sources do not
  - Alexander's Central Asian cities as military garrisons, not gifts of civilization
  - Continuity of local cultures beneath Hellenistic elite veneer
  omitted:
  - Genuine cultural exchange and artistic innovation in Greco-Bactrian period
  - Greek contributions to urban planning, coinage, and administrative practices
  - Voluntary adoption of Greek language and customs by some Central Asian elites
  - The Milindapanha and Indo-Greek Buddhist patronage

- viewpoint: Revisionist / Anti-Heroic
  viewpoint_type: revisionist
  region_origin: europe
  narrative: 'Alexander killed somewhere between 100,000 and 750,000 people, depending on which ancient
    casualty figures one accepts and how much one discounts them. He destroyed at least two major cities
    (Thebes, Tyre) by systematic massacre. He burned the cultural capital of the Persian Empire. He
    murdered his own cavalry commander at a banquet. He executed his general Philotas and had Philotas''s
    father Parmenion — his most experienced commander, aged 70 — assassinated in Ecbatana on the same day.
    He forced his exhausted army through the Gedrosian Desert as a stunt to surpass Cyrus the Great and
    Semiramis, killing roughly 15,000 of his own soldiers.


    The revisionist case, articulated most sharply by Ernst Badian in a series of articles from the 1960s
    onward, strips away the romance. Badian argued that Alexander''s court historians (Callisthenes,
    Ptolemy, Aristobulus) were propagandists who sanitized a record of escalating violence, paranoia,
    and megalomania. After 330 BCE, Alexander demanded divine honors, required proskynesis from Greeks
    and Macedonians (who considered it degrading), and executed or imprisoned anyone who resisted.
    Callisthenes, Aristotle''s nephew, was arrested for refusing proskynesis and died in custody — either
    executed or left to rot in a cage.


    The drinking was prodigious even by Macedonian standards. Plutarch records all-night symposia where
    Alexander drank unmixed wine. Ephippus of Olynthus, a hostile source, describes Alexander wearing
    the horns of Ammon and the lion skin of Heracles at banquets. The murder of Cleitus — Alexander threw
    a javelin through the man who had saved his life, during an argument about whether Philip or Alexander
    deserved more credit — is difficult to rationalize away, though ancient apologists tried. Alexander''s
    grief was real; Arrian says he refused food for three days and had to be persuaded by his officers
    that the philosopher Anaxarchus''s argument — that a king is above ordinary morality — was correct.


    The empire itself was a mirage. Alexander never established a civil administration. He appointed
    satraps, many of whom he later replaced or executed for corruption or disloyalty. He left no succession
    plan. When asked on his deathbed to whom he left his empire, he reportedly said "to the strongest" —
    or possibly "to Krateros" (his general), the Greek words being nearly identical. The result was 40
    years of wars among his successors (the Diadochi), which killed more people than his conquests. The
    empire that took 11 years to build was dismembered in a single generation.


    Peter Green''s Alexander of Macedon (1991) and Ian Worthington''s By the Spear (2014) represent the
    modern scholarly mainstream: Alexander was a military genius of extraordinary personal courage, who
    was also an alcoholic, a megalomaniac, and increasingly unstable in his final years. The hero worship
    that pervades popular culture — Oliver Stone''s 2004 film, the "Alexander the Great" brand — is a
    product of the same Ptolemaic propaganda that shaped Arrian''s account 2,300 years ago.

    '
  key_arguments:
  - Ancient sources are court propaganda that sanitize escalating violence and paranoia
  - The killing of Cleitus, execution of Parmenion, and demand for divine honors reveal pathological narcissism
  - The Gedrosian Desert march was an ego project that killed 15,000 of his own soldiers
  - The empire collapsed immediately because Alexander built no institutions, only a personality cult
  sources:
  - title: 'Alexander the Great and the Unity of Mankind'
    author: Ernst Badian
    year: '1958'
    type: journal
  - title: Alexander of Macedon, 356-323 B.C.
    author: Peter Green
    year: '1991'
    type: book
  - title: 'By the Spear: Philip II, Alexander the Great, and the Rise and Fall of the Macedonian Empire'
    author: Ian Worthington
    year: '2014'
    type: book
  notable_quotes:
  - text: His body, panting with unquenchable thirst for blood, was now turning against his friends and generals.
    speaker: Curtius Rufus
    context: Historiae Alexandri Magni, on the final years
  - text: To the strongest.
    speaker: Alexander (attributed)
