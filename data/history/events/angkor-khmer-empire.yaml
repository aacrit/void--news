- viewpoint: Cambodian Nationalist
  viewpoint_type: revisionist
  region_origin: southeast-asia
  narrative: 'Angkor Wat appears on every Cambodian flag since independence in 1953. The French Protectorate flag (1863-1953)
    featured it. King Sihanouk''s Kingdom of Cambodia (1953-1970) featured it. Lon Nol''s Khmer Republic (1970-1975) featured it.
    The Khmer Rouge''s Democratic Kampuchea (1975-1979) featured it. The Vietnamese-backed People''s Republic of Kampuchea
    (1979-1989) featured it. The current Kingdom of Cambodia features it. No other nation puts a building on its flag. Cambodia
    puts Angkor Wat on its flag because the empire is the nation. Every Cambodian regime, regardless of ideology, has claimed
    Angkor as its legitimating ancestor.


    The Khmer Rouge made the claim most violently. Pol Pot -- born Saloth Sar, educated at the Ecole francaise de radioelectricite
    in Paris -- constructed Year Zero on a syllogism: the Khmer people had built the greatest civilization in Southeast Asia; that
    greatness had been stolen by foreign influence (Vietnamese, Chinese, French, urban culture, money, education); therefore, a
    return to agrarian purity would restore it. "Angkar" -- the Organization, as the Khmer Rouge called itself -- was a phonetic
    echo of "Angkor." The forced evacuation of Phnom Penh on April 17, 1975, drove 2 million people into the countryside to build
    irrigation canals by hand -- a grotesque parody of the Khmer Empire''s hydraulic engineering. The Khmer Rouge actually studied
    the ancient baray system. They believed they could replicate it without engineers, without machinery, without the six centuries
    of accumulated expertise that had built the originals. Between 1975 and 1979, 1.5-2 million Cambodians died of execution,
    starvation, disease, and overwork.


    The Preah Vihear temple dispute demonstrates that Angkor is not history -- it is geopolitics. Preah Vihear, an 11th-century
    Khmer temple perched on a 525-meter cliff in the Dangrek Mountains, sits on the Thai-Cambodian border. The International Court
    of Justice awarded the temple to Cambodia in 1962 in a 9-3 ruling. Thailand rejected the decision domestically. In 2008, when
    Cambodia sought UNESCO World Heritage status for the temple, Thai nationalists occupied the surrounding area. Armed clashes
    between Thai and Cambodian soldiers between 2008 and 2011 killed dozens and displaced tens of thousands of civilians. In 2013,
    the ICJ ruled again -- unanimously this time -- that the promontory surrounding the temple belonged to Cambodia. The Thai
    government accepted the ruling. Thai nationalist groups did not. A temple built by Suryavarman I in the 11th century remained
    a casus belli in the 21st.


    Cambodian nationalism draws a straight line from Angkor to the present: the Khmer people built a civilization that dominated
    mainland Southeast Asia for six centuries; Thai, Vietnamese, and French invaders reduced Cambodia to a small, dependent state;
    independence, sovereignty, and national dignity require the defense of the Angkorian legacy. This narrative is powerful, unifying,
    and dangerous. It defines Cambodian identity against its neighbors. It treats the borders of the Khmer Empire as a map of
    lost territory. It makes every Thai-Cambodian border dispute an existential question. And it was used to justify genocide.

    '
  key_arguments:
  - Angkor Wat on the flag is not decoration -- every Cambodian regime since 1863 has used the empire as its legitimating ancestor
  - The Khmer Rouge invoked Angkor to justify Year Zero -- "Angkar" echoed "Angkor" and the forced canal-building parodied the ancient hydraulic system
  - The Preah Vihear dispute (2008-2011) proves the Khmer Empire remains a live territorial and military issue in the 21st century
  - Cambodian nationalism draws strength from the Angkorian legacy but defines identity against neighbors in ways that have enabled violence
