perspectives:
- viewpoint: Khmer Royal / Sanskrit Inscriptions
  viewpoint_type: victor
  region_origin: southeast-asia
  narrative: 'Over 1,200 Sanskrit and Old Khmer inscriptions survive on temple walls, doorframes, and stelae across Cambodia,
    southern Vietnam, Thailand, and Laos. They constitute one of the densest epigraphic records in Asia -- a civilization that
    wrote its own history in stone. The Sdok Kok Thom inscription (K.235), carved in 1052 CE, records the founding moment: in
    802, Jayavarman II performed a ritual on Phnom Kulen in which a Brahman priest named Hiranyadama consecrated a sacred linga
    and declared the king chakravartin -- universal monarch, independent of Javanese overlordship. The devaraja cult bound the
    identity of the king to the identity of the god. The capital was not merely an administrative center; it was a symbolic Mount
    Meru, the axis of the cosmos. Every reservoir, canal, and temple was oriented to the cosmological order described in the
    Vedic and Puranic texts that the Khmer court had adopted and adapted from Indian tradition.


    The hydraulic network was simultaneously practical and sacred. The West Baray, an artificial reservoir measuring 8 kilometers
    by 2.1 kilometers, held 53 million cubic meters of water. It was completed under Suryavarman I (r. 1002-1050) and fed a canal
    system that irrigated the rice paddies surrounding the capital. But the barays were also ritual landscapes: the West Mebon
    temple sat on an island at the center of the West Baray, accessible only by boat, a physical model of the cosmic ocean
    surrounding Mount Meru. Water flowed over lingas installed in riverbeds -- the "River of a Thousand Lingas" at Kbal Spean,
    carved directly into the sandstone riverbed of the Stung Kbal Spean -- so that all water entering the capital had been
    ritually sanctified. Agriculture and theology were a single system.


    Suryavarman II (r. 1113-c. 1150) built Angkor Wat as his mortuary temple, dedicating it to Vishnu. The temple faces west --
    the direction of death, unique among Angkorian temples, which typically face east toward the rising sun. Its 1,200 meters
    of continuous bas-relief depict the Churning of the Ocean of Milk (a creation narrative from the Bhagavata Purana), the Battle
    of Kurukshetra from the Mahabharata, scenes from the Ramayana, and Suryavarman''s own military review -- 20,000 soldiers
    and war elephants, commanders identified by inscriptions, marching toward the Cham enemy. The king placed himself within the
    mythological cycle: his wars were cosmic events, his temple a permanent link between the human and divine planes.


    Jayavarman VII (r. 1181-c. 1218) broke the pattern by converting the state religion from Hinduism to Mahayana Buddhism.
    The Bayon, at the center of his new capital Angkor Thom, bears 216 carved stone faces -- their identity debated (the
    bodhisattva Avalokiteshvara, or Jayavarman VII himself, or both) -- gazing outward in four directions from 54 towers.
    The inscription at Ta Prohm temple (K.273) itemizes the resources consumed by a single Buddhist monastery: 79,365 people
    in its service network, 12,640 in direct service, 615 dancers, 2,500 tons of rice per year. Preah Khan''s inscription
    (K.908) records 97,840 servants and functionaries. These are not round numbers. They are bureaucratic records carved in
    stone -- a state that counted its people and published the count on its temple walls.


    The inscriptions also record law. The Koh Ker inscription (K.184) prescribes penalties for officials who steal from temples.
    The Lolei inscription details water rights and irrigation responsibilities. The Sdok Kok Thom inscription traces the lineage
    of a priestly family across 250 years and nine kings -- a continuous institutional record longer than many European monastic
    chronicles. When the inscriptions stop in the late 14th century, the epigraphic record falls silent. No inscription explains
    the abandonment. The stones record six centuries of kings, gods, wars, and water management. They do not record the end.

    '
  key_arguments:
  - The devaraja cult fused kingship with divinity -- the capital was a cosmological model, not just a political center
  - The hydraulic system was simultaneously agricultural infrastructure and ritual landscape -- water was sanctified before it irrigated fields
  - Temple inscriptions record bureaucratic precision (79,365 people serving Ta Prohm, 2,500 tons of rice per year) -- a literate state that counted and published
  - Angkor Wat faces west because Suryavarman II intended it as a mortuary temple dedicated to Vishnu -- the orientation is theological, not accidental
