  notable_quotes:
  - text: 'The Thai kingdom sent its armies against Angkor, and the people of Angkor submitted. The Thai king took the Khmer
      king and all his family and his dancers and his musicians and his Brahmans to Ayutthaya.'
    speaker: Royal Chronicles of Ayutthaya
    context: Thai chronicle account of the 1431 sack of Angkor (date and exact wording vary across manuscript traditions)
  emphasized:
  - Cultural continuity between the Khmer Empire and Tai successor states -- Ayutthaya absorbed Khmer civilization, not just territory
  - The 1431 sack as a complex event, not simple destruction -- cultural transfer accompanied military conquest
  - Thai claim to shared ownership of the Angkorian cultural legacy
  - The Preah Vihear dispute as evidence that Angkor remains contested heritage, not settled history
  omitted:
  - The scale of destruction during the 1431 sack -- Angkor's population dispersal and the end of its urban system
  - The degree to which Thai cultural borrowing from Angkor was involuntary appropriation through conquest
  - Cambodian perspectives on the relationship -- from the Cambodian view, Thai cultural borrowing is evidence of theft, not inheritance
  - The role of Thai nationalism in stoking the Preah Vihear conflict
- viewpoint: Environmental / Hydraulic Archaeology
  viewpoint_type: academic
  region_origin: global
  narrative: 'In April 2012, a Cessna 206 equipped with a Leica ALS60 LIDAR system flew systematic transects over 370 square
    kilometers of jungle canopy surrounding the Angkor temple complex. The laser pulses -- 200,000 per second, penetrating gaps
    in the forest cover -- returned a three-dimensional surface model of the ground beneath the trees. The results, published by
    Damian Evans, Roland Fletcher, and colleagues in the Proceedings of the National Academy of Sciences in 2013, revealed the
    skeleton of a city. Mounded occupation areas, canal networks, reservoir embankments, road grids, and field boundaries extended
    continuously in every direction, connecting the known temple complexes into a single integrated settlement. The total urban
    area exceeded 1,000 square kilometers. A follow-up survey in 2015, covering 1,910 square kilometers with higher resolution,
    confirmed and extended the findings: Greater Angkor was not a city with surrounding farmland. It was a landscape-scale engineered
    environment -- the largest pre-industrial settlement ever documented.


    The hydraulic system was the city''s operating system. The West Baray (8 km x 2.1 km, 53 million cubic meters capacity) and
    the East Baray (7.5 km x 1.8 km, now dry) were the primary storage reservoirs, fed by the Siem Reap, Roluos, and Puok rivers
    diverted through a network of canals. Water flowed south through distribution channels to irrigate the rice paddies that fed
    the urban population. Bernard Philippe Groslier first proposed the "hydraulic city" thesis in the 1950s, arguing that Angkor''s
    power rested on its ability to manage water for multi-crop rice cultivation. The LIDAR data confirmed his thesis and expanded
    its scale: the hydraulic network was larger and more complex than Groslier had imagined.


    The collapse narrative changed completely. Earlier historians attributed Angkor''s abandonment primarily to the 1431 Ayutthayan
    invasion. The environmental evidence tells a different story. Brendan Buckley''s dendrochronological analysis of Vietnamese
    cypress trees (Fokienia hodginsii), published in 2010, identified two periods of severe monsoon disruption: prolonged droughts
    from 1345 to 1374 and 1401 to 1425, punctuated by extreme flooding events. Mary Beth Day''s sediment core analysis from the
    West Baray (published 2012) found evidence of massive flood damage to the reservoir''s southern embankment, repaired and then
    damaged again. The LIDAR data revealed breached canals and abandoned water management structures across the network.


    The city did not "fall." It de-densified. The hydraulic system had sustained multi-crop rice cultivation for 600 years through
    a monsoon regime that was variable but manageable. When the monsoon pattern shifted at the end of the Medieval Climate Anomaly
    -- swinging between drought and extreme precipitation -- the system''s tolerances were exceeded. Canals designed for a certain
    flow range could not handle either extreme. Reservoirs silted up during dry periods and breached during wet ones. The agricultural
    surplus that had fed 750,000 people contracted. Population dispersed gradually toward the Tonle Sap lake, the Mekong delta,
    and coastal areas where rain-fed agriculture was more resilient. The 1431 Ayutthayan sack was real, but it struck a city already
    in demographic and hydraulic decline.


    The parallel to contemporary climate change is precise. A low-density urban system of over 1 million people, dependent on
    engineered water infrastructure, collapsed when climate variability exceeded the system''s design parameters. The Angkorian
    engineers had solved a problem -- turning seasonal monsoon rainfall into year-round irrigation -- that sustained the largest
    pre-industrial city on Earth. They had not solved the problem of what happens when the monsoon itself changes.
    Roland Fletcher describes Greater Angkor as an "agrarian urbanism" -- a settlement pattern without parallels in the European
    or Chinese urban traditions, where cities were high-density and bounded by walls. Angkor was low-density, unbounded, and
    integrated with its agricultural hinterland at every scale. The LIDAR data does not just add detail to Angkorian history.
    It challenges the definition of what a city is.

    '
  key_arguments:
  - LIDAR revealed Greater Angkor as the largest pre-industrial city ever documented -- 1,000+ km2 of integrated urban infrastructure, overturning assumptions about pre-industrial urbanism
  - Dendrochronological and sediment core evidence shows the hydraulic system failed under 14th-15th century monsoon variability -- not military defeat alone
  - The city de-densified gradually over decades as the agricultural surplus contracted, rather than falling in a single catastrophic event
  - Angkor's "agrarian urbanism" challenges European and Chinese definitions of what a city is -- low-density, unbounded, and integrated with its agricultural landscape
  sources:
  - title: 'Uncovering archaeological landscapes at Angkor using lidar'
    author: Damian Evans, Christophe Pottier, Roland Fletcher, et al.
    year: '2013'
    type: journal
    doi: 10.1073/pnas.1306539110
  - title: 'Monsoon extremes and society over the past millennium on mainland Southeast Asia'
    author: Brendan M. Buckley, et al.
    year: '2010'
    type: journal
    doi: 10.1016/j.quascirev.2010.04.024
  - title: 'The Hydraulic City: Water and the Infrastructures of Citizenship in Angkor'
    author: Mary Beth Day
    year: '2012'
    type: journal
  - title: 'Low-Density, Agrarian-Based Urbanism: A Comparative View'
    author: Roland Fletcher
    year: '2012'
    type: journal
    doi: 10.5334/bha.22111
  notable_quotes:
  - text: 'The survey results confirm that the urban complex of Greater Angkor is the most extensive settlement system of the
      pre-industrial world.'
    speaker: Damian Evans et al.
    context: Proceedings of the National Academy of Sciences, 2013
  - text: 'The coincidence between severe droughts, extreme floods, and the progressive decline of the Angkorian hydraulic
      system is now well established.'
    speaker: Brendan Buckley
    context: Quaternary Science Reviews, 2010 -- on the monsoon anomalies of the 14th-15th centuries
  emphasized:
  - LIDAR as a revolutionary archaeological technology that revealed a city invisible from the ground
  - Climate variability -- not military conquest -- as the primary driver of Angkor's collapse
  - The hydraulic system's failure as a case study in infrastructure exceeding its design tolerances under climate change
  - '''Agrarian urbanism'' as a challenge to Eurocentric definitions of cities'
  omitted:
  - The political and military factors that contributed to Angkor's decline alongside environmental stress
  - The agency of Angkorian people in choosing to relocate rather than being passively overwhelmed
  - The religious and cultural dimensions of the city -- the environmental lens can reduce a civilization to its infrastructure
  - The ongoing political significance of Angkor in Cambodian and Thai national identity
