  emphasized:
  - European "discovery" as the founding act of Angkorian studies -- erasing prior knowledge by Cambodians, Portuguese, Spanish, and Japanese visitors
  - Genuine archaeological achievement by EFEO scholars operating within a colonial political framework
  - The removal of Buddhist layers as a colonial act of historical editing
