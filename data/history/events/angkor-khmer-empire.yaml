slug: angkor-khmer-empire
title: The Khmer Empire
subtitle: A laser pulse through the Cambodian canopy in 2012 found a city of a million people that the jungle had hidden for 600 years
date_display: 802-1431
date_sort: 1113
date_precision: year
era: medieval
region: southeast-asia
country: Multiple (present-day Cambodia, Thailand, Laos, Vietnam)
category: empire
severity: major
death_toll: Not applicable -- not a single-event catastrophe but an imperial formation spanning 629 years
affected_population: 'Population of Greater Angkor at its peak (c. 1150): estimated 750,000-1,000,000 across 1,000+ square kilometers of integrated urban infrastructure, hydraulic networks, and agricultural land'
duration: 629 years (802 CE founding to 1431 CE abandonment of Angkor)
summary: 'In 2012, an aircraft mounted with LIDAR equipment flew over the Cambodian jungle canopy north of Siem Reap. The
  laser pulses stripped away 600 years of forest growth and revealed the outlines of a city that dwarfed medieval London. Greater
  Angkor stretched across 1,000+ square kilometers -- an integrated network of temples, reservoirs, canals, roads, and residential
  mounds that had supported 750,000 or more people. No pre-industrial city on Earth had been this large. The hydraulic engineers
  of the Khmer Empire had built a water management system so extensive that the West Baray alone -- one of several reservoirs --
  held 53 million cubic meters of water. The system fed multiple rice harvests per year for six centuries.


  The empire began in 802 CE, when Jayavarman II declared himself chakravartin -- universal monarch -- on Phnom Kulen, a sandstone
  plateau 40 kilometers northeast of present-day Angkor Wat. He had returned from the Javanese court (whether as a hostage or
  a guest remains disputed) and established the devaraja cult: the king as earthly manifestation of a Hindu deity, the capital
  as a symbolic Mount Meru, the cosmic axis of the universe. Over 1,200 Sanskrit and Old Khmer inscriptions survive on temple
  walls across Cambodia, southern Vietnam, Thailand, and Laos -- one of the densest epigraphic records in Asia. They document
  land grants, temple dedications, royal genealogies, and legal codes in a civilization that recorded itself in stone.


  Suryavarman II (r. 1113-c. 1150) built Angkor Wat. The temple complex covers 162.6 hectares, its moat stretches 190 meters
  wide along a 5.5-kilometer perimeter, and its bas-reliefs extend for 1,200 meters -- depicting scenes from the Mahabharata,
  the Ramayana, and Suryavarman''s own military campaigns against the Cham and Dai Viet kingdoms. The temple faces west, toward
  the setting sun, toward death. Suryavarman dedicated it to Vishnu and intended it as his mortuary temple. It is the largest
  religious monument ever built.


  Jayavarman VII (r. 1181-c. 1218) remade the empire. After the Cham kingdom sacked Angkor in 1177 -- an invasion that arrived
  by boat up the Tonle Sap lake -- Jayavarman drove them out and converted the state religion from Hinduism to Mahayana Buddhism.
  He built Angkor Thom, a new walled capital 3 kilometers square, centered on the Bayon temple with its 216 carved stone faces
  gazing outward in four directions. He constructed 102 hospitals across the empire and 121 rest houses along the royal roads.
  An inscription at Ta Prohm temple records the resources dedicated to a single monastery: 12,640 people served it, including
  615 dancers; its annual budget consumed 2,500 tons of rice. He built more than all his predecessors combined. The sandstone
  quarries at Phnom Kulen, 40 kilometers away, delivered blocks by canal.


  Henri Mouhot, a French naturalist, reached Angkor in 1860 and published sketches in Le Tour du Monde in 1863. He described
  ruins that rivaled Solomon''s Temple and speculated they could not have been built by the ancestors of the Cambodians he met.
  Cambodian monks had been maintaining the temples continuously. The French "discovery" launched a colonial appropriation that
  reframed Angkor as a mystery to be solved by European science rather than a living heritage continuously inhabited and venerated
  by Khmer people.


  The empire did not fall in a single moment. Dendrochronological data from Vietnamese cypress trees shows two periods of extreme
  monsoon failure -- prolonged droughts followed by catastrophic floods -- between 1362-1392 and 1415-1440. The hydraulic system
  that had sustained the city for six centuries could not absorb the oscillation. The Ayutthaya kingdom (founded 1351, originally
  a Khmer vassal) sacked Angkor in 1431. The Khmer court relocated south to Phnom Penh and Lovek. But the temples were never
  abandoned entirely. Angkor Wat remained a Buddhist pilgrimage site. Japanese visitors inscribed graffiti there in the 1630s.
  Cambodian families lived among the ruins.


  Today, Angkor Wat appears on the Cambodian flag -- the only national flag in the world that features a building. It appeared
  on every Cambodian flag since independence in 1953, including the flag of the Khmer Rouge (1975-1979), who invoked Angkor''s
  glory to justify Year Zero: if Khmer people had built the greatest civilization in Southeast Asia, they could build it again.
  Between 1975 and 1979, 1.5-2 million Cambodians died. In 2008, Thai and Cambodian soldiers exchanged fire near Preah Vihear,
  a Khmer temple on the border that the International Court of Justice had awarded to Cambodia in 1962. The rivalry between
  the successor states of the Khmer and Ayutthayan empires remained lethal 577 years after the sack of Angkor.

  '
significance: 'LIDAR surveys (2012, 2015) proved Greater Angkor was the largest pre-industrial city ever documented -- 1,000+ square
  kilometers of integrated urban infrastructure, larger than contemporaneous London, Paris, or Baghdad. Angkor Wat remains the
  largest religious monument on Earth at 162.6 hectares. Over 1,200 Sanskrit and Old Khmer inscriptions constitute one of Asia''s
  densest epigraphic records. The hydraulic system -- the West Baray alone holds 53 million cubic meters -- was the most complex
  pre-industrial water management network ever discovered. The Khmer Empire''s collapse provides the clearest pre-modern case study
  of climate-driven urban failure. Angkor Wat on Cambodia''s flag makes it the only national symbol of its kind; the Khmer Rouge''s
  appropriation of Angkor''s legacy connects directly to the Cambodian genocide.

  '
