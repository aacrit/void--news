  emphasized:
  - Divine kingship as the organizing principle of an entire civilization -- politics, religion, agriculture, and art unified through cosmology
  - The precision of the bureaucratic state -- inscriptions record exact numbers of people, quantities of rice, lengths of service
  - The hydraulic network as a ritual landscape -- barays as cosmic oceans, carved riverbeds sanctifying water before it reached the fields
