- viewpoint: French Colonial / "Discovery" Narrative
  viewpoint_type: victor
  region_origin: europe
  narrative: 'Henri Mouhot, a French naturalist collecting insects and botanical specimens, reached Angkor in January 1860.
    His sketches and descriptions, published posthumously in Le Tour du Monde in 1863, introduced the temples to European audiences.
    "One of these temples," he wrote, "a rival to that of Solomon, and erected by some ancient Michelangelo -- might take an
    honourable place beside our most beautiful buildings. It is grander than anything left to us by Greece or Rome." The comparison
    was revealing: Mouhot could praise the architecture only by translating it into European referents. Solomon. Michelangelo.
    Greece. Rome. The Khmer builders had no names in his account; the temples had no context.


    Mouhot''s descriptions went further. He speculated that the ruins "could not be attributed to the ancestors" of the Cambodians
    he encountered. He proposed connections to ancient Rome, to lost civilizations, to builders who had preceded the current
    inhabitants. This was the logic of colonial archaeology: if the natives had not built the ruins, someone else had, and the
    question of who that someone was conveniently opened a space for European intervention. The French Protectorate over Cambodia
    (1863-1953) positioned France as the restorer of a civilization that the Cambodians had supposedly lost the capacity to
    maintain.


    The Ecole francaise d''Extreme-Orient (EFEO), founded in 1900, produced the first systematic archaeological and epigraphic
    scholarship on Angkor. George Coedes''s eight-volume Inscriptions du Cambodge (1937-1966) remains the foundational collection
    of Khmer epigraphy. Bernard Philippe Groslier directed the Conservation of Angkor from 1960 to 1972 and developed the
    "hydraulic city" thesis -- the idea that Angkor''s survival depended on its water management system and that the system''s
    failure caused the city''s collapse. The scholarship was genuine. The framework was colonial. EFEO archaeologists operated
    under French military protection, exported artifacts to the Musee Guimet in Paris, and produced knowledge that served
    French Indochina''s political legitimacy.


    The EFEO cleared jungle from the temples, stabilized structures using anastylosis (disassembly and reassembly with new
    structural elements), and created the archaeological park that tourists visit today. They also made choices about what to
    preserve and what to neglect. Buddhist additions to originally Hindu temples were sometimes removed to "restore" an earlier
    state -- a decision that privileged archaeological purity over the living religious practice of Cambodians who had been
    worshipping at these sites continuously for centuries. The "discovery" narrative erased continuity. Cambodian monks were living
    at Angkor Wat when Mouhot arrived. A Portuguese missionary, Antonio da Madalena, had described Angkor in 1586. Japanese
    pilgrims inscribed Buddhist prayers on Angkor Wat''s walls in the 1630s. The Spanish missionary Marcelo de Ribadeneyra
    mentioned the city in 1601. Mouhot did not discover Angkor. He introduced it to a European audience that was ready to consume
    it as a romantic ruin.


    The colonial legacy persists in the structure of Angkorian studies. Until the 1990s, most scholarship on Angkor was published
    in French, produced by French-trained archaeologists, and housed in EFEO archives in Paris. Cambodian scholars had limited
    access to the academic infrastructure that interpreted their own heritage. The APSARA Authority, established by the Cambodian
    government in 1995 to manage the Angkor Archaeological Park, marked a shift toward Cambodian control -- but international
    teams from France, Japan, the United States, Australia, and elsewhere continue to dominate the research. The question of who
    gets to tell Angkor''s story remains unresolved.

    '
  key_arguments:
  - Mouhot's 1860 account framed Angkor as a mystery that European science would solve, erasing centuries of continuous Cambodian habitation and worship
  - The EFEO produced genuine scholarship within a colonial framework -- knowledge that served the French Protectorate's political legitimacy
  - Colonial archaeologists removed Buddhist additions to "restore" Hindu originals, privileging archaeological purity over living Cambodian religious practice
  - The question of who controls Angkor's narrative -- Cambodian scholars vs. international teams -- remains contested
