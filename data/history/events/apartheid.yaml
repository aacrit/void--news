perspectives:
- viewpoint: ANC / Liberation Movement
  viewpoint_type: victor
  region_origin: africa
  narrative: 'The ANC''s armed wing, Umkhonto we Sizwe (MK), launched its first sabotage attacks on December 16, 1961 — the
    date Afrikaners celebrated as the Day of the Vow, commemorating their 1838 victory over the Zulu at Blood River. The symbolism
    was deliberate. MK targeted infrastructure: power stations, railway lines, government offices. Mandela, who had gone underground
    and traveled to Algeria and Ethiopia for guerrilla training, was captured in August 1962 after a tip-off widely attributed
    to the CIA.


    The Rivonia Trial (1963-1964) was meant to break the movement. Instead, Mandela''s speech from the dock — four hours long,
    delivered without notes — became the founding text of the liberation struggle. "I have cherished the ideal of a democratic
    and free society," he said. "It is an ideal for which I am prepared to die." The judge sentenced all eight defendants
    to life imprisonment rather than death, reportedly influenced by international pressure including a UN Security Council
    resolution.


    On Robben Island, the prisoners built an internal university. Mandela studied Afrikaans, read Afrikaner history, and corresponded
    — secretly, through a network of smuggled letters — with the ANC in exile. Walter Sisulu, who had recruited Mandela to
    the ANC in 1944, served alongside him for 25 years on the island. Ahmed Kathrada, Govan Mbeki, and Raymond Mhlaba completed
    the core group. They debated strategy endlessly: armed struggle, negotiations, international pressure, mass action. By
    the 1980s, the consensus shifted toward negotiation — but from a position of strength, not capitulation.


    Oliver Tambo led the ANC in exile from Lusaka, Zambia, for 30 years. He built an international network that secured the
    arms embargo, sports boycotts, and cultural isolation of South Africa. The ANC''s Radio Freedom broadcast into South Africa
    from Tanzania, Angola, Ethiopia, and Madagascar. Tambo suffered a stroke in 1989 and never held office in the new South
    Africa; he died in 1993, one year before the first democratic election.


    The transition was not a capitulation by either side. The ANC gave up its demand for immediate majority rule in exchange
    for a power-sharing interim government. De Klerk gave up white minority rule in exchange for constitutional protections,
    an independent judiciary, and property rights guarantees. The 1993 interim constitution was hammered out at the World
    Trade Centre in Kempton Park, where Constand Viljoen''s Afrikaner Volksfront threatened military action until the last
    weeks before the election. On April 27, 1994, Mandela voted for the first time in his life. He was 75 years old.

    '
  key_arguments:
  - Armed struggle was a last resort after decades of peaceful protest were met with massacre and bannings
  - Robben Island forged the leadership that negotiated the transition — prison was a university, not a defeat
  - International solidarity and sanctions were decisive in forcing the regime to negotiate
  - The ANC accepted a negotiated compromise to prevent civil war, not because it had been defeated
