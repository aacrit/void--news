duration: 46 years (1948-1994)
summary: 'On May 26, 1948, the Herenigde Nasionale Party won 70 seats in South Africa''s general election — fewer votes than
  Jan Smuts''s United Party, but more seats, thanks to rural constituency weighting that overrepresented Afrikaner farming
  districts. D.F. Malan became prime minister. Within two years, Parliament passed the Population Registration Act (classifying
  every South African into one of four racial groups), the Group Areas Act (designating where each group could live), and
  the Prohibition of Mixed Marriages Act. The architecture of apartheid was not improvised. It was legislative, systematic,
  and indexed.


  Hendrik Verwoerd, Minister of Native Affairs from 1950 and Prime Minister from 1958, transformed petty apartheid — segregated
  benches, separate entrances — into grand apartheid: the Bantustan system. Ten nominally self-governing homelands were carved
  from 13% of South Africa''s land for 75% of its population. Transkei received "independence" in 1976; no country except
  South Africa recognized it. Black South Africans assigned to homelands lost their South African citizenship. A worker commuting
  from Soweto to Johannesburg — 15 kilometers — crossed an international border twice daily, carrying a passbook that could
  result in arrest if not produced on demand. Between 1948 and 1986, over 17 million people were prosecuted under the pass
  laws.


  The African National Congress, founded in 1912, shifted from petitioning to civil disobedience after 1948, then to armed
  struggle after the Sharpeville massacre of March 21, 1960, when police fired on a crowd protesting pass laws, killing 69
  people. The ANC and Pan Africanist Congress were banned. Nelson Mandela, Walter Sisulu, and six others were sentenced to
  life imprisonment at the Rivonia Trial in 1964. Mandela entered Robben Island at age 46 and did not leave prison until February
  11, 1990, at age 71.


  June 16, 1976: police in Soweto opened fire on schoolchildren marching against mandatory Afrikaans-language instruction.
  Hector Pieterson, 12 years old, was among the first killed. Sam Nzima''s photograph of Mbuyisa Makhubu carrying Pieterson''s
  body — his sister Antoinette running alongside — became the single most reproduced image of apartheid. The Soweto Uprising
  killed at least 176 people in its first week and radicalized a generation. Steve Biko, founder of the Black Consciousness
  Movement, died in police custody on September 12, 1977, after sustaining massive head injuries during interrogation. The
  police claimed he had gone on a hunger strike.


  By the mid-1980s, South Africa was burning. The United Democratic Front coordinated rolling township revolts. International
  sanctions tightened: the European Community imposed an arms embargo in 1977, the US Congress overrode Reagan''s veto to
  pass the Comprehensive Anti-Apartheid Act in 1986, and 155 US companies divested between 1984 and 1988. Chase Manhattan''s
  refusal to roll over short-term loans in 1985 triggered a financial crisis that cost the rand 35% of its value in two weeks.
  F.W. de Klerk, who became president in August 1989, unbanned the ANC, PAC, and South African Communist Party on February
  2, 1990. Nine days later, Mandela walked out of Victor Verster Prison.


  Four years of negotiations followed — punctuated by the Boipatong massacre (June 1992, 45 dead), Chris Hani''s assassination
  (April 1993), and the constant threat of right-wing Afrikaner insurrection. On April 27, 1994, 19.7 million South Africans
  voted in the first universal-suffrage election. Lines stretched for kilometers. Some voters waited 11 hours. The ANC won
  62.6% of the vote. Mandela was inaugurated on May 10, 1994, at the Union Buildings in Pretoria — the same complex where,
  46 years earlier, the apartheid state had been administered.

  '
significance: 'South Africa''s transition produced a model studied by every subsequent post-conflict society: the Truth and
  Reconciliation Commission. Between 1996 and 1998, the TRC heard testimony from 21,000 victims and granted amnesty to 1,500
  perpetrators who disclosed their crimes fully. Archbishop Desmond Tutu chaired it. The bargain — truth for amnesty, confession
  for freedom — was Tutu''s theological innovation: ubuntu, the idea that individual humanity is bound to collective humanity.
  Critics called it impunity with a conscience. Supporters called it the only alternative to civil war. The TRC model was
  subsequently adopted, in modified form, in Sierra Leone, Liberia, Canada, and Colombia.


  Apartheid''s economic legacy proved harder to legislate away than its political structures. In 1994, white South Africans
  (10% of the population) owned 87% of the land. By 2024, that figure had barely moved. The Gini coefficient — 0.63 in 2024
  — makes South Africa the most unequal country on earth by income distribution. The ANC''s Black Economic Empowerment program
  created a black elite but left structural poverty largely intact: unemployment among black South Africans exceeded 40% in
  2024, compared to 8% among white South Africans.

  '
