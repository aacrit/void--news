- viewpoint: International Sanctions Movement
  viewpoint_type: bystander
  region_origin: europe
  narrative: 'On March 21, 1960, the day of the Sharpeville massacre, South Africa held a seat on the UN Security Council.
    Within four years, it had been suspended from the General Assembly. The distance between those two facts measures the
    speed of South Africa''s international isolation — and the slowness of that isolation''s translation into actual economic
    pressure.


    The arms embargo came first. The UN Security Council passed a voluntary embargo in 1963 (Resolution 181) and made it mandatory
    in 1977 (Resolution 418) — the first mandatory sanctions against a member state in UN history. France, which had been
    South Africa''s primary arms supplier, complied on paper but continued selling submarines and helicopters through intermediaries
    until the mid-1980s. Israel, which maintained a close military relationship with Pretoria including alleged nuclear cooperation
    (the Vela Incident of 1979, a suspected joint nuclear test in the South Atlantic, remains officially unconfirmed), was
    never subject to sanctions itself.


    The sports boycott hit Afrikaner identity harder than any trade restriction. South Africa was expelled from the Olympic
    movement in 1970. The Gleneagles Agreement of 1977 committed Commonwealth nations to discouraging sporting contact. When
    the New Zealand All Blacks toured South Africa in 1981, 28 African nations boycotted the Montreal Olympics in protest.
    Rugby and cricket — the two sports that defined white South African manhood — became international pariahs. The psychological
    impact was immense: Afrikaners who could rationalize economic sanctions as foreign meddling could not rationalize being
    excluded from the rugby World Cup.


    The corporate divestment campaign began on American university campuses in the late 1970s. By 1988, 155 US companies had
    withdrawn from South Africa, including GM, IBM, Coca-Cola, and Kodak. The Sullivan Principles, drafted by Reverend Leon
    Sullivan in 1977, initially attempted to reform corporate behavior within South Africa; Sullivan himself abandoned them
    in 1987, declaring they had failed. State and city pension funds divested $20 billion in South African-linked stocks between
    1984 and 1990. Chase Manhattan''s August 1985 decision not to roll over $500 million in short-term loans triggered a cascade
    of bank withdrawals that forced South Africa to declare a debt standstill.


    The Reagan and Thatcher governments resisted sanctions throughout the 1980s. Reagan''s policy of "constructive engagement,"
    crafted by Chester Crocker, argued that engagement, not isolation, would reform apartheid. Thatcher called the ANC a "terrorist
    organization" and opposed sanctions at every Commonwealth summit. The US Congress overrode Reagan''s veto of the Comprehensive
    Anti-Apartheid Act in October 1986 — one of the few foreign policy veto overrides in American history. The vote was 313-83
    in the House and 78-21 in the Senate, with significant Republican support.

    '
  key_arguments:
  - Economic sanctions and divestment created financial pressure that made apartheid unsustainable
  - Sports boycotts struck at Afrikaner cultural identity more effectively than trade restrictions
  - Western governments — particularly Reagan and Thatcher — delayed effective sanctions by a decade
  - Corporate divestment demonstrated the power of civil society pressure on multinational capital
