- viewpoint: Truth and Reconciliation
  viewpoint_type: academic
  region_origin: africa
  narrative: 'The negotiators at Kempton Park faced a specific problem: the security forces would not accept a transition
    that ended in Nuremberg-style trials. The generals made this explicit. Without an amnesty provision, there would be no
    transition. But the ANC could not accept blanket amnesty — its constituency had suffered too much. The compromise, inserted
    into the postamble of the 1993 interim constitution, was a single sentence: "there is a need for understanding but not
    for vengeance, a need for reparation but not for retaliation, a need for ubuntu but not for victimization."


    The Truth and Reconciliation Commission, established by the Promotion of National Unity and Reconciliation Act of 1995,
    operationalized that sentence. Archbishop Desmond Tutu chaired it. The design was unprecedented: perpetrators who applied
    for amnesty and disclosed the full truth of their political crimes would be granted immunity from prosecution. Victims
    would testify publicly. The commission would produce a public record. The theory was that truth itself — the act of speaking
    and being heard — could substitute for punishment.


    Between April 1996 and July 1998, the TRC heard testimony from 21,298 victims and received 7,112 amnesty applications.
    The Human Rights Violations Committee held hearings in town halls, churches, and community centers across South Africa.
    Women testified about husbands who disappeared. Former security police described, in clinical detail, how they tortured
    detainees: electric shocks, suffocation with a wet bag, prolonged standing. Eugene de Kock, commander of the Vlakplaas
    death squad, applied for amnesty for 89 acts including murder; he was granted amnesty for some and convicted for others,
    receiving two life sentences.


    The commission''s limitations were structural. It could only consider "politically motivated" acts committed between March
    1, 1960 and May 10, 1994. This excluded the everyday violence of apartheid — the pass law arrests, the forced removals,
    the labor exploitation — which was legal under apartheid law and therefore not "criminal." It also excluded the beneficiaries:
    white South Africans who profited from cheap black labor, segregated education, and preferential employment were never
    called to account. The business community was largely absent from the hearings.


    Tutu''s theology of ubuntu — "I am because we are" — provided the philosophical framework. Retributive justice, he argued,
    was a Western import alien to African jurisprudence. In African tradition, the goal of justice was not to punish the offender
    but to restore the community. Critics, including the Azanian People''s Organisation (AZAPO) and the families of Steve
    Biko and the Cradock Four, challenged the TRC in court, arguing that amnesty without the consent of victims violated their
    constitutional rights. The Constitutional Court upheld the TRC in AZAPO v. President of South Africa (1996), ruling that
    the amnesty provision was constitutionally valid as a necessary compromise for peace.

    '
  key_arguments:
  - Truth-for-amnesty was a pragmatic bargain — without it, the security forces would not have permitted transition
  - Tutu''s ubuntu theology reframed justice as restoration rather than retribution
  - The TRC''s structural limitations excluded everyday apartheid violence and economic beneficiaries
  - The model''s exportability (Sierra Leone, Colombia, Canada) validated its principles but each adaptation revealed new
    limitations
  sources:
