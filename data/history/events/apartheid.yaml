  - title: 'Country of My Skull: Guilt, Sorrow, and the Limits of Forgiveness in the New South Africa'
    author: Antjie Krog
    year: '1998'
    type: book
    archive_url: https://archive.org/details/countryofmyskull00krog
  - title: Truth and Reconciliation Commission of South Africa Report (5 volumes)
    author: Truth and Reconciliation Commission
    year: '1998'
    type: archive
  notable_quotes:
  - text: Without forgiveness there is no future, but without confession there can be no forgiveness.
    speaker: Desmond Tutu
    context: Opening address to the Truth and Reconciliation Commission, 1996
  - text: A person with ubuntu is open and available to others, affirming of others, does not feel threatened that others
      are able and good.
    speaker: Desmond Tutu
    context: No Future Without Forgiveness, 1999
  emphasized:
  - TRC as a pragmatic compromise between impunity and impossible prosecution
  - Ubuntu theology as distinctly African contribution to transitional justice theory
  - Public testimony as a form of justice — being heard as reparation
  - The commission''s influence on subsequent transitional justice processes worldwide
  omitted:
  - Most victims received no material reparations — the government implemented only a fraction of TRC recommendations
  - Amnesty was experienced by many victims as a second injustice
  - The everyday structural violence of apartheid fell outside the TRC''s mandate
  - White economic privilege remained essentially untouched by the process
