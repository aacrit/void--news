- viewpoint: Afrikaner Nationalist
  viewpoint_type: vanquished
  region_origin: africa
  narrative: 'The Afrikaner narrative begins not in 1948 but in 1838 — at Blood River, where 470 Voortrekkers defeated an
    estimated 15,000-20,000 Zulu warriors without a single Boer fatality. The Day of the Vow, sworn before the battle, became
    the founding myth: God had chosen the Afrikaner people for this land. The Great Trek itself (1835-1846) was a flight from
    British imperialism — from the abolition of slavery in 1834, from anglicization of the Cape Colony''s courts and schools,
    from what Piet Retief''s manifesto called "the unjustifiable odium cast upon us by interested and dishonest persons."


    The Anglo-Boer Wars (1880-1881, 1899-1902) deepened the siege mentality. In the second war, the British burned 30,000
    Boer farms and interned 116,000 Afrikaner women and children in concentration camps; 27,927 died, most of them children
    under 16. Emily Hobhouse documented the conditions; the British government initially dismissed her reports. For Afrikaners,
    the concentration camps were their Holocaust — proof that the English-speaking world would destroy them if given the chance.


    The National Party''s 1948 victory was, in this telling, the final assertion of Afrikaner self-determination. Apartheid
    was framed not as oppression but as "separate development" — each racial group governing itself in its own territory,
    developing at its own pace. Verwoerd argued in Parliament that integration would mean the "suicide of the white race"
    in South Africa. The Bantustans were presented as the African equivalent of decolonization: just as Britain was granting
    independence to its African colonies, South Africa was granting independence to its African nations within its borders.


    The theological justification came from the Nederlandse Gereformeerde Kerk (Dutch Reformed Church), which taught that
    the Tower of Babel narrative in Genesis 11 demonstrated God''s will for the separation of peoples. The Broederbond, a
    secret Afrikaner fraternal organization with 12,000 members by the 1970s, placed its people in every lever of state power:
    the civil service, military, judiciary, universities, and media. Membership was a prerequisite for advancement. D.F. Malan,
    Verwoerd, Vorster, and Botha were all Broederbond members.


    De Klerk''s February 1990 speech was received by many Afrikaners as betrayal. The Conservative Party, which had split
    from the National Party in 1982 over the tricameral parliament, won more Afrikaner votes than the NP in 1989. Constand
    Viljoen formed the Afrikaner Volksfront and assembled a force of 50,000 armed men. Eugene Terre''Blanche''s Afrikaner
    Weerstandsbeweging (AWB) launched attacks in Bophuthatswana in March 1994. The far right collapsed only when Viljoen chose
    elections over insurrection, registering the Freedom Front at the last moment. The Afrikaner nation — 2.7 million people
    — went from ruling 40 million to minority status in a single election.

    '
  key_arguments:
  - Afrikaners were themselves victims of British imperialism — concentration camps killed 28,000 women and children
  - Separate development was framed as self-determination for all groups, not domination
  - The Dutch Reformed Church provided theological justification for racial separation
  - De Klerk''s negotiations were seen by many Afrikaners as capitulation, not statesmanship
