- viewpoint: Black Consciousness Movement
  viewpoint_type: revisionist
  region_origin: africa
  narrative: 'Steve Biko was 23 when he founded the South African Students'' Organisation (SASO) in 1968. His argument was
    not primarily with the apartheid state — that was, in a sense, the easy enemy. His argument was with white liberals and
    the multiracial organizations they dominated. The National Union of South African Students (NUSAS), nominally nonracial,
    was led by white students who set the agenda, defined the terms, and expected black members to be grateful for inclusion.
    Biko called this "integration on white terms" and rejected it.


    Black Consciousness held that the first step toward liberation was psychological. "The most potent weapon in the hands
    of the oppressor is the mind of the oppressed," Biko wrote. Centuries of colonialism and decades of apartheid had produced
    what Biko called a "colonized mentality" — black people who internalized their own inferiority, who measured themselves
    against white standards, who saw their own culture as backward. Before black people could fight the system, they had to
    recover themselves.


    The movement drew on Frantz Fanon (Black Skin, White Masks), Aimé Césaire (Négritude), and the American Black Power movement.
    Biko corresponded with Black Power activists and read Stokely Carmichael and Malcolm X. But Black Consciousness was not
    imported — it was rooted in South African conditions. The community programs SASO organized — health clinics, literacy
    projects, cooperatives — were explicitly designed to demonstrate that black communities could govern themselves without
    white intermediaries or state permission.


    The Soweto Uprising of June 16, 1976 was Black Consciousness in action. The students who marched were not ANC members
    — the ANC had been banned for 16 years and its leadership was either imprisoned or in exile. They were products of SASO''s
    campus organizing and the Black People''s Convention that Biko helped found in 1972. Their refusal to be taught in Afrikaans
    — the language of the oppressor — was a rejection not just of a policy but of a worldview. When police opened fire, the
    uprising spread to 160 communities across South Africa in the following months.


    Biko was banned — restricted to the King William''s Town magisterial district — in 1973. He was arrested on August 18,
    1977, at a roadblock near Grahamstown. During interrogation at the Walmer police station in Port Elizabeth, security police
    subjected him to what they later described as a "scuffle" — he sustained brain lesions and left-side paralysis. On September
    11, 1977, he was transported 1,200 kilometers to Pretoria in the back of a Land Rover, naked and manacled. He died the
    next day. He was 30 years old. The inquest magistrate ruled that nobody was responsible for his death. Minister of Justice
    Jimmy Kruger told the National Party congress that Biko''s death "leaves me cold."

    '
  key_arguments:
  - Liberation required psychological decolonization before political struggle could succeed
  - White liberals in multiracial organizations reproduced paternalism they claimed to oppose
  - The Soweto generation was shaped by Black Consciousness, not the exiled ANC
  - Biko''s murder exposed the apartheid state''s willingness to kill intellectuals, not just activists
