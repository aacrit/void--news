  emphasized:
  - Women's central role in organizing, fighting, and dying in every uprising
  - Sexual violence as a tool of political repression — virginity tests, mob assaults, weaponized rape
  - Tunisia as the sole country where women's rights advanced after the revolution
  - Child marriage rates among Syrian refugees as a measure of the revolution's cost for women
  omitted:
  - Conservative women who supported the Brotherhood or opposed the revolution on religious grounds
  - Women within the security forces and regime structures
  - The pre-revolutionary women's rights infrastructure that enabled post-revolutionary gains in Tunisia
  - Male allies who advocated for gender equality within the revolutionary movements
