death_toll: 'Tunisia: ~338 (December 2010-March 2011); Egypt: ~840 (January-February 2011); Libya: 25,000-50,000
  (2011 civil war); Syria: 500,000+ (2011-2026, ongoing); Bahrain: ~100 (2011-2014); Yemen: 150,000+
  (2014-2026, ongoing civil war)'
affected_population: 'Combined population of primary countries: Tunisia 10.7 million, Egypt 82 million,
  Libya 6.4 million, Syria 21 million, Bahrain 1.2 million, Yemen 24 million — approximately 145 million
  people lived under governments directly challenged by the uprisings'
duration: '2010-2012 primary phase; consequences ongoing in Syria, Yemen, and Libya through 2026'
summary: 'On December 17, 2010, in Sidi Bouzid, a town of 40,000 in central Tunisia, a 26-year-old fruit vendor
  named Mohamed Bouazizi pushed his cart to its usual spot outside the governor''s office. A municipal
  inspector named Faida Hamdi confiscated his cart and his electronic scale — his only assets, worth roughly
  $200. Witnesses said she slapped him. He went to the governor''s office to complain. They refused to
  see him. At 11:30 a.m., he stood in front of the building, doused himself with paint thinner, and struck
  a match. He was taken to a hospital in Sfax. He died on January 4, 2011. He was 26.


  Within hours of Bouazizi''s self-immolation, protests erupted in Sidi Bouzid. Within days, they spread
  to Kasserine, Thala, and Tunis. Zine El Abidine Ben Ali, who had ruled Tunisia for 23 years, deployed
  riot police and snipers. At least 338 people were killed. On January 14, 2011 — 28 days after Bouazizi
  lit the match — Ben Ali boarded a plane to Jeddah, Saudi Arabia. He never returned. He was the first
  Arab leader toppled by popular uprising since the Egyptian Free Officers deposed King Farouk in 1952.


  Egypt followed. On January 25, 2011, tens of thousands marched in Cairo, Alexandria, and Suez. By January
  28 — the "Day of Rage" — the police had been overrun and the army deployed. Tahrir Square became a
  continuous occupation: at its peak, 300,000 people filled the square and surrounding streets. Hosni
  Mubarak, who had ruled for 30 years, addressed the nation on February 10 and refused to resign. The
  crowd in Tahrir watched the speech on a giant screen and erupted in fury. The next day, February 11,
  Vice President Omar Suleiman appeared on state television for 30 seconds: "President Hosni Mubarak
  has decided to step down." Mubarak had ruled since October 14, 1981. He was 82 years old.


  Libya''s uprising began on February 15, 2011. Muammar Gaddafi, who had held power for 42 years, promised
  to hunt protesters "alley by alley, house by house." NATO intervened on March 19, launching 7,700 air
  strikes over seven months. On October 20, 2011, Gaddafi was dragged from a drainage pipe outside Sirte
  by rebel fighters, beaten, and shot. Three dictators had fallen in 281 days. Protests swept Bahrain,
  where Saudi Arabia sent 1,200 troops across the King Fahd Causeway on March 14, 2011, to crush a Shia-majority
  uprising. Yemen''s Ali Abdullah Saleh signed a transfer of power in November 2011 after 11 months of
  protests and defections; the country collapsed into civil war by 2014. Syria''s Bashar al-Assad refused
  to leave. By 2026, the Syrian civil war had killed over 500,000 people, displaced 6.6 million as refugees,
  and displaced 6.7 million more within Syria''s borders.


  The outcomes diverged absolutely. Tunisia held free elections in October 2011. Egypt held its first competitive
  presidential election in June 2012; Mohammed Morsi of the Muslim Brotherhood won with 51.7% of the
  vote. One year later, on July 3, 2013, General Abdel Fattah el-Sisi overthrew him in a military coup.
  Libya fractured into rival governments and militia rule. Syria became a proxy war. Yemen became a famine.
  Morocco and Jordan survived through limited constitutional reform. Of the six countries where rulers
  were challenged, one became a democracy.

  '
significance: 'The Arab Spring was simultaneously a democratic revolution, an Islamist opportunity, a geopolitical
  battlefield, and a humanitarian catastrophe — and the fact that it was all four at once is the reason
  its meaning remains contested. Tunisia adopted a new constitution in January 2014 that guaranteed gender
  equality, freedom of conscience, and an independent judiciary; the National Dialogue Quartet that brokered
  the transition won the Nobel Peace Prize in 2015. Egypt''s counter-revolution imprisoned 40,000 Muslim
  Brotherhood members and reinstated military rule under a constitution approved in a referendum with
  98.1% support. Syria produced the largest refugee crisis since World War II. ISIS, which declared its
  caliphate in June 2014, emerged from the chaos of the Syrian civil war and the wreckage of post-invasion
  Iraq. The same chant — "ash-sha''b yurid isqat an-nizam," the people want the fall of the regime — produced
  a democracy, a military dictatorship, three failed states, and a genocide. The divergence of outcomes,
  not any single outcome, is what the Arab Spring revealed about the relationship between popular uprising
  and political change.

  '
