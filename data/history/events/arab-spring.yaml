- viewpoint: Geopolitical / Realist
  viewpoint_type: revisionist
  region_origin: global
  narrative: 'On March 14, 2011, 1,200 Saudi troops and 500 UAE police crossed the King Fahd Causeway into
    Bahrain in armored vehicles. The Bahraini uprising — a Shia-majority population demanding political
    rights from a Sunni monarchy — had begun with a peaceful march to the Pearl Roundabout on February
    14. For Saudi Arabia, the calculus was not about Bahrain. It was about the Eastern Province, where
    the kingdom''s own Shia minority of 2-3 million lived on top of its largest oil fields. A successful
    Shia uprising 25 kilometers across a causeway was an unacceptable precedent.


    Marc Lynch, in The New Arab Wars (2016), argued that the people''s revolutions were absorbed into proxy
    conflicts within months. Qatar funded the Brotherhood through Al Jazeera and an estimated $3 billion
    in direct support to Egyptian affiliates during 2011-2013. Saudi Arabia deposited $5 billion in Egypt''s
    central bank within weeks of Sisi''s coup. The UAE provided another $3 billion. The revolution was
    fought with chants. The counter-revolution was fought with checkbooks.


    Libya was the first test of military intervention. NATO''s Operation Unified Protector, authorized
    by Resolution 1973, launched 7,700 air strikes over seven months. The mission experienced "mandate
    creep" — from civilian protection to regime change. Libya fractured into rival governments in Tripoli
    and Tobruk, with 1,700 armed groups operating by 2015. Russia and China cited Libya as the reason they
    would never again permit a humanitarian intervention to become regime change. Russia vetoed Syria resolutions
    17 times between 2011 and 2021.


    Syria became the central battlefield. Iran deployed Revolutionary Guard advisors and funded Hezbollah
    — 8,000 troops in Syria by 2013. Russia launched air strikes on September 30, 2015, attacking not ISIS
    but the moderate rebels threatening Assad. Turkey invaded northern Syria in August 2016 to prevent Kurdish
    autonomy along its border. The United States armed rebel groups through a CIA program (Timber Sycamore,
    2013-2017, ~$1 billion per year) while simultaneously arming the Kurdish SDF against ISIS. CIA-backed
    rebels and Pentagon-backed rebels fought each other.


    By 2015, the "Arab Spring" as a people''s movement was over. What remained were proxy wars, refugee
    crises, and the wreckage of states. Six million Syrians fled the country. One million crossed the
    Mediterranean to Europe in 2015, strengthening far-right parties across the continent — Alternative
    for Germany entered the Bundestag in 2017 with 12.6%, campaigning against Syrian refugee resettlement.
    The Arab Spring''s consequences did not stop at the region''s borders.

    '
  key_arguments:
  - Saudi Arabia's intervention in Bahrain (March 14, 2011) demonstrated that regional powers would use
      military force to prevent democratic contagion
  - NATO's Libya intervention (7,700 air strikes) morphed from civilian protection to regime change, poisoning
      the Security Council's willingness to act on Syria
  - Russia vetoed Syria resolutions 17 times; its September 2015 air campaign targeted rebels, not ISIS,
      and saved Assad
  - CIA-backed rebels and Pentagon-backed rebels fought each other in Syria — the proxy war's absurdity
      was its defining feature
