  - The Libya precedent as the reason Russia blocked action on Syria
  - The Syrian refugee crisis as a driver of European far-right politics
  - $130 billion in Saudi social spending and billions in post-coup Egyptian aid as the financial architecture
      of counter-revolution
  omitted:
  - The genuine popular grievances that drove the uprisings — this perspective reduces agency to great-power
      competition
  - The moral distinction between civilians protesting and states bombing them
  - The democratic aspirations of millions who were not pawns in a proxy game
  - Russia and Iran's direct complicity in atrocities against Syrian civilians
- viewpoint: Women's Experience / Feminist
  viewpoint_type: vanquished
  region_origin: middle-east
  narrative: 'On March 9, 2011, less than a month after Mubarak''s fall, the Egyptian military detained
    17 women from Tahrir Square and forced them to submit to "virginity tests" — invasive examinations
    conducted by a male military doctor in the presence of soldiers. Amnesty International documented the
    cases. General Abdel Fattah el-Sisi, then head of military intelligence, defended the practice on CNN:
    the tests were conducted, he said, to protect the military from accusations of rape. A 25-year-old
    protester named Samira Ibrahim sued the military. She won. The military doctor was acquitted on appeal.


    Women had been in the revolution from day one. Asmaa Mahfouz, 26, posted a video blog on January 18,
    2011: "I, a girl, am going down to Tahrir Square, and I will stand alone. And I will hold up a banner.
    Perhaps people will show some honor." The video went viral. In Yemen, Tawakkol Karman — 32, journalist,
    mother of three — had been organizing protests since 2007. She set up a permanent camp in Sanaa''s
    Change Square. When the government issued an arrest warrant, thousands surrounded her tent. In October
    2011, she became the first Arab woman to win the Nobel Peace Prize.


    Nawal El Saadawi, 80 years old, slept in a tent in Tahrir for three weeks. She had been imprisoned
    under Sadat, exiled under Mubarak, divorced at 27 for refusing to stop writing. "For the first time,"
    she said, "I feel that I am in a free country." She died in 2021, at 89, having lived long enough to
    see the revolution and its reversal.


    The outcomes for women diverged more sharply than for men. Tunisia guaranteed gender equality in its
    2014 constitution, required gender parity on electoral lists, criminalized domestic violence (2017),
    and equalized inheritance rights (2018). Women held 36% of Tunisian parliamentary seats in 2019 — higher
    than the EU average. In Egypt, the post-coup 2014 constitution contained fewer protections for women
    than Mubarak''s 1971 constitution. Human Rights Watch documented at least 186 cases of mob sexual assault
    in Tahrir Square between June 2012 and June 2014.


    In Libya, women who served as medics and organizers were pushed out of political life by militias. In
    Syria, women and children constituted 76% of refugees. Child marriage among Syrian refugees in Jordan
    rose from 12% in 2011 to 32% in 2014 (UNICEF). The revolution promised equality. It delivered it in
    one country.

    '
  key_arguments:
  - Women were central to every uprising — Asmaa Mahfouz's video helped launch January 25; Tawakkol Karman
      won the Nobel Prize; Nawal El Saadawi occupied Tahrir at 80
  - The Egyptian military's "virginity tests" (March 2011) weaponized sexual violence against female protesters
      within weeks of the revolution's success
  - Tunisia advanced women's rights further than any other Arab country — gender parity in parliament,
      criminalized domestic violence, equalized inheritance
  - In every other country, the post-revolutionary order had less space for women than the dictatorship
      it replaced
