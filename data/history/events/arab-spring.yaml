- viewpoint: Authoritarian Stability / Regime
  viewpoint_type: bystander
  region_origin: middle-east
  narrative: 'On October 20, 2011, the day Gaddafi was dragged from a drainage pipe and killed, Syria''s
    state news agency ran the footage on a loop. The message was clear without commentary. On February
    24, 2011, Assad told the Wall Street Journal: "Syria is stable. We have more difficult circumstances
    than most of the Arab countries but in spite of that, Syria is stable." Within five weeks, his security
    forces were firing on unarmed demonstrators in Daraa.


    The authoritarian stability argument had three components: order, identity, and the alternative. Order
    meant economic function — electricity, fuel, bread subsidies. The Egyptian state employed 5.6 million
    people in 2011, roughly 30% of formal employment. The army owned an estimated 25-40% of the economy.
    Identity meant the state as guarantor against sectarian fragmentation — Assad protecting Alawites,
    Christians, and Druze against a Sunni majority; Bahrain''s Al Khalifa preventing Iranian influence
    over a Shia-majority population. The alternative meant the observed results: Libya after Gaddafi, Iraq
    after Saddam.


    General Sisi''s July 3, 2013 coup was framed not as counter-revolution but as correction. The Tamarod
    campaign claimed 22 million signatures — more than Morsi''s 13 million votes — petitioning the military
    to remove him. The number was disputed. The grievances were real: fuel shortages, power cuts lasting
    8-12 hours daily, attacks on Coptic Christians. On July 3, Sisi appeared on television flanked by the
    Sheikh of Al-Azhar, the Coptic Pope, the head of the Salafi Nour Party, and Mohamed ElBaradei — a
    cross-section of Egyptian society endorsing the removal of its first elected president.


    The cost was immediate. On August 14, 2013, security forces cleared two Brotherhood sit-ins in Cairo.
    Human Rights Watch documented at least 817 killed at Rabaa al-Adawiya alone — "the worst single-day
    killing of protesters in modern history." The Brotherhood was designated a terrorist organization in
    December 2013. Morsi was imprisoned. He collapsed in a Cairo courtroom cage on June 17, 2019, and died.
    He had been held in solitary confinement for nearly six years.


    Jordan and Morocco survived through calibrated concession. Jordan''s King Abdullah II dismissed his
    prime minister in February 2011. Morocco''s King Mohammed VI announced a constitutional referendum
    in March, approved in July with 98% support. Saudi Arabia pre-empted protests with $130 billion in
    social spending: housing, unemployment benefits, salary increases, a new minimum wage. The monarchies
    that survived did so through co-optation, identity politics, and the visible catastrophe of revolution
    next door.

    '
  key_arguments:
  - The regime argument had three components — order, identity, and the observed alternative of state collapse
      in Libya and Syria
  - Egypt's military owned 25-40% of the economy; the state employed 5.6 million people — revolution threatened
      material survival, not just political power
  - The Rabaa massacre (August 14, 2013, at least 817 killed) was the cost of counter-revolution, paid
      in Brotherhood blood
  - Gulf monarchies survived through $130 billion in social spending (Saudi Arabia) and cross-border military
      intervention (Bahrain)
