perspectives:
- viewpoint: Revolutionary / Youth / Democratic
  viewpoint_type: revisionist
  region_origin: middle-east
  narrative: 'On June 6, 2010, six months before Bouazizi, two plainclothes officers from the Egyptian
    Interior Ministry dragged a 28-year-old man named Khaled Mohamed Said from an internet cafe in Alexandria.
    They beat him to death in a doorway across the street. His family photographed his face at the morgue:
    jaw broken, skull fractured, teeth knocked out. The Interior Ministry said he had choked on a bag of
    marijuana. On June 10, Wael Ghonim, a Google marketing executive based in Dubai, created a Facebook
    page titled "We Are All Khaled Said." Within three months, it had 500,000 followers. On January 25,
    2011, Ghonim posted the call to march. Between 50,000 and 80,000 people arrived at Tahrir Square.


    Asef Bayat, in Revolution without Revolutionaries (2017), called these "refolutions" — uprisings with
    revolutionary aspirations but reformist methods. No vanguard party, no ideology, no armed wing. The
    organizing infrastructure was the mosque, the football ultras, the Facebook page, and the labor union.
    In Tunisia, the General Labour Union (UGTT), with 500,000 members, called regional general strikes
    that paralyzed the country. The revolutionaries did not seize the state. They occupied public space
    and waited for the state to break.


    The 18 days in Tahrir became the democratic movement''s founding narrative. On January 28, the "Day
    of Rage," protesters overran police lines across Cairo. The police disappeared by evening. The army
    deployed but did not fire. On February 1, over a million people filled Tahrir. The square became a
    self-governing commune: field hospitals staffed by volunteer doctors, food distribution by neighborhood
    committees, a newspaper printed on the pavement. Ahmed Harara, a 31-year-old dentist, lost his right
    eye to a rubber bullet on January 28 and his left eye to birdshot on November 19 — both times while
    filming.


    The movement''s fatal weakness was its refusal to organize. The revolutionaries built a square, not
    a party. When Mubarak fell, they had no structure to contest elections or draft a constitution. The
    Brotherhood had 80 years of organization. The military had 60 years of institutional power. Egypt''s
    first free parliamentary elections (November 2011-January 2012) gave Islamist parties 73% of the seats.
    The revolutionaries who had filled Tahrir won almost nothing.


    The Tunisian exception proves the analysis. The UGTT brokered between Islamists and secularists during
    the 2013-2014 crisis. The National Dialogue Quartet negotiated a constitution adopted in January 2014.
    Where institutions existed to channel revolutionary energy, democracy survived. Where they did not,
    the revolution consumed itself.

    '
  key_arguments:
  - The uprisings had no vanguard party, no ideology, no leader — they were "refolutions" that combined
      revolutionary aspiration with reformist methods
  - The killing of Khaled Said in Alexandria (June 2010) and the Facebook page it spawned mobilized tens
      of thousands before the first march
  - Tahrir Square became a self-governing commune for 18 days — but the movement built a square, not a
      party
  - Tunisia's democracy survived because the UGTT and civil society provided institutional structure;
      Egypt's revolution failed because no comparable institutions existed
