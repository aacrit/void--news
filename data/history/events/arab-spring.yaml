  - Institutional and economic structures that made regime survival rational for millions
  - Gulf monarchies' pre-emptive spending as an alternative to both revolution and repression
  omitted:
  - The regimes' own role in creating the conditions — corruption, unemployment, police brutality — that
      caused the uprisings
  - The Rabaa massacre as state violence orders of magnitude beyond any protester violence
  - The self-fulfilling nature of the stability argument — Assad destroyed Syria to prove that without
      him, Syria would be destroyed
  - Political prisoners, torture, and enforced disappearance as tools of regime survival
- viewpoint: Islamist / Muslim Brotherhood
  viewpoint_type: victor
  region_origin: middle-east
  narrative: 'The Muslim Brotherhood was founded in Ismailia, Egypt, in 1928 by Hassan al-Banna, a 22-year-old
    schoolteacher. By 2011, it had 83 years of continuous existence, chapters in every Arab country, and
    the deepest grassroots network in the region — health clinics, schools, and charity networks that reached
    millions of Egyptians whom the state had abandoned. When Egypt held its first free parliamentary elections
    in November 2011, the Brotherhood''s Freedom and Justice Party won 37.5% of the vote. The Salafi Nour
    Party won another 27.8%. Islamist parties together held 73% of parliament.


    Shadi Hamid, in Islamic Exceptionalism (2016), argued that Islam and liberal democracy have a fundamentally
    different relationship than Christianity and liberal democracy. Christianity''s "render unto Caesar"
    tradition separated religious and political authority. Islam''s tradition — in which Muhammad governed
    Medina as both prophet and head of state — does not. This does not mean Islam is anti-democratic. It
    means democratization in Muslim-majority societies will produce governments that incorporate Islamic
    law in ways Western secular democrats find uncomfortable. The Brotherhood''s electoral success was the
    predictable result of 80 years of grassroots organization the secular opposition had not built.


    Mohammed Morsi won Egypt''s presidential runoff on June 24, 2012, with 51.7% — 13.23 million votes
    to Ahmed Shafik''s 12.35 million. His government lasted 368 days. Morsi''s errors were real: a constitutional
    declaration granting himself powers beyond judicial review, a constitution drafted after secular members
    walked out, unchecked fuel and electricity shortages. His supporters argued the deep state had sabotaged
    him from day one. The fuel shortages that plagued his presidency disappeared within 48 hours of Sisi''s
    coup.


    In Tunisia, Ennahda under Rachid Ghannouchi won 41.5% of Constituent Assembly seats in October 2011.
    Ghannouchi made a decision the Egyptian Brotherhood did not: he formed a coalition with secular parties,
    accepted a constitution without sharia as a source of legislation, and voluntarily stepped down in 2014.
    Ennahda survived. The Brotherhood was destroyed.


    The destruction was comprehensive. The Egyptian state designated the Brotherhood a terrorist organization
    in December 2013. Security forces arrested an estimated 40,000 members. Morsi was held in conditions
    the UN described as cruel, inhuman, and degrading treatment — denied adequate medical care for diabetes
    and liver disease. On June 17, 2019, he collapsed inside a soundproof glass cage during a court session,
    spoke for seven minutes requesting to address the judge, and fell. He was 67. For the Brotherhood,
    the lesson was unmistakable: winning elections does not mean winning power.

    '
  key_arguments:
  - The Brotherhood's electoral victories were the predictable result of 80 years of grassroots organization,
      not a hijacking of the revolution
  - Islam and liberal democracy have a different structural relationship than Christianity and liberal
      democracy — democratization in Muslim-majority societies produces Islamic governance
  - Morsi's government was undermined by the deep state; fuel shortages disappeared within 48 hours of
      the coup
  - The 2013 coup taught Islamists that winning elections does not mean winning power — the lesson has
      not been forgotten
