legacy_points:
- Tunisia became the only Arab Spring country to transition to democracy — its 2014 constitution guaranteed
    gender equality, freedom of conscience, and judicial independence
- Egypt's first free presidential election (June 2012) was followed by its military coup (July 2013) —
    the counter-revolution proved faster than the revolution
- Syria's civil war killed over 500,000 people and displaced 13.3 million — the largest refugee crisis
    since World War II
- Libya collapsed into rival governments and militia rule after Gaddafi's death — the state itself disintegrated
- ISIS declared its caliphate in June 2014 from territory seized in the chaos of the Syrian civil war
    and post-invasion Iraq
- Bouazizi's confiscated fruit cart — worth roughly $200 — became the symbol of an uprising across 17
    countries
