- Raphael Lemkin coined 'genocide' in 1944 partly from the Armenian case — the word did not exist before him
- Turkey has maintained denial for over a century; 34 countries have formally recognized the genocide as of 2024
- Operation Nemesis (1920-1922) — Armenian operatives assassinated the three architects in Berlin, Tbilisi, and Rome
