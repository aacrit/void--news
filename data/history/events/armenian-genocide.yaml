- viewpoint: Armenian Survivor and Diaspora
  viewpoint_type: vanquished
  region_origin: middle-east
  narrative: 'Aurora Mardiganian was 14 years old when Ottoman gendarmes came to her family''s home in Chmshkatsag (Chemeshgadzak)
    in 1915. She watched her father and brother killed. She was marched south with her mother and sisters in a deportation
    convoy; her mother died on the road. Aurora was sold twice, abducted into a harem, escaped, and eventually reached Tiflis
    (Tbilisi) disguised as a Kurdish boy. Her memoir, Ravished Armenia, was published in 1918 and adapted into a film in 1919,
    in which Mardiganian played herself — recreating scenes of crucifixion, starvation, and abduction for an American audience.
    She was 18 years old during filming.


    Survivor testimony, collected by the Armenian diaspora''s oral history projects and by institutions such as the Zoryan
    Institute, the Armenian Genocide Museum-Institute in Yerevan, and the USC Shoah Foundation''s Visual History Archive,
    describes a systematic process. The deportation caravans from Erzurum, Trebizond, Sivas, Harput, and Diyarbekir followed
    routes through the Taurus Mountains, across the Euphrates, and into the Syrian desert. Survivors describe gendarmes stripping
    women of jewelry and clothing at successive checkpoints, Kurdish irregulars attacking the columns at night, and bodies
    accumulating along the roadside in numbers that made passage difficult. Grigoris Balakian, an Armenian clergyman who survived
    the initial April 24 arrests, published Armenian Golgotha (1922), a 500-page account of the deportation routes in which
    he documented the killing mechanisms at each stage: drowning in the Euphrates at Kemakh gorge, mass shootings at ravines
    near Firincilar, death by exposure and starvation in the desert camps at Ras al-Ayn and Deir ez-Zor.


    The experience of women occupies a distinct register in survivor accounts. Estimates of the number of Armenian women and
    girls abducted into Muslim households range from 100,000 to 200,000. Abduction meant forced conversion to Islam, forced
    marriage, and the erasure of Armenian identity — children born to these women were raised as Turks or Kurds. Some women
    chose suicide over abduction; multiple survivor accounts describe groups of women joining hands and walking into the Euphrates.
    Others describe mothers killing their own children rather than allow them to be taken. These accounts were collected by
    Aram Andonian and published in Paris in the 1920s, and again by Yervant Odian (Accursed Years, 1919) and Zabel Yesayan
    (In the Ruins, 1911 — written after the Adana massacre).


    The aftermath split the Armenian nation into a homeland (Soviet Armenia, population under 1 million in 1920) and a diaspora
    that eventually exceeded it. Armenian communities in Beirut, Aleppo, Marseille, Buenos Aires, Los Angeles, and Boston
    maintained language, church, and the memory of specific villages. The Armenian Revolutionary Federation (Dashnaktsutyun)
    launched Operation Nemesis in 1920 — a covert campaign that assassinated the three principal architects of the genocide:
    Talat Pasha (Berlin, March 15, 1921), Said Halim Pasha (Rome, December 5, 1921), and Cemal Pasha (Tbilisi, July 25, 1922).
    Soghomon Tehlirian, who killed Talat, was tried in a Berlin court and acquitted after two days of testimony about the
    massacres — the trial transcripts became a primary source for Lemkin.


    Recognition has defined diaspora politics for a century. The annual April 24 commemorations, the lobbying campaigns in
    Washington and Paris and Canberra, the fight for the word "genocide" to appear in official documents — these are not abstract
    exercises. For the diaspora, recognition is inseparable from identity: the refusal to say the word is experienced as a
    continuation of the act.

    '
  key_arguments:
  - The genocide was planned, systematic, and executed through state bureaucracy — not spontaneous wartime violence
  - The deportation routes were designed to kill through exhaustion, exposure, and organized massacre at designated points
  - 100,000-200,000 women and girls were abducted into Muslim households — a form of cultural destruction
  - Operation Nemesis carried out justice that the international system failed to deliver
  - Denial is experienced by survivors and their descendants as a continuation of the genocide
  - The Tehlirian trial in Berlin (1921) put the genocide on record in a European court before Nuremberg existed
