    speaker: Taner Akcam
    context: A Shameful Act, 2006
  - text: My grandmother's real name was not Seher. It was Heranus.
    speaker: Fethiye Cetin
    context: My Grandmother (Anneannem), 2004 — revealing her grandmother was an Armenian survivor hidden in a Turkish family
  emphasized:
  - The genocide gave Lemkin the case that produced the word and the Convention
  - Ottoman-era archives and court-martial records as primary evidence base
  - Denial as a studied phenomenon — the final stage of genocide
  - Hidden Armenians as living evidence of gendered destruction
  omitted:
  - The lived experience of the deportation marches in favor of legal and theoretical frameworks
  - The specific role of Kurdish tribes as perpetrators and rescuers
  - The geopolitics of the Caucasus front and Russia's role
  - The diaspora's internal political divisions (Dashnak, Hunchak, Ramgavar)
