- viewpoint: International Witness / Humanitarian
  viewpoint_type: bystander
  region_origin: europe
  narrative: 'On July 16, 1915, Henry Morgenthau Sr., the American ambassador in Constantinople, sent a cable to the State Department: "Deportation of and excesses against peaceful Armenians is increasing
    and from harrowing reports of eye witnesses it appears that a campaign of race extermination is in progress under a pretext of reprisal against rebellion." The cable reached Washington. The United States,
    not yet at war with the Ottoman Empire (it never declared war on Constantinople), did not intervene.


    Morgenthau''s position gave him direct access to the CUP leadership. He met repeatedly with Talat Pasha and Enver Pasha throughout 1915, recording their conversations in his diary and later in his memoir
    Ambassador Morgenthau''s Story (1918). In one exchange, Talat told Morgenthau that the Armenians had enriched themselves at Turkish expense, that they had sided with Russia, and that the government
    intended to solve the Armenian question permanently. When Morgenthau raised the matter of Armenian life insurance policies held by American companies, Talat asked whether the ambassador could obtain
    the names and policy amounts of the deceased Armenians — so the Ottoman government could collect the proceeds. Morgenthau described the request as "perhaps the most astonishing thing I have ever heard."


    The German Empire, the Ottomans'' wartime ally, had its own witnesses. Johannes Lepsius, a German Protestant pastor and Near East scholar, collected consular reports, missionary dispatches, and eyewitness
    accounts into a dossier that he published in 1919 as Deutschland und Armenien. German consuls in Aleppo, Mosul, and other Ottoman cities reported the deportations in detail to Berlin. Max Erwin von
    Scheubner-Richter, the German vice-consul in Erzurum, filed dispatches describing the deportation of the entire Armenian population of the province — columns of women and children marching south under
    armed guard, systematic killings at ravines, and the sale of women. The German government, unwilling to alienate its Ottoman ally during the war, suppressed the reports. Lepsius''s archive, preserved
    at the Lepsius Haus in Potsdam, contains over 3,000 documents.


    The humanitarian response was organized primarily through the American Committee for Armenian and Syrian Relief, later renamed Near East Relief (NER). Between 1915 and 1930, NER raised over $116 million
    (approximately $2 billion in current value) from American donors — the largest international humanitarian campaign to that date. NER operated orphanages across the Caucasus, Syria, and Greece that housed
    an estimated 132,000 Armenian orphans. The organization''s reports, photographs, and film footage constitute one of the largest visual archives of the genocide. NER volunteer accounts describe children
    arriving at orphanages with tattoos on their hands or faces — marks applied by captors who had used them as servants.


    The Treaty of Sevres (1920), signed between the Allied Powers and the Ottoman government, included provisions for an independent Armenia in eastern Anatolia and explicitly referenced the "massacres."
    U.S. President Woodrow Wilson was asked to arbitrate the boundary. But the treaty was never ratified: Mustafa Kemal''s nationalist forces defeated the Armenian Republic''s army, captured Kars and Alexandropol,
    and imposed the Treaty of Alexandropol (December 1920). The subsequent Treaty of Lausanne (1923), which recognized the Republic of Turkey, contained no mention of Armenians, Armenia, or massacres. The
    international community''s witness — documented, published, and filed — produced no consequence.

    '
  key_arguments:
  - Morgenthau's cables and diary provide contemporaneous diplomatic documentation of the genocide's intent
  - German consular reports confirm the scale and systematic nature — Berlin suppressed them to protect the alliance
  - Near East Relief raised $116 million and housed 132,000 orphans — the largest humanitarian campaign of its era
  - The Treaty of Sevres promised accountability; the Treaty of Lausanne erased it
