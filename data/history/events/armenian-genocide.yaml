connections:
- target_slug: rwandan-genocide
  connection_type: parallel
  description: Both genocides were state-organized, used identity classification systems to sort victims, were preceded by
    dehumanizing media campaigns, and occurred while the international community documented the killing but declined to intervene
- target_slug: scramble-for-africa
  connection_type: parallel
  description: The CUP's destruction of the Armenian population paralleled European colonial violence — mass displacement,
    demographic engineering, and the exploitation of wartime conditions to reshape populations along ethnic lines
- target_slug: hiroshima-nagasaki
  connection_type: influenced
  description: Hitler's invocation of Armenian impunity — 'Who, after all, speaks today of the annihilation of the Armenians?'
    — connected 1915 to the escalation of state violence that culminated in World War II and the atomic bombings
