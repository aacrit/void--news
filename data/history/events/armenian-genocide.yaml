summary: 'On the night of April 24, 1915, Ottoman authorities in Constantinople arrested 235 Armenian intellectuals, clergy,
  physicians, editors, lawyers, and community leaders. By the end of May, the number detained reached 600. Most were deported
  to Chankiri and Ayash in central Anatolia. Almost none survived. The date — April 24 — is commemorated annually by Armenians
  worldwide as Genocide Remembrance Day.


  The arrests were the visible edge of a plan already in motion. On February 25, 1915, War Minister Enver Pasha had ordered
  the disarming of all Armenian soldiers in the Ottoman military. Approximately 100,000-200,000 Armenian conscripts were transferred
  from combat units to labor battalions — amele taburu — where they built roads, carried supplies, and dug trenches. By spring
  1915, these battalions were being marched into gorges and ravines in groups of 50 to 100 and shot. Their weapons had already
  been confiscated. The labor battalion system converted the Armenian male population from potential resisters into disarmed,
  isolated targets.


  The Tehcir Law (Deportation Law), passed on May 27, 1915, authorized the military to relocate populations deemed a security
  threat. In practice, it provided legal cover for the forced march of Armenian women, children, and elderly from their homes
  in eastern Anatolia into the Syrian desert. The deportation routes — through Ras al-Ayn, Deir ez-Zor, and along the Euphrates
  — were designed to kill through exhaustion, starvation, exposure, and violence. Gendarmes and Kurdish irregular cavalry
  escorted the columns; at designated points, deportees were stripped of remaining possessions, separated by sex, and attacked.
  Tens of thousands of women and girls were abducted into Muslim households, forcibly married, or sold. Jesse B. Jackson,
  the American consul in Aleppo, reported to Ambassador Henry Morgenthau that convoys of thousands arrived at relay points
  in the desert reduced to dozens.


  At Deir ez-Zor, the terminus of the deportation routes, concentration camps held surviving deportees in open desert without
  food, water, or shelter. In 1916, provincial governor Zeki Bey was replaced by a new administrator tasked with liquidating
  the camps. By August 1916, the camps at Deir ez-Zor, Ras al-Ayn, and Meskene had been emptied through mass shootings and
  immolation. The Euphrates carried bodies downstream for months; witnesses along the river counted them.


  Henry Morgenthau Sr., the U.S. Ambassador to the Ottoman Empire from 1913 to 1916, confronted Interior Minister Talat Pasha
  directly in multiple meetings in 1915. Morgenthau recorded Talat''s responses in his memoir: Talat told him the deportations
  were justified because Armenians had sided with Russia, that the Ottoman government had the right to deal with its own subjects,
  and — in a remark Morgenthau found chilling — asked whether the American life insurance companies could provide the names
  and policy values of deceased Armenian policyholders, so that the government could collect the payments.

  '
significance: 'Raphael Lemkin, the Polish-Jewish jurist who coined the word "genocide" in 1944, drew directly on the Armenian
  case as one of his two foundational examples (the other was the Holocaust). The Turkish Republic, established in 1923 by
  Mustafa Kemal Ataturk, has maintained a policy of denial for over a century, rejecting the term "genocide" and characterizing
  the events as wartime casualties and intercommunal violence. As of 2024, 34 countries have formally recognized the Armenian
  Genocide; Turkey recalls its ambassador each time a new country does. The United States recognized the genocide on April
  24, 2021, under President Biden — 106 years after the events. The question of Armenian property confiscated during the deportations
  remains unresolved; scholars estimate the transferred wealth at $3.7-6.5 billion in current values. The Armenian diaspora
  — approximately 7 million people across Russia, the United States, France, Lebanon, and Argentina — exceeds the population
  of the Republic of Armenia (2.8 million).

  '
