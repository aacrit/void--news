perspectives:
- viewpoint: Ottoman Government / Committee of Union and Progress
  viewpoint_type: victor
  region_origin: middle-east
  narrative: 'The Committee of Union and Progress (CUP) — the Young Turk triumvirate of Talat Pasha, Enver Pasha, and Cemal
    Pasha — governed the Ottoman Empire during World War I as it fought on three fronts: against Russia in the Caucasus, against
    Britain at Gallipoli and in Mesopotamia, and against internal fragmentation along ethnic lines. The Armenian population
    of eastern Anatolia, concentrated in six provinces bordering the Russian Empire, became the focal point of military security
    calculations after Enver''s catastrophic defeat at Sarikamish in January 1915, where the Ottoman Third Army lost 60,000-90,000
    troops to a Russian force supported, in CUP intelligence assessments, by Armenian volunteer units.


    The Ottoman state framed the deportations as a wartime security measure — tehcir, or forced relocation — aimed at removing
    a potentially disloyal population from the war zone. Interior Minister Talat Pasha issued directives through provincial
    governors (valis) and the Special Organization (Teskilat-i Mahsusa), a covert paramilitary body that recruited convicted
    criminals released from prisons to escort deportation convoys. The Tehcir Law of May 27, 1915, authorized the military
    to relocate "individuals and groups" whose presence was deemed a threat. In official correspondence, Talat referred to
    the Armenian relocations as temporary and as a response to insurrection in Van, where Armenian civilians and Russian-backed
    irregulars had seized the city in April 1915.


    The Turkish Republic''s position, maintained since the 1920s, is rooted in this wartime-security framing. In this account,
    Armenians died from the same causes as Turks and other Ottoman subjects during a total war: famine, disease, banditry,
    and intercommunal violence. Turkish historians — including Yusuf Halacoglu, former director of the Turkish Historical
    Society — place Armenian deaths at 300,000-600,000 and Ottoman Muslim civilian deaths at comparable or higher numbers.
    The argument holds that the deportations, while producing mass death, were not centrally ordered extermination but a botched
    wartime relocation compounded by provincial incompetence, Kurdish tribal violence, and the collapse of Ottoman logistics
    infrastructure.


    The CUP''s own internal documents, however, complicate this narrative. Telegrams attributed to Talat — the Andonian documents,
    published in 1920 by Aram Andonian, an Armenian journalist and survivor — contain explicit orders for extermination. Turkey
    has disputed these telegrams'' authenticity since their publication, and the originals have never been independently authenticated.
    Historian Taner Akcam, working from Ottoman court-martial records of 1919-1920 (when the postwar Ottoman government tried
    CUP leaders in absentia), argues the telegrams are consistent with other archival evidence. The court-martial verdicts
    themselves sentenced Talat, Enver, and Cemal to death — sentences carried out not by the Ottoman state but by Armenian
    assassins in Operation Nemesis.


    The distinction between "genocide" and "wartime tragedy" remains the axis of Turkey''s diplomatic posture. Turkey has
    recalled ambassadors, suspended military agreements, and threatened economic retaliation against countries that use the
    word "genocide." In 2019, when the U.S. House of Representatives passed a recognition resolution, Turkey described it
    as "a meaningless political step" and reaffirmed that the events "cannot be characterized as genocide."

    '
  key_arguments:
  - Armenian deportations were a wartime security response to insurrection and Russian collaboration
  - Armenian deaths resulted from the same wartime conditions — famine, disease, banditry — that killed Muslims in comparable
    numbers
  - The Andonian telegrams have never been independently authenticated
  - The term 'genocide' is a political weapon aimed at Turkey, not a historical classification
  - The 1919-1920 court-martial verdicts were rendered under Allied occupation and duress
