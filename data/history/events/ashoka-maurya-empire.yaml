- viewpoint: Kalingan / Conquered Peoples
  viewpoint_type: vanquished
  region_origin: south-asia
  narrative: 'No Kalingan text survives from the period of the conquest. No rock edict records what the people of Kalinga
    thought when Ashoka''s army arrived, or what the 150,000 deportees experienced, or how the families of the 100,000 dead
    mourned. The silence is itself evidence: the conqueror carved his version into stone; the conquered had no stone, or their
    stones were not preserved.


    What survives is Ashoka''s own description of what he did to Kalinga — and it is damning even in his self-serving account.
    Rock Edict XIII does not describe a battle between armies. It describes the destruction of a civilian population: "brahmins,
    ascetics, and householders" were among those killed and deported. The edict acknowledges that the suffering extended to
    "those who are well cared for in the conquered country — the friends, acquaintances, companions, and relatives" of the
    dead. The king recognized that his war killed non-combatants, disrupted families, and devastated communities. Then he
    erected edicts celebrating his own moral growth.


    Later Odishan traditions preserved fragments of a Kalingan identity that predated and survived Maurya rule. The Hatigumpha
    inscription of King Kharavela of Kalinga (c. 1st century BCE), carved in a cave at Udayagiri near Bhubaneswar, records
    Kharavela''s military campaigns and his restoration of Kalingan independence. Kharavela claims to have recovered a Jina
    image taken by a Nanda king — a direct assertion of cultural continuity despite foreign conquest. The inscription makes
    no mention of Ashoka, but its tone is defiant: Kalinga remembers itself as a kingdom with its own history, not as a chapter
    in someone else''s conversion story.


    The Kalingan perspective reframes Rock Edict XIII. The edict is typically read as evidence of Ashoka''s moral evolution.
    Read from the Kalingan side, it is a conqueror memorializing his own guilt while the dead remain unnamed. Ashoka expresses
    remorse for the "slaughter, death, and carrying away captive of the people" — but the edict does not restore the deported,
    compensate the bereaved, or return autonomy to Kalinga. The conquered territory remained part of the Maurya Empire. The
    dharma-mahamattas appointed to administer Kalinga were imperial officials, not local representatives. Ashoka''s Separate
    Kalinga Edicts — inscribed specifically for the conquered territory — instruct officials to govern with "impartiality
    and no unnecessary harassment," but they also remind Kalingan subjects that "the king, despite his repentance, has the
    power to punish them."


    Modern Odishan historians, including Kailash Chandra Dash and Kishor Kumar Basa, have argued that the Kalingan experience
    of the Maurya conquest has been systematically subordinated to the Ashokan conversion narrative. The 100,000 dead and
    150,000 deported are cited as the trigger for Ashoka''s transformation — their suffering matters only insofar as it produced
    a better king. The Kalingan perspective inverts this: the conquest was a catastrophe in its own right, not a prelude to
    someone else''s enlightenment.


    Kalinga''s population in the 3rd century BCE is estimated at 1.5 to 2 million. If 100,000 were killed and 150,000 deported,
    roughly one in eight people were directly removed — by death or displacement — from the kingdom. The demographic, economic,
    and cultural disruption of losing 12-15% of a population in a single campaign would have shaped Kalinga for generations.
    The edicts do not record this recovery, because the edicts were not written by Kalingans.

    '
  key_arguments:
  - No Kalingan voice survives from the conquest period — the silence is itself a form of erasure
  - Rock Edict XIII describes civilian massacres, not a military engagement between armies
  - Ashoka's remorse did not restore Kalingan autonomy, compensate victims, or return the deported
  - The conquest killed or displaced 12-15% of Kalinga's estimated population
