- viewpoint: Ambedkarite / Anti-Caste Revisionist
  viewpoint_type: revisionist
  region_origin: south-asia
  narrative: 'On October 14, 1956, in Nagpur, B.R. Ambedkar — the chief architect of India''s constitution and the leader
    of India''s Dalit (formerly "untouchable") movement — publicly converted to Buddhism along with approximately 600,000
    followers. He had announced his intention to leave Hinduism 20 years earlier, in 1935, at a conference in Yeola: "I was
    born a Hindu, but I will not die a Hindu." When he chose Buddhism as his destination, Ashoka was his primary historical
    referent.


    Ambedkar''s reading of Ashoka was neither devotional nor antiquarian. It was political. In The Buddha and His Dhamma (1957),
    published posthumously, Ambedkar argued that the Buddha''s original teaching was a social revolution — a rejection of
    the brahmanical varna system that assigned human worth by birth. Ashoka, in this reading, was the ruler who implemented
    that revolution at the scale of a state. The dharma-mahamattas were not morality police but agents of social leveling.
    The ban on animal sacrifice struck at brahmanical ritual authority. The edict commanding respect for all sects undermined
    the brahmins'' claim to monopolize religious truth. Ashoka did not merely adopt Buddhism; he deployed it against the caste
    hierarchy.


    The Ambedkarite perspective locates Ashoka within a counter-history of India — a tradition of anti-caste resistance that
    runs from the Buddha through Ashoka through the medieval Bhakti saints (Kabir, Ravidas, Basavanna) to Jyotirao Phule in
    the 19th century and Ambedkar in the 20th. In this reading, India''s dominant Hindu tradition is not a continuous civilization
    but a brahmanical restoration that systematically erased its Buddhist past. The decline of Buddhism in India after the
    Maurya period is attributed not to natural evolution but to brahmanical counter-revolution: the revival of Vedic rituals,
    the destruction of monasteries, the absorption of the Buddha into the Hindu pantheon as an avatar of Vishnu (thereby neutralizing
    his radical social message).


    Ambedkar''s choice of Ashoka was also a claim on the Indian state. The Republic of India''s national emblem — the Sarnath
    lion capital — is Ashoka''s creation. The dharmachakra on the flag is Ashoka''s symbol. By converting to Buddhism and
    invoking Ashoka, Ambedkar argued that the "original" Indian political tradition was Buddhist and egalitarian, not Hindu
    and hierarchical. The Dalit Buddhist movement that followed — known as Navayana Buddhism — now counts an estimated 8 million
    adherents in India, concentrated in Maharashtra. Ambedkar''s statue stands in virtually every Dalit community; in many,
    it faces an image of Ashoka.


    The revisionist reading takes the Kalingan conquest seriously as state violence — Ambedkar did not romanticize war — but
    argues that Ashoka''s post-Kalinga turn toward dhamma represented a genuine attempt to build a non-caste, non-violent
    political order. The failure was not Ashoka''s but his successors'': the Maurya Empire collapsed within 50 years of Ashoka''s
    death, and the Shunga dynasty that replaced it (c. 185 BCE) persecuted Buddhist monks, destroyed stupas, and restored
    brahmanical Vedic sacrifices. Pushyamitra Shunga, the dynasty''s founder, allegedly offered a reward for every Buddhist
    head. In the Ambedkarite reading, what happened after Ashoka is evidence that his dharma revolution threatened the caste
    order enough to provoke a violent backlash — which is precisely why it mattered.


    Gail Omvedt (Buddhism in India, 2003) and Kancha Ilaiah (Why I Am Not a Hindu, 1996) extend this argument: the conventional
    periodization of Indian history — which treats the Maurya period as one dynasty among many — obscures the radical character
    of Ashokan governance. Ashoka built the only large-scale polity in pre-modern Indian history that explicitly rejected
    caste hierarchy, and he did it in the aftermath of mass violence. The question is whether remorse can produce justice
    — and whether the answer depends on whose history you read.

    '
  key_arguments:
  - Ashoka's dhamma was a political program against caste hierarchy, not merely personal spiritual growth
  - The decline of Buddhism in India resulted from brahmanical counter-revolution, not natural evolution
  - Ambedkar's 1956 conversion of 600,000 Dalits invoked Ashoka as proof of an egalitarian Indian tradition
  - India's national symbols (Sarnath lions, dharmachakra) are Buddhist — the state's own iconography contradicts Hindu-nationalist
    narratives
