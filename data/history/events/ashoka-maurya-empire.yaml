  - India's own national symbols as evidence of a suppressed Buddhist political tradition
  omitted:
  - Ashoka's own possible role in maintaining social hierarchies within his empire
  - The complexity of post-Maurya religious change (not reducible to brahmanical persecution)
  - Ambedkar's selective reading of Buddhist texts to construct Navayana Buddhism
  - The continued existence of caste within Buddhist communities in India
