legacy_points:
- Rock Edict XIII is the first known instance of a ruler publicly expressing remorse for military conquest
- Ashoka's Sarnath lion capital is the national emblem of India; his dharmachakra is on the Indian flag
- Buddhist missions to Sri Lanka established Theravada Buddhism there permanently
- Ambedkar's 1956 mass conversion of 600,000 Dalits to Buddhism invoked Ashoka's example as liberation from caste
- The Arthashastra, recovered only in 1905, revealed a Maurya state apparatus of espionage and realpolitik behind the dharma
