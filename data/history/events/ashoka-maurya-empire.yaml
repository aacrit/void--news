- media_type: photograph
  title: Sarnath Lion Capital — National Emblem of India
  description: The four-lion capital originally placed atop the Ashoka Pillar at Sarnath, Uttar Pradesh, c. 250 BCE. Carved
    from a single block of polished Chunar sandstone, the capital features four Asiatic lions standing back to back, mounted
    on an abacus bearing an elephant, a horse, a bull, and a lion separated by 24-spoked dharmachakra wheels. Adopted as the
    national emblem of the Republic of India on January 26, 1950.
  source_url: https://commons.wikimedia.org/wiki/File:Sarnath_Lion_Capital_of_Ashoka.jpg
  attribution: Archaeological Museum, Sarnath, public domain
  license: public-domain
  creator: Unknown (3rd century BCE)
  creation_date: c. 250 BCE
- media_type: photograph
  title: Rock Edict XIII at Girnar, Gujarat
  description: Rock Edict XIII at Girnar — the edict in which Ashoka describes the Kalinga conquest, counts the dead (100,000
    killed, 150,000 deported), and expresses remorse. Inscribed in Brahmi script on a boulder face. Girnar carries the most
    complete set of Ashoka's 14 major rock edicts.
  source_url: https://commons.wikimedia.org/wiki/File:Girnar_Asokan_inscription.jpg
  attribution: Wikimedia Commons, public domain
  license: public-domain
