summary: 'In 261 BCE, Ashoka Maurya''s army rolled through Kalinga — a kingdom on India''s eastern coast, roughly modern Odisha
  — and killed 100,000 people. Another 150,000 were deported. These are not external estimates. Ashoka carved the numbers
  himself onto Rock Edict XIII, a massive stone inscription erected across his empire: "A hundred and fifty thousand people
  were deported, a hundred thousand were killed, and many times that number perished."


  Then the edict continues with something no other ancient ruler committed to stone: "His Sacred Majesty felt remorse for
  having conquered the Kalingas, because the conquest of a country previously unconquered involves the slaughter, death, and
  carrying away captive of the people." The king who had just executed the largest military campaign of the Maurya dynasty
  announced, on public rock faces across the subcontinent, that he regretted it. He declared his adoption of dhamma — a moral
  law based on non-violence, tolerance, and welfare — and pledged to rule by persuasion rather than force.


  The Maurya Empire that Ashoka inherited from his grandfather Chandragupta was the largest political entity the Indian subcontinent
  had ever seen. Stretching from Afghanistan to Bengal, from the Himalayas to the Deccan, it governed roughly 50 million people.
  Chandragupta had built it through military conquest guided by Kautilya (also called Chanakya), whose treatise the Arthashastra
  laid out a theory of statecraft based on espionage, assassination, and calculated ruthlessness. Ashoka inherited this machinery
  of power — and then, after Kalinga, repurposed it. He appointed dharma-mahamattas (morality officers) across the empire,
  dispatched Buddhist missions to Sri Lanka, Central Asia, and the Hellenistic Mediterranean, and erected pillars and rock
  edicts in Prakrit, Greek, and Aramaic. The Sarnath lion capital he placed atop one such pillar became, 2,200 years later,
  the national emblem of the Republic of India. The 24-spoked dharmachakra from that capital sits at the center of India''s
  flag.

  '
significance: 'Ashoka''s edicts are the oldest surviving written records of an Indian ruler, and the first known instance
  of a head of state publicly expressing guilt for military conquest. His Buddhist missions to Sri Lanka established Theravada
  Buddhism on the island, where it remains the majority religion in the 2020s. Missions sent west reached the courts of Ptolemy
  II in Egypt and Antigonus II in Macedonia — the earliest documented contact between Indian and Mediterranean civilizations.
  The Maurya administrative system, including standardized weights, road networks, and provincial governors, created infrastructure
  that successor states relied on for centuries. When B.R. Ambedkar — the architect of India''s constitution and leader of
  the Dalit movement — converted to Buddhism in 1956, he cited Ashoka as proof that Buddhism offered an escape from the caste
  hierarchy that Hinduism enforced. He led 600,000 followers in mass conversion at Nagpur on October 14, 1956, calling it
  a return to Ashoka''s egalitarian dharma. India''s national symbols — the Sarnath lions, the dharmachakra, the motto "Satyameva
  Jayate" (Truth Alone Triumphs) from the Mundaka Upanishad inscribed beneath the Ashokan emblem — embed a 3rd-century BCE
  Buddhist king into the identity of a 21st-century secular republic.

  '
