perspectives:
- viewpoint: Maurya Imperial / Ashokan
  viewpoint_type: victor
  region_origin: south-asia
  narrative: 'The edicts speak in Ashoka''s own voice — or at least the voice he chose to project onto stone. Rock Edict XIII,
    inscribed on cliff faces at Girnar, Shahbazgarhi, Mansehra, and a dozen other sites across the empire, presents the Kalinga
    conquest and its aftermath as a personal transformation. The edict does not deny the killing. It enumerates it: 100,000
    dead, 150,000 deported. Then it reframes the conquest as the moment when the king discovered dhamma.


    The Ashokan narrative follows a conversion arc: violence, realization, renunciation. After Kalinga, Ashoka declares that
    he will henceforth conquer by dhamma rather than by force. Pillar Edict VII claims that "the sound of the drum has become
    the sound of dhamma." The edicts describe a state apparatus reoriented toward moral governance: the appointment of dharma-mahamattas
    (morality officers) who reported directly to the king, the establishment of hospitals for humans and animals, the planting
    of banyan trees along roads for shade, the digging of wells at intervals of eight kos (roughly ten miles). Rock Edict
    II claims Ashoka provided medical treatment not only within his empire but to neighboring kingdoms, including the Hellenistic
    states of Antiochus, Ptolemy, Antigonus, Magas, and Alexander.


    The Ashokan perspective emphasizes the universality of dhamma. Ashoka did not impose Buddhism as a state religion — his
    edicts repeatedly advocate for tolerance of all sects. Rock Edict XII states: "Whoever praises his own religion, due to
    excessive devotion, and condemns others with the thought ''Let me glorify my own religion,'' only damages his own religion."
    The dhamma he promoted was not sectarian Buddhism but a broader ethical code: non-violence (ahimsa), respect for elders,
    generosity to brahmins and ascetics, moderation in spending, and restraint in punishment. The edicts prescribed moral
    behavior for all subjects regardless of faith.


    The strategic dimension is visible beneath the moral language. Ashoka''s conversion coincided with the consolidation of
    an empire that stretched from the Hindu Kush to the Bay of Bengal. The edicts were inscribed in local scripts and languages
    — Brahmi in most of India, Kharoshthi in the northwest, Greek and Aramaic at Kandahar. This was not a private confession;
    it was a broadcasting system. The morality officers functioned as a parallel administrative network. The ban on animal
    sacrifice, framed as ahimsa, also disrupted brahmanical rituals that sustained alternative power structures. The edicts
    project benevolence, but they project it from the center of an empire that maintained its army, its treasury, and its
    bureaucracy throughout Ashoka''s reign. The Arthashastra, whatever its precise date, describes the intelligence apparatus
    that Chandragupta built and Ashoka inherited — the empire did not survive on dhamma alone.


    Modern Indian nationalism embraced Ashoka as a founder figure. Jawaharlal Nehru devoted an entire chapter of The Discovery
    of India (1946) to Ashoka, calling him "greater than any king or emperor." The Republic of India adopted the Sarnath lion
    capital as its national emblem in 1950 and placed Ashoka''s dharmachakra on the national flag. The appropriation was deliberate:
    a secular, multi-religious state chose the symbol of a Buddhist king who preached tolerance — a pointed contrast to the
    religious partition that had just torn the subcontinent apart.

    '
  key_arguments:
  - The Kalinga edicts represent genuine personal remorse, not merely political propaganda
  - Dhamma governance replaced military conquest as the primary mode of imperial expansion
  - Religious tolerance, not Buddhist supremacy, was the core of Ashoka's public philosophy
  - The Maurya administrative system — roads, hospitals, morality officers — was a welfare state avant la lettre
