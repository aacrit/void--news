  title: Ashoka Pillar at Vaishali, Bihar
  description: One of the polished sandstone pillars erected by Ashoka across the Maurya Empire. This pillar at Vaishali,
    Bihar, stands approximately 18 meters tall and originally bore a single lion capital. The pillars carried inscribed edicts
    in Brahmi script — the first written political communications addressed to the general public in Indian history.
