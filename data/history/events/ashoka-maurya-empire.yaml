- viewpoint: Buddhist Monastic Tradition
  viewpoint_type: bystander
  region_origin: south-asia
  narrative: 'The Buddhist textual tradition treats Ashoka as a second founder — the ruler who transformed Buddhism from a
    regional Indian sect into a pan-Asian religion. The Mahavamsa (Great Chronicle), composed in Pali in Sri Lanka around
    the 5th century CE, devotes extensive attention to Ashoka''s role in the Third Buddhist Council at Pataliputra (c. 250
    BCE) and to the mission he dispatched to Sri Lanka under his son (or brother) Mahinda. According to the Mahavamsa, Mahinda
    arrived on the full moon day of the month of Jettha and converted King Devanampiya Tissa of Anuradhapura. Ashoka''s daughter
    Sanghamitta followed, bringing a cutting from the Bodhi Tree at Bodh Gaya. That tree — or its descendant — still stands
    in Anuradhapura, making it one of the oldest historically documented trees in the world.


    The Buddhist monastic version of Ashoka''s life follows a clear arc: a cruel king (Chandashoka, "Ashoka the Fierce") becomes
    a righteous king (Dharmashoka, "Ashoka the Just") through the power of the Buddha''s teachings. The Ashokavadana, a Sanskrit
    text from the 2nd century CE, elaborates this transformation with episodes designed to illustrate karmic causation. In
    one story, Ashoka as a child offers a handful of dirt to the Buddha (in a previous birth), and the merit from this act
    results in his birth as a great king. In another, he builds 84,000 stupas in a single day — one for each section of the
    Buddha''s teachings. The numbers are formulaic, not historical, but the theological point is precise: worldly power exists
    to serve the dharma.


    Ashoka''s patronage reshaped Buddhism''s institutional structure. Before the Maurya period, Buddhism was one of several
    shramana (ascetic) movements in the Gangetic plain, competing with Jainism, Ajivikism, and brahmanical traditions. Ashoka''s
    edicts — erected across a subcontinental empire — gave Buddhism a visibility that no other Indian religion had achieved.
    His donations to the sangha (monastic community), recorded in inscriptions at Sanchi, Bharhut, and Sarnath, funded the
    construction of stupas, monasteries, and pilgrimage routes that structured Buddhist practice for centuries. The great
    stupa at Sanchi, originally commissioned by Ashoka, was enlarged over the next 400 years into the monumental form that
    survives today.


    The missionary dimension is central to the Buddhist reading. Ashoka did not merely adopt Buddhism personally — he exported
    it. The Mahavamsa records missions to nine regions: Sri Lanka, Kashmir, Gandhara, the Himalayan country, Suvarnabhumi
    (Southeast Asia), and the Yona (Greek) territories. While the historical accuracy of each mission is debated, the archaeological
    evidence for the Sri Lankan mission is strong: Brahmi inscriptions at Mihintale confirm early Buddhist activity consistent
    with the Mahavamsa''s dating. The Theravada Buddhism practiced in Sri Lanka, Myanmar, Thailand, Cambodia, and Laos traces
    its lineage directly to the Ashokan missions. In this sense, Ashoka did not merely convert to Buddhism — he converted
    the map.


    The monastic tradition''s reading of Ashoka has a blind spot: it treats the Kalinga massacre as a necessary precondition
    for enlightenment. The 100,000 dead serve a narrative function — they are the darkness from which the light of dhamma
    emerges. The Ashokavadana makes this explicit by contrasting Chandashoka''s cruelty (torturing prisoners in a specially
    constructed "hell") with Dharmashoka''s compassion. The transition requires the cruelty. Without the horror of Kalinga,
    the conversion has no dramatic weight. The dead are instrumentalized in the service of a spiritual narrative — they exist
    in the story not as people who suffered but as the occasion for the king''s awakening.

    '
  key_arguments:
  - Ashoka transformed Buddhism from a regional sect into a pan-Asian religion through state patronage and missions
  - The Sri Lankan mission under Mahinda established Theravada Buddhism permanently on the island
  - Ashoka's 84,000 stupas and monastic donations created the physical infrastructure of Buddhist practice
  - The Chandashoka-to-Dharmashoka arc illustrates karmic transformation — cruelty redeemed by dharma
