- viewpoint: Roman Plebeian — The People's Grief
  viewpoint_type: bystander
  region_origin: europe
  narrative: 'The mob at Caesar''s funeral did not need Antony''s speech. They had read the will. Caesar left his private
    gardens across the Tiber — the Horti Caesaris — to the people of Rome as a public park. He bequeathed 75 denarii to every
    male citizen. Seventy-five denarii was roughly three months'' wages for a laborer. The crowd that gathered in the Forum
    on March 20 had come to collect from a patron, and they found him dead on a bier, his toga slashed and stained, his body
    displayed by arrangement of Antony, who understood that the visible evidence of violence would do more than rhetoric.


    Suetonius records that after Antony''s speech, the crowd "heaped together dry branches, benches, and whatever else they
    could lay hands on" and built a pyre in the Forum itself, burning the body on the spot. They then seized brands from the
    fire and ran to the houses of Brutus and Cassius. The poet Helvius Cinna — who had no connection to the conspirator Cornelius
    Cinna — was caught by the mob, and when he protested his identity, they killed him anyway, as Plutarch reports, "out of
    sheer rage." The violence was spontaneous and indiscriminate. It expressed a simple equation: Caesar had given them land,
    grain, spectacles, and status. The Senate had taken him away.


    The urban plebs of Rome — perhaps 750,000 people in 44 BCE — had a transactional relationship with power that historians
    have often dismissed as clientelism or mob politics. But the transactions were real. Caesar''s grain dole fed 320,000
    citizens; he reduced the rolls from 320,000 to 150,000 by resettling 80,000 in colonies, but those who remained depended
    on the subsidy. His building program — the Forum Julium, the Basilica Julia, planned expansion of the city — employed
    thousands. His veterans received land allotments in Italy, Gaul, Africa, and Spain. When the Liberatores proclaimed "liberty,"
    the plebs heard a different word: austerity. The Senate had blocked land reform for a century. Senatorial "liberty" meant
    the freedom of 600 families to monopolize the wealth of an empire. Caesar''s dictatorship meant distributions.


    The deification of Caesar — declared divus Julius by the Senate in 42 BCE, partly under Octavian''s pressure — formalized
    what the funeral pyre had expressed. A comet appeared during the funeral games in July 44 BCE; Octavian declared it Caesar''s
    soul ascending to heaven. The Temple of the Deified Julius was built on the spot where the body had been burned. Octavian
    titled himself divi filius — son of the divine. The plebs, who had built the pyre from benches and branches, had created
    the kindling for a monarchy.

    '
  key_arguments:
  - Caesar's will and personal generosity created a bond with the urban poor that the Senate could not match
  - The plebeian riot at Caesar's funeral was a rational response to the loss of a patron who provided land, grain, and employment
  - Senatorial "liberty" meant oligarchic privilege; Caesar's "tyranny" meant redistribution
  - The spontaneous deification at the funeral pyre laid the groundwork for the imperial cult
