- viewpoint: Provincial — The Conquered Peoples
  viewpoint_type: vanquished
  region_origin: europe
  narrative: 'Caesar''s own accounting of the Gallic Wars, written in the third person with the detachment of a field report,
    records the numbers. At Avaricum in 52 BCE, his legions killed the entire population of the town — 40,000 men, women,
    and children, by Caesar''s count. Only 800 survived. At Uxellodunum, the last Gallic holdout, he ordered the hands of
    every defender cut off and the mutilated men released to wander as living warnings. Plutarch estimated that Caesar''s
    nine-year campaign in Gaul killed one million people and enslaved another million. These numbers may be inflated — they
    come from hostile or propagandistic sources — but even conservative modern estimates place the dead at several hundred
    thousand in a population of perhaps 5 to 7 million.


    The Gallic Wars were not a defensive campaign. Caesar was a provincial governor who invaded independent territories to
    build personal glory, wealth, and a loyal army large enough to challenge the Senate. The Helvetii migration of 58 BCE
    — his initial pretext — involved a tribe moving within Gaul, not threatening Rome. Caesar''s intervention was unauthorized
    by the Senate and legally dubious even by Roman standards. The profits were staggering: the gold he looted from Gaul was
    so abundant that the price of gold in Rome dropped by 25% when it flooded the market. The wealth funded the civil war,
    the grain distributions, the building programs, and the bequests in his will. The 75 denarii left to each Roman citizen
    had been extracted from Gallic skulls.


    For the provinces more broadly, Caesar''s death changed little. The Roman system extracted tribute, requisitioned grain,
    and imposed legal jurisdiction regardless of who ruled in Rome. Provincial governors under the Republic had been notoriously
    rapacious — Cicero''s prosecution of Verres in 70 BCE documented the systematic plunder of Sicily. Caesar''s extension
    of citizenship to Cisalpine Gaul and his plans for wider enfranchisement were genuine reforms, but they served his political
    needs: new citizens meant new clients who owed their status to Caesar, not the Senate. The citizenship grants died with
    him. Augustus later extended citizenship selectively, always as a tool of control.


    Cleopatra''s position illustrates the provincial predicament. She allied with Caesar, bore his son (Caesarion), and depended
    on Roman military power to maintain her throne against her own brother''s faction. Caesar''s death left her exposed. She
    realigned with Antony. When Antony fell, she tried to negotiate with Octavian. Failing, she died. Octavian annexed Egypt
    as a personal possession — not a senatorial province but the emperor''s private estate, its grain reserves funding the
    military that kept him in power. For conquered peoples, the debate between "republic" and "tyranny" was a dispute among
    their masters about how to divide the spoils.

    '
  key_arguments:
  - Caesar's Gallic Wars killed and enslaved millions to build the personal army and fortune that fueled his political rise
  - The wealth that funded Caesar's generosity to Roman citizens was extracted through conquest and plunder
  - Citizenship extension was a tool of political clientage, not a principled expansion of rights
  - For conquered peoples, the Republic-vs-Empire debate was irrelevant — both systems extracted tribute and imposed subjection
