legacy_points:
- Triggered 13 years of civil war that killed the Roman Republic and produced the Roman Empire
- Established tyrannicide as the central moral dilemma of Western political thought — does killing the tyrant prevent tyranny
  or guarantee it?
- Augustus's Principate, born from the assassination's aftermath, became the template for European monarchy for 1,800 years
- Shakespeare's Julius Caesar (1599) made the assassination the permanent reference point for debates about liberty, power,
  and betrayal
- The three Booth brothers performed Julius Caesar in New York in November 1864; five months later, John Wilkes Booth shot
  Lincoln shouting "Sic semper tyrannis"
