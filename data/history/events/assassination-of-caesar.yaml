slug: assassination-of-caesar
title: The Assassination of Julius Caesar
subtitle: The Senate voted him dictator for life. Forty days later, twenty-three senators voted with knives.
date_display: March 15, 44 BCE
date_sort: -44
date_precision: day
era: classical
region: europe
country: Roman Republic
category: political
severity: critical
death_toll: 1 (Caesar); the ensuing civil wars killed an estimated 200,000-300,000 soldiers and unknown civilian casualties
  over the next 13 years
affected_population: The entire Roman Republic — 55-70 million people across the Mediterranean — transitioned from republican
  oligarchy to autocratic empire
duration: 'Assassination: minutes. Constitutional crisis: 13 years of civil war (44-31 BCE) ending with Octavian''s sole rule'
summary: 'On March 15, 44 BCE — the Ides of March — Gaius Julius Caesar entered the Senate meeting at the Theatre of Pompey
  in Rome. He had been declared dictator perpetuo, dictator in perpetuity, by the Senate forty days earlier. As he took his
  seat, Senator Tillius Cimber approached with a petition. When Caesar waved him away, Cimber grabbed his toga and pulled
  it from his shoulder — the signal. Publius Servilius Casca struck first, stabbing Caesar in the neck from behind. Caesar
  seized Casca''s arm and stabbed him with his stylus. Then the others closed in: Gaius Cassius Longinus, Decimus Brutus,
  Marcus Brutus, and at least nineteen more. Ancient sources record 23 wounds. The physician Antistius later determined that
  only one — the second stab, between the ribs — was fatal. Caesar fell at the base of Pompey''s statue, bleeding onto the
  marble floor of a building named for the man he had defeated in civil war four years earlier.


  The conspirators — who called themselves the Liberatores — had planned the act for weeks. Their ranks included senators,
  former praetors, and men Caesar had personally pardoned after the civil war against Pompey. Marcus Brutus was the moral
  figurehead: a descendant of Lucius Junius Brutus, who had overthrown the last Roman king in 509 BCE, he carried the weight
  of a family name synonymous with tyrannicide. Cassius was the organizer — a veteran commander who resented Caesar''s monopoly
  on power and patronage. They expected the Senate to rally to the Republic. Instead, the Senate fled. The conspirators marched
  to the Capitol carrying bloody daggers and found the Forum empty.


  Mark Antony, Caesar''s co-consul, seized the initiative. At Caesar''s funeral on March 20, he read the dictator''s will
  aloud: Caesar had bequeathed his gardens across the Tiber to the Roman people and left 75 denarii to every citizen. Antony
  displayed Caesar''s blood-soaked toga, pierced with 23 rents. The crowd rioted. They built a pyre in the Forum and burned
  the body on the spot. Mobs attacked the homes of conspirators. The poet Helvius Cinna was lynched by a crowd that confused
  him with the conspirator Cornelius Cinna — they tore him apart and carried his head through the streets on a spear.


  Caesar''s adopted heir, his 18-year-old grandnephew Gaius Octavius, arrived in Rome from Apollonia in April 44 BCE to claim
  his inheritance. Within months, the three-way struggle between Octavian, Antony, and the Liberatores had begun. The Second
  Triumvirate — Octavian, Antony, and Lepidus — was formalized in November 43 BCE and immediately proscribed 300 senators
  and 2,000 equestrians. Cicero, who had publicly celebrated the assassination, was killed by Antony''s soldiers on December
  7, 43 BCE; his head and hands were nailed to the Rostra in the Forum. Brutus and Cassius raised armies in the east but were
  defeated at the Battle of Philippi in October 42 BCE. Both died — Cassius by suicide after the first engagement, Brutus
  after the second. Octavian and Antony then turned on each other. At the Battle of Actium on September 2, 31 BCE, Octavian
  destroyed Antony''s fleet. Antony and Cleopatra fled to Alexandria, where both died by suicide. In 27 BCE, the Senate granted
  Octavian the title Augustus. The Republic was finished.

  '
significance: 'The assassination did not save the Republic. It destroyed it. The conspirators'' fundamental miscalculation
  was that removing Caesar would restore the senatorial oligarchy that had governed Rome for 450 years. Instead, it triggered
  thirteen years of civil war that ended with one-man rule more absolute than anything Caesar had claimed. Augustus ruled
  for 41 years and established a system — the Principate — that endured for three centuries. The assassination became the
  foundational case study in the paradox of tyrannicide: the Liberatores killed the tyrant and got a dynasty. Dante placed
  Brutus and Cassius in the lowest circle of Hell, alongside Judas. Shakespeare made Brutus the tragic hero of a play that
  has been performed at every political crisis since — it was staged in New York in 1864 by the three Booth brothers, including
  John Wilkes Booth, five months before he assassinated Abraham Lincoln. The phrase "Et tu, Brute?" — Shakespeare''s invention,
  not history — became shorthand for betrayal by the trusted. The Ides of March entered every Western calendar as a date of
  warning.

  '
