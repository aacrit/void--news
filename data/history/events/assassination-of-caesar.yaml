connections:
- target_slug: fall-of-rome
  connection_type: caused
  description: The assassination ended the Republic and triggered the civil wars that produced the Roman Empire — the system
    whose eventual collapse in 476 CE defines the "fall of Rome"
- target_slug: french-revolution
  connection_type: influenced
  description: Revolutionary France explicitly invoked Brutus as a model tyrannicide; Charlotte Corday cited him when she
    assassinated Marat in 1793; the Jacobins named a month "Brumaire" after Brutus
- target_slug: peloponnesian-war
  connection_type: parallel
  description: Both events crystallized the foundational Western debate about democracy, oligarchy, and strongman rule — Athens'
    democratic crisis paralleled Rome's republican collapse
