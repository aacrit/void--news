perspectives:
- viewpoint: Republican — The Last Defenders of Libertas
  viewpoint_type: victor
  region_origin: europe
  narrative: 'Brutus minted coins in the months after the assassination. On the obverse: his own portrait. On the reverse:
    a pileus — the cap of freedom given to emancipated slaves — flanked by two daggers, and below it the legend EID MAR. The
    Ides of March. It was the first time a living Roman had put his face on a coin — an irony Brutus either did not notice
    or did not care about.


    The Republican case for tyrannicide rested on five centuries of constitutional precedent. Rome had expelled its last king,
    Tarquinius Superbus, in 509 BCE. Lucius Junius Brutus — claimed as Marcus Brutus''s ancestor — had led the revolt and
    established the Republic''s founding principle: no individual should hold permanent, unchecked power. The consulship was
    shared by two men, elected annually, each with veto power over the other. The dictatorship was a temporary emergency appointment,
    limited by custom to six months. Caesar broke every constraint. He held the consulship continuously from 48 BCE, combined
    it with the tribunician power, and in February 44 BCE accepted the title dictator perpetuo — dictator in perpetuity. He
    appointed senators directly instead of allowing election. He controlled the treasury. He placed his image on coinage while
    alive, a prerogative previously reserved for gods and dead men.


    Cicero, who was not part of the conspiracy but celebrated it publicly, articulated the philosophical framework in De Officiis,
    written in the months after the assassination. He argued that a tyrant — one who seizes permanent power over a free people
    — forfeits his membership in the political community. Killing a tyrant was not murder but civic duty, equivalent to amputating
    a diseased limb. Cicero drew on Greek precedent: the Athenian tyrannicides Harmodius and Aristogeiton, celebrated with
    public statues for killing the tyrant Hipparchus in 514 BCE.


    The Liberatores'' military failure does not refute their political diagnosis. Caesar had already concentrated power to
    a degree incompatible with republican governance. He had conducted a census of the plebs and enrolled clients directly.
    He had settled 80,000 veterans on colonial land, creating a private army of obligation. He had extended citizenship to
    Cisalpine Gaul, adding millions of new citizens who owed their status to him personally, not to the Senate. The conspirators
    understood — correctly, as events proved — that these structural changes were irreversible. Their failure was strategic,
    not moral: they killed Caesar but had no plan for the day after. Brutus believed the Republic would reassert itself spontaneously
    once the tyrant was removed. It did not. But the principle — that concentrated power corrupts and must be resisted — survived
    the Republic and animated revolutionary thought from Machiavelli to Montesquieu to the American founders.

    '
  key_arguments:
  - Caesar systematically dismantled every constitutional constraint on personal power over four years
  - Tyrannicide was sanctioned by five centuries of Roman precedent and Greek political philosophy
  - Caesar's title of dictator perpetuo was a formal end to the Republic's foundational principle of limited, temporary authority
  - The conspirators' failure was strategic (no plan for aftermath), not moral (the diagnosis of tyranny was correct)
