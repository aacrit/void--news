title: The Bandung Conference
subtitle: Twenty-nine nations sent delegates to a city in Java — they represented 1.5 billion people and not one of their countries had been independent fifteen years earlier
date_display: '1955'
date_sort: 1955
date_precision: year
era: contemporary
region: southeast-asia
country: Indonesia (host); 29 African and Asian nations attending
category: political
severity: moderate
death_toll: None from the conference itself; the anti-colonial struggles it catalyzed killed millions across
  three continents over the following three decades
affected_population: 1.54 billion people represented by the 29 delegations — 54% of world population in
  1955
duration: April 18-24, 1955 (7 days); the Non-Aligned Movement it catalyzed has 120 member states in 2026
summary: 'On the morning of April 18, 1955, Sukarno walked to the podium inside Gedung Merdeka — the Freedom
  Building — in Bandung, Indonesia, wearing a white suit. Behind him sat delegates from 29 countries. He did
  not open with pleasantries. "We are often told ''''Colonialism is dead,''''" he said. "Let us not be deceived
  or even soothed by that. I say to you, colonialism is not yet dead." Outside the hall, the streets of
  Bandung were lined with banners in dozens of languages. The conference had no precedent. No Western power
  had organized it. No Western power had been invited.


  The delegations represented 1.54 billion people — 54% of the world''s population. India sent Jawaharlal
  Nehru. Egypt sent Gamal Abdel Nasser. The People''s Republic of China sent Zhou Enlai. Pakistan sent
  Muhammad Ali Bogra. North Vietnam and South Vietnam both attended — delegates from two halves of a country
  divided by the Geneva Accords eleven months earlier. Turkey, a NATO member, sat beside communist China.
  Five delegations came from sub-Saharan Africa: Ethiopia, the Gold Coast (not yet Ghana — that would come
  in 1957), Liberia, Libya, and Sudan. Japan attended, the only former colonial power in the room. Of the
  29 nations, six had been independent before 1945. The rest had achieved sovereignty within the previous
  decade.


  The conference produced the Dasasila Bandung — the Ten Principles of international relations: respect for
  sovereignty, non-aggression, non-interference in internal affairs, equality of all races and nations,
  peaceful coexistence. The principles drew on the Panchsheel Agreement, a 1954 treaty between India and
  China that Zhou Enlai and Nehru had drafted to settle their border disputes over Tibet. At Bandung, those
  bilateral principles became a multilateral framework — a set of rules written by the formerly colonized
  for a post-colonial international order.


  Both Washington and Moscow watched with alarm. Secretary of State John Foster Dulles had tried to prevent
  the conference by pressuring allies not to attend; Turkey, Pakistan, and the Philippines came anyway.
  Dulles told Eisenhower that non-alignment was immoral — "neutrality between good and evil." Moscow called
  the conference a CIA front, a charge contradicted by the CIA''s own assessment, which classified Bandung
  as a genuine threat to Western influence. Zhou Enlai used the conference to break China''s diplomatic
  isolation: he arrived as the leader of a state recognized by fewer than half the attendees and left having
  proposed peaceful coexistence with the United States. An assassination attempt — a bomb placed on the
  Kashmir Princess, a chartered Air India plane carrying the Chinese delegation''s advance team — killed
  eleven people on April 11. Zhou had changed his travel plans at the last moment. He attended.


  Within five years of Bandung: Ghana became independent (1957), the All-African People''s Conference met
  in Accra (1958), seventeen African nations gained independence in 1960 alone, and the UN General Assembly
  adopted Resolution 1514 — the Declaration on the Granting of Independence to Colonial Countries and
  Peoples (1960). The Non-Aligned Movement was formally founded at Belgrade in 1961, with 25 member states.
  By 2026, the NAM has 120 members — a majority of the United Nations General Assembly.

  '
significance: 'The conference invented the concept of the "Third World" as a political identity — not a
  measure of poverty, but a third path between the American and Soviet blocs. Alfred Sauvy had coined the
  phrase in 1952; Bandung gave it a platform, a membership, and a program. The Ten Principles became the
  diplomatic vocabulary of decolonization: sovereignty, non-interference, racial equality, peaceful
  coexistence. The Non-Aligned Movement, formally founded at Belgrade in 1961, grew from 25 to 120 member
  states by 2026. Its framework of sovereign equality and non-interference shapes the BRICS grouping, the
  G-77, and Global South solidarity in 2026 — institutions that trace their diplomatic grammar to a week
  in Bandung. The conference''s host was overthrown within a decade: Sukarno was removed from power in
  1965-1967 in a US-facilitated military transition that killed an estimated 500,000 to 1 million people.

  '
