    without their consent
- target_slug: rwandan-genocide
  connection_type: ideological_context
  description: The Non-Aligned Movement's principle of non-interference in member states' internal affairs
    provided no framework for intervention — when 800,000 were killed in Rwanda in 100 days, the NAM
    offered no mechanism to override sovereignty in defense of human life
- target_slug: cuban-missile-crisis
  connection_type: parallel
  description: The Cuban Missile Crisis (1962) demonstrated the limits of Bandung's vision — the non-aligned
    world remained subject to superpower decisions it could not influence, two men in Washington and Moscow
    negotiating the fate of the planet
- target_slug: creation-of-israel-nakba
  connection_type: political_context
  description: The Palestine question was on Bandung's agenda — the conference declared support for
