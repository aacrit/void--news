perspectives:
- viewpoint: Third Worldist / Anti-Colonial
  viewpoint_type: victor
  region_origin: southeast-asia
  narrative: 'Sukarno opened the conference with a roll call of colonialism''s geography. He named the
    countries in the room and the empires that had ruled them: Dutch Indonesia, British India, French
    Indochina, Belgian Congo, Portuguese Mozambique. "Almost all of us have histories stretching back
    thousands of years," he said. "Yet today we are called ''underdeveloped.''" The delegates — some in
    military uniforms, some in Western suits, some in traditional dress — represented states that had been
    administered from London, Paris, The Hague, Lisbon, Brussels, and Tokyo. They had not been asked.
    They had fought, marched, been imprisoned, been shot at, and won. Now they were writing new rules.


    The Bandung Conference was the first time the colonized world organized as a political subject rather
    than an object of great-power competition. Vijay Prashad''s The Darker Nations (2007) identifies
    Bandung as the founding moment of Third World solidarity — not a geography, not an economic category,
    but a political project. The 29 delegations did not agree on economics (India was socialist, Turkey
    was capitalist, China was communist), religion (the conference included Muslim, Hindu, Buddhist,
    Christian, and secular states), or Cold War alignment (Pakistan was in CENTO, China was aligned with
    the USSR). What they agreed on was that the era of European control over Asian and African peoples
    was finished.


    The Ten Principles — the Dasasila Bandung — were the programmatic expression of this consensus. They
    banned colonialism, racial discrimination, and nuclear weapons from the conduct of international
    relations. They enshrined sovereignty, equality, and non-interference as the rights of all states
    regardless of size or military power. They drew on the Panchsheel Agreement (1954) between India
    and China but expanded its bilateral framework into a multilateral declaration. The principles were
    not enforceable. They had no institutional mechanism. They carried the force of collective moral
    authority from 1.54 billion people who had, within living memory, been subjects of empire.


    The chain of events that followed Bandung was direct and traceable. Ghana became independent in 1957
    — the first sub-Saharan African nation to achieve sovereignty from a European colonial power. Nkrumah,
    who had watched Bandung from the Gold Coast, organized the All-African People''s Conference in Accra
    in December 1958 — attended by delegates from 28 African territories, including representatives of
    liberation movements from South Africa, Kenya, Algeria, and Angola. In 1960, seventeen African nations
    gained independence in a single year — the "Year of Africa." The UN General Assembly adopted Resolution
    1514 — the Declaration on the Granting of Independence to Colonial Countries and Peoples — which
    declared that "the subjection of peoples to alien subjugation, domination and exploitation constitutes
    a denial of fundamental human rights." The Non-Aligned Movement was formally founded at Belgrade in
    September 1961, with 25 member states. By the 2024 Kampala summit, its membership had reached 120
    nations — a majority of the UN General Assembly.


    The anti-colonial reading of Bandung is a narrative of collective self-determination. It celebrates
    the conference as proof that the colonized world could organize without Western permission, set its
    own agenda, and reshape the international order. It measures Bandung''s success by the institutional
    architecture it generated — the NAM, the G-77, the UN Conference on Trade and Development — and by
    the simple arithmetic of sovereignty: in 1945, 51 nations founded the United Nations; by 1970, there
    were 127 member states. Most of the new members came from territories represented at Bandung.

    '
  key_arguments:
  - Bandung was the first time the colonized world organized as a political subject, not an object of
    great-power competition
  - The Ten Principles (Dasasila) became the diplomatic vocabulary of decolonization — sovereignty,
    equality, non-interference
  - The conference directly preceded Ghana's independence, the All-African People's Conference, and the
    UN's decolonization resolution
  - The NAM grew from 25 founding members (Belgrade, 1961) to 120 by 2026 — a majority of the UN
    General Assembly
