- viewpoint: Feminist / Women at the Margins
  viewpoint_type: vanquished
  region_origin: global
  narrative: 'The Final Communique of the Asian-African Conference runs to ten sections and twenty-nine
    sub-articles. It addresses human rights, self-determination, racial discrimination, nuclear weapons,
    colonialism, economic cooperation, and cultural exchange. It mentions women zero times.


    Twenty-nine delegations met to dismantle one hierarchy — colonialism — while reproducing another.
    The delegates were overwhelmingly male. The heads of delegation were exclusively male. The conference''s
    vision of sovereignty was a vision of nations led by men, negotiated by men, and narrated by men.
    Kumari Jayawardena''s Feminism and Nationalism in the Third World (1986) documents the pattern across
    the Bandung world: anti-colonial movements recruited women as participants — as marchers, as
    organizers, as combatants — and then excluded them from the states those movements created.


    Women had fought in every struggle represented at Bandung. In India, women had marched in the
    Salt Satyagraha (1930), been arrested alongside men, and organized the All India Women''s Conference
    (founded 1927). In Egypt, Doria Shafik had led 1,500 women in a march on Parliament in February 1951,
    demanding suffrage — she was later placed under house arrest by Nasser. In Indonesia, women''s
    organizations had participated in the independence struggle against the Dutch and were later
    systematically targeted in the 1965-1966 anti-communist massacres. In Algeria, women fought with the
    FLN — as Fanon documented in "Algeria Unveiled" (1959) — and were told, after independence in 1962,
    that women''s rights would come "after the revolution was secured." The 1984 Algerian Family Code
    placed women under male guardianship, required a male relative''s permission for marriage, and
    restricted divorce rights. Twenty-two years after independence, women''s legal status had regressed.


    Funmilayo Ransome-Kuti attended international conferences of the era as a Nigerian women''s rights
    leader. She had organized the Abeokuta Women''s Tax Revolt (1947-1948), mobilizing 20,000 women
    against colonial taxation and forcing the abdication of the local chief. She was a member of the
    Women''s International Democratic Federation and traveled to the Soviet Union, China, and Eastern
    Europe. At every international forum — the World Congress of Women (Copenhagen, 1953), the Asian
    Women''s Conference (Colombo, 1958) — she argued that women''s liberation could not be deferred
    until after national liberation. The anti-colonial movements disagreed. National liberation came
    first; women''s rights were a secondary contradiction to be addressed later.


    The one partial exception at Bandung was Turkey. The Turkish delegation included women — Turkey had
    granted women''s suffrage in 1934, earlier than France (1944) or Switzerland (1971). But Turkey''s
    example reinforced the broader pattern: women''s rights were treated as a marker of modernity to be
    displayed, not a principle to be universalized. The "new nations" emerging from colonialism used
    women''s participation to signal progress — women marched in Egypt, fought in Algeria, organized in
    India and Vietnam — and then restricted women''s autonomy once state power was consolidated.


    The feminist critique of Bandung does not reject the conference''s anti-colonial purpose. It asks who
    was included in the "self" of self-determination. When the Dasasila proclaimed the equality of all
    races and nations, it did not proclaim the equality of all genders within those nations. The
    conference dismantled the hierarchy between colonizer and colonized while leaving intact the hierarchy
    between men and women within the newly sovereign states. Jayawardena''s conclusion stands: "The
    promise of national liberation was selectively fulfilled."

    '
  key_arguments:
  - The Final Communique mentioned women zero times across ten sections and twenty-nine sub-articles
  - Anti-colonial movements recruited women as participants and then excluded them from the states those
    movements built
  - Women fought in every struggle represented at Bandung — India, Egypt, Indonesia, Algeria — and were
    told women's rights would come "after" national liberation
  - The conference dismantled the hierarchy between colonizer and colonized while reproducing the
    hierarchy between men and women
  sources:
  - title: 'Feminism and Nationalism in the Third World'
    author: Kumari Jayawardena
    year: '1986'
    type: book
  - title: 'A Dying Colonialism'
    author: Frantz Fanon
    year: '1959'
    type: book
  - title: 'For Women and the Nation: Funmilayo Ransome-Kuti of Nigeria'
    author: Cheryl Johnson-Odim and Nina Emma Mba
    year: '1997'
    type: book
  - title: 'Feminist Subversion and Complicity: Governmentalities and Gender Knowledge in Postcolonial
      South Asia'
    author: Saadia Toor
    year: '2011'
    type: article
  notable_quotes:
  - text: The promise of national liberation was selectively fulfilled.
    speaker: Kumari Jayawardena
    context: Feminism and Nationalism in the Third World, 1986, conclusion
  - text: We did not struggle against colonialism to accept colonialism within our own homes.
    speaker: Doria Shafik
    context: Attributed, on the subordination of Egyptian women's rights after independence
  emphasized:
  - Zero mentions of women in the Final Communique
  - The systematic pattern of mobilizing women during liberation struggles and marginalizing them after
    independence
  - Specific cases — Doria Shafik placed under house arrest, Algerian Family Code of 1984, Funmilayo
    Ransome-Kuti marginalized at international forums
  - Self-determination as defined by men for states governed by men
  omitted:
  - Genuine achievements of post-colonial women's movements in education, legal reform, and political
    participation
  - Women's agency within anti-colonial movements — not only as victims but as strategic actors who
    shaped outcomes
  - The global context of women's exclusion — Western democracies were also male-dominated in 1955
  - Internal feminist debates about the relationship between national liberation and gender liberation
