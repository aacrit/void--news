- viewpoint: Chinese / Zhou Enlai
  viewpoint_type: institutional
  region_origin: east-asia
  narrative: 'On April 11, 1955, a bomb exploded aboard the Kashmir Princess, a chartered Air India
    Constellation carrying members of the Chinese delegation''s advance team from Hong Kong to Jakarta.
    The plane crashed into the South China Sea. Eleven people died. Three survived. Zhou Enlai had been
    scheduled to board but changed his travel plans at the last moment, flying instead via Rangoon. The
    assassination attempt — attributed to Kuomintang agents operating from Taiwan — confirmed what Beijing
    already knew: attending Bandung was a risk. Zhou attended anyway. He arrived in Bandung as the leader
    of a communist state that most of the 29 delegations did not recognize and that the United States was
    actively working to isolate.


    Zhou''s strategy at Bandung was calculated and precise. China had fought the United States in Korea
    three years earlier. It was excluded from the United Nations, where the Republic of China (Taiwan)
    held the Chinese seat. Fewer than half the Bandung delegations recognized the People''s Republic.
    Several — Pakistan, the Philippines, Thailand, Turkey — were members of US-led military alliances
    explicitly directed against communist expansion. Zhou needed to reframe China: not as a communist
    threat, but as a fellow post-colonial nation committed to peaceful coexistence.


    He succeeded. On the conference floor, Zhou set aside prepared remarks and spoke extemporaneously,
    responding to accusations of Chinese expansionism from the Philippine and Thai delegations. "China
    has no desire to interfere in the internal affairs of other countries," he said. He invoked the Five
    Principles of Peaceful Coexistence — originally a Chinese-Indian formulation from the 1954 Panchsheel
    Agreement — and proposed extending them to all Asian and African states. He offered to negotiate
    directly with the United States on the Taiwan question. He met privately with Nehru, Nasser, and
    U Nu of Burma, building personal relationships that would anchor Chinese diplomacy in Asia and Africa
    for the next decade. Chen Jian''s "China and the Bandung Conference" (2005) documents how Zhou
    transformed Bandung from a potential trap into a diplomatic triumph — he arrived isolated and left
    as a statesman.


    The Bandung framework served Chinese interests precisely because it enshrined non-interference.
    Beijing''s control over Tibet, its suppression of the 1959 Tibetan uprising, and its domestic
    political campaigns were shielded from international scrutiny by the same principle of sovereignty
    that protected all Bandung participants from external judgment. The Five Principles were simultaneously
    a statement of diplomatic idealism and a defensive shield.


    The limits of Bandung''s consensus emerged quickly. Within seven years, China and India were at war.
    The 1962 Sino-Indian War over the Aksai Chin plateau and the North-East Frontier Agency shattered the
    Panchsheel framework that both nations had co-authored. Nehru, who had championed "Hindi-Chini bhai
    bhai" (Indians and Chinese are brothers), felt personally betrayed. The war discredited Nehru''s vision
    of non-alignment and strengthened the argument — made by Pakistan, which sided with China — that
    Bandung''s principles were aspirational declarations, not binding commitments. By 1972, Nixon visited
    Beijing. China''s path to great-power diplomacy had begun at Bandung, but it did not end there.

    '
  key_arguments:
  - Zhou Enlai turned Bandung from a potential diplomatic trap into a triumph — arriving isolated and
    leaving as a respected statesman
  - The Five Principles of Peaceful Coexistence (Panchsheel) were a Chinese-Indian co-creation that
    became Bandung's framework, positioning China as a principled actor
  - The principle of non-interference shielded China's domestic policies — including Tibet — from
    international scrutiny
  - The Sino-Indian War of 1962 shattered the Panchsheel framework and discredited the personal bond
    between Zhou and Nehru
