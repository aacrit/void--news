- viewpoint: Cold War / Western Realist
  viewpoint_type: institutional
  region_origin: north-america
  narrative: 'John Foster Dulles had a word for non-alignment: immoral. In a world divided between freedom
    and communism, neutrality was complicity. "The concept of neutrality," he told a press conference in
    June 1956, "is an obsolete, immoral, and shortsighted conception." When the Bandung Conference convened
    in April 1955, Dulles read it as a direct challenge to American containment strategy. If 29 nations
    refused to choose sides, the network of alliances, bases, and mutual defense treaties that Washington
    had built around the Soviet perimeter — NATO, SEATO, CENTO, bilateral pacts with Japan, South Korea,
    Taiwan, and the Philippines — was undermined from within.


    The US response to Bandung operated on two tracks. Publicly, Washington dismissed non-alignment as
    naive — a posture available only to nations protected from Soviet aggression by American military
    power. Privately, the CIA increased its operations across the Bandung world. The pattern had already
    been set: Operation AJAX overthrew Iran''s elected Prime Minister Mohammad Mossadegh in August 1953,
    eighteen months before Bandung. Operation PBSUCCESS overthrew Guatemala''s Jacobo Arbenz in June
    1954. After Bandung, the targets included nations whose leaders had sat in Gedung Merdeka. Sukarno
    was removed from power in 1965-1967 through a military transition facilitated by the CIA — the US
    Embassy in Jakarta provided lists of suspected communists to the Indonesian military, and between
    500,000 and 1 million people were killed. Nkrumah was overthrown in a February 1966 coup while
    visiting Beijing; declassified CIA cables confirm American foreknowledge and encouragement. Patrice
    Lumumba of the Congo, who had attended the All-African People''s Conference in Accra in 1958, was
    assassinated in January 1961 with CIA complicity.


    Odd Arne Westad''s The Global Cold War (2005) argues that both superpowers instrumentalized
    decolonization. The US and USSR offered aid, weapons, and development assistance to Bandung
    participants in exchange for alignment. Non-alignment was partly illusory: India received Soviet
    economic aid and military equipment; Egypt received Soviet weapons after Bandung and nationalized the
    Suez Canal with Soviet diplomatic backing; Indonesia received Soviet naval vessels. The conference
    participants needed Cold War patronage to build their states, and both superpowers exploited that
    need. Non-alignment was a negotiating position, not a geopolitical reality.


    The Western realist critique of Bandung points to outcomes. The Third World project did not produce
    economic convergence between former colonies and former colonial powers. The New International Economic
    Order — proposed at the UN in 1974, demanding commodity price stabilization, debt relief, and
    technology transfer — was rejected by Western governments and never implemented. The NAM survived
    as an institution but, from the Western perspective, lacked coherence: its members included
    democracies and dictatorships, free-market economies and command economies, nations at war with each
    other (India and Pakistan, Iraq and Iran). By the 1980s, the NAM could not agree on the Soviet
    invasion of Afghanistan — a test of the non-interference principle that split the movement.


    The realist reading of Bandung holds that the conference articulated aspirations that the international
    system could not accommodate. Sovereignty for small states is constrained by the power of large ones;
    non-interference is a principle that the powerful ignore when it suits them; and the "third path"
    between superpower blocs was, in practice, a space where both superpowers competed for influence.
    The delegates in Gedung Merdeka represented 54% of the world''s population. They controlled less
    than 8% of its industrial output.

    '
  key_arguments:
  - Non-alignment undermined the US containment strategy built on alliances, bases, and bilateral defense
    pacts
  - The CIA covertly targeted leaders who attended Bandung or its follow-up conferences — Sukarno,
    Nkrumah, and Lumumba were all removed from power
  - Non-alignment was partly illusory — most Bandung participants accepted military or economic patronage
    from one or both superpowers
  - The Third World project failed to produce economic redistribution — the New International Economic
    Order was rejected by Western governments
