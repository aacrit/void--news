  emphasized:
  - Zhou's diplomatic skill in reframing China from communist threat to peaceful post-colonial partner
  - The Five Principles as a Chinese strategic innovation that shaped the conference's framework
  - China's establishment of relations with African and Asian states before the United States
  - Bandung as the origin of China's long engagement with the Global South
  omitted:
  - China's suppression of Tibetan sovereignty under the cover of non-interference principles
  - The Sino-Indian War's destruction of the Panchsheel partnership within seven years
  - Mao's domestic campaigns — the Anti-Rightist Movement (1957) and Great Leap Forward (1958-1962) —
    which contradicted Bandung's rhetoric of peaceful development
  - China's later abandonment of non-alignment for great-power competition
- viewpoint: Pan-African / Nkrumah
  viewpoint_type: revisionist
  region_origin: africa
  narrative: 'Kwame Nkrumah watched Bandung from the Gold Coast, still a British colony. He was not a
    delegate. He could not be — the Gold Coast did not yet exist as a sovereign state. But the conference
    confirmed what Nkrumah had argued since the Fifth Pan-African Congress in Manchester (1945): that
    colonized peoples had to organize across borders, and that political independence was only the first
    step. Two years after Bandung, on March 6, 1957, the Gold Coast became Ghana — the first sub-Saharan
    African nation to achieve independence from a European colonial power. Nkrumah stood in the Polo
    Grounds in Accra at midnight and told the crowd: "We are going to see that we create our own African
    personality and identity."


    Nkrumah organized the All-African People''s Conference in Accra in December 1958 — Bandung''s direct
    African follow-up. The conference was attended by delegates from 28 African territories, including
    representatives of liberation movements from South Africa (the ANC sent a delegation), Kenya (Tom
    Mboya attended), Algeria (the FLN was represented), and Angola (the MPLA sent observers). Patrice
    Lumumba of the Belgian Congo attended and returned home radicalized. Frantz Fanon, the Martinican
    psychiatrist who had joined the Algerian revolution, attended as a representative of the Provisional
    Government of the Algerian Republic. The Accra conference did for Africa what Bandung had done for
    Asia — it created a continental solidarity movement that accelerated the timetable for independence.


    But Nkrumah''s critique went deeper than political sovereignty. His book Neo-Colonialism: The Last
    Stage of Imperialism (1965) argued that formal independence without economic independence was a
    hollow achievement. The former colonial powers retained control through multinational corporations,
    trade agreements that fixed commodity prices below the cost of production, currency arrangements
    that tied African economies to European central banks (the CFA franc, controlled by the French
    Treasury, remained the currency of fourteen African nations in 2026), and development loans that
    created debt dependencies. Bandung''s Ten Principles spoke of sovereignty and equality. They said
    nothing about who owned the copper mines, the oil fields, the cocoa plantations, or the banks.


    The CIA distributed copies of Nkrumah''s Neo-Colonialism to justify increased surveillance. On
    February 24, 1966, while Nkrumah was visiting Beijing, the Ghanaian military seized power. Declassified
    CIA cables — released under the Freedom of Information Act and analyzed by John Stockwell, a former
    CIA officer, in In Search of Enemies (1978) — confirm American foreknowledge and encouragement of
    the coup. Nkrumah died in exile in Bucharest in 1972. The pattern repeated: Lumumba was assassinated
    in January 1961, Nkrumah was overthrown in 1966, Sukarno was removed in 1965-1967. Three leaders
    who had organized or attended the Bandung movement were eliminated within a decade.


    The Pan-African critique of Bandung is not that the conference failed but that it did not go far
    enough. The Ten Principles were politically powerful but economically toothless. They addressed
    sovereignty without addressing the terms of trade. They opposed colonialism without opposing the
    economic structures that colonialism had built to extract wealth from the periphery to the
    metropole. The question Nkrumah posed in 1965 remains unanswered in 2026: what does sovereignty
    mean when your currency is controlled by your former colonizer''s treasury?

    '
  key_arguments:
  - Political independence without economic independence was a hollow achievement — the Ten Principles
    addressed sovereignty but not the terms of trade
  - The All-African People's Conference (Accra, 1958) was Bandung's direct African follow-up, attended
    by delegates from 28 African territories including the ANC and FLN
  - Neo-colonial control persisted through multinational corporations, commodity pricing, currency
    arrangements (the CFA franc), and debt — structures the Ten Principles did not address
  - Three leaders of the Bandung movement — Sukarno, Nkrumah, and Lumumba — were removed from power
    within a decade, all with CIA involvement
