legacy_points:
- Killed 30-60% of Europe's population; global death toll estimated between 75 and 200 million
- Labor scarcity doubled wages and accelerated the decline of serfdom in Western Europe
- Triggered the English Peasants' Revolt of 1381 and reshaped feudal labor relations permanently
- Led to the first systematic quarantine practices — Venice's 40-day isolation (quarantina) became the model
- Catalyzed the worst wave of antisemitic violence in Europe before the 20th century, with massacres in over 200 communities
- Islamic physicians in al-Andalus identified contagion 500 years before germ theory
