- viewpoint: Peasant and Laborer — The Great Leveling
  viewpoint_type: revisionist
  region_origin: europe
  narrative: 'Before the plague, a landless laborer in England earned roughly 1 to 2 pence per day. There were more people
    than available land. Lords set wages; tenants accepted them or starved. Villeinage — a form of serfdom that bound peasants
    to their lord''s manor — attached to roughly 40% of the English peasantry. A villein could not leave the manor, marry,
    or sell land without the lord''s permission. The system had functioned for centuries because demographic pressure ensured
    a permanent labor surplus.


    The plague inverted the equation. By 1350, between one-third and one-half of England''s population was dead. Labor became
    scarce. Wages rose immediately — by 1350-1351, some agricultural workers were earning double or triple their pre-plague
    rates. Peasants left manors whose lords could not match competing offers. Parliament, dominated by the landlord class,
    responded with the Statute of Laborers in 1351, which fixed wages at 1346 levels and criminalized the refusal to work
    at pre-plague rates. Justices of the peace were empowered to enforce wage controls. The statute was widely evaded. Manorial
    court records show lords competing for workers by offering higher wages, free meals, and reduced obligations — while publicly
    supporting the legislation.


    The tension between economic reality and legal suppression produced the English Peasants'' Revolt of 1381. The immediate
    trigger was a poll tax — a flat per-capita levy that fell disproportionately on the poor — but the underlying cause was
    thirty years of accumulated rage against wage suppression, labor restrictions, and serfdom itself. Wat Tyler and John
    Ball led an army of perhaps 60,000 into London. They burned the Savoy Palace of John of Gaunt, opened the prisons, and
    cornered 14-year-old King Richard II at Mile End. Richard promised to abolish serfdom. When Tyler was killed at a parley
    at Smithfield, the revolt collapsed. Richard revoked every concession. But the structural transformation was irreversible.
    By 1500, villeinage had effectively disappeared from England.


    The pattern varied across Europe. In Western Europe — France, the Low Countries, parts of Germany — serfdom declined as
    peasants leveraged their scarcity. In Eastern Europe, the opposite occurred. Polish, Prussian, and Russian landlords tightened
    labor controls after the plague, binding peasants more firmly to the land to prevent migration. Historians call this the
    "second serfdom," a divergence between Western and Eastern European labor systems that persisted for five centuries. Robert
    Brenner and other Marxist historians argue that the plague itself did not determine outcomes — identical demographic shocks
    produced opposite results depending on the balance of class power. Where peasants were organized and lords were weak,
    freedom expanded. Where lords controlled state institutions, coercion intensified.

    '
  key_arguments:
  - Labor scarcity after the plague doubled wages and gave surviving peasants unprecedented bargaining power
  - The Statute of Laborers (1351) attempted to suppress market forces through wage controls and failed
  - The English Peasants' Revolt of 1381 was a direct consequence of thirty years of post-plague labor conflict
  - Eastern and Western Europe diverged — the same demographic shock produced opposite outcomes depending on class power
