- viewpoint: Jewish Community — Scapegoats and Survivors
  viewpoint_type: vanquished
  region_origin: europe
  narrative: 'In September 1348, Jews in the Castle of Chillon on Lake Geneva were arrested and tortured until they confessed
    to poisoning wells. The confession — extracted under duress from a surgeon named Balavigny — spread across Europe faster
    than the plague itself. It was copied and forwarded from town to town. By November, the city council of Strasbourg had
    received it. On February 14, 1349, before the plague had even arrived in Strasbourg, the city''s 2,000 Jews were taken
    to the Jewish cemetery and burned alive. Those who agreed to convert were spared. The city council then divided the victims''
    property among the citizenry and forgave all debts owed to Jews.


    The pattern repeated across Central Europe. In Basel, the Jewish community was locked in a wooden building on an island
    in the Rhine and burned on January 16, 1349. In Erfurt, 3,000 Jews were killed in a single day. In Mainz, the Jewish community
    — one of the largest in Europe, numbering 6,000 — fought back before being overwhelmed and destroyed in August 1349. In
    total, over 200 Jewish communities were annihilated between 1348 and 1351. The geographic pattern is telling: many massacres
    occurred before the plague arrived, or in areas where it never struck heavily. The violence was not a spontaneous reaction
    to disease but an organized campaign that exploited the plague as pretext.


    Pope Clement VI intervened. In July 1348, he issued the bull Quamvis perfidiam, declaring that Jews were dying of the
    plague like everyone else and could not therefore be its cause. He threatened excommunication for anyone who harmed Jews
    or seized their property. A second bull in September 1348 repeated the prohibition. The papal intervention saved some
    communities — in Avignon, under the pope''s direct protection, the Jewish population survived largely intact. But the
    bulls had limited effect in the Rhineland and the Holy Roman Empire, where local authorities and mobs acted independently
    of papal authority.


    The well-poisoning accusation had a specific economic function. Jewish communities in medieval Europe were concentrated
    in moneylending, trade, and skilled crafts — occupations to which they were often legally restricted. Destruction of the
    Jewish community meant cancellation of debts and seizure of liquid assets. The Strasbourg massacre explicitly included
    debt forgiveness. In Nuremberg, the city used the cleared Jewish quarter to build a new marketplace — the site of the
    modern Hauptmarkt. The massacres permanently altered European Jewish geography: surviving communities migrated eastward
    into Poland and Lithuania, where King Casimir III offered protection and charters. This eastward migration created the
    Ashkenazi population centers that would endure until the 20th century.

    '
  key_arguments:
  - Jewish massacres during the plague were organized economic campaigns, not spontaneous panic
  - Many pogroms occurred before the plague arrived, proving the disease was pretext rather than cause
  - Papal intervention saved some communities but was insufficient against local anti-Jewish violence
  - The massacres permanently shifted European Jewish geography eastward into Poland and Lithuania
