connections:
- target_slug: mongol-conquest-baghdad
  connection_type: consequence
  description: The Mongol Empire's trade routes — the same infrastructure that connected Baghdad to the Black Sea — became
    the transmission network for Yersinia pestis from Central Asia to Europe
- target_slug: the-crusades
  connection_type: influenced
  description: East-West trade contacts expanded by the Crusades contributed to the commercial networks along which the plague
    traveled; the Crusader port cities were early transmission points
- target_slug: transatlantic-slave-trade
  connection_type: influenced
  description: Europe's post-plague labor shortage and demographic collapse contributed to the economic pressures that later
    drove the search for enslaved labor in the Atlantic economy
- target_slug: fall-of-rome
  connection_type: parallel
  description: Both events represent civilizational disruptions that restructured European social hierarchies; the Plague
    of Justinian (541-549) during Rome's decline foreshadowed the Black Death's demographic catastrophe
