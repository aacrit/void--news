duration: Peak pandemic 1346-1353; recurrent outbreaks every 10-15 years through the 18th century
summary: 'In October 1347, twelve Genoese trading ships docked at the Sicilian port of Messina. Most of the sailors were dead.
  Those still alive were covered in black boils that oozed blood and pus. The harbor authorities ordered the ships out, but
  it was too late. Within six months, the plague had reached Genoa, Venice, and Marseilles. By December 1348, it had crossed
  the Alps. By 1349, it was in England, Germany, and Scandinavia. By 1351, it had reached Moscow. The bacterium — Yersinia
  pestis, confirmed by DNA analysis of mass grave remains in 2011 — traveled in the guts of fleas that lived on black rats
  that lived on ships that moved along the trade routes of the medieval world.


  The disease presented in three forms. Bubonic plague produced swollen lymph nodes — buboes — in the groin, armpit, or neck,
  followed by fever, chills, and death within a week. Pneumonic plague attacked the lungs and spread through airborne droplets;
  it killed in two to three days. Septicemic plague entered the bloodstream directly and could kill within hours, before symptoms
  appeared. Giovanni Boccaccio, who survived the plague in Florence, wrote in the preface to the Decameron that the sick "ate
  lunch with their friends and dinner with their ancestors in paradise."


  The death toll defies precise accounting. Before the plague, Europe''s population was approximately 75 million. By 1353,
  it had fallen to between 30 and 50 million. In England, tax records and manorial court rolls allow granular estimates: the
  population dropped from roughly 6 million to 2.5 million. In Florence, the city''s population fell from 120,000 to 50,000.
  In Cairo, the Mamluk historian al-Maqrizi recorded that at the peak, between 10,000 and 20,000 people died per day. In Avignon,
  seat of the papacy, Pope Clement VI consecrated the Rhone river so that corpses could be thrown into it, the cemeteries
  having overflowed.


  The plague reached Europe via the Mongol trade network. In 1346, the Mongol army besieging the Genoese trading post of Caffa
  (modern Feodosia, Crimea) catapulted plague-infected corpses over the city walls — an event recorded by the notary Gabriele
  de'' Mussi, though modern historians debate whether this constituted effective biological warfare or whether the plague
  entered Caffa through its rat population independently. The besieged Genoese fled by ship to Constantinople, Messina, and
  Genoa, carrying the disease westward.


  Yersinia pestis originated in Central Asia. Genetic studies of ancient DNA from the Issyk-Kul region of modern Kyrgyzstan,
  published in Nature in 2022, identified plague strains from 1338-1339 burial sites as the ancestral source of the pandemic.
  The bacterium traveled the Silk Road, reaching the Black Sea ports by 1346. It moved along the same routes that carried
  silk, spices, and silver — routes that the Mongol Empire''s Pax Mongolica had made safer and faster than at any point in
  history.

  '
significance: 'The Black Death restructured European civilization. Labor scarcity gave surviving peasants bargaining power
  they had never possessed. In England, wages for agricultural workers doubled between 1350 and 1370. Parliament responded
  with the Statute of Laborers in 1351, freezing wages at pre-plague levels and criminalizing labor mobility. The law was
  unenforceable. By 1381, accumulated resentment over wage suppression, poll taxes, and serfdom erupted in the English Peasants''
  Revolt — the largest popular uprising in English history before the Civil War. Serfdom declined across Western Europe within
  a century of the plague; in Eastern Europe, landlords tightened restrictions, deepening the "second serfdom" that would
  persist until the 19th century. The plague accelerated the transition from feudal agriculture to a wage economy in the West,
  collapsed land rents, shifted the balance of power from landowners to laborers, and — by making human life scarce — made
  it more expensive. The demographic recovery took 150 years. England did not regain its pre-plague population until the 16th
  century. The recurrent outbreaks that followed — roughly every decade through the 17th century — prevented any sustained
  recovery and kept the memory of mass death embedded in European culture, law, and theology for generations.

  '
