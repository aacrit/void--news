  title: The Triumph of Death by Pieter Bruegel the Elder
  description: Panoramic painting depicting an army of skeletons devastating a landscape, reflecting the cultural trauma of
    recurring plague outbreaks in Europe. Painted c. 1562, two centuries after the Black Death, showing how deeply the pandemic
    embedded itself in European consciousness.
  source_url: https://commons.wikimedia.org/wiki/File:The_Triumph_of_Death_by_Pieter_Bruegel_the_Elder.jpg
  attribution: Pieter Bruegel the Elder, Museo del Prado, public domain
  license: public-domain
  creator: Pieter Bruegel the Elder
  creation_date: c. 1562
  supabase_url: https://xryzskhgfuafyotrcdvj.supabase.co/storage/v1/object/public/history-media/black-death/wiki_0.jpg
- media_type: artwork
  title: Danse Macabre from the Nuremberg Chronicle
  description: Woodcut illustration of the Dance of Death, showing skeletons dancing with living people of all social ranks
    — pope, king, merchant, peasant — a motif that emerged directly from the Black Death and became a staple of late medieval
    European art.
  source_url: https://commons.wikimedia.org/wiki/File:Nuremberg_chronicles_-_Dance_of_Death_(CCLXIIIIv).jpg
  attribution: Hartmann Schedel, Nuremberg Chronicle, 1493, public domain
  license: public-domain
  creator: Michael Wolgemut
  creation_date: '1493'
  supabase_url: https://xryzskhgfuafyotrcdvj.supabase.co/storage/v1/object/public/history-media/black-death/wiki_1.jpg
- media_type: map
  title: Spread of the Black Death across Europe, 1346-1353
  description: Map showing the chronological progression of plague across Europe, from its arrival in Sicily in October 1347
    through its spread to Scandinavia and Russia by 1351.
  source_url: https://commons.wikimedia.org/wiki/File:1346-1353_spread_of_the_Black_Death_in_Europe_map.svg
  attribution: Flappiefh, Wikimedia Commons, CC BY-SA 4.0
  license: cc-by-sa
  creator: Flappiefh
  creation_date: '2020'
  supabase_url: https://xryzskhgfuafyotrcdvj.supabase.co/storage/v1/object/public/history-media/black-death/wiki_2.png
- media_type: document
  title: Illustration from the Toggenburg Bible showing plague victims
  description: A 15th-century illustration showing a man and woman afflicted with plague buboes, tended by a physician. One
    of the earliest known medical depictions of the disease's visible symptoms.
  source_url: https://commons.wikimedia.org/wiki/File:Plague-hit_man_and_woman_-_Toggenburg_Bible.jpg
  attribution: Toggenburg Bible, 1411, public domain
  license: public-domain
  creator: Unknown
  creation_date: '1411'
