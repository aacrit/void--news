- viewpoint: Mongol Trade Route — The Silk Road Pandemic
  viewpoint_type: bystander
  region_origin: central-asia
  narrative: 'The plague did not begin in Europe. It ended there. Yersinia pestis originated in Central Asia — a 2022 study
    in Nature traced the ancestral strain to burial sites near Lake Issyk-Kul in modern Kyrgyzstan, dating to 1338-1339. The
    tombstones, inscribed in Syriac, recorded an unusual number of deaths attributed to "pestilence" (mawtana). DNA extracted
    from the teeth of individuals buried at the site matched the genetic ancestor of all known Black Death strains.


    The bacterium traveled the arteries of the Mongol Empire. The Pax Mongolica — the period of relative stability that followed
    the Mongol conquests of the 13th century — had connected China, Central Asia, Persia, and Europe through a network of
    caravan routes, postal relay stations (yam), and trading posts more extensive than any previous system. A merchant could
    travel from Beijing to the Black Sea ports under a single political authority. The same infrastructure that moved silk,
    spices, paper, and gunpowder moved rats, fleas, and Yersinia pestis.


    The siege of Caffa in 1346 provides the most dramatic transmission narrative. The Golden Horde — the Mongol successor
    state controlling the western steppe — besieged the Genoese trading colony on the Crimean coast. When plague struck the
    besieging army, the Mongol commander Janibeg reportedly catapulted infected corpses over the walls. The Genoese notary
    Gabriele de'' Mussi wrote the account in his Istoria de Morbo — though modern historians note that de'' Mussi may not
    have been present and that the plague likely entered Caffa through its rat population regardless of the catapults. The
    fleeing Genoese carried it to Constantinople, where it killed the son of Emperor John VI Kantakouzenos, and from there
    to every port in the Mediterranean.


    The Central Asian origin matters because it reframes the Black Death from a European catastrophe to a Eurasian one. China''s
    population fell from roughly 120 million in 1340 to 65 million by 1393 — though separating plague deaths from the violence
    of the Yuan dynasty''s collapse and the wars that produced the Ming dynasty is impossible. The Middle East lost an estimated
    one-third of its population. Ibn Khaldun, writing from the Maghreb, observed that "civilization in both the East and the
    West was visited by a destructive plague which devastated nations and caused populations to vanish. It swallowed up many
    of the good things of civilization and wiped them out." The plague was not a European event that happened to arrive from
    elsewhere. It was a global catastrophe that struck Europe last.

    '
  key_arguments:
  - Yersinia pestis originated in Central Asia (Issyk-Kul, Kyrgyzstan) and traveled the Silk Road to Europe
  - The Pax Mongolica's trade infrastructure was simultaneously the plague's transmission network
  - The siege of Caffa (1346) is the most narrated transmission event but may overstate intentional biological warfare
  - The Black Death was a Eurasian pandemic, not a European one — China and the Middle East suffered comparable losses
  sources:
