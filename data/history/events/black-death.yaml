perspectives:
- viewpoint: European Christian — Divine Punishment
  viewpoint_type: bystander
  region_origin: europe
  narrative: 'The dying began before anyone could name the disease. In Siena, Agnolo di Tura buried five of his own children
    with his hands because no gravedigger would come. "There was no one who wept for any death," he wrote, "for all awaited
    death." In Avignon, Guy de Chauliac, physician to Pope Clement VI, recorded that at the peak of mortality in early 1348,
    the pope sat between two enormous fires — his doctors believed heat purified the corrupted air. Clement survived. Two-thirds
    of the College of Cardinals did not.


    The dominant explanation was theological. The Faculty of Medicine at the University of Paris, commissioned by King Philip
    VI to explain the pestilence, issued its report in October 1348: a conjunction of Saturn, Jupiter, and Mars in the sign
    of Aquarius on March 20, 1345, had drawn up noxious vapors from land and sea. Behind the astrology lay the conviction
    that God had sent the plague as punishment for human sin. Flagellant processions — groups of men who marched through towns
    whipping themselves bloody in public penance — swept through Germany, the Low Countries, and Hungary. The movement peaked
    in 1349 with processions of 200 to 300 flagellants entering cities, performing their ritual for 33 days (one for each
    year of Christ''s life), and moving on. Clement VI initially tolerated the movement, then condemned it in a papal bull
    of October 1349 when flagellant groups began attacking clergy and Jews.


    The plague shattered institutional authority. Priests who administered last rites died in enormous numbers — parish records
    in England show clergy mortality rates of 40 to 50 percent, higher than the general population because of their obligation
    to attend the dying. Monasteries were devastated. The resulting shortage of educated clergy led to rapid ordination of
    poorly trained replacements, feeding a crisis of clerical credibility that historians trace forward to John Wycliffe''s
    challenge to Church authority in the 1370s and, ultimately, to the Reformation.


    Boccaccio framed the moral collapse in the Decameron''s introduction: laws human and divine dissolved together. The sick
    were abandoned by family. Bodies lay unburied in streets and houses. Property changed hands not by inheritance but by
    proximity. Some responded with extreme piety; others, as Boccaccio observed, with extreme indulgence — "drinking excessively,
    enjoying life to the full, going about singing and merrymaking." The plague did not create atheism, but it created space
    for questioning whether the institutional Church could explain or prevent suffering on this scale.

    '
  key_arguments:
  - The plague was understood as divine punishment for collective sin, reinforcing penitential theology
  - Flagellant movements represented popular religious response outside Church control
  - Massive clergy mortality undermined institutional Church authority and credibility
  - The cultural response — Boccaccio, the danse macabre tradition — reflected a transformed relationship with death
