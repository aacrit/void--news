    role: "Bolivar's most trusted general; won the Battle of Ayacucho (1824) that ended Spanish rule; assassinated in the mountains of Berruecos, June 4, 1830"
  - name: "Alexandre Petion"
    role: "President of the Republic of Haiti (southern); gave Bolivar ships, soldiers, and arms in 1816 in exchange for a promise to abolish slavery"
  - name: "Jose Antonio Paez"
    role: "Llanero cavalry commander in Venezuela; later became president of Venezuela and led its secession from Gran Colombia in 1830"

