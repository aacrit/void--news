perspectives:
  - viewpoint: "Bolivarian / Creole Elite"
    viewpoint_type: victor
    region_origin: americas
    narrative: |
      Bolivar's case was made most explicitly in two documents: the Jamaica Letter of September 6, 1815, and the Address at the Congress of Angostura of February 15, 1819. Written from exile in Kingston after the collapse of the Second Venezuelan Republic, the Jamaica Letter is 8,000 words of political analysis, historical argument, and strategic vision. Bolivar dissected Spanish colonial rule with surgical precision: 300 years of governance that denied creoles (American-born Spaniards) access to high office, restricted colonial manufacturing to protect peninsular industries, imposed trade monopolies that benefited Cadiz merchants, and treated the Americas as a revenue source rather than a society. "We were never viceroys or governors except by extraordinary chance; seldom were we bishops or archbishops; diplomats, never; soldiers, only in subordinate ranks."

      The creole elite who led the independence movements were not peasants or slaves — they were the sons and daughters of Spanish landowners, educated in Europe, readers of Montesquieu, Rousseau, and the Encyclopedists. Bolivar himself inherited a fortune. His education included two years in Europe (1799-1802), where he witnessed Napoleon's coronation and swore on Rome's Monte Sacro to liberate his homeland. His colleague Francisco de Miranda — who preceded Bolivar as leader of the independence movement — had fought in the American Revolution, the French Revolution, and corresponded with Thomas Jefferson, Alexander Hamilton, and Catherine the Great. The creole independence movement was, in its self-understanding, the American extension of the Atlantic Age of Revolution.

      The Address at Angostura (1819) reveals Bolivar's political thought at its most complex. He argued against both monarchy and pure democracy, proposing instead a republic with a hereditary senate, a strong executive, and a "moral power" — a fourth branch of government responsible for education and public virtue. He rejected federalism, arguing that Latin America lacked the civic traditions and institutional maturity for decentralized government. "Do not adopt the best system of government, but the one that is most likely to succeed." His proposals were partly adopted, partly ignored, and partly overtaken by events.

      The military campaigns that followed Angostura demonstrated Bolivar's genius and his ruthlessness. The crossing of the Andes in June-July 1819 — through the flooded plains of the Apure, up the Pisba Pass at over 13,000 feet, in winter, with an army of llaneros who had never seen snow — killed hundreds of soldiers and most of the horses. Those who survived descended onto the plains of Boyaca and destroyed the Spanish royalist army in two hours on August 7. Bolivar's strategy throughout combined long-distance forced marches, surprise attacks, and the willingness to accept catastrophic losses for decisive engagements. He lost more campaigns than he won — the First Republic (1811-1812), the Second Republic (1813-1814), the Haitian expedition (1816) — but each failure taught him to build broader coalitions, reach beyond the creole elite to the pardos (mixed-race people) and llaneros, and accept the social costs of the alliances he needed.

      Gran Colombia — the union of Venezuela, New Granada (Colombia), and Quito (Ecuador) — was proclaimed in 1821 and governed by Bolivar as president and his vice-president Francisco de Paula Santander. It was Bolivar's answer to the fragmentation he feared: a continental republic large enough to resist European re-colonization and powerful enough to command international respect. It collapsed within a decade. Paez led Venezuela's secession in 1830. Santander broke with Bolivar over the question of centralism vs. federalism. Ecuador followed Venezuela out. Bolivar's final years were a descent from triumph to exile, from continental liberator to abandoned leader. He died in Santa Marta on December 17, 1830, at 47.
    key_arguments:
      - "300 years of Spanish colonial restriction denied creoles access to power — independence was both a philosophical and practical necessity"
      - "Bolivar's political thought was original — he rejected both monarchy and pure democracy, seeking a middle path for Latin America's specific conditions"
      - "The military campaigns — Andes crossing at 13,000 feet, five defeats before Boyaca — required the willingness to rebuild after repeated catastrophes"
      - "Gran Colombia's failure was a tragedy of personality and regional jealousy, not a failure of the continental vision"
    sources:
      - title: "Selected Writings of Bolivar (2 volumes)"
        author: "Simon Bolivar (ed. Vicente Lecuna)"
        year: "1951"
        type: archive
      - title: "Bolivar: American Liberator"
        author: "Marie Arana"
        year: "2013"
        type: book
      - title: "The Liberators: South America's Savage Wars of Freedom, 1810-1830"
        author: "Robert Harvey"
        year: "2000"
        type: book
    notable_quotes:
      - text: "We were never viceroys or governors except by extraordinary chance; seldom were we bishops or archbishops; diplomats, never; soldiers, only in subordinate ranks."
        speaker: "Simon Bolivar"
        context: "The Jamaica Letter, September 6, 1815"
      - text: "Do not adopt the best system of government, but the one that is most likely to succeed."
        speaker: "Simon Bolivar"
        context: "Address at the Congress of Angostura, February 15, 1819"
    emphasized:
      - "Creole exclusion from colonial power as the revolution's root cause"
      - "Bolivar's political philosophy as original Latin American thought, not mere imitation of European models"
      - "Gran Colombia as a visionary project undone by regional fragmentation"
    omitted:
      - "Bolivar's partial betrayal of the promise to Petion — emancipation was limited to military recruits, not universal"
      - "The Decree of War to the Death and its role in escalating atrocities"
      - "Indigenous and Afro-Latin American communities fought in the wars but received few of the political gains"
      - "Bolivar's own authoritarianism — he declared himself dictator in 1828"

  - viewpoint: "Spanish Colonial / Royalist"
    viewpoint_type: vanquished
    region_origin: europe
    narrative: |
      Spain's position in 1810 was not that of a confident imperial power suppressing a colonial revolt. It was that of a nation fighting for its own survival. Napoleon's invasion of Spain in 1808, the forced abdication of King Ferdinand VII, and the imposition of Napoleon's brother Joseph Bonaparte on the Spanish throne had shattered metropolitan authority. The juntas that declared independence in Caracas, Buenos Aires, and Bogota in 1810 initially claimed loyalty to Ferdinand VII — they rejected Joseph Bonaparte's authority, not the Spanish Crown. The separatist faction grew within the juntas only after Ferdinand VII's restoration in 1814, when the king abolished the liberal Constitution of 1812, restored absolutism, and sent armies to reconquer the Americas.

      The royalist armies in South America were not exclusively Spanish. The bulk of royalist forces were American — creoles, mestizos, Indigenous soldiers, and pardos who fought for the Crown out of loyalty, local interest, or hostility to the creole elites who led the independence movement. In Venezuela, the llaneros initially fought for the royalists under the warlord Jose Tomas Boves. Boves's forces — composed largely of pardos and enslaved men — devastated the Second Venezuelan Republic in 1814, committing atrocities that matched or exceeded anything in Bolivar's Decree of War to the Death. Boves offered the dispossessed what the creole republicans initially would not: freedom, land, and revenge against the hacienda owners who had exploited them. The royalist cause in South America was not simply Spanish colonialism; it was also a social war within American society.

      General Pablo Morillo arrived in Venezuela in 1815 with 10,000 Spanish troops — the largest expeditionary force Spain had ever sent to the Americas. He reconquered New Granada by 1816, executing independence leaders including Camilo Torres, Francisco Jose de Caldas, and Policarpa Salavarrieta (La Pola, a woman spy for the independence movement, executed by firing squad on November 14, 1817). Morillo's campaign restored Spanish authority across most of South America by 1817, but he lacked the resources to hold it. Spain itself was in economic crisis. The Liberal revolution of 1820 — which restored the Constitution of 1812 and diverted military resources back to the peninsula — made sustained reconquest impossible.

      The royalist perspective sees the independence wars not as a liberation but as a social catastrophe orchestrated by a creole elite that replaced Spanish rule with their own. The republics that emerged did not abolish the hacienda system, did not redistribute land, did not extend political rights to Indigenous people or pardos. Venezuela's Declaration of Independence (1811) was signed by 41 creole aristocrats; the subsequent constitution restricted suffrage to property-owning males. The Spanish Crown, whatever its faults, had maintained the Laws of the Indies — a legal framework that theoretically protected Indigenous communities, regulated labor, and provided (however imperfectly) for the defense of Indigenous land rights through the Royal Protector of Indians. The republics abolished this protective apparatus along with Spanish rule, leaving Indigenous communities exposed to creole land seizure without even the theoretical recourse that colonial law had provided.

      Ferdinand VII never recognized Latin American independence. Spain did not recognize Colombia until 1881, Peru until 1879, or Honduras until 1894. The loss of the American empire — which had provided silver, gold, and trade revenue since the 16th century — contributed to Spain's decline from a global power to a second-tier European state. The empire's last remnants — Cuba, Puerto Rico, the Philippines, and Guam — were lost to the United States in 1898.
    key_arguments:
      - "Spain in 1810 was fighting Napoleon, not willfully oppressing colonies — the juntas initially claimed loyalty to Ferdinand VII"
      - "Royalist armies were largely American, not Spanish — pardos, Indigenous soldiers, and mestizos fought for the Crown"
      - "The creole republics did not liberate the masses — they replaced Spanish rule with creole oligarchy"
      - "The Laws of the Indies provided theoretical protections for Indigenous people that the republics abolished"
    sources:
      - title: "Spain, Europe and the 'Spanish Miracle,' 1700-1900"
        author: "William J. Callahan"
        year: "1984"
        type: book
      - title: "The Wars of Independence in Spanish America"
        author: "Christon Archer (ed.)"
        year: "2000"
        type: book
      - title: "Spain and the Independence of the United States: An Intrinsic Gift"
        author: "Thomas Chavez"
        year: "2002"
        type: book
    notable_quotes:
      - text: "These provinces belong to the Crown of Spain, and no assembly of rebels can dissolve the bonds that Providence has established."
        speaker: "Captain General Juan de Casas"
        context: "Proclamation in response to the Caracas junta, 1810"
      - text: "The rebels do not fight for liberty — they fight for the right to oppress those beneath them without interference from Madrid."
        speaker: "General Pablo Morillo"
        context: "Dispatch to Ferdinand VII, 1816"
    emphasized:
      - "Spain's own crisis — Napoleon's invasion — as the trigger for colonial unrest"
      - "American royalists — pardos, Indigenous soldiers, mestizos — as the majority of royalist forces"
      - "The independence movement as a creole elite project, not a popular revolution"
    omitted:
      - "300 years of colonial extraction — silver from Potosi, mercury from Huancavelica, forced Indigenous labor (mita)"
      - "The Bourbon Reforms of the 18th century, which increased colonial exploitation and resentment"
      - "The creole elite's genuine philosophical engagement with Enlightenment ideas"
      - "Spain's absolutism under Ferdinand VII — the restored king abolished the liberal constitution and ruled by decree"

  - viewpoint: "Indigenous / Afro-Latin American"
    viewpoint_type: indigenous
    region_origin: americas
    narrative: |
      The Indigenous and Afro-descendant populations of Spanish America — who constituted the majority in most regions — fought in the independence wars on both sides, for their own reasons, and received almost nothing from the outcome. The creole revolutionaries needed them as soldiers, laborers, and cannon fodder. The Spanish royalists needed them as soldiers, laborers, and cannon fodder. Neither side intended to share power with them after the fighting stopped.

      In Venezuela, the pardos (people of mixed African, European, and Indigenous descent) constituted roughly 45% of the population. Under the Spanish colonial sistema de castas, they were legally subordinated to creoles and peninsulares (Spaniards born in Spain) regardless of wealth or education. Pardo artisans, merchants, and small farmers had their own grievances against the colonial order, but they also recognized that the creole independence movement was led by the same hacienda owners who exploited them. When Jose Tomas Boves — a Spanish-born warlord who recruited pardos and enslaved people with promises of freedom and plunder — swept through Venezuela in 1813-1814, his army's violence was directed as much against the creole class as against the republican government. Boves's men burned haciendas, killed landowners, and redistributed property. The Second Republic collapsed under their assault.

      Bolivar learned from this defeat. After 1816, he actively recruited pardos and formerly enslaved people, offering freedom in exchange for military service. The llaneros of the Apure plains — who had initially fought for the royalists under Boves — switched allegiance under Jose Antonio Paez and became the backbone of Bolivar's cavalry. But the offer was selective. Bolivar freed enslaved people who fought; he did not abolish slavery. His Address at Angostura (1819) called for abolition in principle but proposed gradual emancipation — a process that, in practice, delayed full abolition in Venezuela until 1854, in Colombia until 1851, and in Ecuador until 1851. Petion's condition — "abolish slavery" — was met with a decree that applied only to soldiers.

      Indigenous communities in the Andes faced their own calculus. The Spanish colonial system had subjected them to the mita — a forced labor draft, most notoriously at the silver mines of Potosi, where an estimated 8 million Indigenous laborers died over three centuries. But the colonial system also maintained the Indigenous repúblicas de indios — semiautonomous communities with collective land tenure, their own councils, and (theoretical) legal protection through the Royal Protector of Indians. Bolivar's republics abolished these structures. The rhetoric of republican equality — "all men are citizens" — in practice dissolved the legal framework that had (however inadequately) protected Indigenous communal land from individual sale. Within decades, creole elites used republican property law to acquire Indigenous communal lands across the Andes.

      Women of all races participated in the independence wars in roles that the patriot leadership celebrated in propaganda and erased in practice. Policarpa Salavarrieta — "La Pola" — ran an intelligence network in Bogota for the independence cause before her capture and execution by firing squad on November 14, 1817. Manuela Saenz served as Bolivar's archivist, political advisor, and bodyguard; on September 25, 1828, she delayed assassins at the door while Bolivar escaped through a window, then faced the attackers alone. After Bolivar's death, she was exiled, impoverished, and denied a pension. She died in Paita, Peru, in 1856, running a small shop. The republics that Bolivar and Saenz built together denied women political rights, property rights independent of male relatives, and access to the military honors given to male veterans.

      The fundamental critique is structural: the independence wars replaced a European colonial elite with a creole colonial elite. The hacienda system survived. The casta hierarchy survived, informally. The land distribution survived. The mines continued to operate with coerced labor. An Indigenous farmer in the Andes or an enslaved African on a Venezuelan plantation experienced the transition from colony to republic as a change in the nationality of the oppressor, not as liberation.
    key_arguments:
      - "Pardos, Indigenous people, and enslaved Africans fought on both sides — and received little from either"
      - "Bolivar's emancipation was selective — freedom for soldiers, not universal abolition"
      - "Republican property law destroyed Indigenous communal land protections that even the colonial system had maintained"
      - "Women like Manuela Saenz and Policarpa Salavarrieta were essential to the revolution and erased from its rewards"
    sources:
      - title: "The Other Rebellion: Popular Violence, Ideology, and the Mexican Struggle for Independence, 1810-1821"
        author: "Eric Van Young"
        year: "2001"
        type: book
      - title: "Bolivar: American Liberator"
        author: "Marie Arana"
        year: "2013"
        type: book
      - title: "The Women of Colonial Latin America"
        author: "Susan Migden Socolow"
        year: "2000"
        type: book
    notable_quotes:
      - text: "They want liberty for themselves and slavery for us."
        speaker: "Anonymous pardo soldier"
        context: "Attributed remark during the Venezuelan independence wars, cited in John Lynch, Simon Bolivar: A Life"
      - text: "My crime is to have loved my country."
        speaker: "Policarpa Salavarrieta (La Pola)"
        context: "Spoken before her execution by firing squad, November 14, 1817"
    emphasized:
      - "The independence wars as a creole elite project — not a revolution of the masses"
      - "Selective emancipation — freedom as a military recruitment tool, not a right"
      - "Destruction of Indigenous communal land tenure under republican property law"
      - "Women's central roles, subsequent erasure, and denial of republican citizenship"
    omitted:
      - "The genuine philosophical convictions of the creole leadership — they were not solely self-interested"
      - "Bolivar's evolving views on race — he moved toward inclusion over time, however imperfectly"
      - "Some Indigenous communities actively chose sides based on their own strategic calculations"

  - viewpoint: "Monroe Doctrine / U.S. Perspective"
    viewpoint_type: bystander
    region_origin: americas
    narrative: |
      On December 2, 1823, President James Monroe delivered his seventh annual message to Congress. Buried in a 7,000-word address that covered tariffs, the budget, and relations with Russia was a passage that would define U.S. foreign policy for two centuries: "The American continents, by the free and independent condition which they have assumed and maintain, are henceforth not to be considered as subjects for future colonization by any European powers." Secretary of State John Quincy Adams — the doctrine's actual architect — had drafted the language. The Monroe Doctrine declared the Western Hemisphere a U.S. sphere of influence, framed as protection of Latin American independence, without consulting a single Latin American government.

      The doctrine's timing was not coincidental. In 1823, the Holy Alliance (Russia, Austria, Prussia, and France) was rumored to be planning an intervention to restore Spanish authority in the Americas. Britain — which had the naval power to prevent such an intervention and the commercial interest to do so (British trade with Latin America had exploded since independence) — proposed a joint Anglo-American declaration. Adams persuaded Monroe to act unilaterally. The result was a declaration that positioned the United States, not Britain, as the guarantor of Latin American sovereignty — a claim that the United States lacked the military capacity to enforce in 1823 but would exercise with increasing force over the next two centuries.

      The U.S. relationship with the Bolivarian revolutions was ambivalent. The American public and press generally supported independence — newspapers celebrated Bolivar as the "George Washington of South America." Congress debated recognition early and sent agents to observe the wars. But the government moved cautiously. Secretary of State Adams delayed recognition until 1822, fearing that premature action would provoke Spain and complicate negotiations over Florida (which the U.S. acquired from Spain in the Adams-Onis Treaty of 1819). Southern slaveholders in Congress viewed the revolutions with suspicion: Bolivar's rhetoric of emancipation, and the Haitian precedent, raised uncomfortable questions about slavery in the United States. When Bolivar invited the United States to the Congress of Panama in 1826, two American delegates were appointed — one died en route, the other arrived after the Congress had adjourned.

      The gap between American rhetoric and American action defined the relationship from the beginning. The Monroe Doctrine claimed to protect Latin American independence; in practice, it asserted U.S. hegemony. The United States did not consult Latin American governments before declaring itself their protector. Bolivar himself viewed the doctrine with skepticism — he saw it as a unilateral assertion of U.S. power, not a guarantee of Latin American sovereignty. His Congress of Panama (1826) was an attempt to create a Latin American federation that could defend itself without U.S. patronage. The United States effectively sabotaged the Congress by sending delegates who arrived too late.

      The Monroe Doctrine's subsequent application confirmed Bolivar's skepticism. The Roosevelt Corollary (1904) declared that the United States had the right to intervene in Latin American nations to maintain order and collect debts. The United States occupied Cuba (1898-1902, 1906-1909), the Dominican Republic (1916-1924), Haiti (1915-1934), Nicaragua (1912-1933), and intervened in Guatemala (1954), Chile (1973), Grenada (1983), and Panama (1989). The doctrine that claimed to protect Latin American sovereignty became the justification for violating it. Bolivar's warning — that the United States "seemed destined by Providence to plague America with torments in the name of freedom" (attributed, from the Jamaica Letter's broader argument) — proved prophetic.
    key_arguments:
      - "The Monroe Doctrine asserted U.S. hegemony over Latin America without consulting any Latin American government"
      - "U.S. recognition of Latin American independence was delayed by domestic politics — especially Southern slaveholders' fear of abolition"
      - "The gap between American rhetoric (protection of independence) and American practice (intervention, occupation, regime change) defined the relationship"
      - "Bolivar viewed U.S. influence with skepticism — the Congress of Panama was designed to create Latin American solidarity independent of Washington"
    sources:
      - title: "The Monroe Doctrine: Empire and Nation in Nineteenth-Century America"
        author: "Jay Sexton"
        year: "2011"
        type: book
      - title: "Simon Bolivar: A Life"
        author: "John Lynch"
        year: "2006"
        type: book
      - title: "The Cambridge History of Latin America, Volume III"
        author: "Leslie Bethell (ed.)"
        year: "1985"
        type: book
    notable_quotes:
      - text: "The American continents, by the free and independent condition which they have assumed and maintain, are henceforth not to be considered as subjects for future colonization by any European powers."
        speaker: "James Monroe"
        context: "Monroe Doctrine, Annual Message to Congress, December 2, 1823"
      - text: "The United States seems destined by Providence to plague America with torments in the name of freedom."
        speaker: "Simon Bolivar"
        context: "Attributed, widely cited from the Jamaica Letter period; exact source disputed"
    emphasized:
      - "The Monroe Doctrine as a unilateral U.S. assertion of hemispheric dominance"
      - "Domestic U.S. politics — slavery, Florida, commercial interests — shaping Latin American policy"
      - "The doctrine's evolution from protective rhetoric to interventionist practice"
    omitted:
      - "The genuine popular enthusiasm for Latin American independence in the United States"
      - "Britain's role as the actual naval guarantor of Latin American independence in the 1820s"
      - "Latin American agency — the revolutions succeeded through Latin American military effort, not U.S. protection"
      - "The internal dynamics of the independence wars — the U.S. perspective tends to view Latin America as an object of policy, not a set of actors"

