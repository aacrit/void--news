summary: |
  On July 5, 1811, the Congress of Venezuela declared independence from Spain. By July 1812, the republic was finished. An earthquake on March 26, 1812 — centered on Caracas, killing an estimated 10,000 people — destroyed the patriot strongholds while leaving royalist cities intact. The Catholic clergy declared the earthquake divine punishment for rebellion. Simon Bolivar, a 28-year-old creole aristocrat who had inherited copper mines, cacao plantations, and enslaved laborers, escaped to Cartagena. He wrote a manifesto. He raised a new army. He invaded Venezuela from the west. He won. He lost again. He fled to Jamaica. He wrote another manifesto. He fled to Haiti, where Alexandre Petion, the president of the southern republic, gave him 7 ships, 250 soldiers, weapons, ammunition, and a printing press — in exchange for a single condition: abolish slavery.

  Bolivar returned to Venezuela in 1816 and issued a decree of emancipation — but applied it only to enslaved people who joined the army. The full abolition Petion demanded did not come during Bolivar's lifetime. The wars that followed were not gentlemen's campaigns. The "Decree of War to the Death" (Decreto de Guerra a Muerte), issued by Bolivar on June 15, 1813, declared that any Spaniard who did not actively support independence would be executed, while any American — regardless of actions — would be spared. The decree reflected the war's character: extermination, not negotiation. In the eastern plains (llanos), cavalry armies under Jose Antonio Paez — llaneros, the horsemen of the Venezuelan grasslands — fought with lances, machetes, and a ferocity that terrified both sides. Paez had been a cattle herder. His riders had been enslaved workers, fugitives, mixed-race farmers. They fought not for Enlightenment principles but for land, freedom, and the promise that the old order would not return.

  The military tide turned at the Battle of Boyaca on August 7, 1819, when Bolivar's army — having crossed the flooded Orinoco basin, climbed the frozen Andes passes at 13,000 feet, and arrived in the highlands of New Granada with half its men — surprised the Spanish royalist force and won in two hours. Bolivar entered Bogota three days later. By 1822, Antonio Jose de Sucre had liberated Quito (Battle of Pichincha, May 24, 1822). By 1824, Sucre had broken the last Spanish army at the Battle of Ayacucho in Peru — the battle that ended 300 years of Spanish rule on the South American continent. Bolivar's dream was a single South American republic — Gran Colombia — stretching from Panama to Bolivia. By 1830, it had splintered into Venezuela, Colombia, and Ecuador. Bolivar, exiled from the country he had liberated, died of tuberculosis at age 47 in a borrowed house in Santa Marta, Colombia, on December 17, 1830. His last words, by multiple accounts: "Let us go. These people do not want us here."

significance: |
  The Bolivarian revolutions ended 300 years of Spanish colonial rule across South America, creating six independent nations (Venezuela, Colombia, Ecuador, Peru, Bolivia, Panama) from the wreckage of the viceroyalties of New Granada and Peru. The wars killed an estimated 500,000 to 1,000,000 people — Venezuela lost between one-quarter and one-third of its population. Bolivar's "Jamaica Letter" (1815) articulated the first comprehensive vision of Latin American political identity separate from both Spain and the United States. His dream of continental unity — Gran Colombia — lasted nine years (1821-1830) before fracturing along the regional, racial, and personal rivalries that he had held together by force of personality and military command. The Monroe Doctrine (1823), declared while Bolivar's wars were still underway, asserted U.S. hegemony over the Western Hemisphere under the guise of protecting Latin American independence — a claim Bolivar himself neither requested nor endorsed. The Congress of Panama (1826), Bolivar's attempt to create a pan-American federation, failed when only 4 of the 10 invited nations attended. The independence he won produced not Bolivar's unified republic but 15 separate nations, most governed by military strongmen (caudillos) for the following century.

