connections:
  - target_slug: french-revolution
    connection_type: influenced
    description: "Bolivar studied in Paris, witnessed Napoleon's coronation, and drew on Enlightenment political philosophy — the French Revolution's ideas of popular sovereignty and republicanism shaped the independence movements"
  - target_slug: haitian-revolution
    connection_type: influenced
    description: "Petion gave Bolivar ships, soldiers, and arms in 1816 in exchange for a promise to abolish slavery — Haiti's revolution directly enabled the Bolivarian campaigns and connected the two independence movements through the politics of emancipation"
  - target_slug: transatlantic-slave-trade
    connection_type: consequence
    description: "The wars ended Spanish colonial rule but did not immediately end slavery — full abolition in the Bolivarian republics came only in the 1850s, three decades after independence"
