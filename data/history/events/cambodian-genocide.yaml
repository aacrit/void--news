- viewpoint: Cambodian Survivor / Refugee
  viewpoint_type: vanquished
  region_origin: southeast-asia
  narrative: 'Loung Ung was five years old when the soldiers came. Her father, a military police captain under the Lon Nol
    government, told the family to split up to survive. He was taken by Khmer Rouge cadres and never returned. Her mother
    was taken next. Two of her sisters disappeared. Loung, assigned to a children''s work brigade, dug irrigation ditches
    12 hours a day on a daily ration of a single bowl of watered rice. She watched a six-year-old girl beaten to death with
    a hoe for stealing a handful of rice. Her memoir, "First They Killed My Father" (2000), was translated into 17 languages
    and adapted into a 2017 film directed by Angelina Jolie.


    The evacuation of April 17, 1975, was experienced by urban Cambodians as the end of the world. Families carried what they
    could — bags of rice, cooking pots, photographs, gold — and walked for days or weeks to destinations they were not told
    in advance. Those who fell behind were shot. Those who admitted to being soldiers, civil servants, teachers, or doctors
    were separated from the column and killed. At checkpoints, cadres searched belongings for books, eyeglasses, foreign currency,
    or any evidence of education. Wearing glasses could be a death sentence — the regime associated them with literacy and
    intellectual life.


    In the cooperatives, survival depended on invisibility. Workers who appeared too clean, too pale, or too soft-handed were
    identified as "new people" — former city dwellers — and assigned the hardest labor with the smallest rations. "Base people"
    — peasants who had lived in Khmer Rouge zones before 1975 — received larger rations and supervisory roles, though they
    too were subject to execution for infractions. The workday ran from dawn to past dark, with a midday break for thin rice
    gruel. Workers who collapsed from exhaustion were sometimes left where they fell. Medical care consisted of herbal remedies
    administered by teenage cadres with no training; the regime had expelled or killed the country''s doctors.


    Starvation was the primary killer. The regime exported rice to China while its own population starved. Workers caught
    foraging — eating leaves, insects, lizards, snails, or bark — faced execution for "individualism." Dith Pran described
    eating tarantulas, crickets, and scorpions to stay alive. Haing Ngor, a Cambodian doctor who survived the regime and later
    played Dith Pran in "The Killing Fields" (winning the 1985 Academy Award for Best Supporting Actor), wrote in his memoir
    "Survival in the Killing Fields" (1987) that he watched his pregnant wife die of starvation and untreated illness because
    revealing his medical training would have meant execution.


    The killing sites — more than 20,000 mass graves identified across Cambodia by the Documentation Center of Cambodia (DC-Cam)
    — were not hidden. The largest, Choeung Ek, 15 kilometers south of Phnom Penh, contains an estimated 20,000 bodies in
    129 mass graves. Prisoners were brought from S-21 and other detention centers, forced to kneel at the edge of pits, and
    killed with iron bars, bamboo sticks, machetes, and palm-leaf stems sharpened to a cutting edge. Bullets were considered
    too expensive. A loudspeaker played revolutionary music to cover the screams.


    The Vietnamese invasion of January 1979 ended the regime but not the suffering. Hundreds of thousands of Cambodians fled
    to refugee camps along the Thai border, where they waited — some for years — for resettlement. The Khao-I-Dang camp, the
    largest, held 140,000 people at its peak. The United States accepted approximately 150,000 Cambodian refugees between
    1975 and 1994. The refugee community in Long Beach, California — estimated at 50,000 — is the largest Cambodian population
    outside Southeast Asia. Post-traumatic stress disorder, depression, and survivor''s guilt mark the diaspora: a 2005 study
    by the Harvard Program in Refugee Trauma found that 62% of Cambodian refugees in the United States met diagnostic criteria
    for PTSD, and 51% met criteria for major depression — 25 years after the events.

    '
  key_arguments:
  - The evacuation of Phnom Penh was experienced as the end of urban Cambodian civilization
  - Starvation — not execution — was the primary killer; the regime exported rice while its people died
  - Wearing glasses, speaking a foreign language, or having soft hands could be a death sentence
  - 'Refugee trauma persists: 62% of Cambodian refugees in the U.S. met PTSD criteria 25 years later'
