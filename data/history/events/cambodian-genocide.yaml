perspectives:
- viewpoint: Democratic Kampuchea / Khmer Rouge Ideological
  viewpoint_type: victor
  region_origin: southeast-asia
  narrative: 'The Khmer Rouge presented their revolution as Cambodia''s liberation from three overlapping forms of domination:
    French colonialism (1863-1953), American imperialism (1955-1975), and the corruption of the Lon Nol military government
    (1970-1975). The United States had secretly bombed eastern Cambodia between 1969 and 1973 — Operation Menu and Operation
    Freedom Deal dropped an estimated 2.7 million tons of ordnance on Cambodian territory, more than the Allies dropped on
    Japan in all of World War II. An estimated 100,000-150,000 Cambodian civilians died in the bombing. The Khmer Rouge recruited
    heavily from the bombed rural population, whose rage at the destruction of their villages was channeled into revolutionary
    fervor.


    The party''s ideology drew from three sources: Marxism-Leninism as filtered through the French Communist Party (where
    Pol Pot, Khieu Samphan, and Ieng Sary studied in Paris in the early 1950s), Maoist agrarianism (the Great Leap Forward''s
    vision of peasant-powered industrialization), and a specifically Khmer nationalism rooted in nostalgia for the Angkor
    Empire (802-1431), when the Khmer kingdom controlled much of mainland Southeast Asia. The party cadre saw themselves as
    restoring Cambodia''s greatness by purging foreign influence — Vietnamese, Chinese, Thai, Western — and returning to the
    agrarian purity that, in their mythology, had built Angkor Wat.


    The evacuation of Phnom Penh was framed as a military necessity. Party documents captured after the fall of the regime
    described the cities as "parasitic" — filled with merchants, bureaucrats, and intellectuals who produced nothing. The
    countryside, where 85% of Cambodians already lived, was the revolution''s base. Moving the urban population to agricultural
    cooperatives would simultaneously eliminate class distinctions, increase rice production, and deny the enemy (variously
    defined as the CIA, the Vietnamese, and the old Cambodian elite) its social base. The party''s economic plan called for
    tripling rice production within three years through collective labor and irrigation — targets that were politically mandated,
    not agronomically feasible.


    The internal purges that consumed the party from 1976 onward reflected the regime''s paranoia about enemies within. S-21
    processed not only suspected counter-revolutionaries but Khmer Rouge cadres accused of working for the CIA, the KGB, or
    Vietnam. The Eastern Zone purge of 1977-1978 — in which the party liquidated its own commanders and their followers for
    alleged Vietnamese sympathies — killed an estimated 100,000 people and drove survivors, including Heng Samrin, to defect
    to Vietnam. These defectors provided the Vietnamese with the military intelligence and political legitimacy for the December
    1978 invasion.


    The regime never acknowledged the scale of killing. Pol Pot, in a rare interview with Nate Thayer for the Far Eastern
    Economic Review in October 1997, stated: "I came to carry out the struggle, not to kill people. Even now, and you can
    look at me: am I a savage person? My conscience is clear." He died on April 15, 1998, in a bamboo shack near the Thai
    border, reportedly of heart failure. His body was burned on a pile of tires and old furniture before any autopsy could
    be performed.

    '
  key_arguments:
  - American bombing of Cambodia (2.7 million tons of ordnance, 1969-1973) created the conditions for revolution
  - Cities were 'parasitic' — the revolution required returning to agrarian purity
  - The evacuation was a military and economic necessity, not an act of cruelty
  - Internal enemies and foreign agents (CIA, Vietnam) forced defensive purges
