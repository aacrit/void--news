  - Quantitative documentation of ethnic targeting and death tolls by category
  - The self-documenting nature of the regime — confessions, photographs, execution logs
  - 'Comparative classification: communist revolution, ultranationalist genocide, or both'
  omitted:
  - The lived experience of individual survivors in favor of aggregate data
  - Vietnamese conduct during and after the invasion
  - Cambodian domestic politics and the role of Hun Sen in delaying and limiting the tribunal
media:
- media_type: photograph
  title: Tuol Sleng (S-21) prisoner photographs
  description: The former Tuol Svay Prey High School, converted into Security Prison 21 by the Khmer Rouge. Each of the estimated
    14,000-17,000 prisoners was photographed on arrival. The photographs — showing men, women, and children, many visibly
    terrified, wearing numbered tags — are displayed on the walls of the Tuol Sleng Genocide Museum.
  source_url: https://commons.wikimedia.org/wiki/File:Tuol_Sleng_Genocide_Museum.jpg
  attribution: Adam Carr, CC BY-SA 3.0, via Wikimedia Commons
  license: cc-by-sa
  creator: Adam Carr
  creation_date: '2005'
- media_type: photograph
  title: Skulls at the Choeung Ek Killing Field memorial
  description: The memorial stupa at Choeung Ek, 15 kilometers south of Phnom Penh, contains approximately 8,000 skulls arranged
    behind glass panels. Choeung Ek was the primary execution site for S-21 prisoners; 129 mass graves have been excavated,
    containing an estimated 20,000 bodies.
  source_url: https://commons.wikimedia.org/wiki/File:Choeungek2.JPG
  attribution: Bong Vat, CC BY-SA 3.0, via Wikimedia Commons
  license: cc-by-sa
  creator: Bong Vat
  creation_date: '2007'
- media_type: artwork
  title: Vann Nath painting — waterboarding at S-21
  description: One of approximately 40 paintings by Vann Nath, one of the 7 known survivors of S-21, depicting torture methods
    used at the prison. Vann Nath was kept alive because the regime needed a painter to produce portraits of Pol Pot. His
    paintings, created after liberation, hang in the Tuol Sleng Genocide Museum.
  source_url: https://commons.wikimedia.org/wiki/File:Vann_Nath_Painting.jpg
  attribution: Vann Nath, via Wikimedia Commons
  license: public-domain
  creator: Vann Nath
