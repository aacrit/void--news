- viewpoint: Vietnamese Liberator
  viewpoint_type: bystander
  region_origin: southeast-asia
  narrative: 'Vietnam''s invasion of Cambodia on December 25, 1978, was the event that ended the genocide, and it was punished
    for it. The United States, China, and ASEAN condemned the invasion as a violation of sovereignty. China launched a retaliatory
    border war against Vietnam in February 1979, sending 200,000 troops across the northern border in a 29-day conflict that
    killed an estimated 20,000 Vietnamese soldiers. The Western bloc and China ensured that the deposed Khmer Rouge coalition
    — not the Vietnamese-installed government — retained Cambodia''s seat at the United Nations until 1991. Vietnam, already
    under U.S. trade embargo since 1975, faced additional sanctions. The country that stopped the killing was treated as the
    aggressor.


    The Vietnamese perspective on the invasion centers on three factors: border provocations, refugee flows, and ideological
    betrayal. From 1977 onward, Khmer Rouge forces conducted cross-border raids into Vietnamese territory, attacking villages
    in Tay Ninh, An Giang, and Kien Giang provinces. The April 1978 massacre at Ba Chuc in An Giang province killed 3,157
    Vietnamese civilians in two days — bodies were found in wells, pagodas, and rice paddies. Vietnam maintains the Ba Chuc
    Massacre Memorial, which displays skulls and bones in a concrete ossuary similar to Cambodia''s own genocide memorials.
    The border raids, combined with the Eastern Zone purge — in which the Khmer Rouge killed ethnic Vietnamese living in Cambodia
    and purged pro-Vietnamese cadres — drove defectors into Vietnam and provided Hanoi with both casus belli and local allies.


    The ideological dimension was acute. Vietnam and Cambodia were nominally communist allies, both recipients of Soviet and
    Chinese support during their respective wars against the United States. But the Khmer Rouge aligned with China while Vietnam
    aligned with the Soviet Union, mirroring the Sino-Soviet split. Pol Pot regarded Vietnam as Cambodia''s historical enemy
    — the Khmer Empire had lost territory to Vietnamese expansion over centuries, and the party''s nationalism incorporated
    deep anti-Vietnamese sentiment. The slogan "Whoever has a Cambodian body but a Vietnamese head shall be eliminated" expressed
    a racial hatred that targeted the 400,000-500,000 ethnic Vietnamese living in Cambodia, most of whom were killed or expelled
    between 1975 and 1978.


    The Vietnamese military operation was swift and decisive. Four divisions — approximately 150,000 troops supported by armor
    and artillery — crossed the border on December 25. Phnom Penh fell on January 7, 1979. The Khmer Rouge offered limited
    resistance and retreated to the western mountains and the Thai border. Vietnam installed the People''s Republic of Kampuchea
    under Heng Samrin (a Khmer Rouge Eastern Zone defector) and maintained an occupation force of 150,000-200,000 troops in
    Cambodia until 1989. The occupation cost Vietnam an estimated $1 million per day in a period when the country''s own economy
    was devastated by war, embargo, and the failure of agricultural collectivization.


    Vietnamese soldiers entering Phnom Penh found a ghost city. The population, forcibly evacuated in April 1975, had not
    returned. The Central Market was empty. The National Bank had been dynamited. Currency was scattered in the streets —
    the regime had abolished money on the first day. At Tuol Sleng, Vietnamese journalist Ho Van Tay was among the first to
    enter the former school and discover the prison records, the photographs, and the bodies of the last prisoners, killed
    by their guards as the Vietnamese advanced. The Vietnamese military filmed and photographed the evidence, and the Tuol
    Sleng Genocide Museum — opened in 1980 under Vietnamese supervision — became the primary memorial site.


    The Vietnamese narrative frames the invasion as humanitarian intervention before the term existed in international law.
    Hanoi argues that it acted to stop a genocide, protect its own border population, and remove a hostile regime that threatened
    regional security. Western and Chinese opposition, in this reading, reflected Cold War priorities — containing Soviet-aligned
    Vietnam — rather than any principled commitment to Cambodian sovereignty. The historical irony is that the Responsibility
    to Protect (R2P) doctrine, adopted by the UN in 2005 partly in response to failures in Rwanda and Bosnia, describes exactly
    the kind of intervention Vietnam carried out in 1978 — but Vietnam was condemned for it.

    '
  key_arguments:
  - Vietnam invaded Cambodia to stop the genocide and protect its own border population from Khmer Rouge raids
  - The Ba Chuc massacre (April 1978, 3,157 Vietnamese civilians killed) was the immediate trigger
  - The United States, China, and ASEAN condemned the invasion and kept the Khmer Rouge at the UN until 1991
  - Vietnam's action was R2P before R2P existed — and it was punished, not praised
