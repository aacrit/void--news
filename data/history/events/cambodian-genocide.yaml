slug: cambodian-genocide
title: The Cambodian Genocide
subtitle: S-21 prison photographed every prisoner before execution — 14,000 faces, 7 survivors
date_display: 1975-1979
date_sort: 1975
date_precision: year
era: contemporary
region: southeast-asia
country: Cambodia
category: genocide
severity: catastrophic
death_toll: 1.5-2 million (approximately one quarter of Cambodia's population)
affected_population: Entire Cambodian population of approximately 7.9 million subjected to forced evacuation, labor, starvation,
  and political purges
duration: 3 years, 8 months, and 20 days (April 17, 1975 - January 7, 1979)
hero_image_url: https://upload.wikimedia.org/wikipedia/commons/3/38/Tuol_Sleng_Genocide_Museum.jpg
hero_image_attribution: Adam Carr, CC BY-SA 3.0, via Wikimedia Commons
summary: 'On the morning of April 17, 1975, Khmer Rouge soldiers in black uniforms entered Phnom Penh and ordered the city
  emptied. Within 48 hours, 2 million residents — hospital patients wheeled in their beds, monks in saffron robes, women in
  labor — were marched at gunpoint into the countryside. The soldiers told them the evacuation was temporary: three days,
  maybe a week, until the Americans stopped bombing. The Americans had already stopped bombing. The evacuation was permanent.


  The regime that emptied Phnom Penh called itself Democratic Kampuchea. Its leader, Saloth Sar — known as Pol Pot — had studied
  radio electronics in Paris in the early 1950s, where he joined the French Communist Party and absorbed a blend of Marxism-Leninism
  and Khmer nationalism. His revolution aimed to restart Cambodian civilization at Year Zero: no money, no markets, no schools,
  no religion, no private property, no cities. Cambodia would become an agrarian utopia of rice paddies worked by a classless
  peasantry. Anyone who represented the old society — teachers, doctors, monks, ethnic minorities, anyone who wore glasses
  or spoke a foreign language — was an enemy to be "smashed."


  The country was reorganized into agricultural cooperatives where 12- to 16-hour workdays were mandatory. Rice production
  targets bore no relationship to agricultural reality; cadres reported yields of 3 tons per hectare when actual harvests
  produced 1 ton. The surplus was exported to China in exchange for military equipment. The resulting famine killed hundreds
  of thousands. At the Trapeang Thma Dam in Battambang Province, 10,000 workers labored with hand tools to build an irrigation
  system designed by cadres with no engineering training. An estimated 4,000 died of exhaustion, starvation, and execution
  during construction. The dam failed.


  Tuol Sleng, a former high school in Phnom Penh redesignated Security Prison 21 (S-21), processed an estimated 14,000-17,000
  prisoners between 1975 and 1979. Each arrival was photographed — a bureaucratic ritual that produced an archive of faces
  staring into the camera moments before interrogation, forced confession, and execution. The prison''s commander, Kaing Guek
  Eav — known as "Duch" — maintained meticulous records: prisoner logs, confession transcripts, execution schedules. Of the
  thousands who entered S-21, between 7 and 12 survived. Among them was Vann Nath, a painter who was kept alive because the
  regime needed someone to produce portraits of Pol Pot. After liberation, Vann Nath painted the tortures he witnessed — waterboarding,
  electrocution, the extraction of fingernails — in canvases that now hang in the Tuol Sleng Genocide Museum.


  On December 25, 1978, 150,000 Vietnamese troops crossed the Cambodian border. By January 7, 1979, they had taken Phnom Penh.
  The Khmer Rouge fled westward to the Thai border, where they reconstituted as a guerrilla force that continued fighting
  until 1999. The Vietnamese-installed People''s Republic of Kampuchea governed Cambodia for the next decade, but the United
  States, China, and ASEAN recognized the deposed Khmer Rouge coalition''s seat at the United Nations until 1991 — a Cold
  War calculation that prioritized anti-Vietnamese containment over accountability for genocide.

  '
significance: 'The Extraordinary Chambers in the Courts of Cambodia (ECCC), established in 2003 after a decade of negotiations
  between the Cambodian government and the United Nations, was the first hybrid international-domestic tribunal for genocide.
  It convicted three people: Duch (2010, 35 years, later life), Nuon Chea (2018, life), and Khieu Samphan (2018, life). Pol
  Pot died in 1998 without facing trial. The tribunal cost $337 million and took 16 years to complete — longer than the regime
  itself lasted. Cambodia''s population in 1979 was approximately 6 million, down from 7.9 million in 1975; the median age
  in Cambodia as of 2023 was 26, meaning more than half the population was born after the genocide. The destruction of Cambodia''s
  educated class — teachers, doctors, engineers, lawyers — produced effects measurable decades later: in 1979, the country
  had fewer than 50 doctors, fewer than 5,000 people with a secondary education, and no functioning judiciary, banking system,
  or postal service. Dith Pran, the Cambodian journalist whose story became the 1984 film "The Killing Fields," testified
  that he survived by eating bark, insects, and the flesh of dead animals. He spent four years under the regime before escaping
  to Thailand.

  '
