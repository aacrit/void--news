connections:
- target_slug: rwandan-genocide
  connection_type: parallel
  description: Both genocides were state-organized, bureaucratically documented, and occurred while the international community
    failed to intervene — the Cambodian precedent of inaction was repeated 15 years later in Rwanda
- target_slug: fall-of-berlin-wall
  connection_type: influenced
  description: 'Cold War alignments shaped the genocide''s aftermath: the U.S. and China supported the Khmer Rouge''s UN seat
    to contain Soviet-aligned Vietnam, a calculus that ended only with the Cold War''s conclusion and the 1991 Paris Peace
    Accords'
- target_slug: hiroshima-nagasaki
  connection_type: parallel
  description: The U.S. bombing of Cambodia (2.7 million tons, 1969-1973) — exceeding the total tonnage dropped on Japan in
    WWII — destabilized the country and drove rural Cambodians into the Khmer Rouge's ranks
