- viewpoint: Tibetan and Ethnic Minority
  viewpoint_type: indigenous
  region_origin: east-asia
  narrative: 'In 1959, the Dalai Lama fled Tibet after a failed uprising against Chinese rule. By 1966, when the Cultural
    Revolution began, Tibet had already experienced seven years of "democratic reform" — the dismantling of the traditional
    feudal-theocratic system, the redistribution of monastic lands, and the forced secularization of daily life. The Cultural
    Revolution intensified every element. What had been political reform became cultural annihilation.


    Of Tibet''s estimated 6,259 monasteries, approximately 6,000 were damaged or destroyed during the Cultural Revolution.
    Many had already been weakened in the 1959 crackdown, but the Red Guards completed the destruction. Ganden Monastery,
    one of the three great Gelug monasteries founded in 1409, was dynamited. Monks were forced to publicly desecrate religious
    objects, trample thangka paintings, and denounce the Dalai Lama. Those who refused were subjected to struggle sessions
    — the thamzing, adapted from Chinese practice but applied with particular intensity in Tibet because religious identity
    was inseparable from ethnic identity.


    Tsering Shakya''s The Dragon in the Land of Snows (1999) documents how the Cultural Revolution in Tibet had a dual character:
    it was both the Maoist campaign against the Four Olds and a campaign against Tibetan national identity. Tibetan language
    instruction was suspended. Tibetan dress was banned. The traditional greeting — palms together — was replaced by a clenched
    fist. Nomads were forced into communes. The destruction of monasteries was not merely an attack on "feudal superstition"
    — it was the elimination of institutions that had served as schools, hospitals, courts, and centers of Tibetan literary
    culture for a thousand years.


    In Inner Mongolia, the "Inner Mongolia People''s Revolutionary Party Incident" (1968-1969) targeted ethnic Mongolians
    accused of belonging to a separatist organization that likely did not exist. An estimated 346,000 people were detained,
    16,222 killed, and 87,000 permanently disabled, according to figures compiled after the Cultural Revolution ended. In
    Xinjiang, Uyghur mosques were closed, Arabic-script texts burned, and religious leaders forced into self-criticism. In
    Yunnan, the Dai people''s Buddhist temples were destroyed and their water-splashing festival banned.


    The pattern across ethnic minority regions was consistent: the Cultural Revolution''s assault on traditional culture fell
    disproportionately on peoples whose identities were defined by traditions the campaign sought to destroy. For Han Chinese,
    the Four Olds were customs that could, in theory, be replaced by revolutionary culture. For Tibetans, Mongolians, Uyghurs,
    and other minorities, the Four Olds were their civilization. The destruction was not collateral damage. It was the point.

    '
  key_arguments:
  - The Cultural Revolution in minority regions was both political campaign and cultural genocide — ethnic identity was inseparable
    from the "Four Olds" targeted for destruction
  - 6,000 of 6,259 Tibetan monasteries were damaged or destroyed — institutions that had served as the infrastructure of Tibetan
    civilization
  - The Inner Mongolia incident killed 16,222 ethnic Mongolians in a purge targeting a likely fictitious separatist organization
  - For ethnic minorities, the destruction of traditional culture was not incidental to the revolution — it was the mechanism
    through which the revolution operated
  sources:
  - title: 'The Dragon in the Land of Snows: A History of Modern Tibet Since 1947'
    author: Tsering Shakya
    year: '1999'
    type: book
  - title: 'Tibet and the Chinese People''s Republic: A Report to the International Commission of Jurists'
    author: International Commission of Jurists
    year: '1960'
    type: archive
  - title: 'Forbidden Memory: Tibet During the Cultural Revolution'
    author: Tsering Woeser
    year: '2006'
    type: book
  notable_quotes:
  - text: They destroyed our monasteries, burned our scriptures, and forced monks to copulate in public to prove that religion
      was a lie. What they could not destroy was what we carried in our memory.
    speaker: Anonymous Tibetan monk
    context: Quoted in oral history collections from the Tibetan exile community
  - text: The Cultural Revolution in Tibet was unique because it aimed not just at political transformation but at the eradication
      of an entire civilization.
    speaker: Tsering Shakya
    context: The Dragon in the Land of Snows, 1999
  emphasized:
  - Destruction of 6,000 monasteries as the elimination of Tibetan civilizational infrastructure
  - Ethnic identity as inseparable from the "Four Olds" targeted for destruction
  - Inner Mongolia purge as evidence of ethnic dimension beyond class struggle
  - Disproportionate impact on minority peoples whose cultures were defined by traditions the campaign destroyed
  omitted:
  - Genuine feudal exploitation within the pre-1959 Tibetan theocratic system (serfdom, debt bondage)
  - Tibetan Red Guards who participated in the destruction — the revolution was not purely imposed from outside
  - Post-Cultural Revolution reconstruction of some monasteries under state supervision
  - Han Chinese who also suffered enormously — the minority experience was distinct but not exclusive
