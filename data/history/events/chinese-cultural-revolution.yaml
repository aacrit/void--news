- viewpoint: CCP Post-Mao Historical Assessment
  viewpoint_type: academic
  region_origin: east-asia
  narrative: 'The Resolution on Certain Questions in the History of Our Party Since the Founding of the People''s Republic
    of China, adopted on June 27, 1981, was the Party''s official reckoning with the Cultural Revolution. Drafted over two
    years under Deng Xiaoping''s supervision, with 4,000 senior cadres consulted, the Resolution declared the Cultural Revolution
    "responsible for the most severe setback and the heaviest losses suffered by the Party, the state, and the people since
    the founding of the People''s Republic." It attributed the disaster to Mao''s errors in his later years — specifically,
    his theory of "continuing revolution under the dictatorship of the proletariat." But it preserved the framework: "Comrade
    Mao Zedong was a great Marxist and a great proletarian revolutionary, strategist, and theorist. It is true that he made
    gross mistakes during the Cultural Revolution, but, if we judge his activities as a whole, his contributions to the Chinese
    revolution far outweigh his mistakes."


    The 70/30 formula — Mao was 70 percent correct and 30 percent wrong — was not in the Resolution''s text but was attributed
    to Deng in private discussions about how to frame it. The formula served a precise political function. It allowed the
    Party to repudiate the Cultural Revolution while maintaining Mao as a founding legitimacy. Without Mao, the Party''s claim
    to power — rooted in the 1949 revolution — would require a different foundation. Deng, who had been purged twice by the
    very system he was now leading, understood that condemning Mao entirely would mean condemning the Party that followed
    him.


    The 1981 Resolution''s framework has constrained Chinese historiography ever since. Scholars in China can write about
    the Cultural Revolution within the bounds the Resolution defines: acknowledging suffering, attributing blame to the Gang
    of Four and to Mao''s "later errors," but never questioning the Party system itself. Work that crosses these boundaries
    — Song Yongyi''s database of Cultural Revolution documents at the Chinese University of Hong Kong, Yang Jisheng''s investigations,
    online memoirs that circulated briefly before censorship — has been produced outside official channels.


    Under Xi Jinping, the space has narrowed further. The 2021 Resolution on the Major Achievements and Historical Experience
    of the Party over the Past Century — the Party''s third historical resolution, after 1945 and 1981 — compressed the entire
    Cultural Revolution into a single paragraph. Where the 1981 Resolution devoted several thousand words to analyzing what
    went wrong, the 2021 version acknowledged the period only to move past it. Xi''s father, Xi Zhongxun, was purged during
    the Cultural Revolution and spent 16 years in detention and internal exile. Xi Jinping himself was sent to Liangjiahe
    village in Shaanxi province at age 15, where he lived in a cave dwelling for seven years. The current leadership''s personal
    experience of the revolution has not produced a more open reckoning — it has produced a more determined effort to control
    the narrative.


    The Party''s position can be summarized: the Cultural Revolution was a catastrophic error, acknowledged, corrected, and
    overcome. The system that produced it has been reformed. The discussion is closed.

    '
  key_arguments:
  - The 1981 Resolution's 70/30 formula preserved Party legitimacy while admitting Mao's catastrophic errors
  - Condemning Mao entirely would undermine the Party's founding narrative and claim to power
  - The framework constrains Chinese historiography — suffering can be described but systemic causes cannot be questioned
  - The 2021 Resolution further narrows the space for discussion, reducing the decade to a single paragraph
