legacy_points:
- Destroyed an estimated 6,000 Tibetan monasteries and countless cultural artifacts across China
- Created the "lost generation" — 17 million urban youth sent to the countryside, losing a decade of education
- The 1981 Resolution's "70/30" formula preserved Mao's legitimacy while admitting catastrophic error — a formula still binding
  on Chinese historiography
- Xi Jinping and much of China's current leadership were shaped by the revolution they survived
- Public discussion of the Cultural Revolution remains restricted in China — the 2021 party resolution reduced it to a single
  paragraph
