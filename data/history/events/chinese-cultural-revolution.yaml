country: China
category: political
severity: catastrophic
death_toll: 500,000 to 2 million (estimates vary widely; the CCP's 1981 Resolution on Party History did not give a number)
affected_population: Entire Chinese population (~740 million); an estimated 36 million persecuted; 17 million "sent-down youth"
  relocated to countryside
duration: 10 years (1966-1976)
summary: 'On May 16, 1966, the Chinese Communist Party''s Central Committee issued Circular 516, drafted under Mao Zedong''s
  direction. It accused Party leadership of harboring "counter-revolutionary revisionists" who planned to restore capitalism.
  The circular called on the masses to identify and destroy these enemies. Within weeks, students at Tsinghua University Middle
  School formed the first Red Guard unit. By August, millions of teenagers wearing red armbands and carrying Mao''s Little
  Red Book were beating their teachers, ransacking homes, and destroying temples, libraries, and ancestral shrines. Mao reviewed
  over 11 million Red Guards in eight mass rallies at Tiananmen Square between August and November 1966.


  The violence was not random. It followed a political logic. Mao had been sidelined within the Party after the Great Leap
  Forward (1958-1962) killed an estimated 15-45 million people through famine. Liu Shaoqi and Deng Xiaoping had implemented
  pragmatic economic reforms that pulled China back from catastrophe — but in doing so, they had diminished Mao''s authority.
  The Cultural Revolution was Mao''s instrument for reclaiming power by going over the heads of the Party apparatus, directly
  to the masses. "Bombard the headquarters," he wrote in a big-character poster on August 5, 1966. The headquarters was his
  own party.


  Liu Shaoqi, China''s head of state, was denounced as "China''s Khrushchev" and "the biggest capitalist roader in the Party."
  He was dragged to struggle sessions, beaten, denied medication for diabetes and pneumonia, and died on November 12, 1969,
  on the floor of a detention cell in Kaifeng. His body was cremated under a false name. Deng Xiaoping was purged twice, sent
  to work in a tractor factory in Jiangxi province. His son, Deng Pufang, was thrown from a window at Peking University by
  Red Guards and permanently paralyzed.


  The destruction of cultural heritage was systematic. Red Guards destroyed temples, burned books, smashed Confucian tablets,
  desecrated graves. In Qufu, Confucius''s birthplace, the Kong family cemetery was excavated and remains were scattered.
  In Tibet, an estimated 6,000 of 6,259 monasteries were damaged or destroyed. The Beijing Temple of Confucius was vandalized.
  Private libraries accumulated over generations were hauled into the street and burned. The scholar and playwright Wu Han
  — whose historical play Hai Rui Dismissed from Office had been identified by Mao''s wife Jiang Qing as an allegory attacking
  Mao — was one of the first prominent victims. He died in prison in 1969.


  By 1968, the Red Guard factions had fragmented into competing armed groups fighting each other. In Guangxi province, factional
  warfare killed an estimated 100,000-150,000 people. Cannibalism was documented in Wuxuan County — Zheng Yi''s Scarlet Memorial
  (1996) records cases of victims being consumed in acts of political ritual. Mao deployed the People''s Liberation Army to
  restore order and initiated the "Up to the Mountains, Down to the Countryside" movement, sending 17 million urban youth
  to rural areas between 1968 and 1980. The generation that had destroyed their schools was exiled to farms where many spent
  a decade in manual labor.


  The Cultural Revolution did not end until Mao died on September 9, 1976. Within a month, the Gang of Four — Jiang Qing,
  Zhang Chunqiao, Yao Wenyuan, and Wang Hongwen — were arrested by Hua Guofeng and military leaders. Their trial in 1980-1981
  was broadcast on Chinese television. Jiang Qing told the court: "I was Chairman Mao''s dog. Whoever he told me to bite,
  I bit."

  '
significance: 'The 1981 Resolution on Certain Questions in the History of Our Party declared Mao "70 percent correct and 30
  percent wrong," confining the Cultural Revolution to the "wrong" category while preserving Mao''s overall legitimacy — and,
  by extension, the Party''s. Deng Xiaoping, who had been purged twice during the revolution, led China''s post-1978 economic
  reforms from the authority of a man who had survived it. The generation sent down to the countryside — the "lost generation"
  — includes Xi Jinping, who spent seven years in a cave dwelling in Shaanxi province. Under Xi, public discussion of the
  Cultural Revolution has been further restricted; in 2021, the CCP''s new historical resolution collapsed the entire revolution
  into one paragraph. The Party''s relationship to those ten years remains the defining tension in Chinese political memory:
  the revolution cannot be fully condemned without condemning the Party that carried it out, and it cannot be fully examined
  without questioning the system that made it possible.

  '
