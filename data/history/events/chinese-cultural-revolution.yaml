perspectives:
- viewpoint: Maoist Revolutionary
  viewpoint_type: victor
  region_origin: east-asia
  narrative: 'The May 16 Circular identified the enemy clearly: "representatives of the bourgeoisie who have sneaked into
    the Party, the government, the army, and various spheres of culture." These were not abstractions. They were Liu Shaoqi,
    Deng Xiaoping, and the cadres who had quietly dismantled the Great Leap Forward''s collective agriculture and reintroduced
    material incentives — profit, bonuses, private plots. From the Maoist perspective, these pragmatists were not saving China
    from famine. They were restoring capitalism under a red flag.


    Mao''s theory of continuous revolution held that class struggle did not end with the seizure of state power. New bourgeois
    elements would constantly emerge within the Party itself — bureaucrats who accumulated privilege, intellectuals who served
    elite interests, officials who preferred stability to transformation. The Soviet Union was the proof: after Stalin''s
    death, Khrushchev had denounced him, introduced market reforms, and (in Mao''s analysis) allowed the Soviet bureaucratic
    class to become a new ruling elite. By the 1960s, Mao saw the same trajectory in China. The Cultural Revolution was his
    answer to the question: how do you prevent a revolution from eating itself?


    The instruments were the masses. Red Guards were not directed by a central command — they were unleashed. Mao''s Little
    Red Book, printed in over 900 million copies by 1969, was the ideological manual. The "Four Olds" — old customs, old culture,
    old habits, old ideas — were the targets. The logic was that China''s feudal and bourgeois past had embedded itself in
    everyday life: in the hierarchy of the classroom, the authority of the temple, the deference to lineage. These had to
    be physically destroyed before a genuinely new society could emerge.


    Lin Biao, as Defense Minister, turned the PLA into the revolution''s vanguard. His preface to the Little Red Book elevated
    Mao''s thought to quasi-religious status: "Comrade Mao Zedong is the greatest Marxist-Leninist of our era." The cult of
    personality was not incidental — it was structural. Mao needed the masses to bypass the Party, and the masses needed a
    figure whose authority exceeded any institution. The personality cult replaced institutional loyalty with personal devotion.
    It worked — until Lin Biao himself was accused of plotting a coup and died in a plane crash over Mongolia on September
    13, 1971, fleeing toward the Soviet Union.


    The Maoist narrative was never formally repudiated during Mao''s lifetime. After 1969, the revolution''s "excesses" were
    attributed to Lin Biao and the Gang of Four — not to Mao himself. The 1981 Resolution adopted this framework: Mao initiated
    the Cultural Revolution based on a correct concern about revisionism, but the movement was "hijacked" by careerists and
    extremists. This formulation allowed the Party to condemn the decade without condemning the man — or the system — that
    produced it.

    '
  key_arguments:
  - Continuous revolution was necessary to prevent bureaucratic restoration of capitalism within the Party
  - The Soviet Union's post-Stalin trajectory proved that socialist states could degenerate from within
  - The Four Olds — feudal customs, traditional culture, habitual deference — were genuine obstacles to revolutionary transformation
  - Excesses were the work of Lin Biao and the Gang of Four, not inherent to Mao's theory
