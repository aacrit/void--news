- viewpoint: Persecuted Cadre and Intellectual
  viewpoint_type: vanquished
  region_origin: east-asia
  narrative: 'Liu Shaoqi was the President of China. In 1967, Red Guards dragged him and his wife, Wang Guangmei, to a struggle
    session at Tsinghua University before a crowd of 300,000. Wang Guangmei was forced to wear a necklace of ping-pong balls
    — a mockery of the pearl necklace she had worn on a state visit to Indonesia. Liu was punched, kicked, and forced to stand
    bent at the waist for hours in the "jet plane" position. He was denied medical treatment for months. His diabetes went
    untreated. When he developed pneumonia, doctors were ordered not to intervene. He died on November 12, 1969, lying on
    the floor of a cell in Kaifeng, wrapped in a blanket. His body was cremated the same day under the name "Liu Weihuang."
    His family was not informed. His children did not learn of his death until years later.


    The pattern repeated across every institution. In Beijing alone, 1,772 people were killed in August and September 1966
    — the "Red August." Wang Youqin''s Victims of the Chinese Cultural Revolution (2004) documents individual cases from school
    records, work unit files, and survivor interviews. Bian Zhongyun, the vice principal of the Girls'' Middle School attached
    to Beijing Normal University, was beaten to death by her students on August 5, 1966 — the same day Mao posted "Bombard
    the headquarters." She was the first confirmed educator killed. Her husband, Wang Jingyao, preserved her blood-soaked
    clothing in a suitcase for decades.


    Intellectuals were designated the "Stinking Ninth" — the lowest of nine categories of class enemies. Professors were forced
    to wear dunce caps and placards listing their "crimes." They cleaned toilets, hauled coal, and submitted to daily self-criticism
    sessions. The physicist Yao Tongbin, who had returned to China from Britain to help build the nation, was beaten to death
    during a struggle session in June 1968. The translator and scholar Fu Lei, who had introduced Balzac and Romain Rolland
    to Chinese readers, hanged himself alongside his wife Zhu Meifu on September 3, 1966, after Red Guards ransacked their
    Shanghai home. They left a meticulous note listing the few remaining household items and requesting that the outstanding
    rent be paid.


    The "May Seventh Cadre Schools" — forced labor camps in rural areas — held tens of thousands of officials, writers, and
    academics through the early 1970s. Conditions varied but the purpose was uniform: physical labor as ideological remaking.
    Yang Jiang, the scholar and translator, described her experience in Six Chapters from My Life "Downunder" (1981). She
    and her husband, the novelist Qian Zhongshu, cleaned latrines and planted rice. Their daughter, a teacher, was beaten
    and never fully recovered.


    Ba Jin, one of China''s most celebrated novelists, survived the Cultural Revolution and spent his remaining decades calling
    for a Cultural Revolution museum — a permanent exhibit documenting what had happened, so that it could never be repeated.
    "The only way to prevent a recurrence is to remember," he wrote. The museum was never built. Ba Jin died in 2005. The
    proposal has not been revived.

    '
  key_arguments:
  - The violence was directed at individuals with names, families, and contributions — not abstract class enemies
  - Intellectuals and cadres were systematically humiliated, tortured, and killed for the crime of competence
  - Liu Shaoqi's death — the President of China denied medicine and left to die on a cell floor — embodied the revolution's
    logic
  - Ba Jin's unfulfilled call for a Cultural Revolution museum shows that the reckoning has never occurred
