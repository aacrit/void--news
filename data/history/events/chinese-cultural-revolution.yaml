    speaker: Yang Jiang
    context: Attributed remark, reflecting on survival during the Cultural Revolution
  emphasized:
  - Individual human cost — names, faces, specific acts of cruelty against specific people
  - Destruction of China's intellectual class through systematic humiliation and murder
  - Liu Shaoqi's death as the paradigmatic case of revolutionary violence against its own architects
  - Absence of institutional memory — no museum, no monument, no public accounting
  omitted:
  - Genuine corruption and privilege within the Party bureaucracy that provided the revolution's pretext
  - Intellectuals who collaborated with or benefited from the early revolution before becoming targets
  - The agency of ordinary people who participated in violence — not only Red Guards but neighbors and colleagues
  - The revolution's impact on rural populations, who constituted 80% of China
- viewpoint: Red Guard Youth
  viewpoint_type: bystander
  region_origin: east-asia
  narrative: 'They were fifteen, sixteen, seventeen years old. They had grown up in the People''s Republic, educated entirely
    within its ideology. When Chairman Mao told them the revolution was in danger — that their teachers, their principals,
    their parents'' colleagues were secretly working to restore the old society — they believed him. Why would they not? He
    was the founding father. He had liberated China. The Party had taught them nothing except that Mao was always right.


    The first Red Guard unit formed at Tsinghua University Middle School in May 1966. The name came from a student''s poem:
    "We are Chairman Mao''s Red Guards, we temper our red hearts in great winds and waves." By July, there were Red Guard
    units in every school in Beijing. By August, there were millions. Mao received them at Tiananmen — 11 million in eight
    rallies. He wore a Red Guard armband. The message was unambiguous: the youth had his personal blessing to destroy the
    old world.


    The violence escalated because there was no check on it. Red Guards competed to demonstrate revolutionary fervor. Factions
    formed around rival interpretations of Mao''s thought — each claiming to be the most faithful. In Beijing, the "United
    Action Committee" (children of senior cadres) fought the "Sky Faction" (students from ordinary backgrounds). In Wuhan,
    armed factions involving hundreds of thousands besieged each other with weapons seized from PLA armories in the "Wuhan
    Incident" of July 1967. In Guangxi, the factionalism reached its most extreme expression: Zheng Yi documented cases of
    ritualized cannibalism in Wuxuan County, where the hearts and livers of class enemies were consumed in public.


    By 1968, the Red Guards had served their purpose. Mao had destroyed his rivals. The Party apparatus was in ruins. Now
    the Red Guards themselves were the problem — armed, factional, and ungovernable. Mao sent them to the countryside. The
    "Up to the Mountains, Down to the Countryside" campaign relocated 17 million urban youth to rural villages between 1968
    and 1980. They planted rice, dug irrigation ditches, and hauled manure. The education they had destroyed was the education
    they no longer had.


    The sent-down generation''s memoirs form one of modern China''s richest literary traditions. Many describe a trajectory
    from idealism to disillusionment. Jung Chang''s Wild Swans (1991), Nien Cheng''s Life and Death in Shanghai (1987), and
    Rae Yang''s Spider Eaters (1997) chart the arc: the exhilaration of the early rallies, the first acts of violence that
    felt justified, the moment when the violence turned on people they knew, and the years of rural exile when they had nothing
    to do but reconsider. Rae Yang describes realizing, years later, that she had helped destroy her own teacher''s life —
    and that no act of repentance could undo it. The Red Guards were both perpetrators and victims. They destroyed a generation
    of teachers and then became a generation without education.

    '
  key_arguments:
  - Red Guards were products of the system that created them — educated in Mao's ideology since birth, they had no framework
    for dissent
  - Factional violence was a structural consequence of mobilizing millions of teenagers with no institutional constraints
  - The sent-down campaign punished the Red Guards for doing exactly what Mao had told them to do
  - The sent-down generation's memoirs reveal a trajectory from idealism to complicity to disillusionment
