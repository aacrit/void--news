connections:
- target_slug: tiananmen-square
  connection_type: consequence
  description: The 1989 Tiananmen protesters — many of whom were children of Cultural Revolution victims — demanded the political
    reforms that the post-Mao leadership acknowledged were needed but never fully implemented
- target_slug: russian-revolution
  connection_type: parallel
  description: Both revolutions demonstrated the pattern of revolutionary states consuming their own founders — Stalin's purges
    and Mao's Cultural Revolution both targeted the Party's original cadres
- target_slug: cambodian-genocide
  connection_type: influenced
  description: Pol Pot and the Khmer Rouge leadership studied in China during the Cultural Revolution; the Cambodian genocide's
    assault on intellectuals, urban populations, and traditional culture directly adapted Maoist methods
