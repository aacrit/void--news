- Three federal laws (1964, 1965, 1968) dismantled de jure segregation in 21 states
- Black voter registration in Mississippi rose from 6.7% to 59.8% in three years
- Nonviolent direct action became the template for protest movements worldwide
- Movement exposed the gap between legal equality and structural inequality — a gap still measurable in wealth, incarceration,
  and housing data
