- viewpoint: Black Power / Radical Critique
  viewpoint_type: revisionist
  region_origin: americas
  narrative: 'Malcolm X stood at the microphone in Detroit on November 10, 1963, three months after the March on Washington,
    and called it the "Farce on Washington." The speech — "Message to the Grassroots" — laid out the radical critique with
    surgical precision. The march had been co-opted, Malcolm argued. Originally planned by A. Philip Randolph and Bayard Rustin
    as a militant action, it was defused after the Kennedy administration and white liberal organizations insisted on approving
    the route, the speakers, and the tone. John Lewis''s original speech was censored — the SNCC chairman had planned to ask
    "Which side is the federal government on?" and to call the civil rights bill "too little, too late." The March on Washington
    produced a beautiful afternoon. It did not produce a single arrest, a single disruption, or a single moment of discomfort
    for the power structure.


    The radical tradition did not begin with Malcolm. It ran through Marcus Garvey''s Universal Negro Improvement Association
    (4 million members by 1920), through the Communist Party''s work in the Scottsboro case (1931), through Robert F. Williams''s
    armed self-defense in Monroe, North Carolina (1957). Williams, president of the local NAACP chapter, organized armed guards
    to protect Black families from Klan night rides — a practice the national NAACP expelled him for. His book Negroes with
    Guns (1962) circulated in SNCC offices alongside Gandhi.


    After Malcolm''s assassination on February 21, 1965, the Black Panther Party for Self-Defense emerged in Oakland in October
    1966. Huey Newton and Bobby Seale drafted a ten-point platform: full employment, decent housing, education "that teaches
    us our true history," an end to police brutality, and jury trials by peers. The Panthers carried loaded weapons openly
    — legal under California law — and followed police patrols through Oakland, monitoring arrests. When 30 armed Panthers
    walked into the California State Capitol on May 2, 1967, the Mulford Act banning open carry was signed into law within
    months. Governor Reagan — who would later oppose the Civil Rights Restoration Act — called the Panthers "no different
    than the Ku Klux Klan."


    The radical critique held that legal integration addressed the symptoms, not the disease. Desegregating a lunch counter
    meant nothing if the Black community had no capital to own the lunch counter. Voting rights meant nothing if gerrymandering
    and at-large elections diluted Black political power. The Kerner Commission, appointed by Johnson after the 1967 urban
    rebellions, concluded: "Our nation is moving toward two societies, one black, one white — separate and unequal." The commission
    recommended massive federal investment in housing, education, and employment. Johnson shelved the report.


    Stokely Carmichael — who succeeded Lewis as SNCC chairman in 1966 — coined "Black Power" during the March Against Fear
    in Mississippi, June 1966. The phrase terrified white liberals and energized young Black activists who had spent years
    absorbing beatings for the right to sit next to people who despised them. Carmichael''s question was blunt: why should
    Black people seek integration into a burning house?

    '
  key_arguments:
  - Legal integration without economic power changed the form of oppression, not the fact
  - The nonviolent movement was partly co-opted by white liberal organizations and the Kennedy administration
  - Armed self-defense had a longer history in Black communities than nonviolent direct action
  - The Kerner Commission identified structural racism but its recommendations were ignored
