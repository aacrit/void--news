perspectives:
- viewpoint: Movement Leadership / Nonviolent Resistance
  viewpoint_type: victor
  region_origin: americas
  narrative: 'The Montgomery bus boycott was not spontaneous. Jo Ann Robinson of the Women''s Political Council had drafted
    a boycott plan months before Rosa Parks''s arrest. Robinson mimeographed 52,500 leaflets overnight at Alabama State College
    and distributed them across Montgomery''s Black neighborhoods by morning. The boycott committee recruited 300 volunteer
    drivers within 48 hours. Martin Luther King Jr., the 26-year-old pastor of Dexter Avenue Baptist Church, was chosen to
    lead the Montgomery Improvement Association precisely because he was new to the city — no existing grudges, no accumulated
    enemies.


    King''s philosophy of nonviolent direct action borrowed from Gandhi but adapted it to the American media landscape. The
    strategy was specific: provoke a violent response from segregationists, ensure cameras were present, and let the images
    do the arguing. In Birmingham, King chose Bull Connor''s jurisdiction deliberately. Connor was predictable — he would
    respond with force. Project C escalated in phases: sit-ins at lunch counters, marches on City Hall, then the Children''s
    Crusade of May 2-5, 1963, when over 1,000 students aged six to eighteen filled the streets. Connor''s men arrested 959
    children on the first day. On the second, they turned fire hoses and dogs on the rest.


    The SCLC operated alongside — and in tension with — the Student Nonviolent Coordinating Committee. SNCC was younger, more
    radical, and less patient with King''s negotiating style. Bob Moses ran SNCC''s voter registration in Mississippi, where
    organizers faced daily death threats. In the summer of 1964, SNCC recruited 700 mostly white Northern college students
    for Freedom Summer. Three workers — James Chaney, Andrew Goodman, and Michael Schwerner — were murdered by Klansmen and
    local police in Neshoba County on June 21. Their bodies were found buried in an earthen dam 44 days later.


    Selma completed the legislative arc. On March 7, 1965, 600 marchers crossed the Edmund Pettus Bridge and walked into a
    wall of state troopers. Amelia Boynton Robinson was beaten unconscious. John Lewis sustained a fractured skull. ABC interrupted
    its broadcast of Judgment at Nuremberg to show the footage — 48 million viewers watched troopers club peaceful marchers
    on a bridge named after a Confederate general and Ku Klux Klan leader. Johnson sent the Voting Rights Act to Congress
    eight days later.


    The nonviolent narrative emphasizes that legislation was won through moral pressure, not political compromise. King and
    the SCLC chose the battlefield, the timing, and the terms. The movement converted white moderate opinion not through persuasion
    but through spectacle — not the spectacle of Black suffering, but the spectacle of white brutality made undeniable by
    television.

    '
  key_arguments:
  - Nonviolent direct action was a strategic discipline, not passive acceptance
  - The movement deliberately provoked segregationist violence for the cameras
  - Legislative victories (1964, 1965, 1968) were direct results of organized campaigns
  - SNCC's grassroots voter registration was as consequential as SCLC's marquee marches
