- viewpoint: White Southern Resistance
  viewpoint_type: vanquished
  region_origin: americas
  narrative: 'On March 12, 1956, 101 members of Congress — 19 senators and 82 representatives, all from former Confederate
    states — signed the Southern Manifesto. The document called Brown v. Board "a clear abuse of judicial power" and pledged
    to resist integration "by all lawful means." Only three Southern senators refused to sign: Lyndon Johnson of Texas, Estes
    Kefauver and Albert Gore Sr. of Tennessee. The manifesto was not an act of defiance by extremists. It was the consensus
    position of the Southern political establishment.


    Massive resistance took institutional form. Virginia''s Prince Edward County closed its entire public school system from
    1959 to 1964 rather than integrate. White students attended private academies funded by state tuition grants; Black students
    had no schools at all for five years. In Mississippi, the State Sovereignty Commission — a taxpayer-funded agency — operated
    from 1956 to 1977 as a surveillance apparatus targeting civil rights workers. It shared files with the White Citizens''
    Councils, the Klan, and local police. Its records, sealed for decades, were opened in 1998 and revealed 87,000 pages of
    dossiers on activists, journalists, and ordinary citizens.


    George Wallace''s inauguration speech on January 14, 1963, drew the rhetorical line: "Segregation now, segregation tomorrow,
    segregation forever." The words were written by Asa Earl Carter, a Klansman and speechwriter who later reinvented himself
    as Forrest Carter, author of The Education of Little Tree — a best-selling "Cherokee memoir" that was neither Cherokee
    nor memoir. Wallace stood in the schoolhouse door at the University of Alabama on June 11, 1963, blocking two Black students
    until federalized National Guard troops compelled him to step aside. The stand lasted less than five hours. Wallace carried
    five Southern states in the 1968 presidential election.


    The resistance narrative framed the conflict as one of federal overreach against state sovereignty — the same constitutional
    argument used to defend slavery in 1860. The Tenth Amendment reserved powers to the states; public education, in this
    reading, was a state matter beyond federal jurisdiction. The Citizens'' Councils — "the Klan in suits," as one NAACP leader
    called them — operated through economic pressure rather than overt violence: boycotting businesses that served Black customers,
    denying loans to Black homeowners, firing employees who registered to vote.


    By 1970, formal resistance had collapsed. The courts upheld every major civil rights law. Wallace himself reversed course
    in 1979, meeting with John Lewis and other movement leaders to ask forgiveness. In 1982, he won the Alabama governorship
    with 90% of the Black vote, having spent four years courting Black churches and community organizations. The transformation
    was either a genuine reckoning or a political calculation. Lewis accepted the apology. Others did not.

    '
  key_arguments:
  - Brown v. Board was judicial overreach that violated the Tenth Amendment and state sovereignty
  - The Southern Manifesto represented mainstream Southern political opinion, not extremism
  - Integration was imposed by federal force against democratic local governance
  - Massive resistance was an institutional movement, not merely vigilante violence
