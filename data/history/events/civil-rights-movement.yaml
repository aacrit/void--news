duration: 14 years (Brown v. Board 1954 to Fair Housing Act 1968)
summary: 'On December 1, 1955, Rosa Parks refused to surrender her bus seat in Montgomery, Alabama. She was not the first
  — Claudette Colvin had done the same nine months earlier, at fifteen — but Parks was the secretary of the local NAACP chapter,
  and the organization was ready. The Montgomery Bus Boycott lasted 381 days. Black residents carpooled, walked miles to work,
  and organized a parallel transportation system that cost the city bus line 65% of its revenue. On November 13, 1956, the
  Supreme Court ruled in Browder v. Gayle that segregated buses were unconstitutional.


  The legal architecture had been cracking since 1954. In Brown v. Board of Education, the Supreme Court overturned Plessy
  v. Ferguson''s 57-year-old "separate but equal" doctrine. Chief Justice Earl Warren delivered a unanimous opinion: "Separate
  educational facilities are inherently unequal." The ruling applied to schools, but its logic dissolved the constitutional
  foundation of Jim Crow. Southern states responded with "massive resistance" — Virginia closed entire school districts rather
  than integrate them. In 1957, Arkansas Governor Orval Faubus deployed the National Guard to block nine Black students from
  entering Little Rock Central High School. Eisenhower sent the 101st Airborne Division.


  Birmingham, Alabama, spring 1963. Martin Luther King Jr. and the Southern Christian Leadership Conference launched Project
  C — "C" for confrontation. Bull Connor''s police used fire hoses and attack dogs on children as young as six. Photographers
  captured a German shepherd lunging at a fifteen-year-old boy, Walter Gadsden. The image ran on the front page of the New
  York Times and in newspapers worldwide. Kennedy told advisors the photo made him "sick." Within weeks, he sent a civil rights
  bill to Congress.


  On August 28, 1963, 250,000 people gathered at the Lincoln Memorial for the March on Washington. King delivered "I Have
  a Dream" to a live television audience of 70 million — the largest in American broadcast history to that point. Eighteen
  days later, a bomb exploded at the 16th Street Baptist Church in Birmingham, killing four girls: Addie Mae Collins (14),
  Cynthia Wesley (14), Carole Robertson (14), and Carol Denise McNair (11).


  The Civil Rights Act of 1964 outlawed discrimination in public accommodations, employment, and federally funded programs.
  The Voting Rights Act of 1965 followed Bloody Sunday — March 7, 1965, when Alabama state troopers fractured John Lewis''s
  skull on the Edmund Pettus Bridge in Selma. Lewis was 25. The act banned literacy tests, poll taxes, and other mechanisms
  that had reduced Black voter registration in Mississippi to 6.7% of eligible adults. Within three years, Black registration
  in Mississippi rose to 59.8%.


  On April 4, 1968, Martin Luther King Jr. was assassinated on the balcony of the Lorraine Motel in Memphis. He was 39. Riots
  erupted in 125 cities. The Fair Housing Act was signed one week later.

  '
significance: 'The movement dismantled a legal system that had governed 21 states for 60 years. Between 1964 and 1968, three
  federal laws — Civil Rights Act, Voting Rights Act, Fair Housing Act — eliminated de jure segregation and enfranchised millions
  of Black voters. Black elected officials in the South rose from fewer than 100 in 1964 to over 1,400 by 1980. The tactics
  of nonviolent direct action traveled to Northern Ireland, South Africa, Tiananmen Square, and the Arab Spring. The movement
  also exposed the limits of legal change: de facto segregation in housing, education, and wealth persists. In 2013, the Supreme
  Court gutted the Voting Rights Act''s preclearance provisions in Shelby County v. Holder, and within 24 hours, Texas and
  Mississippi moved to implement voter ID laws that had previously been blocked.

  '
