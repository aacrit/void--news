connections:
- target_slug: trail-of-tears
  connection_type: parallel
  description: Both exposed American democracy's selective application — constitutionally sanctioned dispossession of non-white
    populations, a century apart
- target_slug: haitian-revolution
  connection_type: influenced
  description: The Haitian revolution established the first Black republic and the radical proposition that enslaved people
    could overthrow their masters — a tradition the civil rights movement inherited
- target_slug: partition-of-india
  connection_type: influenced
  description: Gandhi's nonviolent campaigns in India directly shaped King's philosophy — King visited India in 1959 and called
    it one of the most concentrated minds of his life
- target_slug: transatlantic-slave-trade
  connection_type: consequence
  description: Jim Crow was the legal architecture built on slavery's foundation — the movement dismantled the superstructure
    while the economic substructure persisted
