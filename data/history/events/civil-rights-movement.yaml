- viewpoint: Federal Government
  viewpoint_type: bystander
  region_origin: americas
  narrative: 'Eisenhower privately told Chief Justice Warren that white Southerners "are not bad people. All they are concerned
    about is to see that their sweet little girls are not required to sit in school alongside some big overgrown Negroes."
    He sent the 101st Airborne to Little Rock in September 1957 not because he supported integration but because Governor
    Faubus had defied a federal court order. Eisenhower''s attorney general, Herbert Brownell, later confirmed that the president
    acted to uphold judicial authority, not to advance civil rights.


    Kennedy campaigned in 1960 with the Black vote — he called Coretta Scott King when her husband was jailed in October 1960,
    a gesture that shifted an estimated 250,000 Black votes in key states — but governed cautiously. He appointed segregationist
    judges to the Fifth Circuit to appease Southern Democrats. He delayed the promised executive order on housing discrimination
    for two years. His civil rights bill went to Congress only after Birmingham, when the images of children attacked by dogs
    left him no political choice. Kennedy told advisors the photographs were "as effective as Bull Connor making a speech
    for the movement every night."


    Johnson understood the legislative mechanics. A former Senate majority leader, he knew the civil rights bill needed Republican
    votes to break a Southern Democratic filibuster. He worked with Republican minority leader Everett Dirksen to secure cloture
    — the first time the Senate had broken a filibuster on civil rights legislation. The Civil Rights Act passed 73-27 on
    June 19, 1964. Johnson reportedly told aide Bill Moyers: "We have lost the South for a generation." The South has voted
    majority Republican in every presidential election since.


    The FBI operated a parallel policy. J. Edgar Hoover despised King and in 1964 called him "the most dangerous Negro in
    America." COINTELPRO — the FBI''s counterintelligence program — infiltrated SCLC, SNCC, the Black Panthers, and dozens
    of other organizations. Agents sent King an anonymous letter in November 1964 suggesting he commit suicide. They wiretapped
    his phones, bugged his hotel rooms, and leaked recordings to journalists and political figures. COINTELPRO was not revealed
    until a break-in at the FBI''s Media, Pennsylvania office on March 8, 1971, when the Citizens'' Commission to Investigate
    the FBI stole files and sent them to newspapers.


    The federal posture was contradictory throughout: the same government that passed the Voting Rights Act also ran a covert
    campaign to destroy the movement''s most prominent leader. The same president who signed the Civil Rights Act escalated
    the Vietnam War, which drained resources from the War on Poverty and divided the movement when King publicly opposed the
    war in April 1967.

    '
  key_arguments:
  - Federal action was reactive, driven by crises rather than principle
  - Eisenhower and Kennedy were reluctant allies at best, acting only when forced
  - Johnson achieved legislation through political mastery but lost the South doing it
  - The FBI simultaneously fought for and against civil rights, depending on the bureau
