slug: columbian-exchange
title: Columbus and the Columbian Exchange
subtitle: Columbus carried 17 ships on his second voyage. On them were horses, cattle, pigs, and smallpox. Within
  50 years, 90% of the people he'd found were dead.
date_display: 1492-1550
date_sort: 1492
date_precision: year
era: early-modern
