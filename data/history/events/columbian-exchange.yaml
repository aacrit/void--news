perspectives:
- viewpoint: Spanish Imperial
  viewpoint_type: victor
  region_origin: europe
  narrative: 'Pope Alexander VI issued the bull Inter caetera on May 4, 1493, dividing the non-Christian world
    between Spain and Portugal with a line drawn 100 leagues west of the Azores. Everything west of that line belonged
    to Castile. The pope had never seen a map of what he was giving away. Neither had Columbus, who died in 1506
    believing he had reached the outer islands of Asia. The legal architecture of empire was built on a geographic
    error and a papal decree — and it held for three centuries.


    Columbus''s Diario from the first voyage reads as a prospectus. On October 12, 1492, the day he landed, he
    described the Taino as generous, handsome, and unarmed. In the same entry, he wrote that "with fifty men they
    can all be subjugated and made to do what is required of them." The beauty and the subjugation occupy the same
    sentence, the same breath. On the second voyage — 17 ships, 1,200 men, livestock, seeds, and priests — Columbus
    established the colony of La Isabela on Hispaniola''s north coast and immediately imposed a gold tribute on
    every Taino over fourteen years of age. Those who did not deliver their quota had their hands cut off. Las
    Casas documented this practice. Columbus''s own letters to the Crown proposed shipping 4,000 enslaved Taino
    to Seville annually to be sold, calculating the revenue as 20 million maravedis per year.


    The Requerimiento of 1513 codified what Columbus had improvised. Drafted by jurist Juan Lopez de Palacios Rubios,
    it informed Indigenous peoples — in Castilian Spanish, read from documents they could not see, in a language
    they did not speak — that the Pope had authority over the entire earth, that he had delegated sovereignty over
    their lands to the King of Castile, and that resistance would be met with war, enslavement, and the seizure
    of their women and children. Gonzalo Fernandez de Oviedo, the Crown''s official chronicler, recorded that
    Palacios Rubios himself could not keep from laughing when told how the Requerimiento was used in the field.
    Bartolome de las Casas called it "unjust, impious, scandalous, irrational, and absurd."


    At the Valladolid Debate of 1550-1551, Juan Gines de Sepulveda argued that the conquest was justified because
    Indigenous peoples were Aristotle''s "natural slaves" — beings whose rational faculty was insufficient for
    self-governance. Las Casas countered that Indigenous peoples were rational, that their societies were organized,
    and that the atrocities committed in Spain''s name violated natural law. The debate produced no formal verdict.
    The encomienda system — which assigned hundreds of Indigenous laborers to individual Spanish colonizers —
    continued. The silver mine at Potosi, discovered in 1545 in what is now Bolivia, consumed an estimated 8 million
    forced laborers over three centuries. It produced 45,000 tons of silver. That silver paid for the Spanish
    Habsburgs'' wars in the Netherlands, funded the mercantile economies of Antwerp and Amsterdam, and flowed
    east to China, where it purchased the silk and porcelain that European consumers demanded. The conquest generated
    capital. The capital generated empire.

    '
  key_arguments:
  - Papal authority and the Inter caetera bull provided the legal framework for Spanish sovereignty over the Americas
  - Columbus's own writings document the simultaneous admiration and subjugation of Indigenous peoples
  - The Requerimiento formalized conquest as legal procedure, however absurd in practice
  - The Valladolid Debate exposed the tension between Aristotelian justification and natural rights critique
