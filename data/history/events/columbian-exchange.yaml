- viewpoint: African Diasporic
  viewpoint_type: vanquished
  region_origin: africa
  narrative: 'The first enslaved Africans arrived in Hispaniola in 1501 — nine years after Columbus. The Spanish
    Crown authorized the shipment because the Taino were dying too fast to work the mines and the sugar fields.
    The logic was arithmetic: Indigenous labor was disappearing at a rate that threatened colonial revenue. Enslaved
    Africans, who had partial resistance to Old World diseases — smallpox, malaria, yellow fever — survived at
    higher rates. The Columbian Exchange did not create the institution of slavery. The Portuguese had been capturing
    and selling West Africans since the 1440s, and slavery existed across the Mediterranean, the Islamic world,
    and within African societies themselves. What the Columbian Exchange created was the scale. Between 1501 and
    1867, approximately 12.5 million Africans were loaded onto ships for the Americas. An estimated 1.8 million
    died during the Middle Passage — the crossing itself. The Slave Voyages database (slavevoyages.org), the most
    comprehensive record, documents 36,000 individual voyages.


    Sugar was the engine. Cane sugar — originally domesticated in New Guinea, cultivated in India, and refined
    in the medieval Islamic world — arrived in the Caribbean on Columbus''s second voyage in 1493. It grew in the
    tropical climate. It required backbreaking labor: planting, weeding, cutting, hauling, crushing, boiling,
    crystallizing. A sugar plantation consumed its workforce. Life expectancy for an enslaved person on a Caribbean
    sugar plantation was seven years after arrival. Barbados — 166 square miles, smaller than most American counties
    — imported 387,000 enslaved Africans between 1627 and 1807 and had an enslaved population of 83,000 at emancipation
    in 1838. The math of those numbers is the math of working people to death and replacing them.


    The exchange reshaped Africa itself. Maize and cassava — both New World crops — arrived in West Africa via
    Portuguese traders in the 16th century. They grew in soils and climates where indigenous African grains struggled.
    They supported population growth. Some historians, including Joseph Inikori, have argued that New World crops
    enabled the population growth that sustained the slave trade''s demand: more people meant more captives available.
    The crops that crossed the Atlantic in one direction helped produce the people who were shipped across it in
    the other.


    The cultural transfer was also bidirectional, though the power asymmetry shaped what survived. West African
    rice cultivation techniques — specifically, the tidal irrigation methods of the Senegambian and Sierra Leonean
    coast — were transplanted to the rice plantations of South Carolina and Georgia. Enslaved Africans did not
    merely provide labor; they provided the agricultural knowledge that made the rice economy possible. Judith
    Carney''s Black Rice (2001) documented this transfer — the enslaved were selected, in part, for their expertise.
    The planters of Georgetown and Charleston grew wealthy on knowledge they had purchased in bodies.


    The Columbian Exchange created a world in which Africa supplied labor, the Americas supplied land and raw materials,
    and Europe supplied capital and consumed the product. The profits from this arrangement — sugar, tobacco, cotton,
    rice, indigo — accumulated in European banks, funded European industries, and built European cities. Liverpool,
    Bristol, Nantes, Bordeaux — the great Atlantic port cities of Europe were built on the slave trade. The buildings
    still stand. The ledgers are in the archives.

    '
  key_arguments:
  - The death of 90% of Indigenous Americans created the labor vacuum that scaled the transatlantic slave trade
  - Sugar was the commodity that drove demand for enslaved labor — plantation life expectancy was seven years
  - New World crops (maize, cassava) reached Africa and may have sustained the population growth that the slave
    trade exploited
  - Enslaved Africans brought agricultural knowledge — especially rice cultivation — that the plantation economy
    depended on
