  emphasized:
  - Immunological asymmetry created by 12,000 years of hemispheric separation
  - 56 million dead and 56 million hectares of farmland abandoned, reforested, and captured in ice cores
  - New World crops as engines of Old World demographic transformation
  - The biological exchange as the frame that subsumes military and political narratives
  omitted:
  - The deliberate violence — massacres, enslavement, mutilation — that accompanied disease
  - The political and economic structures that organized exploitation of survivors
  - Indigenous agency in resistance, adaptation, and survival
  - The moral dimension of European culpability versus epidemiological inevitability
- viewpoint: World-Systems / Capitalist Origins
  viewpoint_type: revisionist
  region_origin: global
  narrative: 'Immanuel Wallerstein published The Modern World-System in 1974, arguing that the capitalist world-economy
    was born between 1450 and 1640 — and that its birth required the Americas. The argument is structural, not
    moral: capitalism needed raw materials extracted at below-market cost, labor coerced rather than compensated,
    and markets that could absorb finished goods. The Columbian Exchange provided all three. Columbus was not a
    discoverer. He was the first link in a supply chain.


    The silver of Potosi is the clearest demonstration. Cerro Rico — the "Rich Mountain" — was discovered in 1545
    in what is now Bolivia. Spanish colonial administrators organized the mita system, adapting an Inca labor draft:
    every adult male in the surrounding provinces owed four months of labor in the mines per year. The work was
    underground, by candlelight, in tunnels where temperatures reached 40 degrees Celsius. Mercury amalgamation
    — the process used to extract silver from ore — poisoned the water supply and the workers. An estimated 8 million
    people worked Potosi over three centuries. Contemporary accounts describe miners carried out dead at the end
    of shifts. The silver they extracted — approximately 45,000 metric tons — flowed to Seville, then to Antwerp,
    then to Amsterdam. It funded the Spanish Habsburgs'' wars in the Netherlands, the Thirty Years'' War, and the
    establishment of the Dutch East India Company. Without American silver, no Amsterdam stock exchange (founded
    1602). Without the stock exchange, no modern financial capitalism.


    Eric Williams, in Capitalism and Slavery (1944), traced a parallel circuit. Sugar cane — an Old World grass
    transplanted to Caribbean and Brazilian soil — required intensive labor in tropical climates. Smallpox and forced
    labor had killed 90% of Indigenous Caribbean workers by the mid-1500s. The Portuguese, who had been trading
    enslaved West Africans since the 1440s, scaled the operation. Between 1501 and 1867, approximately 12.5 million
    Africans were shipped across the Atlantic. Of these, 3.6 million went to Brazil, 1.3 million to Spanish America,
    2.3 million to the British Caribbean, and 1.1 million to the French Caribbean. The sugar they produced generated
    profits that Williams traced directly to investment in British manufacturing — the cotton mills of Lancashire,
    the iron foundries of Birmingham, the banks of Liverpool. Williams''s thesis has been debated, refined, and
    partially challenged for 80 years. His core claim — that slave-produced wealth was invested in industrial
    development — has been supported by subsequent scholarship, including Beckert''s Empire of Cotton (2014) and
    Baptist''s The Half Has Never Been Told (2014).


    The Columbian Exchange created the template: periphery extracts, core manufactures, profit flows upward. Indigenous
    labor dug the silver. Enslaved African labor grew the sugar, tobacco, and cotton. European merchants financed
    the ships, the plantations, and the insurance policies. Lloyd''s of London began as a coffee house where
    merchants insured slave ships. The modern global economy was not built despite the Columbian Exchange. It was
    built on it.

    '
  key_arguments:
  - 1492 marks the structural origin of the capitalist world-system, not merely a moment of "discovery"
  - "Potos\xED silver funded European finance capitalism \u2014 the Amsterdam exchange, the Habsburg wars, the\
    \ Dutch East India Company"
  - "Williams\u2019s Capitalism and Slavery traces slave-produced profits to British industrial investment"
  - The Columbian Exchange created the extractive template — periphery extracts, core manufactures — that structures
    the global economy today
