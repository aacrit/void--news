- viewpoint: Taino / Indigenous Caribbean
  viewpoint_type: vanquished
  region_origin: americas
  narrative: 'The Taino had a word for the Spanish ships. They called them canoa — the same word they used for
    their own large dugout canoes, scaled up to match what they were seeing. When Columbus''s three ships anchored
    off Guanahani on October 12, 1492, the Taino paddled out to greet them. They brought balls of cotton thread,
    parrots, and javelins — gifts, not weapons. Columbus noted their generosity in his Diario. In the next sentence,
    he noted they would make good servants. He seized six of them before sailing to the next island.


    Las Casas arrived in Hispaniola in 1502, ten years after Columbus. He initially received an encomienda — a
    grant of Indigenous labor — and participated in the conquest of Cuba in 1513. What he saw converted him. His
    Short Account of the Destruction of the Indies, written in 1542, is a catalog of atrocities with the precision
    of a legal deposition. He described Spanish colonizers who cut off the hands of Taino who failed to deliver
    their gold tribute quota. He described hunting parties that used war dogs — mastiffs trained to attack — against
    unarmed people. He described the murder of infants. He estimated that on Hispaniola alone, three million people
    had died between 1494 and 1508 from war, enslavement, and forced labor in the mines. The number is likely inflated
    — modern demographers estimate the pre-contact Taino population at 250,000 to 300,000, not millions — but
    the trajectory is not contested. By 1548, fewer than 500 Taino remained on an island that had held a quarter
    of a million people 56 years earlier.


    The Taino did not disappear passively. Hatuey, a cacique from Hispaniola, fled to Cuba around 1511 with 400
    followers and warned the Cuban Taino of what was coming. He organized armed resistance. The Spanish captured
    him. At the stake, a Franciscan friar offered him baptism, promising heaven. Hatuey asked whether Christians
    went to heaven. The friar said yes. Hatuey said he would rather go to hell than to a place where such cruel
    people went. The friar lit the fire.


    Anacaona, a Taino queen of Xaragua in southwestern Hispaniola, hosted a feast for the Spanish governor Nicolas
    de Ovando in 1503. She gathered 80 caciques to welcome him. Ovando''s men locked the building, set it on fire,
    and burned the caciques alive. Anacaona was hanged. Las Casas recorded the event. The Taino of Xaragua — one
    of the five chiefdoms of Hispaniola — ceased to exist as a political entity.


    Recent DNA studies have complicated the narrative of total extinction. A 2018 study published in the Proceedings
    of the National Academy of Sciences found that modern Puerto Ricans carry, on average, 14% Indigenous ancestry
    — Taino ancestry that survived through women who bore children with Spanish colonizers. The Taino were not entirely
    erased. But they were not asked.

    '
  key_arguments:
  - The Taino were a complex society with 250,000-300,000 people on Hispaniola, organized into five chiefdoms
  - Columbus's own journal documents the shift from greeting to enslavement within days
  - Hatuey and Anacaona represent armed and diplomatic resistance, both met with extermination
  - "DNA evidence shows Taino survival through women\u2019s bodies — biological continuity through colonial violence"
