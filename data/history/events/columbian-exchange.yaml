  - text: The Columbian Exchange has been the most important event in human history since the end of the Ice Age.
    speaker: Alfred W. Crosby
    context: Preface to the 30th anniversary edition of The Columbian Exchange, 2003
  - text: 'The Great Dying of the Indigenous Peoples of the Americas resulted in a human-driven global impact on
      the Earth System in the two centuries prior to the Industrial Revolution.'
