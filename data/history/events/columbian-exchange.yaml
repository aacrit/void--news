- viewpoint: Ecological / Biological
  viewpoint_type: revisionist
  region_origin: global
  narrative: 'Smallpox traveled faster than rumors. It reached Tenochtitlan before Cortes did — carried from Hispaniola
    to the Yucatan coast by an enslaved African man in Panfilo de Narvaez''s expedition, then spread inland along
    trade routes at a speed no army could match. The emperor Cuitlahuac, who had organized the resistance that
    drove the Spanish from Tenochtitlan during the Noche Triste in June 1520, was dead of smallpox by December.
    His successor Cuauhtemoc inherited a city where half the defenders were already sick. The pathogen did not
    distinguish between warriors and civilians, between those who resisted and those who surrendered. It killed
    them at the same rate.


    Alfred Crosby published The Columbian Exchange in 1972 and reframed five centuries of historiography. The conquest
    of the Americas was not primarily a story of military superiority, political cunning, or civilizational clash.
    It was a biological event. Two hemispheres that had been separated for 12,000 years — since the land bridge
    at Beringia submerged — reconnected in 1492. The Old World had spent those millennia developing a disease environment
    shaped by dense agriculture, domesticated animals (cattle, pigs, horses, chickens), and urban crowding. Smallpox,
    measles, influenza, typhus, plague, malaria, and yellow fever evolved in this environment. Europeans carried
    partial immunity — purchased with centuries of childhood mortality. Indigenous Americans had none.


    Koch, Brierley, Maslin, and Lewis published their study in Quaternary Science Reviews in 2019. Their methodology:
    reconstruct the pre-contact population of the Americas (approximately 60.5 million in 1492), calculate the
    post-contact decline (to approximately 6 million by 1600 — a 90% collapse), estimate the agricultural land
    abandoned by the dead (56 million hectares), calculate the carbon sequestered by the forests that reclaimed
    that land, and match the result against Antarctic ice core records. The match was precise. Atmospheric CO2
    dropped by 7-10 ppm between 1520 and 1610. The "Orbis spike" — the lowest CO2 reading in the ice cores —
    occurred in 1610. The Great Dying killed enough people to change the composition of the atmosphere.


    The exchange moved both ways. New World crops reshaped Old World diets and demographics. The potato, domesticated
    in the Andes 7,000 years before Columbus, reached Europe by the 1570s. It grew in soils where wheat would not.
    It yielded more calories per acre than any European grain. Nunn and Qian''s 2011 study in the Quarterly Journal
    of Economics estimated that the potato accounted for approximately 25-26% of Old World population growth between
    1700 and 1900. Maize — domesticated from teosinte in central Mexico 9,000 years ago — reached West Africa
    by the 1550s and became a staple across the continent. The tomato, a Mesoamerican crop, arrived in Italy by
    the mid-1500s but was not widely eaten until the 18th century. The Italian cuisine that the world recognizes
    today — marinara, pizza, bolognese — did not exist before the Columbian Exchange. Syphilis, possibly, traveled
    the other direction: skeletal evidence from pre-Columbian Americas and the first European epidemic in Naples
    in 1495 suggest — though do not prove — a New World origin. The exchange was bidirectional. The death toll was
    not.

    '
  key_arguments:
  - Disease, not military force, was the primary mechanism of Indigenous population collapse
  - 12,000 years of hemispheric separation created an immunological asymmetry that no resistance could overcome
  - The Great Dying was large enough to alter atmospheric CO2 and contribute to the Little Ice Age
  - New World crops — potato, maize, tomato — reshaped Old World demographics by adding hundreds of millions to
    populations
