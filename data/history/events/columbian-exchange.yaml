country: Multiple (Spain, Taino/Hispaniola, Aztec Mexico, Inca Peru, West Africa, Portugal, England)
category: political
severity: catastrophic
death_toll: 'Estimated 56 million Indigenous deaths from disease, violence, and famine between 1492 and 1600 —
  a 90% population collapse across the Western Hemisphere. Koch et al. (2019, Quaternary Science Reviews) calculated
  the "Great Dying" was large enough to cause a measurable CO2 reduction captured in Antarctic ice cores. The
  Taino of Hispaniola: 250,000-300,000 in 1492; fewer than 500 by 1548 (Las Casas estimate).'
affected_population: The entire Western Hemisphere — 60 million people in 1491 — plus the Atlantic world restructured
  by the biological, economic, and demographic exchange that followed
duration: 1492-1550 primary contact period; the exchange's consequences are ongoing
summary: 'October 12, 1492. Columbus waded ashore on an island the Taino called Guanahani. He planted a flag,
  claimed the land for Ferdinand and Isabella, and wrote in his Diario that the people who greeted him — who brought
  food, water, and parrots — "would make fine servants" and "could easily be made Christians." He took six Taino
  by force before he left. On his second voyage in 1493, he brought 17 ships, 1,200 men, horses, cattle, sheep,
  pigs, chickens, sugar cane, wheat, and every pathogen the Old World had spent millennia cultivating. Hispaniola''s
  Taino population — between 250,000 and 300,000 when Columbus arrived — was fewer than 500 by 1548, according
  to Bartolome de las Casas, who counted them.


  In 1513, the Spanish Crown produced the Requerimiento: a legal document read aloud in Spanish to Indigenous
  peoples before attacking them. It informed them that the Pope had granted Spain sovereignty over their lands,
  that the King of Castile was now their lord, and that failure to comply would result in war, enslavement, and
  the seizure of their property. It was read by men in armor, from horseback, to people who did not speak Spanish,
  often from distances at which no one could hear it, as a legal prerequisite for conquest. Jurist Palacios Rubios,
  who drafted it, reportedly laughed when told how it was used in the field.


  Alfred Crosby''s The Columbian Exchange (1972) reframed the event. The real transfer was biological. Old World
  pathogens — smallpox, measles, influenza, typhus — killed an estimated 56 million people across the Americas
  between 1492 and 1600. Smallpox reached the Aztec capital of Tenochtitlan before Cortes did, killing the emperor
  Cuitlahuac in 1520. It reached the Inca Empire before Pizarro, killing the Sapa Inca Huayna Capac and triggering
  the civil war Pizarro exploited. The pathogens moved faster than any army or any rumor of an army.


  The exchange moved in both directions. New World crops — potatoes, maize, tomatoes, cacao, tobacco — reshaped
  the Old World. The potato fed Northern Europe''s population explosion: between 1700 and 1900, the European
  population tripled, and economic historians attribute roughly one-third of that growth to the potato alone.
  Maize reached West Africa by the 1550s and became a staple crop across the continent. The tomato arrived in
  Italy by 1550; Italian cuisine as the world knows it did not exist before the Columbian Exchange. Tobacco generated
  the plantation economies of Virginia and the Carolinas. Sugar cane — an Old World crop transplanted to New World
  soil — created the labor demand that drove the transatlantic slave trade.


  Koch et al.''s 2019 study in Quaternary Science Reviews quantified what Crosby had described: the Great Dying
  killed so many people that abandoned farmland across the Americas reforested, pulling enough carbon dioxide from
  the atmosphere to register in Antarctic ice cores. The resulting temperature drop contributed to the Little Ice
  Age. The death of 56 million people changed the climate.

  '
significance: 'The Columbian Exchange restructured global biology, economics, and demography. It killed 90% of
  the Western Hemisphere''s population. It introduced the crops — potato, maize, tomato — that fed Europe''s and
  Africa''s population growth over the following three centuries. It created the labor vacuum that generated demand
  for 12.5 million enslaved Africans shipped across the Atlantic between 1501 and 1867. It produced the silver
  extraction — 45,000 tons from Potosi alone — that funded European finance, the Dutch East India Company, and
  the British Empire. It moved enough carbon dioxide to alter the global climate. Eric Williams, in Capitalism
  and Slavery (1944), traced the profits from slave-produced sugar and tobacco forward to the capital accumulation
  that funded British industrialization. The Columbian Exchange is the origin point of the modern Atlantic economy,
  modern global agriculture, and the modern racial order.

  '
