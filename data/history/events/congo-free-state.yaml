connections:
- target_slug: scramble-for-africa
  connection_type: consequence
  description: The Congo was the prize of the Berlin Conference — Leopold acquired 905,000 square miles of Central Africa as a personal colony through diplomatic maneuvering at the 1884-1885 conference
- target_slug: transatlantic-slave-trade
  connection_type: parallel
  description: Leopold's forced-labor regime replaced chattel slavery with a system of coerced rubber extraction that produced comparable mortality — the Congo's population halved in 23 years, echoing the
    demographic catastrophe of the slave trade
- target_slug: rwandan-genocide
  connection_type: influenced
  description: Belgian colonial administration in the Congo and Rwanda used similar racial classification systems and extractive structures; the colonial architecture built during Leopold's regime persisted
    through Belgian rule in both territories
