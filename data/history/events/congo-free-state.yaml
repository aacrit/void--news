perspectives:
- viewpoint: Leopold II / Belgian Colonial
  viewpoint_type: victor
  region_origin: europe
  narrative: 'Leopold II framed the Congo Free State as Europe''s gift to Africa. His International Association of the Congo, established in 1878, declared its purpose as the suppression of the Arab slave
    trade in Central Africa and the extension of "civilization, commerce, and Christianity" — the three C''s of Victorian imperialism — to a region Europeans described as the "Dark Continent." At the Berlin
    Conference of 1884-1885, Leopold''s representatives secured recognition of his personal sovereignty over the Congo basin by presenting the enterprise as a philanthropic venture with free-trade provisions.
    The General Act of the Berlin Conference required that the Congo be open to trade from all nations, and Leopold''s agents emphasized this openness as proof of benevolent intent.


    The Belgian colonial narrative constructed Leopold as a visionary king of a small nation who saw an opportunity to bring Belgium into the ranks of colonial powers. Belgium had no overseas empire; its
    population of 6 million and its territory of 11,787 square miles made it the smallest of the European powers represented at Berlin. Leopold, who had traveled extensively in the Middle East and Southeast
    Asia and studied Dutch colonialism in the East Indies, believed that colonies were essential to national prosperity. He reportedly told an aide: "Il faut a la Belgique une colonie" — Belgium must have
    a colony. His biographers — particularly Baron Auguste Roeykens and Jean Stengers — framed his acquisition of the Congo as an act of farsighted statecraft.


    The economic rationale centered on "legitimate commerce." Leopold''s agents established trading stations along the Congo River and its tributaries, initially focused on ivory. When the global rubber
    boom began in the early 1890s — driven by John Boyd Dunlop''s pneumatic tire (1887) and the emerging automobile industry — wild rubber from the Congo''s Landolphia vines became the primary commodity.
    The colonial administration argued that the rubber trade brought the Congolese into the global economy, replacing the barter systems and subsistence agriculture that Europeans considered primitive.
    Roads, railways, and river stations were presented as infrastructure for mutual benefit.


    When reports of atrocities began to reach Europe — Williams''s Open Letter in 1890, Casement''s report in 1904, Morel''s campaign from 1903 onward — the Belgian establishment initially dismissed them
    as British commercial propaganda aimed at wresting the Congo from Belgian control. Leopold established a Commission of Inquiry in 1904-1905 that, to his surprise, confirmed many of the allegations.
    He attempted to control the damage by issuing reform decrees in 1906, but the reforms were largely cosmetic. In 1908, under sustained international pressure and domestic criticism, Leopold agreed to
    cede the Congo to the Belgian state in exchange for 50 million francs and the assumption of the Congo Free State''s debts.


    The Belgian state''s narrative of its colonial period has shifted across the 20th and 21st centuries. The Royal Museum for Central Africa at Tervuren, built with Congo revenue, presented the colonial
    enterprise as a civilizing mission until its renovation in 2013-2018. The reopened "AfricaMuseum" includes rooms on colonial violence, though critics — including the Congolese diaspora in Belgium —
    argue it still centers the Belgian perspective. In June 2020, King Philippe expressed "deep regret" for Belgian colonial abuses — stopping short of a formal apology. The parliamentary commission established
    in 2020 to investigate Belgium''s colonial past has faced resistance from members who argue that judging the past by present standards is anachronistic.

    '
