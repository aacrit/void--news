  notable_quotes:
  - text: The great forgetting began immediately. Leopold ordered the archives of the Congo Free State destroyed. Furnaces in Brussels burned for eight days.
    speaker: Adam Hochschild
    context: King Leopold's Ghost, 1998
  - text: The Congo was not a failed state. It was a successful extraction machine. It did exactly what it was designed to do.
    speaker: Georges Nzongola-Ntalaja
    context: 'The Congo from Leopold to Kabila: A People''s History, 2002'
  emphasized:
  - The Congo Free State as representative of colonial logic, not an exception to it
  - Congolese civilization and agency before and during colonialism
  - Gendered violence as structurally central to the rubber system
  - Continuity from rubber to cobalt — extractive architecture persisting into the 21st century
  omitted:
  - The reform movement's achievements and the international solidarity it generated
  - Belgian individuals who opposed the system from within
  - Comparative analysis with non-colonial extraction in other global regions
