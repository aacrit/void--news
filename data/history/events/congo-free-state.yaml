summary: 'In 1904, a Congolese man named Nsala sat on a mission veranda in the Nsongo district and stared at a small hand and foot laid on the ground before him. They belonged to his five-year-old daughter,
  Boali. Soldiers of the Anglo-Belgian India Rubber Company had killed her and his wife, Boali''s mother, when his village failed to meet its rubber quota. The missionary Alice Seeley Harris photographed
  Nsala gazing at what remained of his daughter. That photograph — reproduced in pamphlets, lantern slide lectures, and newspapers across Europe and America — became the image that forced a king to surrender
  a colony.


  The colony itself was a legal fiction. At the Berlin Conference of 1884-1885, Leopold II of Belgium acquired the Congo basin not as a Belgian possession but as his personal property, an area of 905,000
  square miles — 76 times the size of Belgium. He called it the "Congo Free State" and presented it to the world as a humanitarian enterprise dedicated to suppressing the Arab slave trade and bringing civilization
  to Central Africa. The reality was a forced-labor regime organized around a single commodity: wild rubber. The global rubber boom — driven by the bicycle craze of the 1890s and the emerging automobile
  industry — made Congo''s rubber vines extraordinarily valuable. Leopold''s agents imposed collection quotas on every village. Men who failed to deliver enough rubber saw their wives and children taken
  hostage. Villages that resisted were burned. The Force Publique, a private army of African soldiers commanded by European officers, enforced the system. Soldiers were required to account for every cartridge
  fired by presenting a severed right hand — proof that the bullet had killed, not been wasted. When soldiers used ammunition for hunting, they cut hands from the living to balance the books.


  Between 1885 and 1908, the population of the Congo dropped by half. Adam Hochschild''s estimate of 10 million dead includes those killed outright, those who died of starvation and disease as the forced-labor
  system destroyed subsistence agriculture, and those never born as birth rates collapsed under a regime that separated men from their families for weeks or months at a time. The first outsider to document
  the system was George Washington Williams, an African American journalist and Civil War veteran, who visited the Congo in 1890 and wrote an "Open Letter to His Serene Majesty Leopold II" cataloguing forced
  labor, land theft, and the absence of every humanitarian promise Leopold had made. Williams died a year later. His letter was ignored for a decade.


  It took E.D. Morel, a Liverpool shipping clerk, to build the campaign that ended Leopold''s rule. In 1900, Morel noticed that ships arriving from the Congo carried rubber and ivory worth millions of francs
  but departed with only guns, chains, and ammunition — no trade goods. The arithmetic was clear: the Congo''s exports were not bought but seized. Morel quit his job, founded the Congo Reform Association
  in 1904, and recruited Roger Casement, the British consul in the Congo, whose 1904 report to the Foreign Office documented systematic atrocities across hundreds of pages of testimony. Mark Twain contributed
  "King Leopold''s Soliloquy" (1905), a satirical monologue in which Leopold defends himself against the photographic evidence. Under international pressure, the Belgian parliament annexed the Congo in
  1908. Leopold received 50 million francs in compensation and burned his Congo archives before the transfer.

  '
significance: 'The Congo Reform Association (1904-1913) is regarded by historians as the first international human rights campaign, predating Amnesty International by 57 years. Roger Casement''s 1904 report
  established the model of on-the-ground human rights investigation used by every subsequent watchdog organization. Leopold''s system extracted an estimated 220 million francs in profit between 1896 and
  1905 alone — wealth that built the Royal Palace at Laeken, the Cinquantenaire Park, and the colonial museum at Tervuren (now the Africa Museum, which underwent a contested renovation in 2018 to address
  its colonial origins). The Belgian state takeover in 1908 changed the administration but not the extractive structure: forced labor for rubber, palm oil, and minerals continued under Belgian colonial
  rule until independence in 1960. The Congo''s cobalt reserves — 70% of global supply as of 2023 — are extracted under conditions that Amnesty International has documented as involving child labor and
  dangerous working conditions, a continuity that scholars trace directly to the structures Leopold built. Patrice Lumumba, the Congo''s first democratically elected prime minister, was assassinated in
  January 1961 with Belgian and CIA involvement — 53 years after Leopold''s regime ended but within the political architecture it created.

  '
