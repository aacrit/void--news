- viewpoint: Congolese Experience
  viewpoint_type: vanquished
  region_origin: africa
  narrative: 'The rubber quota arrived at the village like a sentence. Each community was assigned a weight of wild rubber to deliver — typically every two weeks — to the nearest Force Publique post. The
    vines grew in the forest, sometimes a two-day walk from the village. Men climbed the vines, slashed them, and smeared the sap over their bodies, letting it dry into sheets that could be peeled off —
    a process that tore skin and hair. The work consumed days that could not be spent growing food. When the quota was not met, sentries came.


    The hostage system was the regime''s primary enforcement mechanism. Force Publique soldiers — Congolese conscripts commanded by European officers — seized women and children from villages that fell
    behind on rubber deliveries. The women were held in chains at the military post until the men delivered enough rubber to secure their release. Missionaries documented women held for weeks, sometimes
    months, in stockades where they were raped, starved, and beaten. At some stations, the death rate among hostages exceeded 50 percent. The American Presbyterian missionary William Morrison reported in
    1899 that at a single post in the Kasai district, 45 women hostages died of starvation in one month.


    The severed hands became the system''s most recognizable atrocity. Force Publique soldiers were issued a limited number of cartridges and required to account for each one by presenting a right hand
    from the person the bullet killed. This accounting measure — designed to prevent soldiers from using state ammunition to hunt game — produced a secondary market in severed hands. When soldiers fired
    at game, they cut hands from living people or the recently dead to balance their cartridge accounts. Baskets of smoked hands were delivered to station chiefs. Alice Harris''s photographs — Nsala with
    his daughter''s hand and foot, baskets of hands, children with stumps where hands had been — circulated through Morel''s Congo Reform Association and were displayed at public meetings across Britain
    and America. These images did what written reports could not: they made the suffering undeniable.


    Women bore a double burden under the rubber regime. Beyond the hostage system, women were forced into labor cultivating food for Force Publique stations, carrying loads for European expeditions, and,
    in some regions, collecting rubber themselves. Sexual violence was endemic. Missionary reports from the Abir concession (the Anglo-Belgian India Rubber Company) documented systematic rape by sentries
    assigned to villages. Children born of these assaults were sometimes killed by the sentries to destroy the evidence. The Congolese oral tradition — recorded by anthropologists including Jan Vansina
    — preserves accounts of women who organized resistance: hiding food stores, warning men of approaching sentries, and in some cases killing sentries with poisoned food or arrows.


    The demographic catastrophe reshaped Congolese society. Villages that lost half or more of their population could not sustain the agricultural systems — crop rotation, communal land management, seasonal
    food storage — that had supported them for generations. Famine and disease followed the forced-labor system, and sleeping sickness, spread by the tsetse fly in areas where forest clearance for rubber
    had disrupted ecosystems, killed additional hundreds of thousands. Birth rates collapsed as men were separated from families for extended periods and as the physical toll of rubber collection — malnutrition,
    injury, exhaustion — reduced fertility.


    The transfer from Leopold to the Belgian state in 1908 did not end forced labor. The Belgian colonial government replaced rubber quotas with mineral extraction — copper in Katanga, diamonds in Kasai,
    gold in Orientale Province — and maintained a system of compulsory cultivation (cultures obligatoires) that required Congolese farmers to grow cash crops for export. The chicotte — the hippopotamus-hide
    whip — remained legal until 1955. When Patrice Lumumba addressed the independence ceremony on June 30, 1960, in the presence of King Baudouin, he departed from the prepared script: "We have known ironies,
    insults, blows that we endured morning, noon, and night because we are negroes." The Belgian delegation was stunned. Baudouin nearly walked out. The speech named what 75 years of colonial rule had been.

    '
  key_arguments:
  - The rubber quota system destroyed subsistence agriculture and produced mass famine
  - Women were held hostage, raped, and killed to coerce men into rubber collection
  - Severed hands were an accounting mechanism — soldiers cut them from the living to balance cartridge reports
  - Forced labor continued under Belgian state control after 1908, through mineral extraction and compulsory cultivation
