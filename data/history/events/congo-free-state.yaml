  - The Congo Free State was founded as a humanitarian enterprise to suppress the Arab slave trade
  - Leopold brought the Congo into the global economy through rubber and ivory trade
  - Infrastructure — railways, roads, trading stations — was built for mutual benefit
  - Atrocity reports were initially dismissed as British commercial propaganda
