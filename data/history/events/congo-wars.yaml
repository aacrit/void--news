  emphasized:
  - The scale and medical specificity of sexual violence — injuries that required new surgical techniques
  - Sexual violence as systematic and deliberate, used by every armed group including the government army
  - Mukwege's survival of assassination and his patients' role in protecting him
  - The gap between international recognition (Nobel Prize) and continued inaction
  omitted:
  - Male survivors of sexual violence in the Congo conflict, documented by organizations including the Refugee Law Project
  - Women's roles as combatants, commanders, and political actors within armed groups
  - Local women's organizations and justice mechanisms operating independently of international frameworks
  - The complexity of reintegration for survivors within communities that stigmatize rape
