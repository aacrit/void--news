- viewpoint: Congolese — Invasion and Extraction
  viewpoint_type: vanquished
  region_origin: africa
  narrative: 'From a Congolese perspective, the word "war" is a euphemism. What happened between 1996 and 2003 — and what continues in
    2026 — was an invasion disguised as liberation, followed by occupation disguised as peacekeeping, sustained by an extraction economy
    disguised as free trade. Jason Stearns, who spent a decade interviewing combatants, commanders, and civilians across eastern Congo
    for Dancing in the Glory of Monsters (2011), concluded that the "Congo Wars" were primarily a Rwandan and Ugandan project that
    used Congolese rebel movements as local cover.


    Laurent-Desire Kabila was installed by foreign powers. When he attempted to govern independently — expelling Rwandan military
    advisors in July 1998, appointing his own security chiefs, seeking new alliances with Zimbabwe and Angola — Rwanda and Uganda
    backed a new rebellion against him within weeks. The RCD, which presented itself as a Congolese liberation movement, was commanded
    from Kigali. Its leadership — Azarias Ruberwa, Adolphe Onusumba — held titles but not power. Eastern Congo was carved into
    spheres of influence: Uganda controlled Ituri and Orientale Province (gold, timber, diamonds); Rwanda controlled North and
    South Kivu (coltan, cassiterite, wolframite). The UN Panel of Experts on the Illegal Exploitation of Natural Resources in the
    DRC (2001, 2002, 2003) named 85 companies — Rwandan, Ugandan, Belgian, British, American, and others — profiting from Congo''s
    minerals. The Panel documented coltan shipments from Rwandan army-controlled mines in Bisie and Walikale to processing plants
    in Kigali, then to international buyers.


    The Congolese state army, the FARDC, offered no protection. It was itself a source of predation. Soldiers went months without
    pay. Units nominally integrated from rebel movements maintained separate chains of command. FARDC soldiers committed mass rape
    in Fizi (January 2011), Minova (November 2012), and dozens of other incidents documented by Human Rights Watch and the UN Joint
    Human Rights Office. The army that was supposed to defend eastern Congo''s civilians was among the forces terrorizing them.


    Georges Nzongola-Ntalaja, in The Congo from Leopold to Kabila: A People''s History (2002), places the wars within a longer
    pattern. The same territory that Leopold II drained of rubber, that the Belgian state drained of copper and uranium, that
    Mobutu''s kleptocracy drained of diamond and cobalt revenue, was now being drained of coltan, cassiterite, and gold by a
    rotating cast of neighboring armies, rebel groups, and international corporations. The Congolese population — 60 million
    people in 1996, over 100 million by 2024 — has never been the beneficiary of its own mineral wealth. Eastern Congo in 2026
    has over 120 active armed groups. The M23 movement, which the UN Group of Experts has documented as receiving direct Rwandan
    military support including troops, weapons, and command-and-control infrastructure, seized territory in North Kivu in 2022-2023.
    Goma, a city of two million on the shore of Lake Kivu, was surrounded. The war that was declared over in 2003 continues to
    kill, displace, and dispossess Congolese civilians who have no army, no international patron, and no exit.

    '
  key_arguments:
  - The Congo Wars were a Rwandan and Ugandan invasion using Congolese rebel movements as cover
  - Eastern Congo was divided into resource extraction zones controlled by neighboring armies
  - The UN Panel of Experts named 85 companies profiting from Congo's conflict minerals
  - The FARDC — Congo's own army — was itself predatory, committing mass sexual violence against the civilians it claimed to protect
  sources:
