  emphasized:
  - The invasion narrative — foreign armies on Congolese soil controlling Congolese resources
  - Continuity of extraction from Leopold through Mobutu through the Congo Wars
  - The FARDC's predatory behavior toward its own civilian population
  - The war's continuation in 2026 with over 120 active armed groups in eastern Congo
  omitted:
