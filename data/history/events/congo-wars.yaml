slug: congo-wars
title: The Congo Wars
subtitle: The deadliest conflict since 1945 killed 5.4 million people. Most of the world cannot name the country where it happened.
date_display: 1996-2003
date_sort: 1996
date_precision: year
era: contemporary
region: africa
country: Democratic Republic of the Congo (Zaire), Rwanda, Uganda, Burundi, Angola, Zimbabwe, Namibia, Chad, Sudan
category: war
severity: catastrophic
death_toll: 5.4 million dead (International Rescue Committee, 2007 estimate — the largest death toll from conflict since World War II); 2.7 million internally displaced; hundreds of thousands of sexual violence survivors documented by Denis Mukwege's Panzi Hospital
affected_population: Congo's 60 million population; eastern Congo's Kivu provinces bore the concentrated violence
duration: 'First Congo War: October 1996 - May 1997; Second Congo War: August 1998 - July 2003; low-level conflict in eastern Congo ongoing through 2026'
summary: 'On October 18, 1996, the Alliance of Democratic Forces for the Liberation of Congo-Zaire (AFDL) crossed from Rwanda into eastern
  Zaire. Laurent-Desire Kabila led them — a rebel who had been fighting since the 1960s, who had once hosted Che Guevara in the mountains
  above Lake Tanganyika and been dismissed by Guevara as lacking "revolutionary seriousness." Behind Kabila stood the Rwandan Patriotic
  Army under Paul Kagame, the Ugandan People''s Defence Force under Yoweri Museveni, and the Angolan army. Their stated target: the
  Interahamwe genocidaires who had fled Rwanda after the 1994 genocide and reconstituted in refugee camps across eastern Zaire. Mobutu
  Sese Seko — who had ruled Zaire for 32 years, renamed the country, the river, and himself — sent his army to stop them. His soldiers
  looted Kisangani instead of defending it. Kabila entered Kinshasa on May 17, 1997. Mobutu fled to Morocco, where he died of prostate
  cancer on September 7. Kabila renamed the country the Democratic Republic of the Congo.


  Fourteen months later, Kabila turned on his backers. He expelled Rwandan military advisors from Kinshasa in July 1998. On August 2,
  Rwandan and Ugandan forces backed a new rebellion — the Rassemblement Congolais pour la Democratie (RCD) — and invaded eastern Congo.
  Kabila called for help. Zimbabwe sent 11,000 troops. Angola sent its air force. Namibia, Chad, and Sudan contributed forces. By early
  1999, nine African nations had soldiers on Congolese soil. The UN called it "Africa''s World War." The Lusaka Ceasefire Agreement,
  signed in July 1999, was violated before the ink dried.


  Laurent-Desire Kabila was shot by one of his own bodyguards, Rashidi Kasereka, in the marble salon of the Palais de la Nation in
  Kinshasa on January 16, 2001. He was 61. His son Joseph, a 29-year-old major general, was installed as president within ten days.
  Joseph Kabila reopened peace negotiations. The Inter-Congolese Dialogue, brokered in Sun City, South Africa, produced a power-sharing
  agreement in December 2002. Foreign armies formally withdrew. The war was declared over on July 1, 2003.


  Eastern Congo never received that message. The UN deployed MONUC — later renamed MONUSCO — which grew to 20,000 troops, the largest
  peacekeeping force in the world. MONUC was present during the Kiwanja massacre of November 2008: CNDP forces under Laurent Nkunda
  killed 150 civilians while UN peacekeepers were stationed three kilometers away. The Srebrenica pattern repeated. At Panzi Hospital
  in Bukavu, gynecological surgeon Denis Mukwege treated tens of thousands of rape survivors — women brought in with injuries so severe
  he developed new surgical techniques. Every armed group in eastern Congo used sexual violence as a weapon — including the FARDC,
  the Congolese government''s own army. The M23 rebellion, backed by Rwanda, seized Goma in November 2012, withdrew under international
  pressure, and returned in 2022. As of 2026, eastern Congo has over 120 active armed groups. The war that officially ended in 2003
  has not ended.

  '
significance: 'The IRC''s mortality surveys (2000-2007) documented 5.4 million excess deaths, with fewer than 10% from direct violence —
  the rest from disease, malnutrition, and the collapse of health infrastructure. The UN Mapping Report (2010) documented 617 incidents
  of potential war crimes by Rwandan forces in Congo between 1993 and 2003, using language that described attacks against Hutu civilians
  as potentially constituting genocide. Eastern Congo''s Kivu provinces contain 60-80% of known global coltan reserves — the mineral
  refined into tantalum for capacitors in mobile phones, laptops, and electric vehicles. The UN Panel of Experts (2001, 2002, 2003)
  named 85 companies profiting from Congo''s conflict minerals. The Dodd-Frank Act Section 1502 (2010) required US companies to report
  conflict mineral sourcing. Denis Mukwege and Nadia Murad shared the 2018 Nobel Peace Prize for their work against sexual violence
  in conflict. MONUSCO''s $1.3 billion annual budget made it the most expensive peacekeeping operation in UN history. The DRC''s mineral
  wealth is estimated at $24 trillion; its GDP per capita in 2023 was $654.

  '
