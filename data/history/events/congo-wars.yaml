legacy_points:
- 5.4 million excess deaths between 1998 and 2007 — fewer than 10% from direct violence; the rest from disease, malnutrition, and collapsed health systems (IRC mortality surveys)
- Eastern Congo holds 60-80% of known global coltan reserves; coltan is in the capacitors of every mobile phone and laptop manufactured worldwide
- MONUSCO deployed 20,000 troops at a cost of $1.3 billion per year — the largest and most expensive UN peacekeeping operation in history — and repeatedly failed to protect civilians
- Denis Mukwege's Panzi Hospital treated over 50,000 survivors of sexual violence; he shared the 2018 Nobel Peace Prize with Nadia Murad
- The M23 movement, backed by Rwanda according to UN Group of Experts reports (2012, 2022, 2024), seized Goma in 2012 and again threatened it in 2023-2025 — the war's continuation two decades after the peace agreement
- The UN Mapping Report (2010) described Rwandan forces' attacks on Hutu refugees in Congo between 1996 and 1997 in terms consistent with potential genocide — Rwanda rejected the characterization and threatened to withdraw its 3,000 peacekeeping troops from Darfur
