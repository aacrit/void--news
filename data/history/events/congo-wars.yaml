  notable_quotes:
  - text: We knew what was happening in Kiwanja. We could hear the gunshots from our base. We did not have authorization to move.
    speaker: MONUC peacekeeper
    context: Quoted in Human Rights Watch, You Will Be Punished, 2009
  - text: The international community has spent billions of dollars on peacekeeping in Congo without ever asking the Congolese what they actually needed.
    speaker: Severine Autesserre
    context: 'Peaceland, 2014'
  emphasized:
  - The structural gap between mandate and capacity — monitoring vs. enforcement in an active war zone
  - The Kiwanja massacre as the exemplar of peacekeeping failure
  - The humanitarian catastrophe documented in the IRC mortality surveys — 5.4 million dead, 90% from preventable disease
  - The cost of MONUSCO ($1.3 billion/year) against its inability to protect civilians
  omitted:
  - Instances where MONUC/MONUSCO forces did protect civilians, including Operation Kimia II and the Force Intervention Brigade's operations against M23
  - The political constraints on troop-contributing countries that shaped deployment decisions
  - The Congolese government's own responsibility for security provision
  - The difficulty of any military force operating across a territory the size of Western Europe with minimal infrastructure
- viewpoint: Women of Eastern Congo / Sexual Violence
  viewpoint_type: vanquished
  region_origin: africa
  narrative: 'Denis Mukwege opened Panzi Hospital in Bukavu, South Kivu, on September 15, 1999. He was a gynecologist. He expected to
    deliver babies. Within three months, the women arriving at Panzi had injuries that no obstetric training had prepared him for.
    Gang rape. Rape with bayonets, sticks, bottles. Deliberate vaginal destruction designed to cause fistula — the tearing of tissue
    between the vaginal wall and the bladder or rectum, producing incontinence, chronic infection, and social ostracism. Women
    walked for days through the forest to reach Panzi because they had heard that one doctor would treat them. By 2018, when
    Mukwege accepted the Nobel Peace Prize in Oslo, Panzi had treated over 50,000 survivors.


    The UN Special Representative on Sexual Violence in Conflict documented rape as a systematic weapon of war in eastern Congo —
    used by every armed group, on every side, in every phase of the conflict. The FDLR (Hutu militia), the CNDP (Tutsi rebellion),
    the Mai-Mai (local defense forces), the Rwandan army, the Ugandan army, and the FARDC (Congolese government army) all committed
    mass sexual violence. The 2011 study by the American Journal of Public Health estimated that 1,152 women were raped per day in
    the DRC — 48 per hour. The study surveyed 3,436 women across the country. The number was challenged by some researchers as
    extrapolation from a limited sample, but even conservative estimates by the UN put the total in the hundreds of thousands.


    The women brought to Panzi described patterns. Rape was used during military operations as collective punishment against communities
    suspected of supporting rival armed groups. Women were raped in front of their families — husbands, children, parents — to
    destroy communal bonds. Gang rape by multiple soldiers was more common than assault by a single perpetrator. In some cases,
    women were held as sexual slaves for weeks or months in armed group camps. The injuries were so severe that Mukwege developed
    new reconstructive surgical techniques — procedures that did not exist in any textbook because the injuries had not existed before.


    On October 25, 2012, armed men came to Mukwege''s home in Bukavu. His guard, a man named Joseph Bizimana, was killed at the
    gate. Mukwege''s daughters were held at gunpoint inside the house. Mukwege was not home. He survived because a neighbor''s car
    happened to arrive, and the gunmen fled. The assassination attempt forced him into exile in Belgium. He returned to Bukavu in
    January 2013 after Congolese women — patients, nurses, community leaders — raised money for his plane ticket and organized
    his security. The women who had been his patients became his protectors.


    In his Nobel lecture on December 10, 2018, Mukwege shared the stage with Nadia Murad — a Yazidi woman who had been captured
    and held as a sexual slave by ISIS in Iraq. Two laureates, two continents, two conflicts, one weapon. Mukwege told the audience
    in Oslo: "My body, and the bodies of all women in the eastern Congo, had been turned into a battlefield. The world has remained
    silent, unmoved, while we are crying." The speech lasted 25 minutes. He named the armed groups. He named the governments. He
    named the multinational corporations purchasing conflict minerals. He asked: "If you choose not to intervene, do not disturb.
    Please, have the decency to not look the other way." The audience applauded. The war continued.

    '
  key_arguments:
  - Panzi Hospital treated over 50,000 sexual violence survivors between 1999 and 2018 — injuries so extreme that Mukwege developed new surgical techniques
  - Sexual violence was used systematically by every armed group — not as a byproduct of war but as a weapon of territorial control and communal destruction
  - The 2011 American Journal of Public Health study estimated 1,152 rapes per day across the DRC — contested in methodology but consistent in direction with all other estimates
  - Mukwege survived an assassination attempt in 2012; Congolese women raised money for his return and organized his security
