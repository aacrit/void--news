- target_slug: congo-free-state
  connection_type: parallel
  description: The same Congo basin that Leopold II drained of rubber through forced labor was drained of coltan and cassiterite a century later — the extraction economy changed commodities but not structure; the DRC's mineral wealth has flowed outward under every regime since 1885
- target_slug: scramble-for-africa
  connection_type: influenced
  description: The borders drawn at the Berlin Conference (1884-1885) placed 250 ethnic groups under the DRC's borders without political coherence — a structural condition that every post-independence government inherited and no foreign intervention has resolved
- target_slug: transatlantic-slave-trade
  connection_type: parallel
  description: The Congo basin was a primary source region for the Atlantic slave trade; the extraction economy that Kongo King Afonso I protested to the Portuguese crown in 1526 took different forms across five centuries — slaves, rubber, copper, coltan — but the directional flow of wealth never reversed
