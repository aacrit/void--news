  - Congolese agency in the political negotiations and power-sharing arrangements
- viewpoint: Resource Extraction / Global Supply Chain
  viewpoint_type: revisionist
  region_origin: global
  narrative: 'In 2000, the price of coltan — columbite-tantalite, an ore refined into tantalum — rose from $50 per kilogram to $400.
    The cause was the mobile phone. Nokia, Motorola, and Ericsson were selling handsets by the hundreds of millions. Every phone
    required a tantalum capacitor. Eastern Congo holds 60-80% of known global coltan reserves, concentrated in North and South Kivu.
    The price spike turned eastern Congo''s mines into the most valuable real estate in the war — and armed groups, including the
    Rwandan army, the Ugandan army, the RCD, and the MLC, seized and taxed them.


    The UN Panel of Experts on the Illegal Exploitation of Natural Resources in the DRC published three reports (2001, 2002, 2003)
    that traced the supply chain from artisanal mines in Bisie, Walikale, and Rubaya through comptoirs (trading houses) in Goma
    and Bukavu to smelters in Rwanda, Uganda, Malaysia, Kazakhstan, and China. The Panel named 85 companies and individuals — including
    executives at Cabot Corporation (US), HC Starck (Germany), Ningxia (China), and Eagle Wings Resources International (Rwanda/US) —
    as having directly or indirectly financed armed groups through mineral purchases. The minerals passed through enough intermediaries
    that by the time tantalum reached a circuit board in Shenzhen, its origin was untraceable. The phone in a consumer''s pocket in
    London or New York or Tokyo may contain tantalum mined by forced labor in a pit controlled by a militia that uses rape as a weapon
    of territorial control. The supply chain made that distance possible.


    Severine Autesserre, in The Trouble with the Congo: Local Violence and the Failure of International Peacebuilding (2010), argued
    that the "resource war" narrative — while grounded in documented fact — was used by the international community to explain the
    conflict in terms that obscured local political dynamics. Autesserre''s fieldwork in the Kivus revealed that many armed groups
    fought over land, local political authority, and ethnic grievances that had nothing to do with coltan. The resource narrative was
    comforting because it implied a solution: regulate the supply chain and the violence stops. It did not stop. The Dodd-Frank Act
    (Section 1502, signed July 2010) required US-listed companies to report whether their products contained conflict minerals from
    the DRC or adjoining countries. Compliance costs were estimated at $3-4 billion for the first year. The SEC rules were challenged
    in court, partially struck down, and weakened by the Trump administration in 2017. The EU Conflict Minerals Regulation took effect
    in January 2021 with mandatory due diligence — but enforcement depended on member states, and traceability remained limited.


    The coltan economy illustrates a structural asymmetry. The DRC exports raw ore. Rwanda — which has minimal coltan deposits of its
    own — operates processing facilities and exports refined tantalum, earning higher margins. Global Witness documented in 2009 that
    SOMIKIVU, a Rwandan military-linked company, controlled coltan trading in South Kivu. The mineral wealth flows outward. The DRC''s
    GDP per capita in 2023 was $654 — 186th out of 191 countries. Congo sits on an estimated $24 trillion in mineral reserves. The
    gap between what lies underground and what Congolese citizens receive is the war''s economic signature — and it predates the war
    by a century.

    '
  key_arguments:
  - The 2000 coltan price spike (from $50/kg to $400/kg) transformed eastern Congo's mines into the war's primary economic prize
  - The UN Panel of Experts named 85 companies profiting from conflict minerals, tracing supply chains from artisanal mines to global electronics manufacturers
  - The Dodd-Frank Act Section 1502 (2010) was the first legislative attempt to regulate conflict mineral supply chains — its enforcement was limited
  - The resource narrative, while factually grounded, obscured local political dynamics and implied a false solution
