perspectives:
- viewpoint: Rwandan / RPF — Security Imperative
  viewpoint_type: institutional
  region_origin: africa
  narrative: 'Between July and November 1994, approximately 1.7 million Hutu refugees crossed from Rwanda into eastern Zaire. Among them
    were an estimated 30,000-40,000 former Rwandan army soldiers and Interahamwe militiamen — the men who had just killed 800,000 Tutsis
    in 100 days. They did not disband. In the refugee camps around Goma, Bukavu, and Uvira, the ex-FAR (Forces Armees Rwandaises) and
    Interahamwe reconstituted their command structures. They trained. They launched cross-border raids into northwestern Rwanda —
    killing Tutsi survivors in Gisenyi and Ruhengeri prefectures. The camps were administered by UNHCR, which spent $1 million per day
    feeding 1.7 million people but lacked the mandate or capacity to separate civilians from combatants. A Canadian general, Maurice
    Baril, proposed a multinational force to disarm the camps. No country volunteered troops. The international community that had
    failed to stop the genocide now failed to contain its armed perpetrators.


    Rwanda''s government, led by Paul Kagame and the RPF, framed the 1996 intervention in eastern Zaire as a security operation — the
    pursuit of genocidaires that the UN had refused to disarm. Philip Gourevitch, the New Yorker journalist whose 1998 book We Wish
    to Inform You That Tomorrow We Will Be Killed With Our Families shaped Western understanding of the genocide, wrote that Rwanda''s
    logic was difficult to dismiss: the men in those camps had murdered 800,000 people and were organizing to do it again. The RPF''s
    pursuit of the Interahamwe across eastern Zaire violated Zairean sovereignty. But sovereignty, in this argument, was the shield
    behind which genocidaires hid — and the international community had refused to remove it.


    The Rwandan government maintained that its forces targeted combatants, not civilians. The reality was contested. Medecins Sans
    Frontieres staff who remained in eastern Zaire during the AFDL advance reported that Rwandan soldiers fired on refugee columns,
    killed unarmed Hutu civilians in forest clearings, and pursued fleeing refugees hundreds of kilometers westward toward the Congo
    River. The UN Mapping Report, published in October 2010 after years of Rwandan pressure to suppress it, documented 617 incidents
    of potential war crimes committed by AFDL and Rwandan forces between 1993 and 2003. The report''s most incendiary passage described
    the attacks against Hutu refugees as potentially constituting genocide — a characterization Rwanda rejected categorically. Kagame
    called the report "immoral" and "dangerous." Rwanda threatened to withdraw its 3,000 peacekeeping troops from Darfur, where they
    constituted a core element of UNAMID. The implicit leverage was unmistakable: Rwanda''s cooperation in one theater purchased
    impunity in another.


    Rwanda''s defenders — and they are numerous in Washington, London, and among the genocide survivor community — argue that the
    security threat was real and ongoing. Cross-border raids continued into the early 2000s. The FDLR (Forces Democratiques de
    Liberation du Rwanda), the successor to the Interahamwe, remained active in eastern Congo through 2026, numbering an estimated
    1,500-2,000 fighters. Howard Wolpe, the U.S. Special Envoy for the Great Lakes, testified to Congress in 2009 that Rwanda''s
    security concerns were "legitimate, even if its methods were not." The question the RPF narrative raises but does not answer:
    at what point does the pursuit of genocidaires become the occupation of a neighboring country''s territory — and who decides?

    '
  key_arguments:
  - 30,000-40,000 armed genocidaires reconstituted in Zairean refugee camps and launched cross-border raids into Rwanda
  - The international community refused to disarm the camps despite UNHCR's inability to separate civilians from combatants
  - Rwanda's intervention was framed as a security necessity — pursuit of armed men who had committed genocide
  - The UN Mapping Report's genocide characterization was rejected by Rwanda, which leveraged its Darfur peacekeeping contribution
