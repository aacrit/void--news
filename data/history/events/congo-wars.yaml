- viewpoint: International / UN Peacekeeping Failure
  viewpoint_type: bystander
  region_origin: global
  narrative: 'MONUC — the United Nations Organization Mission in the Democratic Republic of the Congo — was established by Security
    Council Resolution 1279 on November 30, 1999, with an initial authorized strength of 5,537 military personnel. Its mandate was
    to monitor the Lusaka Ceasefire Agreement. Monitor. Not enforce. Not protect. The distinction, written into the resolution''s
    language, defined everything that followed.


    By 2010, MONUC had grown to over 20,000 uniformed personnel — the largest peacekeeping deployment in UN history, at an annual
    cost exceeding $1.3 billion. It was renamed MONUSCO in July 2010 and given a mandate under Chapter VII of the UN Charter to
    use "all necessary means" to protect civilians. The mandate expanded. The capacity did not. MONUSCO''s troops — drawn from
    India, Pakistan, Bangladesh, South Africa, and dozens of other contributing countries — were deployed across a territory the
    size of Western Europe with minimal road infrastructure. Bases were fixed. Armed groups were mobile. The mathematics of coverage
    were impossible from the start.


    The Kiwanja massacre exposed the gap between mandate and reality. On November 4-5, 2008, forces of the CNDP (Congres National
    pour la Defense du Peuple) under Laurent Nkunda entered the town of Kiwanja in North Kivu and killed an estimated 150 civilians.
    MONUC''s base was three kilometers away. The peacekeepers did not intervene. A joint investigation by Human Rights Watch and the
    UN Joint Human Rights Office documented the killings in detail — house-to-house executions, bodies in the streets, survivors
    who had run toward the UN base expecting protection and received none. The pattern was Srebrenica: peacekeepers present,
    civilians killed.


    The failure was structural, not individual. Philip Lancaster, a former MONUC senior official, described the force as a
    "fire brigade trying to cover a burning continent with a garden hose." Troop-contributing countries retained national command
    authority over their contingents, creating a dual chain of command that paralyzed rapid response. Rules of engagement varied
    by contingent. Some national forces — the Indian brigade in South Kivu, for example — were cited for effective civilian protection
    operations. Others refused to leave their bases after dark. The Security Council issued 15 resolutions on Congo between 1999
    and 2003, 40 more between 2003 and 2020. None solved the fundamental problem: a peacekeeping force designed to monitor a
    ceasefire was deployed in a theater where there was no ceasefire to monitor.


    The humanitarian organizations operating alongside MONUC — MSF, IRC, UNHCR, OCHA — documented the consequences with clinical
    precision. The IRC''s mortality surveys, published in 2000, 2003, 2004, and 2007, calculated 5.4 million excess deaths
    between August 1998 and April 2007. Fewer than 10% died from direct violence. The rest — 90% — died from malaria, diarrhea,
    pneumonia, and malnutrition in a country whose health infrastructure had collapsed. One in five children in eastern Congo
    died before age five. The humanitarian community produced reports, held briefings, issued press releases. The Security Council
    read the reports and renewed the mandate. The DRC appeared regularly on the Council''s agenda — more frequently than any
    other country. Attention without action became the international community''s defining posture.

    '
  key_arguments:
  - MONUC/MONUSCO grew to 20,000 troops at $1.3 billion per year — the largest UN peacekeeping operation in history — deployed across a territory the size of Western Europe
  - The Kiwanja massacre (November 2008) repeated the Srebrenica pattern — peacekeepers stationed three kilometers away did not intervene as 150 civilians were killed
  - Structural failures — dual chain of command, fixed bases against mobile armed groups, monitoring mandate in an active war zone — were systemic, not accidental
  - The IRC documented 5.4 million excess deaths, 90% from disease and malnutrition caused by collapsed health infrastructure
  sources:
