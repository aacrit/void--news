- viewpoint: New Historians / Revisionist
  viewpoint_type: revisionist
  region_origin: middle-east
  narrative: 'The "New Historians" — a group of Israeli scholars who gained access to declassified Israeli, British, and UN
    archives in the late 1980s — challenged the foundational narratives of both Israeli and Palestinian historiography. Their
    work did not produce a single revisionist narrative but a body of evidence-based scholarship that complicated the established
    stories on both sides.


    Benny Morris''s The Birth of the Palestinian Refugee Problem, 1947-1949 (1988, revised 2004) was the breakthrough. Using
    Israeli Defense Forces archives, Morris documented that the Palestinian exodus had multiple causes: voluntary flight from
    war zones, expulsion by Israeli forces, psychological warfare (loudspeaker broadcasts warning of attacks, Deir Yassin
    as a deterrent), and general collapse of Palestinian social structures. He identified specific instances of expulsion
    — Lydda, Ramle, villages in the Galilee — as well as cases where Palestinians left of their own accord. His conclusion:
    "The Palestinian refugee problem was born of war, not by design, Jewish or Arab. It was largely a by-product of Arab and
    Jewish fears and of the protracted, bitter fighting." Morris''s revised edition was more blunt: the evidence showed "an
    intent to clear the borders and main roads of Arab communities."


    Avi Shlaim''s The Iron Wall: Israel and the Arab World (2000) challenged the narrative that the Arab states invaded in
    a coordinated effort to destroy Israel. Shlaim demonstrated that King Abdullah I of Transjordan had reached a tacit understanding
    with the Jewish Agency before the war — an arrangement to divide Palestine between them, with Abdullah taking the West
    Bank. The invasion, in Shlaim''s account, was not a unified Arab assault but a series of uncoordinated campaigns driven
    by each state''s own interests. Abdullah wanted the West Bank; Egypt wanted to prevent Abdullah from getting it; Syria
    had designs on the Galilee. The Palestinians themselves had little agency in these calculations.


    Ilan Pappe''s The Ethnic Cleansing of Palestine (2006) went further than Morris, arguing that Plan Dalet constituted a
    deliberate plan for the ethnic cleansing of Palestine — not an ad hoc response to military circumstances but a premeditated
    strategy to create a Jewish-majority state by removing the Arab population. Pappe''s thesis is contested by Morris and
    others, who argue that Plan Dalet was a military plan to secure territory, not an ethnic cleansing blueprint, and that
    the distinction matters. The debate between Morris and Pappe — both using Israeli archives, reaching different conclusions
    — illustrates the limits of archival evidence in resolving questions of intent.


    Simha Flapan''s The Birth of Israel: Myths and Realities (1987) identified seven myths of the 1948 war: that Zionists
    accepted the UN partition in good faith, that Arabs rejected all compromise, that Palestinians left voluntarily, that
    the Arab invasion was coordinated to destroy Israel, that the Arab states refused to negotiate, that Israel was a David
    against a Goliath, and that Israel has always sought peace. Flapan did not argue that the opposite of each myth was true;
    he argued that the reality was more complex than either side''s narrative allowed.


    The New Historians'' collective contribution was to demonstrate that 1948 was not a simple morality tale — neither the
    heroic birth of a nation from the ashes of the Holocaust nor the straightforward ethnic cleansing of an indigenous people.
    It was a war fought by human beings making strategic, moral, and sometimes criminal decisions under conditions of extreme
    uncertainty. The evidence does not produce a single narrative. It produces a plurality of documented facts that support
    different but overlapping interpretations. The conflict over what happened in 1948 continues in the archives as much as
    it does on the ground.

    '
  key_arguments:
  - Israeli archives document both voluntary flight and deliberate expulsion of Palestinians
  - The Arab invasion was uncoordinated; King Abdullah had a prior understanding with the Jewish Agency
  - Plan Dalet's intent — military security or ethnic cleansing — remains debated among Israeli historians
  - The reality of 1948 is more complex than either side's founding narrative allows
