summary: 'On November 29, 1947, the United Nations General Assembly adopted Resolution 181, recommending the partition of
  Mandatory Palestine into an Arab state, a Jewish state, and an international zone comprising Jerusalem and Bethlehem. The
  Jewish state would receive 56% of the territory (including the Negev desert) with a population of 498,000 Jews and 407,000
  Arabs. The Arab state would receive 43% with a population of 725,000 Arabs and 10,000 Jews. The Jewish Agency accepted the
  plan. The Arab Higher Committee, the Palestine Arab leadership under Hajj Amin al-Husseini, rejected it. The Arab League
  declared it would resist partition by force.


  Civil war between Jewish and Arab communities in Palestine erupted immediately. Between December 1947 and May 1948, fighting
  escalated from local skirmishes to organized military campaigns. The Haganah (the main Jewish paramilitary), the Irgun,
  and Lehi (the Stern Gang) launched Plan Dalet in March 1948, a military strategy to secure the territory allocated to the
  Jewish state and the corridors between Jewish population centers. Palestinian and Arab irregular forces, including the Arab
  Liberation Army under Fawzi al-Qawuqji, attacked Jewish settlements and supply convoys.


  On April 9, 1948, Irgun and Lehi forces attacked the village of Deir Yassin, near Jerusalem, killing between 107 and 254
  Palestinian civilians — the number remains disputed. News of Deir Yassin spread across Palestine and accelerated the flight
  of Palestinian civilians from areas of fighting. Four days later, on April 13, an Arab convoy ambushed a Hadassah medical
  convoy on the road to Mount Scopus, killing 78 Jewish doctors, nurses, and patients. The violence of the civil war was reciprocal,
  brutal, and directed at civilians on both sides.


  On May 14, 1948, David Ben-Gurion read the Israeli Declaration of Independence at the Tel Aviv Museum. The declaration stated
  that "the State of Israel will be open for Jewish immigration and for the Ingathering of the Exiles." Eleven minutes later,
  the United States recognized the new state. The Soviet Union followed on May 17. The following day, armies from Egypt, Transjordan,
  Syria, Iraq, and Lebanon invaded.


  The 1948 Arab-Israeli War lasted until armistice agreements were signed in 1949. Israel emerged in control of 78% of Mandatory
  Palestine — substantially more than the 56% allocated by the partition plan. Transjordan''s Arab Legion controlled the West
  Bank and East Jerusalem, including the Old City. Egypt held the Gaza Strip. No Palestinian Arab state was established.


  During and after the war, approximately 700,000-750,000 Palestinian Arabs fled or were expelled from their homes. Some fled
  in fear of fighting and massacres. Others were expelled at gunpoint by Israeli forces — documented in cases including Lydda
  (Lod), Ramle, and villages in the Galilee. Others left expecting to return after Arab armies prevailed. The refugees settled
  in camps in the West Bank, Gaza, Lebanon, Syria, and Jordan. They were not permitted to return. Their descendants now number
  over 5.9 million and remain registered with UNRWA. Palestinians call this displacement the Nakba — the Catastrophe.

  '
significance: 'Israel''s establishment fulfilled the Zionist movement''s goal of a Jewish state after millennia of diaspora
  and the Holocaust''s destruction of six million European Jews. The Nakba displaced 700,000-750,000 Palestinians whose descendants
  now number 5.9 million registered with UNRWA. The conflict has produced five major wars (1948, 1956, 1967, 1973, 2023-),
  two Palestinian intifadas (1987, 2000), Israeli military occupation of the West Bank since 1967, and a blockade of Gaza
  since 2007. No final status agreement has been reached despite negotiations at Camp David (2000), Taba (2001), and Annapolis
  (2007). UN General Assembly Resolution 194 (1948), which called for refugee return, and UN Security Council Resolution 242
  (1967), which established the land-for-peace framework, remain unimplemented. The events of 1948 are remembered through
  incompatible narratives — a liberation and a catastrophe occurring simultaneously on the same territory.

  '
