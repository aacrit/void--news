- Created the State of Israel — the first Jewish-majority sovereign state in nearly 2,000 years
- Displaced 700,000-750,000 Palestinians — their descendants now number 5.9 million registered refugees
- No Palestinian state was established; the West Bank and Gaza came under Jordanian and Egyptian control
- Produced five major wars and an unresolved conflict that persists into the 2020s
- UN Mediator Count Folke Bernadotte was assassinated by the Lehi paramilitary on September 17, 1948
