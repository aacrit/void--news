perspectives:
- viewpoint: Zionist / Israeli
  viewpoint_type: victor
  region_origin: middle-east
  narrative: 'The State of Israel was born from two historical forces: the 2,000-year Jewish connection to the Land of Israel
    and the catastrophe of the Holocaust, which destroyed one-third of the world''s Jewish population and proved that Jewish
    survival required Jewish sovereignty. Theodore Herzl, who convened the First Zionist Congress in Basel in 1897, argued
    that anti-Semitism was ineradicable within European society and that Jews would never be safe as a minority in other peoples''
    nations. The Holocaust vindicated his diagnosis with six million deaths.


    The Zionist movement built its presence in Palestine through legal land purchase and immigration under Ottoman and later
    British rule. The Balfour Declaration of November 2, 1917, in which the British government endorsed "the establishment
    in Palestine of a national home for the Jewish people," provided international legitimacy. Jewish immigration accelerated
    during the 1920s and 1930s. The Yishuv (Jewish community in Palestine) established governing institutions — the Jewish
    Agency, the Histadrut labor federation, the Hebrew University — that formed the skeleton of a state. By 1947, the Jewish
    population of Palestine had grown from 83,000 (11% in 1922) to 630,000 (33%).


    The Israeli narrative emphasizes that the Jewish leadership accepted the UN Partition Plan despite its limitations — the
    proposed Jewish state included the Negev desert, lacked control of Jerusalem, and contained a nearly equal Arab population
    — while the Arab leadership rejected it. The Arab Higher Committee''s rejection and the subsequent invasion by five Arab
    armies framed the 1948 war as a defensive struggle for survival, not a war of conquest. In Ben-Gurion''s formulation,
    "We accepted the UN plan, they rejected it and attacked us."


    The War of Independence killed 6,373 Israelis — approximately 1% of the Jewish population. The sacrifice is central to
    Israeli national memory. The war produced the "Ein Brera" (no choice) ethos: Israel fights because it must, not because
    it wants to. The integration of 600,000 Jewish immigrants between 1948 and 1951 — Holocaust survivors from Europe, Jews
    expelled from Iraq, Yemen, Egypt, and North Africa — doubled the population and created an existential demographic and
    economic challenge that defined the state''s first decade.


    Regarding the Palestinian exodus, the traditional Israeli narrative held that Palestinian leaders and Arab radio broadcasts
    instructed civilians to leave, promising they could return after Arab armies expelled the Jews. Benny Morris''s The Birth
    of the Palestinian Refugee Problem (1988) — written by an Israeli historian using newly declassified Israeli military
    archives — demonstrated that the reality was more complex: some Palestinians fled voluntarily, some were expelled by Israeli
    forces, some were driven out by psychological warfare, and many fled in the general chaos of war. Morris documented specific
    expulsions (Lydda, Ramle) alongside cases of voluntary departure and argued that "the creation of the problem was almost
    inevitable given the Yishuv''s ideological disposition to transfer."


    The Israeli position on refugees holds that Resolution 194''s right of return is impractical — the absorption of millions
    of Palestinian refugees and descendants would end Israel''s existence as a Jewish state. Israeli negotiators have offered
    compensation and limited family reunification in various peace proposals (Camp David 2000, Olmert Plan 2008) while insisting
    that the bulk of refugees be resettled in a future Palestinian state or in host countries. The parallel displacement of
    approximately 850,000 Jews from Arab countries — who lost property, businesses, and communities — is cited as a de facto
    population exchange that should be recognized alongside the Palestinian displacement.

    '
  key_arguments:
  - Jewish sovereignty was necessitated by 2,000 years of persecution culminating in the Holocaust
  - The Jewish leadership accepted the UN Partition Plan; the Arab leadership rejected it and initiated war
  - The 1948 war was a defensive struggle for survival against five invading armies
  - 850,000 Jews expelled from Arab countries constituted a parallel displacement
