- viewpoint: Palestinian
  viewpoint_type: vanquished
  region_origin: middle-east
  narrative: 'Palestinians were a majority in their own land when their dispossession began. In 1917, when the Balfour Declaration
    was issued, Arabs constituted approximately 90% of Palestine''s population. The declaration — one nation promising another
    nation the territory of a third — was made without consulting the indigenous population. Lord Balfour himself acknowledged
    this in a 1919 memorandum: "In Palestine we do not propose even to go through the form of consulting the wishes of the
    present inhabitants of the country." The Palestinian narrative begins with this act of erasure: a people''s homeland was
    promised away by an imperial power that had no right to dispose of it.


    The Nakba was not a natural disaster or an unintended consequence of war. Walid Khalidi, in All That Remains: The Palestinian
    Villages Occupied and Depopulated by Israel in 1948 (1992), documented 418 Palestinian villages that were depopulated
    during 1948-1949. Of these, 293 were totally destroyed — buildings demolished, orchards uprooted, cemeteries bulldozed.
    The destruction was systematic. Moshe Dayan, who would later serve as Israeli Defense Minister, acknowledged in a 1969
    speech at the Technion: "Jewish villages were built in the place of Arab villages. You do not even know the names of these
    Arab villages, and I do not blame you because geography books no longer exist. Not only do the books not exist, the Arab
    villages are not there either."


    The experience of expulsion varied but followed patterns. In Lydda (Lod) and Ramle on July 12-13, 1948, Israeli forces
    under Yigal Allon expelled approximately 50,000-70,000 Palestinian residents. The operation — documented by Benny Morris
    and in detail by Israeli journalist Ari Shavit in My Promised Land (2013) — was carried out in extreme heat. Residents
    were given hours to leave, marched eastward toward the West Bank, and stripped of valuables at checkpoints. Dozens died
    of heat and dehydration on the march. In the village of al-Dawayima on October 29, 1948, Israeli soldiers massacred civilians
    including, according to Israeli military reports later declassified, women and children. The number killed ranges from
    80 to 200 depending on the source.


    The refugee camps became permanent. Palestinians expected the displacement to be temporary — that international pressure,
    UN resolutions, or Arab military power would enable their return. Resolution 194, adopted by the General Assembly on December
    11, 1948, resolved "that the refugees wishing to return to their homes and live at peace with their neighbours should
    be permitted to do so at the earliest practicable date." It was never implemented. The camps — Ain el-Hilweh in Lebanon,
    Balata in the West Bank, Jabalia in Gaza — solidified into permanent communities. Keys to destroyed homes were kept and
    passed to children. The names of villages were preserved in family identity, in camp sections, in memory.


    Rashid Khalidi''s The Hundred Years'' War on Palestine (2020) frames 1948 not as the beginning of the conflict but as
    one phase in a century-long struggle between an indigenous people and a settler-colonial project supported by successive
    imperial powers (Ottoman, British, American). Khalidi argues that the Palestinian experience is defined by repeated denial:
    denial of nationhood ("A land without a people for a people without a land" — the Zionist slogan attributed to Israel
    Zangwill), denial of displacement (the myth that Palestinians left voluntarily), and denial of political agency (the reduction
    of Palestinian identity to refugee status).


    The Palestinian narrative does not deny Jewish suffering in the Holocaust. It asks why Palestinians should pay the price
    for a European crime. The Holocaust was perpetrated by Europeans in Europe; its victims were resettled in a land where
    the indigenous population had no role in the genocide and no obligation to provide territorial compensation. This argument
    — that Palestinian dispossession cannot be morally justified by Jewish persecution elsewhere — is the foundation of the
    Palestinian case, stated by Edward Said, Mahmoud Darwish, and every Palestinian negotiating position since 1948.

    '
  key_arguments:
  - Palestinians were a majority in their own land and were not consulted about its disposition
  - The Nakba was a systematic displacement — 418 villages depopulated, 293 completely destroyed
  - Specific expulsions (Lydda, Ramle) are documented by Israeli as well as Palestinian historians
  - Palestinians should not bear the cost of a European crime — the Holocaust was perpetrated in Europe, not Palestine
