perspectives:
- viewpoint: American
  viewpoint_type: victor
  region_origin: americas
  narrative: 'The missiles appeared in the photographs on Tuesday morning. McGeorge Bundy briefed
    Kennedy before breakfast. By noon, the fourteen men who would become ExComm were seated in the
    Cabinet Room. Dean Acheson, brought in as an elder statesman, argued immediately for airstrikes.
    Robert Kennedy slid a note across the table to his brother: "I now know how Tojo felt when he
    was planning Pearl Harbor."


    The debate that followed — six days before Kennedy went public — became the defining case study
    in crisis decision-making. Robert Kennedy''s posthumous memoir Thirteen Days (1969) portrays ExComm
    as a deliberative body that tested every option against its consequences. McNamara argued that the
    missiles did not alter the strategic balance — the Soviets already had ICBMs capable of reaching
    the U.S. — but acknowledged their political significance: medium-range missiles ninety miles off
    the coast changed the perception of American vulnerability. Kennedy rejected the Joint Chiefs''
    unanimous recommendation for airstrikes, calculating that bombing Soviet personnel would trigger
    a response against Berlin, the real Soviet pressure point.


    The quarantine walked a legal line. Stevenson argued it should go through the UN; the lawyers
    found authority in the Rio Treaty of 1947, which allowed collective self-defense measures by
    Western Hemisphere nations. The Organization of American States approved the quarantine 19-0 on
    October 23. On the floor of the UN Security Council, Stevenson confronted Soviet Ambassador
    Valerian Zorin with blown-up U-2 photographs: "Don''t wait for the translation. Yes or no?"
    Zorin refused to answer. Stevenson''s retort — "I am prepared to wait for my answer until hell
    freezes over" — became the most replayed moment of Cold War diplomacy.


    The American narrative frames the outcome as a victory for calibrated pressure. Kennedy chose the
    quarantine over airstrikes, gave Khrushchev time to respond, and opened a back channel through
    Robert Kennedy and Dobrynin. The Jupiter missiles in Turkey — obsolete and already scheduled for
    removal — were the private price. Publicly, Kennedy appeared to have stared down Khrushchev
    without conceding anything. The reality — that the resolution required American concessions kept
    secret from Congress and the press — did not emerge until the 1980s, when Dobrynin published
    his memoirs and the Kennedy tapes were declassified.


    What the American perspective celebrates is the system working under extreme pressure: civilian
    control overriding military advice, back-channel diplomacy preventing escalation, and a president
    who chose the option that left his adversary a way out. What it struggles to acknowledge is that
    the crisis was itself a product of American actions — the Bay of Pigs invasion of April 1961,
    the CIA''s Operation Mongoose (ongoing sabotage against Cuba), and the Jupiter deployment in
    Turkey — that gave Khrushchev both motive and justification.

    '
  key_arguments:
  - Kennedy's quarantine was a masterpiece of calibrated escalation — firm enough to compel withdrawal, restrained enough to avoid war
  - Civilian leadership overrode unanimous military advice for airstrikes, preventing catastrophic escalation
  - The secret Jupiter deal showed pragmatic statesmanship — trading obsolete missiles for peace
  - ExComm's deliberative process became the gold standard for crisis decision-making
