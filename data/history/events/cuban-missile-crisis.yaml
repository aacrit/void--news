summary: 'On October 14, 1962, a U-2 reconnaissance aircraft piloted by Major Richard Heyser photographed
  Soviet medium-range ballistic missile installations under construction near San Cristobal, Cuba.
  The SS-4 missiles, once operational, could reach Washington, D.C. in thirteen minutes. President
  Kennedy was briefed on the morning of October 16. He convened a group of fourteen advisors — later
  known as the Executive Committee of the National Security Council, or ExComm — and gave them one
  instruction: find a way to get the missiles out.


  ExComm debated for six days before Kennedy announced the crisis publicly on October 22. The options
  ranged from diplomatic protest to a full-scale invasion. The Joint Chiefs, led by Air Force Chief
  of Staff Curtis LeMay, unanimously recommended airstrikes followed by invasion. LeMay told Kennedy
  that a blockade would be "almost as bad as the appeasement at Munich." Kennedy chose a middle path:
  a naval quarantine — the word "blockade" was avoided because a blockade is an act of war under
  international law — around Cuba, demanding the removal of all offensive weapons.


  On October 24, Soviet cargo ships approached the quarantine line. Secretary of State Dean Rusk
  watched from the State Department and said to McGeorge Bundy: "We''re eyeball to eyeball, and I
  think the other fellow just blinked." Twenty Soviet ships stopped or turned back. But the missiles
  already in Cuba continued toward operational readiness. By October 26, CIA estimated that 24 SS-4
  launchers were fully operational, capable of delivering one-megaton warheads to targets across the
  eastern United States.


  The crisis peaked on October 27 — "Black Saturday." A U-2 piloted by Major Rudolf Anderson was
  shot down over Cuba by a Soviet SA-2 surface-to-air missile. In the Sargasso Sea, Soviet submarine
  B-59 was being depth-charged by U.S. Navy destroyers enforcing the quarantine. The submarine had
  lost contact with Moscow for days. Its captain, Valentin Savitsky, ordered the nuclear torpedo
  armed. Soviet naval regulations required the agreement of three officers to launch. Two agreed.
  The third, flotilla commander Vasili Arkhipov, refused. He argued that surfacing was preferable
  to starting a nuclear war. B-59 surfaced.


  That same evening, Robert Kennedy met secretly with Soviet Ambassador Anatoly Dobrynin at the
  Justice Department. He delivered two messages: the United States would remove its Jupiter missiles
  from Turkey within six months, but this concession could never be made public. If the Soviets did
  not agree to remove the missiles from Cuba by the following day, the United States would remove
  them by force. Dobrynin cabled Moscow. On October 28, Radio Moscow broadcast Khrushchev''s
  agreement to dismantle the installations.


  The world learned only decades later how close it had come. At the 2002 Havana Conference —
  attended by McNamara, Castro, and former Soviet officials — the participants learned for the first
  time that 162 Soviet tactical nuclear warheads were already on Cuban soil during the crisis, along
  with authorization for local commanders to use them in the event of a U.S. invasion. McNamara
  turned white. Castro confirmed he had urged Khrushchev, in a letter dated October 26, to launch a
  preemptive nuclear strike against the United States if invasion appeared imminent.

  '
significance: 'The crisis produced three immediate institutional changes: the Moscow-Washington hotline
  (installed June 1963), the Partial Nuclear Test Ban Treaty (August 1963), and a mutual recognition
  between Kennedy and Khrushchev that nuclear brinksmanship had limits neither leader fully controlled.
  The back-channel deal on Jupiter missiles — kept secret for over two decades — established the
  template for superpower face-saving that would recur throughout the Cold War. Cuba itself was
  guaranteed against future U.S. invasion, which Castro considered his victory. The crisis accelerated
  the arms control architecture that produced the Non-Proliferation Treaty (1968) and SALT I (1972),
  even as both superpowers simultaneously expanded their arsenals. Arkhipov''s refusal aboard B-59
  was unknown until the 2002 conference; Thomas Blanton of the National Security Archive called him
  "the man who saved the world." The tactical nuclear weapons already deployed in Cuba — a fact
  concealed by Moscow for forty years — demonstrated that the danger was not only miscalculation at
  the top but unauthorized use at the bottom.

  '
