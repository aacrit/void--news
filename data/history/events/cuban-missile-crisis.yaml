- viewpoint: Soviet
  viewpoint_type: bystander
  region_origin: europe
  narrative: 'Khrushchev conceived the missile deployment in May 1962 while walking along the Black Sea
    coast with Defense Minister Rodion Malinovsky. Malinovsky pointed across the water toward Turkey:
    American Jupiter missiles sat there, fifteen minutes from Moscow. "Why," Khrushchev asked, "should
    the Americans have the right to put missiles next to us, but we should not have the right to put
    missiles next to them?"


    The deployment — Operation Anadyr — moved 42,000 Soviet troops, 36 SS-4 medium-range missiles,
    24 SS-5 intermediate-range launchers (never completed), 162 tactical nuclear warheads, IL-28
    bombers, and MiG-21 fighters to Cuba between July and October 1962. The operation was disguised
    as agricultural equipment shipments. Troops wore civilian clothes and were told they were going
    to a cold climate; they packed winter gear to Havana. The deception held until October 14 because
    Khrushchev gambled that the missiles would be operational before discovery. He lost that gamble
    by roughly ten days.


    Khrushchev''s motivations were layered. He wanted to protect Cuba from another Bay of Pigs —
    an invasion he believed Kennedy was actively planning under Operation Mongoose. He wanted to
    close the missile gap cheaply: the Soviet Union had only 20 ICBMs capable of reaching the
    continental United States, while the Americans had 170 ICBMs, plus Jupiters in Turkey and Italy.
    Placing medium-range missiles in Cuba would roughly double Soviet first-strike capability
    overnight, at a fraction of the cost of building more ICBMs. And he wanted to demonstrate to
    Beijing — where Mao was already calling him soft on imperialism — that the Soviet Union would
    defend its allies.


    When Kennedy announced the quarantine, Khrushchev faced a choice between escalation and retreat.
    On October 26, he sent Kennedy a long, rambling, emotional letter proposing a deal: he would
    remove the missiles in exchange for a U.S. pledge not to invade Cuba. The next morning, a second,
    more formal letter — likely drafted by the Foreign Ministry — added the demand for Jupiter removal
    from Turkey. The dual letters created confusion in Washington about Soviet intentions. Robert
    Kennedy''s solution — respond to the first letter and ignore the second — became known as the
    "Trollope ploy."


    Khrushchev agreed to withdraw on October 28. In Soviet internal discussions, he framed the
    outcome as a mutual concession: Cuba was secured against invasion, the Jupiters would leave
    Turkey (secretly), and nuclear war had been avoided. "We looked into the abyss," he told the
    Presidium. His opponents — who would depose him in October 1964 — saw capitulation. Arkhipov''s
    role aboard B-59 remained classified until after the Soviet Union collapsed. Moscow had not known,
    during the crisis itself, how close a submarine commander had come to using a nuclear torpedo.

    '
  key_arguments:
  - Soviet deployment was a defensive response to American missiles in Turkey and the Bay of Pigs invasion
  - The missile gap heavily favored the U.S.; Cuba was a low-cost equalizer
  - Khrushchev secured Cuba's territorial integrity and secret Jupiter removal — a substantive outcome, not a surrender
  - Arkhipov's veto was unknown to Moscow during the crisis, revealing how fragile command-and-control was on both sides
