- viewpoint: Cuban
  viewpoint_type: vanquished
  region_origin: americas
  narrative: 'Castro learned about the withdrawal from Radio Moscow. Khrushchev had not consulted him.
    The leader of the country where the missiles stood, whose population would bear the first strikes,
    whose soldiers had spent two weeks digging into trenches along the northern coast — this man was
    informed by a public broadcast. Castro smashed a mirror. He called Khrushchev''s decision a
    betrayal. "Nikita, Nikita, what you give you cannot take away," crowds in Havana chanted.


    Cuba''s perspective begins with the Bay of Pigs. On April 17, 1961, 1,400 CIA-trained Cuban exiles
    landed at Playa Giron. Castro personally directed the counterattack. The invasion collapsed in
    72 hours, but it confirmed what Castro had argued since 1959: the United States would not accept
    a socialist state ninety miles from its shore. Operation Mongoose followed — 33 CIA plans for
    sabotage, assassination, and economic destabilization, approved at the highest levels of the
    Kennedy administration. Castro''s acceptance of Soviet missiles was, in this light, an act of
    self-defense by a small nation against its imperial neighbor.


    What the world calls the "Cuban Missile Crisis," Cuba calls the "October Crisis" — Crisis de
    Octubre. The distinction matters. From Havana, the crisis was not about missiles but about
    sovereignty. Cuba had the right to host any weapons it chose, just as Turkey hosted American
    Jupiters. The framing of Soviet missiles as "offensive" and American missiles as "defensive"
    struck Castro as the vocabulary of empire: the powerful define which weapons threaten and
    which protect.


    On October 26, Castro sent Khrushchev the "Armageddon letter." In it, he urged the Soviet
    leader, in the event of a U.S. invasion, to launch a preemptive nuclear strike. At the 2002
    Havana Conference, McNamara asked Castro directly: did he understand what a nuclear strike would
    have meant for Cuba? Castro replied that yes, he had understood Cuba would be destroyed. He had
    accepted that. "I would have agreed to the use of nuclear weapons," he said. "We would have been
    destroyed, but we would not have surrendered." McNamara called the exchange "the most chilling
    moment of the conference."


    The resolution left Cuba with a guarantee — a U.S. pledge not to invade — but no seat at the
    table where the guarantee was negotiated. Castro refused to allow UN inspectors to verify missile
    removal, forcing Khrushchev to permit ship-deck inspections instead. Cuba kept Soviet IL-28
    bombers for several additional weeks as leverage, then yielded under Moscow''s pressure. The
    October Crisis taught Castro a lesson he would repeat for decades: small nations are always
    the currency in which great powers settle their debts.

    '
  key_arguments:
  - Cuba was excluded from negotiations about weapons on its own soil — a violation of sovereignty
  - The missile deployment was a legitimate defensive response to the Bay of Pigs and Operation Mongoose
  - American framing of Cuban-hosted missiles as "offensive" applied a double standard not applied to Jupiters in Turkey
  - Castro's willingness to accept nuclear destruction rather than surrender reflected the depth of Cuban revolutionary commitment
