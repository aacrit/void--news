    author: Michael Dobbs
    year: '2008'
    type: book
  - title: Havana Conference on the Cuban Missile Crisis (transcripts)
    author: National Security Archive, George Washington University
    year: '2002'
    type: archive
  notable_quotes:
  - text: This was not the finest hour of American diplomacy. It was the luckiest.
    speaker: Thomas Blanton
    context: National Security Archive assessment after 2002 Havana Conference revelations
  - text: We thought there were 10,000 Soviet troops in Cuba. There were 42,000. We thought there were no nuclear warheads. There were 162.
    speaker: Robert McNamara
    context: Reflecting on the 2002 Havana Conference revelations
  emphasized:
  - Tactical nuclear warheads already deployed with pre-delegated authority
  - Arkhipov's single-officer veto as the thinnest possible margin against nuclear war
  - Kennedy administration's constructed narrative versus the messier declassified reality
  - Both superpowers concealed concessions from their own publics
  omitted:
  - The genuine difficulty of Kennedy's position and the courage required to resist military pressure
  - Khrushchev's sincere desire to protect Cuba from another Bay of Pigs
  - The institutional reforms that did follow and did reduce future risk
  - Castro's agency and strategic logic, not merely his radicalism
media:
- media_type: photograph
  title: President Kennedy meets with ExComm during the crisis
  description: Kennedy confers with advisors in the White House Cabinet Room during the thirteen days. The ExComm group met almost continuously, debating options from diplomatic protest to full-scale invasion.
  source_url: https://commons.wikimedia.org/wiki/File:EXCOMM_meeting,_Cuban_Missile_Crisis,_29_October_1962.jpg
  attribution: Cecil Stoughton, White House photographer, 1962, public domain
  license: public-domain
  creator: Cecil Stoughton
  creation_date: October 1962
- media_type: photograph
  title: U-2 reconnaissance photograph of Soviet missile site, San Cristobal, Cuba
  description: The CIA photograph that triggered the crisis. Medium-range ballistic missile launch pads under construction are visible, along with missile transporters and support equipment.
  source_url: https://commons.wikimedia.org/wiki/File:Cuba_Missiles_Crisis_U-2_photo.jpg
  attribution: U.S. Central Intelligence Agency, 1962, public domain
  license: public-domain
  creator: United States Air Force
  creation_date: October 14, 1962
- media_type: photograph
  title: Adlai Stevenson confronts Soviet delegate at the UN Security Council
  description: U.S. Ambassador Stevenson presents U-2 reconnaissance photographs to the Security Council, demanding a direct answer from Soviet Ambassador Zorin on whether missiles were deployed in Cuba.
  source_url: https://commons.wikimedia.org/wiki/File:Adlai_Stevenson_shows_missiles_to_UN_Security_Council_with_David_Parker_standing_behind_him.jpg
  attribution: United Nations photo, 1962, public domain
  license: public-domain
  creator: United Nations
  creation_date: October 25, 1962
- media_type: photograph
  title: Soviet ship carrying missile equipment departing Cuba
  description: Aerial photograph of a Soviet cargo ship with canvas-covered missile transporters on deck, taken by U.S. Navy aircraft during the withdrawal. Ship-deck inspection was substituted after Castro refused to allow UN inspectors on Cuban soil.
  source_url: https://commons.wikimedia.org/wiki/File:P-2H_Neptune_over_Soviet_ship_Oct_1962.jpg
  attribution: U.S. Navy, 1962, public domain
  license: public-domain
  creator: United States Navy
  creation_date: November 1962
connections:
- target_slug: hiroshima-nagasaki
  connection_type: consequence
  description: The weapons that destroyed Hiroshima and Nagasaki in 1945 were the same class of threat that brought the world to the brink in 1962 — the crisis was the closest the planet came to a second nuclear use
- target_slug: fall-of-berlin-wall
  connection_type: parallel
  description: The missile crisis and the fall of the Berlin Wall bookend the most dangerous phase of the Cold War — the 1962 near-catastrophe accelerated arms control that eventually made 1989 possible
- target_slug: september-11-attacks
  connection_type: influenced
  description: The national security apparatus expanded after the missile crisis shaped the institutional reflexes — threat assessment, intelligence prioritization, executive authority — that defined the American response to 9/11
