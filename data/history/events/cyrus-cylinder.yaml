legacy_points:
- The cylinder is housed in the British Museum (BM 90920) — Iran has requested its return at least three times since 1979
- Shah Pahlavi's 1971 Persepolis celebration rebranded a Babylonian-genre text as the founding document of Iranian civilization
- The biblical Cyrus decree (Ezra 1:1-4) parallels but does not match the cylinder's text — the cylinder never mentions Jews
- Cyrus's policy of returning deported peoples and cult statues reversed Nabonidus's centralization — a political strategy, not a philosophical commitment
- The 2013 US tour drew 2 million visitors to see a 22.5 cm clay barrel that most could not read
