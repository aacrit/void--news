perspectives:
- viewpoint: Persian Imperial / Achaemenid
  viewpoint_type: victor
  region_origin: middle-east
  narrative: 'The cylinder''s own text tells the story Cyrus wanted told. Marduk — Babylon''s chief god — grew angry
    at Nabonidus for neglecting proper worship. The god surveyed the world, found Cyrus, and "called him by name"
    to deliver Babylon. Cyrus entered not as a foreign conqueror but as a divinely chosen restorer. The text is
    written in Akkadian, not Old Persian — addressed to the Babylonian priesthood in their own language, using
    their own theological vocabulary.


    The conquest of Babylon completed a decade of Persian expansion. Cyrus had already absorbed the Median Empire
    (550 BCE), Lydia (547 BCE, deposing the proverbially wealthy Croesus), and the Greek cities of Ionia. By 539
    BCE, his territory stretched from the Aegean to the Hindu Kush. Babylon was the last major power in western
    Asia. Its fall gave Cyrus control of Mesopotamia, Syria, and the Levant — including the territory where Judaean
    exiles from the Babylonian conquest of 586 BCE still lived.


    The cylinder describes concrete administrative acts: returning displaced cult statues to their home temples,
    releasing deported populations, repairing sanctuaries. These policies followed Mesopotamian precedent — earlier
    conquerors like Marduk-apla-iddina II had claimed similar restorations. But the scale was different. The
    Achaemenid Empire under Cyrus and his successors governed through a system of satrapies that allowed local
    customs, religions, and languages to continue under Persian oversight. Darius I''s Behistun inscription (c. 520
    BCE) lists 23 subject peoples; none were required to abandon their gods. The cylinder, in the Persian imperial
    reading, represents the founding document of this multicultural administrative approach — not a philosophical
    treatise on rights but a practical policy of governing diverse populations through accommodation rather than
    forced assimilation.


    The Achaemenid royal ideology combined Zoroastrian concepts (asha, truth/cosmic order) with local religious
    legitimation. In Babylon, Cyrus served Marduk. In Judah, he served Yahweh (as Isaiah 45:1 names him "messiah"
    — the only non-Jew given that title in the Hebrew Bible). In Lydia, he reportedly honored local cults. This
    was not tolerance in any modern philosophical sense. It was imperial statecraft — the recognition that empires
    holding dozens of peoples cannot survive if they systematically alienate all of them.

    '
  key_arguments:
  - Cyrus was divinely chosen by Marduk to restore proper order — a theological claim, not a secular one
  - The policy of returning deported peoples and cult statues was practical imperial governance, not philosophical humanism
  - The Achaemenid system of satrapies allowed local autonomy under Persian oversight — the cylinder is its founding articulation
  - Cyrus used each conquered people's own religious language to legitimate his rule
