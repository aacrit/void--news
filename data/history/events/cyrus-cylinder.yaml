  - SAVAK's documented human rights abuses during the very period when the Shah promoted the cylinder as a rights charter
- viewpoint: Babylonian / Conquered Population
  viewpoint_type: vanquished
  region_origin: middle-east
  narrative: 'The cylinder''s text was addressed to Babylonians, but not to all of them. It was addressed to the
    Marduk priesthood — the temple administrators, the astronomers, the scribes who controlled the Esagila
    complex and its massive landholdings. These were the people who had reason to oppose Nabonidus and welcome
    Cyrus. Their grievances were specific: Nabonidus had promoted the moon god Sin, relocated provincial cult
    statues to Babylon (disrupting local temple economies), and spent years at the oasis of Tayma in Arabia
    rather than performing the New Year''s festival in Babylon — a ritual that required the king''s personal
    participation and whose omission struck at the priesthood''s ceremonial authority.


    The Verse Account of Nabonidus — a Babylonian poetic text almost certainly composed after Cyrus''s conquest
    — amplifies these charges. It describes Nabonidus as a madman who "did not know the rites" and who forced
    corvee labor on the citizens. The text reads as a companion piece to the cylinder: both were produced by the
    same faction, the Marduk priesthood, to justify the same political transition. The consistency of the
    propaganda campaign suggests coordination.


    For ordinary Babylonians — farmers, traders, artisans, the laboring majority — the evidence is thinner.
    The Nabonidus Chronicle records that Cyrus''s army entered "without fighting" and that "the state of peace
    was imposed on the city." Economic tablets from the years immediately following the conquest show continuity:
    land transactions, loan agreements, and commercial contracts continued with minimal disruption. Temple
    workers at the Eanna complex in Uruk noted the change of king in their dating formulas and continued their
    routines.


    But continuity is not the same as contentment. The Achaemenid administration extracted tribute from Babylonia
    — the satrap Gobryas (not the same Ugbaru who led the initial invasion) governed the province, and Persian
    officials occupied key administrative posts. Babylonian scribal culture continued to produce astronomical
    diaries, mathematical texts, and literary works, but the political center had shifted permanently to Susa
    and Persepolis. By the reign of Xerxes (486-465 BCE), Babylonian revolts had been crushed twice, and
    Xerxes reportedly destroyed part of the Esagila complex and removed the golden statue of Marduk. The
    accommodation that the cylinder promised lasted, at most, two generations.


    The Babylonian perspective on the cylinder, to the extent it can be reconstructed, is one of a conquered
    people who collaborated with the conqueror because the alternative was worse — and who lost their political
    autonomy permanently. Babylon remained a great city for centuries. But it was never again the capital of
    its own state.

    '
  key_arguments:
  - The cylinder was addressed to the Marduk priesthood, not the Babylonian population at large
  - The priests had specific economic and religious motives to support Cyrus over Nabonidus
  - Ordinary Babylonians experienced administrative continuity but permanent loss of political sovereignty
  - Achaemenid tolerance lasted at most two generations — Xerxes crushed Babylonian revolts and desecrated the Esagila
