- viewpoint: Postcolonial / Museum Repatriation
  viewpoint_type: revisionist
  region_origin: global
  narrative: 'Hormuzd Rassam found the cylinder in March 1879 during excavations funded by the British Museum at
    the site of ancient Babylon, in territory then controlled by the Ottoman Empire. Rassam himself was born
    in Mosul in 1826 to a Chaldean Catholic family; he had worked as an assistant to the legendary Austen
    Henry Layard at Nineveh in the 1840s and later excavated independently at Nimrud, Nineveh, Sippar, and
    Babylon. His career was shaped by the asymmetries of 19th-century archaeology: he did the fieldwork, the
    British Museum held the objects, and European scholars took the credit. When Wallis Budge, Keeper of
    Egyptian and Assyrian Antiquities, published translations of tablets Rassam had excavated, he credited
    himself. Rassam sued for defamation in 1893 and lost.


    The cylinder''s journey from Babylonian temple foundation to British Museum vitrine follows a pattern
    replicated across thousands of objects: extraction during the age of European imperial expansion, housed
    in metropolitan institutions that present themselves as custodians of universal heritage. The British Museum''s
    position — articulated in its 2002 Declaration on the Importance and Value of Universal Museums, co-signed by
    18 institutions — is that objects like the cylinder serve humanity best in collections where they can be
    studied and displayed alongside objects from other cultures. The counter-position, articulated by Iraq, Iran,
    and a growing number of scholars and cultural institutions, is that "universal" access is a euphemism for
    colonial possession: the cylinder was taken from Ottoman Mesopotamia under a firman (permit) negotiated
    between imperial powers, without any consultation with the people whose ancestors created it.


    The repatriation question gained urgency after the 2003 Iraq War. The looting of the Iraq Museum in April
    2003 — 15,000 objects stolen, of which roughly 7,000 have been recovered — highlighted the vulnerability
    of cultural heritage in conflict zones. Defenders of Western museum holdings cited the looting as evidence
    that objects are safer in London or New York. Critics responded that the instability was itself a product
    of Western intervention, creating a circular argument: we destabilize your country, then cite the instability
    as proof you cannot protect your own heritage.


    Iran''s claim to the cylinder is complicated by the object''s own identity. It was made in Babylon (modern
    Iraq), written in Akkadian (a Mesopotamian language), in a Mesopotamian literary genre, for a Mesopotamian
    audience. Cyrus was Persian, but the object is Babylonian. Iraq has a stronger archaeological claim than
    Iran, though Iraq has not formally requested the cylinder''s return. The British Museum''s loan of the
    cylinder to Tehran in 1971 and again in 2010 — carefully limited, time-bound, and returned to London each
    time — enacts the colonial dynamic in miniature: the former imperial power permits the colonized to view
    their own heritage on a temporary visa.

    '
  key_arguments:
  - The cylinder was extracted during 19th-century imperial archaeology under Ottoman permits — no local consent was obtained
  - The British Museum's "universal museum" defense rebrands colonial possession as cosmopolitan stewardship
  - Iran's claim is complicated — the object is Babylonian in language and genre, not Persian
  - Temporary loans reproduce the power dynamic — the colony must borrow from the metropole to see its own heritage
  sources:
  - title: 'Whose Culture? The Promise of Museums and the Debate over Antiquities'
    author: James Cuno (ed.)
    year: '2009'
    type: book
    doi: 10.1515/9781400831708
  - title: 'Asshur Is King! Asshur Is King! Religion in the Exercise of Power in the Neo-Assyrian Empire'
    author: Hormuzd Rassam (primary source reference — Asshur and the Land of Nimrod, 1897)
    year: '1897'
    type: book
    archive_url: https://archive.org/details/asshurandthelan00rassgoog
  - title: 'The Rape of Mesopotamia: Behind the Looting of the Iraq Museum'
    author: Lawrence Rothfield
    year: '2009'
    type: book
    doi: 10.7208/chicago/9780226729480.001.0001
  - title: 'Declaration on the Importance and Value of Universal Museums'
    author: British Museum et al. (18 signatories)
    year: '2002'
    type: document
  notable_quotes:
  - text: The museum loans the cylinder to Iran as a gesture of goodwill. One does not typically loan to others what already belongs to them.
    speaker: Paraphrased from Iranian diplomatic and media commentary
    context: Responses to the 2010 loan of the cylinder to the National Museum of Iran
  - text: Objects are safest in institutions that have the resources and expertise to preserve them.
    speaker: British Museum position
    context: 'Declaration on the Importance and Value of Universal Museums, 2002'
  emphasized:
  - Colonial archaeology as extraction — objects removed under imperial frameworks without local agency
  - The "universal museum" argument as a post-hoc justification for retaining colonial acquisitions
  - The loan-as-power-dynamic — temporary access granted by the possessor to the dispossessed
  - Rassam's own marginalization within the system he served — an Iraqi doing British fieldwork, denied credit
  omitted:
  - The British Museum's genuine conservation expertise and public access record
  - The political instability that has endangered heritage in Iraq and the broader Middle East
  - The risk that repatriation to Iran would make the object an instrument of one nation's ideology rather than a shared Mesopotamian heritage
  - The cylinder's scholarly accessibility in London — cuneiform researchers worldwide use the British Museum collection
