country: Babylonia (modern Iraq)
category: political
severity: major
death_toll: N/A — Cyrus's conquest of Babylon in 539 BCE was largely bloodless according to both Persian and Babylonian accounts
affected_population: Population of the Neo-Babylonian Empire, estimated 1.5-2 million; deported peoples including Judaean exiles (~40,000-50,000)
duration: Cyrus conquered Babylon on October 12, 539 BCE; the cylinder was composed shortly after, likely within months
summary: 'On October 12, 539 BCE, the Persian army entered Babylon without a battle. The Nabonidus Chronicle — a
  Babylonian cuneiform tablet now in the British Museum — records that Cyrus''s general Ugbaru led troops into
  the city "without fighting." Nabonidus, the last Babylonian king, had already fled. Seventeen days later, on
  October 29, Cyrus himself entered and, according to the chronicle, "green branches were spread before him."
  The priests of Marduk — Babylon''s patron god — had apparently decided that the Persian conqueror was preferable
  to their own king.


  The object known as the Cyrus Cylinder is a barrel-shaped baked clay document, 22.5 centimeters long and 10
  centimeters wide, inscribed with 45 lines of Akkadian cuneiform. It was deposited in the foundations of the
  Esagila, Marduk''s temple in Babylon — a standard Mesopotamian practice for royal building inscriptions. The
  text follows a genre that Babylonian kings had used for centuries: it denounces the previous ruler, credits the
  patron deity with choosing the new king, and lists the new king''s pious acts. Nabonidus, the cylinder declares,
  "imposed corvee labor on the population," "brought the daily offerings to a halt," and "ruined" the worship of
  Marduk. The god "searched all countries" for a righteous ruler and "called Cyrus, king of Anshan" to set things
  right.


  The cylinder records specific policy acts. Cyrus claims to have returned displaced cult statues to their home
  cities — gods that Nabonidus had forcibly relocated to Babylon. He claims to have allowed deported populations
  to return to their homelands. He claims to have repaired temples. He does not mention the Jews by name — the
  cylinder never uses the word "Israel," "Judah," or "Hebrew." The biblical account of Cyrus''s decree freeing
  the Judaean exiles (Ezra 1:1-4, 2 Chronicles 36:22-23) finds no direct confirmation on the cylinder itself,
  though both texts describe the same general policy of allowing deported peoples to return.


  The object was discovered in March 1879 by Hormuzd Rassam, an Assyrian-born archaeologist working for the
  British Museum, during excavations at the Esagila temple site in Babylon. Rassam shipped it to London. It has
  remained in the British Museum ever since — catalog number BM 90920 — except for a brief loan to Iran in 1971
  and a touring exhibition in 2013. Two clay fragments belonging to the same text were identified at Yale
  University''s Babylonian Collection in 1881 and formally joined to the main text in 2010.

  '
significance: 'The cylinder occupies a unique position as an object whose modern political life has overshadowed its
  ancient function. In 1971, Shah Mohammad Reza Pahlavi centered Iran''s 2,500th anniversary celebrations at
  Persepolis around the cylinder, calling it "the first declaration of human rights" — a phrase the United Nations
  echoed in a 1971 translation. The Islamic Republic of Iran, despite repudiating the Shah''s monarchy, continued
  to claim the cylinder as proof of Persian civilizational primacy. In 2010, Mahmoud Ahmadinejad called it "a
  historical document for all human beings." The British Museum''s possession of the object remains a diplomatic
  irritant: Iran has repeatedly requested its permanent return, most recently in 2019. The cylinder''s 2013 tour
  of five American museums drew 2 million visitors. Meanwhile, Assyriologists have spent four decades pointing
  out that the text is a standard Mesopotamian royal inscription — Babylonian propaganda rebranded as Persian
  humanism.

  '
