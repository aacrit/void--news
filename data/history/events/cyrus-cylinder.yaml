  - The Jewish exile community's experience, which aligns with the cylinder's claims about returning deportees
  - The comparative significance of Achaemenid religious tolerance, even if it was pragmatic rather than principled
- viewpoint: Modern Iranian Nationalist
  viewpoint_type: revisionist
  region_origin: middle-east
  narrative: 'The cylinder occupies a position in Iranian national consciousness that no academic debunking can
    dislodge. Both the Pahlavi monarchy and the Islamic Republic — regimes that agree on almost nothing — have
    claimed it as proof that Iran''s civilizational contribution to human governance predates and surpasses
    European achievements.


    The Shah''s 1971 Persepolis celebration was the most expensive diplomatic event of the 20th century. Sixty-nine
    heads of state attended. Three hundred and fifty tons of food were flown in from Maxim''s of Paris. A tent
    city with 50 air-conditioned pavilions was erected in the desert. At the center of the ideological
    program was the cylinder: Cyrus as the first ruler to codify religious tolerance and freedom from forced
    labor. The Shah addressed Cyrus''s tomb directly: "Sleep in peace, for we are awake." The event cost
    an estimated $200 million ($1.5 billion in 2025 dollars) while Iranian rural poverty ran above 40 percent.
    Opposition groups — including Ayatollah Khomeini, then in exile in Najaf — condemned the celebration as
    idolatrous and obscene.


    After the 1979 revolution, the Islamic Republic initially rejected the pre-Islamic past as jahiliyyah
    (ignorance). But the cylinder proved too useful to abandon. By the 1990s, Iranian textbooks presented Cyrus
    as a righteous ruler whose policies anticipated Islamic principles of justice. In 2010, President Ahmadinejad
    attended the cylinder''s display at the National Museum of Iran (during its loan from the British Museum)
    and called it "a reflection of Iranian culture and values." The crowd at the museum was so large that police
    had to manage the lines. When the British Museum announced the cylinder would return to London, Iranian media
    treated the departure as a national loss.


    For the Iranian diaspora — estimated at 2-3 million worldwide — the cylinder serves a different function.
    It represents an Iran that existed before the Islamic Republic, before the revolution, before the political
    crises of the 20th century. Diaspora organizations have used the cylinder''s image on protest banners,
    petitions, and cultural events. "Cyrus the Great Day" (October 29, the date of his entry into Babylon)
    is observed by diaspora communities in Los Angeles, London, and Toronto. The cylinder is not, for these
    communities, a Mesopotamian building inscription. It is an argument: that Iranian identity is older than
    Islam, that Persian civilization invented concepts the West claims to own, that the nation they left behind
    has a past worth reclaiming.


    Iranian historiography of the cylinder blends genuine scholarship with national myth. Scholars like
    Abdolhossein Zarinkoob (Two Centuries of Silence, 1957) and Ehsan Yarshater (founder of the Encyclopaedia
    Iranica) have produced rigorous work on the Achaemenid period. But the popular reception of the cylinder in
    Iran operates on a different register — not academic analysis but civilizational pride. The distinction
    between "Cyrus practiced religious tolerance" and "Cyrus invented human rights" collapses in popular
    discourse, and attempts to enforce it are read as anti-Iranian bias.

    '
  key_arguments:
  - The cylinder proves Persian civilization pioneered governance principles that Europe later claimed as its own
  - Both Pahlavi and Islamic Republic regimes appropriated the cylinder despite opposing ideologies
  - The diaspora uses the cylinder as an identity anchor — pre-Islamic Iran as a counter-narrative to theocracy
  - Western scholarly critique of the "human rights" framing is perceived as cultural dismissal
