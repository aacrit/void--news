  emphasized:
  - The cylinder is a Babylonian-genre text following established literary conventions
  - The Marduk priesthood's political motives in supporting Cyrus
  - The 1971 political invention of the "human rights" reading
  - The gap between what the text says and what modern audiences believe it says
  omitted:
