connections:
- target_slug: alexanders-conquests
  connection_type: consequence
  description: Alexander destroyed the Achaemenid Empire in 330 BCE — the system Cyrus founded lasted 200 years. Alexander reportedly visited Cyrus's tomb at Pasargadae and ordered its restoration after finding it looted.
- target_slug: mongol-conquest-baghdad
  connection_type: parallel
  description: Both events ended Mesopotamian political orders — Cyrus ended the Neo-Babylonian Empire (539 BCE), the Mongols destroyed the Abbasid Caliphate (1258 CE). Both conquerors initially preserved local religious institutions before successors reversed course.
- target_slug: creation-of-israel-nakba
  connection_type: influenced
  description: Cyrus's decree allowing Judaean exiles to return to Jerusalem (c. 538 BCE) — referenced in Ezra and 2 Chronicles — established the theological precedent of divinely ordained return to the promised land, a concept that shaped Zionist thought 2,500 years later.
