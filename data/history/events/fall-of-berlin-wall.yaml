summary: 'On the evening of November 9, 1989, Gunter Schabowski, a member of the East German Politburo, held a press conference to announce new travel regulations. At 6:53 p.m., Italian journalist Riccardo
  Ehrman asked when the new rules would take effect. Schabowski shuffled through his notes, found no answer, and improvised: "As far as I know, it takes effect immediately, without delay." He had not been
  briefed that the regulations were supposed to take effect the following day, with orderly processing at checkpoints.


  By 8:00 p.m., thousands of East Berliners were massing at the Bornholmer Strasse crossing. Lieutenant Colonel Harald Jager, the senior Stasi officer on duty, faced a choice: open fire on an unarmed crowd
  growing by the minute, or open the gate. He received no clear orders from his superiors. At 11:30 p.m., Jager ordered the barriers lifted. The crowd surged through. Within hours, all Berlin crossing points
  were open. People climbed onto the Wall at the Brandenburg Gate. Strangers embraced. West Berliners handed over bottles of champagne. East Germans walked into West Berlin for the first time in 28 years.


  The Wall had been erected overnight on August 12-13, 1961, when East German workers laid barbed wire and cinderblock across 96 miles of the Berlin border. By the late 1960s, it had evolved into a lethal
  system: two concrete walls, a "death strip" raked smooth to show footprints, 302 watchtowers, anti-vehicle trenches, trip-wire-activated automatic firearms, and border guards with shoot-to-kill orders.
  The Berlin Wall Memorial documents at least 140 people killed attempting to cross. The first was Gunter Litfin, shot on August 24, 1961. The last was Chris Gueffroy, shot on February 6, 1989 — nine months
  before the Wall fell.


  The Wall''s fall was the culmination of a year of accelerating collapse across the Eastern Bloc. Poland held semi-free elections in June 1989; Solidarity won 99 of 100 Senate seats. Hungary opened its
  border with Austria on September 10, allowing East Germans to escape through a third country — 13,000 crossed in three days. In Leipzig, Monday demonstrations grew from 1,000 on September 4 to 300,000
  on October 30. Erich Honecker, the East German leader, was forced out on October 18 and replaced by Egon Krenz, who lasted 44 days. The system was hemorrhaging legitimacy faster than it could reform.


  By December, the Wall was being demolished — by hand, by sledgehammer, by crane. "Wall peckers" (Mauerspechte) chipped off pieces as souvenirs. Formal demolition continued through 1990. Germany was officially
  reunified on October 3, 1990, less than eleven months after the Wall fell.

  '
significance: 'The fall of the Berlin Wall ended the Cold War division of Europe and triggered German reunification (October 3, 1990), the dissolution of the Warsaw Pact (July 1991), and the collapse of
  the Soviet Union (December 1991). Within three years, Czechoslovakia split peacefully, Yugoslavia disintegrated violently, and the Baltic states regained independence. NATO expanded eastward from 16 to
  32 members over the following three decades. The European Union absorbed 13 former Eastern Bloc states. Germany''s reunification, financed through a "solidarity surcharge" that transferred over 2 trillion
  euros from west to east by 2019, produced persistent disparities: eastern German productivity remained at 79% of the western average in 2023, and net household wealth in the east was less than half the
  western figure. The Wall stood for 28 years and 88 days. It took 11 months to dissolve the state it had contained.

  '
