- viewpoint: Reunification Critics / Ostalgie
  viewpoint_type: revisionist
  region_origin: europe
  narrative: 'The dominant narrative of November 9, 1989 is one of unalloyed triumph. The revisionist critique does not dispute that the Wall was oppressive or that its fall was welcome. It questions what
    came after — and whether the process of reunification was, in practice, a colonization of East Germany by West Germany.


    Daniela Dahn, an East German journalist and writer, documented the asymmetry in Westwarts und nicht vergessen (Westward and Don''t Forget, 1996). East Germans did not negotiate the terms of their incorporation.
    The Volkskammer (East German parliament) voted on August 23, 1990 to accede to the Federal Republic under Article 23 of the Basic Law — not to merge as equals but to be absorbed. East German law, institutions,
    courts, universities, police, military, and civil service were dissolved and replaced wholesale by Western structures. East German judges were vetted for Stasi connections and largely replaced by West
    Germans. University faculties were purged, not for incompetence but for ideological contamination. Christa Wolf, whose novels Divided Heaven and Cassandra sold millions and were translated into 20 languages,
    was denounced for her Stasi file; the nuances of her actual relationship with the state — which included both cooperation and criticism — were flattened into a binary judgment.


    The Treuhandanstalt, the privatization agency, became the instrument of economic transformation. It was tasked with converting 8,500 state-owned enterprises into viable market entities. By 1994, it
    had privatized or closed virtually all of them. Of the 4 million workers employed by Treuhand-managed enterprises in 1990, 2.5 million lost their jobs. West German firms acquired East German assets
    at fire-sale prices. Birgit Breuel, who led the Treuhandanstalt from 1991, defended the process as necessary surgery; critics called it asset-stripping. The Treuhand''s own president, Detlev Rohwedder,
    was assassinated by the Red Army Faction on April 1, 1991 — the last killing attributed to the group.


    The concept of "Ostalgie" — nostalgia for the East — emerged in the 1990s as a cultural response to the erasure of East German identity. The 2003 film Good Bye, Lenin! captured the phenomenon: a son
    creates an elaborate fiction to prevent his bedridden mother from learning that the GDR has ceased to exist. Ostalgie is not a desire to return to dictatorship. It is grief for the things that were
    lost alongside the things that deserved to be lost — the childcare system (East Germany had near-universal daycare), the sense of community in Plattenbau apartment blocks, the social security of guaranteed
    employment, the cultural institutions that were defunded, the biographies that were suddenly retroactively wrong.


    The economic data tell the structural story. In 2023, productivity in eastern German states remained at 79% of the western average. Net wealth per household in the east was less than half that of the
    west. No eastern German has ever served as CEO of a DAX-30 company. Eastern Germans hold fewer than 2% of top positions in the federal judiciary, military, and civil service. Steffen Mau, a sociologist
    born in the GDR, documented in Unification in Inequality (2024, German edition 2023) that reunification produced a "transfer society" in which eastern Germany became permanently dependent on western
    fiscal flows — receiving over 2 trillion euros in transfers while its most talented young people migrated westward.


    The revisionist critique does not argue that the Wall should have remained. It argues that how it came down — and what replaced it — was shaped by Western power, Western speed, and Western assumptions
    about the worthlessness of everything East German. The Wall fell on November 9. By October 3, 1990, East Germany had ceased to exist. Eleven months to dissolve a state of 16.4 million people and absorb
    it into another. The revisionists ask: was that liberation, or was it something else?

    '
  key_arguments:
  - Reunification was absorption, not merger — East German institutions were dissolved, not integrated
  - The Treuhandanstalt's privatization destroyed East German industry and eliminated 2.5 million jobs
  - Persistent economic and social inequality between east and west constitutes a structural failure of reunification
  - Ostalgie reflects grief for erased identity, not desire for dictatorship
