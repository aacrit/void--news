perspectives:
- viewpoint: West German / NATO
  viewpoint_type: victor
  region_origin: europe
  narrative: 'The Western narrative frames the Wall''s fall as the vindication of liberal democracy, market economics, and the strategy of containment pursued since 1947. In this reading, the West did not
    conquer the East — the East collapsed under the weight of its own contradictions, exactly as George Kennan''s Long Telegram had predicted 43 years earlier.


    Helmut Kohl moved within days. On November 28, 1989 — nineteen days after the Wall opened — he presented a Ten-Point Plan for German reunification to the Bundestag without consulting his coalition partners,
    France, Britain, or the United States. The plan envisioned a confederative structure evolving toward full unity. Margaret Thatcher and Francois Mitterrand were alarmed; Thatcher told Gorbachev that
    Britain did not want reunification, and Mitterrand privately remarked that a unified Germany would be "more powerful than Hitler''s." Kohl pushed through regardless, calculating that the window of Soviet
    acquiescence under Gorbachev might close at any moment.


    The Two Plus Four Agreement, signed on September 12, 1990, by the two Germanys and the four wartime Allies (U.S., USSR, UK, France), settled the external aspects of reunification. Germany accepted the
    Oder-Neisse line as its eastern border with Poland — a concession that ended five decades of ambiguity. The Soviets withdrew 380,000 troops from East Germany by 1994. In exchange, Germany paid 12 billion
    Deutsche Marks ($8 billion) toward the cost of withdrawal and housing. Gorbachev''s decision not to use force — reversing the Brezhnev Doctrine that had crushed the Prague Spring in 1968 and sustained
    the Wall since 1961 — was the precondition for everything that followed.


    The West German narrative emphasizes the triumph of "Wandel durch Annaeherung" (change through rapprochement), the policy pursued since Willy Brandt''s Ostpolitik in the early 1970s. Brandt''s 1970
    kneeling at the Warsaw Ghetto memorial, his recognition of the Oder-Neisse line, and his Basic Treaty with East Germany (1972) had created channels of communication and economic interdependence that,
    the argument holds, undermined the GDR from within. By the 1980s, 5 million West Germans visited the East annually. The human connections maintained across the Wall — families, churches, smuggled letters
    — kept alive the demand for freedom that erupted in 1989.


    Reagan''s "Tear down this wall" speech on June 12, 1987, initially dismissed by many as rhetoric, is retrospectively cast in the Western narrative as a prophetic demand. His advisors at the State Department
    and NSC tried to remove the line from the speech; Reagan kept it in. The speech became, after the fact, the emblematic articulation of the Western position: that the Wall was not a permanent feature
    of the geopolitical landscape but an affront that would not endure.

    '
  key_arguments:
  - The Wall's fall vindicated four decades of containment and liberal democratic principles
  - Kohl's rapid diplomacy secured reunification within 11 months of the Wall's opening
  - Gorbachev's decision not to use force was the essential precondition
  - Brandt's Ostpolitik and sustained human contact undermined the GDR from within
