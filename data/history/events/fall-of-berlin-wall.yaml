- viewpoint: East German Dissident / Civil Rights Movement
  viewpoint_type: vanquished
  region_origin: europe
  narrative: 'The East German citizens'' movement wanted reform, not annexation. The dissidents who marched in Leipzig, the pastors who opened their churches for Monday prayer meetings, the artists and
    intellectuals who drafted New Forum''s founding appeal on September 9, 1989 — they envisioned a democratic East Germany, not its absorption into the West. Their slogan was "Wir sind das Volk" — "We
    are the people." Within weeks of the Wall''s fall, it mutated into "Wir sind ein Volk" — "We are one people." The shift from civic assertion to national unification was driven not by the dissidents
    but by Kohl''s political machinery and the economic gravitational pull of the Deutsche Mark.


    The Monday demonstrations in Leipzig were the heartbeat of the revolution. They began at the Nikolaikirche (St. Nicholas Church) under Pastor Christian Fuhrer, who had held weekly peace prayers since
    1982. On October 9, 1989 — the decisive night — 70,000 people marched while Stasi units, police, and army reserves stood ready with live ammunition. Hospitals had been cleared to receive casualties.
    The order to fire was never given. Egon Krenz, who had replaced Honecker the previous day, later claimed credit for the restraint; the documentary evidence is ambiguous. What is clear is that the marchers
    carried candles and their hands were full — they could not throw stones. "We had no weapons, only candles," said one Leipzig participant. "But candles were enough."


    Barbel Bohley, co-founder of New Forum, became the face of the civic opposition. New Forum gathered 200,000 signatures in its first month. Its founding appeal called for "a democratic dialogue about
    the tasks of the rule of law, the economy, and culture." It did not call for reunification. Bohley later described her disillusionment: "We wanted justice and got the rule of law. We wanted freedom
    and got the free market." The line captures the dissident generation''s ambivalence: they had risked imprisonment to demand democratic reform, only to see their revolution absorbed into a takeover.


    Reunification hit East Germany like an economic shock wave. The currency union of July 1, 1990, converted East German marks to Deutsche Marks at rates that destroyed the competitiveness of East German
    industry overnight. The Treuhandanstalt, the agency tasked with privatizing 8,500 state-owned enterprises, closed or sold the vast majority. By 1992, industrial output in the former GDR had fallen by
    70%. Unemployment in some regions exceeded 25%. Entire cities — Hoyerswerda, Bitterfeld, Schwedt — lost a quarter of their population as young people moved west.


    The psychological dimension — what Germans call the "Mauer im Kopf" (Wall in the head) — persists. Surveys in the 2020s show that a majority of East Germans feel they are treated as second-class citizens
    within unified Germany. The AfD (Alternative for Germany), a far-right party, draws its strongest support from eastern states. Some analysts trace this to unprocessed reunification trauma: the experience
    of having one''s entire social system — jobs, childcare, identity, biography — declared worthless overnight. The dissidents who made the revolution possible are now elderly, their civic vision unrealized,
    their country absorbed into a state they did not create and that did not consult them.

    '
  key_arguments:
  - East German dissidents sought democratic reform, not absorption into West Germany
  - The Monday demonstrations risked massacre — October 9 in Leipzig was the revolution's turning point
  - Reunification's economic shock destroyed East German industry and produced lasting social dislocation
  - 'The ''Wall in the head'' persists: East Germans remain economically and socially disadvantaged'
