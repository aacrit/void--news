- viewpoint: Soviet / Russian
  viewpoint_type: bystander
  region_origin: europe
  narrative: 'Mikhail Gorbachev did not intend to lose Eastern Europe. His reforms — glasnost (openness) and perestroika (restructuring), launched in 1985-1986 — were designed to save the Soviet system,
    not dissolve it. He expected Communist parties in the satellite states to reform themselves, gaining legitimacy and economic vitality while remaining within the socialist framework. What he got instead
    was a cascade of revolutions that dissolved the Warsaw Pact, reunified Germany inside NATO, and ultimately destroyed the Soviet Union itself.


    The decision not to use force on November 9 was not Gorbachev''s alone — it was a structural absence of orders. Soviet forces in East Germany numbered 380,000 troops with 5,000 tanks. They did not move.
    General Boris Snetkov, commander of the Western Group of Forces, received no instructions from Moscow. The Brezhnev Doctrine — which had justified the 1956 Hungarian intervention, the 1968 Prague Spring
    invasion, and the 1981 pressure on Poland — was dead. Gorbachev had replaced it with what his spokesman Gennadi Gerasimov jokingly called the "Sinatra Doctrine": each country could do it "My Way."


    Gorbachev''s calculation on German reunification rested on the expectation of a gradual process — confederation, neutrality, perhaps a special status for a unified Germany outside of military blocs.
    Kohl''s speed blindsided him. The Ten-Point Plan of November 28 arrived without consultation. Gorbachev felt betrayed — he had trusted that the West would proceed cautiously. The Two Plus Four negotiations
    produced a unified Germany inside NATO, the outcome Gorbachev had most wanted to avoid. He accepted it in exchange for economic aid, troop withdrawal funding, and what he understood to be informal assurances
    that NATO would not expand further east.


    The question of NATO expansion promises has become central to Russian historical grievance. Gorbachev, in a 2014 interview with Interfax, stated that the issue of NATO expansion "was not discussed at
    all" during the Two Plus Four talks. However, internal memos and meeting records, particularly the February 9, 1990 conversation between U.S. Secretary of State James Baker and Gorbachev — in which
    Baker said "not one inch eastward" — suggest that informal assurances were given, even if they were never codified in a treaty. Mary Elise Sarotte''s Not One Inch (2021) documents this ambiguity in
    detail. Whether the West broke a promise or merely abandoned a suggestion, the perception of betrayal became foundational to post-Soviet Russian foreign policy.


    In Russia, the fall of the Berlin Wall is not remembered as a liberation. It is remembered as the beginning of national humiliation — the loss of the buffer zone purchased with 27 million Soviet war
    dead, the collapse of superpower status, and the onset of the economic catastrophe of the 1990s. Vladimir Putin, who was a KGB officer in Dresden on November 9, 1989, and reportedly burned files as
    crowds gathered outside the Stasi headquarters, later described the collapse of the Soviet Union as "the greatest geopolitical catastrophe of the century."

    '
  key_arguments:
  - Gorbachev intended reform, not dissolution — the cascade of 1989 exceeded Soviet calculations
  - The decision not to use force reflected both policy choice and structural paralysis
  - Western assurances regarding NATO non-expansion remain contested and consequential
  - In Russian memory, 1989 marks the beginning of national decline, not liberation
