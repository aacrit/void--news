- viewpoint: Western European / Latin Christian
  viewpoint_type: bystander
  region_origin: europe
  narrative: 'Western Europe received the news of Constantinople''s fall with expressions of horror and no meaningful response. Pope
    Nicholas V had spent a decade issuing crusade bulls — Dum diversas (1452), Romanus Pontifex (1455) — but the military resources
    of Western Christendom were committed elsewhere. France and England were exhausting each other in the final decade of the
    Hundred Years'' War (which ended in 1453, the same year Constantinople fell). The Holy Roman Empire was a patchwork of
    principalities with no unified military command. Hungary, the state most directly threatened, was consumed by factional
    struggles between John Hunyadi and the court of the boy-king Ladislaus V.


    The deeper Western failure predated 1453 by two and a half centuries. In April 1204, the Fourth Crusade — financed by Venice,
    diverted by the Doge Enrico Dandolo''s commercial interests — besieged and sacked Constantinople instead of marching on
    Jerusalem. For three days, Latin Crusaders looted the richest city in Christendom. They melted down bronze statues for coin.
    They installed a prostitute on the Patriarch''s throne and sang drinking songs. The Byzantine senator Niketas Choniates wrote:
    "Even the Saracens are merciful and kind compared with these men who bear the Cross of Christ on their shoulders."


    The Fourth Crusade established a Latin Empire in Constantinople that lasted until 1261, when Michael VIII Palaiologos
    recaptured the city. But the damage was permanent. The Byzantines never recovered the treasury, the fleet, or the network of
    fortified provinces that had made the empire defensible. By the time Mehmed II arrived in 1453, the walls were largely intact
    but there were not enough people to man them. The population of 50,000 could not defend 14 miles of land walls and sea walls.
    The Fourth Crusade did not kill Byzantium instantly. It administered a wound from which Byzantium bled for 249 years.


    After the fall, Western courts mourned the symbolism but pursued commerce. Venice negotiated a trade treaty with Mehmed II in
    1454 — one year after the conquest. The Genoese colony of Pera (Galata), which had remained technically neutral during the siege
    despite individual Genoese fighting on both sides, was allowed to continue operating under Ottoman sovereignty. Italian merchant
    states adapted to the new reality within months. The rhetoric of crusade persisted for decades; Pope Pius II died in 1464 at
    Ancona, waiting for a fleet that never gathered. But the commercial logic of the Mediterranean was already moving on. Western
    Europe did not rescue Constantinople because Western Europe had already destroyed it in 1204.

    '
  key_arguments:
  - The Fourth Crusade of 1204 dealt the fatal blow to Byzantine viability, not the siege of 1453
  - Western crusade rhetoric was genuine but Western military commitment was absent
  - Italian merchant states prioritized commerce over religious solidarity and negotiated with Mehmed within a year
  - Western Europe's horror at the fall coexisted with its direct historical responsibility for Byzantine weakness
