summary: 'On April 2, 1453, Mehmed II arrived before the walls of Constantinople with an army estimated between 80,000 and 200,000 men, 69 cannon, and a fleet of 126 ships. Inside the walls,
  Emperor Constantine XI Palaiologos commanded roughly 7,000 defenders — 5,000 Greeks and 2,000 foreign volunteers, including 700 Genoese under Giovanni Giustiniani. The city that had once held
  500,000 people now sheltered fewer than 50,000.


  The centerpiece of Mehmed''s artillery was a bronze bombard cast by Urban, a Hungarian engineer who had first offered his services to Constantine XI. The emperor could not afford him. Urban
  crossed to Edirne, where the 21-year-old sultan paid him four times his asking price. The cannon was 27 feet long, required 60 oxen and 200 men to transport, and fired stone balls weighing
  roughly 600 kilograms. Each shot took three hours to reload.


  For 53 days, Mehmed''s guns pounded the Theodosian Walls — triple fortifications that had repelled every siege for a thousand years. The defenders repaired breaches at night with barrels
  of earth and timber. On April 22, Mehmed ordered 70 ships dragged overland on greased logs across the hill behind Galata and into the Golden Horn, bypassing the chain the Byzantines had
  stretched across the harbor. The defenders now faced attack from two sides.


  The final assault began after midnight on May 29. Three waves attacked in succession: irregulars first, then Anatolian regulars, then the elite Janissaries. Around 4 a.m., Giustiniani was
  wounded and carried to the ships. His withdrawal opened a gap in the defense. At roughly the same hour, a small group of Ottoman soldiers discovered the Kerkoporta — a small gate in the
  northern wall — either unlocked or inadequately defended. Whether it was treachery, accident, or later myth remains debated. Ottoman soldiers poured through.


  Constantine XI threw off his imperial insignia and charged into the breach with his remaining guards. His body was never identified. By dawn, Ottoman flags flew from the towers. Mehmed
  entered the city on horseback, rode to the Hagia Sophia, and ordered it converted to a mosque. According to the chronicler Tursun Beg, who accompanied him, the sultan sat alone in the
  nave in silence. He then ordered three days of looting — the customary right of a conquering army — after which he stopped the sack and began rebuilding.


  Within weeks, Mehmed issued a firman inviting the Greek population to return and guaranteeing property rights. He appointed Gennadios II Scholarios as the new Ecumenical Patriarch, granting
  the Orthodox Church administrative autonomy under Ottoman sovereignty. He repopulated the city with forced transfers from Trabzon, Thessaloniki, and the Balkans. By 1478, Constantinople held
  80,000 people — more than at the time of its fall — and was again one of Europe''s largest cities.

  '
significance: 'The fall ended 1,123 years of continuous Roman governance — from Constantine I''s founding in 330 to Constantine XI''s death in 1453. It gave the Ottoman Empire control of the
  Bosphorus, the sole waterway linking the Black Sea to the Mediterranean. Within a century, the Ottomans ruled from Hungary to Yemen, from Algeria to Iraq.


  Greek scholars fleeing Constantinople carried manuscripts of Plato, Aristotle, Thucydides, and Homer to Venice, Florence, and Rome. Cardinal Bessarion donated his collection of 482 Greek
  manuscripts to the Venetian Senate in 1468 — they became the core of the Biblioteca Marciana. The influx of Greek texts and Greek-speaking teachers into Italy accelerated the Renaissance
  recovery of classical knowledge that was already underway but had lacked access to complete Greek originals.


  The Ottoman closure of overland trade routes to Asia — or more precisely, the increased cost and unpredictability of those routes — gave urgency to Iberian oceanic ventures already in
  progress. Within 40 years: Bartolomeu Dias rounded the Cape of Good Hope (1488), Columbus crossed the Atlantic (1492), Vasco da Gama reached Calicut (1498), and John Cabot — born
  Giovanni Caboto in Genoa — reached North America (1497). The fall did not cause the Age of Exploration, but it removed the last reason to bet on the old routes.

  '
