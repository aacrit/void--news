perspectives:
- viewpoint: Ottoman / Turkish
  viewpoint_type: victor
  region_origin: middle-east
  narrative: 'In Ottoman and Turkish historiography, the conquest of Constantinople — Fetih, the Opening — is the fulfillment of a
    prophecy attributed to the Prophet Muhammad himself: "Verily you shall conquer Constantinople. What a wonderful leader will he be,
    and what a wonderful army will that army be!" The hadith, recorded in Ahmad ibn Hanbal''s Musnad, placed the capture of the Roman
    capital among the highest aspirations of Islamic statecraft. Seven previous sieges by Arab and Ottoman armies had failed. Mehmed
    II succeeded where the Umayyad caliphs of 674 and 717 had not.


    Mehmed was 21 years old, and he had been planning the siege since at least 19. In 1452, he built the fortress of Rumeli Hisari
    on the European shore of the Bosphorus — directly across from the older Anadolu Hisari — in four months and nineteen days. The
    two fortresses together gave him control of the strait before a single shot was fired at the city walls. He paid Urban the Hungarian
    four times the salary Constantine XI could not match. He recruited Italian shipwrights to strengthen his fleet. He studied
    Byzantine siege tactics from Greek texts.


    The conquest was not mere destruction. Mehmed styled himself Kayser-i Rum — Caesar of Rome — and claimed the imperial succession.
    He hired the Italian humanist Cyriacus of Ancona to document Greek antiquities. He commissioned the Venetian Gentile Bellini to
    paint his portrait in 1480, making him the first Ottoman sultan depicted in the European manner. He spoke Greek, Persian, Arabic,
    and Turkish. He conceived of Constantinople not as a Muslim replacement for a Christian city but as a universal capital — the seat
    of an empire that inherited Rome.


    His treatment of the conquered population was governed by Islamic law on cities taken by force, but tempered by pragmatism. After
    the customary three days of plunder, he stopped the sack — earlier than many commanders would have — and issued firmans inviting
    the Greek population to return. He appointed Gennadios II Scholarios as Ecumenical Patriarch, personally handing him the staff of
    office, and guaranteed the Orthodox Church autonomy over its own courts, schools, and internal governance. He distributed grain to
    the starving population. He repaired the aqueducts. Within 25 years, Constantinople was again one of Europe''s largest and most
    cosmopolitan cities.


    The mosque conversion of the Hagia Sophia was, in this reading, not desecration but consecration — the building''s purpose fulfilled,
    not ended. Mehmed added a minaret and a mihrab; he did not destroy the Christian mosaics (they were plastered over, not demolished,
    and survived to be uncovered in the 20th century). In Turkish republican memory, the Fetih became a founding myth. The Turkish
    Republic named an entire Istanbul district (Fatih) after the conqueror. May 29 is celebrated annually as Istanbul''un Fethi — the
    Conquest of Istanbul.

    '
  key_arguments:
  - The conquest fulfilled a prophecy that placed Mehmed II in a line stretching to the Prophet Muhammad
  - Mehmed claimed Roman imperial succession, not mere territorial conquest
  - The conquered population received institutional protections under the millet system
  - Constantinople became more prosperous and populous under Ottoman rule than it had been in its final Byzantine century
