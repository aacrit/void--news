- viewpoint: Balkan Christian (Serbian, Bulgarian, Romanian)
  viewpoint_type: vanquished
  region_origin: europe
  narrative: 'For the Balkan Christian peoples — Serbs, Bulgarians, Romanians, Bosnians, Albanians — the fall of Constantinople
    sealed a conquest that had begun at Kosovo Polje on June 28, 1389, when the Serbian Empire of Tsar Lazar was destroyed by
    Ottoman forces under Murad I. Between 1389 and 1453, the Ottomans dismantled every independent Balkan Christian state: the
    Second Bulgarian Empire fell in 1396, the Serbian Despotate became a vassal, and Wallachia and Moldavia paid tribute. After
    1453, there was no Christian great power left in the east. The road to Vienna lay open.


    The Ottoman conquest brought the devshirme — the child levy system under which Christian boys, usually between 8 and 18, were
    taken from their families every three to five years, converted to Islam, and trained as Janissaries — the sultan''s elite
    infantry — or enrolled in the palace bureaucracy. The system operated from the late 14th century to the early 18th century.
    Estimates of the total number of boys taken range from 500,000 to 1,000,000. In Balkan oral tradition, the devshirme is
    remembered as the "blood tax" — a phrase that carried revolutionary force when the Serbs, Greeks, and Bulgarians rose against
    Ottoman rule in the 19th century.


    The legend of the sleeping emperor — the Marmoromenon Vasilias, Constantine XI turned to marble and hidden beneath the Golden
    Gate — was not only a Greek myth. It passed into Serbian and Bulgarian popular tradition as well. In Serbian epic poetry,
    the Kosovo cycle preserves Prince Lazar''s choice between an earthly kingdom and a heavenly one — he chose heaven and
    martyrdom, and Serbia would endure under the cross until God restored its glory. The pattern is identical: a last Christian
    emperor falls in battle, the faithful endure, and deliverance will come. This myth sustained Balkan Christian identity through
    five centuries of Ottoman rule.


    The memory of 1389 and 1453 shaped Balkan politics into the 20th and 21st centuries. When Slobodan Milosevic delivered his
    speech at Kosovo Polje on June 28, 1989 — the 600th anniversary of the battle — he invoked the medieval catastrophe to
    mobilize Serbian nationalism. "Six centuries later, we are again in battles and quarrels," he told a crowd of one million.
    The siege of Sarajevo (1992-1996), the Srebrenica massacre (1995), and the Kosovo War (1999) all drew on historical
    narratives rooted in the fall of the medieval Christian states — narratives in which 1453 was not a distant event but a
    living wound. The Balkans did not merely remember Ottoman conquest. They organized their modern politics around it.

    '
  key_arguments:
  - The fall of Constantinople completed the Ottoman conquest of the Balkans that began at Kosovo Polje (1389)
  - The devshirme child levy system shaped Balkan Christian identity and grievance for centuries
  - The sleeping emperor myth sustained resistance identity through 500 years of Ottoman rule
  - Medieval conquest narratives directly fueled 20th-century Balkan conflicts including the Yugoslav Wars
