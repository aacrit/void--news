connections:
- target_slug: the-crusades
  connection_type: caused
  description: The Fourth Crusade (1204) sacked Constantinople and established a Latin Empire that permanently weakened Byzantine defenses, making the city vulnerable to Ottoman conquest 249 years later
- target_slug: fall-of-rome
  connection_type: consequence
  description: Constantinople's fall in 1453 ended the last continuous Roman imperial state — the eastern succession that had survived the western empire's collapse by 977 years
- target_slug: silk-road
  connection_type: influenced
  description: Ottoman control of the Bosphorus and overland trade routes after 1453 increased costs and risks for Silk Road commerce, accelerating European investment in oceanic alternatives
- target_slug: armenian-genocide
  connection_type: influenced
  description: The Ottoman Empire born from the conquest of Constantinople ruled for 470 years; its collapse in World War I created the conditions for the Armenian Genocide of 1915-1923
- target_slug: creation-of-israel-nakba
  connection_type: influenced
  description: Ottoman control of Palestine from 1517 to 1917 — an empire whose capital was the conquered Constantinople — shaped the administrative and demographic landscape inherited by the British Mandate
