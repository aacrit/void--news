  notable_quotes:
  - text: The decline of Rome was the natural and inevitable effect of immoderate greatness. Prosperity ripened the principle of decay.
    speaker: Edward Gibbon
    context: The History of the Decline and Fall of the Roman Empire, Chapter 38, published 1781
  - text: The end of civilization is not an event like a house falling down. It is a process, like a house slowly rotting.
    speaker: Bryan Ward-Perkins
    context: The Fall of Rome and the End of Civilization, 2005
  - text: Romans did not wake up one day in the fifth century and suddenly find that they were living in the 'Dark Ages.'
    speaker: Peter Brown
    context: The World of Late Antiquity, 1971
  emphasized:
  - The historiographic debate itself — not merely what happened but how we decide what counts as 'falling'
  - Archaeological evidence of material decline vs. institutional evidence of cultural continuity
  - The political uses of the 'fall of Rome' narrative in modern Western self-reflection
  - 'The question of perspective: a peasant experienced collapse; a bishop experienced transformation'
  omitted:
  - Non-European civilizations that were flourishing during Rome's decline (Sassanid Persia, Gupta India, pre-classic Maya)
  - The role of climate change (Late Antique Little Ice Age) and pandemic (Justinianic Plague, 541-542)
  - The experience of women, slaves, and non-citizens whose status changed in complex ways during the transition — including cases where Germanic law expanded women's property rights beyond what Roman law
    had permitted
  - The Islamic expansion of the 7th century, which permanently redrew the map of the former Roman world
media:
- media_type: painting
  title: The Favorites of the Emperor Honorius (1883)
  description: John William Waterhouse's painting depicts Emperor Honorius (r. 395-423) feeding his pet chickens at Ravenna. According to Procopius, when told that 'Rome has perished,' Honorius was relieved
    to learn the messenger meant the city, not his favorite hen named Roma. Whether apocryphal or not, the anecdote captured the Western Empire's detachment from its own capital in its final century.
  source_url: https://commons.wikimedia.org/wiki/File:John_William_Waterhouse_-_The_Favorites_of_the_Emperor_Honorius_-_1883.jpg
  attribution: John William Waterhouse, 1883, public domain
  license: public-domain
  creator: John William Waterhouse
  creation_date: '1883'
  supabase_url: https://xryzskhgfuafyotrcdvj.supabase.co/storage/v1/object/public/history-media/fall-of-rome/wiki_0.jpg
- media_type: photograph
  title: The Roman Forum — From Imperial Center to Cattle Pasture
  description: The ruins of the Roman Forum as they appear today. In the 2nd century CE, the Forum was the administrative heart of an empire governing 60 million people. By the 6th century, its population
    reduced from 1 million to roughly 30,000, Rome's Forum had become a cow pasture known as the Campo Vaccino. The visible ruins span five centuries of construction and fifteen centuries of decay.
  source_url: https://commons.wikimedia.org/wiki/File:Forum_Romanum_panorama_2.jpg
  attribution: Wikimedia Commons, CC BY-SA 3.0
  license: cc-by-sa
  creator: Wikimedia contributors
  creation_date: '2010'
  supabase_url: https://xryzskhgfuafyotrcdvj.supabase.co/storage/v1/object/public/history-media/fall-of-rome/wiki_1.jpg
- media_type: photograph
  title: Mausoleum of Theodoric, Ravenna
  description: The tomb of Theodoric the Great (d. 526), king of the Ostrogoths, built c. 520 CE in Ravenna from Istrian limestone without mortar. Theodoric, who had been raised at the imperial court in
    Constantinople, employed Roman architects, maintained the Senate, and patronized scholars including Boethius and Cassiodorus. His mausoleum, capped by a single 300-ton stone dome, is the only surviving
    example of Ostrogothic monumental architecture.
  source_url: https://commons.wikimedia.org/wiki/File:Teodorico01.jpg
  attribution: Wikimedia Commons, CC BY-SA 3.0
  license: cc-by-sa
  creator: Wikimedia contributors
  creation_date: '2006'
