connections:
- target_slug: french-revolution
  connection_type: influenced
  description: French revolutionaries modeled their republic on the Roman Republic — Brutus, Cato, and Cincinnatus were invoked in speeches and pamphlets; the word 'republic' itself is Latin (res publica)
- target_slug: scramble-for-africa
  connection_type: influenced
  description: 'European imperial self-image from the 16th century onward drew on Rome: ''empire'' is a Latin word, colonial governance borrowed Roman administrative models, and the anxiety that European
    empires might ''fall like Rome'' shaped policy debates from Gibbon onward'
