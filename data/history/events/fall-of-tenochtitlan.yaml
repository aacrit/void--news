- viewpoint: Catholic Mission
  viewpoint_type: bystander
  region_origin: europe
  narrative: 'The first twelve Franciscan friars arrived in Mexico in May 1524, walking barefoot from Veracruz to Mexico City.
    Cortés knelt before them — a staged act of piety that astonished the watching Aztec nobility, who had never seen the conqueror
    kneel before anyone. The friars'' mission was total conversion. Within a decade, they claimed to have baptized millions.
    Fray Toribio de Benavente, who took the Nahuatl name Motolinía ("the poor one"), recorded baptizing 14,000 people in a
    single day at Xochimilco.


    The paradox of the Franciscan mission was that the same institution that destroyed Aztec civilization also preserved more
    of it than any other. Fray Bernardino de Sahagún spent 40 years compiling the Florentine Codex — a 2,400-page encyclopedia
    of Aztec culture, religion, natural history, and daily life, recorded in Nahuatl with Spanish commentary. It is the most
    comprehensive ethnographic document of any pre-Columbian civilization. Sahagún trained Nahua students at the Colegio de
    Santa Cruz de Tlatelolco — founded in 1536, the first European-style school of higher education in the Americas — and
    relied on their knowledge to compile his work. The students became scholars, translators, and administrators. They also
    became Christians, or at least performed Christianity with sufficient conviction to navigate the colonial system.


    Bartolomé de las Casas, a Dominican friar who had witnessed the destruction of the Caribbean indigenous population, published
    A Short Account of the Destruction of the Indies in 1552. The book catalogued Spanish atrocities with gruesome specificity:
    mass burnings, enslavement, the feeding of indigenous children to war dogs. Las Casas argued that indigenous peoples were
    rational beings with natural rights — a position he defended in the Valladolid Debate of 1550-51 against Juan Ginés de
    Sepúlveda, who held that indigenous peoples were "natural slaves" under Aristotelian philosophy. The debate produced no
    clear verdict, but Las Casas''s arguments influenced the New Laws of 1542, which restricted (though did not eliminate)
    the encomienda system.


    The mission narrative is one of salvation complicated by complicity. The friars genuinely opposed the worst abuses of
    the encomenderos. They also presided over the destruction of thousands of Aztec codices, religious objects, and temple
    complexes. Diego de Landa, the Franciscan bishop of Yucatán, burned every Maya codex he could find in July 1562 at the
    auto-da-fé of Maní — destroying an entire civilization''s written record. Only four Maya codices survive. The Aztec codices
    fare slightly better: perhaps 15-20 pre-conquest documents survive, out of thousands that existed. What we know of Aztec
    civilization, we know largely through the lens of the people who destroyed it.

    '
  key_arguments:
  - The Franciscan mission preserved more of Aztec civilization than any other colonial institution
  - Las Casas's advocacy established the principle that indigenous peoples had natural rights
  - Mass conversion provided indigenous peoples a path to survival within the colonial system
  - The mission was both the destroyer and the archivist of pre-Columbian knowledge
