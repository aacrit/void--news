  - text: The sons of La Malinche. The strange permanence of Cortés and La Malinche in the Mexican's imagination and sensibilities
      reveals that they are something more than historical figures.
    speaker: Octavio Paz
    context: The Labyrinth of Solitude, 1950
  - text: There are really two Mexicos. One is the Mexico of the dominant minority, Western in its aspirations. The other
      is the Mexico profundo, rooted in Mesoamerican civilization.
    speaker: Guillermo Bonfil Batalla
    context: Mexico Profundo, 1987
  emphasized:
  - Mexico City as living archaeology of conquest and destruction
  - La Malinche as central, unresolved figure in national identity
  - Mestizaje as both national mythology and mechanism of racial hierarchy
  - Indigenous marginalization persisting under the celebration of indigenous heritage
  omitted:
  - Spanish colonial contributions to Mexican culture, architecture, and law
  - Agency of indigenous peoples in shaping post-conquest society
  - Regional diversity of indigenous experience beyond the Aztec-centric narrative
  - Economic and political factors beyond ethnic identity in shaping modern inequality
