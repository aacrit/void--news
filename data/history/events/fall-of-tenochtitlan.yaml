legacy_points:
- Largest population collapse in recorded history — central Mexico from 25 million to 1 million in a century
- Mexico City was built on Tenochtitlan's ruins; the Templo Mayor's foundations lie under the cathedral
- Established the colonial extraction model — silver, forced labor, encomienda — that funded the Spanish Empire
- The Tlaxcalan alliance provided 80%+ of the conquering army but was erased from Spanish narratives for centuries
- Created the mestizo identity that defines modern Mexico — and the unresolved question of La Malinche
