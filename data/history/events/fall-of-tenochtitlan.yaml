perspectives:
- viewpoint: Spanish Conquistador
  viewpoint_type: victor
  region_origin: europe
  narrative: 'Cortés wrote his first letter to Charles V from Veracruz in July 1519. He had no authorization for conquest
    — the governor of Cuba, Diego Velázquez, had commissioned him only to trade and explore. Cortés resolved the legal problem
    by founding a municipality, La Villa Rica de la Vera Cruz, and having its newly appointed town council (his own men) elect
    him captain-general. It was a bureaucratic sleight of hand that gave him direct authority from the Crown, bypassing Velázquez.
    Cortés was 34 years old, a failed law student from Medellín, Extremadura, with fourteen years of Caribbean colonial experience
    and an instinct for legal fiction.


    The five letters Cortés sent to Charles V between 1519 and 1526 — the Cartas de relación — are the primary Spanish narrative
    of the conquest. They are also calculated political documents. Cortés framed every action as service to God and Crown.
    The destruction of Aztec temples became a crusade. The subjugation of indigenous peoples became their liberation from
    human sacrifice — the Aztecs sacrificed an estimated 20,000 people annually at the Templo Mayor, a practice that genuinely
    horrified the Spanish and provided moral justification for the conquest. Cortés offered Moctezuma a deal: stop the sacrifices,
    accept Christ, acknowledge Charles V. Moctezuma agreed to the last, temporized on the first two, and was dead within months.


    Bernal Díaz del Castillo, a foot soldier who participated in the conquest and wrote his account 40 years later, provides
    the ground-level view. His True History of the Conquest of New Spain is the most detailed eyewitness account. Díaz describes
    the first sight of Tenochtitlan with undisguised awe — the causeways, the markets, the temple pyramids, the aqueducts
    bringing fresh water from Chapultepec. The market at Tlatelolco, he wrote, was larger than those of Rome and Constantinople.
    He also describes the aftermath of the siege with something close to horror: the stench of corpses, the streets choked
    with the dead, the surviving inhabitants "so thin and yellow and dirty and stinking" that the Spaniards could barely look
    at them.


    The conquistador narrative is one of daring and divine providence. Cortés burned his ships, defeated the Tlaxcalans and
    turned them into allies, survived the Noche Triste, regrouped, and took a city of 300,000 with fewer than a thousand Spaniards.
    The role of epidemic disease, indigenous alliances, and Aztec political fragmentation is minimized. In Cortés''s telling,
    the conquest was a feat of will. In his second letter, he informed Charles V: "After God, we owe the conquest of New Spain
    to Doña Marina." La Malinche — translator, advisor, and mother of his son Martín — was the only indigenous person he credited
    by name.

    '
  key_arguments:
  - The conquest was legitimate service to God and the Spanish Crown
  - Human sacrifice by the Aztecs morally justified Spanish intervention
  - Cortés's strategic genius — alliances, legal maneuvering, military adaptation — was decisive
  - The city's fall was providential, guided by divine will
