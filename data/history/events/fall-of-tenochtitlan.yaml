slug: fall-of-tenochtitlan
title: The Fall of Tenochtitlan
subtitle: Cortés had 500 soldiers. Tenochtitlan had 300,000 people. Smallpox decided the math.
date_display: 1519-1521
date_sort: 1521
date_precision: year
era: early-modern
region: americas
country: Mexico
category: empire
severity: catastrophic
death_toll: 240,000+ during the siege alone; indigenous population of central Mexico fell from 25 million to 1 million within
  a century
affected_population: 25 million indigenous people in Mesoamerica
duration: Two years — from Cortés's landing at Veracruz (April 1519) to the fall of the city (August 13, 1521)
summary: 'Hernán Cortés burned his ships at Veracruz in August 1519. Or scuttled them — the accounts vary, but the result
  was the same: 500 Spanish soldiers, 16 horses, and a handful of cannons had no way home. They marched inland toward a city
  none of them had seen, guided by reports from coastal peoples who described Tenochtitlan as larger than any city in Spain.
  It was. Built on an island in Lake Texcoco, connected to the mainland by three causeways, the Aztec capital held between
  200,000 and 300,000 people. Seville, the largest city in Spain, had 60,000.


  Cortés did not conquer Tenochtitlan with 500 Spaniards. He conquered it with an indigenous coalition. The Tlaxcalans — bitter
  enemies of the Aztec Triple Alliance who had fought them for decades — provided the bulk of the military force. At the siege''s
  height, Cortés commanded perhaps 900 Spanish soldiers and between 75,000 and 200,000 indigenous allies. The Tlaxcalans did
  not assist Cortés out of naivety. They made a calculated decision: the Spanish offered an opportunity to destroy the Aztec
  empire that had blockaded Tlaxcala, denied it access to salt and cotton, and demanded sacrificial victims from its borders.
  Tlaxcala''s leaders negotiated terms. They got them — and were erased from the Spanish victory narrative for 400 years.


  Moctezuma II received Cortés on November 8, 1519, on the southern causeway. What happened next is contested by every source.
  The Spanish accounts claim Moctezuma surrendered sovereignty voluntarily, believing Cortés to be the returning god Quetzalcoatl.
  Modern historians — particularly James Lockhart and Camilla Townsend — have dismantled this narrative. The Quetzalcoatl
  myth appears nowhere in pre-conquest Nahuatl sources. It was constructed after the fact, probably by Franciscan friars,
  to explain an otherwise inexplicable collapse. Moctezuma was likely playing for time, housing the strangers in the palace
  of Axayácatl while assessing their strength and intentions.


  The crisis came in June 1520. While Cortés was away fighting Pánfilo de Narváez — sent by the governor of Cuba to arrest
  him — Pedro de Alvarado massacred Aztec nobles during the festival of Toxcatl. The Aztecs rose. Moctezuma was killed — by
  Spanish hands or Aztec stones, depending on the source. Cortés fought his way out of the city on June 30, 1520, the Noche
  Triste ("Night of Sorrows"), losing 600 Spaniards and perhaps 2,000 Tlaxcalan allies on the causeways.


  Then smallpox arrived. The disease, carried by an enslaved African man in Narváez''s expedition, swept through Tenochtitlan
  between October 1520 and January 1521. It killed Cuitláhuac, Moctezuma''s successor, after just 80 days of rule. The new
  tlatoani, Cuauhtémoc, was 25. He inherited a city already decimated by a disease no one understood. Cortés returned with
  reinforcements, built 13 brigantines to control the lake, and laid siege. The Aztecs fought for 80 days. They adapted —
  digging pits to trap horses, building barricades, fighting house by house. Bernal Díaz del Castillo, who was there, wrote
  that the defenders fought "like demons." On August 13, 1521, Cuauhtémoc was captured trying to flee by canoe. The city was
  rubble. The causeways were choked with bodies. The lake was red.

  '
significance: 'The fall of Tenochtitlan ended the Aztec Triple Alliance and inaugurated three centuries of Spanish colonial
  rule over Mesoamerica. The demographic collapse that followed — from an estimated 25 million indigenous people in central
  Mexico in 1519 to approximately 1 million by 1620 — was the largest population decline in recorded history, driven primarily
  by smallpox, measles, typhus, and other Old World diseases against which indigenous peoples had no immunity. The Spanish
  built Mexico City directly on Tenochtitlan''s ruins, using stones from the Templo Mayor to construct the Metropolitan Cathedral.
  The conquest established the model for European colonization of the Americas: military force amplified by disease, indigenous
  alliances, and the systematic extraction of silver and labor that funded the Spanish Empire for 300 years. The silver mines
  of Potosí and Zacatecas, worked by indigenous forced labor under the encomienda system, produced wealth that reshaped the
  global economy and funded European wars from the Netherlands to the Ottoman frontier.

  '
