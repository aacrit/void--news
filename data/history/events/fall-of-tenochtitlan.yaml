connections:
- target_slug: transatlantic-slave-trade
  connection_type: caused
  description: The demographic collapse of indigenous populations drove demand for enslaved Africans — the colonial extraction
    model born at Tenochtitlan required labor that disease had destroyed
- target_slug: trail-of-tears
  connection_type: parallel
  description: Both represent the dispossession of indigenous peoples by European-origin states, separated by 300 years —
    the same logic of civilizational hierarchy justifying removal and destruction
