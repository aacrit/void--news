- viewpoint: Aztec / Mexica
  viewpoint_type: vanquished
  region_origin: americas
  narrative: 'The Aztec account of the conquest survives primarily through the Florentine Codex — compiled by Fray Bernardino
    de Sahagún from Nahua informants between 1545 and 1590 — and the anonymous account known as the "Broken Spears," collected
    and translated by Miguel León-Portilla. These are post-conquest documents, shaped by colonial conditions, but they preserve
    a perspective absent from Spanish sources.


    The Nahua accounts describe the omens: a column of fire in the sky, the temple of Huitzilopochtli bursting into flame,
    a bird with a mirror in its head. Modern historians treat these as post-hoc constructions — narrative devices that made
    the inexplicable comprehensible. What the accounts describe without mythological framing is the practical crisis. Moctezuma
    sent ambassadors bearing gold to the coast. The gold was intended as a diplomatic gesture — in Mesoamerican tradition,
    lavish gifts signaled power, not submission. The Spanish interpreted it as a sample of what awaited them inland. The cultural
    misreading was mutual and fatal.


    The Toxcatl massacre of May 1520 — when Alvarado''s men attacked unarmed nobles during a religious festival, killing hundreds
    — radicalized the Aztec population. The Spanish accounts claim Alvarado acted preemptively against a rumored attack. The
    Nahua accounts describe an unprovoked slaughter: "They slashed the drummer''s arms. They cut off his head, and it rolled
    across the floor. They attacked all the celebrants, stabbing them, spearing them, striking them with their swords." After
    Toxcatl, negotiation was finished.


    Cuauhtémoc''s 80-day defense of Tenochtitlan was a military achievement measured against impossible odds. The Aztecs adapted
    to Spanish weapons — they dug canals across streets to trap cavalry, built barricades, developed tactics for pulling Spaniards
    off horses. They fought at night when Spanish crossbows and harquebuses were less effective. They repelled multiple assaults
    on the causeways. But the siege cut off Tenochtitlan''s fresh water supply — the aqueduct from Chapultepec was destroyed
    — and smallpox had already killed a large portion of the population. Defenders drank brackish lake water. Starvation took
    those the disease spared.


    The Nahua informants recorded the aftermath. "The people of the city had to walk upon their dead." The Spanish tore down
    the Templo Mayor. They melted the gold ornaments. They enslaved survivors. Cuauhtémoc was tortured — his feet were burned
    with oil — to reveal the location of hidden treasure. He revealed nothing. Cortés kept him alive as a puppet ruler for
    four years, then hanged him during an expedition to Honduras in 1525, on suspicion of plotting a revolt. Cuauhtémoc''s
    last recorded words: "I knew what it was to trust your false promises."

    '
  key_arguments:
  - The Aztecs fought a determined 80-day defense against overwhelming odds compounded by disease
  - The Toxcatl massacre was an unprovoked slaughter that ended any possibility of coexistence
  - Moctezuma's diplomacy was strategic statecraft, not the superstitious paralysis Spanish accounts describe
  - The destruction of Tenochtitlan was the destruction of a civilization, not merely a military defeat
