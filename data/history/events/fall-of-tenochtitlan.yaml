- viewpoint: Tlaxcalan / Indigenous Ally
  viewpoint_type: indigenous
  region_origin: americas
  narrative: 'Tlaxcala had been at war with the Aztec Triple Alliance for decades. The "Flower Wars" — ritualized conflicts
    designed to capture sacrificial victims — were, for the Tlaxcalans, an existential siege. The Aztecs blockaded Tlaxcala,
    denying it access to salt, cotton, and cacao. Tlaxcalan soldiers wore cotton armor while their Aztec opponents wore the
    feathered suits that only access to tropical trade could provide. When Cortés arrived on Tlaxcalan territory in September
    1519, the Tlaxcalans fought him first — four battles in two weeks. Xicoténcatl the Younger, the leading military commander,
    argued for continued resistance. He was overruled. The Tlaxcalan senate chose alliance.


    The alliance was not subordination. The Lienzo de Tlaxcala — a colonial-era pictorial document created by Tlaxcalan artists
    — depicts Tlaxcalan warriors as equal partners in every major battle. At the siege of Tenochtitlan, Tlaxcalan soldiers
    outnumbered Spaniards by ratios of 80 to 1 or higher. They built the 13 brigantines that gave Cortés control of Lake Texcoco
    — 8,000 Tlaxcalan porters carried the disassembled ships over the mountains from Tlaxcala to Texcoco. They provided the
    logistical infrastructure — food, porters, intelligence — without which the Spanish expedition would have starved in the
    highlands.


    Tlaxcala extracted a price. After the conquest, Tlaxcala was granted special privileges: exemption from tribute, retention
    of its own governing council, the right to use the title "Loyal City." Tlaxcalan colonists were sent throughout New Spain
    as auxiliaries of Spanish expansion — to Guatemala, to the Philippines, to the Chichimeca frontier. They carried a document,
    the Actas de Cabildo, recording their services to the Crown. For a century, these privileges held. Then the colonial bureaucracy
    eroded them. By the 1600s, Tlaxcalans paid tribute like other indigenous groups. Their special status survived only in
    legal petitions and local memory.


    Xicoténcatl the Younger — the commander who had opposed the alliance — was hanged by Cortés during the siege of Tenochtitlan,
    accused of desertion. Tlaxcalan sources treat him as a prophet: the man who foresaw that the Spanish would consume their
    allies as they had consumed their enemies. The Tlaxcalan perspective complicates the conquest narrative entirely. The
    fall of Tenochtitlan was not a European triumph over an American civilization. It was a Mesoamerican civil war in which
    one side had Spanish weapons, Spanish diseases, and a Spanish narrative that would write the other side out of history.

    '
  key_arguments:
  - Tlaxcalans provided the majority of the military force that defeated the Aztec empire
  - The alliance was a rational strategic decision against Aztec imperial oppression, not naivety
  - Spanish narratives erased Tlaxcalan agency and contribution for centuries
  - The conquest was a Mesoamerican civil war with Spanish catalysts, not a European victory over American peoples
