  emphasized:
  - Sahagún's Florentine Codex as the most comprehensive record of Aztec civilization
  - Las Casas's defense of indigenous humanity against Aristotelian "natural slavery"
  - Nahuatl preservation through mission schools and bilingual scholarship
  - Moral critique of Spanish colonial violence from within the colonial system
  omitted:
  - Mass destruction of codices, temples, and religious objects by the same missions
