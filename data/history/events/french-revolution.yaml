summary: |
  On July 14, 1789, a crowd of approximately 1,000 Parisians stormed the Bastille, a royal fortress and prison in eastern Paris. The garrison of 82 invalides (retired soldiers) and 32 Swiss Guards surrendered after four hours. The crowd killed the governor, Bernard-Rene de Launay, and paraded his head on a pike through the streets. The Bastille held only seven prisoners — four forgers, two lunatics, and a dissolute young nobleman — but its fall became the revolution's founding act: the moment when the people of Paris physically dismantled the architecture of royal authority.

  The revolution had been building for years. France's participation in the American Revolution had bankrupted the treasury. The national debt stood at 4.5 billion livres. A decade of poor harvests had pushed bread prices to a 30-year high; by 1789, a Parisian laborer spent 88% of his wages on bread. Louis XVI, advised by finance minister Jacques Necker, convened the Estates-General on May 5, 1789 — the first time the body had met since 1614. The Third Estate (commoners, 98% of the population) demanded voting by head rather than by estate, which would have given them a majority. When the king refused, the Third Estate declared itself the National Assembly on June 17 and swore the Tennis Court Oath on June 20, pledging not to disband until France had a constitution.

  The revolution moved through phases of escalating radicalism. The Constituent Assembly (1789-1791) abolished feudal privileges, issued the Declaration of the Rights of Man and of the Citizen, confiscated Church property, and established a constitutional monarchy. The Legislative Assembly (1791-1792) declared war on Austria in April 1792, beginning a cycle of revolutionary wars that would last 23 years. The National Convention (1792-1795) abolished the monarchy on September 21, 1792, tried Louis XVI for treason, and executed him by guillotine on January 21, 1793. Marie Antoinette followed on October 16.

  The Terror, directed by the Committee of Public Safety under Maximilien Robespierre, lasted from September 1793 to July 1794. The Revolutionary Tribunal executed an estimated 16,594 people by guillotine, including political rivals (Danton, Hebert, the Girondins), aristocrats, priests, and thousands of ordinary citizens denounced by neighbors. In the Vendee region of western France, royalist and Catholic peasants rose against the republic; the republican response — the "colonnes infernales" under General Turreau — killed an estimated 170,000-250,000 people through mass drownings (noyades) in the Loire, mass shootings, and deliberate destruction of villages and crops. Reynald Secher, in A French Genocide (2003), classifies the Vendee campaign as genocide.

  Robespierre himself was arrested on 9 Thermidor (July 27, 1794) and guillotined the following day, ending the Terror. The Directory (1795-1799) governed an exhausted republic until Napoleon Bonaparte's coup of 18 Brumaire (November 9, 1799) established the Consulate and, eventually, the Empire. The revolution that began with a declaration of human rights ended with a military dictatorship.

significance: |
  The French Revolution destroyed the ancien regime — the feudal, monarchical, and clerical order that had governed France for centuries — and replaced it with the principles of popular sovereignty, legal equality, and secularism codified in the Declaration of the Rights of Man (1789), which the drafters of the United Nations Universal Declaration of Human Rights (1948) used as a template. The Civil Code drafted under Napoleon (1804) spread revolutionary legal principles across Europe and Latin America; it remains the basis of civil law in 40 countries. The revolution also demonstrated that popular sovereignty could produce the Terror: 40,000 executed by guillotine, 170,000-250,000 killed in the Vendee, and a republic that lasted ten years before producing a military dictator. Its ideas directly inspired the Haitian Revolution (1791-1804), the revolutions of 1848, and the Russian Revolution (1917). Its vocabulary — left and right (from the seating arrangement of the National Assembly), citizen, republic, nation — entered every European language within a generation.

