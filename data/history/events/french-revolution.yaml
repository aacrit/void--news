perspectives:
  - viewpoint: "Revolutionary / Republican"
    viewpoint_type: victor
    region_origin: europe
    narrative: |
      The republican tradition claims the revolution as the birth of modern democracy. In this reading, 1789 was the moment when the principle of popular sovereignty replaced divine right — not as an abstract idea but as an act: the people of France, through their elected representatives, declared that authority derived from the nation, not from God or the king. The Declaration of the Rights of Man and of the Citizen, adopted on August 26, 1789, established that "the principle of all sovereignty resides essentially in the nation." This was not a modification of the old order. It was its annihilation.

      The republican narrative acknowledges the Terror but frames it as a response to existential threat rather than an inherent outcome of the revolution. By the summer of 1793, France was at war with Austria, Prussia, Britain, Spain, and the Dutch Republic simultaneously. The Vendee was in royalist revolt. Federalist rebellions had erupted in Lyon, Marseille, and Toulon. Inflation was destroying the currency. In this context, the Committee of Public Safety's emergency measures — price controls (the Maximum), mass conscription (the levee en masse), and the Revolutionary Tribunal — are presented as the instruments of national survival. The levee en masse, decreed on August 23, 1793, mobilized 750,000 soldiers and created the largest army Europe had seen since the Roman Empire. It saved the republic from invasion.

      Robespierre's speech of February 5, 1794, articulated the logic explicitly: "If the basis of popular government in peacetime is virtue, the basis of popular government during a revolution is both virtue and terror — virtue, without which terror is destructive; terror, without which virtue is impotent." The republican tradition has debated this formulation for two centuries. The Jacobin left defends Robespierre as a democrat who used extreme measures under extreme circumstances; the moderate republican tradition (from Benjamin Constant to Francois Furet) argues that the Terror revealed the dangers inherent in unlimited popular sovereignty.

      The revolution's legislative achievements are often overshadowed by the guillotine. The abolition of feudal privileges on the night of August 4, 1789 — when nobles voluntarily renounced their manorial rights in a session that lasted until dawn — eliminated in hours a system of privilege that had structured French society for centuries. The Civil Constitution of the Clergy (1790) brought the Catholic Church under state control. The metric system, proposed by the Academy of Sciences and adopted in 1795, rationalized measurement. The abolition of slavery in French colonies, decreed on February 4, 1794 (16 Pluviose An II), made France the first colonial power to outlaw the institution — though Napoleon reinstated it in 1802.

      Jules Michelet's History of the French Revolution (1847-1853) — the foundational text of republican historiography — framed the revolution as the awakening of the French people: "The revolution is nothing but the belated reaction of justice against the government of favoritism and the religion of grace." For the republican tradition, the revolution's violence is a stain on an essentially noble project — not its essence.
    key_arguments:
      - "The revolution established popular sovereignty as the basis of legitimate government"
      - "The Terror was a response to existential military threat, not an inherent outcome of the revolution"
      - "Legislative achievements — abolition of feudalism, metric system, first abolition of slavery — transformed society"
      - "The levee en masse saved the republic from invasion and created the citizen-soldier"
