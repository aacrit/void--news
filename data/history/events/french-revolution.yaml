  - viewpoint: "Modern Academic / Comparative"
    viewpoint_type: academic
    region_origin: global
    narrative: |
      The French Revolution has generated more scholarly debate than any event in modern history. The historiographical schools — Marxist, revisionist, cultural, feminist, postcolonial — each illuminate different dimensions of the same decade. Taken together, they reveal a revolution that was simultaneously a social transformation, a political experiment, a cultural rupture, and a global event.

      The Marxist interpretation, dominant from 1920 to 1970, read the revolution as a class struggle: the bourgeoisie overthrew the feudal aristocracy to establish capitalist property relations. Georges Lefebvre's The Coming of the French Revolution (1939) and Albert Soboul's The Sans-Culottes (1958) documented the role of popular classes — artisans, shopkeepers, wage workers — in driving the revolution beyond its bourgeois origins. Soboul showed that the sans-culottes (literally "without knee-breeches," meaning ordinary working Parisians) were not passive followers of middle-class leaders but autonomous political actors with their own demands: price controls, direct democracy, economic equality.

      The revisionist school, led by Francois Furet's Interpreting the French Revolution (1978), rejected the class analysis. Furet argued that the revolution was primarily a political and cultural event — a crisis of political representation that escalated because the new ideology of popular sovereignty had no institutional mechanism for managing disagreement. When the National Assembly claimed to embody the "general will," any opposition became treason against the people. The Terror, in Furet's reading, was not a response to external threat but an inherent product of the revolution's political logic: unlimited sovereignty required unlimited vigilance against its enemies, and the category of "enemy" expanded continuously.

      The feminist critique asks who the revolution's "citizen" was — and who it excluded. Olympe de Gouges published her Declaration of the Rights of Woman and of the Female Citizen in 1791, explicitly paralleling the 1789 Declaration and demanding that the revolutionary principles be extended to women. She was guillotined in November 1793. The Convention explicitly excluded women from political citizenship and closed women's political clubs in October 1793. Joan Landes's Women and the Public Sphere in the Age of the French Revolution (1988) argued that the revolution's very concept of citizenship was gendered: the "citizen" was male, rational, public; women were relegated to the domestic sphere. Revolutionary universalism was universal only for men.

      The global comparative perspective places the French Revolution within a larger "Age of Revolution" spanning 1776 to 1848 — from the American Revolution through the Haitian Revolution, the Latin American independence movements, and the European revolutions of 1848. R.R. Palmer's The Age of the Democratic Revolution (1959-1964) traced the spread of revolutionary ideas across the Atlantic world. The French Revolution sat at the center of this arc — it executed its king, abolished feudalism, and conquered half of Europe within a decade. Its ideas traveled faster than its armies: the Declaration of the Rights of Man was translated into dozens of languages within years of its publication. Simón Bolivar, liberator of South America, studied the revolution in Paris. The Decembrist revolt in Russia (1825) was organized by officers who had marched through Paris in 1814.
    key_arguments:
      - "Multiple historiographical schools illuminate different dimensions of the same revolution"
      - "Furet's revisionist thesis: the Terror was inherent in the logic of unlimited popular sovereignty"
      - "The revolution excluded women from citizenship while proclaiming universal rights"
      - "The revolution was the central event in a global Age of Revolution (1776-1848)"
    sources:
      - title: "Interpreting the French Revolution"
        author: "Francois Furet"
        year: "1978"
        type: book
      - title: "The Age of the Democratic Revolution (2 volumes)"
        author: "R.R. Palmer"
        year: "1959-1964"
        type: book
      - title: "Women and the Public Sphere in the Age of the French Revolution"
        author: "Joan Landes"
        year: "1988"
        type: book
    notable_quotes:
      - text: "The French Revolution is over."
        speaker: "Francois Furet"
        context: "Opening line of Interpreting the French Revolution, 1978"
      - text: "Woman has the right to mount the scaffold; she must equally have the right to mount the rostrum."
        speaker: "Olympe de Gouges"
        context: "Declaration of the Rights of Woman and of the Female Citizen, Article X, 1791"
    emphasized:
      - "Historiographical debate as revealing as the events themselves"
      - "The Terror's relationship to revolutionary ideology, not just external threats"
      - "Exclusion of women as the revolution's defining internal contradiction"
      - "Global transmission of revolutionary ideas beyond France"
