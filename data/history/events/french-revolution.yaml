  - viewpoint: "Haitian Impact / Enslaved Peoples"
    viewpoint_type: revisionist
    region_origin: americas
    narrative: |
      The French Revolution's universalist language — "Men are born and remain free and equal in rights" — was tested immediately in France's Caribbean colony of Saint-Domingue, the world's most profitable slave colony. In 1789, Saint-Domingue produced 40% of the world's sugar and 60% of its coffee, generated by the labor of approximately 500,000 enslaved Africans. The colony's 40,000 white colonists and 30,000 free people of color (gens de couleur libres) debated whether the Declaration of the Rights of Man applied to them, to free blacks, or to the enslaved. The enslaved themselves provided the answer.

      On August 22, 1791, a coordinated uprising of enslaved people in the northern plain of Saint-Domingue — organized in part at the Bois Caiman ceremony under the leadership of Dutty Boukman — launched what became the Haitian Revolution. Within weeks, 1,000 plantations were burning. The insurgents killed approximately 1,000 whites and destroyed the colony's economic infrastructure. The revolution in Paris — which was debating the rights of free people of color but had not contemplated the abolition of slavery — was forced to confront the logical conclusion of its own principles.

      The relationship between the two revolutions was direct and reciprocal. The Societe des Amis des Noirs (Society of Friends of the Blacks), which included Brissot, Condorcet, and Lafayette, advocated for the rights of free people of color and eventually for abolition. But their advocacy was contested: the colonial lobby in Paris was powerful, and the profits of the slave trade financed much of the French economy. When the revolutionary government finally abolished slavery on February 4, 1794, it was less an act of principle than a military necessity — the enslaved insurgents in Saint-Domingue, now allied with Spain and Britain, could only be won back by offering freedom.

      Toussaint Louverture, the formerly enslaved man who emerged as the leader of the revolution, rebuilt Saint-Domingue as an autonomous territory within the French Republic. He defeated Spanish and British invasions, issued a constitution in 1801 that made him governor for life, and maintained a functioning economy using paid labor on former plantations. Napoleon, who had reinstated slavery in Guadeloupe in 1802, sent General Leclerc with 20,000 troops to restore French authority and slavery in Saint-Domingue. Toussaint was captured under a flag of truce and deported to Fort de Joux in the Jura mountains, where he died of pneumonia and neglect on April 7, 1803. His successor, Jean-Jacques Dessalines, defeated the French at the Battle of Vertieres on November 18, 1803, and declared Haitian independence on January 1, 1804.

      C.L.R. James's The Black Jacobins (1938) — still in print after nine decades, translated into 14 languages — argued that the Haitian Revolution was not a footnote to the French Revolution but its fulfillment. The enslaved people of Saint-Domingue took the revolution's universal claims seriously when the revolutionaries themselves would not. "Liberty, Equality, Fraternity" was realized not in Paris but in Port-au-Prince — by the people whom the revolution's architects had excluded from its promises. The Haitian Revolution was the only slave revolution in history to produce an independent state; its success terrified slaveholders across the Americas and accelerated the abolition movement while simultaneously provoking a racist backlash that isolated Haiti diplomatically and economically for decades.
    key_arguments:
      - "The French Revolution's universalist claims were tested and fulfilled by the enslaved people of Saint-Domingue"
      - "Abolition of slavery (1794) was a military necessity, not a principled act"
      - "The Haitian Revolution was the only successful slave revolution in history"
      - "Napoleon's attempt to restore slavery revealed the limits of revolutionary universalism"
    sources:
      - title: "The Black Jacobins: Toussaint L'Ouverture and the San Domingo Revolution"
        author: "C.L.R. James"
        year: "1938"
        type: book
      - title: "Avengers of the New World: The Story of the Haitian Revolution"
        author: "Laurent Dubois"
        year: "2004"
        type: book
      - title: "A Colony of Citizens: Revolution and Slave Emancipation in the French Caribbean, 1787-1804"
        author: "Laurent Dubois"
        year: "2004"
        type: book
