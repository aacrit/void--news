  - viewpoint: "Royalist / Aristocratic"
    viewpoint_type: vanquished
    region_origin: europe
    narrative: |
      Edmund Burke published Reflections on the Revolution in France on November 1, 1790 — before the Terror, before the execution of the king, before the revolutionary wars. He predicted all of it. Burke argued that the revolution's abstract rationalism — its attempt to rebuild society from first principles rather than reform it through tradition — would inevitably produce tyranny. "By hating vices too much, they came to love men too little." The revolution's insistence on total equality, Burke wrote, would destroy the institutions — church, aristocracy, monarchy, guilds, provinces — that mediated between the state and the individual, leaving citizens exposed to the unlimited power of the sovereign assembly.

      Burke was writing as a Whig, not a Tory — a defender of the English constitutional tradition of 1688, not an absolutist. His argument was not that the ancien regime was perfect but that its institutions had evolved over centuries to accommodate the competing interests of a complex society. The revolution did not reform these institutions; it annihilated them. On the night of August 4, 1789, the National Assembly abolished feudal privileges, tithes, manorial courts, and provincial privileges in a single session. Burke saw this not as liberation but as destruction: the elimination of the organic social bonds that gave French life its structure.

      The emigre experience confirmed Burke's fears. Between 1789 and 1792, approximately 150,000 French nobles, clergy, and their families fled France — to Koblenz, London, Vienna, and across Europe. Their property was confiscated and sold to finance the revolution. The confiscation of Church property — estimated at 10% of all French land — was decreed on November 2, 1789, and the proceeds used to back a new paper currency, the assignat, which hyperinflated to near-worthlessness by 1795. The emigres watched from abroad as their houses were looted, their churches desecrated, and their relatives guillotined.

      The execution of Louis XVI on January 21, 1793, in the Place de la Revolution (now Place de la Concorde) shocked the royal houses of Europe. Louis had been tried by the Convention, found guilty of "conspiracy against the public liberty and general safety," and condemned to death by a vote of 387 to 334 (with 72 favoring conditional sentence). The margin was narrow; the act was irreversible. Marie Antoinette's execution on October 16 — after a trial in which she was accused of incest with her son, a charge the prosecution itself struggled to sustain — exemplified the revolutionary tribunal's descent into cruelty dressed as justice.

      The conservative tradition, from Burke through Joseph de Maistre to Alexis de Tocqueville, has debated the revolution's legacy ever since. Tocqueville's The Old Regime and the Revolution (1856) argued that the revolution did not destroy the centralized French state — it completed its centuries-long construction. The Bourbon monarchy had already crushed aristocratic independence, provincial autonomy, and guild power; the revolution merely finished the job and transferred the concentrated power to new hands. In this reading, the revolution's great crime was not that it changed France but that it convinced the French — and the world — that violent rupture was the path to liberty, when in fact it produced only a new form of despotism: Napoleon.
    key_arguments:
      - "Abstract rationalism, applied to society, produces tyranny — Burke predicted the Terror before it happened"
      - "The revolution destroyed organic social institutions, leaving individuals exposed to unlimited state power"
      - "The execution of Louis XVI was a narrow vote (387-334) that shocked Europe"
      - "The revolution's endpoint — Napoleon's dictatorship — proved that violent rupture produces despotism, not liberty"
    sources:
