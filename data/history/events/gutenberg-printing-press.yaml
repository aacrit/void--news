slug: gutenberg-printing-press
title: The Gutenberg Revolution
subtitle: A bankrupt goldsmith copied a Buddhist idea and accidentally ended the Catholic Church's monopoly on truth
date_display: c. 1440-1455
date_sort: 1440
date_precision: decade
era: medieval
region: europe
country: Holy Roman Empire (Mainz)
category: cultural
severity: critical
death_toll: 'N/A (cultural revolution — though print-enabled religious wars killed millions in the century that followed)'
affected_population: Transformed literacy from elite privilege to mass possibility — 20 million volumes in print by 1500
duration: Spread across Europe within 50 years; 1,000 print shops in 200 cities by 1500
summary: 'Johannes Gutenberg did not invent printing. The Chinese had been printing with carved woodblocks
  since the 9th century. Bi Sheng created movable ceramic type around 1040, during the Song Dynasty.
  Korean printers cast the first metal movable type in the 1230s — the Jikji, printed in 1377, is
  the oldest surviving metal-type book. What Gutenberg invented, around 1440 in Mainz, was a system:
  an alloy of lead, tin, and antimony that could be cast into durable reusable type; an oil-based
  ink that adhered to metal (water-based inks, used for woodblocks, slid off); and a wooden press
  adapted from the screw presses used in Rhine Valley winemaking. The individual components existed.
  The combination did not.


  Gutenberg''s business history is a record of debt. He borrowed 800 guilders from Johann Fust in
  1450, using his printing equipment as collateral. By 1452, he borrowed another 800 guilders. The
  42-line Bible — the Gutenberg Bible, begun around 1452 and completed by 1455 — required roughly
  three years of labor, 300 individually cast characters per font, and calfskin for 180 copies
  (approximately 170 calves per Bible, 30,600 total). Fust sued Gutenberg in November 1455 for
  repayment of 2,026 guilders, won the judgment, and seized the press, the type, and the unfinished
  inventory. Gutenberg lost control of his own invention. Fust and his son-in-law Peter Schoffer
  continued printing and became the first commercial publishers in Europe. Gutenberg died in 1468
  in Mainz, granted a small pension by the Archbishop, largely forgotten.


  The technology spread with a speed that has no pre-industrial parallel. By 1470, printing presses
  operated in Italy, France, the Netherlands, and England. By 1480, there were presses in 110 towns
  across Europe. By 1500, an estimated 27,000 editions had been printed — roughly 20 million
  individual volumes. Before Gutenberg, a scribe copying the Bible by hand took approximately two
  years. After Gutenberg, 180 copies could be produced in three. The cost of a book fell by roughly
  80 percent within fifty years.


  The first books were religious — Bibles, psalters, indulgences. But by the 1470s, the market had
  diversified. Aldus Manutius in Venice pioneered the pocket-sized octavo format in the 1490s,
  making books portable for the first time. He printed Greek and Latin classics, creating the
  commercial model for secular publishing. In Germany, pamphlet printing exploded: single-sheet
  broadsides and 8-to-16-page Flugschriften became the first mass media. When Martin Luther nailed
  his 95 Theses to the door of the Castle Church in Wittenberg on October 31, 1517, local printers
  translated them from Latin to German and distributed 300,000 copies within three months. Luther
  himself acknowledged the press as an instrument of providence: "Printing is the ultimate gift
  of God and the greatest one."


  The Catholic Church recognized the threat within a generation. Pope Alexander VI issued the first
  papal bull on censorship, Inter multiplices, in 1501, requiring episcopal approval for all printed
  works. The Index Librorum Prohibitorum — the Index of Forbidden Books — was established in 1559
  and not abolished until 1966. But censorship could not contain a decentralized technology. For
  every book suppressed in one jurisdiction, printers in another reproduced it. The Reformation
  was, among other things, the first information war — and print won.

  '
significance: 'Elizabeth Eisenstein''s The Printing Press as an Agent of Change (1979) argued that
  print culture produced three revolutions: the Reformation (vernacular scripture broke Rome''s
  interpretive monopoly), the Scientific Revolution (exact reproduction of diagrams, tables, and
  observations allowed cumulative knowledge-building impossible in manuscript culture), and the
  political revolutions of the 18th century (pamphlets, newspapers, and broadsides enabled public
  opinion as a political force). Literacy rates in Western Europe rose from roughly 5-10 percent
  in 1450 to 30-40 percent by 1600. The number of European universities doubled between 1450 and
  1520. The price of books fell 80 percent in fifty years. Each of these numbers marks a shift that
  manuscript culture could not have produced in five centuries. The parallel to the digital revolution
  is inexact but instructive: Gutenberg, like the internet, did not create new ideas — he made
  existing ideas impossible to suppress.

  '
