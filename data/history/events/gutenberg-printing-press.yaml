  - text: All that has been written to me about that marvelous man seen at Frankfurt is true. I have not seen complete Bibles, but I did see a number of quires of various books of the Bible. The script was very neat and legible, and could be read effortlessly.
    speaker: Enea Silvio Piccolomini (future Pope Pius II)
    context: Letter to Cardinal Juan de Carvajal, March 12, 1455 — the earliest surviving description of Gutenberg's Bible
  emphasized:
