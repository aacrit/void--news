summary: 'On the night of August 14, 1791, in a clearing at Bois Caiman in the northern mountains of Saint-Domingue, a vodou priest named Boukman Dutty sacrificed a black pig and passed its blood among
  the assembled enslaved men and women. The ceremony bound them to an oath: kill every master, burn every plantation, take the colony. Eight days later, on August 22, the northern plain erupted. Within
  a week, 1,000 sugar plantations were burning. Enslaved workers who had been valued, taxed, branded, and sold as property turned the tools of their labor — machetes, cane knives, torches — against the
  infrastructure that had consumed them. By the end of September, 1,000 white colonists were dead and the most profitable colony in the Western Hemisphere was producing ash instead of sugar.


  Saint-Domingue in 1789 generated more revenue than all thirteen American colonies combined. It produced 40% of the world''s sugar and 60% of its coffee. These numbers required 500,000 enslaved Africans
  working under a mortality regime so brutal that the colony imported 40,000 new captives per year just to maintain its labor force. The Code Noir of 1685 theoretically regulated treatment; planters ignored
  it. Enslaved people were whipped with the lianes of the colony''s trees, locked in iron masks to prevent them from eating sugarcane, and burned alive as punishment for running. A planter named Le Jeune,
  tried in 1788 for torturing two enslaved women to death, was acquitted by a jury of fellow planters.


  The revolution lasted thirteen years and consumed five armies. Toussaint Louverture, himself formerly enslaved, emerged from the chaos as the revolution''s strategist — a man who read Caesar''s commentaries,
  corresponded with Napoleon, and defeated Spanish, British, and French invasions through a combination of guerrilla warfare, diplomatic maneuvering, and the yellow fever that killed European soldiers faster
  than any army could. Napoleon sent his brother-in-law General Leclerc with 20,000 troops in 1802 to restore slavery and French authority. Toussaint was captured under a flag of truce and deported to Fort
  de Joux in the Jura mountains, where he died of pneumonia and deliberate neglect on April 7, 1803. His successor, Jean-Jacques Dessalines, finished the war. At the Battle of Vertieres on November 18,
  1803, Dessalines''s army broke the last French position. On January 1, 1804, he declared independence, renamed the country Haiti — the Taino word for "mountainous land" — and spoke the sentence that defined
  the new nation: "I have avenged America."

  '
significance: 'The Haitian Revolution was the only successful slave revolution in recorded history. It produced the first independent Black republic and the second independent nation in the Western Hemisphere
  (after the United States). Dessalines''s 1805 Constitution declared all Haitian citizens "Black" regardless of skin color — abolishing racial categories through legal fiat. The revolution terrified slaveholding
  societies across the Americas: the U.S. Congress banned trade with Haiti in 1806, France demanded 150 million francs in "indemnity" for lost property (including lost "property" in human beings) in 1825,
  and Haiti was not diplomatically recognized by the United States until 1862 — during the Civil War, when Southern slaveholders no longer sat in Congress. The indemnity debt, restructured and refinanced
  over 122 years, was not fully paid until 1947. The New York Times estimated in 2022 that the payments cost Haiti between $21 billion and $115 billion in economic growth over two centuries.

  '
