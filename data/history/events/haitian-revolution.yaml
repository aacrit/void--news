- viewpoint: Atlantic World Academic
  viewpoint_type: academic
  region_origin: global
  narrative: 'Michel-Rolph Trouillot''s Silencing the Past (1995) opens with a provocation: the Haitian Revolution was "unthinkable" even as it was happening. European and American observers in the 1790s
    literally could not process the idea of enslaved Black people defeating European armies, governing themselves, and establishing a republic. The categories available to them — Enlightenment universalism,
    scientific racism, colonial paternalism — could not accommodate the event. So they silenced it. Not through active censorship but through the architecture of Western historical narration itself, which
    placed Europe at the center and rendered everything else peripheral.


    The evidence of this silencing is measurable. The American Historical Review — the discipline''s flagship journal — published zero articles on the Haitian Revolution between its founding in 1895 and
    1970. The Cambridge Modern History (1902-1912) devotes one paragraph to it. The revolution that destroyed the Western Hemisphere''s most profitable colony, produced the Louisiana Purchase, accelerated
    abolition debates across the Atlantic, and created the first post-colonial Black state was treated as a footnote to Napoleon''s career or, more commonly, not treated at all.


    C.L.R. James''s The Black Jacobins (1938) was the first major historiographic intervention. James, a Trinidadian Marxist, placed the Haitian Revolution within the same analytical framework as the French
    Revolution — a class struggle in which the enslaved, as the most exploited class, were the most revolutionary actors. His title was deliberate: the "Black Jacobins" were not imitators of the French
    Jacobins but their completion. The French revolutionaries proclaimed universal rights and meant them only for white men; the Black Jacobins enforced them universally. James wrote the book in part as
    a commentary on anti-colonial movements in Africa — he saw Toussaint as a precursor to Kwame Nkrumah and Jomo Kenyatta.


    Since the 1990s, the Haitian Revolution has moved from historiographic silence to the center of Atlantic world studies. Laurent Dubois (Avengers of the New World, 2004), Carolyn Fick (The Making of
    Haiti, 1990), and David Geggus (Haitian Revolutionary Studies, 2002) have reconstructed the revolution from below — using notarial records, plantation inventories, military correspondence, and oral
    traditions to recover the experience of the enslaved participants whose voices were systematically excluded from the documentary record. Fick''s work in particular demonstrates that the revolution was
    not led by a single figure (the "great man" narrative centered on Toussaint) but by thousands of autonomous bands of formerly enslaved people who fought, negotiated, and organized independently of any
    centralized command.


    The revolution''s global consequences are still being excavated. Ada Ferrer''s Freedom''s Mirror (2014) traces how the Haitian Revolution reshaped slavery in Cuba — planters fled Saint-Domingue to Cuba,
    brought their expertise and their enslaved workers, and transformed Cuba into the world''s largest sugar producer, replacing the colony they had lost. Julius Scott''s The Common Wind (2018, based on
    a 1986 dissertation) documents how news of the revolution spread through the Caribbean via sailors, dockworkers, and enslaved people themselves — an "information revolution" that terrified slaveholders
    from Virginia to Bahia. The fear of "another Haiti" shaped slave codes, military deployments, and diplomatic policy across the Americas for the next sixty years.


    The gender dimension has received increasing attention. Bernard Moitt (Women and Slavery in the French Antilles, 2001) and Myriam Chancy (Framing Silence, 1997) document the roles of enslaved women
    in the revolution — as combatants (Marie-Jeanne Lamartiniere), as intelligence gatherers (market women who carried messages between plantations), as community organizers (women who maintained vodou
    networks), and as agricultural workers who sustained the revolutionary army. The standard narrative of the revolution — focused on male military leaders — systematically understates women''s participation.

    '
  key_arguments:
  - The Haitian Revolution was 'unthinkable' within Western frameworks — and was silenced in historiography for nearly two centuries
  - James's Black Jacobins reframed the revolution as the completion, not imitation, of French revolutionary ideals
  - The revolution reshaped slavery across the Americas — Cuba replaced Saint-Domingue; 'fear of another Haiti' shaped slave policy everywhere
  - Women's roles have been systematically understated — combatants, intelligence networks, vodou organizers, agricultural sustenance
