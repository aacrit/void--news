- viewpoint: French Colonial / Napoleonic
  viewpoint_type: vanquished
  region_origin: europe
  narrative: 'Saint-Domingue was the jewel of the French colonial empire. In 1789, the colony''s exports — sugar, coffee, indigo, cotton — accounted for roughly 40% of France''s foreign trade. The port
    of Nantes grew wealthy on the triangular trade: manufactured goods to West Africa, enslaved people to Saint-Domingue, sugar and coffee back to France. Bordeaux, Le Havre, and La Rochelle depended on
    the same circuit. When the northern plain burned in August 1791, it was not only a rebellion — it was an economic catastrophe for metropolitan France.


    The French colonial narrative frames the revolution as a disaster produced by the collision of revolutionary ideals with colonial reality. The Revolution in Paris destabilized the colony''s rigid hierarchy
    by raising questions it could not answer: Did the Declaration of the Rights of Man apply to free people of color? To the enslaved? The Societe des Amis des Noirs pressed for abolition; the colonial
    lobby — the Club Massiac — fought for the status quo. The vacillation of successive revolutionary governments between extending rights and protecting commerce created a political vacuum in Saint-Domingue
    that armed insurrection filled.


    General Leclerc''s expedition of 1802 — 20,000 soldiers aboard 86 ships, the largest overseas expedition France had ever mounted — was Napoleon''s attempt to restore the colonial system. Leclerc''s
    instructions were explicit: pacify the colony, arrest Toussaint, and restore the plantation economy. The word "slavery" was to be avoided until military control was established. Napoleon''s private
    correspondence to Leclerc reveals the strategy in stages: first, flatter the Black generals; second, disarm them; third, deport them to France; finally, restore the ancien regime. Leclerc succeeded
    in the first two stages. Toussaint was lured to a meeting under a flag of truce, seized on June 7, 1802, and shipped to Fort de Joux, where he was held in a stone cell without adequate food or heating.
    He died on April 7, 1803, weighing barely 80 pounds.


    But Leclerc could not complete the third stage. Yellow fever — Aedes aegypti, breeding in the standing water of the ruined plantations — killed French soldiers at a rate of 100 per day by the summer
    of 1802. Leclerc himself died of the disease on November 1, 1802, at age 30. His successor, Rochambeau, adopted a strategy of terror: mass drownings in Le Cap harbor, attack dogs imported from Cuba
    and trained on Black prisoners, and public executions designed to break resistance through spectacle. The strategy failed. Dessalines''s army grew with every atrocity, as formerly neutral or collaborating
    Black soldiers defected to the insurgents. By late 1803, France had lost over 50,000 men in Saint-Domingue — more than in any Napoleonic campaign in Europe at that date.


    The loss of Saint-Domingue shaped Napoleon''s continental strategy. Without the colony''s revenue, his planned Western Hemisphere empire — Saint-Domingue as the base, Louisiana as the granary — was
    unviable. In April 1803, Napoleon sold the Louisiana Territory to the United States for $15 million, doubling the size of the American republic. The Haitian Revolution thus directly produced the Louisiana
    Purchase — a consequence that American historiography long preferred to forget.

    '
  key_arguments:
  - Saint-Domingue's revenue was critical to French imperial finance — its loss reshaped Napoleon's global strategy
  - Revolutionary ideology from Paris destabilized colonial society without providing a workable alternative
  - Yellow fever killed more French soldiers than combat — disease, not military defeat, decided the war
  - The loss of Saint-Domingue led directly to the Louisiana Purchase
