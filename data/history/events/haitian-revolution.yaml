- viewpoint: Haitian Nationalist / Post-Independence
  viewpoint_type: revisionist
  region_origin: americas
  narrative: 'Haiti''s founding documents tell a story that no other nation in the Americas can tell. The Declaration of Independence of January 1, 1804 — drafted by Louis Boisrond-Tonnerre and proclaimed
    by Dessalines at Gonaives — opens not with an abstract philosophical principle but with a demand: "It is not enough to have expelled the barbarians who have bloodied our land for two centuries." The
    document names France as the enemy, calls its civilizing pretensions a lie, and declares that Haitians owe nothing to the nation that enslaved them. Where the American Declaration of Independence invokes
    self-evident truths, and the French Declaration of the Rights of Man invokes natural law, the Haitian declaration invokes survival.


    The Constitution of 1805 went further than any founding document of its era. Article 14 declared all Haitians "Black" — including Polish deserters from Leclerc''s army who had switched sides and German
    colonists who had settled before the revolution. The provision abolished racial categories not through color-blindness but through a radical inversion: Blackness became the national identity, whiteness
    was legally erased. Article 12 prohibited any white person from owning property in Haiti. Article 28 declared that Haitians would never undertake "any enterprise for conquest" — a renunciation of imperialism
    written by a nation born from resisting it.


    The nationalist narrative frames post-independence Haiti''s struggles as consequences of external punishment, not internal failure. France''s indemnity demand of 1825 — 150 million francs, later reduced
    to 90 million — was collected at gunpoint: Charles X sent 14 warships to Port-au-Prince. President Jean-Pierre Boyer accepted rather than face invasion. Haiti borrowed from French banks to make the
    payments, creating a debt cycle that lasted until 1947. The United States refused diplomatic recognition until 1862. Britain, which had profited from the revolution by seizing French Caribbean trade,
    was marginally more accommodating but still treated Haiti as a pariah.


    Thomas Madiou''s Histoire d''Haiti (1847-1848, 3 volumes) — written by a Haitian intellectual born two years after independence — established the national historiographic tradition. Madiou framed the
    revolution as a war of liberation comparable to the American and French revolutions, but superior in its moral clarity: Americans fought for self-governance while enslaving others; the French proclaimed
    universal rights while maintaining colonial slavery; Haitians fought for actual, physical freedom of actual, physical human beings. Jean Price-Mars''s Ainsi Parla l''Oncle (1928) extended the analysis
    by reclaiming vodou, kreyol, and African-derived culture as the authentic foundations of Haitian identity — not embarrassments to be hidden from foreign observers but the living roots of national consciousness.


    The U.S. occupation of Haiti from 1915 to 1934 — during which the U.S. Marines dissolved the Haitian legislature, imposed a new constitution (written in part by Franklin Roosevelt, then Assistant Secretary
    of the Navy), revived the corvee (forced labor), and killed an estimated 15,000 Haitians — confirmed what the nationalist tradition had always argued: that the great powers never accepted Haiti''s independence,
    only tolerated it, and would reassert control when convenient. The Duvalier dictatorships (1957-1986), in this reading, were enabled by the same Cold War logic that supported dictators across the Americas
    — and by the economic devastation that the indemnity, the occupation, and decades of diplomatic isolation had inflicted.

    '
  key_arguments:
  - Haiti's founding documents are morally superior to American and French precedents because they abolished slavery, not just monarchy
  - Post-independence poverty was caused by external punishment — the French indemnity, U.S. non-recognition, diplomatic isolation
  - The 1805 Constitution's racial provisions were revolutionary — declaring all citizens 'Black' abolished racial hierarchy
  - The U.S. occupation (1915-1934) confirmed that Western powers never accepted Haitian sovereignty
