perspectives:
- viewpoint: Enslaved Revolutionaries
  viewpoint_type: indigenous
  region_origin: americas
  narrative: 'The revolution began not in a legislative assembly but in a forest clearing. The Bois Caiman ceremony of August 14, 1791 was a vodou ritual — a kreyol spiritual practice forged from West African
    religious traditions under the pressure of enslavement. Boukman Dutty, a Jamaican-born enslaved man who served as a commandeur (driver) on the Turpin plantation, led the ceremony in the northern mountains.
    The ritual sacrifice of a black pig, the oath sworn in blood, the invocation of the lwa (spirits) — these were the organizational technology of a revolution whose participants could not write letters,
    publish pamphlets, or convene assemblies. They organized through the networks that the plantation system itself created: the Sunday markets where enslaved people from different plantations traded goods
    and information, the nocturnal assemblies that planters feared but could not suppress, the drum communications that carried messages across the mountain ranges.


    The uprising of August 22, 1791 was neither spontaneous nor disorganized. The leaders — Boukman, Jean-Francois, Biassou, Jeannot — coordinated a synchronized assault across the northern plain. Within
    ten days, 200 sugar plantations and 1,200 coffee plantations were destroyed. The insurgents used fire as their primary weapon — turning the cane fields, drying sheds, and great houses into fuel. The
    smoke was visible from Le Cap (now Cap-Haitien), the colonial capital, 30 miles away. The planters who survived the first nights fled to Le Cap and fortified the city.


    Toussaint Louverture entered the revolution late — he secured safe passage for his former master''s family before joining the insurgent forces. His military education was self-taught: he studied Julius
    Caesar''s Commentarii de Bello Gallico, the Abbe Raynal''s Histoire des deux Indes, and Epictetus. He transformed a peasant insurgency into a disciplined army. By 1797, he governed the entire colony
    as governor-general, maintained sugar production using paid labor, and administered a court system. He wrote letters to Napoleon in French, negotiated with British admirals, and played the French, Spanish,
    and British against each other with a diplomatic subtlety that infuriated all three.


    The war against Leclerc''s expedition (1802-1803) was fought with a ferocity born of the knowledge that defeat meant a return to slavery. Napoleon had already restored slavery in Guadeloupe in May 1802;
    the message was unmistakable. At the siege of Crete-a-Pierrot in March 1802, a garrison of 1,200 held off 12,000 French troops for three weeks. Marie-Jeanne Lamartiniere fought on the ramparts, loading
    and firing muskets alongside male combatants. Women fighters were not anomalies — they participated throughout the revolution as combatants, spies, nurses, and supply runners. The French lost 1,500
    men at Crete-a-Pierrot; the garrison escaped through French lines at night.


    After Toussaint''s capture and deportation, Dessalines united the revolution''s fractious commanders under a single command. He adopted a strategy of total war: scorched earth, no quarter to French
    prisoners, the destruction of any infrastructure the French could use. At Vertieres, on November 18, 1803, Dessalines''s commanders Capois-la-Mort and Gabart led frontal assaults against the French
    fortifications at the entrance to Le Cap. Capois-la-Mort''s horse was shot from under him; he continued on foot. A second bullet knocked his hat off; he kept charging. The French commander, Rochambeau,
    reportedly ordered a ceasefire to salute his courage before the fighting resumed. The French evacuation followed within days. On January 1, 1804, Dessalines tore the white stripe from the French tricolor
    — removing France from its own flag — and the remaining blue and red became the flag of Haiti.

    '
  key_arguments:
  - The revolution was organized through African-derived cultural and spiritual networks — vodou, market networks, drum communication
  - Enslaved people applied Enlightenment principles to their own condition before any European abolitionist proposed it
  - Women fought as combatants at every stage — Marie-Jeanne Lamartiniere at Crete-a-Pierrot is one documented case among many
  - Dessalines's scorched-earth strategy was a rational response to Napoleon's proven willingness to restore slavery
