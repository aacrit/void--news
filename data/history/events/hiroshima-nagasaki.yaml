perspectives:
- viewpoint: American Military/Strategic
  viewpoint_type: victor
  region_origin: americas
  narrative: 'The decision to use atomic weapons against Japan followed a logic rooted in the projected costs of invasion. Operation Downfall — the planned two-phase invasion of the Japanese home islands
    — was scheduled for November 1945 (Kyushu, Operation Olympic) and March 1946 (Honshu, Operation Coronet). U.S. military planners estimated American casualties between 250,000 and 1 million, depending
    on assumptions about Japanese defensive strength. Japanese military casualties were projected in the millions. Secretary of War Henry Stimson''s Interim Committee, which met in May-June 1945, concluded
    that the bomb should be used against a military-industrial target without prior warning.


    Truman learned of the bomb''s existence only after becoming president on April 12, 1945. At the Potsdam Conference in July, he received word of the successful Trinity test on July 16 — the world''s
    first nuclear detonation, in the New Mexico desert. The Potsdam Declaration, issued July 26, demanded Japan''s unconditional surrender and warned of "prompt and utter destruction." Japan''s Prime Minister
    Kantaro Suzuki responded with the word "mokusatsu," translated at the time as "treat with silent contempt," though the term''s ambiguity — it can also mean "withhold comment" — remains a point of historical
    debate.


    The military rationale rested on three pillars. First, Japan''s military leadership showed no sign of surrendering despite the firebombing campaign that had already destroyed 67 Japanese cities. The
    March 9-10, 1945 firebombing of Tokyo killed an estimated 100,000 people — more immediate deaths than either atomic bomb — yet Japan''s Supreme War Council had not moved toward capitulation. Second,
    the Soviet Union was about to enter the Pacific War (it declared war on August 8), and American strategists wanted to end the conflict before Soviet forces could advance into Manchuria, Korea, and potentially
    Hokkaido. Third, the bomb had cost $2 billion (approximately $30 billion in 2024 dollars) and employed 125,000 people at its peak; there was institutional momentum to demonstrate its capability.


    Truman''s diary entry for July 25, 1945 reads: "We have discovered the most terrible bomb in the history of the world." He authorized its use the same day. After Hiroshima, Truman issued a public statement
    framing the bomb as retribution for Pearl Harbor and a means to save "hundreds of thousands of American lives." He maintained this position for the rest of his life, telling reporters in 1958: "I never
    lost any sleep over it."


    The American strategic narrative acknowledges the horror but insists on the counterfactual: without the bombs, the war would have continued for months or years, with total casualties — Japanese and
    Allied — far exceeding those of Hiroshima and Nagasaki combined. General George Marshall estimated that Olympic alone could produce 500,000 American casualties in the first 30 days. The argument is
    that the bombs, terrible as they were, ended the war and saved net lives.

    '
  key_arguments:
  - Operation Downfall projected 250,000 to 1 million American casualties
  - Japan's military leadership showed no intent to surrender despite the destruction of 67 cities
  - Soviet entry into the Pacific War created urgency to end the conflict under American terms
  - The bombs ended the war within days, preventing a prolonged invasion
