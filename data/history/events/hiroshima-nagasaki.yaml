legacy_points:
- Inaugurated the nuclear age and the Cold War arms race, peaking at ~70,000 warheads globally
- Japan's Article 9 constitution — renunciation of war — became the template for nuclear pacifism
- Hibakusha testimony drove the 2017 Treaty on the Prohibition of Nuclear Weapons
- Radiation Effects Research Foundation has tracked survivor health for 80 years, shaping global radiation science
- The Hiroshima Peace Memorial (Genbaku Dome) became a UNESCO World Heritage Site in 1996
