- viewpoint: International / Scientific
  viewpoint_type: bystander
  region_origin: global
  narrative: 'The scientific community that built the bomb was among the first to grasp its implications. Within weeks of Hiroshima, many Manhattan Project scientists began organizing against the weapon
    they had created. In September 1945, Leo Szilard — the physicist whose 1939 letter to Einstein had initiated U.S. atomic research — circulated a petition signed by 70 scientists urging Truman not to
    use the bomb on Japan without first offering a demonstration. The petition reached Truman''s desk after Nagasaki.


    The Franck Report, drafted in June 1945 by a committee of Manhattan Project scientists led by James Franck at the University of Chicago''s Metallurgical Laboratory, recommended a demonstration of the
    bomb on an uninhabited island before any use against a city. The report warned that a surprise attack on Japan would "sacrifice public support" and trigger an arms race. Stimson''s Interim Committee
    considered and rejected the proposal, arguing that a failed demonstration would strengthen Japanese resolve and that no test could replicate the shock effect needed to compel surrender.


    Oppenheimer''s response to the bombing was layered. In October 1945, he told Truman: "Mr. President, I feel I have blood on my hands." Truman later told Dean Acheson: "I don''t want to see that son
    of a bitch in this office ever again." Oppenheimer''s subsequent opposition to the hydrogen bomb — and his security clearance revocation in 1954 during the McCarthy era — became a parable about the
    tension between scientific innovation and moral responsibility.


    The international response was shaped by the geopolitical context. The Soviet Union, which had been racing to develop its own atomic capability since 1942, accelerated its program. Igor Kurchatov''s
    team, aided by intelligence from Klaus Fuchs and other spies within the Manhattan Project, detonated "First Lightning" (Joe-1) on August 29, 1949. The arms race was underway. By 1952, the U.S. tested
    the first thermonuclear weapon (hydrogen bomb), with a yield of 10.4 megatons — 700 times more powerful than Little Boy.


    The Bulletin of the Atomic Scientists, founded in December 1945 by Manhattan Project veterans including Hyman Goldsmith and Eugene Rabinowitch, introduced the Doomsday Clock in 1947 at 7 minutes to
    midnight. It has served as a scientific consensus indicator of existential risk ever since. In 2023, the clock stood at 90 seconds to midnight — the closest it has ever been.


    The scientific-international perspective frames Hiroshima and Nagasaki as a species-level inflection point. Before August 6, 1945, humanity lacked the capacity for self-annihilation. After it, the capacity
    existed and proliferated. Nine nations now possess approximately 12,500 nuclear warheads. The Non-Proliferation Treaty (1968), the Comprehensive Test Ban Treaty (1996, not yet in force), and the Treaty
    on the Prohibition of Nuclear Weapons (2017, rejected by all nuclear states) represent successive attempts to contain a technology whose use was demonstrated, with full public documentation, on two
    civilian populations in three days.

    '
  key_arguments:
  - Manhattan Project scientists warned against surprise use — the Franck Report of June 1945
  - The bombings triggered an arms race that produced 70,000 warheads at peak
  - Nuclear proliferation transformed existential risk into a permanent feature of geopolitics
  - Scientific community organized against its own creation within weeks
