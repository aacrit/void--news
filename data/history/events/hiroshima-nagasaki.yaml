- viewpoint: Japanese Civilian / Hibakusha
  viewpoint_type: vanquished
  region_origin: east-asia
  narrative: 'At 8:15 a.m. on August 6, 1945, Sunao Tsuboi was a 20-year-old engineering student walking to class at Hiroshima University of Literature and Science, 1.2 kilometers from the hypocenter. The
    flash came first — a white light that turned everything to negative, like a photographic plate. Then the heat: his exposed skin bubbled and peeled. Then the blast wave threw him 10 meters. When he stood,
    the city was gone. Where buildings had been, there was flatness. People walked past him with their skin hanging in sheets from their arms. A woman carried a headless infant. The river was full of bodies.


    John Hersey''s Hiroshima (1946), published as the entire issue of The New Yorker on August 31, 1946, introduced the Western world to six survivors'' accounts. Hersey followed a clerk, two doctors, a
    minister, a seamstress, and a Jesuit priest through the hours and months after the blast. The account was deliberately understated — clinical, precise, refusing to editorialize — and its effect was
    seismic. It sold out immediately and remains in print 80 years later.


    The hibakusha — literally "explosion-affected people" — number approximately 650,000 by the Japanese government''s registry. They experienced not one catastrophe but a series: the blast itself, the
    fires that burned for days, the "black rain" that contaminated water and soil, and then the radiation sickness that killed people who had appeared unhurt. Acute radiation syndrome killed 20% of initial
    survivors within weeks. Leukemia rates among hibakusha rose tenfold in the first five years. Thyroid cancer, breast cancer, and lung cancer followed in subsequent decades.


    Beyond the physical toll, hibakusha faced social stigma in postwar Japan. Radiation exposure was poorly understood; many Japanese feared it was contagious or hereditary. Hibakusha — especially women
    — were rejected as marriage partners. Families concealed their hibakusha status. The Japanese government did not pass the Atomic Bomb Survivors Relief Law until 1957, 12 years after the bombings. Recognition
    of "black rain" survivors as hibakusha was not extended until a 2021 court ruling, 76 years after the event.


    The hibakusha testimony tradition — speaking publicly about the experience to prevent recurrence — became a global movement. Setsuko Thurlow, who was 13 years old in Hiroshima and dug herself out of
    a collapsed building, spent seven decades speaking at the United Nations and in schools. She accepted the 2017 Nobel Peace Prize on behalf of ICAN, telling the audience in Oslo: "Each warhead has the
    power to obliterate a city. They are not weapons of war. They are instruments of extinction."


    Nagasaki''s hibakusha carry an additional burden: the perception that their city was a secondary target, an afterthought. Kokura was the primary target that morning; Nagasaki was bombed because the
    clouds parted. Sumiteru Taniguchi, who was 16 years old and delivering mail on his bicycle 1.8 kilometers from the Nagasaki hypocenter, survived with burns covering his entire back. His photograph —
    lying face-down on a treatment table, his back a single wound — was published in LIFE, Der Spiegel, and newspapers across 30 countries; it remains a permanent exhibit at the Nagasaki Atomic Bomb Museum
    and the UN headquarters. He testified before the United Nations in 2010: "I want you to understand that it is not merely a picture. It is my body."


    The hibakusha perspective does not engage with the military calculus of whether the bombs "saved lives." It asks a different question: whether any strategic objective can justify the deliberate incineration
    of a civilian population. The answer, for those who walked through the ruins, has always been no.

    '
  key_arguments:
  - Civilians — not military targets — bore the overwhelming cost of the bombings
  - Radiation effects extended suffering decades beyond the initial blasts
  - Hibakusha faced social stigma and delayed government recognition in Japan
  - No strategic calculation justifies the deliberate destruction of a civilian population
