summary: 'At 8:15 a.m. on August 6, 1945, the B-29 Superfortress Enola Gay, piloted by Colonel Paul Tibbets, released a uranium-235 gun-type bomb codenamed "Little Boy" over the city of Hiroshima. The weapon
  detonated at approximately 1,900 feet above Shima Surgical Clinic, 800 feet southeast of the intended aiming point, the Aioi Bridge. The yield was approximately 15 kilotons of TNT. The fireball reached
  temperatures exceeding 1 million degrees Celsius at its center. Within one second, everything within a half-mile radius was vaporized or carbonized. The blast wave, traveling at 984 feet per second, leveled
  69% of Hiroshima''s buildings. Of the city''s 350,000 residents and military personnel, between 70,000 and 80,000 died instantly. By December 1945, the total reached an estimated 140,000.


  Three days later, on August 9, the B-29 Bockscar, piloted by Major Charles Sweeney, dropped a plutonium implosion bomb codenamed "Fat Man" on Nagasaki. The primary target had been Kokura, but cloud cover
  diverted the mission. Fat Man detonated at 1,650 feet above Nagasaki''s Urakami Valley at 11:02 a.m. The yield was approximately 21 kilotons — more powerful than Little Boy — but Nagasaki''s hilly terrain
  contained the blast. Between 40,000 and 70,000 people died by the end of 1945. Nagasaki''s Urakami Cathedral, the largest Christian church in East Asia, was destroyed with its congregation; roughly a
  third of Nagasaki''s 12,000 Catholics died.


  The immediate aftermath defied medical understanding. Survivors who appeared uninjured collapsed days later from acute radiation syndrome — bleeding gums, hair loss, hemorrhaging, organ failure. Dr. Michihiko
  Hachiya, director of the Hiroshima Communications Hospital, recorded the first systematic observations in his Hiroshima Diary: patients who had seemed healthy at triage died within two weeks. "Black rain"
  — radioactive fallout mixed with condensation — fell across both cities for hours after the blasts, contaminating water supplies and exposed skin.


  Japan announced its acceptance of the Potsdam Declaration on August 15, 1945, six days after Nagasaki. Emperor Hirohito''s recorded radio address — the first time most Japanese citizens heard his voice
  — cited "a new and most cruel bomb" as the reason for surrender. The formal instrument of surrender was signed aboard the USS Missouri on September 2, 1945.


  By 1950, the combined death toll from both bombings, including radiation-related illnesses, reached an estimated 340,000. Japan''s Atomic Bomb Casualty Commission (later the Radiation Effects Research
  Foundation) has tracked survivors — hibakusha — ever since. As of 2024, approximately 106,000 hibakusha were still alive, their average age above 85.

  '
significance: 'Hiroshima and Nagasaki ended World War II in the Pacific and inaugurated the nuclear age. The bombings triggered the Cold War arms race: the Soviet Union tested its first atomic bomb in August
  1949, and by the 1980s global arsenals peaked at roughly 70,000 warheads. The doctrine of Mutual Assured Destruction — premised on the demonstrated reality of what a single weapon could do to a city —
  shaped geopolitics for the next 80 years. Japan''s postwar constitution, Article 9, renounced war and became the template for nuclear pacifism. The hibakusha movement produced the 2017 Treaty on the Prohibition
  of Nuclear Weapons and the Nobel Peace Prize for the International Campaign to Abolish Nuclear Weapons (ICAN). Whether the bombings were militarily necessary, morally justified, or a war crime has generated
  continuous scholarly and political debate since 1945 — Gar Alperovitz, Tsuyoshi Hasegawa, and Barton Bernstein have challenged the original military rationale, while J. Samuel Walker and Richard Frank
  have defended it.

  '
