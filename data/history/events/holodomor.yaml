- viewpoint: Post-Soviet Academic / Ukrainian National
  viewpoint_type: revisionist
  region_origin: europe
  narrative: 'The question that defines Holodomor scholarship is whether the 1932-1933 famine in Ukraine constitutes genocide
    under the 1948 Convention — meaning the deliberate destruction of a national, ethnic, racial, or religious group "in whole
    or in part." The answer hinges on whether the famine was an incidental byproduct of collectivization (which affected the
    entire Soviet Union) or a targeted assault on the Ukrainian nation (which required specific policies applied to Ukraine
    and not elsewhere).


    The evidence for specificity is extensive and has grown since the opening of Soviet archives in 1991. First, the grain
    procurement quotas for Ukraine in 1932 were set at 7.7 million tons — after the 1932 harvest had already been assessed
    at 14.6 million tons (versus a normal harvest of 23 million tons). The quota amounted to over half the total harvest.
    When Ukrainian party officials — including Vlas Chubar, the chairman of the Ukrainian Council of People''s Commissars,
    and Mykola Skrypnyk, the commissar of education — appealed to Moscow to reduce the quota, Stalin dispatched Lazar Kaganovich
    and Vyacheslav Molotov to Kharkiv in October and November 1932 to enforce collection. The quotas were not merely maintained;
    a second sweep of "hidden grain" was ordered. Andrea Graziosi''s analysis of the grain balance sheets shows that the amount
    extracted from Ukraine in 1932 was proportionally higher than from any other Soviet republic.


    Second, the policies applied to Ukraine had no equivalents elsewhere. The blacklisting of villages (December 1932), the
    confiscation of all foodstuffs (not just grain — meat, vegetables, preserved foods), the closure of Ukraine''s border
    with Russia and Belarus (January 1933), the ban on peasant movement via internal passport restrictions — these were not
    all-Union policies. They were applied to Ukraine and to the Kuban region of the North Caucasus, where ethnic Ukrainians
    constituted a majority. The Kuban connection is critical: Kuban Ukrainians were subjected to forced linguistic Russification
    simultaneously with the famine, including the closure of Ukrainian-language schools and newspapers. Timothy Snyder, in
    Bloodlands (2010), argues that the combination of famine, deportation, and cultural suppression in Ukraine and the Kuban
    constituted a "double blow" aimed at breaking Ukrainian national consciousness.


    Third, the famine coincided with a campaign against Ukrainian cultural and intellectual life. In the late 1920s and early
    1930s, Ukrainian writers, academics, linguists, and clergy were arrested, executed, or driven to suicide in what is known
    as the "Executed Renaissance" — the destruction of the generation of Ukrainian artists who had flourished during the brief
    period of Ukrainization (1923-1932). Mykola Khvylovy, a leading Ukrainian writer, shot himself in May 1933. Mykola Skrypnyk,
    the architect of Ukrainization, shot himself in July 1933 after being denounced for "nationalist deviation." The Academy
    of Sciences of the Ukrainian SSR was purged. The simultaneous destruction of the peasant food supply and the national
    intelligentsia was, in Lemkin''s framing, an assault on the Ukrainian nation as such — not merely on a class of peasants.


    Robert Conquest''s The Harvest of Sorrow (1986) was the first comprehensive English-language study, but it relied heavily
    on emigre testimony and circumstantial evidence available before the archive openings. The post-1991 scholarship — Anne
    Applebaum''s Red Famine (2017), Andrea Graziosi''s archival studies, Lynne Viola''s work on collectivization, and the
    demographic reconstruction by Omelian Rudnytskyi and colleagues (2015) — has grounded the narrative in Soviet-era documents
    that were unavailable to Conquest. Rudnytskyi''s demographic analysis, using reconstructed birth and death registration
    data, estimates 3.9 million excess deaths in Ukraine in 1932-1933 — a number that excludes the estimated 600,000 who died
    in the North Caucasus.


    The genocide debate among scholars is not settled. Andrea Graziosi and Norman Naimark classify the Holodomor as genocide.
    R.W. Davies and Stephen Wheatcroft, in The Years of Hunger (2004), argue that while Stalin''s policies caused the famine
    and his response was criminally negligent, the intent to destroy the Ukrainian nation as such cannot be proven from the
    documentary record — they classify it as "criminal negligence" rather than genocide. Michael Ellman (2007) proposes an
    intermediate position: "Soviet-style genocide" or "politicide." The Ukrainian government''s position since 2006 is unambiguous:
    the Holodomor was genocide. Russia''s position is equally firm: it was a shared Soviet tragedy, not an anti-Ukrainian
    campaign.


    The connection to contemporary politics is direct. When Russia invaded Ukraine in February 2022, Ukrainian President Volodymyr
    Zelensky invoked the Holodomor in his wartime addresses. The destruction of Ukrainian grain infrastructure, the blockade
    of Black Sea grain exports, and the targeting of Ukrainian cultural sites were framed by Ukrainian officials as a continuation
    of the pattern Lemkin identified in 1953: the attempt to destroy Ukraine as a nation. The Holodomor is not only history
    in Ukraine. It is a living argument about sovereignty, survival, and what Russia means to do.

    '
  key_arguments:
  - Ukraine-specific policies — blacklisting, border closures, internal passport denial — distinguish the Holodomor from the
    broader Soviet famine
  - Grain extraction from Ukraine was proportionally higher than from any other republic
  - The simultaneous destruction of the peasantry and the intelligentsia constituted an attack on the Ukrainian nation
  - Rudnytskyi's demographic reconstruction estimates 3.9 million excess deaths — concentrated in Ukraine, not dispersed across
    the USSR
  - Lemkin himself classified the Holodomor as Soviet genocide against the Ukrainian nation in 1953
  - The genocide debate among scholars concerns the standard of evidence for 'intent,' not the facts of mass death
  sources:
  - title: 'Red Famine: Stalin''s War on Ukraine'
    author: Anne Applebaum
    year: '2017'
    type: book
  - title: 'Bloodlands: Europe Between Hitler and Stalin'
    author: Timothy Snyder
    year: '2010'
    type: book
  - title: 'The Years of Hunger: Soviet Agriculture, 1931-1933'
    author: R.W. Davies and Stephen Wheatcroft
    year: '2004'
    type: book
  - title: 'The Harvest of Sorrow: Soviet Collectivization and the Terror-Famine'
    author: Robert Conquest
    year: '1986'
    type: book
  notable_quotes:
  - text: This is not simply a case of mass murder. It is a case of genocide, of destruction, not of individuals only, but
      of a culture and a nation.
    speaker: Raphael Lemkin
    context: Speech on the Soviet genocide against the Ukrainian nation, 1953
  - text: The famine was the result of the political decisions of the Stalinist leadership... The question is not whether
      it happened but whether it was intentional.
    speaker: Andrea Graziosi
    context: The Soviet 1931-1933 Famines and the Ukrainian Holodomor (2009)
  - text: We have survived the Holodomor. We will survive this.
    speaker: Volodymyr Zelensky
    context: Address to the Ukrainian people, 2022
  emphasized:
  - Ukraine-specific policies that had no equivalent in other Soviet republics
  - Archival evidence from Soviet-era documents unavailable before 1991
  - The 'Executed Renaissance' — the simultaneous destruction of Ukrainian cultural life
  - The Holodomor as a live political argument in the context of the Russia-Ukraine war
  omitted:
  - The broader Soviet famine affecting Kazakhstan (1.5 million dead — 38% of the population), the Volga, and Siberia
  - The complexity of Soviet economic planning and its internal debates
  - Peasants who initially supported or collaborated with collectivization
  - The role of local Ukrainian Communist Party officials in enforcing procurement quotas
