connections:
- target_slug: rwandan-genocide
  connection_type: parallel
  description: Both events involved state-directed mass killing, international bystander failure, and prolonged denial — the
    Soviet Union suppressed the Holodomor for 60 years; Rwanda exposed the limits of the post-Holocaust 'never again' consensus
- target_slug: fall-of-berlin-wall
  connection_type: influenced
  description: The Holodomor's legacy contributed to Ukrainian independence sentiment that accelerated Soviet dissolution
    — Ukraine's December 1991 independence referendum (92.3% yes) made the Soviet Union's survival impossible
- target_slug: armenian-genocide
  connection_type: parallel
  description: Raphael Lemkin cited both the Armenian Genocide and the Holodomor as foundational cases when developing the
    concept of genocide — the destruction of nations as distinct from the murder of individuals
