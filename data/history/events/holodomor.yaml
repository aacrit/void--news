  title: Walter Duranty's 'Russians Hungry, But Not Starving' — New York Times, March 31, 1933
  description: Duranty's New York Times article published two days after Gareth Jones's Berlin press conference. Duranty denied
    'actual starvation or deaths from starvation' while privately estimating 10 million dead to the British Embassy. The article
    is taught in journalism ethics courses as a case study in access-driven distortion.
