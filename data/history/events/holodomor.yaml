perspectives:
- viewpoint: Soviet State / Stalinist
  viewpoint_type: victor
  region_origin: europe
  narrative: 'The Soviet government''s position on the 1932-1933 famine operated on two levels: public denial and internal
    documentation. Publicly, the famine did not exist. No Soviet newspaper reported mass starvation. Foreign journalists based
    in Moscow — who depended on the Commissariat of Foreign Affairs for credentials, housing, and access — faced an implicit
    bargain: report what the government permitted, or lose your visa. Walter Duranty of the New York Times, the most prominent
    Western correspondent in Moscow, understood this calculus and operated within it. When Gareth Jones published his eyewitness
    dispatches in March 1933, the Soviet press bureau organized a collective rebuttal: Duranty, Louis Fischer of The Nation,
    and others signed or published statements disputing Jones''s account.


    Internally, the Soviet state generated comprehensive documentation. The OGPU (Unified State Political Administration —
    the secret police) filed daily situation reports from Ukrainian provinces that described starvation, mortality rates,
    cannibalism cases, and peasant resistance. These reports were distributed to Stalin, Molotov, and Kaganovich. A 1933 OGPU
    summary for Ukraine recorded 2,505 cases of cannibalism in the first half of the year alone. The reports attributed the
    famine to "kulak sabotage," "counter-revolutionary wrecking," and the failure of collective farm chairmen to meet production
    targets — never to the procurement quotas themselves.


    The ideological framework was consistent. Collectivization was a historical necessity — the transformation of backward,
    individually farmed agriculture into industrialized, collective production. Stalin''s November 1929 article "Year of the
    Great Turn" declared that the middle peasant had joined collectivization voluntarily and that the kulak class would be
    liquidated. Resistance was framed as class warfare: the kulaks were hoarding grain, sabotaging machinery, poisoning livestock,
    and organizing anti-Soviet conspiracies. The famine, to the extent it was acknowledged at all in internal communications,
    was attributed to these enemies — not to the quotas set in Moscow.


    The grain itself was the point. Soviet industrialization depended on grain exports. Between 1930 and 1933, the Soviet
    Union exported approximately 5.8 million tons of grain — even during the famine''s peak in the winter of 1932-1933, when
    1.8 million tons were shipped abroad. The foreign currency purchased industrial machinery from Germany, the United States,
    and Britain. Dneprostroi, Magnitogorsk, the Urals-Kuznetsk Combine — the showcase projects of the First Five-Year Plan
    — were financed by exported grain. Stalin''s calculus was stated plainly in private: if the peasants starved, the country
    would industrialize; if the country did not industrialize, it would be destroyed by external enemies within ten years.
    He told Churchill in 1942 that collectivization was "a terrible struggle" involving "ten millions" of kulaks, "the great
    bulk" of whom were "wiped out."


    The suppression held for five decades. The 1937 Soviet census, which would have revealed the demographic catastrophe,
    was classified and its organizers arrested; a new census in 1939 produced adjusted figures. When Robert Conquest published
    The Harvest of Sorrow in 1986 — the first comprehensive English-language account of the famine, drawing on emigre testimony,
    German intelligence reports, and demographic analysis — the Soviet government dismissed it as Cold War propaganda. Only
    under glasnost, beginning in 1987, did Soviet scholars and journalists begin to publish on the famine. The opening of
    Soviet archives after 1991 produced a flood of documentation that largely confirmed and deepened the accounts that Moscow
    had denied for 60 years.

    '
  key_arguments:
  - Collectivization was a historical necessity for industrialization and national survival
  - Famine resulted from kulak sabotage, poor weather, and local mismanagement — not central policy
  - Grain exports financed industrialization that saved the Soviet Union from destruction in World War II
  - The famine affected the entire Soviet Union, not Ukraine specifically — framing it as Ukrainian genocide is nationalist
    propaganda
  - The 1937 census suppression and 60 years of silence were state policy, not evidence of guilt per se
