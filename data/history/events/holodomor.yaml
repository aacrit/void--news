summary: 'On March 29, 1933, a 27-year-old Welsh journalist named Gareth Jones walked out of Berlin''s Tempelhof Airport,
  called a press conference, and stated that he had just returned from a walking tour of Soviet Ukraine where he had seen
  mass starvation. He had entered the Soviet Union using credentials from his previous role as foreign affairs adviser to
  David Lloyd George. He had left the official press train in Kharkov on March 10 and walked through Ukrainian villages for
  three days. He ate nothing but the black bread and a few frozen potatoes he carried. The peasants he met told him the same
  thing in village after village: there is no bread, the government took everything, people are dying.


  Two days later, Walter Duranty — the Moscow bureau chief of the New York Times, who had won the Pulitzer Prize in 1932 for
  his Soviet reporting — published a rebuttal headlined "Russians Hungry, But Not Starving." Duranty wrote that there was
  "no actual starvation or deaths from starvation" but rather "widespread mortality from diseases due to malnutrition." The
  distinction was a lie crafted to preserve Duranty''s access. In a private conversation with the British Embassy in Moscow,
  Duranty estimated the death toll at 10 million — a figure he never printed. Jones published his eyewitness accounts in the
  Manchester Guardian and the London Evening Standard. Within months, the Soviet Union banned Jones from re-entering the country.
  Maxim Litvinov, the Soviet Foreign Minister, told a British diplomat that Jones would never receive another visa. In August
  1935, Jones was murdered under unclear circumstances in Japanese-occupied Manchuria. He was 29 years old.


  The famine that Jones witnessed was not a natural disaster. It was the product of Soviet grain requisitioning policies imposed
  on Ukraine during forced collectivization. In 1929, Stalin ordered the liquidation of the kulaks — wealthier peasants —
  as a class. Collectivization in Ukraine meant the seizure of privately owned land, livestock, seed grain, and stored food.
  Peasants who resisted were classified as kulaks and deported to labor camps or executed; approximately 530,000 Ukrainians
  were "dekulakized" between 1930 and 1932. The grain procurement quotas set by Moscow for the 1932 harvest were 7.7 million
  tons — a figure Ukrainian officials told the Kremlin was impossible to meet given the reduced planting, the loss of draft
  animals (Ukraine''s horse population fell from 5.3 million in 1929 to 2.5 million by 1932), and the previous year''s poor
  harvest. The quotas were not reduced. They were enforced.


  On August 7, 1932, the Soviet Central Executive Committee passed the "Law of Spikelets" — formally "On the Protection of
  the Property of State Enterprises, Collective Farms and Cooperatives." The law imposed sentences of up to 10 years in labor
  camps — or death — for theft of collective farm property, including gleaning individual stalks of grain from harvested fields.
  By January 1933, over 100,000 people had been convicted under this law. Blacklisting — the placement of villages that failed
  to meet quotas on a "black board" — cut off all trade goods, including matches, kerosene, salt, and sugar. Roadblocks prevented
  peasants from leaving affected areas to search for food. On January 22, 1933, a joint directive signed by Stalin and Molotov
  ordered Ukrainian and North Caucasus authorities to prevent the mass flight of peasants, stating that the exodus was "organized
  by enemies of Soviet power."


  The dead were collected each morning on carts. In Kharkiv, the largest city in eastern Ukraine, bodies were gathered from
  the streets at dawn by sanitation brigades. In villages, entire families were found dead in their homes. Cannibalism was
  documented in OGPU (secret police) reports — over 2,500 cases were recorded in 1933 alone. The OGPU reports, declassified
  after 1991, described the famine with clinical precision while simultaneously attributing it to kulak sabotage.

  '
significance: 'The Soviet government suppressed all information about the famine until 1987, when glasnost allowed the first
  public discussions in Soviet media. The word "Holodomor" — from the Ukrainian "holod" (hunger) and "moryty" (to inflict
  death) — entered common usage in the 1980s. As of 2024, 34 countries and the European Parliament have recognized the Holodomor
  as a genocide. Russia maintains that it was a tragedy affecting the entire Soviet Union, not a targeted policy against Ukrainians.
  The Pulitzer Board has been petitioned repeatedly to revoke Duranty''s 1932 prize; in 2003 the board commissioned an independent
  review by Columbia University historian Mark von Hagen, who recommended revocation. The board declined, stating the prize
  was awarded for reporting "in a different period." Ukraine''s 2006 law classified the Holodomor as genocide against the
  Ukrainian people. The famine killed approximately 13% of Ukraine''s population; some oblasts (provinces) lost 20-25% of
  their inhabitants. Raphael Lemkin, who coined "genocide," included the Holodomor in a 1953 speech as an example of Soviet
  genocide against the Ukrainian nation.

  '
