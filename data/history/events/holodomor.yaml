- media_type: photograph
  title: Gareth Jones in the Soviet Union
  description: Gareth Jones during one of his visits to the Soviet Union. Jones walked through Ukrainian villages for three
    days in March 1933, documenting mass starvation. His dispatches were rebutted by Walter Duranty of the New York Times.
    Jones was banned from the Soviet Union and murdered in Manchuria in 1935 at age 29.
  source_url: https://commons.wikimedia.org/wiki/File:GaijonesFamine.jpg
