- viewpoint: Ukrainian Peasant / Survivor
  viewpoint_type: vanquished
  region_origin: europe
  narrative: 'Petro Mostovyi was seven years old in 1933, living in the village of Stavyshche in Kyiv Oblast. His father had
    been dekulakized in 1930 — the family''s cow, horse, and grain were confiscated, and his father was sent to a labor camp
    in Siberia. His mother fed the family on beet greens, bark soup, and dried acacia blossoms. Two of his siblings died.
    Mostovyi''s testimony, recorded by the U.S. Commission on the Ukraine Famine in 1986, describes the moment he understood
    what the word "famine" meant: walking past the church in Stavyshche and seeing bodies stacked outside the door, wrapped
    in rags, with no one to bury them. He counted eleven. He was seven.


    The survivor testimony, collected across three major oral history projects — the U.S. Commission on the Ukraine Famine
    (1986-1988, 200+ testimonies), the Ukrainian Canadian Research and Documentation Centre (1980s-2000s), and the Ukrainian
    Institute of National Remembrance (post-2005) — describes a sequence that was not random but engineered. First, the grain
    was taken. Not just the surplus — everything. Brigades of activists, often outsiders brought from Russian provinces or
    from urban party organizations, searched homes for hidden food. They probed walls, dug up floors, tested the temperature
    of stoves to find recently cooked food. A decree of December 6, 1932, placed 89 Ukrainian villages on the "blackboard"
    — a blacklist that cut off all trade goods. No salt, no matches, no kerosene, no sugar. Some villages were surrounded
    by roadblocks.


    Second, movement was stopped. The January 22, 1933 directive — signed by Stalin and Molotov — ordered the prevention of
    "mass exodus" from Ukraine and the North Caucasus. Internal passports, introduced in December 1932, were not issued to
    collective farm workers. Peasants who attempted to reach cities or cross into Russia were arrested at railway stations
    and checkpoints and returned to their villages. Survivors describe watching trains pass through stations at full speed,
    slowing only at designated stops where armed guards checked documents. The cities — Kharkiv, Kyiv, Odesa — had bread,
    though rationed. The villages did not.


    Third, people died in a specific order. The elderly first, then children under five, then men of working age, then women.
    Survivors describe a progression: first the family ate the seed grain, then the livestock feed, then boiled leather, bark,
    and roots. Then the pets. Then nothing. OGPU reports from Kharkiv, Poltava, and Vinnytsia oblasts document families found
    dead in their homes weeks after the last member expired. The bodies were bloated, a symptom of edema caused by protein
    deficiency. Children developed distended abdomens and translucent skin. Survivors describe older children sitting motionless
    in the streets, unable to stand, too weak to cry.


    The silence after the famine was enforced. Speaking about what happened was dangerous — it could be construed as anti-Soviet
    agitation. The word "famine" was not used in official Soviet discourse. Teachers did not teach it. Parents did not discuss
    it. The demographic gap — 3.9 million excess deaths according to the most cited scholarly estimate (Rudnytskyi et al.,
    2015, based on reconstructed demographic data) — was buried in census falsification. Survivors who emigrated to the West,
    particularly to Canada, began speaking publicly in the 1970s and 1980s, but their testimony was often dismissed as Cold
    War propaganda. The U.S. Commission on the Ukraine Famine, established by Congress in 1986, produced a report in 1988
    that collected testimony and concluded the famine was "man-made" and that "Joseph Stalin and those around him committed
    genocide against the Ukrainians."


    The memory was personal before it was political. Survivors did not initially use the word "genocide" — they said "holod"
    (hunger) and "smert" (death). They described specific losses: the sister who died in February, the neighbor whose children
    were found dead in March, the uncle who was shot for hiding a bag of grain. The Holodomor became a national narrative
    in independent Ukraine after 1991, but for survivors, it was always a family story first.

    '
  key_arguments:
  - 'The famine was engineered: grain confiscation, blacklisting, and border closures were deliberate policy choices'
  - Internal passports were withheld from peasants — they were trapped in the killing zone
  - 'Survivors describe a systematic sequence: confiscation, isolation, starvation, silence'
  - The demographic evidence shows 3.9 million excess deaths in Ukraine — not dispersed across the Soviet Union but concentrated
  - 50 years of enforced silence compounded the trauma — survivors could not speak, mourn publicly, or bury their dead with
    dignity
