  description: Starving Ukrainian peasants photographed in Kharkiv, 1933. Photographs were taken secretly by Austrian engineer
    Alexander Wienerberger, who smuggled them out of the Soviet Union. His images are among the only photographic documentation
    of the famine, as Soviet authorities confiscated cameras and prohibited photography of famine conditions.
