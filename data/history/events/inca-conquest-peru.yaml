- viewpoint: Spanish Conquistador
  viewpoint_type: victor
  region_origin: europe
  narrative: 'Francisco Pizarro was illiterate. Born in Trujillo, Extremadura, he was the illegitimate son of a minor
    nobleman and never learned to read or write — his cousin Pedro Pizarro and his secretary Francisco de Xerez wrote the
    accounts attributed to him. He had spent 20 years in the Caribbean and Panama before launching three expeditions down the
    Pacific coast of South America. The first two failed. On the third, in 1531, he landed at Tumbes with 168 men, 62 horses,
    and four cannons. He was 53 years old.


    The requerimiento — the document Friar Valverde read to Atahualpa at Cajamarca — was a legal instrument developed in 1513
    by the jurist Juan Lopez de Palacios Rubios. It informed indigenous peoples that the Pope had granted their lands to Spain,
    that they must accept Christian sovereignty, and that refusal constituted a legal basis for war. The text was read in Spanish
    to audiences who did not speak Spanish, through interpreters who often could not translate its theological content. The
    legal fiction was the point: compliance created vassals; refusal created enemies. Pizarro had used the requerimiento at
    Cajamarca with full knowledge that Atahualpa could not understand it. When Atahualpa threw the Bible to the ground, Valverde
    gave the signal.


    Pedro Pizarro, Francisco''s cousin and a participant in the conquest, described the attack at Cajamarca in detail. The
    Spanish emerged from three buildings on three sides of the plaza. The falconet cannon fired into the massed Inca retinue.
    The cavalry charged. The Inca, who had never seen horses, initially believed horse and rider were a single creature. The
    panic lasted less than an hour. The Spanish killed between 6,000 and 7,000 Inca in the plaza and surrounding streets.
    Pizarro himself seized Atahualpa, receiving the only Spanish wound of the engagement — a cut on his hand from one of his
    own soldiers'' swords.


    The conquistadors divided the ransom among themselves according to rank. A cavalry soldier received twice the share of an
    infantry soldier. Pizarro kept the largest share. The Crown received its royal fifth — the quinto real. The total value
    of the ransom has been estimated at $100 million in modern terms. The execution of Atahualpa — after the ransom was paid
    in full — was justified by a trial conducted under Spanish law. The charges included idolatry, polygamy, and conspiracy
    against the Spanish Crown. Atahualpa accepted baptism moments before his death, taking the name Juan. The garrote replaced
    the stake — a mercy reserved for the baptized.

    '
  key_arguments:
  - The requerimiento provided legal and theological justification for conquest under papal authority
  - Pizarro's tactical brilliance at Cajamarca — 168 men defeating an army of 80,000 — was a military masterstroke
  - Atahualpa's execution followed due process under Spanish law after a formal trial
  - The conquest brought Christianity and European civilization to peoples living under pagan tyranny
  sources:
