slug: inca-conquest-peru
title: The Inca Empire and the Spanish Conquest
subtitle: 168 men. 80,000 troops. Pizarro took their emperor hostage, accepted a room full of gold, then executed him anyway.
date_display: 1438-1572
date_sort: 1532
date_precision: year
era: early-modern
region: americas
country: Peru
category: political
severity: catastrophic
death_toll: Population of Tawantinsuyu fell from 12 million to 1 million within a century — primarily from smallpox, measles,
  and typhus that arrived before the first Spanish soldier set foot in the highlands
affected_population: 12 million people across 4,000 km of the Andes, from southern Colombia to central Chile
duration: 134 years — from Pachacuti's expansion of the Inca state (1438) through the Spanish execution of Tupac Amaru I at
  Cusco (1572)
summary: 'Smallpox reached Tawantinsuyu in 1527, two years before Francisco Pizarro. It killed Emperor Huayna Capac and his
  designated heir Ninan Cuyochi within months of each other, triggering a civil war between two surviving sons — Atahualpa in
  Quito and Huascar in Cusco — that split the empire''s 12 million people along geographic and factional lines. By the time
  Atahualpa won, his army had killed 40,000 of Huascar''s supporters and his empire was fractured. Pizarro arrived with 168 men
  into the wreckage.


  On November 16, 1532, Atahualpa entered the plaza at Cajamarca with 80,000 troops. He carried no weapons. The Spanish were
  hidden in the surrounding buildings. Friar Vicente de Valverde walked out holding a Bible and a cross, and through an interpreter
  read the requerimiento — a legal document, composed in Spanish, informing the Inca emperor that Pope Alexander VI had granted
  all of the Americas to Spain and that Atahualpa must accept Christianity and Spanish sovereignty or face war. Atahualpa examined
  the Bible, held it to his ear, and threw it to the ground. Valverde shouted to Pizarro. The cannons fired. Cavalry charged from
  three sides into an unarmed crowd. In less than an hour, 6,000 to 7,000 Inca were dead. Not a single Spaniard was killed.
  Atahualpa was dragged from his litter, alive.


  Pizarro offered a deal: fill a room 6.7 meters long, 5.2 meters wide, and 2.7 meters high with gold, and two more rooms with
  silver, and Atahualpa would go free. The Inca complied. Over eight months, llama caravans carried gold objects from temples
  across the empire to Cajamarca — 6,000 kilograms of gold and 12,000 kilograms of silver. Pizarro melted every piece into bars.
  Artifacts representing centuries of Andean metalwork — ritual vessels, temple ornaments, the golden garden of Coricancha
  with its life-size gold corn stalks and gold llamas — were reduced to bullion. Then Pizarro charged Atahualpa with treason,
  idolatry, and polygamy, and executed him by garrote on July 26, 1533. The date remains a day of mourning in Cusco.


  The empire Pizarro dismantled had been built in less than a century. Pachacuti, the ninth Sapa Inca, transformed a regional
  kingdom around Cusco into Tawantinsuyu — "The Four Quarters Together" — between 1438 and 1471. His engineers built 40,000
  kilometers of roads through the Andes without the wheel, the horse, or iron tools. Chasqui runners relayed messages across
  relay stations from Quito to Cusco — 2,000 kilometers — in five to seven days. The quipu, a system of knotted strings, recorded
  census data, tax obligations, and possibly narratives across an empire that had no written script. The mit''a labor system
  drafted one-seventh of the male population for state projects — roads, terraces, storehouses, temples — in a reciprocal
  arrangement where the state fed, clothed, and supplied chicha beer to workers. The storehouses held enough food to feed the
  empire for seven years.


  Resistance did not end at Cajamarca. Manco Inca, installed by Pizarro as a puppet ruler in 1533, escaped Spanish control in
  1536 and besieged Cusco with 100,000 warriors. The siege lasted ten months. Manco''s forces adapted to Spanish cavalry, using
  slings to hurl red-hot stones onto thatched roofs, and captured Spanish horses — learning to ride them within weeks. The siege
  failed only when Manco''s agricultural army had to return home for planting season. Manco retreated to Vilcabamba, where a
  rump Inca state survived for 36 years. Tupac Amaru I, the last Sapa Inca, was captured in 1572 and beheaded in Cusco''s main
  plaza before 15,000 forced spectators. The Augustinian friar who witnessed the execution wrote that the crowd''s wailing
  "rose to the skies."


  The name Tupac Amaru was taken up again in 1780, when Jose Gabriel Condorcanqui — a descendant of Inca royalty — led the
  largest indigenous rebellion in colonial Latin America. Two centuries later, Peru''s Movimiento Revolucionario Tupac Amaru
  (MRTA) adopted the name again. The potato, domesticated in the Andes 8,000 years ago and cultivated by Inca farmers in over
  3,000 varieties, now feeds 1.3 billion people worldwide.

  '
significance: 'The Spanish conquest of Tawantinsuyu redirected the global economy. The silver mines of Potosi, in present-day
  Bolivia, became the largest source of silver in the world by the 1570s. At its peak, Potosi''s population reached 160,000 —
  larger than London — and its silver funded the Spanish Habsburg wars in Europe, flowed through Manila to China''s monetary
  system, and underwrote the transatlantic slave trade. The mit''a labor system that had built Inca roads was repurposed by
  the Spanish viceroyalty to draft indigenous workers into the mines, where mercury amalgamation poisoned thousands annually.
  The demographic collapse — from 12 million to 1 million — was not merely the death toll of conquest but the erasure of an
  agricultural knowledge system that had sustained terraced farming across the world''s second-highest mountain range. Abandoned
  terraces still scar the Andean landscape. The quipu record system, never fully deciphered, represents a lost form of
  information technology. Ten million people still speak Quechua today, making it the most widely spoken indigenous language
  in the Americas. The Inti Raymi festival, banned by the Spanish in 1572, was revived in Cusco in 1944 and now draws 50,000
  annual visitors.

  '
