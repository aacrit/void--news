  connection_type: parallel
  description: Pizarro modeled his conquest on Cortes's playbook — capture the emperor, exploit internal divisions, ally with
    disaffected subject peoples — eleven years later and 4,000 km south
- target_slug: bolivarian-revolutions
  connection_type: consequence
  description: Three centuries of colonial extraction from Potosi and the viceroyalty system created the conditions that Bolivar,
    San Martin, and Sucre fought to overthrow in the 1820s
- target_slug: transatlantic-slave-trade
  connection_type: caused
  description: Potosi silver funded the Atlantic trade system — the mines consumed indigenous labor, the silver flowed to
    Seville, and the colonial economy's insatiable demand for workers drove the importation of enslaved Africans
