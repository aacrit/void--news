perspectives:
- viewpoint: Inca Imperial / Quipu Record
  viewpoint_type: vanquished
  region_origin: americas
  narrative: 'Tawantinsuyu administered 12 million people across four suyus — Chinchaysuyu (north), Antisuyu (east), Collasuyu
    (south), Cuntisuyu (west) — from a capital at Cusco that the Inca called the "navel of the world." The quipu system —
    knotted strings in base-10 encoding, operated by trained khipukamayuq record-keepers — tracked census data, tribute
    obligations, and astronomical observations across 40,000 kilometers of road. When the Spanish priest Jose de Acosta asked
    a khipukamayuq to demonstrate the system in the 1580s, the record-keeper reproduced from his quipus a complete confession
    of sins going back decades.


    Atahualpa''s decision at Cajamarca was not naivety. He had just won a civil war. His generals had defeated Huascar''s
    armies across thousands of kilometers of mountain terrain. He had 80,000 troops surrounding a plaza containing 168 foreigners.
    The Inca had never encountered cavalry or firearms, but Atahualpa had received intelligence reports about the Spanish from
    coastal peoples who had traded with them. He chose to meet them unarmed as a demonstration of power — the Sapa Inca did
    not carry weapons before inferiors. The cultural grammar of Andean diplomacy required the superior party to arrive in
    ceremonial display, not battle formation. Pizarro exploited a protocol that had governed Andean statecraft for a century.


    The ransom room at Cajamarca represented the systematic looting of sacred architecture across Tawantinsuyu. Gold in Inca
    cosmology was "the sweat of the sun" — inti, the solar deity, given physical form. Silver was "the tears of the moon."
    The Coricancha temple in Cusco had walls lined with 700 gold sheets, each weighing 2 kilograms. The garden outside contained
    life-size replicas of corn, llamas, and human figures, all in gold. Every piece was melted. The Inca had no concept of
    gold as currency. The metal had spiritual and aesthetic value. Pizarro''s men measured it by weight.


    Manco Inca''s 1536 siege of Cusco — the largest military action of the conquest — demonstrated that the Inca military
    system was capable of sustained resistance. Manco coordinated 100,000 troops across multiple fronts, captured the fortress
    of Sacsayhuaman (which the Spanish held with 50 men), and held the siege for ten months. Inca commanders adapted to Spanish
    tactics within weeks: they flooded fields to immobilize cavalry, used captured Spanish weapons, and fought at night when
    firearms were least effective. The siege broke not because of military defeat but because the mit''a system required
    soldiers to return home for planting season. An agricultural empire could not sustain a year-round siege.

    '
  key_arguments:
  - Atahualpa's decision at Cajamarca followed Andean diplomatic protocol — meeting inferiors unarmed was a display of power,
    not a miscalculation
  - The Inca military system adapted rapidly to Spanish technology and sustained 40 years of resistance
  - The ransom room represented the desecration of sacred cosmological objects, not the payment of a financial debt
  - Tawantinsuyu's administrative achievement — roads, quipus, storehouses — matched or exceeded contemporary European states
