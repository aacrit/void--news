- viewpoint: British Colonial
  viewpoint_type: vanquished
  region_origin: europe
  narrative: 'The British narrative of Indian governance begins with the premise of improvement. When the East India Company
    was dissolved and the Crown assumed direct rule in 1858, India had no national railway, no unified legal code, no standardized
    postal system, and a literacy rate below 5%. By 1947, India had 40,000 miles of railway — the fourth largest network in
    the world — a functioning judiciary based on English common law, 23 universities, and a civil service that administered
    400 million people across a subcontinent of 250 languages.


    The reform narrative proceeds in stages. The Indian Councils Act of 1861, the Morley-Minto Reforms of 1909, the Montagu-Chelmsford
    Reforms of 1919, the Government of India Act of 1935 — each expanded Indian participation in governance. The 1935 Act
    created elected provincial governments with Indian ministers controlling education, health, and agriculture. The British
    argument was that India was being prepared for self-governance through institutional development, not being denied it.


    Jallianwala Bagh was the crack. Even in Britain, Dyer''s action divided opinion. The Hunter Commission censured him. Churchill
    — no opponent of empire — called the massacre "monstrous" in Parliament. The House of Lords, however, voted in Dyer''s
    favor, and the Morning Post newspaper raised a fund of £26,000 for him (approximately £1.4 million in 2025 values). The
    episode exposed what the reform narrative could not accommodate: the empire ultimately rested on force, and when that
    force was applied crudely, the moral architecture collapsed.


    World War II ended the question. India contributed 2.5 million troops, the largest volunteer force in history. Indian
    industry supplied materiel. Indian taxes funded the war effort. By 1945, Britain owed India £1.3 billion in sterling balances
    — debts accumulated because India supplied more to Britain than Britain could pay for. The post-war Labour government,
    facing domestic austerity and a depleted military, concluded that holding India was both unaffordable and unjustifiable.
    Attlee dispatched the Cabinet Mission in 1946 and Mountbatten in 1947. The withdrawal was presented as the fulfillment
    of a promise, not a retreat.


    The British departure narrative elides several facts. The Bengal Famine of 1943 killed approximately 3 million people
    while rice was exported from Bengal and food supplies were redirected to military stockpiles. Churchill''s War Cabinet
    rejected famine relief proposals. Secretary of State for India Leo Amery wrote in his diary that Churchill''s attitude
    toward Indians was "not far short of Hitler''s." The famine is absent from most British accounts of the war; it is central
    to most Indian ones.

    '
  key_arguments:
  - British rule built institutions — railways, judiciary, civil service — that India inherited and still uses
  - Constitutional reforms progressively expanded Indian self-governance over 80 years
  - Withdrawal was a planned transfer of power, not a collapse or a defeat
  - India's contribution to World War II was made possible by British-built infrastructure
