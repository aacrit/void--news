- viewpoint: Revolutionary / Armed Resistance
  viewpoint_type: revisionist
  region_origin: south-asia
  narrative: 'Lala Lajpat Rai died on November 17, 1928, from injuries sustained during a police lathi charge in Lahore. He
    was 63 and had been protesting the Simon Commission — an all-British body sent to evaluate Indian constitutional progress
    without a single Indian member. Bhagat Singh, Rajguru, and Sukhdev swore to avenge him. On December 17, 1928, they shot
    and killed John Saunders, a British police officer they mistook for the superintendent who had ordered the charge on Lajpat
    Rai. Singh was 21.


    The revolutionary tradition did not begin with Bhagat Singh. It ran through the Anushilan Samiti and Jugantar groups in
    Bengal from the 1900s, the Ghadar Party formed by Punjabi immigrants in San Francisco in 1913, Surya Sen''s Chittagong
    Armoury Raid of 1930, and Khudiram Bose — hanged at 18 in 1908 for throwing a bomb at a British magistrate''s carriage.
    Women fought in the armed struggle too. Pritilata Waddedar, 21, led the September 1932 attack on the Pahartali European
    Club in Chittagong as part of Surya Sen''s network; she swallowed cyanide rather than be captured. Bina Das fired a pistol
    at the Governor of Bengal at a convocation ceremony in February 1932; she missed, was sentenced to nine years, and served
    them. The revolutionaries argued that nonviolence was a luxury afforded by those who could wait. The colonial state was maintained
    by violence — police, army, jails, hangings — and could only be answered by violence.


    Bhagat Singh''s trial became his platform. He used the courtroom to deliver political speeches, went on hunger strikes
    that lasted 116 days, and wrote extensively on Marxism and revolution. His pamphlet "Why I Am an Atheist" (1930) distinguished
    him from both the religiously inflected nationalism of Gandhi and the communalism of the Hindu Mahasabha. Singh was a
    socialist internationalist who saw Indian independence as part of a global class struggle. He was hanged on March 23,
    1931 — while Gandhi was negotiating with Irwin in Delhi. Congress made no serious effort to commute his sentence.


    Subhas Chandra Bose escalated the stakes. Twice elected Congress president (1938, 1939), he was forced out after clashing
    with Gandhi over the pace and method of the independence struggle. He escaped British house arrest in Calcutta in January
    1941, reached Berlin via Kabul and Moscow, and eventually traveled by submarine to Japanese-occupied Southeast Asia. There
    he took command of the Indian National Army — 43,000 soldiers recruited from Indian prisoners of war — and launched an
    invasion of northeast India in March 1944. The INA''s Imphal campaign failed militarily, but its political impact was
    immense. When the British put INA officers on trial at the Red Fort in November 1945, the defense committee included Nehru
    himself. The trials provoked mass demonstrations and, in February 1946, a mutiny by 20,000 sailors of the Royal Indian
    Navy that spread to 78 ships across Indian ports.


    The revisionist argument is not that nonviolence was useless but that it was insufficient. The British left not because
    of moral persuasion but because the costs of staying — military unreliability, administrative collapse, economic exhaustion
    after World War II — exceeded the benefits. Armed resistance and the threat of insurrection were part of that cost calculation.
    Gandhi provided the moral narrative. The revolutionaries provided the fear.

    '
  key_arguments:
  - Nonviolence alone did not end British rule — the threat of armed insurrection raised the cost of occupation
  - Bhagat Singh's socialism offered a class-based alternative to Gandhi's caste-conservative nationalism
  - Bose's INA and the 1946 Naval Mutiny demonstrated that Britain could no longer rely on Indian military loyalty
  - Congress leadership marginalized revolutionaries who made independence possible
