perspectives:
- viewpoint: Gandhian / Indian National Congress
  viewpoint_type: victor
  region_origin: south-asia
  narrative: 'Gandhi returned from South Africa in January 1915 carrying a method. He had spent 21 years developing satyagraha
    — "truth-force" — in campaigns against discriminatory laws targeting Indian migrants in the Transvaal and Natal. The method
    was simple in theory: refuse to comply with unjust laws, accept the punishment, and let the disproportion between peaceful
    resistance and state violence expose the moral bankruptcy of the system. In practice, it required a discipline that Gandhi
    enforced with the threat of his own fasting body.


    The Non-Cooperation movement of 1920-22 was the first mass test. Gandhi asked Indians to surrender British titles, boycott
    courts and legislatures, pull children from government schools, and spin their own cloth instead of buying British textiles.
    The response was staggering — millions participated across regions, castes, and classes. The Khilafat alliance brought
    Muslims into the movement alongside Hindus, a unity that would not recur. When a mob at Chauri Chaura burned 22 policemen
    alive on February 5, 1922, Gandhi called off the movement overnight. Nehru, in prison, wrote that the decision was "a
    great shock." Subhas Bose called it "the Himalayan blunder." Gandhi believed that nonviolent discipline was the movement
    itself — not a tactic but a civilization.


    The Salt March of 1930 demonstrated the method at its most devastating. The British salt tax was regressive — it fell
    hardest on the poorest Indians — but it was also symbolic. The colonial state claimed a monopoly on salt, the most basic
    commodity. Gandhi walked 240 miles over 24 days, giving speeches at every village. By the time he reached Dandi, the march
    had become a global media event. The 78 marchers to Dandi were all men — Gandhi chose them — but the civil disobedience
    campaigns that followed were not. Kamladevi Chattopadhyay led salt raids on Wadala in Bombay, was arrested on April 17,
    1930, and became the first woman political prisoner of the salt satyagraha. The subsequent raid on the Dharasana Salt Works
    on May 21, led by Sarojini Naidu after Gandhi''s arrest, sent 2,500 unarmed volunteers into police clubs; Webb Miller''s
    wire dispatch ran in 1,350 newspapers and damaged British prestige beyond recovery. Naidu, who had served as Congress
    president in 1925 — the first Indian woman to hold the office — was arrested at Dharasana and spent months in prison.
    Viceroy Lord Irwin was forced to negotiate: the Gandhi-Irwin Pact of March 1931 released political prisoners and allowed
    Indians to make salt.


    Quit India, launched on August 8, 1942, was Gandhi''s final mass movement and his most radical. "Do or Die" — the slogan
    reduced the demand to its essence. The British responded with the largest mass arrests in Indian colonial history. Over
    100,000 were detained. The entire Congress Working Committee was imprisoned within hours of the resolution. Aruna Asaf
    Ali, 31, hoisted the Congress flag at Gowalia Tank on August 9 when the senior leadership was already in jail. She went
    underground and evaded British capture for four years, editing the clandestine Congress bulletin Inquilab while carrying
    a price of 5,000 rupees on her head. Leaderless above ground, the movement turned spontaneous and violent in ways Gandhi
    had not intended — railway stations were burned, telegraph lines cut, parallel governments briefly established in Satara
    and Midnapore. In Midnapore, Matangini Hazra, a 73-year-old widow, led a procession of 6,000 toward the local police
    station on September 29, 1942; she was shot three times and died holding the Congress flag. British suppression was severe:
    official figures recorded 1,060 killed by police and military fire, though Indian estimates reach 10,000.


    The Congress narrative holds that Indian independence was won through moral authority, not military force. The British
    did not leave because they were defeated in battle — they left because they could no longer govern. The Indian Civil Service
    was Indian in all but name by 1946. The armed forces were unreliable after the INA trials. The post-war British economy
    could not sustain an empire. Gandhi and Congress did not defeat Britain. They made Britain''s position untenable.

    '
  key_arguments:
  - Nonviolent resistance was a disciplined strategy that delegitimized colonial rule
  - Mass civil disobedience — Salt March, Quit India — made British governance impossible
  - The movement built unity across caste, class, and region on an unprecedented scale
  - Independence was won through moral authority, not military victory
