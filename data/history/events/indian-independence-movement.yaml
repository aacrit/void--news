duration: 90 years (1857 Revolt to August 15, 1947)
summary: 'On April 13, 1919, Brigadier General Reginald Dyer marched fifty soldiers into an enclosed garden in Amritsar where
  15,000-20,000 unarmed civilians had gathered. Without warning, Dyer ordered his troops to fire. They kept firing for ten
  minutes, expending 1,650 rounds. The official British inquiry counted 379 dead and 1,200 wounded. Indian estimates exceeded
  1,000 killed. Dyer later told the Hunter Commission he intended to produce "a sufficient moral effect" on the Punjab. The
  walls of Jallianwala Bagh still carry the bullet holes.


  Rabindranath Tagore returned his knighthood. Gandhi, who had recruited Indian soldiers for Britain in World War I, abandoned
  cooperation entirely. In 1920, he launched Non-Cooperation — urging Indians to boycott British courts, schools, textiles,
  and titles. Millions complied. Lawyers gave up practices. Students left government colleges. The value of imported British
  cloth dropped by half. When violence erupted at Chauri Chaura in February 1922 — a mob burned 22 policemen alive — Gandhi
  halted the entire movement. The decision baffled his allies and enraged the revolutionaries. He was arrested anyway.


  The Salt March began on March 12, 1930. Gandhi walked 240 miles from Sabarmati Ashram to the coastal village of Dandi with
  78 followers. By the time he reached the sea on April 6 and picked up a lump of natural salt — breaking the British salt
  tax that made it illegal for Indians to produce or sell their own salt — the march had swelled to thousands. Within weeks,
  60,000 Indians were arrested for making or selling salt. At the Dharasana Salt Works on May 21, 2,500 volunteers walked
  into police clubs without raising their hands. Webb Miller of United Press International filed a dispatch that ran in 1,350
  newspapers: "Not one of the marchers even raised an arm to fend off the blows."


  The revolutionaries operated on a parallel track. Bhagat Singh, 23, threw a bomb into the Central Legislative Assembly on
  April 8, 1929 — designed to make noise, not kill — and showered leaflets reading "It takes a loud voice to make the deaf
  hear." He was hanged on March 23, 1931, with Rajguru and Sukhdev. His trial and execution made him a national icon; tens
  of thousands attended his funeral procession. Subhas Chandra Bose, twice elected Congress president, broke with Gandhi in
  1939 and escaped British surveillance to reach Berlin and then Tokyo. He raised the Indian National Army from 45,000 Indian
  prisoners of war held by the Japanese and invaded northeast India in 1944. The INA''s military campaign failed, but the
  subsequent Red Fort trials — where the British prosecuted INA officers — triggered a wave of sympathy across India and mutinies
  in the Royal Indian Navy in February 1946.


  World War II broke Britain''s capacity to hold India. India contributed 2.5 million soldiers — the largest volunteer army
  in history — but received no political concessions. The Bengal Famine of 1943 killed an estimated 3 million people while
  Churchill diverted food supplies to European stockpiles; when informed of the famine, Churchill asked why Gandhi had not
  yet died. The Quit India movement of August 1942 produced the largest mass arrests in Indian history — over 100,000 detained,
  including the entire Congress leadership — but also demonstrated that Britain could not govern India without Indian consent.
  By 1946, the British Indian Army and Navy were unreliable, the Indian Civil Service was depleted, and Attlee''s Labour government
  concluded that withdrawal was inevitable. On August 15, 1947, India became independent. The cost of the transition was Partition.

  '
significance: 'The Indian independence movement ended direct British rule over 390 million people and triggered the collapse
  of the world''s largest empire. Within 20 years of Indian independence, Britain had withdrawn from nearly all of its African
  and Asian possessions. Gandhi''s methods — noncooperation, civil disobedience, the strategic use of suffering — were adopted
  by Martin Luther King Jr. in Montgomery, by Mandela''s ANC before 1961, by Solidarity in Poland, and by pro-democracy movements
  from the Philippines to Ukraine. The Salt March remains the most widely cited example of nonviolent resistance in human
  history. At the same time, the movement''s unresolved tensions — between nonviolence and armed resistance, between secular
  nationalism and religious identity, between caste reform and independence — shaped India''s post-independence politics and
  the catastrophe of Partition.

  '
