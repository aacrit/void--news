connections:
- target_slug: partition-of-india
  connection_type: caused
  description: The independence movement's unresolved tensions — between Congress and Muslim League, between secular nationalism
    and religious identity — produced the catastrophe of Partition
- target_slug: civil-rights-movement
  connection_type: influenced
  description: Gandhi's methods traveled directly to the American South — King visited India in 1959 and adopted nonviolent
    resistance as the movement's core strategy
- target_slug: opium-wars
  connection_type: parallel
  description: Both movements challenged the same empire — Britain's commercial exploitation of Asia, from forced opium trade
    in China to de-industrialization of Indian textiles
- target_slug: haitian-revolution
  connection_type: parallel
  description: Both were colonial liberation movements that forced imperial powers to confront the contradiction between Enlightenment
    principles and racial subjugation
