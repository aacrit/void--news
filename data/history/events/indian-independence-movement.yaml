- viewpoint: Dalit / Ambedkarite
  viewpoint_type: indigenous
  region_origin: south-asia
  narrative: 'B.R. Ambedkar was born into the Mahar caste — designated "untouchable" — in 1891. As a child, he was forced
    to sit on a gunny sack outside the classroom. A school peon poured water into his mouth because he could not touch the
    communal tap. He earned doctorates from Columbia University and the London School of Economics, was called to the bar
    at Gray''s Inn, and returned to India to lead a constituency of 60 million people whom the independence movement claimed
    to represent but largely ignored.


    Ambedkar''s challenge to Gandhi was foundational. At the Round Table Conferences in London (1930-32), Ambedkar demanded
    separate electorates for Dalits — dedicated political constituencies where only Dalits could vote for Dalit candidates.
    Gandhi, fasting unto death in Yerwada Jail, forced Ambedkar to accept the Poona Pact of September 1932: reserved seats
    within the general electorate rather than separate electorates. Ambedkar conceded to save Gandhi''s life, but he never
    forgave the coercion. He later wrote: "Gandhi wanted to be the liberator of the Untouchables. He did not want anyone else
    to be their liberator."


    The Ambedkarite critique of the independence movement is specific: independence from Britain would not end caste oppression.
    Caste was older, deeper, and more pervasive than colonialism. An independent India governed by upper-caste Hindus — which
    is what Congress leadership was — would replace white rulers with Brahmin rulers. The village that Gandhi romanticized
    as the "republic" of Indian civilization was, for Dalits, a site of hereditary bondage, forced labor, and ritual humiliation.
    Ambedkar called the Indian village "a sink of localism, a den of ignorance, narrow-mindedness and communalism."


    Ambedkar chaired the Constitution Drafting Committee and used the position to embed protections: abolition of untouchability
    (Article 17), reservations in education and government employment (Articles 15 and 16), and the directive principles of
    state policy. The constitution was adopted on January 26, 1950. In October 1956, six weeks before his death, Ambedkar
    converted to Buddhism along with 600,000 followers at Deekshabhoomi in Nagpur — the largest mass religious conversion
    in recorded history. It was a final repudiation: caste was not reformable within Hinduism. The only exit was exit.


    The Dalit perspective holds that the independence movement was a transfer of power between elites — from British administrators
    to upper-caste Indian nationalists — that left 60 million Dalits with constitutional protections on paper and continued
    oppression in practice. Manual scavenging — the cleaning of dry latrines by hand — was not officially outlawed until 1993
    and continues today. Inter-caste marriage rates remain below 5% in most Indian states. Ambedkar''s question endures: independence
    for whom?

    '
  key_arguments:
  - Caste oppression was older and deeper than colonialism — independence did not end it
  - Gandhi's intervention at the Poona Pact denied Dalits independent political power
  - The independence movement was a transfer of power between elites, not a liberation of all Indians
  - Constitutional protections were necessary but insufficient against structural caste discrimination
