- viewpoint: Environmental / Fossil Capital
  viewpoint_type: revisionist
  region_origin: global
  narrative: 'In 1784, a Boulton & Watt rotary steam engine began driving machinery in a cotton mill. It burned coal — carbon
    that had been buried underground for 300 million years, compressed from the forests of the Carboniferous period. Each ton
    of coal burned released approximately 2.86 tons of carbon dioxide into the atmosphere. The CO2 did not disperse. It
    accumulated. Ice core samples from Antarctica show atmospheric CO2 concentrations holding steady between 260 and 280 parts
    per million for 10,000 years before 1800. By 1900, the concentration had risen to 296 ppm. By 2024, it had reached 421
    ppm. The carbon released by Lancashire cotton mills in the 1780s is still warming the planet.


    Andreas Malm, in Fossil Capital (2016), asked why British manufacturers switched from water power to steam. The answer was
    not efficiency. Water wheels in the 1820s and 1830s were at least as efficient as steam engines — in many applications,
    more so. The Catrine Cotton Works in Ayrshire ran on a water wheel that produced 120 horsepower; comparable steam engines
    produced less power at higher cost. The rivers of Lancashire, Yorkshire, and Derbyshire provided abundant, free energy.
    And yet, between 1820 and 1850, steam replaced water in factory after factory.


    Malm''s explanation was social, not technical. Water power was geographically fixed — a mill had to be built where the river
    was, often in rural valleys far from population centers. Workers in these isolated mill villages could not be easily replaced.
    They developed bargaining power. They formed communities. They organized. Steam power was mobile. A steam-powered mill
    could be built in Manchester, where thousands of desperate migrants from enclosed villages competed for work. Steam did not
    liberate manufacturers from nature. It liberated them from workers who could negotiate. "The transition from water to steam,"
    Malm wrote, "was a transition in the social relations of production disguised as a transition in energy technology."


    Jason Moore, in Capitalism in the Web of Life (2015), extended the analysis. The Industrial Revolution did not simply
    use nature as a resource. It reorganized nature into what Moore called "Cheap Nature" — cheap food, cheap energy, cheap
    raw materials, cheap labor — each extracted from frontier zones. British coal was cheap because miners worked twelve-hour
    shifts underground in conditions that killed them young. American cotton was cheap because enslaved people picked it. The
    factory system externalized its costs onto bodies and ecosystems that did not appear on any balance sheet.


    The consequences are cumulative. The Intergovernmental Panel on Climate Change''s Sixth Assessment Report (2021) estimates
    that human activities have caused approximately 1.1 degrees Celsius of global warming above pre-industrial levels. The
    phrase "pre-industrial" in climate science means "before approximately 1750" — before the Newcomen engines, before the
    Boulton & Watt rotary engine, before the cotton mills of Lancashire began burning coal. The Industrial Revolution is not
    a historical period. It is an ongoing atmospheric event. The 280 ppm of 1750 and the 421 ppm of 2024 are connected by
    an unbroken chain of combustion that began with a steam engine in a coal mine in Staffordshire.

    '
  key_arguments:
  - The shift from water to steam was driven by capitalists' need for mobile, replaceable labor, not by superior efficiency
  - CO2 from 1780s coal burning remains in the atmosphere — the Industrial Revolution is an ongoing atmospheric event
  - '"Cheap Nature" — cheap food, energy, materials, labor — was extracted from frontier zones and externalized onto bodies
    and ecosystems'
  - '"Pre-industrial" in climate science means before 1750 — the revolution defines the baseline against which global warming
    is measured'
  sources:
  - title: 'Fossil Capital: The Rise of Steam Power and the Roots of Global Warming'
    author: Andreas Malm
    year: '2016'
    type: book
    doi: 10.1080/13563467.2017.1348372
    archive_url: https://archive.org/details/fossilcapitalris0000malm
  - title: 'Capitalism in the Web of Life: Ecology and the Accumulation of Capital'
