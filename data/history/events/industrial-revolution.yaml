severity: catastrophic
death_toll: No single figure captures it. In Lancashire cotton mills alone, child mortality ran 50-60% higher than surrounding
  rural populations. Between 1838 and 1842, 1,430 miners died in British collieries (official count; actual figures higher —
  many pits kept no records). Indian deindustrialization contributed to famines that killed millions across the 19th century.
affected_population: Britain's population doubled from 7.7 million (1760) to 16.6 million (1841). India's share of global
  manufacturing output fell from 24.5% in 1750 to 1.4% by 1913. China's fell from 32.8% to 3.6% over the same period.
duration: 80 years of primary phase (c. 1760-1840); consequences ongoing
summary: 'In 1712, Thomas Newcomen installed a steam-powered pump at a coal mine in Dudley Castle, Staffordshire. It burned
  coal to pump water out of a coal mine — a machine feeding on the substance it was built to extract. For six decades, the
  Newcomen engine remained a crude, fuel-hungry device confined to the pithead. Then, in 1769, James Watt — an instrument
  maker at the University of Glasgow who had been asked to repair a model Newcomen engine — patented a separate condenser
  that reduced fuel consumption by 75%. By 1784, Watt and his business partner Matthew Boulton had developed a rotary steam
  engine that could drive machinery. The first Boulton & Watt engine was installed in a cotton spinning mill in Papplewick,
  Nottinghamshire, in 1785. Within twenty years, steam power had replaced water wheels in hundreds of British factories.


  The factory did not emerge from nothing. It required a labor force, and that labor force was manufactured. Between 1750 and
  1850, roughly 4,000 Enclosure Acts passed through Parliament, converting 6.8 million acres of common land — fields, pastures,
  and woodlands that villagers had worked collectively for centuries — into private property. Families who had sustained
  themselves through a combination of small farming, cottage spinning, and common grazing found themselves with nothing to sell
  but their time. They migrated to Manchester, Birmingham, Leeds, and Glasgow. Manchester''s population grew from 25,000 in
  1772 to 303,000 in 1851.


  What awaited them was the factory system. Richard Arkwright''s Cromford Mill, opened in 1771, established the template: a
  workforce of 200 (many of them children), working in two shifts of 13 hours each, six days a week, their movements
  synchronized to the rhythm of water-powered spinning frames. Arkwright posted rules: fines for arriving late, for leaving
  the work station, for opening a window. His workers could not set their own pace, choose their tasks, or rest when tired.
  The pre-industrial artisan had controlled his tools; the factory worker served the machine.


  In 1832, the House of Commons established the Sadler Committee to investigate child labor. The testimony was specific. Sarah
  Gooder, age eight, told the committee she worked as a trapper in a coal mine — opening and closing ventilation doors in
  complete darkness for twelve hours a day. "I have to trap without a light, and I''m scared. I go at four and sometimes half
  past three in the morning, and come out at five and half past." William Cooper, a mill worker from Leeds, testified that
  children as young as five operated machinery from 5 a.m. to 9 p.m. and were beaten with a leather strap to keep them awake
  during the final hours. Elizabeth Bentley, who began work at age six in a flax mill, described how her fingers had been
  crushed in the machinery and her spine curved from standing fourteen hours a day. She was twenty-three when she testified.
  She looked forty.


  The resistance was physical before it was political. Between 1811 and 1816, workers calling themselves Luddites smashed
  textile machinery across the Midlands and the North. They were not opposed to technology in principle — they were skilled
  croppers and weavers whose livelihoods were being destroyed by machines that could be operated by children at a fraction
  of the cost. The government deployed 14,000 troops to suppress them — more soldiers than Wellington had taken to the
  Peninsular War. In January 1813, seventeen Luddites were hanged at York Castle. On August 16, 1819, at St Peter''s Field,
  Manchester, cavalry charged into a crowd of 60,000 who had gathered peacefully to demand parliamentary reform. Fifteen
  people were killed, 400 to 700 injured. The press called it Peterloo — a bitter echo of Waterloo, four years earlier.

  '
significance: 'Between 1760 and 1840, Britain shifted from an agrarian economy to one driven by coal, iron, and steam. Annual
  coal production rose from 5 million tons (1750) to 30 million tons (1830) to 250 million tons (1900). The railways
  compressed geography: the Liverpool and Manchester Railway, opened September 15, 1830, moved goods and people at 30 miles
  per hour — ten times the speed of a canal barge. Global manufacturing output redistributed: Britain produced 9.5% of the
  world''s manufactured goods in 1750 and 19.9% by 1860; India dropped from 24.5% to 8.6% over the same period, and to 1.4%
  by 1913. The carbon dioxide released by burning coal in Lancashire mills and Yorkshire foundries in the 1780s remains in
  the atmosphere in 2026. The factory system created two classes that did not exist before: industrial capitalists who owned
  the means of production, and a proletariat that owned nothing but its labor. Every subsequent revolution — 1848, 1871,
  1917 — was a consequence of that division.

  '
