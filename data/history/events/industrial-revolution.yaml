    year: '2015'
    type: book
    doi: 10.1080/03066150.2016.1235036
  - title: 'Climate Change 2021: The Physical Science Basis (Sixth Assessment Report)'
    author: IPCC Working Group I
    year: '2021'
    type: report
    doi: 10.1017/9781009157896
  - title: 'The Geology of England and Wales'
    author: P.McL.D. Duff and A.J. Smith (eds.)
    year: '1992'
    type: book
    doi: 10.1144/gsl.mem.1992.013
  notable_quotes:
  - text: The transition from water to steam was a transition in the social relations of production disguised as a transition
      in energy technology.
    speaker: Andreas Malm
    context: Fossil Capital, 2016
  - text: What is called the Anthropocene is not the result of humanity as a whole but of a specific way of organizing nature
      — through capital, empire, and science.
    speaker: Jason W. Moore
    context: Capitalism in the Web of Life, 2015
  emphasized:
  - The water-to-steam transition as a social choice, not a technical inevitability
  - The unbroken chain of combustion from 1784 to the present
  - Climate science's "pre-industrial" baseline as the Industrial Revolution's lasting frame
  omitted:
  - Steam's genuine advantages in scale, reliability, and freedom from drought and seasonal variation
  - The role of coal-powered industry in raising living standards and reducing mortality over time
  - Technological innovation as a potential path out of the fossil-fuel economy it created
  - The agency of workers who preferred factory wages to rural poverty
- viewpoint: Subaltern / Colonial Deindustrialization
  viewpoint_type: vanquished
  region_origin: south-asia
  narrative: 'In 1750, a weaver in Dacca produced muslin so fine that a length sufficient to drape a woman''s body could be
    drawn through a finger ring. European traders called it "woven air." The East India Company''s own records noted that
    Bengali muslins were "the finest production of the loom to be seen in any part of the world." India produced 24.5% of
    global manufacturing output. Bengal alone exported cotton textiles to Southeast Asia, East Africa, the Middle East, and
    Europe. The subcontinent was the world''s largest manufacturer.


    The destruction was administered, not accidental. After Robert Clive''s victory at the Battle of Plassey on June 23, 1757,
    the East India Company controlled Bengal''s revenues — 22 million rupees annually by 1765. The Company used this revenue to
    buy Indian goods for export, a practice the Company itself called the "investment." Indian textiles were purchased with
    Indian tax revenue, shipped to London, and sold at profit. The weavers received less. Company agents — known as gomastas —
    imposed advance contracts on weavers at prices below market rate. Weavers who attempted to sell to other buyers were fined,
    imprisoned, or physically punished. The weaver who had been an independent artisan became a piece-rate worker for a foreign
    monopoly.


    The tariff structure completed the destruction. The Calico Acts of 1700 and 1721 banned the import of Indian printed and
    dyed cotton textiles into Britain, protecting the nascent English cotton industry. By the 1790s, when British mills began
    producing cloth competitive with Indian handlooms, Indian textiles entering Britain still faced duties of 70-80%. British
    manufactured cloth entered India at tariffs of 2.5-3.5%. William Bentinck, Governor-General of India, reported to the
    East India Company in 1834-35: "The misery hardly finds a parallel in the history of commerce. The bones of the cotton-weavers
    are bleaching the plains of India." The phrase was not metaphorical. The weavers of Dacca, who had numbered in the tens
    of thousands, were destitute. The city''s population fell from 150,000 in 1800 to 20,000 by the 1840s.


    The story of the weavers whose thumbs were cut off — to prevent them from weaving — persists in Indian historiography. William
    Bolts, a Dutch trader who worked for the East India Company, wrote in 1772 that weavers had their thumbs chopped off by
    Company agents. The claim is disputed by some historians as exaggeration or conflation with punitive taxation. But the
    economic violence is documented in the Company''s own records. India was converted from the world''s leading textile exporter
    to an importer of British cloth and an exporter of raw cotton — the classic colonial trade pattern. By 1830, Britain
    exported 51 million yards of cotton cloth to India annually. By 1890, the figure was 2 billion yards.


    Utsa Patnaik, using East India Company trade data and adjusted for purchasing power, calculated that Britain drained
    approximately $45 trillion (in 2018 dollars) from India between 1765 and 1938. The mechanism was the "drain of wealth"
    — first identified by Dadabhai Naoroji in Poverty and Un-British Rule in India (1901): Indian revenues were used to pay
    for British exports to India, Indian raw materials were shipped to Britain at below-market prices, and India was forced
    to run trade surpluses with the rest of the world to finance its deficit with Britain. The wealth did not return. It
    financed railways in Britain, warships for the Royal Navy, and the living standards that the Whig narrative attributes to
    British ingenuity. India''s per capita income, which had been comparable to Britain''s in 1700, was one-twentieth of
    Britain''s by 1947.

    '
  key_arguments:
  - Indian weavers were the world's most skilled textile producers in 1750 — their destruction was administered through
    tariffs, monopoly purchasing, and colonial revenue extraction
  - The Calico Acts banned Indian textiles from Britain while British cloth entered India nearly duty-free
  - 'Dacca''s population collapsed from 150,000 to 20,000 as its weaving industry was destroyed'
  - 'Utsa Patnaik calculated Britain drained approximately $45 trillion from India (1765-1938) — the capital that financed
    British industrialization'
  - India's share of global manufacturing fell from 24.5% (1750) to 1.4% (1913)
  sources:
  - title: 'Poverty and Un-British Rule in India'
    author: Dadabhai Naoroji
    year: '1901'
    type: book
    archive_url: https://archive.org/details/povertyunbritish00naorrich
  - title: 'Why Europe Grew Rich and Asia Did Not: Global Economic Divergence, 1600-1850'
    author: Prasannan Parthasarathi
    year: '2011'
    type: book
    doi: 10.1017/CBO9780511993398
  - title: 'Agrarian and Other Histories: Essays for Binay Bhushan Chaudhuri (contains Patnaik''s drain calculation)'
    author: Utsa Patnaik (chapter)
    year: '2017'
    type: book
    doi: 10.7312/columbia/9780231187312.003.0013
  - title: 'Empire of Cotton: A Global History'
    author: Sven Beckert
    year: '2014'
    type: book
    archive_url: https://archive.org/details/empireofcottongo0000beck
  - title: 'Considerations on the State of the Currency in Bengal'
    author: William Bolts
    year: '1772'
    type: book
    archive_url: https://archive.org/details/considerationson00bolt
  notable_quotes:
  - text: The misery hardly finds a parallel in the history of commerce. The bones of the cotton-weavers are bleaching the
      plains of India.
    speaker: William Bentinck
    context: Governor-General's report to the East India Company, 1834-35
  - text: In the beginning of the century the difference between the earnings of English and Indian workers was not in favour
      of the English.
    speaker: William Digby
    context: "'Prosperous' British India, 1901"
  emphasized:
  - Indian manufacturing supremacy before colonial intervention
  - Tariff asymmetry as a deliberate policy of deindustrialization
  - The drain of wealth as the mechanism of impoverishment
  - Specific human consequences — Dacca's population collapse, the weavers' destitution
  omitted:
  - Internal factors in Mughal decline that weakened India's capacity to resist colonization
  - Indian merchants and intermediaries who profited from the colonial trade system
  - British infrastructure investments — railways, telegraphs, irrigation — that had mixed effects on the Indian economy
  - Post-independence Indian industrialization that partially reversed the colonial pattern
