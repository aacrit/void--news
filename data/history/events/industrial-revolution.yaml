legacy_points:
- 'Coal consumption created a fossil-fuel economy: Britain burned 5 million tons annually in 1750, 250 million by 1900 —
  the carbon released remains in the atmosphere'
- The factory system replaced artisan self-direction with synchronized, clock-disciplined wage labor — a structure that
  governs most human work in 2026
- 'India''s share of global manufacturing output fell from 24.5% (1750) to 1.4% (1913) as British tariff policy destroyed
  the subcontinent''s textile industry'
- The 1833 Factory Act set the first legal limits on child labor — children under nine barred from textile mills, those under
  thirteen limited to eight hours — after the Sadler Committee testimony
- 'The railways restructured space and time: the Liverpool-Manchester line (1830) required standardized clocks, leading to
  Greenwich Mean Time (1847) and eventually global time zones (1884)'
- The industrial proletariat became a political class — the Chartist movement (1838-1857) collected 3 million signatures
  demanding universal male suffrage, and the Trades Union Congress was founded in 1868
