perspectives:
- viewpoint: Whig / Progress Narrative
  viewpoint_type: academic
  region_origin: europe
  narrative: 'In 1700, an English farmer produced barely enough grain to feed his family and pay his landlord. Life expectancy
    at birth was 35 years. Eighty percent of the population worked the land. A century and a half later, Britain fed 16 million
    people — double its 1760 population — while employing fewer agricultural workers than before. The surplus labor built
    railways, operated looms, smelted iron, and produced goods that were shipped to every inhabited continent. Per capita GDP,
    which had barely moved for centuries, doubled between 1780 and 1860. This is the Whig narrative of the Industrial Revolution:
    the moment when human ingenuity broke the Malthusian ceiling that had trapped every previous civilization.


    David Landes, in The Wealth and Poverty of Nations (1998), asked the question that defines this tradition: why Britain?
    His answer was institutional. Britain had secure property rights codified since the Glorious Revolution of 1688. It had a
    patent system — Watt''s separate condenser was patent number 913, granted January 5, 1769 — that rewarded invention with
    temporary monopoly. It had a banking system (the Bank of England, founded 1694) that could mobilize capital. It had coal
    deposits in Durham, Yorkshire, Lancashire, and Staffordshire — conveniently close to navigable rivers and ports. It had a
    culture of tinkering, of practical mechanics: Watt was an instrument maker, Arkwright a barber, George Stephenson a colliery
    fireman who taught himself to read at eighteen. The Royal Society of London published scientific proceedings; coffeehouses in
    Manchester and Birmingham served as informal exchanges where entrepreneurs, inventors, and financiers shared ideas.


    Adam Smith had anticipated the logic in 1776. The Wealth of Nations — published the same year as the American Declaration
    of Independence — argued that the division of labor, unimpeded by guild restrictions or mercantile monopolies, would generate
    unprecedented productivity. Smith''s famous pin factory illustration showed that ten workers, each performing a specialized
    task, could produce 48,000 pins per day — compared to one worker making fewer than twenty. The factory system was the pin
    factory at industrial scale.


    The progress narrative does not deny suffering. It argues that suffering was temporary and improvement structural. Robert
    Fogel, in The Escape from Hunger and Premature Death, 1700-2100 (2004), documented the "technophysio evolution": between
    1800 and 2000, average height in Britain increased by 9.1 centimeters, caloric intake doubled, and life expectancy rose
    from 36 to 77 years. The first generation of factory workers lived shorter, harder lives than their grandparents. Their
    grandchildren lived longer and better than any generation in human history. T.S. Ashton, in The Industrial Revolution
    1760-1830 (1948), made the case bluntly: "There are today on the savannas of India and Africa tens of millions whose
    data of birth, statistics of health, and whose reach of life are no better than those of the English village worker of
    two centuries ago. The hazards of national progress are preferable to the certainties of national stagnation."


    The Manchester Statistical Society, founded in 1833 — the first organization of its kind — began systematically measuring
    the conditions the revolution created. Its surveys of working-class housing, wages, sanitation, and education provided the
    data that informed the Factory Acts, the Public Health Acts, and the Education Acts that followed. The revolution, in this
    reading, generated not only the problems but the tools and the wealth to solve them.

    '
  key_arguments:
  - Britain's institutional framework — property rights, patents, banking, coal — explains the timing and location
  - The division of labor and free markets, as Smith described, generated unprecedented productivity
  - Suffering was real but temporary; structural improvements in health, height, and longevity followed within two generations
  - The revolution created the wealth and the statistical tools to address the problems it caused
