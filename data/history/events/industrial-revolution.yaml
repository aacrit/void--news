- viewpoint: Marxist / Labor
  viewpoint_type: revisionist
  region_origin: europe
  narrative: 'E.P. Thompson opened The Making of the English Working Class (1963) with a declaration of method: "I am seeking
    to rescue the poor stockinger, the Luddite cropper, the ''obsolete'' hand-loom weaver, the ''utopian'' artisan, and even
    the deluded follower of Joanna Southcott, from the enormous condescension of posterity." The book — 848 pages, three
    decades of research — reconstructed a revolution as experienced not by its engineers and investors but by the people it
    was done to.


    The enclosures came first. Between 1750 and 1850, Parliament passed roughly 4,000 Enclosure Acts covering 6.8 million
    acres. Commissioners surveyed the land, allocated plots to those who could prove title, and fenced the commons. But proving
    title required lawyers, and lawyers required money. J.L. and Barbara Hammond, in The Village Labourer (1911), documented
    families reduced to landless wage workers within a single generation. The commons had been their insurance against
    starvation. Without it, they had no choice but the factory.


    The factory imposed a new kind of discipline. Thompson identified it as the shift from "task-orientation" — work governed
    by the season and the daylight — to "time-discipline," governed by the clock. Arkwright''s Cromford Mill ran 23 hours a
    day, six days a week. Workers were fined for lateness, for talking, for opening windows. A handbill posted at a Tynemouth
    factory in 1805: "Any Person found from the usual Place of Work, except for necessary purposes, or talking to anyone out
    of their own Alley, will be fined 2d. for each offence."


    The children bore the sharpest cost. The Sadler Committee (1832) and the Children''s Employment Commission (1842) produced
    testimony that reads like an inventory. Children of five dragged coal trucks through mine tunnels eighteen inches high.
    Children of seven stood fourteen hours at spinning frames, beaten with leather straps when they fell asleep. Elizabeth
    Bentley, who had worked in a flax mill since age six, described being struck with the "billy-roller" — a weighted rod —
    when she flagged. She was permanently crippled. Robert Owen, at New Lanark, refused to employ children under ten and
    limited hours to ten and a half. His mills were profitable. His example was not followed.


    The Luddites — named after the perhaps-mythical Ned Ludd — operated between 1811 and 1816 with military discipline,
    targeting specific machines (the wide stocking frames that produced cheap goods and undercut skilled framework knitters)
    while leaving others untouched. They communicated through anonymous letters: "We will never lay down Arms [until] the
    House of Commons passes an Act to put down all Machinery hurtful to Commonality." The government deployed 14,000 troops.
    The Frame Breaking Act of 1812 made machine-breaking a capital offense. Seventeen Luddites were hanged at York in January
    1813.


    Peterloo crystallized the political dimension. On August 16, 1819, 60,000 people gathered at St Peter''s Field, Manchester,
    to hear Henry Hunt speak on parliamentary reform. The magistrates ordered volunteer cavalry — many of them factory owners —
    to arrest Hunt. The cavalry charged with sabres drawn. Fifteen people were killed, including a two-year-old trampled by
    horses. Between 400 and 700 were injured. The government congratulated the magistrates. No soldier or magistrate was
    prosecuted.

    '
  key_arguments:
  - The enclosures stripped cottagers of common land, manufacturing a landless labor force with no alternative to factory work
  - Factory discipline replaced task-orientation with time-discipline — the clock, the fine, the bell
  - Child labor was systematic, documented in parliamentary testimony, and resisted only by individual reformers like Owen
  - The Luddites were skilled workers defending their livelihoods with military discipline, not ignorant machine-breakers
  - Peterloo demonstrated state violence in defense of industrial capital
