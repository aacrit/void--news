- viewpoint: Global / The Great Divergence
  viewpoint_type: revisionist
  region_origin: global
  narrative: 'In 1750, the Yangzi Delta was the most productive agricultural region on earth. Chinese peasants cultivated rice
    paddies with yields per acre that English farmers would not match for another century. Chinese silk, porcelain, and tea
    commanded premium prices in European markets. India''s cotton textiles — the fine muslins of Dacca, the calicoes of
    Calicut — were the world''s most desired manufactured goods. Europe was a buyer, not a seller. The question that Kenneth
    Pomeranz posed in The Great Divergence (2000) was not "why did Europe industrialize?" but "why did equally developed
    regions of China and India not?"


    Pomeranz''s answer was contingent, not cultural. Britain had two advantages that the Yangzi Delta lacked, and neither was
    a product of superior institutions or Protestant work ethic. The first was coal. Britain''s coalfields — in Durham,
    Yorkshire, Lancashire, South Wales — were geographically close to its centers of textile production and connected by
    navigable rivers. China had vast coal deposits in Shanxi Province, but Shanxi was 1,000 miles from the Yangzi Delta''s
    workshops. Transporting coal overland at that distance made it economically useless for manufacturing. Britain''s coal
    was an accident of geology, not a reward for ingenuity.


    The second advantage was the New World. The Atlantic slave trade supplied Britain with raw cotton, sugar, and tobacco
    produced by coerced labor on land taken from indigenous peoples. Eric Williams, in Capitalism and Slavery (1944), argued
    that the profits of the slave trade directly capitalized Britain''s industrial takeoff — Liverpool slave merchants
    invested in Manchester cotton mills. Pomeranz extended the argument: without the "ghost acres" of New World plantations,
    Britain would have faced the same ecological constraints as China. British sheep and cattle already grazed every available
    acre; only slave-grown American cotton relieved the pressure on British land. The Yangzi Delta had no equivalent windfall.
    China''s frontiers — Inner Mongolia, Manchuria — offered land but not the coerced labor to work it.


    Prasannan Parthasarathi, in Why Europe Grew Rich and Asia Did Not (2011), added a third factor: state-enforced market
    access. The British East India Company did not simply outcompete Indian weavers. It restructured the rules. After the
    Battle of Plassey (1757), the Company controlled Bengal''s revenues and trade policy. Indian cotton textiles entering
    Britain faced duties of 70-80% — the Calico Acts of 1700 and 1721 had already banned Indian printed cottons outright.
    Meanwhile, British manufactured cloth entered India duty-free or at nominal tariffs. Parthasarathi documented that Indian
    weavers were as skilled and productive as their English counterparts in 1750. They did not lose to the spinning jenny.
    They lost to tariff barriers enforced by a colonial state.


    Sven Beckert, in Empire of Cotton (2014), synthesized these arguments into what he called "war capitalism" — the
    combination of slavery, colonial land seizure, and armed trade that preceded and enabled industrial capitalism. The
    spinning jenny did not arise from a cultural vacuum. It arose from an empire that could supply raw cotton from Mississippi,
    suppress competing Indian manufacturers through tariff policy, and sell finished goods to captive colonial markets from
    Calcutta to Lagos. The Industrial Revolution was not a British achievement exported to the world. It was a global process
    in which coercion, geography, and ecological luck determined which region industrialized and which was deindustrialized.

    '
  key_arguments:
  - China's Yangzi Delta and India's textile regions were as productive as Britain in 1750 — the divergence was contingent
  - Britain's coal deposits were geographically close to manufacturing centers; China's were not
  - New World slave plantations provided the raw materials and "ghost acres" that relieved Britain's ecological constraints
  - Colonial tariff policy destroyed Indian textile manufacturing — weavers lost to trade barriers, not to superior technology
  - The Industrial Revolution was a global process shaped by coercion and geography, not a European cultural achievement
