  emphasized:
  - The revolution was multi-authored and Khomeini could not have succeeded alone
  - The systematic elimination of secular and leftist allies after the revolution's success
  - The 1988 mass executions as the culmination of the hijacking — killing former revolutionary partners
  - Montazeri's protest as the one dissenting voice within the clerical establishment
  omitted:
  - The left's own internal divisions and factional violence before the Islamic Republic eliminated them
  - The MEK's turn toward armed insurrection and alliance with Saddam Hussein during the Iran-Iraq War
  - The Tudeh's genuine ties to Soviet intelligence, which the regime exploited but did not fabricate
  - The popular support Khomeini retained even as he eliminated rivals — the clergy were not universally
      opposed
- viewpoint: American / Cold War Blowback
  viewpoint_type: vanquished
  region_origin: north-america
  narrative: 'On August 19, 1953, the CIA and British intelligence completed Operation AJAX — the overthrow
    of Prime Minister Mohammad Mossadegh, who had nationalized Iran''s oil industry, and the restoration
    of Shah Mohammad Reza Pahlavi to absolute power. Kermit Roosevelt Jr., the CIA''s station chief, personally
    delivered bags of cash to army officers and street thugs who stormed Mossadegh''s residence. The operation
    cost $60,000 in CIA funds — and $1 million in total including the British contribution. The Shah, who
    had fled to Rome three days earlier, returned in triumph. For the next 26 years, he was Washington''s
    man.


    The investment was strategic. Iran under the Shah was the "gendarme of the Persian Gulf" — Nixon''s phrase
    after the 1972 Tehran summit. The Shah purchased $20 billion in US arms between 1972 and 1978, including
    F-14 Tomcats and AWACS aircraft. He provided intelligence-sharing on the Soviet Union, hosted signals
    intelligence stations near the Soviet border, maintained oil supplies to the West, and cooperated tacitly
    with Israel. SAVAK, his secret police, was trained by the CIA and Mossad. It monitored every layer of
    Iranian society — universities, unions, mosques, newspapers. Between 1963 and 1979, an estimated 3,000-4,000
    political prisoners were tortured in SAVAK facilities. The CIA knew. American administrations from Eisenhower
    to Ford treated the Shah as indispensable and his methods as the price of stability.


    The Carter administration arrived in January 1977 with a human rights agenda. In November 1977, during
    a state visit to Washington, Carter toasted the Shah at a White House dinner: "Iran, because of the great
    leadership of the Shah, is an island of stability in one of the more troubled areas of the world." Thirteen
    months later, the Shah was gone. Gary Sick, Carter''s principal White House aide on Iran, wrote in All
    Fall Down (1985) that the administration was paralyzed by contradictory impulses: support the Shah (National
    Security Advisor Zbigniew Brzezinski), push for reform (Secretary of State Cyrus Vance), prepare for
    the worst (the CIA, which had five full-time analysts covering a country of 37 million). When the revolution
    accelerated in the fall of 1978, Carter sent General Robert Huyser to Tehran in January 1979 to assess
    whether the military could hold. Huyser reported that the generals were demoralized and that the army
    would fragment if ordered to fire on the population. Carter declined to give the order.


    The hostage crisis consumed 444 days and an American presidency. On November 4, 1979, students calling
    themselves "Muslim Student Followers of the Imam''s Line" scaled the walls of the US Embassy compound
    in Tehran and took 66 Americans hostage (14 were released within weeks; 52 were held for 444 days).
    Carter authorized Operation Eagle Claw, a rescue attempt, on April 24, 1980; it ended in the Iranian
    desert at a staging point called Desert One when a helicopter collided with a C-130 transport, killing
    eight American servicemen. The wreckage was displayed on Iranian television. Carter lost the 1980 election
    to Ronald Reagan in a 44-state landslide. The hostages were released on January 20, 1981 — the hour
    of Reagan''s inauguration. Gary Sick''s October Surprise (1991) alleged that Reagan''s campaign had
    secretly negotiated with Iran to delay the release until after the election. Congressional investigations
    found no conclusive evidence.


    The 1953 intervention and its 1979 consequence became the canonical case study in CIA blowback. The
    agency created a client state, armed it, trained its secret police, and ensured its illegitimacy. When
    the client fell, the successor regime defined itself in opposition to everything the client had represented
    — and to the patron that had imposed him. The Islamic Republic''s founding narrative requires 1953:
    without the coup, the revolution has no villain.

    '
  key_arguments:
  - Operation AJAX (1953) overthrew a democratic government and installed a client monarch, undermining
      the Shah's legitimacy for 26 years
  - The US sold $20 billion in arms, trained SAVAK, and treated the Shah as indispensable — binding American
      credibility to his survival
  - Carter's human rights rhetoric paralyzed US policy at the critical moment — Brzezinski wanted to support
      a military crackdown, Vance pushed for reform, and the CIA had five analysts covering 37 million people
  - The 444-day hostage crisis ended Carter's presidency and inaugurated 47 years of US-Iran antagonism
