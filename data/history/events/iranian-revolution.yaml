  emphasized:
  - The Shah's modernization achievements — land reform, literacy, women's rights, economic growth
  - SAVAK's repression as a tactical error that undermined a genuine development agenda
  - The Islamic Republic's economic and social collapse as evidence that the revolution was a catastrophe
  - American abandonment as a decisive factor in the Shah's fall
  omitted:
  - The Shah's authoritarianism was not merely tactical but constitutional — he never permitted genuine
      political opposition
  - The White Revolution's benefits were unevenly distributed, enriching urban elites while disrupting rural
      communities
  - The Rastakhiz single-party system (1975) foreclosed the possibility of reform from within
  - The monarchist movement's own divisions and its failure to build a credible alternative from exile
- viewpoint: Women's Rights — Liberation and Betrayal
  viewpoint_type: vanquished
  region_origin: middle-east
  narrative: 'On March 8, 1979 — International Women''s Day, 27 days after Khomeini''s return from Paris —
    between 15,000 and 100,000 women marched through the streets of Tehran. They marched against the mandatory
    hijab decree that Khomeini had announced on March 6. Some wore chadors, some wore headscarves, some were
    bareheaded. Kate Millett, the American feminist author of Sexual Politics (1970), flew to Tehran to join
    them. Simone de Beauvoir sent a message of solidarity. Revolutionary guards and Hezbollahi vigilantes
    attacked the marchers with knives and clubs. Women who had participated in the revolution — who had marched
    alongside the very men now attacking them — were told to go home and cover.


    The timeline is the argument. Under the Shah''s Family Protection Act of 1967 (amended 1975), women could
    initiate divorce, polygamy required court approval, the minimum marriage age was raised to 18 for women
    and 20 for men, and women gained custody rights. By 1978, 33% of Iranian university students were women.
    Women worked as lawyers, judges, engineers, and members of parliament. Farrokhroo Parsa, Iran''s first
    female cabinet minister (Minister of Education, 1968-1974), oversaw the expansion of girls'' schools
    from 4,600 to 8,300. After the revolution, Parsa was arrested. She was charged with "corruption on earth"
    and "warring against God." She was executed by firing squad on May 8, 1980. She was 58 years old.


    The Islamic Republic''s changes were codified. Mandatory hijab was enacted by decree on March 7, 1979,
    made law by parliament in 1983, and enforced by the gasht-e ershad (guidance patrol, or "morality police").
    The minimum marriage age for girls was lowered to 9 (later raised to 13 with judicial permission for
    younger). Women were barred from serving as judges. A woman''s testimony in court was valued at half a
    man''s. A woman needed her husband''s permission to travel or obtain a passport. The Family Protection
    Act was repealed. Polygamy required no court approval. In matters of inheritance, daughters received half
    the share of sons. Stoning was codified as a punishment for adultery — and applied disproportionately
    to women.


    Azar Nafisi, a professor of English literature at the University of Tehran, was expelled from her position
    in 1981 for refusing to wear the veil. She continued to teach, then left Iran in 1997. Her memoir Reading
    Lolita in Tehran (2003) describes organizing a secret book club for seven female students, reading Nabokov,
    Fitzgerald, Austen, and James behind drawn curtains. "The regime had turned the veil into a flag," she
    wrote, "and my refusal to wear it into a form of treason." Marjane Satrapi''s Persepolis (2000) documents
    the same betrayal from a child''s perspective: the veil imposed at school, the parties held in secret,
    the punk cassettes hidden under jackets at checkpoints.


    The arc closed — or reopened — on September 16, 2022, when Mahsa Jina Amini, a 22-year-old Kurdish-Iranian
    woman, died in custody of the morality police three days after being detained for wearing her hijab
    improperly. Her father said her body showed bruises. The government said she had a heart attack. Within
    days, women across Iran were cutting their hair in public, burning their headscarves, and chanting "Zan,
    Zendegi, Azadi" — Woman, Life, Freedom. The protests lasted six months. The Islamic Republic''s security
    forces killed at least 537 protesters (Iran Human Rights), arrested over 22,000, and executed at least
    7. The youngest known victim was Nika Shakarami, 16 years old, whose body was returned to her family
    with a broken nose, a fractured skull, and bruises consistent with beating. The security forces told her
    mother that she had jumped from a building. The 2022 protests were the largest since 1979. Women who
    had been born 20 years after the revolution fought for rights that women had held 20 years before it.

    '
  key_arguments:
  - The March 8, 1979 women's march against mandatory hijab — 27 days after Khomeini's return — was attacked
      by the same revolutionary forces women had marched alongside
  - The timeline is the argument — women held rights under the Shah (divorce, custody, education, political
      office) that the Islamic Republic revoked within months
  - Farrokhroo Parsa, Iran's first female cabinet minister, was executed by firing squad on May 8, 1980 —
      charged with "corruption on earth" and "warring against God"
  - The 2022 Mahsa Amini protests (Woman, Life, Freedom) were fought by women born 20 years after the revolution
      for rights held 20 years before it
  sources:
  - title: 'Reading Lolita in Tehran: A Memoir in Books'
    author: Azar Nafisi
    year: '2003'
    type: book
  - title: 'Persepolis: The Story of a Childhood'
    author: Marjane Satrapi
    year: '2000'
    type: book
  - title: 'Jewels of Allah: The Untold Story of Women in Iran'
    author: Nina Ansary
    year: '2015'
    type: book
  - title: 'Awakening: The Story of the Iranian Revolution'
    author: Kate Millett
    year: '1982'
    type: book
  notable_quotes:
  - text: The regime had turned the veil into a flag, and my refusal to wear it into a form of treason.
    speaker: Azar Nafisi
    context: Reading Lolita in Tehran (2003)
  - text: 'Zan, Zendegi, Azadi. [Woman, Life, Freedom.]'
    speaker: Protest chant across Iran following the death of Mahsa Amini
    context: September 2022 onward; the chant was adapted from the Kurdish slogan "Jin, Jiyan, Azadi" used
      by the Kurdish women's movement
  emphasized:
  - Women's active participation in the revolution and their immediate exclusion from its fruits
  - The specific legal changes — marriage age, divorce rights, testimony, inheritance, hijab — that reversed
      pre-revolutionary gains
  - The execution of Farrokhroo Parsa as the revolution's statement about women in public life
  - The 2022 Woman, Life, Freedom protests as the continuation of the March 8, 1979 march
  omitted:
  - Women who supported the Islamic Republic and voluntarily adopted the veil as a rejection of Western
      cultural imperialism
  - The Shah's own instrumentalization of women's rights as proof of modernity for Western audiences
  - Conservative women's movements within the Islamic Republic that expanded education and literacy
  - The class dimensions — the Shah's liberalization primarily benefited urban, upper-class women
