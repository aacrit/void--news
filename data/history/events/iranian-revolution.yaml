- viewpoint: Secular / Leftist — Hijacked Revolution
  viewpoint_type: vanquished
  region_origin: middle-east
  narrative: 'Ervand Abrahamian''s Iran Between Two Revolutions (1982) counted the participants: the revolution
    was made by the Marxist Fedayeen-e Khalq (who had attacked the Shah''s police stations since 1971), the
    Tudeh Communist Party (which had organized oil workers and intellectuals since the 1940s), the Mojahedin-e
    Khalq (MEK, which fused Islam with Marxism and had waged armed struggle since 1965), the National Front
    liberals (Mossadegh''s heirs, who wanted parliamentary democracy), the bazaar merchants (who financed
    the mosques and were strangled by the Shah''s price controls), and the clergy. Khomeini needed every one
    of them. They needed him.


    Mehdi Bazargan, the first Prime Minister, was a French-educated engineer, a liberal Muslim, a follower
    of Mossadegh. He lasted nine months. His cabinet included no mullahs. It attempted to normalize relations
    with the West, maintain the civil service, protect press freedom. Khomeini created parallel institutions:
    Revolutionary Courts, the Revolutionary Guard (Pasdaran), the Committee for the Islamic Revolution —
    each answering to him, not to Bazargan. When students seized the US Embassy on November 4, 1979, Bazargan
    learned about it from the radio. He resigned two days later. He said: "No one listens to me."


    The elimination was methodical. First the monarchists — mass trials, executions broadcast on television.
    Sadegh Khalkhali, the "hanging judge" of the Revolutionary Courts, ordered 757 executions in his first
    six months. Then the National Front — its newspaper, Ayandegan, was shut down in August 1979. Then the
    Kurds — the army shelled Sanandaj and Mahabad in the spring of 1979. Then the MEK: on June 20, 1981,
    500,000 MEK supporters marched in Tehran. Khomeini declared them monafeqin — hypocrites — and the Pasdaran
    opened fire. Over the following two years, an estimated 2,665 MEK members were executed in public and
    in secret. Then the Tudeh: its leadership was arrested in February 1983, its general secretary Nureddin
    Kianuri appeared on television to confess to spying for the Soviet Union, and its members were imprisoned
    or executed after show trials.


    The culmination came on July 28, 1988, when Khomeini issued a fatwa ordering the execution of all imprisoned
    MEK members who remained loyal to the organization. Three-member commissions — known as "death committees"
    — were established in prisons across Iran. Prisoners were brought before the committees and asked one
    question: do you still support the Mojahedin? Those who said yes were taken to a corridor and hanged,
    sometimes from construction cranes, sometimes from ceiling beams in groups of six. Amnesty International
    estimates 4,500 were killed. The People''s Mojahedin Organization puts the figure at 30,000. The most
    careful academic estimates, including those by Abrahamian in Tortured Confessions (1999), place the number
    between 2,800 and 5,000. Grand Ayatollah Hossein-Ali Montazeri — Khomeini''s designated successor at
    the time — protested the executions in a letter to Khomeini: "Do you know that in the prisons of the
    Islamic Republic, young women are being raped the night before execution?" Khomeini removed him as successor.
    Montazeri was placed under house arrest in 1997. He died in 2009. The audiotape of his protest was leaked
    in 2016.


    The revolution''s left was present at its birth and absent at every anniversary thereafter. They had
    organized the strikes, printed the leaflets, attacked the police stations, filled the universities. The
    Islamic Republic hanged them, and then denied it had hanged them, and then denied that they had participated
    in the revolution at all.

    '
  key_arguments:
  - The revolution had multiple authors — Marxists, liberals, bazaar merchants, students, and clergy — and
      Khomeini needed all of them to succeed
  - Bazargan's liberal government was undermined by Khomeini's parallel institutions within months; he resigned
      saying "no one listens to me"
  - The elimination was sequential and methodical — monarchists, then National Front, then Kurds, then MEK,
      then Tudeh — each ally was discarded after its usefulness ended
  - The 1988 mass executions (2,800-5,000 killed in a few months) were denied by the Islamic Republic until
      Montazeri's leaked audiotape surfaced in 2016
