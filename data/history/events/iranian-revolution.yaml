legacy_points:
- The 444-day US Embassy hostage crisis (November 4, 1979-January 20, 1981) ended Jimmy Carter's presidency
    and inaugurated 47 years of US-Iran confrontation that continues in 2026
- The Iran-Iraq War (1980-1988) killed between 500,000 and 1,000,000 people, used chemical weapons on
    both sides, and ended in a stalemate neither country has recovered from
- Iran created Hezbollah in Lebanon in 1982, building a proxy force that by 2006 maintained 25,000 fighters,
    a television station (Al-Manar), a social services network, and 12 seats in Lebanon's parliament
- 'Khomeini''s fatwa of July 28, 1988, ordered the execution of all imprisoned members of the Mojahedin-e
    Khalq who remained loyal to the organization; between 2,800 and 5,000 political prisoners were executed
    in mass hangings over several months and buried in unmarked graves — the executions were denied by the
    Islamic Republic until Hossein-Ali Montazeri''s leaked audiotape surfaced in 2016'
- The 1979 constitution established velayat-e faqih as the governing principle of the Islamic Republic,
    creating a theocratic structure without precedent in Shia history — an elected president subordinate
    to an unelected Supreme Leader
- Iran's nuclear program, which began under the Shah with US assistance in the 1960s and accelerated after
    1979, produced the JCPOA (2015) and its collapse (2018) — the standoff that defines the region's security
    architecture in 2026
