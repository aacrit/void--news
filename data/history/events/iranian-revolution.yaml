perspectives:
- viewpoint: Islamic Republican / Khomeini
  viewpoint_type: victor
  region_origin: middle-east
  narrative: 'Khomeini had been writing about Islamic government since 1970. His lecture series in Najaf,
    published as Hokumat-e Eslami (Islamic Government), laid out the doctrine of velayat-e faqih: in the
    absence of the Twelfth Imam — who went into occultation in 874 CE and whose return Shia theology holds
    will occur at the end of time — the most learned and just jurist must govern. This was a theological
    innovation. For centuries, the dominant Shia clerical position, called quietism, held that political
    authority was illegitimate until the Imam''s return. Senior ayatollahs in Najaf and Qom — including Grand
    Ayatollah Abu al-Qasim al-Khoei, then the highest-ranking Shia cleric in the world — rejected velayat-e
    faqih as a distortion of Shia jurisprudence. Khomeini did not need their approval. He needed the streets.


    The cassette tape was his medium. In Najaf, and later in Neauphle-le-Chateau outside Paris, Khomeini
    recorded sermons and messages that were copied by the thousands and smuggled into Iran through mosque
    networks, bazaar merchants, and returning pilgrims. In an era before satellite television, before the
    internet, before social media, the cassette tape was uncensorable: cheap, copyable, portable, impossible
    to trace. By 1978, his voice — measured, authoritative, monotone — was heard in living rooms and prayer
    halls across Iran. He had been in exile for 14 years. Most Iranians under 30 had never seen his face.
    They knew only the voice.


    From Paris, Khomeini played foreign journalists with precision. Between October 1978 and January 1979,
    he gave 132 interviews. He told Le Monde that the Islamic Republic would protect the rights of minorities
    and women. He told The Guardian that there would be freedom of speech and press. He told ABC News that
    he had no personal desire for power and would return to Qom after the revolution to resume his scholarly
    life. On February 1, 1979, he returned to Tehran. He did not return to Qom. He became Supreme Leader.
    He held the position until his death on June 3, 1989.


    The revolution''s speed was its own argument. Mohammad Reza Shah Pahlavi had ruled for 37 years. His
    army numbered 413,000. His SAVAK secret police had agents in every ministry, every university, every
    mosque. The CIA and MI6 had restored him to power in 1953, overthrowing the democratically elected Prime
    Minister Mohammad Mossadegh. The United States had sold him $20 billion in weapons during the 1970s.
    He had nuclear ambitions and American backing. He fell in 13 months. The Supreme Military Council declared
    neutrality on February 11, 1979 — meaning: the army would not fire on the revolution. By evening, the
    Pahlavi dynasty was over. On April 1, 1979, a national referendum on the Islamic Republic received 98.2%
    approval on a turnout of 90%. The ballot offered two options: Islamic Republic, or monarchy. A blank
    line was provided for objections. The Guardian Council later reported that 99.3% of eligible voters had
    participated. No international observers monitored the vote.


    For the Islamic Republican perspective, the revolution was not a political event but a divine one. Khomeini''s
    own language framed it this way: the Iranian people, guided by God, had overthrown a corrupt tyrant and
    his imperial patron. The Islamic Republic was the only legitimate government because it was the only
    government that acknowledged God''s sovereignty over human affairs. The constitution''s preamble states:
    "The Constitution of the Islamic Republic of Iran sets forth the cultural, social, political, and economic
    institutions of Iranian society on the basis of Islamic principles and norms, which represent an honest
    aspiration of the Islamic Ummah." The revolution succeeded because it was, in this framework, not merely
    popular but correct.

    '
  key_arguments:
  - Velayat-e faqih was a theological innovation that broke with Shia quietism, but Khomeini argued it was
      the only legitimate form of governance in the absence of the Twelfth Imam
  - The cassette tape was the revolution's uncensorable medium — cheap, copyable, and impossible for SAVAK
      to trace through mosque and bazaar networks
  - The Shah's 37-year, US-backed, 413,000-strong military apparatus collapsed in 13 months — speed as
      evidence of divine or popular legitimacy
  - The 98.2% referendum result established the Islamic Republic as the will of the people, though no international
      observers monitored the vote
