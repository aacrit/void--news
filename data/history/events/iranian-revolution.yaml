severity: catastrophic
death_toll: 'Revolutionary phase (January 1978-February 1979): estimated 2,781 killed according to the Martyrs
  Foundation, 3,000-10,000 according to independent estimates. Post-revolutionary executions (1979-1989):
  8,000-12,000, including the 1988 mass executions of an estimated 2,800-5,000 political prisoners in a
  few months following a fatwa issued by Khomeini on July 28, 1988.'
affected_population: 'Iran''s population in 1979: approximately 37 million. The revolution restructured the entire
  Middle East: it triggered the Iran-Iraq War (1980-1988, 500,000-1,000,000 dead), created Hezbollah (1982),
  and ended 26 years of US-Iranian alliance.'
duration: 'Revolutionary phase: January 9, 1978 (Qom protests) to February 11, 1979 (Islamic Republic established),
  13 months. The Islamic Republic founded on that date continues to govern Iran in 2026.'
summary: 'On January 7, 1978, the state newspaper Ettela''at published an article titled "Iran and Red and
  Black Colonialism." It called Ayatollah Ruhollah Khomeini — exiled since 1964 — a "British agent," an
  "adventurer," and a man "with an unknown past" who had ties to Indian mystics and communists. The article
  had been written at the order of the Ministry of Information. Two days later, theology students in Qom
  marched in protest. Security forces fired into the crowd. Between 5 and 72 people were killed, depending
  on the source — the government said 2, the opposition claimed 72. Shi''a mourning tradition requires a
  gathering on the 40th day after a death. Forty days later, on February 18, mourners in Tabriz filled the
  streets. Security forces fired. Between 9 and 100 people were killed. Forty days later, mourners gathered
  in Yazd, Isfahan, and 30 other cities. The 40-day cycle — arba''in — became the revolution''s engine. Each
  massacre produced its own mourning. Each mourning produced its own massacre.


  By September 1978, the rhythm had broken open. On September 8 — "Black Friday" — troops opened fire on
  a crowd at Jaleh Square in Tehran. Between 84 (government figure) and 4,000 (opposition figure) were
  killed. The most reliable estimates put the number between 84 and 300. Martial law was declared. It did
  not hold. Oil workers in Abadan, Ahvaz, and Tehran went on strike. Iran''s oil production fell from 5.8
  million barrels per day to 400,000. The Shah''s revenue stopped. His army had weapons but no money to
  deploy them. By December 1978, between 6 and 9 million Iranians were marching in the streets — the largest
  protest in human history as a proportion of national population.


  On January 16, 1979, Shah Mohammad Reza Pahlavi left Iran. He said he was taking a vacation. He was 59
  years old. He carried a box of Iranian soil. He would never return. He died of non-Hodgkin lymphoma in
  Cairo on July 27, 1980, having been refused permanent asylum by every country he asked — the United States,
  Mexico, Panama, the Bahamas, Egypt.


  On February 1, 1979, Ayatollah Ruhollah Khomeini landed at Mehrabad Airport after 14 years of exile —
  first in Turkey (1964-1965), then Najaf, Iraq (1965-1978), then Neauphle-le-Chateau, a village outside
  Paris (1978-1979). Between 3 and 5 million people lined the 26-kilometer route from the airport to the
  Behesht-e Zahra cemetery, where he gave his first speech on Iranian soil. He had never used television.
  His instrument was the cassette tape: sermons recorded in Najaf and Paris, copied in the thousands, smuggled
  into Iran through mosque networks. By 1978, millions of Iranians had heard his voice without seeing his
  face. From Paris, he had given 132 interviews to foreign journalists in five months. On February 11, 1979,
  the Supreme Military Council declared its neutrality — it would not fire on the revolution. By evening,
  the Pahlavi dynasty, which had lasted 54 years and two kings, was over. The US Embassy hostage crisis
  began on November 4, 1979: 52 American diplomats held for 444 days, released on January 20, 1981 — the
  hour Ronald Reagan was inaugurated.

  '
significance: 'The Islamic Republic''s 1979 constitution established velayat-e faqih — the guardianship of the
  jurist — as its governing principle: a senior cleric holds supreme authority over all branches of government.
  No Shia state had operated on this principle before. The constitution created a dual structure: an elected
  president and parliament, subordinate to an unelected Supreme Leader (Khomeini until 1989, Ali Khamenei
  from 1989 to 2026) and a Guardian Council of 12 jurists who vet all candidates and legislation.


  The revolution''s consequences radiated outward. Iraq''s Saddam Hussein invaded Iran on September 22, 1980;
  the war lasted 8 years and killed between 500,000 and 1,000,000. Iran created Hezbollah in Lebanon in
  1982, building a militia and political party that by 2006 had 25,000 fighters and controlled southern
  Lebanon. The US Embassy hostage crisis destroyed Jimmy Carter''s presidency and defined US-Iran relations
  for the next 47 years. Iran''s nuclear program, visible to Western intelligence by 2002, produced the
  Joint Comprehensive Plan of Action (JCPOA) in 2015 — which the United States withdrew from in 2018. The
  revolution demonstrated that Islamism was a viable political form capable of toppling a US-backed, oil-rich,
  nuclear-aspirant monarchy. Every Islamist movement since 1979 — Sunni and Shia — has operated in the shadow
  of that proof.

  '
