perspectives:
- viewpoint: Kongolese Royal / Manikongo
  viewpoint_type: victor
  region_origin: africa
  narrative: 'The Manikongo chose. This is the fact that every other narrative obscures: the king of Kongo was not conquered, not coerced, not tricked. Nzinga a Nkuwu received Portuguese emissaries at Mbanza
    Kongo in 1491, listened to their priests, and decided to accept baptism. He renamed himself Joao I. His capital held 100,000 people. His kingdom stretched from the Congo River to the Kwanza. He had
    an army, trade networks reaching the interior, and a political system that had governed the region for a century. He chose Christianity because it served his purposes — as a diplomatic language, a source
    of literacy, a connection to a wider world.


    His son Afonso I made the choice irrevocable. Coming to power around 1509 after defeating his traditionalist brother in a succession struggle, Afonso built churches, established a school system with
    Portuguese teachers, and sent Kongolese youth to Lisbon and Rome for education. His son Henrique was ordained as a Catholic bishop in 1518 — the first sub-Saharan African bishop in the history of the
    Church. Afonso corresponded with the Portuguese crown as a fellow Christian monarch, equal in dignity if not in naval power. His letters reveal a ruler who understood European protocol, could cite Scripture,
    and expected reciprocity.


    The betrayal was the slave trade. Afonso had assumed the relationship would operate as an alliance: Kongo would receive teachers, physicians, and artisans; Portugal would receive trade goods and access.
    Instead, Portuguese traders — operating from the island of Sao Tome and later from Luanda — treated the kingdom as a labor reservoir. They bypassed the Manikongo''s authority, purchasing captives from
    provincial chiefs, warlords, and anyone willing to sell. Afonso''s 1526 letters to Joao III of Portugal are not pleas. They are sovereign complaints from one ruler to another: you are undermining my
    authority, depopulating my kingdom, and violating our agreement. The Portuguese crown read the letters. It did nothing.


    From the Manikongo''s perspective, the kingdom was destroyed not by European superiority but by European bad faith. Kongo had entered the relationship as a sovereign state seeking modernization on its
    own terms. The Portuguese transformed a diplomatic relationship into an extractive one. By the early 17th century, the governors of Portuguese Angola were conducting slave raids directly into Kongolese
    territory. The Battle of Mbwila in 1665 — where King Antonio I was killed and decapitated — was not a conquest of an inferior civilization. It was the murder of a state that had trusted its ally.


    The kingdom''s Christianity was never the colonizer''s Christianity. Kongolese Catholicism absorbed Kikongo cosmology — ancestor veneration, spirit mediation, the power of nkisi objects — into a syncretic
    practice that horrified European priests as much as it fascinated them. Dona Beatriz Kimpa Vita''s declaration that Jesus was Kongolese was not blasphemy. It was theology. She argued that the Church had
    been corrupted by white intermediaries and that Kongolese people had a direct relationship with Christ. Her movement mobilized thousands. Her execution in 1706 — burning at the stake, on the order of
    a Kongolese king pressured by Capuchin missionaries — reveals both the vitality of Kongolese Christianity and the violence required to contain it.

    '
  key_arguments:
  - The Kongo's conversion to Christianity was a sovereign political decision, not a colonial imposition
  - Afonso I's letters prove that the kingdom engaged with Portugal as an equal and was betrayed
  - The slave trade destroyed the kingdom by undermining royal authority and depopulating the interior
  - Kongolese Christianity was a genuine, creative theological tradition — not a copy of European practice
