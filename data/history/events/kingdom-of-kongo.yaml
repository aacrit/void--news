- viewpoint: Revisionist / Thornton-Heywood School
  viewpoint_type: revisionist
  region_origin: americas
  narrative: 'The dangerous truth about the Kingdom of Kongo is that its people were not only victims. They were also participants.


    John K. Thornton, the foremost American historian of the Kongo, and Linda M. Heywood, his frequent collaborator, have spent four decades reconstructing the agency of Kongolese historical actors. Their
    work — grounded in Portuguese, Italian, and Kikongo-language sources — challenges two opposing mythologies: the colonial myth that Africans had no civilization worth studying, and the anti-colonial myth
    that Africans were passive victims of European aggression.


    The slave trade in the Kongo region was not a European invention imposed on an unwilling society. It was an expansion of existing practices. The Kongo had internal slavery before 1483: war captives, judicial
    offenders, and debtors could be enslaved, and enslaved people could be traded. Portuguese demand intensified the system catastrophically, but the trade operated through Kongolese institutions. The Manikongo
    received customs duties on slave exports. Provincial governors sold captives from their territories. Kongolese war chiefs conducted raids against neighboring peoples — the Tio, the Mbundu, the peoples
    of the interior — specifically to acquire captives for the Atlantic market. Afonso I''s letters protesting the trade are genuine and anguished, but they protest the kidnapping of his own subjects, not
    the institution of slavery itself. He continued to sell war captives from the kingdom''s borders.


    This is not an exoneration of Portugal. Portuguese demand drove the scale of the trade from thousands to millions. Portuguese traders introduced firearms that altered the military balance. Portuguese
    colonial officials in Angola conducted wars of conquest specifically to generate captives. The system was asymmetric: Europe consumed the labor; Africa bore the demographic cost. But within that asymmetric
    system, Kongolese elites were active participants — making choices, negotiating terms, profiting from sales, and fighting wars that generated the captives who filled the ships.


    Thornton''s work on the Battle of Mbwila (1665) demonstrates this complexity. The battle was not a simple Portuguese-vs-Kongolese confrontation. Antonio I was fighting a coalition that included Portuguese
    musketeers, Imbangala mercenaries, and Kongolese rivals from competing lineages. The political fragmentation that followed Mbwila was driven as much by Kongolese internal dynamics — the Kimpanzu vs.
    Kinlaza succession dispute — as by Portuguese intervention. To reduce the kingdom''s collapse to European villainy erases Kongolese political agency even in the narrative of Kongolese destruction.


    Heywood''s work on the Kongolese diaspora extends this argument across the Atlantic. The Kongolese who arrived in the Americas as enslaved people were not a homogeneous mass of victims. They included
    soldiers, priests, nobles, and merchants — people with skills, knowledge, and political experience that they deployed in their new circumstances. The leaders of the Stono Rebellion were likely Kongolese
    elites who had held positions of authority in their homeland. The founders of Afro-Brazilian religious traditions were Kongolese ritual specialists who adapted their practices to new conditions. Erasing
    their agency — treating them as objects of a European trade rather than actors in a transatlantic system — is a second violence: it denies them the complexity of their own history.


    The Thornton-Heywood school does not excuse the slave trade or minimize its horror. It insists that understanding the trade requires acknowledging the full range of human actors — including African ones
    — and that the alternative, a narrative in which Africans exist only as victims, is both historically false and morally patronizing.

    '
  key_arguments:
  - Kongolese elites actively participated in the slave trade — the Manikongo collected customs on slave exports, and provincial governors sold captives
  - Afonso I's letters protested the kidnapping of his own subjects, not the institution of slavery itself — he continued to sell war captives
  - The Battle of Mbwila was a complex political event involving Kongolese factions, not a simple European-vs-African confrontation
  - Erasing African agency — even in narratives of victimhood — is both historically false and morally patronizing
