  emphasized:
  - African agency in the slave trade — Kongolese elites as participants, not just victims
  - The complexity of Kongolese internal politics, including succession wars and factional rivalries
  - The danger of patronizing narratives that deny Africans historical complexity
  - The continuity of Kongolese skills and knowledge in the diaspora
  omitted:
  - The massive asymmetry of power between European and African participants in the trade
  - The degree to which European demand created incentives that distorted Kongolese political institutions
  - The moral weight of 4 million people extracted from the region — agency does not equal equivalence
  - The environmental and demographic devastation of the Kongo region caused by three centuries of depopulation
