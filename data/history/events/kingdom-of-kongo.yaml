title: The Kingdom of Kongo
subtitle: Afonso I wrote to the King of Portugal. His letters survive. The Portuguese kept sending ships.
date_display: c. 1390-1665
date_sort: 1483
date_precision: year
era: early-modern
region: africa
country: Multiple (present-day Democratic Republic of Congo, Republic of Congo, Angola, Gabon)
category: political
severity: major
death_toll: 'An estimated 4 million people were taken from the greater Kongo region between 1500 and 1800 through the transatlantic slave trade; military deaths at the Battle of Mbwila (1665) numbered in
  the thousands, including King Antonio I'
affected_population: 'Population of the Kingdom of Kongo at its height (c. 1500): estimated 500,000 to 2 million within the core kingdom; the broader Kongo cultural zone encompassed several million more'
duration: 'c. 275 years from founding (c. 1390) to the Battle of Mbwila (1665), which ended centralized sovereignty; successor polities persisted into the 19th century'
summary: 'In 1491, the king of a Central African state larger than Portugal received Portuguese missionaries at his capital. Nzinga a Nkuwu, the Manikongo — lord of the Kongo — accepted baptism voluntarily,
  took the name Joao I, and sent his son Mvemba a Nzinga to study with Portuguese priests. The capital, Mbanza Kongo, held an estimated 100,000 people — more than Lisbon. The king chose Christianity. He
  chose it on his own terms.


  His son chose it more fiercely. Mvemba a Nzinga took the throne around 1509 as Afonso I and ruled for 34 years. He built churches, established schools, sent Kongolese students to Europe, and corresponded
  directly with the Portuguese crown. His letters — written in Portuguese, preserved in Lisbon archives — constitute the earliest surviving body of sub-Saharan African diplomatic correspondence with a European
  state. They are formal, literate, and increasingly desperate.


  In 1526, Afonso wrote to King Joao III of Portugal: "Each day the traders are kidnapping our people — children of this country, sons of our nobles and vassals, even people of our own family." He asked
  the king to stop sending merchants. He asked for priests and teachers instead. Joao III did not comply. The slave ships kept arriving. By 1530, the Portuguese traders operating from Sao Tome had bypassed
  the Kongolese court entirely, purchasing captives directly from provincial chiefs and warlords. Afonso wrote again: "In our kingdoms there is another great inconvenience which is of little service to God,
  and this is that many of our people, keenly desirous as they are of the wares and things of your kingdoms, which are brought here by your people, and in order to satisfy their voracious appetite, seize
  many of our people, freed and exempt men." The Portuguese did not answer.


  The kingdom Afonso ruled had been founded roughly a century earlier. Around 1390, a leader named Lukeni lua Nimi — or Nimi a Lukeni in some traditions — consolidated several Kikongo-speaking chieftaincies
  south of the Congo River into a centralized state with its capital at Mbanza Kongo. The kingdom''s political system centered on the Manikongo, who ruled through appointed provincial governors rather than
  hereditary lords — a structure that gave the center unusual power over its periphery. The Kongo controlled trade in copper, iron, raffia cloth (used as currency), ivory, and slaves. Its economy operated
  on nzimbu shells — cowries harvested from the island of Luanda — as currency, a monetary system sophisticated enough that the Portuguese initially accepted it.


  Christianity in Kongo was not a colonial imposition. It was adopted, adapted, and made Kongolese. The kingdom built its own churches, trained its own catechists, and produced its own theological movements.
  The most radical was the Antonian movement of Dona Beatriz Kimpa Vita (c. 1684-1706), a young Kongolese noblewoman who declared that she had been possessed by Saint Anthony. She taught that Jesus, Mary,
  and the saints were Kongolese; that heaven was for Africans; that the white clergy had corrupted Christian truth. She gathered followers in the thousands and occupied the abandoned capital of Mbanza Kongo,
  which had been depopulated by civil war. In 1706, King Pedro IV, pressured by Capuchin missionaries, had her burned at the stake as a heretic. She was 22 years old.


  The Battle of Mbwila on October 29, 1665, ended centralized Kongolese sovereignty. A Portuguese-supported force from Angola met the army of Manikongo Antonio I at the Ulanga River. The Kongolese fielded
  an estimated 20,000 troops; the Portuguese alliance had perhaps 15,000, including Imbangala mercenaries and musketeers. Antonio I was killed on the field. The victors decapitated him. His head was carried
  to Luanda and buried in the chapel of Our Lady of Nazareth. Without a king, the kingdom fractured into competing claimant factions — the Kimpanzu and Kinlaza lineages — and never reunified.


  Between 1500 and 1800, an estimated 4 million people were taken from the greater Kongo region and shipped across the Atlantic. They carried their language, cosmology, and religious practices to Brazil,
  Haiti, Cuba, and the American South. The Kikongo word ''nkisi'' (spirit object) became the root of practices in Brazilian Candomble and Cuban Palo Monte. The Stono Rebellion of 1739 in South Carolina
  — the largest slave uprising in British North America before the Revolution — was led by Kongolese captives who had been Catholic and literate in their homeland.

  '
significance: 'The Kingdom of Kongo produced the earliest surviving African-authored diplomatic protest against the slave trade (Afonso I''s letters, 1526), the first sub-Saharan African state to voluntarily
  adopt Christianity as a state religion (1491), and one of Africa''s first indigenous theological movements (Dona Beatriz Kimpa Vita''s Antonian movement, c. 1704). The greater Kongo region was the single
  largest source area for the transatlantic slave trade, with an estimated 4 million people exported between 1500-1800. Kongolese cultural practices — religious, linguistic, musical — form the substrate
  of African diasporic traditions in Brazil, Cuba, Haiti, and the American South.

  '
