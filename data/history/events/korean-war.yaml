- viewpoint: South Korean / ROK — 6.25 War
  viewpoint_type: vanquished
  region_origin: east-asia
  narrative: 'The date is the name. South Koreans call it "Yugio" — 6.25. June 25. Koreans who lived through
    it measure their lives by the date the way Americans of a later generation measure by September 11. Where
    were you on 6.25. What did you lose.


    Seoul fell in three days. The government fled south. At 2:30 a.m. on June 28, the ROK Army chief of staff
    ordered the Han River bridges destroyed to slow the North Korean advance. Refugees were still crossing.
    The explosions killed approximately 800 civilians on the bridges and stranded the ROK''s own 3rd and 5th
    Divisions north of the river. The officer who gave the order, Colonel Choi Chang-sik, was court-martialed
    and initially sentenced to death. The sentence was later commuted, then overturned.


    What Rhee''s government did next remained hidden for half a century. Between June and September 1950,
    South Korean security forces — army, police, and paramilitary — systematically executed members of the
    Bodo League, a re-education program for suspected leftists. The victims had been required to register;
    their names and addresses were on file. When the war began, the files became kill lists. The South Korean
    Truth and Reconciliation Commission (2005-2010) documented between 100,000 and 200,000 killed. Bodies were
    dumped in mass graves, abandoned mines, and the sea. US Army photographers documented executions near
    Daejeon in July 1950; the photographs were classified. Associated Press photographs of the killings were
    suppressed by the US military censor in Tokyo. The journalist who took them, Major Abbott, was told the
    images would "embarrass the ally."


    At No Gun Ri, a village in central South Korea, US soldiers of the 7th Cavalry Regiment killed an estimated
    250-300 South Korean refugees between July 26 and 29, 1950. Survivors described being strafed from the air
    and then fired upon as they sheltered under a railroad bridge. The Pentagon initially denied the incident.
    An Associated Press investigation in 1999, based on interviews with both Korean survivors and American
    veterans, won the Pulitzer Prize. The US Army''s subsequent review acknowledged that "ichings occurred at
    No Gun Ri" but disputed the scale.


    By the armistice of July 27, 1953, every South Korean city with a population over 50,000 had been
    destroyed. Seoul had changed hands four times. The country was rubble. Its GDP per capita — approximately
    $67 — was lower than Ghana''s, lower than India''s, lower than almost any country that was not actively at
    war. What followed is the fact the war narrative cannot contain: within one generation, South Korea
    became an industrial powerhouse. By 1996, it joined the OECD. By 2024, Samsung alone generated more
    revenue than the GDP of 100 countries. The "Miracle on the Han River" was built on the ashes of 6.25 —
    and on truths the miracle suppressed.


    The Truth and Reconciliation Commission operated from 2005 to 2010. Children of Bodo League victims
    described growing up unable to speak their parents'' names. The commission documented the massacres,
    recommended reparations, and closed. The reparations were never paid. The commission was reconstituted
    in 2020. The work of remembering what the democracy built on the ashes chose to forget continues.

    '
  key_arguments:
  - 6.25 is experienced as a national trauma comparable to Pearl Harbor or 9/11 — the date itself is the name
  - The Bodo League massacre was the largest mass killing by a US-allied government during the Cold War —
    suppressed for 50 years
  - South Korea's economic miracle was built on the devastation of the war and required the suppression of
    inconvenient truths
  - The Truth and Reconciliation Commission (2005-2010) began a reckoning that remains incomplete
