- viewpoint: North Korean / DPRK — Fatherland Liberation War
  viewpoint_type: institutional
  region_origin: east-asia
  narrative: 'In Pyongyang, the war did not begin on June 25, 1950. It began on September 8, 1945, when American
    forces occupied the southern half of Korea and installed a military government that retained Japanese
    colonial administrators and police. It began when the US Military Government declared the Korean People''s
    Republic — a provisional government formed by Korean independence activists in Seoul on September 6, 1945 —
    illegal, and arrested its leaders. It began when Syngman Rhee, who had spent 33 years in the United States,
    was flown back to Korea on MacArthur''s personal plane and installed as president of a state that held its
    first election under UN supervision while leftist parties were banned.


    Bruce Cumings''s The Origins of the Korean War (1981, 1990) documented what DPRK historiography has always
    claimed: the conflict''s roots lay in the 1945 division, not the 1950 invasion. Between 1948 and 1950,
    30,000 to 100,000 people died in political violence in the south — the Jeju uprising (April 1948), the
    Yeosu-Suncheon rebellion (October 1948), guerrilla warfare along the border. Cross-border raids ran in
    both directions. The 38th parallel was not a border; it was a wound. What the DPRK calls the "Fatherland
    Liberation War" frames June 25 not as an unprovoked invasion but as the culmination of a civil war already
    underway.


    The scale and direction of June 25 are clear: North Korean forces launched a full-scale conventional
    invasion southward. Soviet documents declassified after 1991 confirm that Kim Il-sung sought and received
    Stalin''s approval in April 1950. Mao was informed but not consulted. The DPRK narrative omits Stalin''s
    role entirely and frames the war as a purely Korean national liberation struggle.


    What the DPRK narrative carries that other narratives do not is the experience of the bombing. Curtis LeMay
    said the US Air Force "killed off twenty percent of the population." The Strategic Bombing Survey''s own
    data supports the scale: 635,000 tons of bombs, 32,557 tons of napalm. Every city of over 50,000 people
    was destroyed. Pyongyang was bombed until there were no more targets; the Air Force then bombed the
    irrigation dams, flooding the rice paddies during planting season. Dean Rusk, who later became Secretary
    of State, acknowledged: "We were bombing everything that moved in North Korea, every brick standing on top
    of another." The physical destruction of an entire country''s infrastructure — every factory, every bridge,
    every hospital — is embedded in North Korean national memory in a way that has no American equivalent.


    The Sinchon (Sincheon) massacre is central to DPRK collective memory. The DPRK claims 35,000 civilians
    were killed by US forces and ROK allies in Sinchon County, South Hwanghae Province, in October-December
    1950. Western historians dispute the attribution — some killings were committed by anti-communist Korean
    paramilitaries, and the total figure is contested — but the death toll was real. The Sinchon Museum of
    American War Atrocities remains the most visited museum in North Korea.


    The DPRK''s garrison state, its nuclear program, its isolation — all rooted in the memory of total
    destruction by American air power. The lesson Pyongyang drew: the only guarantee against a repeat is a
    nuclear deterrent. In 2006, North Korea tested its first nuclear weapon.

    '
  key_arguments:
  - The war's origins lie in the 1945 US-imposed division and the suppression of the Korean left, not solely
    in the June 25 invasion
  - US bombing destroyed every city in North Korea and killed an estimated 12-15 percent of the population
  - The Sinchon massacre and similar atrocities are central to the DPRK's national narrative and its
    justification for a garrison state
  - North Korea's nuclear program is a direct consequence of the war — the lesson that only nuclear weapons
    prevent a second destruction
