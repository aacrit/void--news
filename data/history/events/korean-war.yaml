connections:
- slug: hiroshima-nagasaki
  relationship: precedes
  description: MacArthur requested 30 to 50 atomic bombs for use along the Chinese border and in North Korea.
    Truman refused. The precedent of Hiroshima — both its demonstrated power and the horror it produced —
    shaped the restraint that kept Korea a conventional war.
- slug: cuban-missile-crisis
  relationship: parallel
  description: Both were Cold War confrontations where nuclear escalation was possible and narrowly avoided
    through political restraint over military advice. Korea established the doctrine of limited war that Cuba
    tested at the nuclear threshold.
- slug: chinese-cultural-revolution
  relationship: follows
  description: The Korean War consolidated Mao's domestic authority and eliminated internal opposition to his
    leadership. Peng Dehuai, the hero of the Chinese intervention, was purged by Mao during the Cultural
    Revolution and died in prison in 1974.
- slug: tiananmen-square
  relationship: regional_context
  description: The Cold War division of Asia that Korea created — the US military presence, the containment
    architecture, the Sino-American confrontation — shaped the geopolitical context within which Tiananmen
    unfolded in 1989.
