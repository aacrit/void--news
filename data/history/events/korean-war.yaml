legacy_points:
- 'No peace treaty has been signed as of 2026 — 73 years after the armistice. The Korean War is technically
  still ongoing. North and South Korea remain in a state of war under a ceasefire agreement signed by a US Army
  general and a North Korean general; the South Korean delegation refused to sign.'
- 'The DMZ: 250 kilometers long, 4 kilometers wide, completely uninhabited and unfarmed since 1953. It has
  become one of the most ecologically pristine habitats in Asia — home to red-crowned cranes, Asiatic black
  bears, and possibly Amur leopards. The war that created the world''s most dangerous border accidentally
  created a wildlife sanctuary.'
- 'Bodo League massacre: between June and September 1950, South Korean security forces executed 100,000-200,000
  suspected leftists and their families. The US Army photographed the killings and the photographs were
  classified. The South Korean Truth and Reconciliation Commission (2005-2010) documented the massacres 50
  years after they occurred.'
- 'Four names for the same war encode four different histories: in the US, "The Korean War" or "The Forgotten
  War"; in South Korea, "6.25" (the date of the invasion); in North Korea, "The Fatherland Liberation War";
  in China, "The War to Resist American Aggression and Aid Korea."'
- 'South Korea''s GDP per capita in 1953: approximately $67 (lower than Ghana''s $179). By 2024: approximately
  $33,000, the 13th largest economy in the world. North Korea''s GDP per capita in 2024: estimated at $640.
  The same people, the same language, the same peninsula.'
- 'Between 1985 and 2018, the Red Cross organized 21 rounds of family reunions: 4,748 South Korean families
  were able to meet separated relatives in the North. Most participants were in their 80s and 90s. An estimated
  100,000+ South Koreans still have living relatives in the North. The waiting list shrinks only through death.'
