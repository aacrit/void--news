category: war
severity: catastrophic
death_toll: '2.5 million Korean civilians dead; 36,574 Americans killed in action; 183,108 Chinese military dead
  (PRC official figure; US estimates range to 400,000); 137,899 South Korean military killed; 215,000-520,000
  North Korean military killed; total including all combatants and civilians: 3-5 million dead'
affected_population: Korea's total population of approximately 30 million; every major Korean city destroyed; 10
  million families separated by the armistice line
duration: 3 years, 1 month, 2 days (June 25, 1950 to July 27, 1953); armistice signed July 27, 1953; no peace
  treaty signed as of 2026
summary: 'June 25, 1950, 4:00 a.m. Korean Standard Time: 75,000 North Korean People''s Army soldiers crossed
  the 38th parallel. Seoul fell in three days. The South Korean Army chief of staff ordered the Han River bridges
  destroyed while refugees were still crossing them. Eight hundred civilians on the bridges died. By mid-September,
  South Korean and American forces held a perimeter around Pusan that covered four percent of the peninsula.


  Douglas MacArthur landed 75,000 troops at Inchon on September 15, 1950. Naval officers called the odds 5,000
  to 1 against success — the harbor had 30-foot tides, a narrow approach channel, and a seawall instead of a
  beach. It worked. Seoul was recaptured by September 28. UN forces crossed the 38th parallel in October and advanced
  toward the Yalu River — the Chinese border. Zhou Enlai warned through the Indian ambassador: China would not
  "sit back with folded hands and let the Americans come up to the border." MacArthur told Truman at Wake Island
  on October 15 that Chinese intervention was unlikely. On October 19, 300,000 Chinese People''s Volunteer Army
  soldiers began crossing the Yalu River at night, moving without vehicles, without fires, carrying their food
  in tubes of dried millet. By late November, they had surrounded the US X Corps at the Chosin Reservoir: 15,000
  US and UN troops encircled by 67,000 Chinese soldiers. Temperatures dropped to minus 35 degrees Fahrenheit.
  Weapons froze. Morphine syrettes froze. In two weeks, 4,385 Americans died; 7,338 were wounded. The Marines
  fought a 78-mile breakout to the sea. General Oliver Smith: "Retreat, hell. We''re just attacking in a different
  direction."


  By January 4, 1951, Seoul had fallen again — the second time in six months. The front stabilized roughly along
  the 38th parallel by mid-1951. Armistice negotiations opened at Kaesong in July 1951, then moved to Panmunjom.
  They lasted two years. The fighting continued while diplomats argued over prisoner repatriation — 21,000 Chinese
  and North Korean POWs refused to go home. During those two years of stalemate, more than half the war''s total
  casualties occurred.


  Curtis LeMay, head of Strategic Air Command: "We burned down every town in North Korea and some in South Korea,
  too." The US Air Force dropped 635,000 tons of bombs on Korea — more than the 503,000 tons dropped in the entire
  Pacific theater during World War II — plus 32,557 tons of napalm. Every North Korean city with a population
  over 50,000 was destroyed. Pyongyang''s destruction rate: 75 percent. Sinuiju: 100 percent. Sariwon: 95 percent.
  MacArthur proposed using 30 to 50 atomic bombs along the Chinese border. Truman fired him on April 11, 1951.
  Mao Zedong sent his eldest son, Mao Anying, to serve on Peng Dehuai''s staff. On November 25, 1950, American
  B-26 bombers napalmed the Chinese command post near the Chosin Reservoir. Mao Anying was eating rice at a stove
  — the heat signature visible from the air. He was 28. Mao was informed days later and said: "In a revolution,
  you have to pay a price."

  '
significance: 'The war produced the most militarized border on earth: 2 million soldiers face each other across
  250 kilometers of minefields and barbed wire, 73 years after the shooting stopped. It split 10 million families
  — people who have not seen parents, children, or siblings since 1953. It was the first direct military confrontation
  between the United States and China, a dynamic that defines the geopolitics of the 21st century. It established
  the template for American Cold War intervention — containment doctrine, limited war, massive air power — that
  would be applied, and found insufficient, in Vietnam. South Korea''s GDP per capita in 1953 was lower than
  Ghana''s; by 2024, it was the 13th largest economy in the world. North Korea experienced famine in the 1990s
  that killed 600,000 to 2.5 million people. The same peninsula, the same people, the same language, separated
  by a line drawn by two American colonels in August 1945 using a National Geographic map.

  '
