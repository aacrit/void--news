slug: korean-war
title: The Korean War
subtitle: A lawyer who had never visited Korea drew the border. Three years later, 3 million were dead. The war
  ended with an armistice. No peace treaty has followed.
date_display: 1950-1953
date_sort: 1950
date_precision: year
