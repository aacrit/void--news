- viewpoint: Chinese — War to Resist American Aggression and Aid Korea
  viewpoint_type: institutional
  region_origin: east-asia
  narrative: 'The Politburo voted against intervention four times. Mao wanted to fight. The generals did not.
    The People''s Republic of China was one year old. The treasury was empty. The army had no air force, no
    navy, and no experience fighting a mechanized Western military. Lin Biao, Mao''s most capable commander,
    declined the command on grounds of illness — a refusal widely understood as political dissent. Peng Dehuai
    was the one who agreed. On October 2, 1950, Peng told the Politburo: "If the American troops reach our
    border, they could find a pretext at any time to invade." Mao gave the order. On October 19, the People''s
    Volunteer Army began crossing the Yalu River at night.


    Stalin had promised Soviet air cover. He withdrew the promise. The Chinese crossed without air support,
    without artillery superiority, without adequate winter clothing. They carried their ammunition on their
    backs and their food — tubes of dried millet and sorghum — in cloth bandoliers. Their tactical doctrine
    was based on what they had: numbers, night movement, and an infantry trained by twenty years of civil war
    and guerrilla fighting against Japan. They attacked at night, using bugles and whistles instead of radios.
    American soldiers who survived the first Chinese assault at Unsan on November 1, 1950, described waves of
    soldiers appearing from the darkness in white quilted uniforms, silent until the bugles blew.


    The Chosin Reservoir campaign was the war''s inflection point. Nine Chinese divisions — approximately
    67,000 troops under the command of Song Shilun — surrounded 15,000 UN troops in temperatures that reached
    minus 35 degrees Fahrenheit. Chinese casualties at Chosin were catastrophic: an estimated 19,202 battle
    deaths and 28,954 non-battle casualties, the majority from frostbite. Entire companies froze to death in
    their positions. One Chinese unit was found in formation on a ridge, every soldier frozen in his firing
    position, weapons aimed at the road below.


    Mao sent his eldest son. Mao Anying was 28 years old, a Russian-trained engineer serving as a translator
    on Peng Dehuai''s staff at the Chinese command post near the Chosin Reservoir. On November 25, 1950, Mao
    Anying and a staff officer, Gao Ruixin, were heating food on a stove in a wooden-roofed building. Two US
    B-26 bombers spotted the smoke. The napalm hit the building directly. Both men were burned beyond
    recognition. Peng Dehuai cabled Beijing. Mao''s secretary, Ye Zilong, delayed informing Mao for weeks.
    When Mao was told, he sat in silence, then said: "In a revolution, you have to pay a price." Mao Anying''s
    body was buried in Korea. It remains there. Mao never visited the grave.


    The PRC''s official death toll is 183,108; Western estimates range to 400,000. The Chinese People''s
    Volunteer Army fought with inferior equipment, no air cover, and supply lines running through 300 miles
    of mountains under constant bombardment. That they held — and pushed the front back to the 38th parallel —
    is the central fact of the war in Chinese memory. In 2020, Xi Jinping called it "a declaration that the
    Chinese people have stood up in the East."

    '
  key_arguments:
  - Mao's decision to intervene was contested within the Politburo — Peng Dehuai's argument about border
    security was decisive
  - The Chinese fought without Soviet air cover, without mechanized transport, and with inferior equipment —
    and fought the US to a standstill
  - Mao Anying's death personalized the cost of war at the highest level of Chinese leadership
  - The war established the PRC's military credibility and remains central to Chinese national identity
  sources:
  - title: 'China''s Road to the Korean War: The Making of the Sino-American Confrontation'
    author: Jian Chen
    year: '1994'
    type: book
    archive_url: https://archive.org/details/chinasroadtokore0000chen
  - title: 'Mao''s Generals Remember Korea'
    author: Xiaobing Li, Allan R. Millett, and Bin Yu (eds.)
    year: '2001'
    type: book
  - title: 'Mao: The Unknown Story'
    author: Jung Chang and Jon Halliday
    year: '2005'
    type: book
    archive_url: https://archive.org/details/maounknownstory00chan
  - title: 'The Dragon Strikes: China and the Korean War, June-December 1950'
    author: Patrick C. Roe
    year: '2000'
    type: book
  notable_quotes:
  - text: If the American troops reach our border, they could find a pretext at any time to invade.
    speaker: Peng Dehuai
    context: Address to the Politburo, October 2, 1950, arguing for Chinese intervention
  - text: In a revolution, you have to pay a price.
    speaker: Mao Zedong
    context: Reaction upon learning of his son Mao Anying's death, late November 1950
  emphasized:
  - The Politburo's internal debate and the contested nature of the decision to intervene
  - Chinese soldiers' sacrifice under extreme conditions with inferior equipment
  - Mao Anying's death as the personal cost of national commitment
  - The war as the founding military experience of the People's Republic
  omitted:
  - Stalin's manipulation of Mao — encouraging intervention while withdrawing promised air support
  - Chinese treatment of UN prisoners of war, including forced political indoctrination
  - The actual scale of Chinese casualties, which the PRC has never fully disclosed
  - The domestic political consequences for Peng Dehuai, who was purged during the Cultural Revolution

- viewpoint: Civilian / Divided Families
  viewpoint_type: vanquished
  region_origin: east-asia
  narrative: 'Lee Bok-soon was 22 years old when the war began. She lived in Kaesong, a city that was in the
    South before the war and in the North after. Her husband had gone to Seoul for work three weeks before
    June 25. When the border shifted, he was on one side and she was on the other. She never saw him again.
    She is one of 10 million.


    The armistice of July 27, 1953, drew a line that separated families as arbitrarily as the original 38th
    parallel had separated the country. People who had crossed the line for work, for family visits, for market
    day, found themselves in a different country overnight. No telephone calls. No letters. No way to know
    whether a parent, a child, a spouse was alive or dead. The division was total and immediate. It has lasted
    73 years.


    In 1983, the Korean Broadcasting System aired a program called "Finding Dispersed Families." It was
    intended to run for two hours. It ran for 453 hours and 45 minutes over 138 days, the longest live
    television broadcast in history. 100,952 people applied to appear. 10,189 were reunited with family
    members, most of them living in the South. The broadcast showed elderly Koreans holding placards with
    names and hometowns, weeping on camera when a sibling or a cousin or a childhood friend called the station.
    The program won the UNESCO Memory of the World designation in 2015.


    The Red Cross organized 21 rounds of in-person family reunions between South and North Korea, from 1985 to
    2018. The format was always the same: 100 families from each side were selected by lottery, transported to
    the Diamond Mountain resort in North Korea, and given three days together — six meetings totaling eleven
    hours. 4,748 South Korean families participated over 33 years. At each reunion, participants were in their
    70s, 80s, 90s. They met siblings they had last seen as teenagers. They exchanged photographs of
    grandchildren who had never met. On the final day, buses pulled away while family members pressed their
    hands against the windows.


    An estimated 133,000 South Koreans registered for the reunion lottery. By 2024, more than half had died
    waiting. The youngest applicants were in their late 70s. The program has been suspended since 2018. North
    Korea has periodically agreed to video reunions, then canceled them. Each year, several thousand more names
    are removed from the waiting list — not because they were selected, but because they died.


    The DMZ itself became the war''s most paradoxical monument. Two hundred fifty kilometers long, four
    kilometers wide, the most heavily mined strip of land on earth. Two million soldiers face each other
    across it. Because no human has farmed or walked through it in 73 years, it has become one of the most
    ecologically pristine habitats in Asia — red-crowned cranes, white-naped cranes, Asiatic black bears,
    dozens of fish species found nowhere else on the peninsula. The world''s most dangerous border is also
    an accidental nature reserve — the only ecosystem on earth created by a war that never ended.


    Lee Bok-soon applied for the reunion lottery in 1985. She was not selected. She reapplied every year until
    2007, when she died at the age of 79. Her husband''s fate is unknown. She is one of 10 million.

    '
  key_arguments:
  - 10 million families were separated by the armistice line — a human cost that no political or military
    narrative adequately accounts for
  - The Red Cross family reunion program provided 11 hours of contact after 30-60 years of separation for
    4,748 families; more than half the applicants died waiting
  - The 1983 KBS broadcast — 453 hours, the longest live TV broadcast in history — revealed the scale of
    the separation to the South Korean public
  - The DMZ is simultaneously the world's most militarized border and an accidental ecological sanctuary —
    a paradox that encapsulates the war's unresolved legacy
  sources:
  - title: 'Separated Families: The Korea Red Cross Tracing and Reunion Program'
    author: International Committee of the Red Cross
    year: '2019'
    type: report
  - title: 'The DMZ: Dividing the Two Koreas'
    author: Richard Dunford and Sean Kelly
    year: '2021'
    type: book
  - title: 'Korea''s Grievous War'
    author: Su-kyoung Hwang
    year: '2016'
    type: book
    doi: 10.9783/9780812292312
  - title: 'Finding Dispersed Families (broadcast archive)'
    author: Korean Broadcasting System (KBS)
    year: '1983'
    type: archive
  notable_quotes:
  - text: I just want to know if he is alive. That is all. Just whether he is alive.
    speaker: Unnamed elderly South Korean woman
    context: KBS Finding Dispersed Families broadcast, 1983; quoted in KBS archive, UNESCO Memory of the
      World submission
  - text: Eleven hours. After sixty years. And then the bus pulls away.
    speaker: Unnamed Red Cross reunion participant
    context: Reported by journalists covering the inter-Korean family reunions, Mount Kumgang, 2015
  emphasized:
  - The human scale of separation — 10 million families, 73 years, no contact
  - The inadequacy of 11 hours of reunion after decades of separation
  - The DMZ as ecological paradox — destruction producing preservation
  - The waiting list that shrinks only through death
  omitted:
  - The political instrumentalization of family reunions by both Korean governments
  - North Korean families' experiences of separation, which are largely undocumented
  - The psychological effects on second and third generations who grew up with the absence
  - South Korean government restrictions on contact with North Korea that compound the separation
