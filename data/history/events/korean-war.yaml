perspectives:
- viewpoint: American / UN Coalition
  viewpoint_type: institutional
  region_origin: north-america
  narrative: 'Dean Rusk and Charles Bonesteel, two young US Army colonels, were given thirty minutes and a
    National Geographic map on the night of August 10, 1945. Their task: draw a line dividing the Korean
    peninsula into American and Soviet occupation zones. They chose the 38th parallel because it placed Seoul
    in the American zone. Neither had been to Korea. Five years later, 36,574 Americans would die defending that
    line.


    Truman committed US forces on June 27, 1950, two days after the invasion, without a Congressional declaration
    of war. He called it a "police action" — a term that would follow the war through seven decades of American
    ambivalence. The UN Security Council authorized a multinational force only because the Soviet Union was
    boycotting the Council over the refusal to seat the People''s Republic of China. Had the Soviet delegate been
    in his chair, the veto would have killed the resolution. Twenty-one nations eventually contributed troops;
    the United States provided 88 percent of the non-Korean forces.


    The Inchon landing was MacArthur at his most audacious. The Joint Chiefs opposed it. The Navy said the tidal
    conditions made it impossible. MacArthur told the skeptics: "We shall land at Inchon, and I shall crush
    them." The 30-foot tides, the narrow Flying Fish Channel, the seawall — all the objections proved
    surmountable. Within two weeks, Seoul was recaptured and the North Korean supply lines severed. It was the
    last unambiguous American victory of the war.


    Then MacArthur crossed the 38th parallel and marched north. The CIA told Truman that Chinese intervention
    was possible but unlikely. MacArthur told Truman at Wake Island that the Chinese would not intervene, and
    that if they did, "there would be the greatest slaughter." On November 25, 1950, 300,000 Chinese soldiers
    materialized in the mountains. David Halberstam''s The Coldest Winter (2007) describes what followed at the
    Chosin Reservoir: 15,000 US and UN troops surrounded by 67,000 Chinese in temperatures of minus 35 degrees
    Fahrenheit. Weapons jammed. Blood plasma froze. Medics could not cut through frozen clothing to reach wounds.
    The Marines fought their way out over 78 miles to the port of Hungnam, carrying their dead. 4,385 Americans
    died in two weeks.


    MacArthur publicly demanded the authority to bomb Chinese cities, blockade the Chinese coast, and deploy
    Chiang Kai-shek''s Nationalist Chinese forces from Taiwan. He wrote to House Republican leader Joseph Martin
    on April 5, 1951: "There is no substitute for victory." Truman fired him on April 11. MacArthur returned
    to a ticker-tape parade in New York and an address to Congress. Truman''s approval rating dropped to 23
    percent. General Omar Bradley, Chairman of the Joint Chiefs, testified before the Senate that MacArthur''s
    plan would have involved the US "in the wrong war, at the wrong place, at the wrong time, and with the
    wrong enemy."


    The war ended where it started — at the 38th parallel. The Veterans Memorial in Washington lists 54,246
    American dead. The Korean War is called "The Forgotten War" — sandwiched between the mythology of World
    War II and the trauma of Vietnam. It produced no Saving Private Ryan, no Apocalypse Now. It validated
    containment as doctrine — and created the template for Vietnam, where containment would fail.

    '
  key_arguments:
  - The UN authorization was a Cold War accident — the Soviet boycott enabled a resolution that would otherwise
    have been vetoed
  - Inchon was a military masterpiece; the decision to cross the 38th parallel was a strategic disaster
  - MacArthur's dismissal established the principle of civilian control over military strategy in nuclear-age
    warfare
  - The war validated containment doctrine and created the operational template later applied in Vietnam
