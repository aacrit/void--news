- viewpoint: Modern African Historiographic / Postcolonial
  viewpoint_type: revisionist
  region_origin: africa
  narrative: 'In 1830, the German philosopher Georg Wilhelm Friedrich Hegel delivered lectures at the University of Berlin in which he declared that Africa "is no historical part of the world; it has no
    movement or development to exhibit." This judgment — delivered by Europe''s most influential philosopher, repeated in curricula across the colonial world for a century — was a foundational lie. The
    Mali Empire and Mansa Musa''s hajj are the rebuttal.


    The modern African historiographic project begins with demolition. Cheikh Anta Diop, the Senegalese physicist and historian, argued in Nations negres et culture (1954) and The African Origin of Civilization:
    Myth or Reality (1974) that African civilizations had been systematically erased from world history. Ancient Egypt, he contended, was a Black African civilization whose achievements had been attributed
    to a Mediterranean or "Hamitic" race to maintain the fiction of African primitiveness. Joseph Ki-Zerbo, the Burkinabe historian, opened his General History of Africa (1981) — written for UNESCO as a
    corrective to colonial historiography — with the statement: "African history is not something that begins with the arrival of Europeans." The Mali Empire is Ki-Zerbo''s central example: a state of 40-50
    million people, controlling the world''s largest gold supply, with a university city and a written scholarly tradition, existing centuries before European contact with the interior of Africa.


    The numbers dismantle Hegel''s claim. At its height under Mansa Musa (c. 1325), the Mali Empire covered approximately 1.3 million square kilometers — larger than France, Germany, Spain, and Italy combined.
    Its population of 40-50 million exceeded that of any contemporary European state (England had approximately 5 million in 1300; France, the largest European kingdom, had approximately 20 million). The
    empire controlled two-thirds of the Old World''s gold supply. Timbuktu''s libraries held 400,000-700,000 manuscripts. The Sankore Madrasah enrolled an estimated 25,000 students — more than the University
    of Paris at the same period.


    The manuscript collections of Timbuktu are the physical evidence that survives the epistemological assault. Abdel Kader Haidara, a Timbuktu librarian, spent decades in the late 20th century collecting
    manuscripts from family libraries across the Sahel — texts that had been hidden, buried, or stored in chests for generations. By 2012, the Ahmed Baba Institute held over 30,000 manuscripts, with hundreds
    of thousands more in private hands. These texts — astronomical tables, mathematical proofs, medical treatises, legal opinions, poetry, correspondence — prove that sub-Saharan Africa produced written
    scholarship in Arabic and African languages for centuries. When jihadist groups occupied Timbuktu in 2012 and burned parts of the Ahmed Baba Institute, Haidara and a network of local families smuggled
    approximately 350,000 manuscripts to safety in Bamako in a months-long covert operation. The rescue was funded by international donors but executed by Malians who understood what was at stake: the physical
    proof that Africa has a history.


    The historiographic battle is not over. The "Africa had no history" narrative persists in popular culture, in textbook coverage (a 2017 study by scholars at SUNY found that the average world history
    textbook devoted 12% of its content to Africa, of which over half concerned the slave trade and colonialism), and in the framing of Africa as a continent of problems rather than achievements. Mansa
    Musa''s consistent appearance on lists of "the richest person in history" (CelebrityNetWorth estimated his wealth at $400 billion in 2012; Time and the BBC followed) represents a partial correction,
    but one that reduces a complex civilization to a single metric — wealth — rather than engaging with the political, intellectual, and cultural systems that produced it.


    The postcolonial reading insists on two things simultaneously. First, that the Mali Empire was real — that it existed, that it mattered, and that its erasure from world history was an act of intellectual
    violence. Second, that celebrating the Mali Empire as a counternarrative carries its own risks: romanticizing a slaveholding empire, eliding the perspectives of conquered peoples, and defining African
    achievement in terms that European historiography sets (wealth, territory, military power) rather than in terms that Africans might choose (the griot tradition, the Charter of Kurukan Fuga, the intellectual
    community of Timbuktu).

    '
  key_arguments:
  - Hegel's 'Africa has no history' was a foundational lie — the Mali Empire is the empirical refutation
  - Timbuktu's manuscripts are physical proof of African written scholarship spanning centuries
  - The erasure of African civilizations from world history was an act of intellectual violence that served colonial interests
  - Celebrating the Mali Empire must not romanticize a slaveholding empire or define African achievement solely in European terms
