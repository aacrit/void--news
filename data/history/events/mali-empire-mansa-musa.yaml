  title: Mansa Musa in the Catalan Atlas, 1375
  description: Detail from the Catalan Atlas, produced by Abraham Cresques on Majorca in 1375, showing Mansa Musa seated on a throne holding a gold nugget. This is the first depiction of a sub-Saharan African
    ruler in European cartography. The image was based on accounts of Musa's 1324 hajj that had reached Mediterranean merchants through the trans-Saharan trade network. Musa wears a European-style crown
    — a projection by the cartographer — and is labeled 'Rex Melli' (King of Mali).
