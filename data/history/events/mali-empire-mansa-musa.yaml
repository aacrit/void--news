summary: 'In 1324, Mansa Musa — King of Kings of the Mali Empire, ruler of a territory stretching from the Atlantic coast to the bend of the Niger River — set out on the hajj to Mecca. He did not travel
  quietly. The caravan included 60,000 men, 12,000 slaves each carrying four pounds of gold bars, 80 camels each carrying 300 pounds of gold dust, and hundreds of attendants dressed in Persian silk and
  brocade. The procession crossed the Sahara, passed through Cairo, and continued to Mecca. The total amount of gold Musa carried has been estimated at 18 tons.


  When the caravan reached Cairo in July 1324, Musa distributed gold to officials, merchants, and the poor with such generosity that he depressed the price of gold in Egypt for 12 years. Al-Umari, an Arab
  historian who visited Cairo 12 years later, interviewed eyewitnesses who still remembered the economic disruption: gold lost 10-25% of its value on the Cairo exchange, and inflation rippled across the
  Mediterranean trading network. A single man''s charity — or display of power — had distorted the economy of the wealthiest city between China and Italy. On his return journey, Musa attempted to correct
  the damage by borrowing gold from Cairo''s moneylenders at high interest, becoming perhaps the only medieval ruler to manipulate a foreign economy in both directions during a single trip.


  The empire Musa ruled had been founded nearly a century earlier. Around 1235, Sundiata Keita — the "Lion King" — defeated Sumanguru Kante of the Sosso Kingdom at the Battle of Kirina and established the
  Manding Empire, which Europeans later called Mali. Sundiata''s story survives through the griots — hereditary oral historians and musicians — whose recitations of the Sundiata epic remain a living literary
  tradition in West Africa. The epic describes Sundiata as a crippled child who could not walk until the age of seven, then rose to become the conqueror who unified the Mande peoples. The Charter of Kurukan
  Fuga, traditionally attributed to Sundiata''s assembly of 1236, established governance principles including the prohibition of slavery for Mande people, the protection of women, and the requirement of
  consensus among clans — though historians debate the charter''s authenticity and dating.


  Under Musa (r. 1312-1337), the Mali Empire reached its zenith. It controlled the gold mines of Bambuk and Bure (producing an estimated two-thirds of the Old World''s gold supply), the salt mines of Taghaza
  in the Sahara, and the trans-Saharan trade routes connecting sub-Saharan Africa to North Africa and the Mediterranean. The empire''s wealth rested on a simple exchange: gold moved north; salt, textiles,
  horses, and manufactured goods moved south. Timbuktu, which Musa incorporated into the empire after his return from the hajj, became a center of Islamic scholarship. The Sankore Madrasah, rebuilt under
  Musa''s patronage, attracted scholars from across the Islamic world and housed a library that eventually grew to an estimated 400,000-700,000 manuscripts — texts on astronomy, mathematics, medicine, law,
  and theology written in Arabic, Fulfulde, and other African languages.


  Ibn Battuta, the Moroccan traveler who visited Mali in 1352 during the reign of Musa''s successor Mansa Sulayman, left the most detailed contemporary account. He praised the Malians'' devotion to Islam,
  their insistence on memorizing the Quran, and their administration of justice. He was less impressed by their food (he found the diet monotonous) and was scandalized by the freedom of Malian women, who
  went unveiled, entertained male visitors, and exercised economic independence that would have been unthinkable in the Maghreb. Ibn Battuta''s discomfort reveals both the cosmopolitan character of the
  Mali Empire and its cultural distance from the Islamic heartlands — a society that had adopted Islam on its own terms, not as a colonial imposition.


  The empire declined after Musa''s death in 1337. Succession disputes, provincial rebellions, and the rise of the Songhai Empire under Sunni Ali (r. 1464-1492) eroded Malian power. By the mid-15th century,
  the Songhai had captured Timbuktu. But the manuscripts survived. Many were hidden in private libraries, buried in sand, or passed down through families. In the 2000s, the Ahmed Baba Institute of Higher
  Learning and Islamic Research in Timbuktu held over 30,000 manuscripts, with hundreds of thousands more in private collections across the Sahel. In 2012, when jihadist groups occupied Timbuktu, librarians
  smuggled approximately 350,000 manuscripts to safety in Bamako — a rescue operation funded by international donors and executed by Malian families who had guarded the texts for centuries.

  '
significance: 'The Mali Empire controlled an estimated two-thirds of the Old World''s gold supply and a territory of 1.3 million square kilometers — larger than western Europe. Mansa Musa''s 1324 hajj crashed
  Cairo''s gold market for 12 years and placed Mali on the European map: the Catalan Atlas of 1375 depicts Musa on a throne holding a gold nugget, making him the first sub-Saharan African ruler depicted
  in European cartography. Timbuktu''s manuscript collections — 400,000-700,000 texts on astronomy, mathematics, medicine, and law — constitute the largest body of pre-colonial African written scholarship
  and survive today in the Ahmed Baba Institute and private family libraries. The Sundiata epic, preserved by griots for 800 years, remains a living oral literary tradition performed across West Africa.

  '
