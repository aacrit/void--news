  title: Djinguereber Mosque, Timbuktu
  description: The Djinguereber Mosque in Timbuktu, built under Mansa Musa's patronage in 1327 after his return from the hajj. Designed by the Andalusian architect Abu Ishaq al-Sahili, it is constructed
