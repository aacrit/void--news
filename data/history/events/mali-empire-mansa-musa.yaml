connections:
- target_slug: transatlantic-slave-trade
  connection_type: consequence
  description: The Mali Empire's successor states — Songhai, Jolof, Kanem-Bornu — were devastated by the Atlantic slave trade beginning in the 16th century; the trans-Saharan slave trade, in which Mali
    participated, was older and continued alongside it
- target_slug: scramble-for-africa
  connection_type: influenced
  description: France conquered the territory of the former Mali Empire in the 1890s, erasing the memory of African sovereignty and renaming the region French Sudan; the modern Republic of Mali, independent
    in 1960, took its name from the medieval empire as an assertion of pre-colonial identity
- target_slug: the-crusades
  connection_type: parallel
  description: 'Both events occurred in the same medieval period (13th-14th centuries) and demonstrate the interconnected Islamic world: Mansa Musa''s hajj (1324) crossed the same Mediterranean trade networks
    that supplied the crusader states, and both events were documented by Arabic-language historians'
