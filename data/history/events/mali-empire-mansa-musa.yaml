- viewpoint: Songhai / Subject Peoples
  viewpoint_type: vanquished
  region_origin: africa
  narrative: 'The Mali Empire was an empire. This means it was built on the conquest and subordination of peoples who did not choose Malian rule. The Sundiata epic celebrates the unification of the Mande
    peoples, but the empire that grew from Sundiata''s victory at Kirina extended far beyond the Mande homeland, incorporating Wolof, Serer, Tukulor, Songhai, Mossi, and dozens of other ethnic and linguistic
    groups through a combination of military conquest, tributary arrangements, and strategic marriages.


    The Songhai people of the middle Niger — centered on the city of Gao — were the most prominent subject population. Gao had been a trading center since at least the 9th century, part of a Niger River
    commercial network that predated the Mali Empire by centuries. Under Malian rule, Gao served as the empire''s eastern anchor, its merchants and boatmen facilitating the trade that enriched Niani and
    Timbuktu. The Songhai elite chafed under Malian overlordship. According to the Tarikh al-Sudan (a 17th-century Timbuktu chronicle), Songhai princes were held as hostages at the Malian court, and Songhai
    cities paid tribute in gold, slaves, and grain.


    When Mali weakened after Musa''s death, the Songhai seized their opportunity. Sunni Ali (r. 1464-1492) captured Timbuktu in 1468 and Djenne in 1473, establishing the Songhai Empire as Mali''s successor
    state. Under Askia Muhammad I (r. 1493-1528), the Songhai Empire surpassed Mali in territory and administrative sophistication, extending from the Atlantic coast to present-day Nigeria. The Songhai
    did not reject Mali''s legacy — they built on it, maintaining the trans-Saharan trade, the Islamic scholarly institutions, and the administrative framework. But they recentered the empire on Gao rather
    than Niani, and they replaced the Mande elite with a Songhai-Zarma ruling class.


    The nomadic Tuareg, who controlled the Saharan trade routes and the salt mines of Taghaza, occupied an ambiguous position. They were essential to the Mali Empire''s economy — without Tuareg caravan
    drivers, the gold-for-salt exchange could not function — but they resented Malian political control over the desert. The Tuareg sacked Timbuktu in 1433, during a period of Malian weakness, and held
    the city until Sunni Ali''s Songhai forces expelled them. Tuareg oral traditions remember the Mali Empire not as a golden age but as a period of southern domination over the desert peoples.


    The Mossi kingdoms of the Volta River region (present-day Burkina Faso) raided Malian territory repeatedly. The Mossi sacked Timbuktu in 1329 — five years after Musa''s hajj — and conducted raids into
    the Niger bend throughout the 14th and 15th centuries. The Mossi never accepted Islam or Malian suzerainty; they maintained their own political and religious systems in direct opposition to the Islamicized
    Mande order. Their resistance complicates the narrative of the Mali Empire as a harmonious Islamic civilization: from the south, it looked like an aggressive, expansionist state whose claims to universal
    governance were backed by cavalry and taxes.


    The question of slavery is unavoidable. Musa''s hajj caravan included 12,000 slaves carrying gold. The trans-Saharan slave trade, which predated the Mali Empire and continued long after it, moved an
    estimated 7.2 million enslaved Africans across the Sahara between 650 and 1900 (according to Ralph Austen''s estimates). The Mali Empire participated in and profited from this trade. Slaves were a form
    of currency, tribute, and labor. The empire''s gold mines were worked partly by enslaved people. The griot tradition acknowledges the existence of slavery within Mande society — the caste system included
    a slave (jon) category — but the imperial narrative focuses on the prohibition of Mande-on-Mande enslavement, obscuring the enslavement of non-Mande peoples.

    '
  key_arguments:
  - The Mali Empire was built on the conquest and subordination of non-Mande peoples — Songhai, Tuareg, Wolof, Mossi, and others
  - The Songhai Empire replaced Mali and recentered West African power on Gao, proving that Mali's golden age was not the only framework for West African civilization
  - The trans-Saharan slave trade was integral to the Malian economy — 12,000 slaves accompanied Musa's hajj alone
  - Subject peoples — Tuareg, Mossi — resisted and rejected Malian authority, complicating the narrative of harmonious empire
