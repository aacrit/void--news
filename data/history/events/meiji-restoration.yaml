perspectives:
- viewpoint: Meiji Reformers / Oligarchs
  viewpoint_type: victor
  region_origin: east-asia
  narrative: 'The Iwakura Mission of 1871-1873 defines the reformers'' worldview. Okubo Toshimichi, Kido Takayoshi, Ito Hirobumi,
    and 46 other officials — accompanied by 60 students, including five young women sent to study in America — spent 22 months
    touring the United States, Britain, France, Germany, Russia, and eleven other countries. They inspected factories, shipyards,
    parliaments, courtrooms, postal systems, mines, and museums. They met Bismarck, Grant, and Queen Victoria. They took notes
    on everything. The mission''s five-volume report, compiled by Kume Kunitake, runs to 2,000 pages and reads as a systematic
    audit of Western civilization conducted by men who intended to replicate its results without accepting its dominance.


    The program they implemented upon returning was comprehensive. The Conscription Ordinance of 1873 replaced the samurai
    warrior class with a national army of peasant conscripts — a direct adoption of the French model that the Prussians had
    used to defeat Napoleon III. The Education Ordinance of 1872 established compulsory elementary education for all children,
    male and female. The Land Tax Reform of 1873 converted feudal rice levies into cash taxes, creating a modern fiscal base.
    The abolition of the han (feudal domains) in 1871 replaced 260 semi-autonomous territories with centralized prefectures
    governed by appointed officials. The samurai stipends — consuming 40% of state revenue — were commuted to bonds in 1876.
    The banking system, postal service, telegraph network, and railway were built simultaneously.


    Ito Hirobumi drafted the constitution after a second tour of Europe in 1882-1883, during which he studied with Rudolf
    von Gneist in Berlin and Lorenz von Stein in Vienna. He chose the Prussian model deliberately: a strong executive (the
    emperor, advised by a cabinet answerable to him rather than to the legislature), a bicameral legislature with limited
    powers, and a written bill of rights subject to legal restriction. The constitution, promulgated on February 11, 1889
    — chosen as the mythological founding date of the Japanese empire — was presented as a gift from the emperor to his subjects,
    not as a contract between government and governed.


    The reformers'' defense of their program rested on results. Japan renegotiated the unequal treaties by 1899, ending extraterritoriality.
    It defeated China in 1894-1895, gaining Taiwan and a sphere of influence in Korea. It defeated Russia in 1904-1905, gaining
    southern Sakhalin and recognition as a great power. It joined the Allies in World War I and received Germany''s Pacific
    colonies as mandates. In fifty years, Japan moved from a country forced to sign unequal treaties to a country that imposed
    them on others. The oligarchs — Ito, Yamagata, Matsukata, Oyama — saw no contradiction in this trajectory. They had built
    a modern state to survive in a world where the strong consumed the weak; survival required strength; strength required
    an empire.


    The cost was accepted as necessary. Saigo Takamori''s Satsuma Rebellion of 1877 — the last armed resistance of the old
    order — was crushed by the conscript army Saigo himself had helped create. The oligarchs mourned Saigo personally (the
    emperor rehabilitated his name in 1889) but never doubted the decision. The peasant uprisings of the 1870s and 1880s —
    over 200 recorded between 1868 and 1885, many in response to conscription and the land tax — were suppressed without altering
    policy. Modernization was not optional; its terms were not negotiable.

    '
  key_arguments:
  - The Iwakura Mission produced a systematic audit of Western institutions — Japan adopted what worked and rejected what
    did not
  - The Prussian constitutional model was chosen deliberately to maintain executive authority during rapid modernization
  - 'Results validated the program: unequal treaties renegotiated by 1899, China defeated by 1895, Russia defeated by 1905'
  - The cost — dissolution of the samurai class, suppression of peasant revolts — was accepted as the price of sovereignty
