severity: major
death_toll: ~30,000 in the Boshin War (1868-1869); ~20,000 in the Satsuma Rebellion (1877); civilian deaths from famine, displacement,
  and industrialization uncounted
affected_population: Japan's population of ~35 million in 1868; the entirety of Japanese society was restructured within a
  generation
duration: 1868-1912 (Emperor Meiji's reign); core reforms 1868-1889
