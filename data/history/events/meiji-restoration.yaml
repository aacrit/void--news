  emphasized:
  - Destruction of the samurai class as the revolution's human cost
  - Tokugawa Japan's genuine achievements — peace, literacy, urbanization, cultural sophistication
  - Saigo Takamori's tragedy — architect of the Restoration who died fighting the state he created
  omitted:
  - The rigidity of the caste system — peasants, artisans, and merchants were subordinated to samurai by birth
