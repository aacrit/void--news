- viewpoint: Tokugawa Loyalists / Samurai Class
  viewpoint_type: vanquished
  region_origin: east-asia
  narrative: 'Saigo Takamori died on September 24, 1877, on a hillside called Shiroyama, above the castle town of Kagoshima.
    He had been wounded in the hip during the final charge. His attendant, Beppu Shinsuke, beheaded him and buried the head
    to prevent it from being taken as a trophy. Of the 40,000 samurai who had joined the Satsuma Rebellion, roughly 20,000
    were dead. The conscript army they faced — peasant soldiers equipped with Murata rifles and Gatling guns — outnumbered
    them four to one and outgunned them entirely. Saigo''s rebellion was the last stand of a class that had governed Japan
    for seven centuries. It ended in a bamboo thicket with a short sword.


    The samurai had not simply lost a battle. They had lost their identity. The Meiji reforms systematically dismantled everything
    that defined the samurai class. The abolition of the han in 1871 eliminated their administrative function. The Conscription
    Ordinance of 1873 — which made every male citizen a potential soldier — eliminated their military monopoly. The Sword
    Abolishment Edict of 1876 prohibited them from carrying the swords that had been their caste marker for centuries. The
    commutation of stipends in 1876 converted their guaranteed income into bonds that rapidly depreciated. A class that had
    constituted 5-7% of the population — roughly 1.9 million people, including family members — was told, in the space of
    eight years, that everything they were no longer mattered.


    Saigo''s opposition to the Meiji government was not reactionary nostalgia. He had been one of the three great architects
    of the Restoration — alongside Okubo and Kido — and had commanded imperial forces in the Boshin War. His break with the
    government came over Korea. In 1873, Saigo proposed a diplomatic mission to Korea that he expected to result in his own
    assassination, providing a casus belli. Okubo and the Iwakura faction, just returned from Europe, vetoed the plan: Japan
    was not yet strong enough for foreign wars. Saigo resigned. His real grievance was broader: the reformers had betrayed
    the Restoration''s promise. They had promised to restore the emperor and the ancient values; instead, they had created
    a centralized bureaucratic state that served Western-educated technocrats while the samurai — who had fought and died
    to make it possible — were discarded.


    The Tokugawa order that the Restoration destroyed had maintained 265 years of internal peace. The Tokugawa shogunate,
    established in 1603, had ended a century of civil war (the Sengoku period). Its system of sankin-kotai — requiring domain
    lords to alternate residence between their home provinces and Edo — created a national road system, a domestic market
    economy, and a proto-bourgeois culture. Tokugawa Japan had a literacy rate estimated at 40-50% for males — comparable
    to Britain and higher than most of Europe. Edo (now Tokyo) had a population of over one million by 1720, making it one
    of the largest cities in the world. The sakoku (closed country) policy, which restricted foreign contact from the 1630s,
    was not irrational isolation but a calculated strategy to prevent the fate that had befallen the Philippines and parts
    of India — colonization by European powers using trade as a beachhead.


    The conservative critique is not that Japan should have remained feudal but that the speed and violence of the transition
    were unnecessary. The Tokugawa system was already evolving — its merchant class was already wealthy, its cultural production
    was already sophisticated, its administrative apparatus was already professional. A gradual transition, preserving the
    social bonds and moral code (bushido) that had held Japanese society together, might have produced modernization without
    the social dislocation, militarism, and eventual catastrophe that followed.

    '
  key_arguments:
  - The samurai class was systematically destroyed — their military function, legal identity, income, and caste markers all
    abolished within eight years
  - Saigo's rebellion was not reactionary — he was one of the Restoration's architects who opposed the direction it took
  - Tokugawa Japan was not a stagnant feudalism — it had high literacy, a million-person capital, and 265 years of peace
  - The speed of reform destroyed social bonds that could not be rebuilt — bushido was erased without replacement
