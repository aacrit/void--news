  - Samurai class privilege was maintained at the expense of the other 93-95% of the population
- viewpoint: Western Observer / Perry's Legacy
  viewpoint_type: bystander
  region_origin: americas
  narrative: 'Commodore Matthew Perry arrived in Edo Bay on July 8, 1853, with four warships — two steam-powered side-wheel
    frigates (the Mississippi and Susquehanna) and two sloops of war. The ships were painted black; the Japanese called them
    kurofune — black ships. Perry carried a letter from President Millard Fillmore requesting (in language that left no room
    for refusal) trade relations, coaling stations for American trans-Pacific steamers, and protection for shipwrecked sailors.
    He refused to deal with lower-ranking officials, fired his guns as a "salute" that doubled as a demonstration of firepower,
    and gave the Japanese a year to respond. He returned in February 1854 with nine ships. The Treaty of Kanagawa, signed
    on March 31, 1854, opened two ports.


    The Western narrative of the Meiji Restoration frames Perry''s arrival as the catalyst — the external shock that broke
    the Tokugawa system''s isolation and forced Japan into the modern world. This narrative has a self-congratulatory subtext:
    Western contact (however coercive) brought modernity; Japan''s response (however painful) validated Western civilization
    as the standard to which all societies must aspire. Townsend Harris, the first American consul to Japan, wrote in 1857
    that his role was "to bring a new country and a new people into the family of nations." The assumption that Japan was
    not already a "nation" but needed Western sponsorship to become one was embedded in the diplomatic language itself.


    The unequal treaties — signed with the United States (1858), Britain, France, the Netherlands, and Russia in quick succession
    — imposed extraterritoriality (Western nationals could not be tried in Japanese courts), fixed low tariffs (Japan could
    not protect its infant industries), and opened additional ports to foreign trade. These treaties became the defining grievance
    of the Restoration. The sonno joi ("Revere the Emperor, Expel the Barbarians") movement of the 1860s united anti-Tokugawa
    opposition around the demand to end the foreign presence. The irony — which Western observers rarely acknowledged — was
    that the men who overthrew the shogunate in the name of expelling the foreigners became, upon taking power, the most aggressive
    Westernizers in Japanese history.


    Western observers of the Meiji period oscillated between admiration and anxiety. Basil Hall Chamberlain''s Things Japanese
    (1890) and Lafcadio Hearn''s Glimpses of Unfamiliar Japan (1894) presented Japan as an aesthetic wonderland — elegant,
    courteous, and reassuringly alien. But Japan''s military victories produced a different reaction. The defeat of China
    in 1895 unsettled Western commentators who had assumed Asian weakness was permanent. The defeat of Russia in 1905 provoked
    outright alarm. Kaiser Wilhelm II of Germany coined the phrase "yellow peril" (gelbe Gefahr) in 1895 to describe the threat
    of an industrialized, militarized Asia. The Times of London, which had praised Japan''s modernization for three decades,
    began warning of Japanese expansionism within a year of Tsushima.


    The Western perspective reveals its own contradictions most clearly in the response to Japan''s demand for racial equality
    at the Versailles Peace Conference in 1919. Japan — by then an Allied power that had contributed naval forces to the Mediterranean
    war effort — proposed inserting a racial equality clause into the League of Nations Covenant. Woodrow Wilson, who chaired
    the session, ruled that the proposal had not achieved unanimous consent (despite receiving a majority vote of 11 to 6)
    and struck it from the record. Australia and the United States led the opposition. Japan had modernized, industrialized,
    and fought alongside the Western Allies — and was told that the rules of the international order did not apply equally
    to non-white nations.

    '
  key_arguments:
  - Perry's arrival was the external shock that broke the Tokugawa system, but Western framing of this as 'bringing modernity'
    was self-serving
  - Unequal treaties were the defining grievance — Japan modernized specifically to renegotiate them
  - Western admiration turned to anxiety when Japan demonstrated military capacity — the 'yellow peril' response to Tsushima
  - The racial equality proposal at Versailles (1919) exposed the limits of Western universalism
  sources:
  - title: Narrative of the Expedition of an American Squadron to the China Seas and Japan
    author: Commodore Matthew Perry (compiled by Francis L. Hawks)
    year: '1856'
    type: archive
  - title: 'Facing the Rising Sun: African Americans, Japan, and the Rise of Afro-Asian Solidarity'
    author: Gerald Horne
    year: '2018'
    type: book
  - title: 'Japan Rising: The Iwakura Embassy to the USA and Europe 1871-1873'
    author: Kume Kunitake (ed. Chushichi Tsuzuki and R. Jules Young)
    year: '2009'
    type: book
  notable_quotes:
  - text: If the Japanese seek by any action of theirs, to oppose the march of American commerce, they must be taught a lesson.
    speaker: Commodore Matthew Perry
    context: Personal journal, 1853
  - text: The Japanese are, in truth, a remarkable people. Their progress in all that constitutes national greatness is without
      precedent.
    speaker: Townsend Harris
    context: Dispatch to the U.S. State Department, 1859
  emphasized:
  - Perry's coercion as the catalyst — black ships, forced treaties, gunboat diplomacy
  - Western admiration conditional on Japanese subservience — turning to alarm when Japan became a peer competitor
  - The Versailles racial equality clause rejection as proof that Western universalism had racial limits
  omitted:
  - Japan's internal dynamics — the Restoration was driven by domestic factions, not by Western influence alone
  - The sophistication of Tokugawa-era diplomacy and selective engagement with the outside world
  - The experience of ordinary Japanese people during the transformation
- viewpoint: Modern Academic / Asian Comparativist
  viewpoint_type: academic
  region_origin: global
  narrative: 'The question that defines Meiji historiography is not what happened but why it happened in Japan and not elsewhere.
    China faced the same Western pressure — arguably earlier and more brutally (the Opium Wars began in 1839, fourteen years
    before Perry''s arrival). The Ottoman Empire, Qajar Persia, Siam, and Ethiopia all confronted Western expansion in the
    same period. Only Japan produced a comprehensive institutional transformation that preserved sovereignty and achieved
    industrial capacity within a single generation. The comparative question — why Japan and not China, not the Ottomans,
    not India? — has generated a century of scholarship and remains unresolved.


    The structural explanation focuses on institutional differences between Tokugawa Japan and Qing China. Japan''s feudal
    system, paradoxically, provided the competition and decentralization that enabled reform. The 260 han (domains) were semi-autonomous
    political units whose lords competed for prestige and resources. Satsuma and Choshu — the domains that led the Restoration
    — had independently begun military modernization in the 1850s, purchasing Western weapons and training troops. China''s
    centralized imperial bureaucracy, by contrast, resisted institutional reform because every change threatened the interests
    of existing power-holders. When Zeng Guofan''s and Li Hongzhang''s "Self-Strengthening Movement" attempted selective modernization
    in the 1860s-1870s, it was undercut by the court, the bureaucracy, and the Empress Dowager Cixi''s conservative faction.
    Japan''s decentralization produced competition; China''s centralization produced paralysis.


    E.H. Norman''s Japan''s Emergence as a Modern State (1940) — the first Marxist analysis of the Meiji Restoration — argued
    that the revolution was a "bourgeois revolution from above": a transformation of property relations and class structure
    carried out by a narrow oligarchy rather than a mass movement. Norman pointed out that the Meiji reformers were not democrats
    — they suppressed the Freedom and People''s Rights Movement (Jiyu Minken Undo) of the 1880s, which demanded popular sovereignty
    and parliamentary government. The constitution they produced in 1889 placed sovereignty in the emperor, not the people;
    the Diet had advisory powers, not legislative supremacy. The Meiji state was authoritarian, militarist, and capitalist
    — and it was these features, Norman argued, that led directly to the fascism of the 1930s.


    The postcolonial critique inverts the Western admiration narrative. Japan''s modernization came at the expense of its
    neighbors. Korea was forced to sign an unequal treaty with Japan in 1876 — twelve years before Japan renegotiated its
    own. Taiwan was colonized in 1895. Korea was annexed in 1910 and subjected to forced labor, cultural suppression (the
    Korean language was banned in schools from 1938), and the "comfort women" system. Japan''s success in avoiding colonization
    enabled it to become a colonizer. Andre Schmid''s Korea Between Empires (2002) and Alexis Dudden''s Japan''s Colonization
    of Korea (2005) document how Meiji Japan adopted the rhetoric, legal frameworks, and civilizing-mission ideology of European
    imperialism to justify its own expansion.


    The gender dimension of Meiji modernization receives less attention than it warrants. The 1872 Education Ordinance mandated
    education for girls as well as boys, but the curriculum diverged sharply: boys studied mathematics, science, and military
    drill; girls studied "good wife, wise mother" (ryosai kenbo) — a domesticity ideology that borrowed from Victorian gender
    norms and codified them as Japanese tradition. Sharon Sievers''s Flowers in Salt (1983) and Mara Patessio''s Women and
    Public Life in Early Meiji Japan (2011) document the women — Kishida Toshiko, Fukuda Hideko, Tsuda Umeko — who challenged
    these boundaries. Kishida''s 1883 speech "Daughters in Boxes" attacked the confinement of women to domestic roles; she
    was arrested under the Public Assembly Ordinance. Tsuda Umeko, sent to America at age six as part of the Iwakura Mission,
    returned to found Tsuda University for women in 1900.

    '
  key_arguments:
  - 'The comparative question — why Japan and not China — is explained by institutional differences: feudal decentralization
    vs. imperial centralization'
  - 'Norman''s Marxist analysis: the Meiji Restoration was a bourgeois revolution from above that produced authoritarian capitalism,
    not democracy'
  - Japan's success in avoiding colonization enabled it to become a colonizer — Korea, Taiwan, Manchuria
  - Women were included in educational reform but excluded from political participation and confined to the 'good wife, wise
    mother' ideology
  sources:
  - title: 'Japan''s Emergence as a Modern State: Political and Economic Problems of the Meiji Period'
    author: E.H. Norman
    year: '1940'
    type: book
  - title: Korea Between Empires, 1895-1919
    author: Andre Schmid
    year: '2002'
    type: book
  - title: 'Flowers in Salt: The Beginnings of Feminist Consciousness in Modern Japan'
    author: Sharon Sievers
    year: '1983'
    type: book
  - title: The Making of Modern Japan
    author: Marius Jansen
    year: '2000'
    type: book
