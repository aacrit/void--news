hero_image_attribution: Uchida Kuichi, 1873, public domain via Wikimedia Commons
summary: 'On January 3, 1868, samurai from the Satsuma, Choshu, Tosa, and Hizen domains seized the gates of the Imperial Palace
  in Kyoto and declared the "restoration" of imperial rule. The fifteen-year-old Emperor Meiji — born Mutsuhito, enthroned
  six weeks earlier after his father''s sudden death — issued a decree abolishing the 265-year-old Tokugawa shogunate. The
  last shogun, Tokugawa Yoshinobu, had formally surrendered his authority two months before, but his forces fought on. The
  Boshin War lasted sixteen months. At the Battle of Toba-Fushimi in January 1868, 5,000 Satsuma-Choshu troops armed with
  modern rifles defeated 15,000 Tokugawa troops armed mostly with swords and matchlocks. The technological gap decided the
  battle in four days. By May 1869, the last Tokugawa holdouts at Hakodate in Hokkaido surrendered. The shogunate was finished.


  The men who carried out the "restoration" — Okubo Toshimichi, Kido Takayoshi, Saigo Takamori, Ito Hirobumi, Yamagata Aritomo
  — were not restoring anything. They were building a modern state from components they had studied, borrowed, copied, and
  adapted from every major Western power. Their urgency had a source: China. Japan''s leaders had watched the Qing dynasty
  lose two wars to Britain (1839-1842, 1856-1860), cede Hong Kong, open five treaty ports, and accept extraterritorial jurisdiction
  for foreign nationals — humiliations imposed on a civilization that had dominated East Asia for two millennia. Commodore
  Matthew Perry''s four warships in Edo Bay in July 1853, and the unequal treaties that followed, delivered the same message
  to Japan: modernize or be colonized.


  The speed of transformation had no historical precedent. In 1868, Japan was a feudal society organized by hereditary caste
  — samurai, farmers, artisans, merchants. By 1889, it had a written constitution (modeled on Prussia''s), a bicameral legislature
  (the Diet), a conscript army (modeled on France''s and then Germany''s), a national education system (achieving 95% male
  literacy by 1905), a railway network (from zero track in 1868 to 4,700 miles by 1904), and a navy that would destroy the
  Russian Baltic Fleet at Tsushima in 1905. Japan was the first non-Western nation to defeat a European great power in modern
  warfare. The cost of this transformation — the dissolution of the samurai class, the suppression of peasant revolts, the
  erasure of regional autonomy, the psychological dislocation of an entire society remade in a generation — was borne by those
  who had no voice in the decisions that reshaped their world.

  '
significance: 'Japan was the only non-Western nation in the 19th century to industrialize on its own terms, without being
  colonized or partitioned. The Meiji Constitution of 1889 made Japan the first Asian country with a constitutional government.
  Japan''s victory over Russia at Tsushima (1905) — where Admiral Togo''s fleet sank 21 of 38 Russian ships — shattered the
  assumption of European military invincibility and inspired anti-colonial movements from India (where the Indian National
  Congress cited it as proof that Asians could defeat Europeans) to the Ottoman Empire to Persia. The same industrial and
  military apparatus that produced Tsushima also produced the imperial expansion into Korea (annexed 1910), Manchuria (invaded
  1931), China (1937), and Southeast Asia (1941-1942) — a trajectory that ended at Hiroshima. Meiji Japan''s path from feudal
  society to industrial empire to atomic destruction in 77 years remains the most compressed arc of modernization, conquest,
  and catastrophe in modern history.

  '
