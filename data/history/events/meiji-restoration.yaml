connections:
- target_slug: opium-wars
  connection_type: influenced
  description: Japan watched the Qing dynasty lose two wars to Britain, cede Hong Kong, and accept extraterritorial jurisdiction
    — and chose a path of preemptive modernization to avoid the same fate
- target_slug: hiroshima-nagasaki
  connection_type: consequence
  description: The industrial and military apparatus built during the Meiji period enabled Japan's imperial expansion into
    Korea, Manchuria, China, and Southeast Asia — a trajectory that ended at Hiroshima in 1945
- target_slug: scramble-for-africa
  connection_type: parallel
  description: Japan's modernization occurred during the same decades as the European scramble for colonial territory — Japan
    avoided being partitioned and instead became a partitioner (Korea 1910, Manchuria 1931)
