legacy_points:
- Japan industrialized in 30 years without being colonized — the only non-Western nation to do so in the 19th century
- Tsushima (1905) was the first modern defeat of a European great power by a non-European nation
- The Meiji Constitution (1889) was the first written constitution in Asia
- The same modernization that enabled self-defense also enabled imperial expansion — Korea (1910), Manchuria (1931), Pearl
  Harbor (1941)
- Fukuzawa's An Encouragement of Learning sold 3.4 million copies in a country of 35 million — roughly 1 copy for every 10
  people
