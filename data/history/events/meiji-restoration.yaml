    speaker: E.H. Norman
    context: Japan's Emergence as a Modern State, 1940
  - text: Heaven does not create one man above or below another man.
    speaker: Fukuzawa Yukichi
    context: An Encouragement of Learning, 1872 — though Fukuzawa later advocated Japanese imperialism in Asia
  emphasized:
  - Comparative analysis — why Japan succeeded where China, the Ottomans, and others did not
  - The trajectory from defensive modernization to imperial aggression as a structural outcome, not an aberration
  - Women's exclusion from political rights despite educational inclusion
  - The authoritarian character of Meiji constitutionalism
  omitted:
  - The lived experience of rapid modernization — psychological and cultural dislocation at the individual level
  - The Ainu and Ryukyuan peoples, whose incorporation into the Japanese state involved cultural erasure
  - The role of religion (Shinto as state ideology) in legitimating the Meiji system
