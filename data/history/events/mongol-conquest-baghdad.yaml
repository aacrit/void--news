  notable_quotes:
  - text: Geography is the condition of civilization. When the center falls, the margins inherit.
    speaker: Ahmad Dallal
    context: Islam, Science, and the Challenge of History, 2010, on the post-Baghdad dispersal
  - text: The Maragheh Observatory represented not only the culmination of Islamic astronomical tradition but its transplantation — from the destroyed library to the conqueror's new commission.
    speaker: George Saliba
    context: Islamic Science and the Making of the European Renaissance, 2007
  emphasized:
  - The survival and dispersal of Islamic intellectual traditions to Cairo, Anatolia, India, and Ilkhanid Iran
  - Cairo's Al-Azhar as the inheritor of Baghdad's scholarly mantle under the Mamluks
  - The Maragheh Observatory as a paradox — Islamic science advanced under the patronage of the civilization's destroyers
  - Rumi as a product of the Mongol-era intellectual diaspora
  omitted:
