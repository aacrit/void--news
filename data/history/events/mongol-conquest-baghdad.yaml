  notable_quotes:
  - text: The Mongols made no technological breakthroughs, founded no new religions, wrote few books or dramas... yet, as their empires grew, they blazed new links among civilizations.
    speaker: Jack Weatherford
    context: Genghis Khan and the Making of the Modern World, 2004
