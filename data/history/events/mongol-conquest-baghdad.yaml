summary: 'On February 10, 1258, Hulagu Khan''s army breached the walls of Baghdad and began killing. The last Abbasid caliph, al-Musta''sim bi-llah, had refused Hulagu''s demand to surrender and dismantle
  his fortifications. His army of 20,000 — many of them demoralized and unpaid — faced a Mongol force historians estimate at 120,000-150,000, augmented by Chinese siege engineers, Georgian Christian cavalry,
  and Armenian troops. The caliph''s vizier, Ibn al-Alqami, a Shia Muslim in a Sunni court, had allegedly advised al-Musta''sim to reduce the army and negotiate rather than fight. Whether Ibn al-Alqami
  actively betrayed the caliph to the Mongols — as Sunni chronicles unanimously claim — or simply gave bad counsel remains one of medieval history''s contested questions.


  The killing continued for at least a week. Hulagu, following Mongol custom, ordered the caliph executed without spilling royal blood — al-Musta''sim was rolled in a carpet and trampled by horses. Some
  sources say he was forced to watch his sons killed first. The Mongol principle was that royal blood shed on the ground would offend the Eternal Blue Sky (Tengri); the carpet preserved the superstition
  while achieving the objective. The method''s specificity — its administrative precision amid general carnage — became a defining detail in the event''s retelling.


  Baghdad in 1258 was the intellectual capital of the Islamic world. The House of Wisdom (Bayt al-Hikma), founded under Caliph al-Ma''mun in the early 9th century, had housed one of the largest libraries
  in the world. Scholars there had translated Aristotle, Galen, Euclid, and Ptolemy from Greek into Arabic, preserving texts that would have otherwise been lost to Europe. Mathematicians at the House of
  Wisdom developed algebra (from al-jabr, the Arabic title of al-Khwarizmi''s 9th-century treatise) and refined the Hindu numeral system into the "Arabic numerals" used worldwide today. Multiple Arabic
  sources report that the Mongols threw the library''s books into the Tigris, and that the river ran black with ink for days. Whether this happened literally or metaphorically is debated; what is not debated
  is that the library was destroyed and its contents lost.


  But destruction was not the whole story. Hulagu brought with him Nasir al-Din al-Tusi, the Persian polymath — astronomer, mathematician, philosopher, theologian. Al-Tusi had been held at the Ismaili fortress
  of Alamut (destroyed by the Mongols in 1256) and joined Hulagu''s entourage, either as a willing collaborator or a captive who made the best of his situation. After Baghdad fell, Hulagu commissioned al-Tusi
  to build the Maragheh Observatory in northwestern Persia — the most advanced astronomical facility in the world, stocked with books, instruments, and scholars salvaged from the cities the Mongols had
  sacked. The observatory''s "Tusi couple," a mathematical device for resolving circular planetary motion, later appeared in Copernicus''s De Revolutionibus (1543). The same campaign that destroyed one
  center of learning created another.


  The Abbasid Caliphate had ruled the Islamic world, in diminishing fact and enduring symbolism, since 750. By 1258, the caliph''s actual political power extended barely beyond Baghdad''s walls, but his
  symbolic authority — as the nominal head of Sunni Islam, the legitimate successor to the Prophet — remained immense. His destruction left a vacuum in Islamic political theology that was never fully filled.
  The Mamluk Sultanate of Egypt, which defeated the Mongols at Ain Jalut in 1260, installed a shadow Abbasid caliphate in Cairo, but it carried no real authority. The Ottoman sultans eventually claimed
  the caliphate in the 16th century. When Ataturk abolished it in 1924, the institution that ended traced its symbolic lineage through the rupture of 1258.

  '
significance: 'The fall of Baghdad in 1258 ended the Abbasid Caliphate — the longest-reigning dynasty in Islamic history (508 years) — and marks the conventional endpoint of the Islamic Golden Age. The
  destruction of the House of Wisdom eliminated a center of translation and synthesis that had preserved Greek philosophy and science during Europe''s early medieval period; many texts survived only because
  Arabic translations made in Baghdad were later re-translated into Latin by scholars at Toledo and Palermo. The Mongol conquest redirected trade routes: the Silk Road''s western terminus shifted from Baghdad
  to Tabriz and later to the Ottoman-controlled Mediterranean. The sack''s death toll — somewhere between 90,000 and 2,000,000 depending on the source — illustrates how radically accounts of the same event
  can diverge based on the narrator''s interests. In modern Arab and Islamic historiography, the fall of Baghdad functions as a civilizational catastrophe comparable to the fall of Rome — a hinge point
  after which the Islamic world''s scientific and cultural preeminence declined relative to Europe. Jack Weatherford''s Genghis Khan and the Making of the Modern World (2004) reframed the Mongol conquests
  as a net globalizing force: the Pax Mongolica connected China to Europe, standardized trade law across Eurasia, and spread technologies (printing, gunpowder, the compass) that would reshape the world.
  The fall of Baghdad sits at the center of both narratives — catastrophe and connection, depending on who is telling the story.

  '
