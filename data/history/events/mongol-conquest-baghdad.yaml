perspectives:
- viewpoint: Mongol Imperial / Ilkhanid
  viewpoint_type: victor
  region_origin: central-asia
  narrative: 'The Mongol conquest of Baghdad was not an act of gratuitous destruction. It was a calculated military operation within a strategic campaign that Genghis Khan had envisioned before his death
    in 1227: the westward extension of Mongol authority to encompass the entire known world. Hulagu Khan, Genghis''s grandson, received his commission from the Great Khan Mongke at the 1253 kurultai (assembly).
    His orders were specific: destroy the Ismaili Assassins at Alamut, compel the Abbasid caliph''s submission, and extend Mongol authority to the borders of Egypt.


    Hulagu followed standard Mongol diplomatic protocol. He sent envoys to Caliph al-Musta''sim demanding submission, the dismantling of Baghdad''s fortifications, and personal attendance at the Mongol
    court. This was not a formality — the Mongols genuinely offered survival to those who submitted. Cities that opened their gates were incorporated into the empire with their populations, administration,
    and economic life largely intact. Samarkand and Bukhara, which had resisted and been destroyed by Genghis Khan in 1220, were rebuilt and prospered under Mongol rule. Mosul, which submitted to Hulagu
    before the Baghdad campaign, was spared. The choice was binary: submit or be destroyed. Al-Musta''sim chose defiance.


    The execution of al-Musta''sim followed the Mongol principle that royal blood must not touch the ground. This was not cruelty for its own sake — it was a specific application of Tengri-based cosmology
    that governed how the Mongols treated defeated royalty. Guyuk Khan had executed the Russian princes at the Battle of the Kalka River (1223) in the same manner. The practice reflected a worldview in
    which sovereignty was divinely ordained and its termination required ritual precision.


    The Mongol perspective, as articulated by court historians like Ata-Malik Juvayni and Rashid al-Din, framed the conquests as the imposition of order on a fragmented world. Juvayni, a Persian Muslim
    who served the Mongol administration, began his History of the World Conqueror by acknowledging the devastation but arguing that it served a providential purpose. The Abbasid Caliphate, in this reading,
    had become corrupt, militarily impotent, and internally divided — a hollow institution that could not defend its own capital. The Sunni-Shia tensions that had paralyzed al-Musta''sim''s court were evidence
    of a civilization''s decadence. The Mongols did not destroy a functioning civilization; they swept away a failing one.


    Hulagu''s post-conquest administration tells a different story than simple destruction. He established the Ilkhanate — a Mongol state governing Persia, Iraq, and parts of Anatolia and the Caucasus —
    with its capital at Tabriz, not Baghdad. He patronized scholars, artists, and administrators regardless of religion. Nasir al-Din al-Tusi''s Maragheh Observatory was the most advanced scientific institution
    of its era: it employed astronomers from China, Persia, and the Islamic world, and its star catalogs were used for centuries. Rashid al-Din, who served as vizier to later Ilkhanid rulers, compiled the
    Jami al-Tawarikh — the first true world history, covering the Mongols, Chinese, Indians, Franks, Jews, and Muslims in a single comprehensive work. The Mongol empire, whatever its methods of expansion,
    created conditions for cultural exchange on a scale the Islamic world under the Abbasids had never achieved.

    '
  key_arguments:
  - 'Baghdad was given the standard Mongol ultimatum: submit and survive, or resist and be destroyed — al-Musta''sim chose resistance'
  - The Abbasid Caliphate was already politically impotent and internally divided; the Mongols did not destroy a functioning civilization
  - Post-conquest Mongol patronage — the Maragheh Observatory, Rashid al-Din's world history — created new centers of learning
  - The Ilkhanate connected the Islamic world to China and Europe, enabling cultural and technological exchange on an unprecedented scale
