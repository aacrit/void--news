perspectives:
- viewpoint: Mongol Imperial
  viewpoint_type: victor
  region_origin: central-asia
  narrative: 'The Secret History of the Mongols, written in 1228 or shortly after — the only Mongol-authored narrative of the
    empire''s founding — opens not with conquest but with ancestry. Temüjin''s origin is traced to a blue-grey wolf and a
    fallow doe who crossed the Tengis Sea. The mythic genealogy establishes a claim older than any city, any scripture, any
    rival dynasty. The steppe was home before civilization existed.


    Temüjin''s rise from abandoned child to Great Khan is a story of merit defeating aristocracy. His father Yesügei was
    poisoned by Tatars when Temüjin was nine. His clan abandoned the family. His half-brother Begter challenged his authority;
    Temüjin killed him. He was captured by the Tayichi''ud and wore a cangue (wooden collar) until he escaped with the help
    of a family that sheltered him at risk of their own lives. Every future Mongol policy — the destruction of tribal
    aristocracies, the promotion of commoners by merit, the loyalty demanded of subordinates — traces to these formative
    humiliations. Genghis Khan did not inherit power. He built it from nothing, and he restructured Mongol society to ensure
    that no one could be abandoned as he had been.


    The Yasa — Genghis Khan''s law code, compiled at the 1206 kurultai and expanded throughout his reign — established
    principles that no contemporary state matched. Religious freedom was absolute: Buddhist, Christian, Muslim, and shamanist
    subjects worshipped without restriction. Diplomatic envoys were inviolate — the Khwarezmian governor''s execution of
    Mongol merchants was, by Mongol law, a casus belli as clear as a declaration of war. Theft was punishable by death.
    Adultery was punishable by death. A soldier who failed to pick up equipment dropped by the rider ahead of him was
    punishable by death. The discipline was brutal and the discipline worked: a Mongol army could cover 100 kilometers
    per day, every soldier carrying dried meat and blood-clotting agents, fighting from horseback with compound bows
    accurate at 300 meters.


    The Yam postal system — relay stations every 25-30 miles, maintained by local populations under imperial mandate —
    connected the empire from Korea to Hungary. Marco Polo described 10,000 stations with 200,000 horses. Papal envoys,
    Persian merchants, Chinese administrators, and European missionaries traveled under Mongol safe-conduct. William of
    Rubruck, a Franciscan friar sent by Louis IX of France, reached Karakorum in 1254 and found a city where Nestorian
    Christian churches, Buddhist temples, and mosques stood on the same streets. A Parisian goldsmith named Guillaume
    Boucher had been captured by Mongol forces in Hungary and set to work building a silver fountain for the khan''s
    palace that dispensed four different drinks through four lion heads.


    The Mongol self-narrative acknowledges the killing. The Secret History does not euphemize. But it frames destruction
    as consequence, not goal. Cities that surrendered were absorbed — their craftsmen, administrators, and soldiers
    incorporated into the Mongol system. Cities that resisted were destroyed as exemplary punishment. Genghis Khan did
    not conquer to colonize. He conquered to control trade routes, to eliminate threats, and to punish those who violated
    the norms he had established. The empire was not an occupation. It was a network.

    '
  key_arguments:
  - Genghis Khan rose from abandonment and enslavement to build an empire through merit, not inheritance
  - The Yasa established religious freedom, diplomatic immunity, and rule of law across the largest empire in history
  - Destruction was policy — cities that surrendered were spared, cities that resisted were examples
  - The Yam postal system and trade protection created the pre-modern world''s most integrated communication network
  sources:
