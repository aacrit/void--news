  notable_quotes:
  - text: The Mongol Empire as a whole is the most important thing that didn't get into most people's view of world history.
    speaker: Jack Weatherford
    context: Interview on Genghis Khan and the Making of the Modern World, 2004
  - text: Without the Mongol Empire, the global exchange of knowledge, goods, and diseases that defined the late medieval world would not have happened on the scale it did.
    speaker: Thomas Allsen
    context: Culture and Conquest in Mongol Eurasia, conclusion
  emphasized:
  - Connective function of Mongol Empire as historically undervalued compared to its destructive legacy
  - Religious tolerance and meritocracy as Mongol innovations, not just Chinese or Islamic
  - Knowledge transfer across civilizations enabled by imperial unity
  - Genghis Khan''s contested legacy — hero, genocidaire, and globalizer simultaneously
  omitted:
  - 40 million dead cannot be balanced against trade routes and postal stations
  - Revisionist framing risks minimizing the experience of conquered populations
  - Mongol "tolerance" coexisted with systematic massacre, enslavement, and forced population transfer
  - Successor states'' descent into fragmentation, civil war, and their own atrocities
