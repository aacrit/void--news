death_toll: 40 million estimated (11% of world population)
affected_population: Ruled 110 million people across 24 million km²
duration: 162 years (unified), successor states to 1500s
summary: 'In 1206, a kurultai — a gathering of Mongol tribal chiefs — met on the banks of the Onon River in the eastern steppe
  and proclaimed Temüjin as Genghis Khan, universal ruler. He was approximately 44 years old. He had spent the previous 20 years
  unifying the Mongol, Tatar, Merkit, Naiman, and Kereit tribes through a combination of military conquest, strategic marriages,
  blood brotherhood (anda), and the systematic destruction of rival aristocracies. The tribal confederation he forged had perhaps
  one million people. Within 60 years, his grandsons would rule from the Pacific Ocean to the Danube.


  Genghis Khan''s first major external campaign targeted the Tangut Xi Xia kingdom in 1209, followed by the Jin dynasty of
  northern China (1211-1234). The Jin capital Zhongdu (modern Beijing) fell in 1215. But it was the Khwarezmian campaign of
  1219-1221 that established the Mongol reputation for annihilation. When the governor of Otrar executed Mongol trade envoys —
  an act that violated the Mongol code of diplomatic immunity — Genghis Khan invaded with 100,000-150,000 troops. Otrar was
  razed. Bukhara was burned. Samarkand surrendered and was sacked anyway. The Khwarezmian cities of Merv, Nishapur, and Herat
  were destroyed so thoroughly that contemporary chroniclers counted skulls in pyramids. Ibn al-Athir, writing from Mosul,
  called it "the greatest catastrophe that the human race has suffered."


  The Mongol military system was built on decimal organization (units of 10, 100, 1,000, and 10,000 — the tumen), meritocratic
  promotion, iron discipline, and strategic deception. Subutai, arguably the greatest military commander in history, directed
  campaigns across a front stretching 6,000 kilometers. At the Battle of the Kalka River (1223), Subutai and Jebe defeated a
  combined Rus''-Cuman force with 20,000 men after a reconnaissance-in-force that had crossed the Caucasus Mountains. At the
  Battle of Mohi (1241), Subutai destroyed the Hungarian army of King Béla IV using a feigned retreat, bridge assault, and
  envelopment — simultaneously coordinating with another Mongol force defeating the Poles at Legnica, 500 kilometers to the north.
  No European army achieved operational coordination at that scale until Napoleon.


  Genghis Khan died in August 1227, probably on campaign against the Xi Xia. His empire was divided among his sons: Jochi (the
  Golden Horde in Russia), Chagatai (Central Asia), Ögedei (the Great Khanate), and Tolui (the Mongol heartland, whose sons
  Möngke and Kublai would later claim the supreme khanate). Ögedei Khan (r. 1229-1241) completed the conquest of the Jin dynasty,
  built the capital Karakorum, and launched the European campaign under Subutai and Batu Khan that reached Hungary and Poland
  in 1241. Only Ögedei''s death in December 1241 — requiring a kurultai to elect his successor — called the Mongol armies back
  from the gates of Vienna.


  Kublai Khan (r. 1260-1294) conquered the Song dynasty of southern China in a 20-year campaign culminating in the naval
  Battle of Yamen (1279), reunifying China under foreign rule for the first time. He established the Yuan dynasty, moved
  the capital to Khanbaliq (modern Beijing), adopted Chinese administrative practices, and patronized Chinese arts — while
  maintaining Mongol military supremacy through a four-class racial hierarchy that placed Mongols at the top, Central Asians
  second, northern Chinese third, and southern Chinese at the bottom. His failed invasions of Japan (1274, 1281), Java
  (1293), and Vietnam (three campaigns, all repulsed) marked the empire''s military limits.

  '
significance: 'The Mongol Empire — at its peak in 1279, the largest contiguous land empire in history — reshaped Eurasia in ways
  still measurable. A 2003 genetic study estimated that 16 million men alive today carry Y-chromosomal lineages attributable to
  Genghis Khan or his close male relatives. The Yam postal relay system, which maintained stations every 25-30 miles across the
  empire, was the premodern world''s fastest communication network: a message could cross the empire in two weeks. The Pax
  Mongolica — the period of relative stability under Mongol rule — enabled the most intensive period of Silk Road trade in
  its history, connecting Chinese manufacturing to European markets with fewer middlemen than at any previous point. It also
  enabled the westward transmission of gunpowder, printing, and the magnetic compass, and the eastward transmission of
  plague — Yersinia pestis traveled Mongol trade routes from Central Asia to the Black Sea, reaching Europe as the Black
  Death in 1346.


  The successor states — the Golden Horde (Russia, to 1480), the Chagatai Khanate (Central Asia, to 1687), the Ilkhanate
  (Persia, to 1335), and the Yuan dynasty (China, to 1368) — shaped their regions for centuries. Moscow rose to preeminence
  as a Mongol tax collector. Timur (Tamerlane) claimed Genghis Khan''s legacy to build an empire from Ankara to Delhi.
  The Mughal Empire of India took its name from "Mongol" — Babur, its founder, was a direct descendant of both Genghis Khan
  and Timur.

  '
