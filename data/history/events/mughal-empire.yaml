summary: 'On April 21, 1526, Zahir ud-Din Muhammad Babur — a descendant of both Timur and Genghis Khan — met Ibrahim
  Lodi''s army at Panipat, fifty-five miles north of Delhi. Babur had 12,000 troops. Lodi had over 100,000, plus war
  elephants. Babur won in a single day. He used matchlock guns and field artillery — weapons Lodi''s forces had never
  faced — arranged behind a line of carts lashed together with ropes. The elephants panicked at the cannon fire and
  stampeded back through their own infantry. By afternoon, Ibrahim Lodi was dead on the field, and the Delhi Sultanate
  had a new dynasty.


  Three decades later, Akbar took the throne at age 13 after his father Humayun died falling down a library staircase.
  By 1605, when Akbar died at 63, the empire stretched from Kabul to Bengal, from Kashmir to the Deccan — roughly the
  entire Indian subcontinent minus the southern tip. Akbar abolished the jizya (tax on non-Muslims) in 1564, married
  Hindu Rajput princesses and gave their families military commands, held formal debates between Jesuits, Hindus, Jains,
  Zoroastrians, and Muslims at his Ibadat Khana (Hall of Worship) in Fatehpur Sikri between 1575 and 1582, and in 1582
  declared Din-i-Ilahi (Divine Faith) — a syncretic religion that attracted fewer than 20 followers. The religion died
  with him. The administrative system he built did not.


  The mansabdari system assigned every military commander a numerical rank that determined both troop obligations and
  revenue grants. It was portable: mansabdars could be transferred across the empire, preventing regional power from
  consolidating into rival kingdoms. Abu''l-Fazl ibn Mubarak, Akbar''s court historian, recorded the system in meticulous
  detail in the Ain-i-Akbari (1598), listing the rank, salary, and ethnic background of every major official. One-third
  of Akbar''s top mansabdars were Hindu.


  A century after Akbar, Aurangzeb (r. 1658-1707) held the largest economy on Earth. Angus Maddison''s OECD data
  estimates Mughal India at approximately 24.4% of world GDP in 1700 — more than all of Europe combined. Aurangzeb
  reimposed the jizya in 1679 (abolished by Akbar 115 years earlier), ordered the demolition of the Kashi Vishwanath
  temple in Varanasi (1669) and the Keshava Deo temple in Mathura (1670), and executed the Sikh Guru Tegh Bahadur in
  1675. His 26-year Deccan campaign (1681-1707) overextended the empire''s treasury and military. When he died in 1707,
  the empire fractured into successor states within a generation.


  By 1757, the East India Company — which had arrived at the Mughal court as supplicants in 1608 — controlled Bengal.
  Robert Clive won the Battle of Plassey with 3,000 troops against the Nawab of Bengal''s 50,000, largely because
  Bengali general Mir Jafar switched sides mid-battle. The last Mughal emperor, Bahadur Shah Zafar, was exiled to
  Rangoon by the British after the 1857 uprising. He died in a cell in 1862, writing Urdu poetry. His body was buried
  in an unmarked grave.

  '
significance: 'The Mughal Empire governed the Indian subcontinent for 331 years and left a physical, administrative, and
  cultural infrastructure that shaped everything that followed it. The Taj Mahal (1632-1653), built by Shah Jahan for
  his wife Mumtaz Mahal, who died in childbirth with her 14th child, employed 20,000 workers over 21 years and cost an
  estimated 32 million rupees — roughly $1 billion in 2020 values. The Red Fort in Delhi, Humayun''s Tomb, and the
  Fatehpur Sikri complex are all UNESCO World Heritage Sites.


  The administrative legacy ran deeper than architecture. The Mughal revenue system — formalized by Akbar''s finance
  minister Todar Mal in the zabti system (1580), which measured cultivated land, classified soil quality, and fixed
  revenue rates by crop — became the template that the East India Company adapted for its own extraction. The Permanent
  Settlement of 1793, which locked Bengal''s land revenue in place, was a British modification of a Mughal structure.
  The zamindari system that the British institutionalized originated as a Mughal revenue-collection apparatus.


  The cultural legacy is equally structural. Urdu — the language that emerged from the interaction of Persian, Arabic,
  and Hindi in Mughal military camps — is the national language of Pakistan and one of 22 scheduled languages of India.
  Mughal miniature painting synthesized Persian, Central Asian, and Hindu artistic traditions into a distinct school
  that influenced Indian visual art for centuries. The Mughal calendar, coinage, postal system, and road network
  (including the Grand Trunk Road, rebuilt by Sher Shah Suri and maintained by the Mughals) structured daily life for
  millions.


  The political legacy remains contested in the 2020s. The Babri Masjid — a mosque built in 1528-29, possibly on the
  site Hindus identify as Ram''s birthplace in Ayodhya — was demolished by Hindu nationalist mobs on December 6, 1992.
  In 2019, the Indian Supreme Court awarded the site to a Hindu trust. The Ram Mandir, built on the site, was
  inaugurated by Prime Minister Modi on January 22, 2024. Whether the Mughal period represents Islamic imperialism or
  syncretic civilization is not an academic question in India. It is an active political fault line.

  '
