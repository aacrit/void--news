legacy_points:
- The Taj Mahal, built 1632-1653 by 20,000 workers, remains the most visited monument in India and a UNESCO World Heritage Site
- Akbar's mansabdari system prevented feudal fragmentation by making military-revenue grants portable and revocable
- The Mughal revenue system (zabti) became the template the East India Company adapted for its own extraction in Bengal
- Urdu, born in Mughal military camps from Persian-Arabic-Hindi contact, is the national language of Pakistan and one of India's 22 scheduled languages
- The Babri Masjid dispute — a 1528 mosque demolished in 1992, replaced by Ram Mandir in 2024 — is the contemporary political echo of the Mughal period
- Angus Maddison estimated Mughal India at 24.4% of world GDP in 1700, exceeding the combined output of all European states
