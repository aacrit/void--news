  emphasized:
  - Extraction rates (40-75% of crop value) that funded Mughal court culture
  - Endemic peasant revolts systematically erased from elite historiography
  - Continuity of extraction from Mughal to British rule
  - The unnamed laborers who built the monuments the empire is remembered for
  omitted:
  - Periods of relative peasant prosperity under stable Mughal administration
  - The protective functions of the Mughal state (defense against invasion, infrastructure, trade)
  - Internal differentiation among peasants (rich cultivators, tenant farmers, landless laborers)
  - The role of agrarian production in supporting urban culture, trade, and artisan economies

- viewpoint: Postcolonial / Revisionist Historiography
  viewpoint_type: academic
  region_origin: south-asia
  narrative: 'Audrey Truschke''s Aurangzeb: The Man and the Myth (2017) opens with a provocation: the Aurangzeb of
    Indian political discourse bears little resemblance to the Aurangzeb of the historical record. The emperor who
    demolished the Kashi Vishwanath temple in 1669 also issued more farmans protecting Hindu temples than destroying
    them — Richard Eaton''s count, based on a systematic survey of the evidence, found that Aurangzeb destroyed
    approximately 15 temples over his 49-year reign, while granting land and stipends to dozens of Hindu institutions.
    Eaton''s research (2000, 2004) does not deny temple demolitions. It contextualizes them: 17th-century rulers
    demolished temples and mosques for political reasons (punishing rebellious subjects, asserting sovereignty over
    conquered territory), not as systematic programs of religious persecution. Hindu rulers, including the Marathas,
    also demolished religious structures during military campaigns.


    The revisionist position does not rehabilitate Aurangzeb. It rejects the premise that any single ruler can stand
    for 331 years of imperial history. The Mughal period produced Akbar''s Ibadat Khana debates and Aurangzeb''s
    jizya reimposition. It produced Dara Shikoh''s translation of the Upanishads into Persian (the Sirr-i-Akbar,
    c. 1657, which Schopenhauer later called "the consolation of my life") and Aurangzeb''s execution of Dara Shikoh
    for apostasy in 1659. It produced the Taj Mahal and the Satnami massacre. Selecting one thread and calling it
    the Mughal legacy is historiographically indefensible.


    Muzaffar Alam''s The Crisis of Empire in Mughal North India (1986) demonstrated that the empire''s 18th-century
    fragmentation was not "decline" in any simple sense. Regional successor states — the Nawabs of Awadh and Bengal,
    the Nizam of Hyderabad, the Marathas — often maintained or improved upon Mughal administrative practices. The
    economy of 18th-century India was not collapsing; it was decentralizing. The GDP did not disappear — it
    redistributed. The British narrative of "anarchy" was a post-hoc justification for conquest, not a description
    of reality.


    The contemporary debate is not really about the 17th century. It is about whether modern India is a Hindu nation
    whose Muslim period was an interruption, or a syncretic civilization whose plurality is itself the tradition.
    Romila Thapar (The Past Before Us, 2013) argues that the communal reading of Indian history — Hindus vs. Muslims,
    each with a monolithic identity — is itself a colonial invention. James Mill''s three-period division (Hindu,
    Muslim, British) imposed religious identity as the organizing principle of Indian history. Pre-colonial sources
    do not consistently categorize political events by the religious identity of rulers. The categories we argue
    about were manufactured in 1817 by a man who never visited India.


    The Babri Masjid-Ram Mandir dispute encapsulates the stakes. The 1992 demolition and the 2024 temple inauguration
    are not arguments about what Babur did in 1528. They are arguments about what India is in the 21st century:
    whether national identity requires erasing evidence of Muslim rule, or whether the presence of both mosques and
    temples is itself the evidence of Indian civilization. The historical record cannot resolve this because the
    question was never really about history. It is about power, identity, and who gets to define the nation.

    '
  key_arguments:
  - Aurangzeb demolished ~15 temples while issuing more farmans protecting Hindu institutions (Eaton's count)
  - The Hindu-Muslim binary reading of Indian history is a colonial invention (Mill's 1817 periodization)
  - 18th-century "decline" was decentralization, not collapse — the British anarchy narrative justified conquest
  - The Babri Masjid-Ram Mandir dispute is about 21st-century national identity, not 16th-century events
  sources:
  - title: 'Aurangzeb: The Man and the Myth'
    author: Audrey Truschke
    year: '2017'
    type: book
    doi: 10.1017/9781316414392
  - title: Temple Desecration and Muslim States in Medieval India
    author: Richard M. Eaton
    year: '2000'
    type: journal
    doi: 10.1017/S0021911800009724
  - title: The Crisis of Empire in Mughal North India
    author: Muzaffar Alam
    year: '1986'
    type: book
  - title: The Past Before Us
    author: Romila Thapar
    year: '2013'
    type: book
  - title: 'Sirr-i-Akbar (The Great Secret) — Persian translation of 50 Upanishads'
    author: Dara Shikoh
    year: c. 1657
    type: document
    archive_url: https://archive.org/details/SirrIAkbar
  notable_quotes:
  - text: The communal reading of Indian history is a British invention. James Mill divided Indian history into Hindu,
      Muslim, and British periods. Pre-colonial sources do not organize political history by the religious identity
      of rulers.
    speaker: Romila Thapar
    context: The Past Before Us, 2013 (paraphrased)
  - text: Aurangzeb was no saint. But the myth of Aurangzeb as a Hindu-hating bigot tells us more about modern Indian
      politics than about the seventeenth century.
    speaker: Audrey Truschke
    context: 'Aurangzeb: The Man and the Myth, 2017 (paraphrased)'
  emphasized:
  - Complexity and internal contradictions of the Mughal period (tolerance AND persecution, synthesis AND extraction)
  - The colonial origin of the Hindu-Muslim periodization of Indian history
  - 18th-century decentralization vs. the British "decline" narrative
  - The Babri Masjid-Ram Mandir dispute as a question about modern identity, not medieval history
  omitted:
  - The genuine suffering caused by specific Mughal policies (jizya, temple demolitions, forced conversions)
  - The political utility of revisionism for Muslim minority communities in contemporary India
  - The difficulty of applying 21st-century pluralist frameworks to 17th-century rulers
  - Popular Hindu religious sentiment about sacred sites as distinct from elite Hindutva ideology
