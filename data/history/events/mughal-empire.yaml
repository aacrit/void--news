connections:
- target_slug: ashoka-maurya-empire
  connection_type: parallel
  description: Both empires governed the Indian subcontinent at continental scale — Ashoka through dhamma edicts in
    Brahmi, the Mughals through mansabdari appointments in Persian. Both faced the same structural problem of ruling
    a Hindu majority from a non-Hindu ideological base (Buddhist and Muslim respectively)
- target_slug: indian-independence-movement
  connection_type: influenced
  description: The East India Company replaced Mughal authority province by province from 1757 onward; the 1857 uprising
    used the last Mughal emperor Bahadur Shah Zafar as its figurehead; the movement that eventually expelled the
    British was dismantling a system that had first displaced the Mughals
- target_slug: partition-of-india
  connection_type: influenced
  description: The Mughal period's Hindu-Muslim coexistence and its fracture — Akbar's tolerance vs. Aurangzeb's
    persecution — became the historical template through which 1947's communal violence was understood (and
    instrumentalized) by all sides
- target_slug: opium-wars
  connection_type: parallel
  description: The same East India Company that took Bengal from the Mughals at Plassey (1757) used Bengali opium revenue
    to fund the China trade that triggered the Opium Wars (1839-1860) — a single corporate entity's extraction connected
    two civilizations' subjugation
- target_slug: cyrus-cylinder
  connection_type: influenced
  description: Babur claimed descent from both Timur and Genghis Khan; the Timurid lineage traced through the Persian
    imperial tradition that originated with the Achaemenids. The concept of universal sovereignty that Akbar enacted
    through sulh-i-kul echoed the multi-ethnic imperial model that Cyrus pioneered two millennia earlier
