summary: 'By the 1830s, the British East India Company had built a supply chain that ran opium from Bengal to Canton (Guangzhou),
  the only Chinese port open to Western trade. British merchants bought tea, silk, and porcelain from China; China had little
  interest in British manufactured goods. The result was a trade deficit that drained silver from Britain. Opium reversed
  the flow. Indian-grown opium, processed in Patna and Benares and auctioned in Calcutta, was shipped to Canton by private
  traders operating under East India Company licenses. By 1838, an estimated 4-12 million Chinese were addicted. The Qing
  court received reports of soldiers too debilitated to drill, officials spending their salaries on opium, and silver flowing
  out of China to pay for the drug.


  In March 1839, Emperor Daoguang appointed Lin Zexu as Imperial Commissioner in Canton with orders to end the opium trade.
  Lin demanded that foreign merchants surrender their opium stocks. When they refused, he blockaded the foreign factories
  (trading posts) in Canton and detained 350 foreign traders, including the British Superintendent of Trade, Charles Elliot.
  The traders surrendered 20,283 chests of opium — approximately 1,400 tons — which Lin destroyed by dissolving it in trenches
  of lime and salt water over 23 days, from June 3 to June 25, 1839.


  Lord Palmerston, the British Foreign Secretary, dispatched an expeditionary force of 44 warships and 4,000 troops. The First
  Opium War (1839-1842) was less a war than a series of one-sided naval engagements. British iron-hulled steamships — particularly
  the Nemesis, the first iron warship to see action — devastated the Qing wooden war junks. British forces seized Canton,
  Amoy, Ningbo, and Shanghai before threatening Nanjing. The Qing sued for peace.


  The Treaty of Nanjing, signed on August 29, 1842, was the first of what Chinese historiography calls the "Unequal Treaties."
  China ceded Hong Kong Island to Britain in perpetuity, opened five treaty ports (Canton, Amoy, Fuzhou, Ningbo, Shanghai),
  paid an indemnity of 21 million silver dollars, and abolished the Canton trade monopoly system. The treaty said nothing
  about opium — the drug that had caused the war. British opium imports into China continued and grew.


  The Second Opium War (1856-1860), triggered by the Arrow Incident — the boarding of a nominally British-registered Chinese
  ship — escalated when France joined Britain after the execution of a French missionary in Guangxi. The war culminated in
  the burning of the Old Summer Palace (Yuanmingyuan) in Beijing on October 18-19, 1860, ordered by Lord Elgin as retaliation
  for the torture and killing of captured negotiators. The palace, which contained irreplaceable art, libraries, and gardens
  accumulated over 150 years, was looted and then destroyed by 3,500 British and French soldiers over two days. Victor Hugo,
  writing to Captain Butler, called it "two bandits entering a museum... one pillaged, the other set fire."


  The Convention of Peking (1860) forced China to open additional ports, cede Kowloon Peninsula to Britain, legalize opium
  trade, permit Christian missionary activity, and pay further indemnities. By the 1880s, China was importing over 6,000 tons
  of opium annually.

  '
significance: 'The Opium Wars opened China to Western imperial penetration and inaugurated what Chinese historiography calls
  the "Century of Humiliation" (1839-1949) — a narrative that frames Chinese national identity and foreign policy into the
  2020s. Xi Jinping invokes it when speaking of "national rejuvenation"; it is taught in every Chinese school. The treaty
  port system created extraterritorial zones where Western law superseded Chinese sovereignty; by 1900, 80 such ports operated
  across China. Hong Kong remained under British control for 155 years (1842-1997). The wars drained an estimated 100 million
  taels of silver from China, contributing to the Taiping Rebellion (1850-1864, 20-30 million dead), the fall of the Qing
  dynasty in 1912, and the ideological foundations of both Nationalist and Communist movements. The twelve bronze zodiac heads
  looted from the Yuanmingyuan remain the subject of international legal disputes; some have been repatriated, others remain
  in private and museum collections worldwide.

  '
