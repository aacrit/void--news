connections:
- target_slug: scramble-for-africa
  connection_type: parallel
  description: Both were exercises in imperial power projection using overwhelming military force to extract economic concessions
    from non-European societies, establishing the template for 19th-century colonialism
- target_slug: transatlantic-slave-trade
  connection_type: parallel
  description: Both involved European powers profiting from the forced trade of commodities that devastated non-European populations
    — enslaved people in one case, narcotics in the other
