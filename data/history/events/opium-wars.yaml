perspectives:
- viewpoint: British Imperial
  viewpoint_type: victor
  region_origin: europe
  narrative: 'The British case for war rested not on the opium trade but on sovereignty, free trade, and the protection of
    British subjects. Lord Palmerston, in his instructions to the expeditionary force, framed the conflict as a response to
    Lin Zexu''s illegal detention of British traders and the confiscation of British property without due process. The opium,
    in this telling, was incidental — the issue was China''s refusal to engage in normal diplomatic relations and its treatment
    of foreign merchants under a legal system that offered no protections to non-Chinese.


    The Canton System, which confined Western trade to a single port under the supervision of Chinese merchants (the Cohong),
    had frustrated British commercial ambitions for decades. British merchants wanted access to the Chinese interior market,
    equal diplomatic standing, and the protections of international law. The Qing court, which viewed all foreign states as
    tributaries of the Celestial Empire, refused to receive a British ambassador as an equal. Lord Macartney''s embassy of
    1793 had been rebuffed when he refused to perform the kowtow before Emperor Qianlong. Lord Amherst''s 1816 mission was
    turned away at the gates. The British concluded that China could not be engaged through diplomacy — only through force.


    Palmerston''s parliamentary case survived serious opposition. William Gladstone, then a young Tory MP, called the war
    "a war more unjust in its origin, a war more calculated in its progress to cover this country with permanent disgrace."
    The motion to censure the government over the war failed by just nine votes in the House of Commons on April 9, 1840.
    Palmerston countered that Britain was not fighting for opium but for the principle that a sovereign nation could not imprison
    foreign nationals and confiscate their property without legal process. Domestic opposition intensified in the decades
    after the wars. The Women''s Anti-Opium Urgency Committee, founded in 1874, organized one of the earliest sustained women''s
    political campaigns in Britain, collecting petitions, publishing pamphlets, and lobbying Parliament to end the India-China
    opium trade — a campaign that contributed to the Royal Commission on Opium of 1893-95 and the eventual Anglo-Chinese Opium
    Agreement of 1907.


    The strategic dimension was commercial. Britain consumed over 30 million pounds of Chinese tea annually by the 1830s.
    The trade imbalance — China accepted only silver for tea — was unsustainable. Opium was the only commodity that reversed
    the silver flow. The East India Company''s opium revenues from Bengal contributed approximately 15% of British Indian
    government revenue by 1838. The financial incentive to maintain the trade was systemic, not incidental.


    British historiography long treated the Opium Wars as an unfortunate but necessary stage in China''s integration into
    the global trading system. John King Fairbank''s The Great Chinese Revolution (1986) argued that the treaty port system,
    while coercive, opened China to modernizing influences that the Qing dynasty had resisted. This "impact-response" model
    — in which Western contact catalyzed Chinese reform — has been largely abandoned by modern historians but shaped a century
    of English-language scholarship.

    '
  key_arguments:
  - The war was fought over diplomatic principles and the treatment of British subjects, not opium per se
  - China's refusal to engage in equal diplomatic relations left no alternative to military pressure
  - The Canton System was an untenable restriction on free trade
  - The trade imbalance and East India Company revenue created systemic incentives
