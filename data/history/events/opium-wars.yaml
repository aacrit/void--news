- viewpoint: Qing Chinese
  viewpoint_type: vanquished
  region_origin: east-asia
  narrative: 'Lin Zexu''s letter to Queen Victoria — written in 1839 but never delivered — laid out the Chinese position with
    moral clarity. He addressed Victoria specifically as a sovereign whose own nation prohibited opium use: "We have heard
    that in your honorable nation the use of opium is strictly forbidden. This is because its harm is understood. Since you
    do not permit it to harm your own country, you should not allow it to harm other countries." He asked whether Britain
    would tolerate a foreign power flooding British cities with an addictive poison for profit. "Suppose there were people
    from another country who carried opium for sale to England and seduced your people into buying and smoking it. Certainly
    your honorable ruler would deeply hate it and be bitterly aroused." The letter received no answer. Britain sent warships
    instead.


    The Qing court''s decision to suppress the opium trade was a public health measure. Opium addiction destroyed families
    from the inside: addicted men sold household property, pawned their wives'' dowries, and in documented cases sold wives
    and daughters to fund the habit. Women bore the economic and social costs of male addiction — managing destitute households,
    caring for incapacitated husbands, and losing what little legal protection Qing family law afforded them. Emperor Daoguang''s
    1838 edict described opium as a poison that was draining China of silver, enfeebling its military, and corrupting its
    officials. The court debate between "legalization" advocates (who argued that regulated trade would at least capture revenue)
    and "suppression" advocates (who argued that the drug''s effects demanded prohibition) was resolved in favor of Lin Zexu''s
    hard line. Lin''s campaign in Canton was thorough: he demanded that foreign merchants sign bonds pledging to stop importing
    opium, on pain of death. He confiscated and destroyed 20,283 chests — roughly 1,400 tons — in a process witnessed by foreign
    observers.


    The military disparity was devastating. The Qing navy consisted of wooden war junks designed for coastal patrol and anti-piracy
    operations. Against the Nemesis — a 660-ton iron-hulled steamer armed with 32-pound guns and Congreve rockets — they were
    helpless. At the Battle of Chuenpi (January 7, 1841), four British warships destroyed 29 Chinese junks and shore batteries
    in an afternoon. The Qing army, armed with matchlock muskets (technology two centuries behind the British percussion cap
    rifle), suffered similar asymmetries on land. At Zhenjiang, in July 1842, Manchu bannermen fought hand-to-hand rather
    than surrender; 1,500 were killed.


    The Treaty of Nanjing was experienced as national humiliation. No Qing emperor had ceded sovereign territory to a foreign
    power since the dynasty''s founding in 1644; the cession of Hong Kong broke that 198-year precedent. The indemnity of
    21 million silver dollars was punitive. The extraterritorial rights granted to British subjects in the treaty ports meant
    that British citizens in China were subject to British law, not Chinese law — a legal arrangement that Chinese officials
    correctly recognized as an assertion of racial superiority. Most-favored-nation clauses in subsequent treaties with the
    United States and France meant that every concession extracted by one Western power automatically extended to all others.


    The Second Opium War''s destruction of the Yuanmingyuan — the Old Summer Palace — produced a wound that has never healed.
    The palace complex, covering 860 acres northwest of Beijing, contained some of the most treasured artifacts of Chinese
    civilization: bronzes, jades, silk scrolls, and a library of 10,000 volumes. Lord Elgin ordered its destruction specifically
    to humiliate the emperor. Chinese soldiers and officials who witnessed the burning described it as the desecration of
    their civilization''s heart. The twelve bronze zodiac fountain heads looted from the palace have been the subject of international
    legal disputes; some have been repatriated, others remain in private and museum collections worldwide.


    In Chinese historical memory, the Opium Wars mark the beginning of the "Century of Humiliation" — a narrative arc that
    runs from Lin Zexu''s defeat in 1842 through the Taiping Rebellion, the Boxer Uprising, the fall of the Qing dynasty,
    the warlord era, the Japanese invasion, and the Chinese Civil War, ending only with the founding of the People''s Republic
    in 1949. This narrative is not merely academic — it is taught in schools, embedded in state media, and invoked by Chinese
    leaders in diplomatic contexts. When Xi Jinping speaks of "national rejuvenation," the starting point of the humiliation
    from which China is rejuvenating is 1839.

    '
  key_arguments:
  - China's opium suppression campaign was a legitimate public health measure
  - Britain waged war to force a sovereign nation to accept a narcotic trade
  - Military asymmetry made the wars a one-sided slaughter, not a contest between equals
  - The destruction of the Yuanmingyuan was a deliberate act of cultural vandalism
