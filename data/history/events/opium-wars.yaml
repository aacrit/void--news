- viewpoint: Modern Chinese Nationalist
  viewpoint_type: revisionist
  region_origin: east-asia
  narrative: 'The Opium Wars occupy a central position in the historiography of the People''s Republic. The "Century of Humiliation"
    (bainian guochi) is not simply a historical period — it is the origin story of modern China. The Communist Party''s legitimacy
    rests in part on its claim to have ended the humiliation: Mao Zedong''s declaration on October 1, 1949 — "The Chinese
    people have stood up" — was a direct answer to the Opium Wars, the Unequal Treaties, and the century of foreign domination
    that followed.


    Chinese nationalist historiography emphasizes three dimensions that Western accounts tend to minimize. First, the scale
    of the opium crisis. By the 1880s, China had an estimated 15 million opium users, with rates of addiction particularly
    high among soldiers, officials, and laborers in treaty port cities. The drug drained silver, distorted the economy, and
    created a public health catastrophe that persisted until the Communist government''s aggressive suppression campaigns
    of the 1950s, which eliminated opium production through methods ranging from agricultural reform to execution of dealers.


    Second, the systematic nature of Western imperialism that the Opium Wars inaugurated. The Treaty of Nanjing was followed
    by the Treaty of Wanghia with the United States (1844), the Treaty of Whampoa with France (1844), and dozens of subsequent
    treaties with various Western powers and Japan. Each extracted additional concessions: more treaty ports, more territory,
    more indemnities, more extraterritorial rights. By 1900, China had been carved into spheres of influence — British in
    the Yangtze Valley, French in the south, German in Shandong, Japanese in Manchuria, Russian in the northeast. The Boxer
    Protocol of 1901, imposed after the Eight-Nation Alliance suppressed the Boxer Uprising, demanded an indemnity of 450
    million taels of silver — more than the Qing government''s annual revenue — payable over 39 years at 4% interest.


    Third, the connection between the Opium Wars and the Chinese revolution. Sun Yat-sen, the founder of the Republic of China,
    traced China''s humiliation directly to the Nanjing Treaty. Mao''s essay "The Chinese People Have Stood Up" (1949) invoked
    the century of foreign domination as the condition from which revolution was the only escape. The narrative arc — from
    Lin Zexu''s righteous resistance to the Communist victory — is taught in every Chinese school. Lin Zexu is honored as
    a national hero; a 25-meter statue of him stands in Fuzhou. The ruins of the Yuanmingyuan are maintained as a "patriotic
    education base," left unrestored as a permanent reminder.


    The nationalist perspective frames the current international order through the lens of the Opium Wars. Chinese state media
    invoke the Century of Humiliation when Western governments criticize Chinese trade practices, human rights policies, or
    territorial claims. The argument is structural: the West''s current rules-based order was built on the same gunboat diplomacy
    that forced opium on China. The claim to sovereignty — over Hong Kong, over Taiwan, over the South China Sea — is presented
    as the completion of a process that began with Lin Zexu''s stand against foreign narcotics in 1839.

    '
  key_arguments:
  - The Opium Wars inaugurated a century of systematic Western exploitation of China
  - The Communist revolution's legitimacy derives from ending the Century of Humiliation
  - Western 'rules-based order' was itself built on coercion and unequal treaties
  - The ruins of the Yuanmingyuan are maintained as a permanent reminder of foreign aggression
