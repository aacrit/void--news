    openlibrary: OL9710091M
  notable_quotes:
  - text: 'The Arabs have been governed for 400 years by a people who gave them neither rights nor representation, who drained their resources for wars in Europe, and who called this arrangement Islamic brotherhood.'
    speaker: George Antonius (paraphrased)
    context: 'The Arab Awakening, 1938'
  - text: 'The Turks hung them in the public square in Beirut. After that, there was no going back.'
    speaker: Arab oral tradition regarding the Martyrs of 1915-1916
    context: Common formulation in Lebanese and Syrian nationalist narratives
  emphasized:
  - Four centuries of Turkish rule over Arabic-speaking populations
  - Cemal Pasha's executions and the catalytic effect on Arab nationalism
  - The double betrayal — Ottoman Turkification followed by European partition
  - The Hejaz Railway as a military tool, not an investment in Arab development
  omitted:
  - Arab elites who served and prospered within the Ottoman system for centuries
  - The Ottoman period's relative stability compared to what followed (colonial mandates, military coups, civil wars)
  - Internal divisions among Arab nationalists (Hashemites vs. Saudis, pan-Arabists vs. local nationalists)
  - The millet system's genuine protection of Christian and Jewish Arab communities

- viewpoint: Balkan / Orthodox Christian
  viewpoint_type: vanquished
  region_origin: europe
  narrative: 'On June 28, 1389, at Kosovo Polje — the Field of Blackbirds — Prince Lazar Hrebeljanovic of
    Serbia met Sultan Murad I''s Ottoman army. Both commanders died. Lazar was captured and beheaded; Murad was
    killed — possibly by a Serbian knight named Milos Obilic who feigned surrender and stabbed the sultan in
    his tent, though the details are contested. The battle was tactically inconclusive. Serbia survived as a
    vassal state for another 70 years. But in Serbian oral tradition, Kosovo became the moment of fall — the
    day the heavenly kingdom was chosen over the earthly one, the day five centuries of servitude began.


    The devshirme — the child levy — was the institution that defined Ottoman rule for Balkan Christians. Every
    three to five years, Ottoman officials entered Christian villages and selected boys between the ages of 8
    and 18. The boys were taken from their families, converted to Islam, and trained as Janissaries (the
    sultan''s elite infantry corps) or placed in the palace bureaucracy. The system operated from approximately
    1380 to 1700. Estimates of the total number of boys taken range from 500,000 to 1,000,000. In Bulgarian,
    Serbian, and Greek oral tradition, the devshirme is remembered as the "blood tax." Mothers reportedly
    scarred or maimed their sons to disqualify them. Some families hid boys in monasteries. The practice
    produced grand viziers — Sokollu Mehmed Pasha, born in a Serbian Orthodox family in Bosnia, ran the empire
    for three sultans — but the distinction between forced recruitment and kidnapping was lost on the families
    left behind.


    William Ewart Gladstone''s pamphlet Bulgarian Horrors and the Question of the East (1876) sold 200,000
    copies in its first month. Gladstone wrote in response to the suppression of the April Uprising in
    Bulgaria, during which Ottoman irregular troops (bashibazouks) killed an estimated 12,000-30,000
    Bulgarian civilians. The massacre at Batak — where between 3,000 and 5,000 inhabitants were killed,
    many inside the Church of Sveta Nedelya — was documented by American journalist Januarius MacGahan and
    American consul Eugene Schuyler. Gladstone demanded that the Ottomans depart from the Balkans: "Let the
    Turks now carry away their abuses in the only possible manner, namely, by carrying off themselves."
    The pamphlet turned British public opinion against Disraeli''s pro-Ottoman foreign policy and helped
    precipitate the Russo-Turkish War of 1877-1878.


    Maria Todorova''s Imagining the Balkans (1997) interrogated the Western construction of the Balkans as
    a region defined by Ottoman backwardness — "balkanism," she called it, a cousin of Said''s Orientalism.
    But for the peoples who lived under Ottoman rule, the analysis was simpler: churches were converted to
    mosques, Christian testimony was not accepted against Muslim testimony in courts, the bell towers fell
    silent. The Rum millet gave the Ecumenical Patriarch administrative authority over all Orthodox
    Christians, regardless of ethnicity — Serbs, Bulgarians, Romanians, and Arabs were all "Rum" in
    Ottoman administrative categories, their national identities submerged under a religious label.


    The Balkan Wars of 1912-1913 expelled the Ottomans from almost all of their European territory in eight
    months. Greece, Serbia, Bulgaria, and Montenegro formed the Balkan League and attacked simultaneously.
    The First Balkan War reduced Ottoman Europe to eastern Thrace. The Second Balkan War, fought among the
    victors over Macedonia, established the modern borders. The wars produced 800,000 refugees. The population
    exchanges that followed the Treaty of Lausanne in 1923 completed the separation: 1.2 million Orthodox
    Greeks were expelled from Turkey, and 400,000 Muslims were expelled from Greece. Communities that had
    coexisted — unequally, often resentfully, but continuously — for five centuries were surgically separated
    by nationality and religion.

    '
  key_arguments:
  - The Battle of Kosovo (1389) became the foundational trauma of Balkan Christian identity under Ottoman rule
  - The devshirme child levy system (c. 1380-1700) was a systematic extraction of Christian boys numbering 500,000-1,000,000
  - The Bulgarian Horrors of 1876 and Gladstone's pamphlet turned Western public opinion against the Ottoman Empire
  - The Balkan Wars (1912-1913) and Treaty of Lausanne (1923) population exchanges ended 500 years of coexistence through ethnic separation
