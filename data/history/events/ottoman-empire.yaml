- viewpoint: Arab Nationalist
  viewpoint_type: vanquished
  region_origin: middle-east
  narrative: 'On June 5, 1916, Sharif Hussein bin Ali — Hashemite guardian of Mecca and a descendant of the
    Prophet Muhammad — fired a rifle shot at the Ottoman barracks in the city. The Arab Revolt had begun. Within
    two years, Arab irregular forces under Hussein''s son Faisal, advised by British intelligence officer T.E.
    Lawrence, had captured Aqaba (July 1917), harassed the Hejaz Railway, and entered Damascus on October 1,
    1918 — two days before the British. Faisal declared an independent Arab Kingdom of Syria. It lasted 133
    days before the French expelled him.


    George Antonius, a Lebanese-born Christian civil servant in the British Mandate of Palestine, published
    The Arab Awakening in 1938 — the first systematic English-language account of the Arab nationalist
    movement. Antonius traced the roots of Arab national consciousness to the literary and cultural revival
    (al-Nahda) centered in Beirut and Cairo in the mid-19th century, when Syrian Christian intellectuals
    like Butrus al-Bustani and Nasif al-Yaziji began publishing Arabic-language newspapers and calling for
    a cultural identity distinct from Ottoman Turkish domination. The Ottoman response was Turkification:
    the Committee of Union and Progress (CUP), which took power in 1908, imposed Turkish as the sole
    language of administration, education, and courts — reversing centuries of administrative multilingualism.


    Cemal Pasha — the CUP''s military governor of Syria from 1914 to 1917 — earned the title al-Saffah
    (the Blood-Shedder). On August 21, 1915, and May 6, 1916, he ordered the public hanging of 22 Arab
    nationalists in Beirut''s central square (today Martyrs'' Square) and 7 in Damascus. The charges were
    treason and contact with foreign powers. The executions transformed local grievances into a pan-Arab
    cause. May 6 is commemorated as Martyrs'' Day in Lebanon and Syria.


    The Ottoman period in Arab nationalist historiography is a four-century occupation (1517-1918) in which
    Arabic-speaking peoples were governed by Turkish-speaking rulers who appropriated the Islamic caliphate
    as a tool of ethnic domination. The millet system, in this reading, was not pluralism — it was a
    mechanism for managing subject populations. Arabs were subjects, not partners. The Arab provinces funded
    Ottoman wars in Europe while receiving minimal investment in infrastructure, education, or industry.
    When the Hejaz Railway was built (1900-1908), it served Ottoman military logistics — moving troops to
    the Arabian Peninsula — not Arab economic development.


    The betrayal that defines this narrative is double. First, the Ottoman state betrayed its Arab Muslim
    subjects by pursuing Turkish nationalism within an Islamic framework. Second, the British betrayed
    the Arab Revolt. The Hussein-McMahon Correspondence (1915-1916) — in which British High Commissioner
    Henry McMahon appeared to promise Sharif Hussein an independent Arab state in exchange for revolt
    against the Ottomans — was contradicted by the Sykes-Picot Agreement (May 1916), which secretly
    divided the Ottoman Arab provinces between Britain and France, and by the Balfour Declaration
    (November 1917), which promised a Jewish national home in Palestine. Hussein learned of Sykes-Picot
    when the Bolsheviks published the secret treaty in November 1917. He continued fighting anyway. His
    reward was exile: the British removed Hussein from the Hejaz in 1924 and installed Faisal in Iraq
    (a country he had never visited) and Abdullah in Transjordan. The Ottoman period ended not with
    Arab liberation but with the replacement of Turkish masters by European ones.

    '
  key_arguments:
  - Ottoman rule over Arab lands was a 400-year occupation, not a partnership within a shared Islamic polity
  - The CUP's Turkification policies (1908-1918) exposed the ethnic hierarchy within the Ottoman system
  - Cemal Pasha's executions of Arab nationalists in Beirut and Damascus (1915-1916) catalyzed the Arab Revolt
  - The British double-crossed the Arab Revolt through Sykes-Picot and the Balfour Declaration
  sources:
  - title: The Arab Awakening
    author: George Antonius
    year: '1938'
    type: book
    archive_url: https://archive.org/details/arabawakening00anto
  - title: Seven Pillars of Wisdom
    author: T.E. Lawrence
    year: '1926'
    type: book
    archive_url: https://archive.org/details/sevenpillarsofwi0000lawr
  - title: 'A History of Modern Lebanon'
