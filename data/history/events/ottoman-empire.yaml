connections:
- target_slug: fall-of-constantinople
  connection_type: contains
  description: The conquest of Constantinople on May 29, 1453, transformed a Balkan-Anatolian principality into an intercontinental empire — Mehmed II's victory gave the Ottomans the Bosphorus, the Roman imperial claim, and a capital that would serve for 470 years
- target_slug: armenian-genocide
  connection_type: contains
  description: The Armenian Genocide of 1915-1923 was organized by the CUP leadership (Enver, Talat, Cemal) within the Ottoman state apparatus — deportation orders, labor battalions, and gendarme escorts used Ottoman administrative infrastructure to kill 600,000-1,500,000 Armenians
- target_slug: creation-of-israel-nakba
  connection_type: influenced
  description: The Sykes-Picot Agreement (1916) carved Ottoman Palestine into the British Mandate, the Ottoman Land Code of 1858 restructured Palestinian land tenure, and the British promises that contradicted Sharif Hussein's revolt created the political conditions for the 1948 partition
- target_slug: rise-of-islam
  connection_type: consequence
  description: The Ottoman dynasty claimed the Sunni caliphate from 1517 to 1924, positioning Istanbul as the successor to the prophetic community — when Ataturk abolished the caliphate, the institutional chain linking the Ottoman state to Muhammad's Medina was broken after 1,302 years
- target_slug: the-crusades
  connection_type: consequence
  description: The Ottoman advance into the Balkans and eastern Mediterranean fulfilled what the Crusades had failed to prevent — Muslim control of Constantinople, the Holy Land, and the eastern Christian world, completed by 1517 when Selim I took Jerusalem from the Mamluks
