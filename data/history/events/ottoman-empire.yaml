summary: 'Around 1299, Osman I — a Turkmen tribal leader on the Byzantine frontier in northwestern Anatolia — declared
  independence from the Seljuk Sultanate of Rum. His territory was a border principality smaller than Belgium. His
  army was a confederation of ghazi warriors, raiders who fought for faith and plunder along the crumbling edge of
  the Byzantine Empire. Osman never saw Constantinople. His great-great-grandson took it.


  On May 29, 1453, Mehmed II breached the Theodosian Walls with a cannon cast by a Hungarian engineer the Byzantine
  emperor could not afford. Constantinople fell in a single day. Mehmed renamed it Istanbul, styled himself Kayser-i
  Rum — Caesar of Rome — and rebuilt the city as a capital of three faiths. He appointed a Greek Orthodox patriarch,
  invited Jews, and resettled Muslims from across Anatolia. By 1481, when Mehmed died at 49 (possibly poisoned by
  his own physician), the empire stretched from the Danube to the Euphrates. His grandson Selim I would conquer
  Mamluk Egypt in 1517, absorbing the cities of Mecca, Medina, and Cairo and claiming the caliphate — the spiritual
  leadership of Sunni Islam.


  Suleiman I (r. 1520-1566) — called "the Magnificent" in Europe, "Kanuni" (the Lawgiver) by his own subjects —
  codified Ottoman law into a system that operated alongside and sometimes above sharia. His legal code, the Kanunname,
  regulated taxation, land tenure, and criminal punishment across a population speaking dozens of languages. His navy
  under Hayreddin Barbarossa controlled the Mediterranean from Algeria to the Aegean. His army besieged Vienna in
  1529 and failed to take it — the high-water mark of Ottoman expansion into central Europe. When Suleiman died in
  his tent during the Siege of Szigetvar in 1566, his grand vizier Sokollu Mehmed Pasha concealed the death for
  three weeks to prevent army mutiny.


  The millet system organized non-Muslim populations into self-governing religious communities — the Rum millet for
  Orthodox Christians, the Armenian millet, the Jewish millet. Each community controlled its own courts, schools,
  marriage laws, and internal taxation. A Greek merchant in Thessaloniki, a Jewish banker in Istanbul, and an
  Armenian goldsmith in Bursa lived under different legal codes within the same empire. The system was not equality —
  non-Muslims paid the jizya (poll tax) and could not bear arms — but it was a degree of structured pluralism that
  had no equivalent in the Europe of the Inquisition.


  The empire''s final century was a sequence of amputations. Greece won independence in 1829. Serbia, Romania, and
  Montenegro gained autonomy at the Congress of Berlin in 1878. Bulgaria broke free in 1908. Libya fell to Italy in
  1912. The Balkan Wars of 1912-1913 reduced Ottoman Europe to a sliver of Thrace. Enver Pasha brought the empire
  into World War I on Germany''s side in November 1914. By 1918, the British had taken Jerusalem, Baghdad, and
  Damascus. The Armistice of Mudros (October 30, 1918) dissolved the Ottoman military. The Treaty of Sevres (1920)
  proposed partitioning Anatolia itself. A general from Thessaloniki named Mustafa Kemal refused the terms, fought
  a three-year war of independence, expelled the Greek army from western Anatolia, and on November 1, 1922,
  abolished the sultanate. The last Ottoman sultan, Mehmed VI, left Istanbul on a British warship on November 17,
  1922. The caliphate was abolished on March 3, 1924. A 623-year-old state vanished in five years.

  '
significance: 'The borders of 27 modern nation-states — from Algeria to Iraq, from Hungary to Yemen — were drawn on
  Ottoman administrative maps or in the treaties that partitioned Ottoman territory. The Sykes-Picot Agreement of 1916,
  in which a British diplomat and a French diplomat divided the Ottoman Arab provinces into spheres of influence, created
  the borders of modern Iraq, Syria, Lebanon, Jordan, and Palestine. None of the populations within those lines were
  consulted. The Mandate system that followed gave Britain control of Palestine and Iraq, and France control of Syria
  and Lebanon. Every conflict in the 20th- and 21st-century Middle East — the creation of Israel, the Lebanese Civil
  War, the Iran-Iraq War, the invasion of Iraq — unfolded within borders drawn on the corpse of the Ottoman state.


  The Ottoman legal and administrative legacy persists in land registration systems across the Middle East (the Ottoman
  Land Code of 1858 still influences property law in parts of Iraq, Jordan, and Palestine), in the structure of
  religious community governance (Lebanon''s confessional political system descends directly from the millet model), and
  in the physical infrastructure of cities from Sarajevo to Cairo. The Suleymaniye Mosque, the Mostar Bridge, the
  aqueducts of Istanbul, and the fortifications of Acre remain standing. The language reforms Ataturk imposed in 1928 —
  replacing the Arabic script with Latin letters — severed Turkish citizens from 600 years of written Ottoman culture
  within a generation. A Turkish university student in the 2020s cannot read the text of Suleiman''s Kanunname without
  specialized training.


  The question of what the Ottoman Empire was — a Turkish state, an Islamic caliphate, a multiethnic negotiated
  polity, a colonial occupier — remains unanswered because each answer serves a different political project in the
  present.

  '
