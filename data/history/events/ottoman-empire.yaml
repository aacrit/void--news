legacy_points:
- The Sykes-Picot Agreement (1916) drew the borders of Iraq, Syria, Lebanon, Jordan, and Palestine on Ottoman provincial maps — those borders remain in the 2020s
- The Ottoman Land Code of 1858 still influences property law in parts of Iraq, Jordan, and Palestine
- Lebanon's confessional political system — requiring a Maronite president, Sunni prime minister, and Shia speaker — descends directly from the Ottoman millet model
- Ataturk's 1928 script reform (Arabic to Latin) severed Turkish citizens from 600 years of Ottoman written culture within a single generation
- The devshirme system (Christian child levy) recruited an estimated 500,000-1,000,000 boys over four centuries — grand viziers Sokollu Mehmed Pasha and Ibrahim Pasha were both devshirme graduates
- The Ottoman caliphate claim (1517-1924) made Istanbul the nominal center of Sunni Islam for 407 years — its abolition in 1924 created a vacuum no institution has filled
