death_toll: 'No single-event aggregate; the Siege of Constantinople (1453) killed ~4,000 defenders and 4,000-50,000 civilians; the Ottoman-Safavid Wars (1514-1639) killed hundreds of thousands; the Greek War of Independence (1821-1829) killed ~25,000 Greek combatants and ~15,000 Ottoman; the Balkan Wars (1912-1913) killed ~350,000 across all belligerents; WWI Ottoman theater deaths exceeded 3 million military and civilian'
affected_population: 'At its 17th-century peak under Mehmed IV (c. 1683), the empire governed approximately 30-35 million people across 5.2 million km2 spanning three continents'
duration: '623 years from the founding of the emirate (c. 1299) to the abolition of the sultanate (November 1, 1922)'
