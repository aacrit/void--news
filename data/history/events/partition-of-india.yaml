        speaker: "Anonymous recovered woman"
        context: "Quoted in Menon and Bhasin, Borders and Boundaries"
      - text: "I still dream of the house. The courtyard, the neem tree. I am an old woman now, but in my dreams I am always going back."
        speaker: "Anonymous Partition Archive testimony"
        context: "1947 Partition Archive, recorded 2013"
