    context: Quoted in Menon and Bhasin, Borders and Boundaries, 1998
  - text: Today, every daughter of Punjab weeps / And calls out to you, Waris Shah.
    speaker: Amrita Pritam
    context: Ajj Aakhaan Waris Shah Nu, written on a train fleeing Lahore, August 1947
  emphasized:
  - Systematic sexual violence as a weapon of communal conflict — not incidental but purposeful
  - State recovery operations that treated women as objects to be sorted by religion
  - Silence imposed on survivors by families, communities, and state institutions
  - Women's lack of agency in decisions about their own bodies, children, and futures
  omitted:
  - Women who found safety and even stability in their post-abduction situations
  - Male victims of sexual and communal violence — men were also killed and mutilated
  - The broader political and diplomatic history of partition beyond gendered violence
  - Women's active roles in resettlement, refugee camps, and nation-building after partition
