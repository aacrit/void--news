perspectives:
  - viewpoint: "British Imperial"
    viewpoint_type: victor
    region_origin: europe
    narrative: |
      The transfer of power from Britain to the two new dominions followed a deliberate sequence. The Attlee government, elected in 1945, dispatched the Cabinet Mission in March 1946 to negotiate a united India with a weak center and strong provinces. When the Muslim League and Congress failed to agree on the three-tier structure, Mountbatten — appointed February 1947 — concluded that partition was the only option that both parties would accept.

      The timeline accelerated from June 1948 to August 1947 after Mountbatten judged that delay risked a complete breakdown of administrative authority. The Indian Civil Service, backbone of British governance for 90 years, was already hemorrhaging officers. By spring 1947, British district officers in Punjab openly reported they could not guarantee security beyond the monsoon. Mountbatten presented the choice starkly: partition now with some order, or partition later with none.

      Radcliffe's boundary commissions operated under extreme constraints. He had five weeks, four judges (two from each side, deadlocked on every contested district), and maps that had not been resurveyed since 1931. He allocated Gurdaspur district to India — a decision that gave India its only road link to Kashmir and has been contested by Pakistani historians ever since, because without Gurdaspur, India would have had no overland access to the princely state whose accession triggered the first India-Pakistan war. Radcliffe received a knighthood and 40,000 pounds for his work; he burned his papers and never returned to India.

      The Punjab Boundary Force, commanded by Major General Rees, attempted to maintain order with 25,000 troops across a zone of 38,000 square miles. Rees reported to the Joint Defence Council, not to either dominion government, a command structure that satisfied neither side. Nehru accused the force of failing to protect Hindus and Sikhs; Jinnah charged it with anti-Muslim bias. The force was dissolved on September 1, 1947. Mountbatten himself acknowledged in later years that the speed of the transfer was "the biggest gamble in history," but maintained it was preferable to the alternative: a civil war with British troops still on the ground.

      The British narrative centers on the handover as an act of statecraft under impossible conditions — the fulfillment of a promise made in the 1942 Cripps Mission and the 1946 Cabinet Mission. The Attlee government saw partition as the price of Indian self-determination, not a British imposition: both Congress and the League signed the June 3 Plan. Mountbatten himself later noted that he received more criticism for the speed of the withdrawal than for the decision to leave.
    key_arguments:
      - "Partition was accepted by both Indian National Congress and Muslim League"
      - "Accelerated timeline prevented worse bloodshed during administrative collapse"
      - "Radcliffe operated under constraints imposed by Indian political deadlock"
      - "Britain fulfilled its wartime promise of self-determination"
    sources:
