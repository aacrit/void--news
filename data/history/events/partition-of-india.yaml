- viewpoint: Subaltern / Displacement
  viewpoint_type: vanquished
  region_origin: south-asia
  narrative: 'The partition narratives of states and leaders leave out the people who walked. Urvashi Butalia''s The Other Side of Silence (1998) and Yasmin Khan''s The Great Partition (2007) recover the
    stories of those for whom independence was not a "tryst with destiny" but the destruction of everything familiar: the house, the lane, the well, the neighbor.


    The scale was beyond any administrative capacity. In Punjab alone, 12 million people moved between August and December 1947. Refugee columns on the Grand Trunk Road stretched 50 miles. At Wagah, the
    single road crossing between Lahore and Amritsar, traffic moved in both directions simultaneously — Muslims heading west, Hindus and Sikhs heading east — separated by nothing but a few soldiers.


    Women bore a specific burden. Historians Ritu Menon and Kamla Bhasin documented in Borders and Boundaries (1998) how an estimated 75,000 women were abducted during partition — taken by men of the other
    community, forcibly converted, married, and absorbed. The Indian and Pakistani governments later ran "recovery operations" that re-abducted many of these women from homes where they had, in some cases,
    built new lives and had children. The women themselves were rarely consulted. Menon and Bhasin quote one recovered woman: "You think you are saving us? You are tearing us apart again."


    Lower-caste communities experienced partition differently from elites. Dalit refugees from West Punjab often found that the land allotments promised by the Indian government went to higher-caste claimants.
    Ravinder Kaur''s Since 1947 (2007) documents how the rehabilitation system reproduced caste hierarchies: Jat Sikh farmers received agricultural land, while Dalit and artisan refugees were settled in
    urban camps that persisted for decades. The model town of Faridabad, built for refugees outside Delhi, was stratified by caste from its inception.


    In Bengal, the partition was a slow wound. Unlike Punjab''s sudden cataclysm, the eastern border saw migration that continued for decades. Hindus trickled out of East Pakistan (later Bangladesh) in
    waves — after the 1950 Barisal riots, after the 1964 Hazratbal crisis, after the 1971 war. Joya Chatterji''s The Spoils of Partition (2007) argues that West Bengal''s refugee crisis reshaped the state''s
    politics permanently, fueling the Communist Party''s rise and creating a refugee electorate that voted as a bloc.


    Oral histories collected by the 1947 Partition Archive — a citizen-history project that has recorded over 10,000 testimonies since 2010 — reveal patterns that state narratives suppress. Refugees recall
    not just the violence but the small betrayals: the neighbor who pointed out their house to a mob, the police constable who looked away, the relative who refused to shelter them. They also recall acts
    of rescue: Muslims who hid Sikhs in Rawalpindi, Hindus who sheltered Muslims in Alwar. These individual choices — neither systematic nor random — are the texture that national narratives flatten into
    statistics.


    The subaltern perspective does not assign blame to one side. It holds all three parties — Britain, Congress, and the League — responsible for a decision made over the heads of the people who paid for
    it. 14 million displaced. 1-2 million dead. 75,000 women abducted. These were not policy outcomes. They were people.

    '
  key_arguments:
  - National narratives erase the lived experience of 14 million displaced people
  - Women were targets of systematic sexual violence and instrumentalized by both states
  - Caste hierarchies were reproduced in refugee rehabilitation
  - Bengal's slow partition continued for decades, unlike Punjab's sudden break
