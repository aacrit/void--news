summary: |
  On June 3, 1947, Lord Mountbatten announced that British India would be divided into two independent dominions in 73 days. The actual boundary line was drawn by Sir Cyril Radcliffe, a British barrister who had never visited India, working from outdated census maps and incomplete survey data in a five-week sprint. He partitioned Bengal in the east and Punjab in the west, splitting villages, irrigation canals, and railway lines.

  The Radcliffe Line was published on August 17, two days after independence ceremonies in both Karachi and Delhi. By then, violence had already consumed the Punjab. In Lahore, fires burned for weeks. In Amritsar, mobs blocked roads to refugee columns. Sikh jathas and Muslim militias attacked trains carrying refugees in both directions; some trains arrived at their destinations carrying nothing but corpses — railway staff at Wagah logged them as "ghost trains."

  Between August and November 1947, an estimated 14 to 15 million people crossed the new borders. Hindus and Sikhs moved east; Muslims moved west. The columns stretched 50 miles on some roads. Women and children traveled on foot in 110-degree heat. Cholera, dysentery, and dehydration killed thousands who survived the communal violence. In many border villages, neighbors who had shared wells for generations turned on each other within hours of learning which side of the line they fell on.

  The British Indian Army, itself in the process of being split, could not maintain order. Of the 55,000 troops in Punjab, roughly half were being reassigned to the Pakistani military. The Punjab Boundary Force, a 25,000-strong neutral unit under Major General Rees, was disbanded on September 1 after less than a month — overwhelmed by the scale of killing. Mountbatten himself later admitted the date had been moved forward from June 1948 to August 1947 to preserve "momentum."

  The death toll remains disputed. Estimates range from 200,000 (early British figures) to 2 million (later scholarship by Gyanendra Pandey and Urvashi Butalia). Exact counts are impossible because many deaths were never registered. Mass graves discovered decades later in Punjab and Bengal continue to revise the figure upward.

significance: |
  Partition created two states that are now both nuclear-armed, locked in four wars (1947, 1965, 1971, 1999), and still contesting Kashmir in the 2020s. Between August and November 1947, 14-15 million people crossed the new borders, 1-2 million died, and 75,000 women were abducted. The same logic of religious partition recurred in Palestine (1948), Cyprus (1974), and Yugoslavia (1990s). In 1971, Pakistan itself fractured along the lines of its founding contradiction, and Bangladesh became a third nation born from the original division. The Radcliffe Line left 162 enclaves stranded on the wrong side of the India-Bangladesh border; they were not resolved until the Land Boundary Agreement of 2015 -- 68 years after a British barrister drew the line in five weeks.

