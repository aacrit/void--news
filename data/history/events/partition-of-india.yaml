- viewpoint: Pakistani Nationalist
  viewpoint_type: victor
  region_origin: south-asia
  narrative: 'Pakistan''s founding narrative begins not in 1947 but in the 1930s, when Muhammad Iqbal''s Allahabad Address (1930) articulated the idea of a separate Muslim polity in northwestern India.
    The formal demand came with the Lahore Resolution of March 23, 1940, when the All-India Muslim League under Jinnah resolved that Muslim-majority areas should be grouped into "independent states." March
    23 is celebrated in Pakistan as Republic Day.


    Jinnah''s case rested on the Two-Nation Theory: that Hindus and Muslims constituted separate nations by virtue of distinct religious, cultural, and historical traditions. His argument drew on concrete
    grievances. After the 1937 provincial elections, Congress formed governments in 8 of 11 provinces and — in the Pakistani telling — systematically excluded Muslim League representatives, banned Urdu
    in favor of Hindi, and promoted Hindu symbols in government functions. The Pirpur Report (1938) and the Sharif Report (1939) documented these allegations; their accuracy is debated, but their political
    effect was galvanic. By 1940, millions of Indian Muslims saw the League as their sole protector.


    The 1946 elections confirmed the divide. The Muslim League won 446 of 495 Muslim seats in the Central and Provincial legislatures — a mandate that Jinnah called "the people''s verdict." When the Cabinet
    Mission''s three-tier plan collapsed, Jinnah called Direct Action Day on August 16, 1946, intending a general strike; in Calcutta, it spiraled into 72 hours of killing. The Great Calcutta Killings convinced
    both sides that coexistence under a single government was finished.


    Pakistan''s founding narrative emphasizes what was achieved against the odds. The new state inherited 17.5% of British India''s revenue, 30% of the Indian Army, and almost no industrial base. Jinnah
    arrived in Karachi to govern a country that lacked a capital, a central bank, and functioning ministries. Civil servants worked from tents. The State Bank of Pakistan opened on July 1, 1948, with reserves
    transferred — after prolonged obstruction, in the Pakistani telling — from Delhi. India withheld Pakistan''s share of cash balances (550 million rupees) until Gandhi undertook a fast in January 1948.


    The violence of partition is framed as a shared tragedy but one in which Muslims bore a disproportionate burden in East Punjab, where Sikh jathas carried out organized attacks on refugee columns. The
    Sheikhupura and Sialkot massacres of September 1947 are counterbalanced in Pakistani memory by the massacres in Amritsar, Jalandhar, and Ludhiana. The key argument is that partition violence was mutual
    — and that it vindicated Jinnah''s warning: without a separate state, Muslims would be a permanent minority subject to majoritarian rule.


    Kashmir occupies the center of Pakistan''s partition grievance. The state''s population was 77% Muslim, its ruler a Hindu Dogra maharaja. Under the partition logic of Muslim-majority areas going to
    Pakistan, Kashmiris belonged with Pakistan. Maharaja Hari Singh''s accession to India on October 26, 1947 — signed under duress, in the Pakistani telling, as tribal fighters neared Srinagar — is viewed
    as an illegitimate act that the international community, through UN Resolution 47 (1948), sought to remedy with a plebiscite that India has never held.

    '
  key_arguments:
  - Two-Nation Theory validated by 1946 election mandate — 446 of 495 Muslim seats
  - Congress monopolization of power after 1937 elections left Muslims unrepresented
  - Pakistan built a functioning state from almost no inherited infrastructure
  - Kashmir's Muslim majority should have joined Pakistan under partition logic
