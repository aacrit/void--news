- viewpoint: Indian Nationalist
  viewpoint_type: victor
  region_origin: south-asia
  narrative: 'Indian nationalist historiography frames August 15, 1947 as the culmination of a century-long freedom struggle — from the 1857 Revolt through the Swadeshi movement, Non-Cooperation, Civil
    Disobedience, and Quit India. In this reading, partition was not a triumph but a tragedy nested inside a triumph: India won its freedom but lost its wholeness.


    Nehru and Patel accepted partition reluctantly in June 1947 after concluding that Jinnah''s Direct Action Day (August 16, 1946) and the Great Calcutta Killings — 4,000 dead in 72 hours — had made a
    united India ungovernable. Patel, in particular, argued that a smaller, cohesive India was preferable to a larger state perpetually paralyzed by League obstructionism. Maulana Azad, the Congress Muslim
    leader, dissented to the end, warning that partition would not solve the communal problem but merely transfer it to a smaller arena.


    The Indian narrative emphasizes that Congress built a secular, democratic republic out of the wreckage. The Constituent Assembly, chaired by B.R. Ambedkar, produced a constitution by January 1950 that
    guaranteed fundamental rights regardless of religion. Nehru''s "Tryst with Destiny" speech — delivered at midnight on August 14-15 — became the founding text of Indian nationhood, a deliberate framing
    of independence as a universal human achievement rather than a sectarian victory.


    At the same time, this perspective holds Britain and the Muslim League jointly responsible for the violence. Mountbatten''s acceleration of the timeline is seen as reckless — a decision driven by British
    domestic politics (Attlee''s government wanted troops home) rather than Indian welfare. Radcliffe''s ignorance of local geography is cited as proof that Britain cared more about a clean exit than a
    just one. The Gurdaspur award is seen not as favoritism but as a minimal correction to an otherwise anti-Indian boundary.


    The 500-plus princely states posed a parallel crisis. Sardar Patel and V.P. Menon integrated 562 princely states into the Indian Union between 1947 and 1949, an administrative feat that receives less
    global attention than the bloodshed but was equally consequential. Hyderabad (Operation Polo, September 1948) and Junagadh required military action; Kashmir''s accession on October 26, 1947 — triggered
    by tribal invasion from Pakistan''s northwest — inaugurated a conflict still unresolved.


    Partition''s wounds run deepest in Punjab. Families on both sides lost homes, farms, and relatives. The refugee crisis of 1947-48 reshaped Delhi, Bombay, and Calcutta. 7.2 million refugees entered India
    from West Pakistan alone. Their resettlement, carried out by a new government barely weeks old, became one of independent India''s defining early tests.

    '
  key_arguments:
  - Partition was forced by the Muslim League's intransigence, not Congress desire
  - British haste served London's interests, not India's safety
  - India built a secular democracy despite partition's violence
  - Integration of 562 princely states was an achievement of equal scale
