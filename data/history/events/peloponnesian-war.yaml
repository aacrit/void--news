- viewpoint: Spartan / Peloponnesian League
  viewpoint_type: victor
  region_origin: europe
  narrative: 'Sparta fought the Peloponnesian War as a war of liberation — or so its declared war aim stated. The Spartan
    assembly voted for war in 432 BCE after allies, particularly Corinth and Megara, complained that Athens was strangling
    their commerce and violating the terms of the Thirty Years'' Peace (446 BCE). King Archidamus II warned that the war would
    last longer than anyone expected and that Sparta''s advantage in land warfare meant nothing against a maritime empire.
    He was overruled by the ephor Sthenelaidas, who cut the debate short with a single argument: Athens had become too powerful,
    and the balance of power in Greece had to be restored. Thucydides identified this as the war''s "truest cause": "the growth
    of Athenian power and the fear which this caused in Sparta."


    Sparta''s military superiority on land was absolute. The Spartan hoplite, trained from age seven, was the product of the
    most extreme social engineering in the ancient world. Boys entered the agoge at seven, were grouped into herds (agelai),
    slept on reed mats, ate black broth, and were flogged at the altar of Artemis Orthia as a test of endurance. At twenty,
    they joined a mess group (syssition) and lived in barracks until age thirty. They trained full-time for war while a subject
    population — the helots of Messenia and Laconia, enslaved by Sparta centuries earlier — worked the land. The ratio of
    helots to Spartiates may have been as high as 7:1. This demographic reality shaped Spartan strategy: the army could not
    campaign far from home for long, because a helot revolt was an ever-present danger. The great helot uprising of 464 BCE,
    which took ten years to suppress, was within living memory.


    The war forced Sparta into unfamiliar territory. Brasidas, the most innovative Spartan commander, broke the strategic
    stalemate by campaigning in Thrace in 424-422 BCE, threatening Athens''s grain supply and peeling away allies. He was
    killed at Amphipolis in 422 BCE — along with the Athenian demagogue Cleon, who died in the same battle — and was honored
    with a hero cult by the people he had liberated from Athens. Brasidas demonstrated what a Spartan commander could achieve
    outside the Peloponnese, but his initiative alarmed Sparta''s own conservative leadership, which distrusted individual
    ambition.


    Sparta''s victory in 404 BCE was achieved through a devil''s bargain. Lysander secured Persian gold — subsidies from Cyrus
    the Younger, a Persian prince — to build the fleet that destroyed Athens at Aegospotami. The price was the abandonment
    of the Greek cities of Ionia, the same cities that Sparta and Athens had united to liberate from Persia in 480-479 BCE.
    Sparta won the war by allying with the old enemy and selling out the cities whose freedom had justified the Greek resistance
    to Persia a lifetime earlier.


    Victory exposed Sparta''s limitations. The Thirty Tyrants it installed in Athens were overthrown within eight months.
    Spartan garrisons across Greece provoked resentment, not gratitude. Lysander''s personal ambition threatened the dual-kingship
    system. Within a decade, Sparta''s former allies — Corinth, Thebes, Argos — formed a coalition against it in the Corinthian
    War (395-387 BCE). Within three decades, Thebes under Epaminondas defeated Sparta at Leuctra (371 BCE), invaded the Peloponnese,
    and liberated the Messenian helots — destroying the economic foundation of the Spartan system forever. Sparta won the
    war and lost the peace.

    '
  key_arguments:
  - Sparta fought to restore the balance of power in Greece — Athenian imperial expansion threatened the independence of all
    Greek states
  - Spartan military superiority was the product of the most rigorous training system in the ancient world, sustained by helot
    labor
  - Victory required Persian gold and the abandonment of Ionian Greeks — a moral compromise that undermined the war's stated
    purpose
  - Sparta won the war but proved unable to manage the peace; its hegemony collapsed within 33 years
