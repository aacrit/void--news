- viewpoint: Modern Realist / International Relations Theory
  viewpoint_type: academic
  region_origin: americas
  narrative: 'Thucydides did not merely record the Peloponnesian War. He invented a way of analyzing political conflict that
    international relations scholars have used for 2,400 years. His History is the foundational text of realism — the school
    of thought that holds that states operate in an anarchic system where power, not justice, determines outcomes. Every generation
    of strategists has read Thucydides and found its own wars reflected in his pages.


    The concept of the "Thucydides Trap" entered mainstream discourse through Graham Allison''s 2017 book Destined for War:
    Can America and China Escape Thucydides''s Trap? Allison argued that in 16 cases over the past 500 years where a rising
    power challenged a ruling power, war resulted in 12. The pattern — structural pressure toward conflict between an established
    hegemon and a rising challenger — mirrors Thucydides''s diagnosis of the "truest cause" of the Peloponnesian War: "the
    growth of Athenian power and the fear which this caused in Sparta." Allison''s framing made Thucydides the most-cited
    ancient author in Pentagon briefings and National Security Council memos of the 2010s and 2020s.


    The realist reading of the Peloponnesian War emphasizes structural forces over individual agency. It was not Pericles''s
    death, or Alcibiades''s treason, or the plague that determined the outcome — it was the distribution of power in a bipolar
    system. Robert Gilpin''s War and Change in World Politics (1981) used the Athenian case to argue that hegemonic powers
    expand until the costs of maintaining their empire exceed the benefits, at which point the system becomes unstable. Athens''s
    reach exceeded its grasp in Sicily; the system corrected. Hans Morgenthau, the founding figure of American realism, drew
    on Thucydides to argue that the pursuit of power is a constant in human affairs — that democratic Athens was no less imperial
    than autocratic Sparta, because the imperatives of security in an anarchic world override domestic political form.


    The Melian Dialogue is the realist proof text. Morgenthau, Kenneth Waltz, John Mearsheimer, and their students all cite
    it. The Athenians'' argument — that justice exists only between equals in power, and that the strong rule where they can
    — is the distilled axiom of realist theory. What makes the Dialogue effective as a teaching text is that Thucydides did
    not editorialize. He presented the Melian argument (justice, the gods, Spartan aid) and the Athenian argument (power,
    necessity, the irrelevance of morality) and let the reader judge. The Melians were destroyed. The passage functions as
    a case study in which the reader discovers, through the Melians'' destruction, whether moral arguments constrain great
    powers. The answer, for realists, is no.


    But the realist reading has its own blind spots. Thucydides wrote as a participant, not an objective observer. He was
    an Athenian general, exiled for losing a battle. His sympathies, while controlled, were not absent. The speeches he attributed
    to Pericles are more eloquent than those given to any Spartan; the Funeral Oration has no Spartan equivalent. His analysis
    foregrounded interstate competition and minimized economic factors, class conflict, and the experience of non-citizens
    — women, slaves, metics (resident aliens) — who constituted the majority of Athens''s population. The realist appropriation
    of Thucydides takes his framework as universal truth rather than as the perspective of a displaced Athenian aristocrat
    writing in exile, shaped by his own losses.


    Sarah Pomeroy''s Goddesses, Whores, Wives, and Slaves (1975) opened a line of inquiry that Thucydides''s realist inheritors
    have largely ignored: the war''s impact on the majority of Athens''s population who could not vote, speak in the assembly,
    or hold command. Thucydides mentions women exactly twice in the Funeral Oration — once to praise the mothers of the dead,
    once to instruct the widows to be silent. The plague narrative (2.51) notes women dying as caregivers but assigns them
    no agency. Aristophanes'' Lysistrata (411 BCE) and Assemblywomen (392 BCE) satirize women seizing political and economic
    power, which means women''s exclusion from both was visible enough to be comic material. The realist tradition built on
    Thucydides inherits his silences along with his insights.


    The deepest irony is methodological. Thucydides invented multi-perspective history. He put speeches in the mouths of both
    sides — Pericles AND the Corinthians, the Athenians AND the Melians, the hawks AND the doves. He did this not because
    he believed all positions were equally valid, but because he believed that understanding conflict required hearing how
    each side justified itself. void --history operates on the same principle, 2,400 years later. The method is Thucydidean.
    The difference is that Thucydides was one man selecting which perspectives to present; void --history makes the selection
    transparent and the perspectives independently sourced.

    '
  key_arguments:
  - Thucydides identified the structural cause of great-power conflict — the rising power / ruling power dynamic — that remains
    the dominant framework in international relations
  - The 'Thucydides Trap' is applied to contemporary U.S.-China competition, making a 2,400-year-old text directly policy-relevant
  - The Melian Dialogue is the foundational text of political realism — power, not justice, determines outcomes in the international
    system
  - 'Thucydides invented multi-perspective history: he presented both sides'' arguments and let the reader judge'
