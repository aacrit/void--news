summary: 'In the summer of 431 BCE, a Theban force of 300 men entered the city of Plataea at night, invited by a faction within
  the walls. The Plataeans discovered them, barricaded the streets, and killed or captured 180 of the intruders. Thebes was
  Sparta''s ally; Plataea was Athens''s. The attack triggered the general war that Thucydides, an Athenian general who would
  later be exiled for losing a battle, spent the rest of his life recording.


  The two sides were structurally mismatched. Athens controlled the sea. Its navy of 300 triremes, each requiring 170 oarsmen,
  dominated the Aegean and protected a maritime empire of roughly 150 tribute-paying allies — the Delian League — that generated
  600 talents of silver per year. Sparta controlled the land. Its army of 8,000-10,000 full Spartan citizens (Spartiates),
  trained from age seven in the agoge system, was the most feared infantry force in Greece. Each side attacked where the other
  was weakest. Sparta invaded Attica and burned the crops. Athens withdrew behind the Long Walls — two parallel fortifications
  connecting the city to its port at Piraeus, five miles away — and relied on imported grain shipped through the empire.


  Pericles, Athens''s leading statesman, had calculated that the city could outlast Sparta''s annual invasions by avoiding
  a pitched land battle. The strategy collapsed not from military failure but from disease. In 430 BCE, plague — possibly
  typhoid fever or smallpox, still debated — broke out in the overcrowded city. Over four years it killed an estimated one-quarter
  of the population, including Pericles himself in 429 BCE. Thucydides, who contracted the plague and survived, recorded its
  symptoms with clinical precision: fever, vomiting, ulceration of the skin, "an intolerable burning" inside, memory loss
  among survivors. His description remains the oldest detailed account of an epidemic in Western literature.


  The war''s first phase ended with the Peace of Nicias in 421 BCE, but the treaty was never fully honored. In 416 BCE, Athens
  demanded that the island of Melos — a Spartan colony that had remained neutral — submit to Athenian rule. The Melians refused.
  Athens besieged the island, executed all adult men, enslaved the women and children, and colonized the site. Thucydides
  recorded the negotiation as a dialogue — the Melian Dialogue — in which the Athenian envoys told the Melians: "The strong
  do what they can; the weak suffer what they must." No appeal to justice or the gods would change the calculus of power.


  One year later, Athens launched the Sicily expedition — the largest military operation in Greek history to that point. 134
  triremes and roughly 30,000 men sailed west to conquer Syracuse. The campaign was championed by Alcibiades, the brilliant
  and reckless protege of Socrates, who was recalled from the expedition to face charges of sacrilege and defected to Sparta
  instead. Without Alcibiades, the campaign stalled. Syracuse, reinforced by Spartan general Gylippus, destroyed the Athenian
  fleet in the Great Harbor and annihilated the retreating army at the Assinarus River in September 413 BCE. Of the 40,000
  Athenians and allies who had sailed to Sicily, fewer than a few thousand returned. The survivors were imprisoned in the
  limestone quarries of Syracuse, where most died of disease and exposure.


  Athens fought on for nine more years, rebuilding its fleet twice, but the strategic balance had shifted. Sparta secured
  Persian gold — the empire Athens had once united Greece to fight — in exchange for surrendering Greek cities in Ionia to
  Persian control. Lysander, Sparta''s most effective admiral, destroyed the last Athenian fleet at Aegospotami in 405 BCE.
  Athens surrendered in 404 BCE. Sparta dismantled the Long Walls, dissolved the empire, and installed the Thirty Tyrants,
  an oligarchic regime that executed 1,500 Athenians in eight months before being overthrown.

  '
significance: 'The Peloponnesian War ended Athenian dominance in Greece and weakened the entire Greek world to the point where
  it was conquered by Macedon within 66 years of the war''s end. Thucydides''s account — deliberately written "as a possession
  for all time, not a prize composition to be heard for the moment" — became the foundational text of Western historiography,
  international relations theory, and strategic studies. The Melian Dialogue remains required reading at military academies,
  foreign ministries, and political science departments worldwide. "The strong do what they can; the weak suffer what they
  must" is the most-cited sentence in international relations scholarship. The war''s pattern — a democracy overreaching through
  imperial ambition, making a catastrophic expeditionary gamble, and losing its system of government as a consequence — has
  been applied as analogy by strategists from the Roman Senate to the Pentagon. Graham Allison''s "Thucydides Trap" thesis
  (2017) frames U.S.-China competition in the same terms Thucydides used for Athens and Sparta: a rising power threatening
  a ruling power makes war structurally likely.

  '
