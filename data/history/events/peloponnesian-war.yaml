- viewpoint: Athenian / Democratic-Imperial
  viewpoint_type: vanquished
  region_origin: europe
  narrative: 'The Athenian perspective, as Thucydides reconstructed it, was defined by the tension between democratic ideals
    and imperial necessity. Pericles articulated this tension in the Funeral Oration of 431 BCE — a speech delivered over
    the bodies of the first year''s war dead. The oration is the most famous defense of democracy in ancient literature. "Our
    constitution does not copy the laws of neighbouring states," Pericles declared. "We are rather a pattern to others than
    imitators ourselves." Athens was open where Sparta was closed; democratic where Sparta was oligarchic; cosmopolitan where
    Sparta was xenophobic. Athenian culture — the tragedies of Sophocles, the philosophy of Socrates, the architecture of
    the Parthenon — was produced by a system that gave citizens voice. The oration''s closing line to the widows in attendance
    defined the boundary of that voice: "the greatest glory of a woman is to be least talked about by men, whether they are
    praising you or criticizing you." Democracy extended to adult male citizens. Women, slaves, and metics — together the
    majority of Attica''s population — were excluded.


    But Pericles also told the Athenians a harder truth. "Your empire is now like a tyranny," he said in a later speech. "It
    may have been wrong to take it; it is certainly dangerous to let it go." The Delian League had begun in 478 BCE as a voluntary
    alliance against Persia. By the 440s, it was an empire. Athens moved the League treasury from Delos to the Acropolis in
    454 BCE and used the tribute — 600 talents annually from roughly 150 allied cities — to build the Parthenon. Members who
    tried to leave were crushed: Naxos in 470 BCE, Thasos in 465 BCE, Samos in 440 BCE. The empire funded the democracy. The
    rowing crews of the trireme fleet — free citizens of the lower class, the thetes — were paid from imperial revenue. Remove
    the empire, and the economic basis of democratic participation collapsed.


    The Sicily expedition revealed the democracy''s structural weakness: the assembly could vote for war on a wave of enthusiasm,
    without the institutional checks that might restrain ambition. Thucydides recorded that the Athenians voted overwhelmingly
    for the expedition with "a passionate desire to sail" (eros), and that most had no idea how large Sicily was or how many
    peoples inhabited it. Nicias, the reluctant general assigned to lead the expedition, tried to discourage the assembly
    by demanding an absurdly large force — and the assembly voted to give him everything he asked for. The democracy''s very
    responsiveness to popular desire became the mechanism of its destruction.


    After the catastrophe in Sicily, Athens survived nine more years through extraordinary resilience — rebuilding its fleet,
    winning victories at Cyzicus (410) and Arginusae (406), and fighting with a fraction of its former resources. During the
    Plague of Athens (430-426 BCE), Thucydides recorded that women who nursed the sick died disproportionately (2.51). By
    411 BCE, war-weariness had grown severe enough that Aristophanes staged Lysistrata — a comedy in which Athenian and Spartan
    women seize the Acropolis treasury and withhold sex to force their husbands to negotiate peace. The play was comedy, not
    politics, but it drew on real conditions: women managed household economies that were collapsing under twenty years of
    war. The end came not from a single defeat but from exhaustion. Lysander''s destruction of the fleet at Aegospotami cut
    off the grain supply from the Black Sea. Athens surrendered under siege in 404 BCE. The Long Walls were torn down to the
    sound of flute music. The Thirty Tyrants ruled for eight months before Thrasybulus led a democratic restoration — Athens
    was the only Greek city to restore democracy after oligarchic overthrow. But the empire was gone, and with it the economic
    foundation that had supported the golden age.

    '
  key_arguments:
  - Athenian democracy and Athenian empire were inseparable — imperial revenue funded democratic participation
  - Pericles's defensive strategy was sound; the plague, not strategic error, undermined the first phase
  - The Sicily expedition demonstrated the danger of democratic decision-making in matters of war — popular enthusiasm overwhelmed
    strategic judgment
  - Athens's resilience after Sicily — rebuilding the fleet twice, winning battles, surviving nine more years — is as remarkable
    as the defeat itself
