- viewpoint: Subject Peoples / The Melian Position
  viewpoint_type: vanquished
  region_origin: europe
  narrative: 'The Peloponnesian War, as Thucydides recorded it, was overwhelmingly a story told by the two great powers. The
    roughly 750 independent poleis of the Greek world — most with populations under 5,000 — had no Thucydides to record their
    experience. The Melian Dialogue, the most famous passage in Thucydides''s History, survives precisely because Thucydides
    chose to record the voice of a small state being destroyed — and because the Athenian response articulated the logic of
    power that small states have faced in every century since.


    In 416 BCE, Athens sent 38 ships, 3,000 hoplites, and 300 archers to Melos, a small island in the southern Aegean with
    a population of perhaps 1,500 citizens. Melos was a Spartan colony that had maintained neutrality throughout the war.
    Athens demanded submission and tribute. The Melians argued that they had harmed no one, that neutrality was their right,
    that the gods would protect the just, and that Sparta would come to their aid. The Athenian envoys dismissed every argument.
    Justice, they said, "is only in question between equals in power." The gods, if they existed, followed the same law as
    men: "of the gods we believe, and of men we know, that by a necessary law of their nature they rule wherever they can."
    Sparta would not come. The Melians refused to submit. Athens besieged the island for six months, then executed every adult
    male and enslaved the women and children.


    After the siege, Athens executed every adult male on Melos and sold the women and children into slavery (Thucydides 5.116).
    The fates diverged by sex: men were killed; women and children became property, dispersed across Aegean slave markets
    with no record of where they were sent.


    Melos was not unique. Mytilene, a member of the Delian League on the island of Lesbos, revolted in 428 BCE. After its
    recapture, the Athenian assembly voted to execute all adult males and enslave the rest. The next day, they reconsidered
    — barely. A second ship was sent to countermand the order, arriving hours before the first decree would have been carried
    out. But 1,000 men identified as ringleaders were still executed. Scione, a city in Chalcidice, revolted in 423 BCE; when
    Athens recaptured it in 421 BCE, all adult males were killed and women and children enslaved. Thucydides recorded the
    Scione decree with the same clinical detachment he applied to the plague.


    Sparta''s record was no better. After capturing Plataea in 427 BCE — the same city whose attack had started the war —
    the Spartans put the surviving garrison on trial. Each man was asked one question: "Have you done anything to help the
    Spartans or their allies in the present war?" When the answer was no — as it inevitably was, since Plataea had been under
    siege — the man was executed. Two hundred Plataeans and 25 Athenians were killed. The women were enslaved. Thebes demolished
    the city.


    The war''s impact on the non-combatant Greek world was devastating in ways that Thucydides documented but did not foreground.
    Civil wars (stasis) broke out across the Greek world as democratic and oligarchic factions within cities aligned with
    Athens and Sparta respectively. In Corcyra (427 BCE), the stasis killed hundreds as neighbors settled scores under the
    cover of ideological alignment. Thucydides described the Corcyrean revolution as the prototype of a pattern that spread
    across Greece: "Words changed their ordinary meaning. Reckless audacity was held to be loyal courage; prudent hesitation
    was the excuse of a coward; moderation was a cloak for weakness; frantic violence became the attribute of manliness."
    The passage has been cited by observers of civil wars from the French Revolution to Syria.


    For the small states, the lesson of the Peloponnesian War was that neither great power respected the independence of the
    weak. Athens crushed neutrals who refused tribute. Sparta abandoned allies who became inconvenient. Persia bankrolled
    whichever side offered the better deal. The Greek world that emerged from the war was exhausted, depopulated, and demoralized
    — incapable of resisting the Macedonian conquest that came within two generations.

    '
  key_arguments:
  - The Melian Dialogue is the foundational text on the powerlessness of small states in a system dominated by great powers
  - Neither Athens nor Sparta respected the sovereignty of smaller poleis — both used ideology (democracy, liberation) as
    cover for coercion
  - Civil war (stasis) within cities, driven by great-power intervention, killed as many Greeks as the battles themselves
  - The war destroyed the independence of the Greek polis system, preparing the way for Macedonian conquest
