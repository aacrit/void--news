- viewpoint: Western Revisionist / Source-Critical (Crone, Cook, Donner)
  viewpoint_type: revisionist
  region_origin: europe
  narrative: 'The traditional narrative of Islam''s origins has a problem: the sources are late. The earliest comprehensive biography of Muhammad — Ibn Ishaq''s Sirat Rasul Allah — was written around 767
    CE, 135 years after Muhammad''s death, and survives only in Ibn Hisham''s recension from 833. The earliest hadith collections — Bukhari, Muslim — date from the 9th century. The Quran itself, according
    to Islamic tradition, was compiled under Uthman around 650, but the earliest physical manuscript fragments date to approximately 645-690 CE (the Birmingham Quran manuscript, carbon-dated to 568-645 CE,
    is a notable exception whose dating remains debated).


    Patricia Crone and Michael Cook, in their 1977 book Hagarism: The Making of the Islamic World, proposed a radical rethinking. Working primarily from non-Arabic sources — Greek, Syriac, Armenian, Hebrew
    — they argued that the earliest external witnesses to the Arab conquests did not describe what later Islamic tradition describes. The Greek chronicle attributed to Doctrina Jacobi (634 CE) mentions an
    Arab prophet who was still alive — whereas Islamic tradition holds that Muhammad died in 632. Armenian sources from the 660s describe the conquerors as motivated by land and plunder, not religious mission.
    The Dome of the Rock inscriptions (691 CE) — the earliest surviving Islamic monumental text — reference Jesus extensively and contain Quranic passages, but their theology does not neatly match the later
    Sunni orthodoxy. Crone and Cook suggested that the "Islamic" identity of the conquerors crystallized later than tradition holds, and that the earliest Arab movement was something different from the religion
    codified in the 9th century.


    Hagarism was widely criticized — by both Muslim scholars and Western Arabists — for its speculative methodology and its reliance on hostile external sources over internal Arabic ones. Crone herself
    later retreated from the book''s most provocative claims. But the core methodological insight survived: the gap between events (7th century) and sources (8th-9th century) is real, and the traditional
    narrative cannot simply be taken at face value. Fred Donner, in Muhammad and the Believers (2010), offered a more moderate revision: the earliest community, he argued, was an ecumenical monotheistic
    movement that included Christians and Jews alongside Muhammad''s followers, and the specifically "Islamic" identity — with its sharp boundaries against other Abrahamic faiths — developed only in the
    late 7th or early 8th century under the Umayyads.


    The archaeological evidence complicates matters further. The earliest Arab coins (from the 680s) bear crosses and Sassanid fire-temple imagery alongside Arabic inscriptions — suggesting that the conquerors
    initially adopted the symbols of the empires they replaced rather than imposing a distinct Islamic visual identity. The transition to explicitly Islamic coinage — with Arabic inscriptions replacing
    figural imagery — occurred under the Umayyad caliph Abd al-Malik in the 690s, the same period that produced the Dome of the Rock. The material evidence suggests that the 690s, not the 630s, were the
    decisive decade for the formation of Islam as a distinct, self-conscious religion.


    This is not a claim that Muhammad did not exist or that the Quran is not early. The scholarly consensus, even among revisionists, is that a historical Muhammad existed, that the Quran contains material
    from his lifetime, and that the Arab conquests were real events driven (at least in part) by religious motivation. The revisionist contribution is narrower but important: the traditional narrative was
    constructed retrospectively, the early community was more fluid and diverse than the later tradition acknowledges, and the sharp boundaries between Islam, Christianity, and Judaism were drawn later than
    Muslim or Christian orthodoxies assume.

    '
  key_arguments:
  - The earliest comprehensive Islamic sources were written 135+ years after the events they describe — the gap between event and text is a methodological problem
  - Non-Arabic sources from the 7th century do not fully corroborate the later Islamic traditional narrative
  - Archaeological evidence (coins, inscriptions) suggests that a distinctly "Islamic" identity crystallized in the 690s under Abd al-Malik, not in the 630s
  - The early Muslim community may have been more ecumenical and theologically fluid than later Sunni or Shia orthodoxies acknowledge
