  - text: 'The Ishmaelites overran the entire region like a flood.'
    speaker: Sophronius, Patriarch of Jerusalem
    context: Christmas sermon, 634 CE, describing the Arab advance on Palestine
  emphasized:
  - The 26-year Byzantine-Sassanid War as the precondition for the Arab conquests
  - The plague of Justinian as a demographic catastrophe that tilted the balance
  - Arab timing and mobility rather than civilizational superiority explaining the speed of conquest
