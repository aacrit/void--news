perspectives:
- viewpoint: Early Islamic / Sunni Tradition
  viewpoint_type: victor
  region_origin: middle-east
  narrative: 'The revelation came to a man who did not seek it. Muhammad ibn Abdullah was 40 years old, married to Khadijah bint Khuwaylid — a merchant wealthier and older than himself — and prosperous by
    the standards of Mecca. He had no political ambition, no army, no following. He retreated to the cave on Mount Hira for contemplation, a practice common among the hanifs — Arab monotheists who rejected
    the polytheism of the Kaaba. In the cave, Jibril seized him, compressed him until he could not breathe, and delivered the command: Iqra — Read. The first surah was five verses. Muhammad was terrified.
    He returned to Khadijah trembling, saying: "Cover me, cover me." She covered him. She told him God would not disgrace him. She became the first Muslim.


    The Sunni narrative reads the next 22 years — from the first revelation in 610 to Muhammad''s death in 632 — as the unfolding of a divine plan through human action. The persecution in Mecca (the boycott
    of the Hashim clan, the stoning of Muhammad at Taif, the emigration to Abyssinia), the hijra to Medina in 622, the battles of Badr (624), Uhud (625), and the Trench (627), the Treaty of Hudaybiyyah
    (628), the conquest of Mecca (630), and the Farewell Pilgrimage (632) — each event is understood as a test designed by God and passed by the Prophet and his companions.


    At Badr, 313 Muslims defeated approximately 1,000 Quraysh — outnumbered three to one. The Quran describes angelic intervention: "You did not throw when you threw, but it was Allah who threw" (8:17).
    At the Battle of the Trench, a coalition of 10,000 Quraysh and their allies besieged Medina; the Muslims dug a trench — an innovation suggested by Salman al-Farisi, a Persian convert — that neutralized
    the enemy''s cavalry advantage. The siege failed. The Quraysh coalition dissolved. Within two years, Muhammad entered Mecca without significant resistance, destroyed the 360 idols in the Kaaba, and
    declared: "Truth has come, and falsehood has departed."


    The succession after Muhammad''s death was, in the Sunni reading, a matter of pragmatic consensus, not divine appointment. Abu Bakr was chosen at the Saqifa of Banu Sa''ida — a meeting of senior companions
    — on the basis of his closeness to Muhammad, his age, and his leadership during the Prophet''s illness (Muhammad had asked Abu Bakr to lead prayers in his final days). The Ridda Wars (632-633), in which
    Abu Bakr suppressed tribes that stopped paying zakat (alms tax) after Muhammad''s death, established a foundational principle: the political community created by Muhammad was non-negotiable. Tribes could
    not opt out of their obligations simply because the Prophet was gone.


    The conquests that followed were, in the Sunni framework, acts of justice. The Sassanid and Byzantine empires had oppressed their subjects — Zoroastrian orthodoxy in Persia, Byzantine Chalcedonian Christianity
    imposed on Monophysite and Nestorian populations. The Arabs offered an alternative: submission to God, a poll tax (jizya) for non-Muslims that was often lower than Byzantine taxation, and relative
    freedom of worship. The speed of the conquests reflected not merely military skill but divine favor. Khalid ibn al-Walid, the "Sword of God," never lost a battle — not at Walaja, not at Yarmouk, not
    in a career spanning 50 engagements. The Sunni tradition reads his record as evidence that the conquests were guided from above.


    The Rashidun period (632-661) is the golden age. Umar ibn al-Khattab administered the largest empire on earth from a mud-brick house, wore patched clothing, and walked the streets of Medina at night
    to hear the complaints of the poor. When he conquered Jerusalem in 637, he refused to pray in the Church of the Holy Sepulchre, saying that if he did, Muslims would convert it into a mosque. He prayed
    outside. The Pact of Umar — whatever its actual provenance — codified a system in which Christians and Jews lived as protected communities (dhimmis) within the Islamic state, paying jizya in exchange
    for exemption from military service and the right to practice their faith. The system was not egalitarian by modern standards. It was more tolerant than anything Byzantium or Sassanid Persia had offered.

    '
  key_arguments:
  - The Quranic revelation was divine — Muhammad did not create the text but received it over 22 years from the angel Jibril
  - The early conquests were acts of liberation — oppressed populations under Byzantine and Sassanid rule welcomed Muslim governance
  - The Rashidun caliphs governed with justice, humility, and consultation — a model of righteous leadership
  - The speed and success of the conquests are evidence of divine favor, not merely military advantage
