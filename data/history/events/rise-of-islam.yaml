- viewpoint: Shia Tradition
  viewpoint_type: vanquished
  region_origin: middle-east
  narrative: 'The betrayal happened before the body was cold. On June 8, 632, Muhammad died in the arms of his wife Aisha in Medina. His body had not yet been washed for burial when a group of senior companions
    — Abu Bakr, Umar, Abu Ubayda — gathered at the Saqifa (covered porch) of the Banu Sa''ida clan and chose Abu Bakr as caliph. Ali ibn Abi Talib — Muhammad''s cousin, his son-in-law (married to Fatimah,
    Muhammad''s daughter), the father of Muhammad''s only surviving grandsons (Hasan and Husayn), and the first male convert to Islam — was at home, washing the Prophet''s body. He was not consulted. He was
    not present. He was not chosen.


    The Shia narrative begins here — not with a theological disagreement but with a political act. The Sunni tradition treats the Saqifa election as pragmatic consensus. The Shia tradition treats it as a
    coup. The evidence they cite is Quranic and prophetic: at the Ghadir Khumm — a gathering on Muhammad''s return from his Farewell Pilgrimage in 632 — the Prophet took Ali''s hand and declared, according
    to multiple hadith traditions: "Whoever I am his mawla, Ali is his mawla." The Sunni reading of ''mawla'' is "friend" or "supporter." The Shia reading is "master" or "authority." The entire Sunni-Shia
    split — 1,400 years of sectarian division, the distinction between 1.5 billion Sunnis and 250 million Shia — turns on the meaning of a single Arabic word.


    Ali waited. He did not rebel against Abu Bakr, Umar, or Uthman. For 24 years, he served the community while being denied what the Shia tradition considers his divine right. When he finally became the
    fourth caliph in 656 — after Uthman''s assassination — he inherited a fractured community. Aisha, Muhammad''s widow, raised an army against him at the Battle of the Camel (656). Muawiya, the governor
    of Syria and Uthman''s kinsman, refused to acknowledge Ali''s authority. At the Battle of Siffin (657), Muawiya''s forces — losing on the battlefield — raised pages of the Quran on their spears, demanding
    arbitration. Ali''s soldiers forced him to accept. The arbitration was a trap: it treated Ali and Muawiya as equals, undermining Ali''s legitimate caliphate.


    Ali was murdered on January 28, 661, struck on the head with a poisoned sword by Ibn Muljam, a Kharijite, while praying in the mosque of Kufa. He was 59 years old. Muawiya declared himself caliph.
    The caliphate became a dynasty — the Umayyads — passed from father to son, exactly the kind of hereditary monarchy that the Shia tradition argues Muhammad intended to prevent by designating Ali.


    The wound became permanent at Karbala. In 680, Ali''s younger son Husayn — Muhammad''s grandson, carrying the bloodline of the Prophet — challenged the Umayyad caliph Yazid I. With a band of 72 fighters
    and family members, Husayn marched toward Kufa, where supporters had promised their allegiance. The supporters never came. On October 10, 680 (the 10th of Muharram), Yazid''s army of 4,000 surrounded
    Husayn''s camp at Karbala, cut off their water supply for three days, then slaughtered them. Husayn was the last to die. His head was cut off and sent to Yazid in Damascus. His body was trampled by horses.


    Karbala is not a historical event in Shia consciousness. It is a living wound. The annual commemoration of Ashura — observed by Shia Muslims worldwide through mourning rituals, processions, passion plays
    (ta''ziyeh), and self-flagellation — reenacts the suffering of Husayn as a paradigm of justice betrayed. The message is not merely that Husayn was wronged but that the duty of every Muslim is to stand
    with the oppressed against the oppressor, even at the cost of life. Karbala, in the Shia reading, is not a defeat. It is the moral victory that defines the community.

    '
  key_arguments:
  - Ali was Muhammad's designated successor — the Saqifa election was a political usurpation of a divine appointment
  - The meaning of 'mawla' at Ghadir Khumm is the central textual dispute — friend vs. authority, 1,400 years unresolved
  - Karbala (680 CE) is not merely a historical event but a paradigm of justice vs. tyranny that defines Shia identity
  - The Umayyad dynasty represented the corruption of Islam's original egalitarian message into hereditary monarchy
  sources:
  - title: Kitab al-Irshad (The Book of Guidance)
