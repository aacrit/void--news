slug: rise-of-islam
title: The Rise of Islam
subtitle: A merchant in a cave. Within 100 years, his followers had absorbed two empires.
date_display: 610-750 CE
date_sort: 632
date_precision: year
era: medieval
region: middle-east
country: Multiple (present-day Saudi Arabia, Iraq, Iran, Syria, Egypt, Libya, Palestine, Jordan)
category: political
severity: catastrophic
death_toll: 'No reliable aggregate exists; the Ridda Wars (632-633) killed thousands of Arab tribesmen; the Battle of Qadisiyyah (636) killed an estimated 8,500 Sassanid troops; the Battle of Yarmouk (636)
  killed an estimated 40,000 Byzantine soldiers; total military and civilian deaths across 120 years of conquest remain unquantified'
affected_population: 'By 750 CE, the Umayyad and early Abbasid Caliphate governed an estimated 62 million people — approximately 29% of the world population — across a territory stretching from the Iberian
  Peninsula to the Indus River'
duration: '140 years from the first revelation (610 CE) to the consolidation of the Abbasid Caliphate (750 CE)'
summary: 'In 610 CE, a 40-year-old merchant from the Quraysh tribe of Mecca retreated to a cave on Mount Hira. According to Islamic tradition, the angel Jibril (Gabriel) appeared to him and commanded: "Read."
  Muhammad ibn Abdullah could not read. Jibril squeezed him until he could barely breathe, then repeated the command. The first verses of what would become the Quran were revealed that night. Muhammad returned
  to his wife Khadijah trembling. She told him he was not possessed. She believed him.


  For 12 years, Muhammad preached in Mecca to a hostile audience. The Quraysh elite — custodians of the Kaaba, a polytheistic shrine that generated pilgrim revenue — saw his monotheism as an economic and
  political threat. His followers numbered in the dozens, then the low hundreds. In 622, facing assassination, Muhammad and his community emigrated to Yathrib, 270 miles north. The city became Medina —
  Madinat al-Nabi, the City of the Prophet. Year One of the Islamic calendar begins not with the revelation but with this emigration: the hijra. The message mattered less than the community it created.


  Muhammad died in Medina on June 8, 632 CE, without naming a successor. He was 62 years old. He left behind a community of perhaps 100,000 Muslims, a city-state that controlled most of the Arabian Peninsula,
  and a text — the Quran — that existed in oral recitation, on palm leaves, shoulder-blades of camels, and the memories of his companions. He left no dynasty, no administrative manual, no army manual.
  What happened next was the fastest imperial expansion in recorded history to that point.


  Within 12 years of Muhammad''s death, Arab armies had destroyed the Sassanid Persian Empire — a state that had existed for 400 years — and stripped the Byzantine Empire of its wealthiest provinces: Syria,
  Palestine, Egypt, and Libya. At the Battle of Yarmouk in August 636, an Arab force of perhaps 25,000-40,000 defeated a Byzantine army of 80,000-150,000 (numbers are disputed) in a six-day engagement
  that ended Byzantine control of the Levant forever. At Qadisiyyah the same year, the Sassanid army was routed; by 651, the last Sassanid emperor, Yazdegerd III, was murdered by one of his own subjects
  while fleeing eastward. The Persian Empire — which had fought Rome and Byzantium to a standstill for seven centuries — ceased to exist in 15 years.


  The speed demands explanation. The two empires had exhausted each other in a devastating 26-year war (602-628) that had seen the Sassanids capture Jerusalem, take the True Cross, and occupy Egypt, only
  to be driven back by the Byzantine emperor Heraclius in a campaign that bankrupted both states. The plague of Justinian (541-750) had reduced the populations of both empires by an estimated 25-50%.
  Arab armies arrived at the precise moment when neither power could resist. The conquered populations — Coptic Christians in Egypt, Nestorians in Iraq, Jews across the Levant, Zoroastrians in Iran —
  had little loyalty to their imperial overlords and sometimes welcomed rulers who offered lower taxes and relative religious tolerance.


  The conquests did not produce a stable polity. The first four caliphs — Abu Bakr (632-634), Umar (634-644), Uthman (644-656), and Ali (656-661) — are called the Rashidun, the "rightly guided," by Sunni
  Muslims. Three of the four were assassinated. Umar ibn al-Khattab, who administered an empire from Libya to Iran from a mud-brick house in Medina, was stabbed to death by Abu Lu''lu''a, a Persian slave,
  in 644. Uthman ibn Affan, who compiled the Quran into a single authoritative text, was murdered by rebellious soldiers from Egypt in 656. Ali ibn Abi Talib, Muhammad''s cousin and son-in-law, fought
  a civil war against Muawiya ibn Abi Sufyan, the governor of Syria, that ended at the Battle of Siffin in 657 — where, according to tradition, Muawiya''s soldiers raised pages of the Quran on their spears
  to force a ceasefire. The arbitration that followed satisfied no one. A faction of Ali''s supporters — the Kharijites, from the Arabic for "those who went out" — rejected both Ali and Muawiya and declared
  that only God could judge. A Kharijite assassin killed Ali in 661. Muawiya became caliph and founded the Umayyad dynasty, headquartered in Damascus.


  The Umayyads (661-750) transformed the caliphate from a charismatic community into a hereditary empire. They built the Dome of the Rock in Jerusalem (691), the Great Mosque of Damascus (706-715), and an
  administrative apparatus borrowed from Byzantine and Sassanid models. They conquered North Africa, the Iberian Peninsula (711), and Central Asia. At its peak under Caliph Hisham ibn Abd al-Malik
  (r. 724-743), the Umayyad Caliphate stretched from the Pyrenees to the borders of China — the largest empire the world had yet seen. In 750, the Abbasid revolution overthrew the Umayyads. The Abbasids
  moved the capital to Baghdad. One Umayyad prince, Abd al-Rahman, escaped to Spain and founded an independent emirate at Cordoba. The Islamic world fractured politically but remained culturally and
  religiously unified. By 750 CE, 1.9 billion people''s faith had its institutional architecture in place.

  '
significance: 'Islam''s emergence between 610 and 750 CE created a new civilizational zone stretching from the Iberian Peninsula to Central Asia — the largest empire in world history to that point. The Sassanid
  Persian Empire (400 years old) was destroyed entirely; the Byzantine Empire lost its richest provinces permanently. The Quran, compiled under Caliph Uthman (644-656), became the foundational text for 1.9
  billion people. The Sunni-Shia split, originating in the succession dispute of 632-661, remains the primary sectarian division in Islam. The Umayyad and Abbasid administrative systems preserved and
  transmitted Greek, Persian, and Indian scientific knowledge that would re-enter Europe through Islamic Spain and Sicily.

  '
