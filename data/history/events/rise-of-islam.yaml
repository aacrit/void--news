- Three of the first four caliphs were assassinated — the early Muslim community was forged in political violence
- The Battle of Siffin (657) produced the Sunni-Shia split — the defining sectarian division for 1.9 billion Muslims today
- Caliph Umar administered an empire from Libya to Iran from a mud-brick house in Medina
- The Quran was compiled into a single text under Uthman (644-656) from oral tradition, palm leaves, and the memories of companions
- The Umayyad Caliphate (661-750) became the largest empire in world history to that point, stretching from Spain to Central Asia
- The Kharijites — Islam's first sectarian movement — emerged from the arbitration at Siffin and assassinated Ali in 661
