- viewpoint: Peasant / Worker
  viewpoint_type: indigenous
  region_origin: europe
  narrative: 'By February 1917, a factory worker in Petrograd earned approximately 5 rubles a day. A pound of bread cost 12
    kopecks in 1914; by January 1917, it cost 32 kopecks when it was available at all. Workers'' wives spent entire nights
    in bread lines. Temperatures in February 1917 dropped to -30 Celsius. The women who walked out of the Vyborg textile mills
    on February 23 were not following a revolutionary program. They wanted bread.


    The peasant experience of 1917 is documented not in party manifestos but in the resolutions of village communes (miry)
    and the volost (township) assemblies that multiplied after February. The Provisional Government promised land reform but
    delayed action until a Constituent Assembly could be convened. Peasants did not wait. From April 1917 onward, village
    communes began seizing gentry estates — cutting timber, grazing livestock on landlord meadows, dividing fields. By October,
    much of European Russia''s agricultural land had been redistributed by peasant action, not Bolshevik decree. The Decree
    on Land of October 26 ratified a fait accompli.


    The soldiers'' experience was inseparable from the peasant experience because Russian soldiers were peasants in uniform.
    By 1917, 15 million men had been mobilized — roughly half the male agricultural workforce. Casualty figures for the Eastern
    Front are imprecise: approximately 1.8 million Russian soldiers were killed and 2.5 million wounded between 1914 and 1917.
    Desertion rates rose from approximately 34,000 per month in 1916 to 200,000 per month by September 1917. When soldiers
    deserted, they went home to their villages — often bringing their rifles.


    What the revolution meant at the village level is captured in ethnographic studies and the surviving minutes of commune
    assemblies. Aaron Retish''s Russia''s Peasants in Revolution and Civil War (2008) documents Vyatka province: peasants
    initially welcomed the fall of the Tsar as an end to conscription and requisitioning. They formed land committees that
    redistributed gentry estates roughly along traditional communal principles — redistribution by household size, periodic
    re-allotment. The Bolshevik Decree on Land used Socialist-Revolutionary language because Lenin understood that the peasants''
    revolution was not Marxist. It was communal, egalitarian, and deeply local.


    The civil war destroyed what the revolution had offered. War Communism (1918-1921) reimposed grain requisition — now by
    Bolshevik prodrazverstka squads instead of tsarist tax collectors. Peasants who resisted were shot. The Tambov Rebellion
    of 1920-1921, the largest peasant uprising against Bolshevik rule, was suppressed by Red Army forces under Tukhachevsky
    using artillery, hostage-taking, and (according to some accounts) poison gas. The rebellion was erased from Soviet history
    for 70 years. By 1921, the peasantry that had made the revolution found itself governed by a party that requisitioned
    its grain, conscripted its sons, and arrested its village leaders. Lenin''s New Economic Policy (1921) was a retreat from
    War Communism, allowing limited market activity — but the direction was set. Under Stalin, collectivization (1928-1933)
    would finish what requisitioning started.

    '
  key_arguments:
  - February began as a bread riot, not a political revolution — hunger drove the uprising
  - Peasants redistributed land on their own initiative; the Decree on Land ratified existing facts
  - 15 million mobilized soldiers were peasants whose war experience radicalized them
  - War Communism and civil war destroyed the revolution's promises to the people who made it
