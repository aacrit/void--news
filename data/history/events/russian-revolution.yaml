- viewpoint: White Russian / Monarchist
  viewpoint_type: vanquished
  region_origin: europe
  narrative: 'The imperial family was moved to Tobolsk in August 1917, then to Yekaterinburg in April 1918. On the night of
    July 16-17, 1918, Yakov Yurovsky and a squad of Bolshevik and Cheka operatives woke Nicholas, Alexandra, their five children
    (Olga, Tatiana, Maria, Anastasia, and Alexei, aged 13), the family physician Dr. Botkin, and three servants. They were
    told to dress and go to the basement for a photograph. Yurovsky read a brief statement, then the squad opened fire. The
    execution took 20 minutes; some of the children survived the initial volley because of diamonds sewn into their corsets.
    The bodies were driven to an abandoned mineshaft, doused in acid, and buried in a forest road. They were not found until
    1991.


    The monarchist and White narrative frames the revolution as the destruction of a legitimate state by an armed minority
    exploiting wartime chaos. The February Revolution — spontaneous, leaderless, driven by bread riots and military mutiny
    — was one thing. The October seizure was another: a planned coup by a disciplined cadre that never won a democratic mandate.
    The Constituent Assembly election of November 1917 proved it — the Bolsheviks won 24% of the vote; the SRs won 40%. Lenin
    dissolved the Assembly after one day.


    The White movement that coalesced in 1918 was never unified. Admiral Kolchak in Siberia, General Denikin in the south,
    General Yudenich near Petrograd, and Baron Wrangel in the Crimea fought separate campaigns with separate supply lines.
    They shared anti-Bolshevism but agreed on little else: Kolchak wanted to restore the Assembly; monarchists wanted the
    Romanovs; Cossack atamans wanted autonomy; national minorities wanted independence. The Whites'' inability to articulate
    a positive political program — beyond "not Bolshevik" — cost them peasant support. Denikin''s forces committed pogroms
    in Ukraine that killed an estimated 50,000 Jews in 1919-1920, driving Jewish communities toward the Bolsheviks by default.


    The emigre diaspora that followed defeat numbered 1.5-2 million. Russian communities formed in Paris, Berlin, Prague,
    Harbin, and Shanghai. They maintained schools, churches, newspapers, and military organizations. The Russian All-Military
    Union (ROVS) continued to regard itself as the legitimate Russian armed forces in exile. Emigre writers — Ivan Bunin (Nobel
    Prize 1933), Vladimir Nabokov, Nina Berberova — produced a literature of exile and loss. The Orthodox Church Abroad, founded
    in Sremski Karlovci in 1921, did not reconcile with the Moscow Patriarchate until 2007.


    What the monarchist perspective mourns is not a political system but a civilization. The Russian Empire of 1913 was the
    world''s fifth-largest economy. Its agricultural output was the highest in Europe. Stolypin''s reforms (1906-1911) had
    created a class of independent peasant farmers. The Trans-Siberian Railway, completed in 1916, was the longest in the
    world. The Silver Age of Russian culture — Stravinsky, Rachmaninoff, Diaghilev, Blok, Akhmatova — was in full flower.
    All of this was destroyed not by inevitable historical forces but by the contingency of war, the weakness of one Tsar,
    and the ruthlessness of one party.

    '
  key_arguments:
  - October was a coup by a party that won 24% of the vote and dissolved the elected assembly
  - The execution of the imperial family, including five children, was a premeditated crime
  - White movement failed due to internal disunity, not Bolshevik popular mandate
  - Russia in 1913 was modernizing and culturally flourishing — revolution was not inevitable
