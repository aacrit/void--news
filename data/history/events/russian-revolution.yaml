legacy_points:
- Created the first Marxist state, a model replicated across one-third of humanity by the 1970s
- Split the international left between communists and social democrats — a division that shaped the 20th century
- Produced the civil war (1917-1922) that killed 7-9 million and established the coercive template Stalin inherited
- Took Russia out of World War I, altering the war's endgame and the Versailles settlement
- Generated the ideological framework for the Cold War, the arms race, and proxy conflicts across the Global South
