duration: February-October 1917 (revolution); 1917-1922 (civil war)
summary: 'On the morning of February 23, 1917 (March 8, New Style), women textile workers in the Vyborg district of Petrograd
  walked off their jobs. It was International Women''s Day. Bread lines had stretched around blocks for weeks — the capital
  received only half its normal grain supply that winter. By afternoon, 100,000 workers had joined the strike. By February
  25, the city was paralyzed. Tsar Nicholas II, at his military headquarters in Mogilev 400 miles away, telegraphed the Petrograd
  garrison commander: "I order that the disorders in the capital shall be ended tomorrow." The troops opened fire on February
  26, killing approximately 40 demonstrators on Nevsky Prospect. On February 27, the Volynsky Regiment mutinied. 70,000 soldiers
  joined the crowds within 24 hours.


  Nicholas abdicated on March 2 (March 15, New Style) in a railway car at Pskov. He signed the document with the same pen
  he used for routine correspondence. His brother Grand Duke Michael refused the throne the next day. Three hundred years
  of Romanov rule ended in a week. No organized party led the February Revolution. The Bolsheviks had 24,000 members in a
  country of 170 million. Lenin was in Zurich reading about it in the newspapers.


  Two authorities claimed power simultaneously. The Provisional Government, formed from Duma liberals, promised a constituent
  assembly, civil liberties, and continuation of the war against Germany. The Petrograd Soviet of Workers'' and Soldiers''
  Deputies, elected from factories and military units, issued Order No. 1 on March 1 — before the Tsar even abdicated — declaring
  that soldiers should obey their officers only when Soviet orders did not contradict. The Provisional Government governed
  on paper; the Soviet controlled the garrison. Alexander Kerensky sat in both bodies, the only man who did.


  Lenin arrived at the Finland Station on April 3, 1917, in a sealed train provided by the German General Staff, who calculated
  that a Bolshevik revolution would take Russia out of the war. His April Theses — published on April 7 — rejected any support
  for the Provisional Government and demanded "All Power to the Soviets," immediate peace, and land to the peasants. His own
  party thought he had gone mad. Kamenev and Zinoviev published dissents. But between April and October, the Provisional Government
  destroyed itself: Kerensky launched the disastrous June Offensive, which cost 200,000 casualties and triggered mass desertions;
  the Kornilov Affair in August — a bungled military coup — drove moderate officers into political exile and armed the Bolsheviks,
  who received 40,000 rifles to defend Petrograd.


  On the night of October 25-26 (November 7-8, New Style), Bolshevik Red Guards and sympathetic soldiers occupied the telephone
  exchange, the telegraph office, the State Bank, and the railway stations. The cruiser Aurora fired a blank round at the
  Winter Palace at 9:40 PM. The Ministers of the Provisional Government were arrested in the Malachite Room at 2:10 AM; Kerensky
  had left that morning in a car borrowed from the American Embassy. The Second All-Russian Congress of Soviets convened at
  the Smolny Institute while the palace was still being taken. Lenin announced: "We shall now proceed to construct the socialist
  order." The Mensheviks and Right Socialist-Revolutionaries walked out in protest. Trotsky told them: "Go where you belong
  — into the dustbin of history."

  '
significance: 'The Russian Revolution created the world''s first state governed by a Marxist party, a model that would be
  replicated or imposed in China, Cuba, Vietnam, Korea, Eastern Europe, Ethiopia, Angola, Mozambique, Cambodia, and Afghanistan.
  At its peak in the 1970s, roughly one-third of humanity lived under governments that traced their legitimacy to October
  1917.


  The revolution''s first decrees — on peace, on land, on workers'' control — established a template: revolution promised
  an end to war, redistribution of property, and worker empowerment. The reality diverged almost immediately. The civil war
  of 1918-1922 killed 7-9 million people through combat, famine, and epidemic. War Communism — forced grain requisition, labor
  conscription, the Cheka''s Red Terror — produced the framework that Stalin would later industrialize. The Kronstadt rebellion
  of March 1921, in which the same sailors who had supported the Bolsheviks in 1917 rose against them, was suppressed by Trotsky''s
  forces crossing the ice.


  The revolution split the international left for a century. The Communist International (1919) demanded that socialist parties
  worldwide break with social democracy and accept Bolshevik discipline. Those who refused were labeled class traitors. The
  split between communists and social democrats — which prevented a united left in Weimar Germany and contributed to Hitler''s
  rise — originated in the conditions Lenin imposed in 1920. The Cold War, the arms race, the Berlin Wall, the Korean and
  Vietnam Wars, the proxy conflicts across the Global South — all trace their genealogy to the 10 days in October when 25,000
  Bolsheviks seized a government that 170 million people had not chosen.

  '
