connections:
- target_slug: holodomor
  connection_type: caused
  description: The Soviet state created by the revolution imposed forced collectivization on Ukraine in 1929-1933, producing
    the famine that killed 3.5-7.5 million Ukrainians
- target_slug: french-revolution
  connection_type: influenced
  description: The Bolsheviks explicitly studied the French Revolution as a model — Lenin compared the Jacobins to his vanguard
    party, and Trotsky wrote about Thermidor as the revolution's betrayal from within
- target_slug: fall-of-berlin-wall
  connection_type: consequence
  description: The Soviet system created in 1917 collapsed 74 years later — the Berlin Wall's fall in 1989 and the USSR's
    dissolution in 1991 bookended the project October began
- target_slug: tiananmen-square
  connection_type: influenced
  description: The Chinese Communist Party, founded in 1921 with Comintern support, drew its organizational model and revolutionary
    legitimacy from the Bolshevik precedent — and faced its own crisis of democratic demand in 1989
