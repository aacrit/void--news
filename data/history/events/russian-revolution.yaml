perspectives:
- viewpoint: Bolshevik
  viewpoint_type: victor
  region_origin: europe
  narrative: 'Lenin''s analysis was structural: Russia''s war was an imperialist war, the Provisional Government was a bourgeois
    holding action, and the soviets were the embryonic organs of proletarian power. His April Theses — rejected by most of
    his own party when he read them on April 4 — reframed the political question. The issue was not whether the revolution
    was "premature" (as the Mensheviks argued, citing Marx''s stages of development) but whether the revolutionary situation
    would last. "There is not the slightest doubt that our revolution would have perished long ago had power not been seized,"
    Lenin wrote later.


    The Bolshevik narrative emphasizes the class logic of 1917. Russia''s industrial working class — 3.6 million in a country
    of 170 million — was concentrated in massive factories. The Putilov Works in Petrograd employed 30,000 workers. These
    factories functioned as political schools: strike committees became soviets, shop-floor disputes became political education.
    The Bolsheviks grew from 24,000 members in February to 200,000 by August 1917, not through conspiracy but because their
    program — peace, land, bread, all power to the soviets — matched what workers, soldiers, and peasants already wanted.
    The Menshevik and Socialist-Revolutionary parties lost support precisely because they refused to break with the Provisional
    Government and end the war.


    The October insurrection itself was, in Trotsky''s telling, an act of precise organizational execution. The Military Revolutionary
    Committee of the Petrograd Soviet — chaired by Trotsky — deployed Red Guards and sympathetic garrison units to seize control
    of the city''s infrastructure in 48 hours. Casualties were minimal; perhaps six people died during the taking of the Winter
    Palace. John Reed, the American journalist present, described the scene in Ten Days That Shook the World (1919): soldiers
    wandering through the palace, marveling at the furniture, pocketing silverware, while commissars set up offices in the
    servants'' quarters.


    The Decree on Peace (October 26) called for immediate negotiations without annexations or indemnities. The Decree on Land
    abolished private ownership of land and transferred it to local land committees — ratifying what peasants had already
    done across the countryside since the summer. The Decree on Workers'' Control gave factory committees supervisory authority
    over production and finances. These were not abstract ideological impositions but responses to the actual demands of the
    revolution''s base.


    The dissolution of the Constituent Assembly on January 6, 1918 — after its first and only meeting — is the hardest moment
    for the Bolshevik narrative to justify. The Assembly was elected in November 1917 on universal suffrage. The Socialist-Revolutionaries
    won 370 of 707 seats; the Bolsheviks won 168. Lenin dismissed the Assembly as an artifact of bourgeois parliamentarism
    that had been overtaken by soviet democracy. The Assembly sat for 12 hours before Red Guards cleared the hall. Lenin''s
    argument — that direct democracy through soviets was more representative than parliamentary elections — would be tested
    by the subsequent centralization of power in the party, the Cheka, and eventually Stalin.

    '
  key_arguments:
  - The October revolution was the logical culmination of class conflict, not a coup by a minority
  - Bolshevik growth from 24,000 to 200,000 reflected genuine working-class support, not conspiracy
  - The Provisional Government fell because it refused to end the war or redistribute land
  - Soviet democracy was more direct and representative than bourgeois parliamentarism
