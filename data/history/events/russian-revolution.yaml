- viewpoint: Revisionist / Social History
  viewpoint_type: academic
  region_origin: americas
  narrative: 'The "revolution from below" school — associated with Ronald Grigor Suny, Steve Smith, Diane Koenker, William
    Rosenberg, and others — emerged in the 1970s and 1980s as a challenge to both the Soviet orthodoxy (revolution as the
    triumph of the party) and the Cold War liberal narrative (revolution as a Bolshevik conspiracy against democracy). These
    historians asked what ordinary people did in 1917, what they wanted, and how their actions shaped outcomes that no party
    fully controlled.


    Steve Smith''s Red Petrograd (1983) reconstructed factory life from workers'' memoirs, factory committee minutes, and
    trade union records. Petrograd''s metalworkers — 250,000 in a city of 2.4 million — radicalized in distinct stages. In
    February, they wanted bread and an end to the war. By April, they demanded workers'' control of production — the right
    to inspect management books, veto firings, and set work rules. By September, many had concluded that only the transfer
    of state power to the soviets could guarantee these gains. Smith argued that Bolshevik support grew not because Lenin
    manipulated workers but because Bolshevik positions tracked worker radicalization in real time.


    The contingency question is central to revisionist historiography. Was October inevitable? The Kornilov Affair of late
    August 1917 was a turning point that no structural analysis predicted. General Lavr Kornilov marched troops on Petrograd
    — whether to impose a military dictatorship or to restore order at Kerensky''s invitation is still debated. Kerensky panicked
    and armed the Bolsheviks to defend the city. The coup collapsed when railway workers refused to move Kornilov''s trains
    and agitators persuaded his troops to disobey. The incident discredited both Kerensky and the military, left the Bolsheviks
    with 40,000 rifles, and swung the Petrograd and Moscow soviets to Bolshevik majorities in September. Without Kornilov,
    the Bolsheviks might not have had the weapons or the political mandate for October.


    Orlando Figes''s A People''s Tragedy (1996) synthesized the social-historical approach with narrative ambition. Figes
    followed six individuals through the revolution and civil war, from a peasant soldier to a provincial noble to a Bolshevik
    commissar. His argument was that 1917 was a cascade of interconnected revolutions — workers'', soldiers'', peasants'',
    and national minorities'' — that the Bolsheviks rode but did not create. The party''s genius was not in starting the revolution
    but in being the only organization willing to take power when the alternative was anarchy. Their tragedy was that the
    methods required to hold power — the Cheka, grain requisition, the suppression of dissent — destroyed the democratic promise
    that had given the revolution its moral force.


    Recent scholarship has incorporated the experiences of non-Russian nationalities. The revolution triggered independence
    movements across the empire: Finland declared independence in December 1917; Ukraine, Georgia, Armenia, Azerbaijan, and
    the Baltic states all declared independence in 1918. The Bolsheviks, who had endorsed national self-determination in theory,
    reconquered most of these states by 1921 — Ukraine, the Caucasus, and Central Asia were incorporated into the Soviet Union
    by force. Only Finland, the Baltic states, and Poland maintained independence, and only because the Red Army was defeated
    at Warsaw in August 1920. The revolution that promised liberation from the Romanov empire created a new empire under a
    different name.

    '
  key_arguments:
  - The revolution was driven from below by workers, soldiers, and peasants whose actions no party fully controlled
  - Bolshevik support grew because their program tracked organic radicalization, not because of manipulation
  - Contingency mattered — the Kornilov Affair was an unplanned turning point that armed the Bolsheviks
  - The methods required to hold power destroyed the democratic promise of the revolution
  sources:
  - title: 'Red Petrograd: Revolution in the Factories, 1917-1918'
    author: Steve A. Smith
    year: '1983'
    type: book
  - title: 'A People''s Tragedy: The Russian Revolution 1891-1924'
    author: Orlando Figes
    year: '1996'
    type: book
  - title: 'The Soviet Experiment: Russia, the USSR, and the Successor States'
    author: Ronald Grigor Suny
    year: '1998'
    type: book
  notable_quotes:
  - text: The tragedy of the Russian Revolution was that the Bolsheviks were the only party willing to pick up power from
      the gutter, and they picked it up with dirty hands.
    speaker: Orlando Figes
    context: A People's Tragedy, 1996 (paraphrased from his argument)
  - text: The soviets of 1917 were the most democratic institutions Russia had ever known. Within two years, they were rubber
      stamps.
    speaker: Ronald Grigor Suny
    context: The Soviet Experiment, 1998 (paraphrased)
  emphasized:
  - Worker, soldier, and peasant agency as the revolution's driving force
  - Contingency and accident in revolutionary outcomes — nothing was inevitable
  - February as the authentic democratic revolution; October as ambiguous
  - National minorities' revolutions suppressed by the Bolsheviks who had endorsed self-determination
  omitted:
  - Lenin's strategic brilliance and the role of individual leadership
  - International revolutionary significance and the Comintern project
  - Genuine idealism and self-sacrifice among Bolshevik rank-and-file
  - Soviet achievements in literacy, industrialization, and public health under NEP
