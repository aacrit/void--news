- viewpoint: Western / Interventionist
  viewpoint_type: bystander
  region_origin: americas
  narrative: 'Russia''s exit from the war was a strategic catastrophe for the Allies. The Treaty of Brest-Litovsk (March 3,
    1918) gave Germany control of Poland, the Baltic states, Ukraine, and Finland — approximately 1 million square miles,
    56 million people, a third of Russia''s agricultural land, and 80% of its coal and iron production. Germany transferred
    50 divisions from the Eastern to the Western Front between November 1917 and March 1918, enabling the Spring Offensive
    of 1918 that nearly broke the Allied line before American reinforcements arrived.


    The Allied intervention of 1918-1920 was driven by three motives that the intervening powers could not agree on, even
    among themselves. First, the recovery of war materiel — the Allies had shipped enormous quantities of munitions to Russian
    ports (especially Archangel and Vladivostok) that they feared would fall to the Germans or be seized by the Bolsheviks.
    Second, the support of White forces as a way to reopen the Eastern Front and relieve pressure on France. Third, a less
    articulated fear of Bolshevik contagion — the prospect that a communist government in the world''s largest country would
    inspire revolutions in war-weakened Europe.


    Britain deployed 40,000 troops across three theaters: Archangel (North Russia), the Caucasus, and the Trans-Caspian region.
    France sent two divisions to Odessa and the Crimea; they mutinied in April 1919 and were withdrawn. Japan landed 72,000
    troops in Vladivostok — the largest single contingent — and occupied portions of Siberia until October 1922, pursuing
    territorial objectives that had little to do with the White cause. The United States deployed 13,000 troops: 5,000 to
    Archangel under British command and 8,000 to Vladivostok. President Wilson authorized the deployment reluctantly and without
    clear objectives. American troops fought skirmishes against Bolshevik forces in the Archangel sector through the winter
    of 1918-1919; 235 Americans were killed.


    The intervention failed on every count. The White armies collapsed. The war materiel was mostly lost. The intervention
    gave the Bolsheviks a propaganda narrative — capitalist encirclement — that Lenin, Stalin, and their successors exploited
    for 70 years. Winston Churchill, who as Secretary of State for War was the most aggressive proponent of intervention,
    later wrote that the Allies had tried to "strangle Bolshevism in its cradle" but lacked the will to commit sufficient
    forces. Woodrow Wilson, who had declared self-determination as a universal principle, found himself unable to apply it
    consistently: the fourteen points said nothing about what happened when a people chose communism.


    The Western narrative of 1917 has oscillated between horror and fascination. George Kennan''s Russia Leaves the War (1956)
    and The Decision to Intervene (1958) established the liberal-realist framework: the revolution was a disaster, the intervention
    was a blunder, and the Cold War was the consequence of both. Richard Pipes''s The Russian Revolution (1990) argued that
    Bolshevism was totalitarian from its inception — that Lenin''s vanguard party, conspiratorial methods, and contempt for
    democracy made Stalinism inevitable, not aberrant. The policy implication was containment: the Soviet system could not
    be reformed, only outlasted.

    '
  key_arguments:
  - Russia's exit from WWI via Brest-Litovsk was a strategic disaster that nearly lost the war for the Allies
  - Allied intervention (1918-1920) failed militarily and gave the Bolsheviks a lasting propaganda tool
  - Wilson's self-determination principle could not accommodate a people choosing communism
  - Western policy toward Soviet Russia oscillated between containment and engagement for 70 years
