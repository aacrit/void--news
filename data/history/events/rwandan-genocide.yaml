- viewpoint: Pan-African / Postcolonial
  viewpoint_type: revisionist
  region_origin: africa
  narrative: 'The Rwandan genocide did not begin on April 6, 1994. It began in 1894, when Germany''s Count Gustav Adolf von
    Gotzen became the first European to reach the Rwandan royal court, and it accelerated in 1916, when Belgium assumed control
    under a League of Nations mandate. The Belgians did not invent the categories of Hutu and Tutsi — these identities existed
    in precolonial Rwanda as fluid social designations related to cattle ownership and proximity to the royal court. But the
    Belgians fixed them. In the 1930s, the colonial administration introduced identity cards classifying every Rwandan as
    Hutu (approximately 85%), Tutsi (14%), or Twa (1%) based on physical measurements and cattle ownership. A person with
    ten or more cows was classified as Tutsi. The categories were hereditary, immutable, and enforced.


    The Belgian colonial system elevated Tutsis as a ruling class — an application of the Hamitic hypothesis, a racial theory
    that attributed the political sophistication of East African kingdoms to "Caucasoid" migration from the north. Tutsis
    were granted access to education, administrative posts, and the Catholic Church hierarchy. Hutus were confined to manual
    labor. When independence movements gained force in the late 1950s, Belgium reversed its allegiance, supporting the Hutu
    majority in the 1959 Social Revolution that overthrew the Tutsi monarchy. Approximately 20,000 Tutsis were killed and
    150,000 fled into exile — the first of several waves that created the diaspora from which the RPF later emerged.


    Mahmood Mamdani''s When Victims Become Killers: Colonialism, Nativism, and the Genocide in Rwanda (2001) argues that the
    genocide must be understood as a product of colonial political identity — not ancient tribal hatred. The categories that
    determined who lived and who died at the roadblocks of 1994 were inscribed on cards designed in Brussels. The racial ideology
    broadcast by RTLM drew directly on the Hamitic hypothesis: Tutsis as foreign invaders, Hutus as the authentic Rwandan
    people. The "Hutu Ten Commandments," published in Kangura magazine in December 1990, warned against Tutsi "infiltration"
    using language borrowed from European racial science.


    The Pan-African critique extends to the international response. The contrast between the speed of Western intervention
    in Bosnia (NATO airstrikes, 1994-95) and the abandonment of Rwanda is, in this reading, a function of racial calculus.
    Wole Soyinka, the Nigerian Nobel laureate, wrote in 1999: "The life of an African is worth less in the corridors of international
    power than the life of a European. Rwanda proved it." The Organization of African Unity''s own report (2000), authored
    by a panel including former Malian president Amadou Toumani Toure, described the genocide as "the international community''s
    shame" and called for a new African security architecture.


    France''s role draws particular scrutiny. President Francois Mitterrand''s government maintained a military alliance with
    Habyarimana throughout the civil war (1990-1993), supplying weapons, training, and direct military support against the
    RPF. French soldiers manned checkpoints during Operation Noroit (1990-1993). The Duclert Commission report, released in
    March 2021 after a two-year investigation commissioned by President Emmanuel Macron, concluded that France bore "heavy
    and overwhelming responsibilities" in the genocide — though it stopped short of finding complicity. The commission documented
    French arms deliveries that continued after the genocide began, the passage of genocidaires through French-controlled
    zones during Operation Turquoise, and Mitterrand''s private remark that "in those countries, a genocide isn''t too important."


    The postcolonial perspective insists that the genocide cannot be explained as an African aberration — a descent into "tribal
    savagery," as Western media framed it in 1994. It was a modern event, organized through a state bureaucracy built by Europeans,
    using identity categories created by Europeans, executed with weapons supplied by Europeans, and tolerated by a Western-led
    international system that did not value African lives enough to intervene. The genocide was not a failure of Africa. It
    was a failure of the world — and that failure had a colonial architecture.

    '
  key_arguments:
  - Belgian colonial administration created the fixed ethnic categories used to sort victims
  - The Hamitic hypothesis — a European racial theory — provided the ideological framework for genocide
  - Western non-intervention reflected a racial calculus that devalued African lives
  - France maintained military alliance with the genocidal regime before and during the killing
