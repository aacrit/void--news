summary: 'On the evening of April 6, 1994, a surface-to-air missile struck the Falcon 50 jet carrying Rwandan President Juvenal
  Habyarimana and Burundian President Cyprien Ntaryamira as it approached Kigali International Airport. Both men died. Within
  one hour, roadblocks manned by the Interahamwe militia and Presidential Guard appeared across Kigali. Lists of names — Tutsi
  political figures, moderate Hutu officials, journalists, human rights workers — had been prepared in advance. The killing
  was not spontaneous. It was planned.


  Prime Minister Agathe Uwilingiyimana, a moderate Hutu, was assassinated the following morning. Ten Belgian peacekeepers
  assigned to protect her were captured, tortured, and killed at Camp Kigali. Belgium withdrew its contingent from UNAMIR
  within days — precisely the outcome the planners had anticipated. The UN Security Council, rather than reinforcing the mission,
  voted on April 21 to reduce UNAMIR from 2,548 to 270 troops.


  The genocide was executed with machetes, clubs, and small arms. Radio Television Libre des Mille Collines (RTLM) broadcast
  instructions and encouragement. Announcers called Tutsis "inyenzi" (cockroaches) and "inzoka" (snakes) and read names and
  addresses of targets on air. Local officials organized killing squads at the commune level. Prefects, burgomasters, and
  sector chiefs who refused to participate were themselves killed. In Butare — Rwanda''s only prefecture with a Tutsi prefect
  — the genocide began ten days later than elsewhere, only after the national government replaced the prefect and sent in
  Interahamwe from Kigali.


  Churches became killing grounds. At Nyamata, an estimated 10,000 people took refuge in the Catholic church; Interahamwe
  killed them with machetes and grenades over two days. At Murambi Technical School, 50,000 Tutsis gathered after local officials
  told them they would be safe; on April 21, soldiers and militia killed an estimated 40,000 in a single night. The survivors
  — roughly 34 — were found the next morning among the dead.


  The Rwandan Patriotic Front (RPF), the Tutsi-led rebel army under Paul Kagame that had been fighting a civil war since 1990,
  resumed its advance from the north. The RPF captured Kigali on July 4 and declared a ceasefire on July 18. By then, between
  800,000 and 1,000,000 Tutsis and moderate Hutus had been killed in 100 days — a killing rate five times faster than the
  Nazi death camps. An estimated 250,000-500,000 women and girls were raped; UNAIDS later estimated that 70% of survivors
  were infected with HIV.


  France''s Operation Turquoise, authorized by the UN Security Council on June 22, established a "safe zone" in southwestern
  Rwanda. Critics — including the RPF and many survivors — argue it provided a corridor for genocidaires to flee into Zaire
  (now the Democratic Republic of Congo), where they reconstituted as armed groups and destabilized the region for the next
  three decades.

  '
significance: 'The 1948 Genocide Convention obligated signatories to prevent and punish genocide; in April 1994, the U.S.
  State Department instructed officials to avoid using the word "genocide" because acknowledging it would trigger a legal
  obligation to act. The International Criminal Tribunal for Rwanda (ICTR), established November 1994, became the first international
  court to convict a head of government (Jean Kambanda) for genocide and the first to rule that rape constitutes genocide
  (the Akayesu case, 1998). Rwanda''s domestic Gacaca courts processed 1.96 million cases across 12,000 community tribunals
  between 2005 and 2012. The genocide reshaped African Union doctrine, contributing to the 2005 Responsibility to Protect
  (R2P) framework. Rwanda''s post-genocide GDP growth averaged 7.5% annually (2001-2019), but under an authoritarian political
  system that suppresses dissent and ethnic identification. Genocidaire refugees in eastern Congo triggered two wars that
  killed an estimated 5.4 million people.

  '
