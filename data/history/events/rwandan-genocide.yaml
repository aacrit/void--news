    context: Private remark reported by Patrick de Saint-Exupery in Le Figaro, 1998
  emphasized:
  - Colonial origins of the ethnic categories weaponized in the genocide
  - France's direct military support for the Habyarimana regime
  - Racial dimension of Western non-intervention
  - The genocide as a product of modernity, not 'ancient tribalism'
  omitted:
  - Agency of Rwandan political actors in planning and executing the genocide
  - Precolonial Hutu-Tutsi relations and their complexities
  - Post-genocide RPF governance and its authoritarian dimensions
