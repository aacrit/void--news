perspectives:
- viewpoint: International Community / United Nations
  viewpoint_type: bystander
  region_origin: global
  narrative: 'The United Nations Assistance Mission for Rwanda (UNAMIR) was established in October 1993 to monitor the Arusha
    Accords, a power-sharing agreement between the Habyarimana government and the RPF. Force Commander Romeo Dallaire, a Canadian
    lieutenant-general, arrived in Kigali with a mandate limited to Chapter VI peacekeeping — monitoring, not enforcement.
    His authorized strength was 2,548 troops. He received approximately 2,100.


    On January 11, 1994, Dallaire sent a cable to UN headquarters — the "genocide fax" — reporting that an informant within
    the Interahamwe had revealed weapons caches, plans to kill Belgian peacekeepers (to trigger a withdrawal), and registration
    lists of all Tutsis in Kigali. The informant, codenamed "Jean-Pierre," offered to show Dallaire the weapons depots. Dallaire
    requested permission to raid them. Kofi Annan''s office in the Department of Peacekeeping Operations replied the same
    day: the proposed action exceeded UNAMIR''s mandate. Dallaire was instructed to share the intelligence with President
    Habyarimana instead — the head of the very government whose associates were planning the genocide.


    When the killing began on April 7, Dallaire''s troops were outgunned and outnumbered. Belgian peacekeepers at Camp Kigali
    were surrendered by their Ghanaian counterparts under threat and murdered. Belgium withdrew its 400 troops — the best-equipped
    contingent — within a week. The UN Security Council debated the situation on April 21; the United States, led by Ambassador
    Madeleine Albright, pushed for a complete withdrawal. The compromise was reduction to 270, essentially an observer mission.
    Dallaire kept approximately 450 troops by refusing to release some contingents.


    The U.S. government''s internal deliberations, declassified in subsequent years, showed that officials at the State Department,
    the Pentagon, and the NSC were aware of the killings'' scale by mid-April. A Defense Intelligence Agency report from April
    11 described the situation as "genocide." The State Department''s legal advisor instructed spokespersons to say "acts
    of genocide may have occurred" — phrasing designed to avoid the legal trigger of the Genocide Convention. When pressed
    at a State Department briefing on June 10, spokesperson Christine Shelley engaged in a now-infamous exchange: asked how
    many "acts of genocide" constitute "genocide," she replied, "That''s just not a question that I''m in a position to answer."


    France maintained a complex relationship with the Habyarimana regime. French military advisors had trained the Rwandan
    army and Gendarmerie since 1990; France supplied weapons, including after the Arusha Accords imposed an arms embargo.
    Operation Turquoise, launched June 23 with 2,500 French troops, established a "humanitarian safe zone" in the southwest.
    The operation saved Tutsi lives in some areas — including at Bisesero, where Tutsi resisters held out for weeks before
    French forces arrived — but also provided cover for genocidaires fleeing into Zaire. At Goma, across the border, 850,000
    Hutu refugees arrived in July, among them thousands of Interahamwe and former Rwandan army soldiers who used the refugee
    camps as bases.


    The UN''s own Independent Inquiry (the Carlsson Report, 1999) concluded: "The overriding failure was the lack of resources
    and political will of member states." Annan, by then Secretary-General, accepted the report and stated: "The international
    community failed Rwanda." Dallaire, who suffered severe PTSD and attempted suicide in 2000, wrote in Shake Hands with
    the Devil: "The world moved on, but I could not."

    '
  key_arguments:
  - UNAMIR's Chapter VI mandate prevented preventive action even with advance intelligence
  - The 'genocide fax' of January 11 was ignored by UN headquarters in New York
  - The U.S. deliberately avoided the word 'genocide' to circumvent the Convention's obligation to act
  - France's military relationship with the Habyarimana regime compromised its intervention
