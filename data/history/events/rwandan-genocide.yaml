  title: Skulls at Ntarama Church genocide memorial
  description: Rows of skulls displayed at the Ntarama Church memorial site, where approximately 5,000 Tutsis who sought refuge
    in the church were massacred on April 15, 1994. The church has been preserved with victims' belongings.
