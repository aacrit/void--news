connections:
- target_slug: partition-of-india
  connection_type: parallel
  description: Both events demonstrated how colonial-era identity categories (Hindu/Muslim, Hutu/Tutsi) could be weaponized
    during rapid political transitions, producing mass displacement and communal killing
- target_slug: hiroshima-nagasaki
  connection_type: influenced
  description: The post-Hiroshima 'never again' consensus — enshrined in the 1948 Genocide Convention — proved hollow in Rwanda;
    the UN's failure contributed directly to the Responsibility to Protect doctrine
