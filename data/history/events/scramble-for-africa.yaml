legacy_points:
- In 30 years, European control of Africa went from 10% to over 90% of the continent
- Berlin Conference borders divided 177+ ethnic groups and combined unrelated groups — the map persists in 44 of 54 African nations
- Congo Free State's forced labor regime killed an estimated 1-10 million Congolese
- The Herero and Nama genocide (1904-1908) was the 20th century's first genocide; Germany recognized it in 2021
- Ethiopia's victory at Adwa (1896) — the only African defeat of a European colonial army — preserved the continent's sole independent state
