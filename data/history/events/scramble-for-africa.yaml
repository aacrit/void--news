perspectives:
- viewpoint: European Colonial
  viewpoint_type: victor
  region_origin: europe
  narrative: 'The European powers that partitioned Africa framed their actions through three interlocking justifications: strategic competition, economic necessity, and civilizing mission. The Berlin Conference
    occurred in the context of intensifying European rivalries — France''s expansion from Senegal and Algeria, Britain''s ambitions from Cairo to Cape Town, Germany''s late entry as a colonial power after
    unification in 1871, and Portugal''s ancient claims to Angola and Mozambique. Bismarck, who had previously dismissed colonial ventures as a distraction, convened the conference partly to manage these
    rivalries and prevent European wars over African territory.


    The economic case rested on raw materials and markets. The Second Industrial Revolution demanded rubber (for tires, electrical insulation), palm oil (for machine lubricant), copper, diamonds, and gold.
    Tropical Africa possessed all of these in abundance. European manufacturers needed both the raw inputs and the consumer markets that 110 million Africans represented. The theory of "legitimate commerce"
    — replacing the slave trade with trade in agricultural and mineral commodities — provided the economic rationale: colonialism would integrate Africa into the global economy, benefiting both European
    industry and African producers.


    The civilizing mission — "la mission civilisatrice" in French, the "white man''s burden" in Rudyard Kipling''s formulation — provided the moral framework. European colonial ideology held that African
    societies were "primitive," lacking written languages, centralized states (in most cases this was factually wrong), and Christian religion. Colonialism was framed as an act of uplift: bringing education,
    medicine, Christianity, and the rule of law to peoples who lacked them. The Berlin Conference''s General Act included provisions requiring colonial powers to "watch over the preservation of the native
    tribes, and to care for the improvement of the conditions of their moral and material well-being."


    In practice, the civilizing mission served as cover for extraction. Lord Lugard''s "Dual Mandate" — his 1922 treatise on colonial administration in British tropical Africa — argued that colonialism
    served both European economic interests and African welfare, with the colonial administrator as a benevolent intermediary. Lugard''s system of "indirect rule," governing through existing African chiefs,
    was more efficient than direct administration but left indigenous power structures intact only insofar as they served colonial purposes. Chiefs who resisted were replaced; those who cooperated were
    empowered at the expense of their own people.


    The European narrative has undergone substantial revision since decolonization. Few historians now defend the civilizing mission; most acknowledge that the Scramble was driven by strategic competition
    and economic extraction. The question that persists in European historiography is whether colonialism left any positive legacy — infrastructure, education, legal systems — or whether every apparent
    benefit was incidental to exploitation.

    '
  key_arguments:
  - The Berlin Conference prevented European wars over African territory through agreed rules of partition
  - Economic integration was framed as replacement for the slave trade — 'legitimate commerce'
  - Civilizing mission provided moral justification; infrastructure, education, and medicine were offered as evidence
  - Indirect rule preserved African political structures where they served colonial interests
