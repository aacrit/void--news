hero_image_attribution: Adalbert von Rosler, 1884, public domain via Wikimedia Commons
summary: 'On November 15, 1884, representatives of fourteen nations — Germany, France, Britain, Portugal, Spain, Italy, Belgium, the Netherlands, Denmark, Sweden-Norway, Austria-Hungary, the Ottoman Empire,
  Russia, and the United States — gathered at Otto von Bismarck''s official residence in Berlin to settle European claims to African territory. No African ruler, diplomat, or representative was present.
  Over 104 days, the Berlin Conference established the rules by which European powers could claim African land: "effective occupation" — meaning a flag, a garrison, and the establishment of administrative
  authority — superseded prior claims based on exploration or treaty.


  In 1870, approximately 10% of Africa was under European control, concentrated in coastal trading posts and the French-conquered territory of Algeria. By 1914, European powers controlled over 90% of the
  continent. Only Ethiopia — which defeated Italy at the Battle of Adwa on March 1, 1896, killing 6,000 Italian soldiers — and Liberia retained independence. In 30 years, from the Berlin Conference of 1884
  to the outbreak of World War I, borders were drawn, armies deployed, railways built, and economies restructured to serve European needs.


  The methods varied but shared a logic. In West Africa, France used military conquest, signing treaties with chiefs who often did not understand the terms and using military force against those who resisted.
  Samori Ture, who built a Mandinka empire in modern-day Guinea, fought French forces from 1882 to 1898 before his capture. In East Africa, Britain combined military force with chartered companies — the
  Imperial British East Africa Company and the British South Africa Company — that operated as quasi-governmental entities with their own armies. Cecil Rhodes''s British South Africa Company conquered Matabeleland
  and Mashonaland (present-day Zimbabwe) between 1893 and 1897.


  The most extreme case was the Congo Free State, the personal colony of King Leopold II of Belgium. Leopold had presented his claims at Berlin as a humanitarian enterprise — the International Association
  of the Congo, supposedly dedicated to ending the Arab slave trade and bringing civilization to Central Africa. In practice, Leopold''s regime was a forced-labor system built on rubber extraction. Villages
  that failed to meet rubber quotas were punished with hostage-taking, mutilation, and killing. The chicotte (hippopotamus-hide whip) was standard issue. Belgian officers and their African sentries cut
  off the hands of workers who failed to meet quotas — or of corpses, to prove that ammunition had not been wasted. E.D. Morel, a British shipping clerk who noticed that ships from the Congo returned with
  rubber and ivory but departed with only guns and ammunition, launched an international campaign that led to Leopold''s forced handover of the colony to the Belgian state in 1908. Population estimates
  for the Congo in 1885 range from 15 to 30 million; by 1920, the population had fallen to roughly 10 million.


  In German South-West Africa (present-day Namibia), the colonial response to the Herero and Nama uprising of 1904 was systematic extermination. General Lothar von Trotha issued the Vernichtungsbefehl (extermination
  order) on October 2, 1904: "Within the German borders, every Herero, with or without a gun, with or without cattle, will be shot." The Herero were driven into the Omaheke Desert, where waterholes were
  poisoned and guarded. Of an estimated 80,000 Herero, 65,000 died. Survivors were interned in concentration camps at Shark Island and Swakopmund, where mortality rates exceeded 45%. Germany officially
  recognized the Herero and Nama genocide in 2021.

  '
significance: 'Of Africa''s 54 nations, 44 have borders drawn at the Berlin Conference or in subsequent European treaties. These borders divided at least 177 ethnic groups across multiple states and combined
  hostile or unrelated groups within single territories — a cartography that fueled post-independence civil wars from Nigeria (Biafra, 1967-70, 1 million dead) to Rwanda (1994, 800,000 dead) to South Sudan
  (2013-present, 400,000 dead). The extractive economic structures built during the colonial period — monoculture agriculture, mineral extraction, infrastructure oriented toward ports rather than internal
  trade — persist: Africa contains 30% of the world''s mineral reserves but processes less than 3% domestically, and its share of global GDP in 2020 (approximately 3%) had not changed since independence
  in 1960. The Berlin Conference''s principle of "effective occupation" provided the legal framework; the economic architecture it produced outlasted the flags.

  '
