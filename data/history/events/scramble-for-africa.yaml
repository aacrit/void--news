death_toll: 'Millions; Congo Free State alone: 1-10 million estimated; German South-West Africa (Herero/Nama): 65,000-100,000'
affected_population: Entire African continent — approximately 110 million people in 1885 brought under European colonial rule
duration: Berlin Conference (1884-1885) through World War I (1914)
