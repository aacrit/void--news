- viewpoint: African Kingdoms / Resistance
  viewpoint_type: vanquished
  region_origin: africa
  narrative: 'Africa in 1884 was not a vacuum awaiting European order. It contained empires, kingdoms, city-states, and trade networks with histories stretching back millennia. The Ashanti Empire in present-day
    Ghana had a sophisticated administrative system, a gold-based economy, and a military that fought the British to standstills in four wars between 1824 and 1900. The Zulu Kingdom under Cetshwayo defeated
    the British at Isandlwana on January 22, 1879, killing 1,300 British and colonial troops — the worst British defeat by an indigenous force in the 19th century. The Ethiopians under Menelik II annihilated
    an Italian army at Adwa in 1896. These were not helpless peoples overwhelmed by inevitable force; they were states that fought, negotiated, allied, and resisted.


    Resistance took many forms. Military resistance was widespread but ultimately outmatched by European industrial weaponry — the Maxim gun, which could fire 600 rounds per minute, changed the arithmetic
    of colonial warfare. Hilaire Belloc''s grimly accurate couplet captured the asymmetry: "Whatever happens, we have got / The Maxim gun, and they have not." The Mandinka Empire of Samori Ture fought French
    forces across West Africa for 16 years (1882-1898), employing scorched-earth tactics and a mobile army of 30,000 before Ture''s capture. The Nandi of East Africa resisted British encroachment for a
    decade (1895-1905). The Maji Maji Rebellion in German East Africa (1905-1907) united 20 different ethnic groups against German colonial rule; the German response — burning crops and enforcing famine
    — killed an estimated 250,000-300,000 people.


    Women led some of the fiercest resistance. Yaa Asantewaa, Queen Mother of Ejisu, commanded the Ashanti war against the British in 1900 after the colonial governor demanded the Golden Stool — the sacred
    symbol of Ashanti sovereignty. When the male chiefs hesitated, she addressed them: "If you, the men of Ashanti, will not go forward, then we will. I shall call upon my fellow women." The resulting War
    of the Golden Stool lasted a year; the British eventually won but never captured the stool. Yaa Asantewaa was exiled to the Seychelles, where she died in 1921. In 1929, 25,000 Igbo women in southeastern
    Nigeria organized the Women''s War (Ogu Umunwaanyi, called the "Aba Women''s Riots" by the British) against colonial taxation and the warrant chief system. They besieged colonial courts and native administration
    buildings across two provinces. British forces opened fire, killing 55 women. The colonial administration subsequently abolished the warrant chief system — a concession won by women''s collective action
    that armed male resistance had not achieved.


    Diplomatic resistance was equally common. African rulers signed treaties with Europeans — but the terms they understood and the terms Europeans enforced were often radically different. Lobengula, king
    of the Ndebele, signed the Rudd Concession with Cecil Rhodes''s agents in 1888, believing he was granting mining rights; Rhodes used the document to claim sovereignty over all of Matabeleland and Mashonaland.
    When Lobengula realized the deception, he repudiated the concession and went to war. The British South Africa Company defeated the Ndebele in 1893 using Maxim guns and established Rhodesia.


    The Berlin Conference''s requirement of "effective occupation" created a race to sign treaties with African leaders — treaties that were often written in languages the signatories could not read, obtained
    through bribery or alcohol, or signed by individuals who had no authority to cede territory. The French explorer Pierre Savorgnan de Brazza collected over 100 treaties in Central Africa; many bore thumb
    prints rather than signatures. These documents, filed in European capitals, became the legal basis for colonial claims.


    The partition''s cartographic damage persists into the 2020s. European negotiators in Berlin drew borders with rulers and protractors, following rivers and lines of latitude rather than ethnic, linguistic,
    or economic boundaries. The Maasai were split between British Kenya and German Tanganyika. The Ewe were divided between British Gold Coast, French Togoland, and German Togoland. The Somali were split
    among British, French, Italian, and Ethiopian territories. These divisions, arbitrary from every African perspective, became the borders of independent nations after decolonization — and the fault lines
    of post-independence conflict.

    '
  key_arguments:
  - Africa possessed sophisticated states and trade networks before European partition
  - Military resistance was widespread and sometimes successful — Adwa, Isandlwana — but outmatched by industrial weapons
  - Treaties were obtained through deception, bribery, and force — not genuine consent
  - Arbitrary borders divided ethnic groups and combined rival communities, seeding post-independence conflict
