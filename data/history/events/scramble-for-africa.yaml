- viewpoint: Economic Exploitation / Academic
  viewpoint_type: academic
  region_origin: global
  narrative: 'The economic history of the Scramble can be tracked through three commodities: rubber, diamonds, and copper. Each reveals a different mechanism of extraction, but all share the same structure:
    African labor produced wealth that flowed to European shareholders, with the colonial state providing the coercive apparatus.


    Rubber was the Congo''s curse. Leopold II''s regime required each village to supply a quota of wild rubber, enforced by the Force Publique — an army of African soldiers commanded by European officers.
    Failure to meet quotas was punished by hostage-taking, destruction of villages, and mutilation. The "red rubber" system produced profits of approximately 220 million francs for Leopold between 1896
    and 1905. Roger Casement, the British consul in the Congo, documented the atrocities in his 1904 report to the Foreign Office — one of the first human rights investigations in modern history. Casement
    recorded testimony of systematic hand-chopping, village burning, and forced labor that amounted to slavery. His report, together with E.D. Morel''s campaign and Mark Twain''s satirical King Leopold''s
    Soliloquy (1905), created international pressure that forced Belgium''s parliament to annex the Congo from Leopold in 1908. The transfer changed the administration but not the essential structure of
    extraction.


    Diamonds transformed southern Africa. The discovery at Kimberley in 1867 and the subsequent establishment of De Beers Consolidated Mines by Cecil Rhodes created a monopoly that controlled 90% of global
    diamond production by 1890. The labor system — migrant workers housed in closed compounds, separated from their families for months, subject to strip-searches — became the model for the South African
    mining industry and, indirectly, for the apartheid system of labor control. Rhodes used his diamond wealth to finance the British South Africa Company''s conquest of Rhodesia and to advocate for the
    Cape-to-Cairo railway — an ambition that exemplified the Scramble''s geographic logic.


    Copper in the Katanga province of the Congo and in Northern Rhodesia (Zambia) followed the same pattern. The Union Miniere du Haut Katanga, established in 1906, became one of the world''s largest copper
    producers, generating enormous profits for Belgian shareholders while paying African workers subsistence wages. The Copperbelt''s labor system — recruiting from across Central Africa, housing workers
    in compounds, controlling movement through pass laws — created an industrial proletariat whose eventual political mobilization contributed to decolonization movements in both the Congo and Zambia.


    Daron Acemoglu and James Robinson''s Why Nations Fail (2012) formalized the argument that colonial-era institutions explain persistent global inequality. They distinguish between "extractive institutions"
    — which concentrate power and wealth among a narrow elite — and "inclusive institutions" — which distribute power and economic opportunity broadly. The Scramble for Africa created extractive institutions
    across the continent: forced labor systems, monopoly trading companies, export-oriented infrastructure, and political structures designed to facilitate extraction rather than governance. These institutions
    persisted through independence because post-colonial elites inherited and maintained the structures that gave them power.


    The quantitative evidence is stark. Morten Jerven''s Poor Numbers (2013) challenged the accuracy of African GDP statistics, but even adjusted figures confirm the structural pattern: Africa''s terms
    of trade — the ratio of export prices to import prices — deteriorated throughout the colonial period and continued to do so afterward. The commodity trap — exporting raw materials at low prices and
    importing manufactured goods at high prices — was not a natural condition but an engineered one, built during the Scramble and maintained through post-independence trade arrangements.

    '
  key_arguments:
  - Three commodities — rubber, diamonds, copper — reveal the extraction mechanisms that defined the Scramble
  - Leopold's Congo was a forced-labor regime that produced 220 million francs in profit between 1896 and 1905
  - Colonial-era extractive institutions explain persistent economic inequality (Acemoglu and Robinson)
  - Africa's commodity trap was engineered during colonialism, not a natural condition
