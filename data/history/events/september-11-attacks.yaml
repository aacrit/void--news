- viewpoint: Intelligence Community — The Blowback Thesis
  viewpoint_type: revisionist
  region_origin: north-america
  narrative: 'In 1979, the CIA launched Operation Cyclone, funneling $3 billion in arms and training to Afghan mujahideen fighting the Soviet occupation. The program, the largest covert operation in CIA
    history, ran through Pakistan''s Inter-Services Intelligence (ISI). Among the recipients: Gulbuddin Hekmatyar, who later joined the Taliban insurgency against the Americans, and the network of Arab
    volunteers that coalesced around a young Saudi named Osama bin Laden. The CIA did not directly fund bin Laden — this is a persistent oversimplification — but it armed and empowered the ecosystem
    in which he built al-Qaeda.


    Chalmers Johnson, in his 2000 book Blowback — published a year before the attacks — defined the term as "the unintended consequences of policies that were kept secret from the American people." The
    concept originates from CIA internal jargon. Johnson argued that decades of American military bases, covert operations, and support for authoritarian regimes across the Middle East and Central Asia
    had created conditions in which anti-American violence was not irrational but predictable. Bin Laden''s 1996 fatwa cited three specific grievances: American troops stationed in Saudi Arabia (the
    land of the two holy mosques), US support for Israel''s occupation of Palestinian territories, and sanctions against Iraq that the UN estimated had contributed to the deaths of 500,000 Iraqi children.


    The intelligence failures were institutional. The 9/11 Commission documented a "wall" between CIA foreign intelligence and FBI domestic investigation that prevented information sharing. The CIA''s
    Counterterrorism Center knew that al-Mihdhar had a US visa and had met with suspected al-Qaeda operatives in Kuala Lumpur in January 2000. They did not inform the FBI until August 23, 2001 —
    nineteen days before the attacks. The FBI''s Minneapolis field office arrested Zacarias Moussaoui on August 16, 2001, on immigration charges after a flight school instructor reported that Moussaoui
    wanted to learn to fly large jets but had no interest in takeoffs or landings. FBI headquarters declined to seek a warrant to search his laptop.


    Richard Clarke, the White House counterterrorism coordinator under both Clinton and Bush, testified before the 9/11 Commission that he had warned National Security Adviser Condoleezza Rice in
    January 2001 that al-Qaeda was an "existential threat." On August 6, 2001, the President''s Daily Brief carried the headline "Bin Ladin Determined to Strike in US." Bush remained on vacation at
    his Crawford, Texas ranch. No cabinet-level meeting on al-Qaeda was held before September 11. Clarke''s testimony included a public apology: "Your government failed you, those entrusted with
    protecting you failed you, and I failed you."

    '
  key_arguments:
  - CIA covert operations in Afghanistan during the 1980s empowered the networks that produced al-Qaeda
  - Bin Laden's stated grievances were responses to specific American policies, not civilizational hatred
  - Multiple intelligence agencies had actionable warnings that were not shared or acted upon
  - The post-9/11 response replicated the pattern — military intervention creating the conditions for future blowback
  sources:
  - title: 'Blowback: The Costs and Consequences of American Empire'
    author: Chalmers Johnson
    year: '2000'
    type: book
  - title: 'Against All Enemies: Inside America''s War on Terror'
