severity: catastrophic
death_toll: '2,977 (September 11); 900,000+ (post-9/11 wars through 2021, Brown University Costs of War Project)'
affected_population: '37 million displaced by post-9/11 wars across eight countries'
duration: 'September 11, 2001 - ongoing (Afghanistan war 2001-2021; Iraq war 2003-2011; broader counter-terrorism operations continuing)'
summary: 'At 8:46 AM Eastern on September 11, 2001, American Airlines Flight 11 struck the North Tower of the World Trade Center. Seventeen minutes later, United Airlines Flight 175 hit the South Tower.
  At 9:37, American Airlines Flight 77 struck the Pentagon. At 10:03, United Airlines Flight 93 — its passengers having stormed the cockpit after learning by phone what had happened in New York — crashed
  into a field in Shanksville, Pennsylvania. The South Tower collapsed at 9:59. The North Tower followed at 10:28. 2,977 people died: 2,753 in New York, 184 at the Pentagon, 40 in Pennsylvania.


  The nineteen hijackers were members of al-Qaeda, an organization built in the late 1980s by Osama bin Laden, a Saudi millionaire who had fought against the Soviet occupation of Afghanistan with CIA-funded
  mujahideen. Khalid Sheikh Mohammed conceived the operation in 1996. Fifteen of the nineteen hijackers were Saudi citizens. None were Iraqi. None were Afghan. The operational cell trained at flight schools
  in Florida and Arizona. The CIA had tracked two of them — Nawaf al-Hazmi and Khalid al-Mihdhar — to a meeting in Kuala Lumpur in January 2000 but did not share the intelligence with the FBI.


  Within 26 days, the United States invaded Afghanistan. The Taliban government fell by December 2001. Bin Laden escaped into Pakistan at Tora Bora. Eighteen months later, on March 20, 2003, the United
  States invaded Iraq based on claims — presented by Secretary of State Colin Powell to the UN Security Council on February 5, 2003 — that Saddam Hussein possessed weapons of mass destruction. No such
  weapons were found. The Senate Intelligence Committee later concluded that every major pre-war claim about Iraqi WMD was unsupported by the underlying intelligence.


  The wars metastasized. By 2021, the Brown University Costs of War Project estimated 900,000 to 929,000 people had been killed directly in post-9/11 war zones across Afghanistan, Iraq, Pakistan, Syria,
  Yemen, Somalia, Libya, and other theaters. 37 million people had been displaced. The financial cost to the United States exceeded $8 trillion. On August 30, 2021, the last American soldier left
  Afghanistan. The Taliban retook Kabul eleven days before the final withdrawal.


  At home, the attacks restructured American governance. The USA PATRIOT Act, signed October 26, 2001, expanded surveillance authority across federal agencies. The Department of Homeland Security,
  created in 2002, consolidated 22 agencies into the third-largest federal department. The NSA''s warrantless wiretapping program, revealed by the New York Times in 2005, collected phone records and
  internet communications of millions of Americans without court orders. Guantanamo Bay detention camp, opened January 2002, held 780 detainees; as of 2025, it still holds 15.

  '
significance: 'September 11 ended the post-Cold War period that began with the fall of the Berlin Wall in 1989. The "unipolar moment" — twelve years in which American military supremacy appeared
  unchallenged — gave way to asymmetric warfare, indefinite detention, and preemptive invasion. The Bush Doctrine, articulated in the 2002 National Security Strategy, asserted the right to strike
  nations that harbored terrorists or pursued weapons of mass destruction before any attack occurred. No prior administration had claimed so sweeping a prerogative. The doctrine was invoked to justify
  Iraq, setting a precedent that Russia later cited when invading Georgia (2008) and Ukraine (2014, 2022). The global surveillance architecture built after 9/11 — revealed in detail by Edward Snowden
  in 2013 — became the template for domestic intelligence programs in dozens of countries. The Islamophobia unleashed by the attacks reshaped immigration politics across Europe and North America. And
  the twenty-year Afghan war ended exactly where it began: with the Taliban in Kabul.

  '
