    speaker: George W. Bush
    context: Islamic Center of Washington, September 17, 2001
  - text: 'I am not the enemy. I am a citizen. But my government treats me like a suspect.'
    speaker: Anonymous Muslim-American student
    context: Quoted in ACLU report on NYPD surveillance of Muslim student groups, 2013
  emphasized:
  - Collective punishment of Muslim communities through surveillance and registration
  - Legal architecture (PATRIOT Act, NSEERS, FISA Court expansion) that institutionalized suspicion
  - Hate crimes and violence against Muslim, Sikh, and Arab Americans
  - CIA torture program and indefinite detention at Guantanamo
  omitted:
  - Muslim-American community cooperation with law enforcement and counterterrorism efforts
  - Genuine security threats posed by radicalized individuals within diaspora communities
  - Internal debates within Muslim communities about extremism and reform

- viewpoint: Global South — The Unipolar Fracture
  viewpoint_type: academic
  region_origin: global
  narrative: 'On September 12, 2001, the UN Security Council passed Resolution 1368 unanimously, recognizing the attacks as a threat to international peace and security. NATO invoked Article 5 — collective
    defense — for the first time in its history. For a brief interval, the entire international order aligned behind the United States. Within eighteen months, the United States had shattered that
    alignment by invading Iraq without Security Council authorization.


    The Iraq war was the inflection point. France, Germany, and Russia opposed the invasion. On February 14, 2003, French Foreign Minister Dominique de Villepin delivered a speech to the Security
    Council arguing that inspections should continue and that war was not justified. He received a standing ovation — an extraordinary breach of Council protocol. The United States proceeded without a
    second resolution. International law scholars debated whether the invasion constituted aggression under the UN Charter. Kofi Annan, the UN Secretary-General, stated in September 2004 that the
    invasion was "not in conformity with the UN Charter" and was therefore "illegal."


    For the Global South, the war on terror confirmed a longer pattern. The doctrine of preemptive war, articulated in the 2002 National Security Strategy, asserted that the United States could strike
    any nation it deemed a threat, based on its own intelligence assessment, without prior authorization from the Security Council. This was sovereignty for the powerful and subjection for the rest.
    The extraordinary rendition program — in which the CIA kidnapped suspects on the streets of Milan, Stockholm, and Islamabad and transported them to black sites or to allied countries known to
    practice torture — violated the sovereignty of allied nations. Italy convicted 23 CIA agents in absentia for the 2003 kidnapping of Hassan Mustafa Osama Nasr from a Milan street.


    The precedent radiated outward. Russia invoked the logic of preemptive security when it intervened in Georgia in 2008 and Ukraine in 2014. China cited American treatment of Uyghur Muslims'' alleged
    terrorist connections when defending its Xinjiang detention camps. Saudi Arabia and the UAE justified their intervention in Yemen partly through counter-terrorism framing. The war on terror did not
    create a safer world order. It created a world in which powerful states could name any adversary a terrorist and act accordingly.


    The economic architecture followed the security apparatus. The Office of Foreign Assets Control expanded its sanctions regime. SWIFT, the international financial messaging system, granted the US
    Treasury access to transaction records under the Terrorist Finance Tracking Program. Dollar dominance became a weapon: any bank touching the US financial system could be compelled to enforce American
    sanctions. Countries from Iran to Venezuela to North Korea found themselves locked out of the global financial system by executive order. The weaponization of financial infrastructure accelerated the
    search for alternatives — China''s CIPS system, Russia''s SPFS, the BRICS push for de-dollarization — that gained momentum two decades later.

    '
  key_arguments:
  - The Iraq invasion without UN authorization fractured the post-WWII international legal order
  - Preemptive war doctrine provided a template that other powers adopted for their own interventions
  - Extraordinary rendition violated the sovereignty of allied nations
  - Financial infrastructure was weaponized as an extension of the security state
  sources:
  - title: 'The Rise and Fall of the Unipolar Concert'
    author: Charles A. Kupchan
    year: '2012'
    type: journal
  - title: 'The Dark Side: The Inside Story of How the War on Terror Turned into a War on American Ideals'
    author: Jane Mayer
    year: '2008'
    type: book
  - title: 'Reign of Terror: How the 9/11 Era Destabilized America and Produced Trump'
    author: Spencer Ackerman
    year: '2021'
    type: book
  notable_quotes:
  - text: 'From the standpoint of the charter of the United Nations, the war was illegal.'
    speaker: Kofi Annan
    context: BBC interview, September 2004, on the invasion of Iraq
  - text: 'This message would be especially strong if it were to come from an old country, France, from a continent like Europe that has known wars, occupations, and barbarism.'
    speaker: Dominique de Villepin
    context: Speech to the UN Security Council opposing the Iraq invasion, February 14, 2003
  emphasized:
  - Iraq invasion as a violation of international law and the UN Charter
  - Preemptive war doctrine as a precedent adopted by other powerful states
  - Extraordinary rendition as a violation of allied nations' sovereignty
  - Weaponization of the dollar and financial system for counter-terrorism enforcement
  omitted:
  - Genuine security threat posed by al-Qaeda and affiliated groups
  - Reconstruction efforts and democratic institution-building in Afghanistan and Iraq
  - Global South governments' own counter-terrorism abuses predating 9/11
