perspectives:
- viewpoint: American Establishment
  viewpoint_type: victor
  region_origin: north-america
  narrative: 'The second plane hit the South Tower at 9:03 AM on live television. By nightfall, Congress had passed a joint resolution authorizing "all necessary and appropriate force" against those who
    "planned, authorized, committed, or aided" the attacks. The vote was 98-0 in the Senate, 420-1 in the House. The sole dissenter, Representative Barbara Lee of California, warned that the authorization
    was too broad. Twenty years later, it remained the legal basis for military operations in at least seven countries.


    The Bush administration framed the response as existential self-defense. The National Security Strategy of September 2002 codified the Bush Doctrine: the United States would act preemptively against
    threats before they materialized. Afghanistan fell in weeks. The Taliban regime that had sheltered bin Laden and refused to surrender him was replaced by a transitional government under Hamid Karzai,
    installed at the Bonn Conference in December 2001. The speed of the victory appeared to validate the doctrine.


    Iraq followed a different logic. The administration argued that Saddam Hussein possessed weapons of mass destruction, maintained ties to al-Qaeda, and posed a gathering threat that could not be
    contained. Powell''s February 2003 UN presentation — which he later called "a blot" on his record — displayed satellite imagery, intercepted communications, and a vial of simulated anthrax. The
    invasion began on March 20. Baghdad fell on April 9. On May 1, Bush declared major combat operations over aboard the USS Abraham Lincoln beneath a banner reading "Mission Accomplished."
    The insurgency that followed lasted eight years.


    The establishment narrative holds that the war on terror prevented another attack on the American homeland for two decades. The intelligence apparatus created after 9/11 — the Director of National
    Intelligence, the National Counterterrorism Center, the TSA, the fusion centers — detected and disrupted dozens of plots. Bin Laden was killed by SEAL Team Six in Abbottabad, Pakistan, on May 2,
    2011. The administration''s defenders argue that the errors — Abu Ghraib, WMD intelligence failures, the chaos of de-Ba''athification — were failures of execution, not of the fundamental decision
    to respond with force.

    '
  key_arguments:
  - Authorization of force was a near-unanimous democratic mandate in response to an act of war
  - Preemptive action against gathering threats was necessary in an age of non-state actors with catastrophic ambitions
  - No second major attack on the American homeland occurred for twenty years after 9/11
  - Errors in execution do not invalidate the strategic necessity of the response
