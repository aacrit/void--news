- viewpoint: Afghan and Iraqi Civilian
  viewpoint_type: vanquished
  region_origin: middle-east
  narrative: 'On October 7, 2001, American bombs began falling on Kabul. The city''s population was 1.5 million. Many had survived two decades of war — the Soviet invasion, the mujahideen civil war,
    the Taliban''s takeover. Now the Americans had come to find a Saudi fugitive and his Egyptian deputy. Within weeks, B-52s were carpet-bombing Tora Bora while bin Laden slipped across the Pakistani
    border with a small escort. He would live another decade. The Afghans remained under the bombs.


    The Afghanistan Independent Human Rights Commission documented over 31,000 civilian deaths between 2001 and 2021. The Bureau of Investigative Journalism tracked over 13,000 drone strikes in
    Afghanistan, Pakistan, Yemen, and Somalia, killing between 10,000 and 17,000 people, of whom 800 to 1,750 were civilians — including 252 to 400 children. Individual strikes became infamous: the
    Kunduz hospital attack of October 3, 2015, killed 42 people in a Doctors Without Borders trauma center. A drone strike in Kabul on August 29, 2021, three days before the final withdrawal, killed
    Zemari Ahmadi, an aid worker, and nine members of his family, including seven children. The Pentagon initially called it a "righteous strike."


    In Iraq, the civilian toll was greater. The Iraq Body Count project documented over 200,000 civilian deaths between 2003 and 2023. The Lancet survey of 2006, using cluster sampling, estimated
    654,965 excess deaths through July 2006 alone. The de-Ba''athification order of May 2003 — Coalition Provisional Authority Order Number 1, signed by L. Paul Bremer — dismissed 30,000 to 50,000
    Sunni civil servants and dissolved the 400,000-member Iraqi army. Those men, stripped of income and status, became the recruiting base for the insurgency and, later, for the Islamic State.


    Abu Ghraib prison became the emblem. In April 2004, photographs emerged showing American soldiers torturing Iraqi detainees: hooded men stacked naked in pyramids, a man standing on a box with
    wires attached to his hands, a soldier holding a leash around a crawling prisoner''s neck. Eleven soldiers were convicted. No officer above the rank of colonel was prosecuted. Brigadier General
    Janis Karpinski, who oversaw the prison, was demoted. The techniques — stress positions, sleep deprivation, sensory bombardment — had been authorized through a chain of legal memoranda running
    from the Office of Legal Counsel to the Secretary of Defense.


    By August 2021, when the Taliban retook Kabul in eleven days, the Afghan government the United States had spent $2.3 trillion building dissolved without a fight. President Ashraf Ghani fled the
    country. Afghan women, who had gained access to schools and public life over twenty years, faced immediate restrictions. The interpreters, drivers, and analysts who had worked with American forces
    crowded the gates of Hamid Karzai International Airport. Some clung to departing aircraft. A suicide bombing at Abbey Gate on August 26 killed 13 American service members and at least 170 Afghans.

    '
  key_arguments:
  - Two countries with no connection to the September 11 hijackers bore the brunt of the American response
  - Civilian death toll exceeded the original attack by orders of magnitude
  - De-Ba'athification and army dissolution created the conditions for insurgency and ISIS
  - Twenty years of occupation ended with the same regime in power in Afghanistan
  sources:
