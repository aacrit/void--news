- Triggered the longest war in American history (Afghanistan, 2001-2021) and the invasion of Iraq (2003) based on intelligence later discredited
- Created the global surveillance state — NSA mass data collection, PATRIOT Act, FISA Court expansion — revealed by Snowden in 2013
- Displaced 37 million people across eight countries (Brown University Costs of War Project estimate)
- Established the doctrine of preemptive war, eroding the post-WWII international order built on state sovereignty
- Guantanamo Bay detention camp operated outside federal court jurisdiction for over two decades
