    speaker: Anonymous Afghan interpreter
    context: BBC interview, Kabul airport, August 2021
  emphasized:
  - Civilian casualties as the central cost of the war on terror
  - Destruction of Iraqi state institutions creating worse instability than the regime they replaced
  - Abu Ghraib and drone strikes as systemic policy, not isolated incidents
  - Final withdrawal leaving Afghan allies abandoned
