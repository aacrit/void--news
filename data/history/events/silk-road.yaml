summary: 'In 138 BCE, Emperor Wu of the Han dynasty sent Zhang Qian westward with 100 men to find the Yuezhi people and forge an alliance against the Xiongnu nomads
  who raided China''s northern frontier. Zhang Qian was captured by the Xiongnu within a year. He lived among them for ten years, married a Xiongnu woman, had a son,
  and escaped. He reached the Ferghana Valley, crossed into Bactria, and returned to Chang''an in 125 BCE — 13 years after his departure — with only one of his original
  companions. He had failed in his diplomatic mission. He had opened the Silk Road.


  Zhang Qian''s reports described the "heavenly horses" of Ferghana, the grapes and alfalfa of Central Asia, and — crucially — Chinese goods already circulating in markets
  he visited. Sichuan cloth and bamboo had reached Bactria via India before any official Chinese mission arrived. Trade routes existed; Zhang Qian made them visible to the
  imperial court. Emperor Wu launched military campaigns to secure the Hexi Corridor (the narrow strip between the Tibetan Plateau and the Gobi Desert) and established
  garrison towns at Dunhuang, Jiuquan, Zhangye, and Wuwei. These four towns became the gateway between China and the West for the next 1,500 years.


  The term "Silk Road" was coined in 1877 by German geographer Ferdinand von Richthofen. There was never a single road. The network branched, merged, and shifted with
  political conditions. The northern route crossed the Taklamakan Desert via oasis towns — Turpan, Kucha, Kashgar — then climbed the Pamir Mountains into Ferghana.
  The southern route skirted the desert''s edge through Khotan, where jade had been traded since the third millennium BCE. Maritime routes connected Guangzhou to the
  Persian Gulf, the Red Sea, and the East African coast. At its peak under the Tang dynasty (618-907), the network stretched 6,400 kilometers overland, with maritime
  extensions doubling that distance.


  What moved along these routes was not primarily silk. Silk was the luxury that caught Roman attention — Pliny the Elder complained in the 1st century CE that Rome spent
  100 million sesterces annually on Chinese silk, Indian spices, and Arabian incense, draining the empire''s gold reserves. But the Silk Road carried paper (from China to
  the Islamic world after the Battle of Talas in 751, when Arab forces captured Chinese papermakers), gunpowder (westward by the 13th century), the magnetic compass
  (same trajectory), glassmaking techniques (eastward from Rome and Persia), cotton cultivation (from India in both directions), and musical instruments (the Chinese pipa
  evolved from the Persian barbat). Religions traveled these routes: Buddhism from India to China via Central Asia (1st-5th centuries), Nestorian Christianity to Tang
  China (arriving 635 CE, documented on the Xi''an Stele of 781), Manichaeism from Persia to the Uyghur Khaganate, and Islam from Arabia to Central and Southeast Asia.


  The network''s decline was gradual, driven by the Ottoman Empire''s capture of Constantinople in 1453, which disrupted European access to eastern markets; the Black
  Death, which killed a third of Europe and devastated Central Asian populations in the 14th century; and the rise of maritime trade routes pioneered by Portuguese and
  Spanish navigators in the 15th and 16th centuries. Vasco da Gama reached India by sea in 1498, bypassing every middleman between Lisbon and Calicut. The overland Silk
  Road did not die — it atrophied, as the economics of sea transport made camel caravans obsolete for bulk trade.

  '
significance: 'The Silk Road was the first system of globalization. Before container ships and fiber optic cables, before the Suez Canal and the Panama Canal, the exchange
  of goods, ideas, technologies, religions, languages, diseases, and genetic material between East and West traveled these routes. Paper reached Baghdad from China around
  793 CE; within two centuries, it had transformed Islamic scholarship, European monasteries, and eventually — via Gutenberg — the entire structure of knowledge production.
  The magnetic compass reached Europe by the 12th century and enabled the Age of Exploration that would, ironically, render the overland Silk Road obsolete.


  The network''s most consequential export may have been Yersinia pestis. The Black Death of 1346-1353 traveled from Central Asia to the Crimea to Sicily to all of
  Europe along Silk Road trade routes. It killed 75-200 million people and reshaped the economic, social, and political structure of three continents.

  '
