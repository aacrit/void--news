  emphasized:
  - Chinese military power as precondition for Silk Road security
  - Tang cosmopolitanism as proof of China''s historical centrality and openness
  - Tribute system as the natural ordering of international relations
  - Zheng He''s voyages as evidence of Chinese maritime capability that preceded European exploration
