perspectives:
- viewpoint: Chinese Imperial
  viewpoint_type: victor
  region_origin: east-asia
  narrative: 'Zhang Qian''s 13-year journey was a military intelligence failure that became a civilizational triumph. Emperor Wu had sent him to recruit allies
    against the Xiongnu; Zhang Qian returned with no alliance but with knowledge of kingdoms, trade goods, and routes that no one in Chang''an had known existed. The
    emperor''s response was characteristically Han: he launched a series of military campaigns westward. Between 121 and 119 BCE, General Huo Qubing drove the Xiongnu
    from the Hexi Corridor, and Han garrisons were established at the four commanderies that would anchor the Silk Road''s eastern terminus for centuries.


    The Han court framed westward expansion as a civilizing mission. The tribute system — in which foreign rulers sent embassies bearing gifts and received Chinese
    goods and titles in return — structured all Silk Road diplomacy in Chinese terms. From the Chinese perspective, trade was not commerce between equals but the
    natural flow of goods toward the center of civilization. Foreign merchants in Chang''an were tolerated, sometimes celebrated, but always subordinate. The
    Protectorate of the Western Regions, established in 60 BCE, administered the Tarim Basin oasis states as dependencies, not partners.


    The Tang dynasty (618-907) represented the Silk Road''s zenith in Chinese historiography. Chang''an under the Tang was the world''s largest city — population
    estimates range from 800,000 to over one million. Its West Market contained merchants from Persia, Arabia, India, Central Asia, Korea, and Japan. Sogdian
    wine merchants, Turkic horse traders, and Indian Buddhist monks walked the same streets. Emperor Taizong employed Turkic generals; Emperor Xuanzong''s
    favorite consort, Yang Guifei, wore perfumes imported from Java. The Tang legal code contained provisions for disputes between foreign merchants — evidence
    of a cosmopolitanism that Chinese nationalists later claimed as proof of China''s historical openness.


    But the Tang dynasty also demonstrates the limits of Chinese openness. The An Lushan Rebellion (755-763), led by a general of Sogdian-Turkic origin, killed an
    estimated 36 million people — two-thirds of the Tang Empire''s registered population — and triggered a xenophobic backlash. In 843-845, Emperor Wuzong ordered
    the destruction of Buddhist monasteries, the laicization of 260,000 monks and nuns, and the confiscation of monastery lands. Foreign religions — Nestorian
    Christianity, Manichaeism, Zoroastrianism — were suppressed alongside Buddhism. The cosmopolitan moment closed. It would not reopen on the same scale until
    the Mongol period, four centuries later.


    Ming dynasty maritime expeditions under Admiral Zheng He (1405-1433) — seven voyages reaching East Africa with fleets of up to 317 ships — represented a brief
    alternative to the overland Silk Road. Zheng He''s treasure ships were five times the size of Columbus''s Santa Maria. But the Ming court terminated the voyages
    after 1433, destroyed the shipyard records, and turned inward. The Haijin maritime ban restricted private overseas trade. China chose continental security over
    maritime expansion — a decision whose consequences became apparent when European ships arrived in the 16th century.

    '
  key_arguments:
  - Zhang Qian''s mission opened Chinese awareness of the wider world, but the tribute system framed all exchange as subordinate to Chinese civilization
  - Tang Chang''an was the most cosmopolitan city in the world, absorbing foreign goods, religions, and peoples
  - The An Lushan Rebellion (755-763) triggered xenophobic reaction that ended Tang cosmopolitanism
  - Ming termination of Zheng He''s voyages (1433) and the Haijin ban closed China to the maritime age
  sources:
