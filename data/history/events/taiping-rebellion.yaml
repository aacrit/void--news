title: The Taiping Rebellion
subtitle: A man failed the civil service exam four times. He declared himself the Son of God. 30 million people died.
date_display: 1850-1864
date_sort: 1853
date_precision: year
era: modern
region: east-asia
country: China
category: political
severity: catastrophic
death_toll: 20-30 million dead — more than World War I — making the Taiping Rebellion the deadliest civil war in human history;
  the provinces of Jiangsu and Zhejiang lost 50-70% of their populations
affected_population: 600 million people in Qing China, with direct devastation across the Yangtze River valley
duration: 14 years — from the Jintian Uprising (January 11, 1851) to the fall of Nanjing (July 19, 1864)
summary: 'Hong Xiuquan sat for the Confucian imperial examination in Canton four times — 1828, 1836, 1837, and 1843 — and
  failed each time. After his second failure, he received a set of Christian missionary tracts written by Liang Afa, a Chinese
  convert working with the American Baptist missionary Issachar Jacox Roberts. Hong set them aside. After his fourth failure,
  he reread the tracts, experienced a series of visions, and concluded that he was the younger brother of Jesus Christ, sent
  by God to destroy demon worship in China. The Confucian establishment that had rejected him became the demonic order he was
  called to overthrow.


  By 1850, Hong had gathered tens of thousands of followers among the Hakka minority in Guangxi province — landless farmers,
  miners, charcoal burners, and former members of Triad secret societies, all displaced by population pressure, the economic
  disruption of the First Opium War, and the Qing government''s inability to control banditry. On January 11, 1851, Hong
  declared the Taiping Tianguo — the Heavenly Kingdom of Great Peace — at Jintian village. Within two years, his army had swept
  north through Hunan, captured the Yangtze River city of Wuchang, and on March 19, 1853, took Nanjing — a city of 500,000
  — renaming it Tianjing, the Heavenly Capital. Hong entered the city carried in a golden palanquin. He was 39.


  The Taiping state governed approximately 30 million people at its peak. Its policies were radical by any 19th-century standard:
  abolition of private land ownership, with land redistributed according to family size; prohibition of opium, alcohol, tobacco,
  gambling, and prostitution; ban on foot-binding; women admitted to the civil service examinations and given military command
  roles; a new calendar based on a seven-day week with Sunday sabbath. The Taiping destroyed Buddhist temples, Confucian shrines,
  and ancestor worship tablets. They replaced the Confucian classics with Hong''s annotated Bible. The social program was
  enforced by terror — violators were executed. The liberation and the tyranny came from the same source.


  The Qing dynasty''s regular armies — the Manchu Eight Banners and the Chinese Green Standard Army — failed to suppress the
  Taiping. The dynasty survived because Han Chinese scholar-officials raised their own provincial armies. Zeng Guofan, a
  Confucian scholar from Hunan, built the Xiang Army from scratch, funding it through provincial taxes and training it as a
  professional force. Li Hongzhang created the Anhui Army. These regional armies, loyal to their commanders rather than to
  Beijing, defeated the Taiping. But the precedent they set — provincial military power independent of central authority —
  destroyed the Qing from within. The dynasty that survived the Taiping Rebellion was already a hollow state. The warlord era,
  the 1911 Revolution, and the collapse of central authority that plagued China until 1949 trace their origins to Zeng Guofan''s
  tent in Hunan.


  The Western powers initially watched with fascination. A Christian Chinese state aligned with British commercial interests
  seemed ideal. Issachar Jacox Roberts, who had briefly taught Hong in Canton, traveled to Nanjing in 1860 to assess the
  Taiping firsthand. He stayed thirteen months. He left calling Hong a "crazy man" whose theology was "a travesty of Christianity."
  The Western verdict was theological, but the decision was commercial. The Treaty of Tientsin (1858), extorted from the Qing
  during the Second Opium War, gave Britain and France the trade concessions they wanted. A Taiping victory would void those
  treaties. The British and French chose the Qing. Frederick Townsend Ward, an American soldier of fortune from Salem,
  Massachusetts, organized the "Ever Victorious Army" — a force of Chinese soldiers with Western officers, weapons, and tactics.
  Ward was killed at the Battle of Cixi in 1862. Charles George Gordon, a British officer, replaced him. Gordon''s Ever
  Victorious Army helped break the Taiping military position in the Yangtze delta. Gordon became "Chinese Gordon," a celebrity
  in Britain — until the Mahdists killed him at Khartoum 21 years later.


  Nanjing fell on July 19, 1864. Hong Xiuquan had died on June 1, possibly from illness, possibly from suicide by swallowing
  gold leaf. His teenage son, the "Young Monarch" Hong Tianguifu, was captured and executed. Zeng Guofan''s forces killed an
  estimated 100,000 people in the city within three days of its fall. The Taiping leaders who survived were hunted down over
  the following two years. The last organized Taiping resistance ended in 1866.

  '
significance: 'The Taiping Rebellion killed more people than any civil war in history. The demographic devastation of the
  Yangtze delta — the economic heart of Qing China — required decades of resettlement and land reclamation. The Qing
  government actively encouraged migration from undamaged provinces into depopulated areas, creating demographic patterns
  that persist in modern China. The rebellion accelerated the "Self-Strengthening Movement" of the 1860s-1890s, in which
  Qing officials adopted Western military technology, established arsenals and shipyards, and sent students abroad — the
  first Chinese engagement with industrial modernity. The provincial armies that defeated the Taiping became the model for
  the regionalized military power that characterized the warlord era (1916-1928) and complicated the Republican and Communist
  governments'' efforts to centralize authority. Mao Zedong publicly praised the Taiping as "revolutionary predecessors" and
  their agrarian program as an anticipation of communist land reform. The Taiping''s challenge to Confucian social order —
  their elevation of women, attack on the examination system, and destruction of traditional religious practice — prefigured
  the Cultural Revolution''s assault on the "Four Olds" a century later.

  '
