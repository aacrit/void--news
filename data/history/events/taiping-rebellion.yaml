- viewpoint: Qing Imperial
  viewpoint_type: victor
  region_origin: east-asia
  narrative: 'The Qing dynasty classified the Taiping as "long-haired bandits" (changmao) — a term that denied them political
    legitimacy. The Taiping wore their hair long, rejecting the Manchu-imposed queue (the shaved forehead and braided pigtail
    that all Chinese men were required to wear on pain of death since the Qing conquest of 1644). The queue was the visible
    mark of Manchu rule. Cutting it was treason. Growing it out was revolution.


    The Qing regular armies failed. The Manchu Eight Banners — elite hereditary units that had conquered China two centuries
    earlier — had degenerated into a parasitic garrison class. Banner soldiers in Beijing collected stipends, pawned their
    equipment, and hadn''t fought a real campaign in decades. The Green Standard Army — the larger, Chinese-staffed force —
    was underpaid, under-equipped, and riddled with "empty ration" fraud, where officers collected pay for soldiers who didn''t
    exist. When the Taiping swept through Hunan in 1852, regular Qing forces collapsed on contact.


    The dynasty survived because of Zeng Guofan. A 42-year-old Confucian scholar mourning his mother in Hunan, Zeng was
    ordered by the emperor to raise a local militia. He built something larger: the Xiang Army, recruited from Hunanese
    peasants, trained on Neo-Confucian principles of loyalty and discipline, funded by the likin — a new transit tax on
    goods that Zeng collected directly, bypassing Beijing. The Xiang Army was loyal to Zeng, not to the Qing emperor. This
    was the price of survival. By 1860, Zeng commanded 120,000 troops, controlled the revenue of four provinces, and operated
    as a de facto autonomous power within the Qing state.


    Li Hongzhang, Zeng''s protege, created the Anhui Army on the same model and became China''s most powerful official for
    the next three decades. Between them, Zeng and Li defeated the Taiping through siege warfare — cutting supply lines,
    starving cities, and executing prisoners. The fall of Nanjing in July 1864 was followed by a massacre that killed an
    estimated 100,000 people in three days. Zeng''s brother, Zeng Guoquan, commanded the assault. There was no negotiated
    surrender. The Qing position was that the Taiping were criminals, not belligerents, and criminals are executed.


    The irony was structural. The dynasty survived the rebellion by ceding military power to Han Chinese provincial leaders.
    These leaders — Zeng, Li, Zuo Zongtang, and their successors — built arsenals, navies, and telegraph networks during
    the Self-Strengthening Movement of the 1860s-1890s. They ran China''s foreign policy. They controlled its armies. When
    the Qing tried to centralize power in the New Policies reforms of 1901-1911, the provincial elites resisted. The 1911
    Revolution succeeded because the provincial armies — inheritors of Zeng''s model — simply refused to fight for the dynasty.
    The Qing won the Taiping war. The price was the Qing state.

    '
  key_arguments:
  - The Taiping were heterodox bandits, not a legitimate political movement — their theology was heretical gibberish
  - Zeng Guofan's Confucian moral order — loyalty, discipline, scholarship — defeated Taiping millenarian chaos
  - The dynasty's survival required delegating power to provincial Han Chinese armies — a necessary but fatal concession
  - The massacre at Nanjing was the suppression of criminals, not a war crime against belligerents
  sources:
