connections:
- target_slug: opium-wars
  connection_type: consequence
  description: The First Opium War (1839-1842) destabilized the Qing economy, produced unemployment and banditry in southern
    China, and created the conditions of desperation from which the Taiping recruited — the rebellion began 8 years after
    the Treaty of Nanjing
- target_slug: chinese-cultural-revolution
  connection_type: influenced
  description: Mao explicitly invoked the Taiping as revolutionary predecessors; the assault on Confucianism, the destruction
    of the Four Olds, and the personality cult of the chairman all echo Hong Xiuquan's Heavenly Kingdom
- target_slug: russian-revolution
  connection_type: parallel
  description: Both were millenarian revolutionary movements that promised total social transformation, established radical
    states, and consumed millions of lives — the Taiping through religious utopianism, the Bolsheviks through dialectical
    materialism
- target_slug: meiji-restoration
  connection_type: influenced
  description: Japan's leaders watched the Taiping Rebellion destroy China's central state and drew the lesson that modernization
    must be directed from above — the Meiji oligarchs centralized military power precisely to prevent a Japanese Taiping
hero_image_url: https://commons.wikimedia.org/wiki/File:Regaining_the_Provincial_Capital_of_Ruizhou.jpg
hero_image_attribution: Qing dynasty court painters, public domain
