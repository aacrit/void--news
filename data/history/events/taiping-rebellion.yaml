perspectives:
- viewpoint: Taiping Heavenly Kingdom
  viewpoint_type: vanquished
  region_origin: east-asia
  narrative: 'Hong Xiuquan''s God Worshippers Society began among the Hakka people of Guangxi — a minority within a minority.
    The Hakka ("guest people") were Han Chinese whose ancestors had migrated south centuries earlier. They spoke a distinct
    dialect, maintained separate customs, and were denied access to the best agricultural land by the Cantonese-speaking
    majority. Hakka women did not bind their feet. Hakka communities were cohesive, literate, and accustomed to defending
    themselves. When Hong preached a theology of equality before God and the destruction of demonic idols, the Hakka heard a
    language they already understood.


    The Taiping social program was not a utopian afterthought — it was the revolution''s organizing principle. The "Land System
    of the Heavenly Dynasty" (1853) proposed the most radical redistribution of property in Chinese history. All land belonged
    to God. It was to be distributed equally by family size. Surplus grain went to communal storehouses. The system drew from
    the ancient Chinese ideal of the "well-field system" (jingtian) described in Mencius — eight families farming eight plots
    around a central communal field. Hong was not importing Christianity into China; he was grafting it onto Chinese agrarian
    utopianism.


    The Taiping abolished foot-binding. They admitted women to their own civil service examinations — the first in Chinese
    history. Women served as soldiers, administrators, and even generals. Hong Xuanjiao, Hong Xiuquan''s sister, led troops in
    combat during the early campaigns. The Taiping ban on opium was absolute — possession was punishable by death. The Qing
    dynasty, which had lost the First Opium War to Britain in 1842 precisely because it tried to ban the drug, could not
    match this. The Taiping enforced what the Qing could not, because the Taiping were willing to kill their own people for
    compliance.


    The internal purge of 1856 destroyed the movement from within. Yang Xiuqing, the Eastern King and the Taiping''s most
    capable military strategist, claimed to receive direct revelations from God the Father — a claim that challenged Hong''s
    spiritual authority. In September 1856, Wei Changhui, the Northern King, killed Yang and 20,000 of his followers in a
    single night of slaughter inside Nanjing. Hong then had Wei killed. Shi Dakai, the Assistant King and the Taiping''s best
    field commander, left Nanjing in disgust with 100,000 troops. He was captured and executed by the Qing in 1863. The Taiping
    never recovered from the loss of Yang''s strategic mind and Shi''s army. The movement that preached the Heavenly Kingdom
    devoured its own architects.

    '
  key_arguments:
  - The Taiping social program — land reform, women's rights, opium prohibition — was genuinely revolutionary, not merely
    millenarian violence
  - Hong's theology fused Christianity with Chinese agrarian utopianism, drawing on the Mencian "well-field" ideal
  - The Hakka social experience — minority status, female labor participation, communal defense — shaped the movement's
    egalitarian character
  - The 1856 internal purge, not military defeat, destroyed the Taiping's capacity to win
