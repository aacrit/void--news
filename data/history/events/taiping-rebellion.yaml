legacy_points:
- 20-30 million dead — more than World War I, the deadliest civil war in human history
- Provincial armies raised to fight the Taiping destroyed Qing central authority and created the warlord model that plagued China
  until 1949
- The Qing survived by delegating military power to Han Chinese generals — the dynasty won the war and lost the state
- Mao called the Taiping "revolutionary predecessors" and their land program an anticipation of communist reform
- The Self-Strengthening Movement (1860s-1890s) — China's first industrial modernization — was a direct response to Taiping-era
  military humiliation
- The 1856 internal purge — Yang Xiuqing assassinated, 20,000 of his followers killed in Nanjing — destroyed the Taiping
  leadership when victory was still possible
