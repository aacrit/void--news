- viewpoint: Muslim / Ayyubid-Mamluk
  viewpoint_type: vanquished
  region_origin: middle-east
  narrative: 'When the Franks took Jerusalem on July 15, 1099, the Islamic world barely noticed. The Seljuk sultanate had
    fragmented into rival city-states. The Fatimid Caliphate in Cairo had lost Jerusalem to the Seljuks only the year before
    and initially attempted to negotiate with the crusaders rather than fight them. The Muslim sources that recorded the fall
    of Jerusalem — primarily Ibn al-Athir, writing from Mosul over a century later — described the massacre in graphic terms
    but embedded it in a narrative of Muslim disunity and complacency. The catastrophe at Jerusalem was not the work of a
    superior civilization. It was the consequence of Muslim rulers fighting each other instead of the invaders.


    The concept of jihad as counter-crusade developed gradually. Zengi, the atabeg of Mosul, captured the County of Edessa
    in 1144 — the first crusader state to fall. His son Nur al-Din built a coalition of Syrian cities and framed the struggle
    explicitly as jihad, commissioning a minbar (pulpit) for the al-Aqsa Mosque that he intended to install when Jerusalem
    was recaptured. He died in 1174 without achieving this goal. It was Saladin — Nur al-Din''s Kurdish general, who had seized
    power in Egypt and united it with Syria — who carried the minbar to Jerusalem.


    The Battle of Hattin on July 4, 1187, was the decisive engagement. Saladin lured the crusader army — 20,000 knights and
    infantry, the largest force the Kingdom of Jerusalem had ever fielded — into a waterless march across the Galilee. At
    the Horns of Hattin, dehydrated and surrounded, the crusaders collapsed. King Guy was captured. The fragment of the True
    Cross was taken. Within three months, Saladin had captured every crusader city except Tyre. On October 2, 1187, he entered
    Jerusalem.


    Saladin''s conduct at Jerusalem defined his legacy. He permitted the Frankish population to ransom themselves. He posted
    guards at churches to prevent looting. He restored the al-Aqsa Mosque to Islamic worship. The contrast with the crusaders''
    behavior in 1099 — which Saladin and his court explicitly referenced — was deliberate and calculated. Imad al-Din al-Isfahani,
    Saladin''s secretary, wrote that his master''s mercy proved Islam''s moral superiority. Baha al-Din ibn Shaddad, Saladin''s
    biographer, recorded that the sultan wept when he saw the poverty of the Frankish refugees, and his brother al-Adil freed
    a thousand captives as a charitable act.


    The Muslim narrative is not one of perpetual victimhood. After the initial shock of the First Crusade, Muslim states adapted,
    unified, and ultimately prevailed. The Ayyubid dynasty under Saladin recaptured Jerusalem. The Mamluks — slave-soldiers
    who had seized power in Egypt — destroyed the remaining crusader states methodically: Antioch fell in 1268, Tripoli in
    1289, Acre in 1291. Sultan Baybars, who took Antioch, reportedly wrote to its ruler: "You would have seen the crosses
    in your churches smashed, the pages of the false Testaments scattered, the Patriarchs'' tombs overturned." The Mamluks
    accomplished what Saladin had not: the complete expulsion of the Franks.


    In modern Arab political discourse, the Crusades serve as a template for understanding Western intervention in the Middle
    East. The parallel is explicit and recurring. When General Henri Gouraud entered Damascus in 1920 to enforce the French
    mandate, he reportedly stood at Saladin''s tomb and declared: "Saladin, we have returned." Whether or not the quote is
    apocryphal, it captures a widely held perception: that Western military presence in the Levant, from the Crusades to the
    British Mandate to the Iraq War, follows a continuous logic of conquest framed in moral language.

    '
  key_arguments:
  - The First Crusade's success was a product of Muslim disunity, not Frankish superiority
  - Saladin's restraint at Jerusalem (1187) — contrasted with the crusaders' massacre (1099) — demonstrates Islamic moral
    framework
  - 'The Crusades ended in total Muslim victory: every crusader state was destroyed by 1291'
  - Western military intervention in the modern Middle East is understood through the template of the Crusades
