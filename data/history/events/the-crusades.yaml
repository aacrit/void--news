- viewpoint: Byzantine
  viewpoint_type: bystander
  region_origin: europe
  narrative: 'Emperor Alexios I Komnenos had asked Pope Urban II for help. He wanted mercenaries — professional soldiers to
    reinforce the Byzantine army against the Seljuk Turks, who had conquered most of Anatolia after the Battle of Manzikert
    in 1071. What he got was an uncontrollable mob followed by independent armies led by ambitious Western lords who refused
    to recognize Byzantine authority, demanded supplies, and coveted Byzantine territory.


    Anna Comnena, Alexios''s daughter and one of the medieval world''s few female historians, described the First Crusade
    in her Alexiad (c. 1148) with a mixture of horror and contempt. She portrayed the crusaders as uncouth, unwashed, treacherous,
    and driven less by piety than by greed. Of Bohemond of Taranto — the Norman prince who had previously attacked the Byzantine
    Empire — she wrote that "his ambition was always the same: to carve out a kingdom for himself." When the crusaders captured
    Antioch in 1098, Bohemond kept it for himself rather than returning it to Alexios, as he had sworn to do. The Principality
    of Antioch, built on oathbreaking, confirmed Anna''s assessment of Frankish character.


    The Byzantine relationship with the crusaders deteriorated through each successive expedition. The Second Crusade (1147-1149)
    brought armies under Conrad III of Germany and Louis VII of France through Byzantine territory. Byzantine guides were
    accused of leading the crusaders into Turkish ambushes — a charge that may reflect genuine Byzantine ambivalence about
    Western armies in their territory. Manuel I Komnenos, Alexios''s grandson, allied with the crusader states when convenient
    but fought them when they threatened Byzantine interests.


    The catastrophe came on April 12-13, 1204. The Fourth Crusade, launched to recapture Jerusalem, instead besieged and sacked
    Constantinople. The immediate cause was a dynastic dispute: the deposed Byzantine emperor Isaac II''s son Alexios promised
    the crusaders 200,000 silver marks and 10,000 soldiers if they restored his father. When the restored emperor could not
    pay, the crusaders attacked. Enrico Dandolo, the blind, ninety-year-old Doge of Venice, had his own motives: Venice wanted
    to eliminate its Byzantine commercial rival and secure monopoly access to eastern Mediterranean trade.


    Nicetas Choniates, a Byzantine senator and historian who fled the city during the sack, left the definitive account. He
    described crusaders looting the Hagia Sophia, smashing icons, drinking from sacred vessels, and placing a prostitute on
    the patriarchal throne to sing bawdy songs. The city''s libraries were burned. Bronze and gold statues that had stood
    since antiquity were melted down for coin. The bronze horses of the Hippodrome — dating to the 4th century — were shipped
    to Venice. Relics were scattered across Europe; the head of John the Baptist ended up in Amiens, fragments of the True
    Cross in a dozen cathedrals. The crusaders established a "Latin Empire" in Constantinople that lasted until 1261, when
    the Byzantines recaptured the city — but the restored empire controlled only fragments of its former territory.


    For Byzantium, the Crusades were a catastrophe inflicted by supposed allies. The empire that had withstood Persian, Arab,
    and Turkish invasions for 800 years was fatally wounded not by Muslims but by Latin Christians who had sworn to defend
    Christendom. The weakened state that the Palaiologos dynasty recovered in 1261 was a rump, unable to resist the Ottoman
    advance. When Constantinople fell to Mehmed II on May 29, 1453, the walls and defenses that had protected the city for
    a millennium had already been compromised — in 1204, by men wearing the Cross.


    In Greek national memory, 1204 remains a wound. The Orthodox-Catholic schism, formalized in 1054 but driven deeper by
    the Fourth Crusade, has never fully healed. Ecumenical Patriarch Bartholomew I and Pope Francis have made gestures of
    reconciliation, but the theological and political division that the sack of Constantinople entrenched persists in the
    2020s.

    '
  key_arguments:
  - Alexios I requested mercenaries against the Seljuks — he did not request independent crusading armies with their own territorial
    ambitions
  - The Fourth Crusade's sack of Constantinople (1204) was the central trauma — Christians destroyed the greatest Christian
    city
  - Byzantium's fall to the Ottomans in 1453 was made possible by the damage inflicted in 1204
  - The Orthodox-Catholic schism was deepened, not created, by the Crusades — it persists into the 2020s
