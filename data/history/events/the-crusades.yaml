summary: 'On November 27, 1095, Pope Urban II stood before a crowd at the Council of Clermont in central France and called
  on Christendom to march east. The Holy Sepulchre in Jerusalem, he declared, was in the hands of the Seljuk Turks. The crowd''s
  response — "Deus vult!" ("God wills it!") — launched two centuries of war across three continents.


  Four years later, on July 15, 1099, the armies of the First Crusade breached the walls of Jerusalem. What followed was three
  days of killing. The anonymous author of the Gesta Francorum wrote that crusaders rode through the Temple Mount "in blood
  up to their knees and bridle reins." Muslim and Jewish defenders were slaughtered without distinction — the synagogue where
  Jerusalem''s Jews had taken refuge was set on fire. Ibn al-Athir, writing from Mosul, recorded that the Franks killed more
  than 70,000 people in the al-Aqsa Mosque alone. Modern estimates place the total dead between 40,000 and 70,000 — nearly
  the city''s entire population. The crusaders then walked barefoot to the Church of the Holy Sepulchre and gave thanks to
  God.


  The crusaders carved four states out of the conquered territory: the Kingdom of Jerusalem, the County of Tripoli, the Principality
  of Antioch, and the County of Edessa. These Latin states survived for nearly two centuries, defended by military orders
  — the Knights Templar (founded 1119) and the Knights Hospitaller (founded c. 1099) — and sustained by Italian maritime republics
  (Venice, Genoa, Pisa) that controlled the sea lanes and extracted commercial privileges. The crusader states were colonial
  outposts: a French-speaking military aristocracy ruling over Arabic-speaking Muslim, Christian, and Jewish populations.
  Usama ibn Munqidh, a Muslim nobleman who interacted with Frankish lords in the 1130s-1180s, described them as barbarians
  who did not wash, knew nothing of medicine, and subjected their women to bizarre customs — but he also recorded friendships
  and mutual respect between individual Muslims and Franks.


  Eighty-eight years after its capture, Jerusalem fell again. On October 2, 1187, Saladin — Salah ad-Din Yusuf ibn Ayyub,
  the Kurdish sultan of Egypt and Syria — entered the city after defeating the crusader army at the Battle of Hattin on July
  4, 1187. At Hattin, Saladin destroyed the Kingdom of Jerusalem''s field army: 20,000 crusaders were killed or captured,
  including King Guy of Lusignan and the fragment of the True Cross. Unlike the crusaders in 1099, Saladin did not massacre
  the city''s inhabitants. He offered terms: each Frank could purchase their freedom for 10 dinars per man, 5 per woman, 1
  per child. Those who could not pay were enslaved — an estimated 15,000 — but Saladin''s brother al-Adil freed 1,000 of them
  as a personal gift. The contrast between 1099 and 1187 — the massacre and the mercy — became a fixed point in Muslim historiography.


  The Third Crusade (1189-1192) brought Richard I of England, Philip II of France, and Frederick Barbarossa of Germany east.
  Barbarossa drowned crossing the Saleph River in Anatolia. Richard captured Acre after a two-year siege, then executed 2,700
  Muslim prisoners on the beach when Saladin delayed ransom payments. Richard and Saladin fought to a stalemate; the Treaty
  of Jaffa (1192) left Jerusalem in Muslim hands but granted Christian pilgrims access.


  The Fourth Crusade (1202-1204) never reached the Holy Land. Diverted by Venetian commercial interests and Byzantine dynastic
  politics, the crusaders besieged and sacked Constantinople — the capital of the Byzantine Empire, the largest Christian
  city in the world — on April 12-13, 1204. For three days, Latin Christians looted, burned, and raped their way through a
  Christian metropolis of 400,000. The Hagia Sophia, Christendom''s greatest church, was stripped of its gold and silver.
  The bronze horses of the Hippodrome were shipped to Venice, where they still stand atop St. Mark''s Basilica. Nicetas Choniates,
  a Byzantine senator who witnessed the sack, wrote: "Even the Saracens are merciful and kind compared with these men who
  bear the Cross of Christ on their shoulders." The Fourth Crusade fatally weakened the Byzantine Empire. Constantinople,
  reduced to a shadow of its former self, never recovered. When the Ottoman Turks took the city in 1453, the walls that had
  withstood 800 years of sieges had been undermined not by Muslims but by fellow Christians 249 years earlier.


  The crusader states fell one by one. Acre, the last major crusader stronghold, was overrun by the Mamluks on May 18, 1291.
  The Templar fortress held for ten more days before collapsing, killing the remaining defenders and their Mamluk attackers
  alike. After 196 years, the Latin presence in the Levant ended.

  '
significance: 'The Crusades created four Latin states in the Levant that lasted from 1099 to 1291, established the Knights
  Templar and Hospitaller (the Hospitallers, as the Sovereign Military Order of Malta, still hold observer status at the UN
  in the 2020s), and opened permanent Mediterranean trade routes that enriched Venice and Genoa. The Fourth Crusade''s sack
  of Constantinople in 1204 shattered the Byzantine Empire, accelerating its decline until the Ottoman conquest of 1453. The
  Rhineland massacres of 1096 established a pattern of anti-Jewish violence in Europe that recurred during the Black Death
  (1348-1349) and beyond. In the Muslim world, Saladin''s recapture of Jerusalem in 1187 became a template for anti-colonial
  resistance — Gamal Abdel Nasser, Saddam Hussein, and Osama bin Laden each invoked the Crusades as a framework for understanding
  Western military presence in the Middle East. The term "crusade" itself remains politically charged: George W. Bush''s use
  of it on September 16, 2001 — "This crusade, this war on terrorism" — drew immediate condemnation across the Arab world.

  '
