summary: 'On January 20, 1942, fifteen men sat around a table in a villa on the Wannsee lake outside Berlin. The meeting lasted
  90 minutes. SS-Obergruppenfuhrer Reinhard Heydrich chaired; Adolf Eichmann took the minutes. The agenda was the "Final Solution
  of the Jewish Question." The minutes, one of 30 copies, listed the Jewish population of every European country — 11 million
  total — and outlined a continent-wide deportation program. The word "killing" did not appear. The language was bureaucratic:
  "evacuation," "natural diminution," "treated accordingly." Eight of the fifteen attendees held doctorates.


  By January 1942, the killing was already underway. The Einsatzgruppen — mobile killing squads — had followed the Wehrmacht
  into the Soviet Union from June 1941, shooting Jews in ravines, forests, and ditches. At Babi Yar outside Kyiv, Sonderkommando
  4a shot 33,771 Jews on September 29-30, 1941. The shooters reported difficulty with women and children; Himmler, after witnessing
  an execution in Minsk, ordered the development of "more humane" methods — for the killers, not the killed. The result was
  the gas van, then the gas chamber.


  Six extermination camps operated on occupied Polish territory: Auschwitz-Birkenau, Treblinka, Sobibor, Belzec, Chelmno,
  and Majdanek. Treblinka alone killed approximately 900,000 people between July 1942 and October 1943, nearly all Jews from
  the Warsaw Ghetto and surrounding regions. The camp''s physical footprint was 600 by 400 meters. It employed 20-30 SS men
  and 100-120 Trawniki guards (auxiliaries, mostly Soviet POWs who had volunteered). At peak operation, 12,000-15,000 people
  were gassed per day. The bodies were burned on open-air grates made of railway tracks.


  Auschwitz-Birkenau was the largest complex. Between 1.1 and 1.5 million people were killed there — approximately 1 million
  Jews, 75,000 Poles, 21,000 Roma, and 15,000 Soviet POWs. The camp operated a selection system: arrivals were divided on
  the platform into those fit for slave labor and those sent directly to the gas chambers. Rudolf Hoss, the commandant, testified
  at Nuremberg that he could process 10,000 people per day. The Sonderkommando — Jewish prisoners forced to operate the crematoria
  — were themselves killed and replaced every few months.


  The logistics were industrial. Deutsche Reichsbahn, the German state railway, transported victims in freight cars across
  occupied Europe. The railway charged the SS per-kilometer group fares — half-price for children under 10, free for children
  under 4. IBM''s German subsidiary, Dehomag, provided the Hollerith punch-card machines used in census operations that identified
  Jews by ancestry. IG Farben built a synthetic rubber factory at Auschwitz III (Monowitz) using slave labor; the average
  life expectancy of a Monowitz worker was three months. The killing was not a secret program hidden from German industry.
  It was a supply chain.

  '
significance: 'The Holocaust destroyed two-thirds of European Jewry. Poland''s pre-war Jewish population of 3.3 million was
  reduced to approximately 300,000. Lithuania lost 95% of its Jews. The Yiddish-speaking civilization of Eastern Europe —
  its schools, newspapers, theaters, synagogues, and political movements — was annihilated. Communities that had existed for
  800 years vanished in 18 months.


  The Nuremberg Trials (1945-1946) established the legal framework for prosecuting crimes against humanity and genocide. The
  UN Convention on the Prevention and Punishment of the Crime of Genocide was adopted on December 9, 1948 — one day before
  the Universal Declaration of Human Rights. The term "genocide" itself was coined by Raphael Lemkin, a Polish-Jewish lawyer,
  in 1944, specifically to describe what was happening to the Jews of Europe.


  The Holocaust became the central catalyst for the creation of the State of Israel in 1948. The connection was not automatic
  — the Zionist movement predated the Holocaust by 50 years — but the destruction of European Jewry transformed the political
  calculus. 250,000 Jewish survivors languished in Displaced Persons camps across Europe after 1945, with no country willing
  to accept them in large numbers. The British Mandate in Palestine became untenable. The UN Partition Plan of November 1947
  and the declaration of Israeli independence on May 14, 1948 are inseparable from the DP crisis.

  '
