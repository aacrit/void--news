    year: '1966'
    type: book
  notable_quotes:
  - text: It is not an individual that is in the dock at this historic trial, and not the Nazi regime alone, but anti-Semitism
      throughout history.
    speaker: Gideon Hausner
    context: Opening statement at the Eichmann trial, April 11, 1961
  - text: We shall fight the war as if there were no White Paper, and fight the White Paper as if there were no war.
    speaker: David Ben-Gurion
    context: September 1939, on British restrictions on Jewish immigration to Palestine
  emphasized:
  - Holocaust as proof of the existential necessity of Jewish statehood
  - DP crisis and international refusal to absorb survivors
  - Eichmann trial as nation-building and pedagogical project
  - Transformation of Zionism from one option among many to the only option
  omitted:
  - Palestinian displacement as a consequence of the state created in response to the Holocaust
  - Pre-state Jewish terrorism against the British Mandate (Irgun, Lehi)
  - Internal Israeli debate about exploitation of Holocaust memory
  - Non-Zionist Jewish survivors who rebuilt lives in Europe, Americas, and elsewhere
- viewpoint: Roma / Forgotten Victims
  viewpoint_type: vanquished
  region_origin: europe
  narrative: 'The Romani word for it is Porajmos — "the Devouring." Between 250,000 and 500,000 Roma and Sinti were murdered
    by the Nazi regime and its allies between 1939 and 1945. The exact figure is disputed because Roma populations were not
    systematically counted before the war, many Roma did not carry identity papers, and post-war governments had little interest
    in investigating. Ian Hancock, a Romani scholar, has argued for figures as high as 1.5 million; most historians accept
    a range of 220,000 to 500,000.


    Roma persecution preceded the Nazi regime. Bavaria established a "Gypsy Information Service" in 1899. The Weimar Republic
    required Roma to carry identity cards and subjected them to fingerprinting. The Nazis inherited this apparatus and expanded
    it. Dr. Robert Ritter, head of the Racial Hygiene Research Unit in Berlin, classified 30,000 Roma by "racial purity" between
    1936 and 1944. His assistant, Eva Justin, wrote a doctoral dissertation on Romani children raised in foster care, concluding
    they were "uneducable" and recommending sterilization. Many of the children she studied were later sent to Auschwitz.


    The "Gypsy Camp" at Auschwitz-Birkenau (BIIe, the Zigeunerfamilienlager) operated from February 1943 to August 2, 1944.
    Unlike the main camp, Roma families were held together — a decision motivated not by compassion but by the plan to study
    them as racial specimens. Josef Mengele conducted experiments on Romani children, including twins. On the night of August
    2-3, 1944, the SS liquidated the Gypsy Camp. 2,897 Roma — men, women, and children — were gassed in a single night. Survivors
    reported that the Roma fought back with improvised weapons and bare hands. The date is commemorated as Roma Holocaust
    Memorial Day.


    The Nuremberg Trials did not address the Roma genocide. No Roma witnesses were called. No Romani victims appeared in the
    indictments. West Germany classified Roma persecution as a legitimate police action against "asocials" until a 1982 court
    ruling acknowledged the racial motivation. Roma survivors were denied reparations for decades. The Federal Republic''s
    compensation law (Bundesentschadigungsgesetz) of 1953 required victims to prove persecution on racial, religious, or political
    grounds; Roma claimants were routinely denied on the basis that their internment was a response to "criminal" or "asocial"
    behavior. Eva Justin and Robert Ritter continued to work in public health in Frankfurt after the war. Ritter died in 1951
    without facing charges; Justin worked as a city psychologist until her retirement in 1965.


    Other victim groups experienced similar erasure. The Nazis murdered approximately 250,000 disabled people under the Aktion
    T4 euthanasia program (1939-1941) and its successors — the first systematic use of gas chambers, which provided the technical
    model for the death camps. An estimated 5,000-15,000 homosexual men were sent to concentration camps; survival rates were
    among the lowest of any prisoner category. Political prisoners (communists, social democrats, trade unionists, Jehovah''s
    Witnesses) numbered in the hundreds of thousands. Soviet POWs — 3.3 million died in German captivity — are often excluded
    from Holocaust scholarship entirely, categorized under the history of the Eastern Front rather than the history of genocide.

    '
  key_arguments:
  - The Roma genocide (Porajmos) killed 250,000-500,000 people and has been systematically excluded from Holocaust memory
  - Nuremberg did not address Roma victims; West Germany classified Roma persecution as legitimate police action until 1982
  - Perpetrators of Roma persecution (Ritter, Justin) were never prosecuted and continued professional careers
  - Disabled, homosexual, and political victims are similarly marginalized in the dominant Holocaust narrative
  sources:
  - title: 'The Romani Genocide During the Holocaust: We Can and Must Do More'
    author: Ian Hancock
    year: '2004'
    type: journal
  - title: A History of the Romani People
    author: Angus Fraser
    year: '1995'
    type: book
  - title: The Nazi Persecution of the Gypsies
    author: Guenter Lewy
    year: '2000'
    type: book
  notable_quotes:
  - text: They were sorted, classified, sterilized, experimented on, and gassed. And then they were forgotten.
    speaker: Ian Hancock
    context: On the Roma experience in the Holocaust
  - text: The children screamed. They knew.
    speaker: Testimony of a Romani survivor of the August 2, 1944 liquidation of the Zigeunerfamilienlager
    context: Recorded by the Memorial and Museum Auschwitz-Birkenau
  emphasized:
  - Roma genocide as a systematically forgotten parallel to the Jewish Holocaust
  - Post-war denial of reparations and re-classification of persecution as criminal policing
  - Perpetrators of Roma persecution escaping justice entirely
  - Aktion T4 as the technical prototype for the death camps
  omitted:
  - The centrality of Jewish suffering and the unique scale of Jewish losses
  - Internal Roma political divisions that complicated post-war advocacy
  - Allied liberation of camps and rescue of Roma survivors
  - Post-war Roma migration and community rebuilding
