- viewpoint: Bystander Nation
  viewpoint_type: bystander
  region_origin: americas
  narrative: 'In July 1938, delegates from 32 countries met at the Hotel Royal in Evian-les-Bains, France, to discuss the
    refugee crisis created by Nazi Germany''s persecution of Jews. The Dominican Republic offered to accept 100,000 refugees.
    No other country made a comparable offer. Australia''s delegate T.W. White said, "As we have no real racial problem, we
    are not desirous of importing one." The United States maintained its existing quota system, which limited German and Austrian
    immigration to 27,370 per year. Britain refused to discuss Palestine. The conference adjourned after nine days. A German
    newspaper editorialized: "Nobody wants them."


    Jan Karski, a Polish Catholic resistance courier, saw the Warsaw Ghetto in October 1942 — disguised as a Ukrainian guard,
    he entered a transit camp near Belzec and witnessed Jews being loaded into cattle cars. He reached London in November
    1942 and met Foreign Secretary Anthony Eden. He reached Washington in July 1943 and met President Roosevelt. He told them
    what he had seen. He told Supreme Court Justice Felix Frankfurter, who was Jewish. Frankfurter said: "I did not say that
    he was lying. I said that I was unable to believe him. There is a difference." Allied governments had confirmed reports
    of mass extermination by December 1942 — the Allied Joint Declaration of December 17, 1942 specifically condemned Germany''s
    "bestial policy of cold-blooded extermination." No military action followed.


    The question of bombing Auschwitz has been debated since 1944. In June and July 1944, Jewish leaders in Budapest and the
    War Refugee Board in Washington requested that the Allies bomb the rail lines leading to Auschwitz-Birkenau or the crematoria
    themselves. The U.S. War Department rejected the request on August 14, 1944, stating it would require "diversion of considerable
    air support" and was of "very doubtful efficacy." Between July and November 1944, American bombers struck the IG Farben
    synthetic oil plant at Auschwitz III-Monowitz on four occasions. The bombers flew directly over the Birkenau crematoria
    — visible from altitude — and did not attack them. 437,000 Hungarian Jews were deported to Auschwitz between May 15 and
    July 9, 1944. Most were gassed on arrival.


    Switzerland accepted approximately 21,000 Jewish refugees during the war and turned away an estimated 24,000 at the border.
    In 1938, Swiss authorities requested that Germany stamp Jewish passports with a red "J" to allow border guards to identify
    them — a request Germany fulfilled. Swiss banks accepted deposits from Holocaust victims and, after the war, demanded
    death certificates from heirs — documents that did not exist for people murdered in gas chambers. The Bergier Commission,
    appointed by the Swiss government in 1996, documented $1.25 billion in dormant accounts linked to Holocaust victims. The
    Swiss National Bank purchased $440 million in gold from the Reichsbank during the war, some of which had been melted from
    dental fillings and wedding rings taken from camp victims.


    The bystander question extends beyond governments. The International Committee of the Red Cross visited Theresienstadt
    in June 1944 and accepted the Nazi staging — a Potemkin village with concerts, sports, and painted facades — without pressing
    for access to the extermination camps 200 miles east. The Vatican under Pius XII issued no public condemnation of the
    Holocaust, though individual Catholic clergy (Maximilian Kolbe, Bernhard Lichtenberg) were killed for their resistance.
    The debate over Pius XII''s silence — motivated by fear of retaliation against Catholics, diplomatic calculation, or anti-Semitism
    — continues.

    '
  key_arguments:
  - Allied governments had confirmed information about mass extermination by December 1942 and did not act militarily
  - The Evian Conference of 1938 demonstrated that no country would accept Jewish refugees at scale
  - Switzerland and other neutral nations profited financially from the persecution
  - Institutional bystanders (Red Cross, Vatican) failed to use their access or moral authority
