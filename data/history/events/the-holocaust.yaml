legacy_points:
- Destroyed two-thirds of European Jewry — 6 million murdered in a state-directed industrial killing program
- Coined the concept of genocide (Raphael Lemkin, 1944) and produced the legal framework for crimes against humanity at Nuremberg
- Catalyzed the creation of the State of Israel and the displacement of Palestinian Arabs
- Demonstrated that industrialized bureaucratic states can organize mass murder as a logistics problem
- Established the survivor testimony tradition (Levi, Wiesel, Shoah Foundation's 52,000 testimonies)
