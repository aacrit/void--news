connections:
- target_slug: armenian-genocide
  connection_type: influenced
  description: Hitler reportedly referenced the Armenian Genocide — "Who, after all, speaks today of the annihilation of the
    Armenians?" — as precedent for impunity. The Armenian case also informed Raphael Lemkin's development of the concept of
    genocide.
- target_slug: creation-of-israel-nakba
  connection_type: caused
  description: The Holocaust and the DP crisis of 1945-1948 made the creation of a Jewish state a humanitarian imperative,
    directly precipitating the 1947 UN Partition Plan and Israeli independence in 1948
- target_slug: rwandan-genocide
  connection_type: influenced
  description: The international community's failure to prevent the Rwandan genocide in 1994 — despite the post-Holocaust
    pledge of "never again" — demonstrated the gap between commemorative rhetoric and political will
- target_slug: cambodian-genocide
  connection_type: parallel
  description: Both regimes used state infrastructure to systematically murder portions of their own populations, and both
    were preceded by ideological dehumanization of victim groups
