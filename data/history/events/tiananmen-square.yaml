connections:
- target_slug: fall-of-berlin-wall
  connection_type: parallel
  description: Both occurred in 1989. In Leipzig, 70,000 marchers faced tanks that never fired; in Beijing, the tanks fired. The two outcomes — democratic breakthrough in Europe, authoritarian consolidation
    in China — defined the post-Cold War world.
- target_slug: opium-wars
  connection_type: influenced
  description: The 'century of humiliation' narrative, rooted in the Opium Wars and the Unequal Treaties, was deployed by the CCP to frame the 1989 protests as a Western-instigated attempt to weaken China
    — the same pattern of foreign interference the Opium Wars represented.
- target_slug: french-revolution
  connection_type: parallel
  description: Both began with moderate demands for reform and escalated when rulers refused dialogue; both raised the question of whether revolutionary movements without institutional structure can negotiate
    outcomes or only provoke repression.
