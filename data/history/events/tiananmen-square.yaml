death_toll: Estimates range from 200-300 (Chinese Red Cross, later retracted) to 2,600 (Chinese student associations) to 'thousands' (declassified British cable from Ambassador Alan Donald, December 1989)
affected_population: Hundreds of thousands of protesters across 400 Chinese cities; unknown number arrested, imprisoned, or exiled; entire generation of Chinese reformists silenced
