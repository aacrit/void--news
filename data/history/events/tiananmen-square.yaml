hero_image_attribution: Jeff Widener / Associated Press, June 5, 1989
summary: 'On the morning of June 5, 1989, a man in a white shirt carrying two shopping bags walked into the middle of Chang''an Avenue and stopped in front of a column of Type 59 tanks leaving Tiananmen
  Square. The lead tank tried to drive around him. He sidestepped to block it. The tank stopped. He climbed onto the turret, spoke to the crew, climbed down, and resumed blocking. After several minutes,
  two figures pulled him away. No one has confirmed his identity. The Chinese government has never acknowledged the encounter. The photograph, taken by Jeff Widener of the Associated Press from a sixth-floor
  balcony of the Beijing Hotel 800 meters away, became the most reproduced image of the 20th century''s final decade. Inside China, it does not exist.


  The protests had begun seven weeks earlier, on April 15, when Hu Yaobang died of a heart attack. Hu had been General Secretary of the Chinese Communist Party until January 1987, when hardliners forced
  his resignation for being too sympathetic to student demands for political reform. Students at Peking University and Tsinghua University began laying wreaths at the Monument to the People''s Heroes in
  Tiananmen Square — the same space where, in 1976, mourners for Zhou Enlai had been beaten by police in the Qingming Incident. By April 22, the day of Hu''s state funeral, 100,000 students filled the Square.
  Three student representatives knelt on the steps of the Great Hall of the People, holding a petition above their heads in the traditional posture of subjects appealing to the emperor. No official came
  out to receive it.


  The movement grew beyond students. By mid-May, workers, civil servants, journalists from the People''s Daily, and even police officers had joined marches across Beijing. The Beijing Workers'' Autonomous
  Federation, led by Han Dongfang, represented a labor dimension that frightened the Party leadership far more than student idealism — Poland''s Solidarity had begun as a workers'' movement. On May 13,
  roughly 3,000 students began a hunger strike. Mikhail Gorbachev arrived in Beijing on May 15 for the first Sino-Soviet summit in 30 years; the visit was overshadowed by the protests, and the welcoming
  ceremony had to be moved from the Square to the airport. The Party''s loss of face before a foreign leader hardened the position of hardliners around Deng Xiaoping and Premier Li Peng.


  On May 20, Premier Li Peng declared martial law. Zhao Ziyang, the General Secretary who had urged dialogue with the students, visited the Square at 4:50 a.m. on May 19 and told the hunger strikers, through
  tears, "We came too late." He was stripped of all posts and spent the remaining 15 years of his life under house arrest. On the night of June 3-4, the 27th and 38th Group Armies of the PLA entered Beijing
  from multiple directions, firing live ammunition. The killing was concentrated not in the Square itself — which was largely cleared by negotiation in the early hours of June 4 — but on the approach roads:
  Chang''an Avenue, Muxidi, Fuxingmen, Xidan. Armored personnel carriers crushed barricades built from buses. Soldiers fired into apartment buildings along the route. At Muxidi, where the boulevard narrows,
  residents threw Molotov cocktails from balconies; troops responded with automatic weapons fire into the high-rises.


  The exact death toll remains unknown because the Chinese government has never permitted an independent investigation. The Chinese Red Cross initially reported 2,600 dead, then retracted the figure within
  hours under government pressure. A declassified British diplomatic cable from Ambassador Alan Donald, sent on June 5, estimated "a minimum of 10,000 dead." Most Western scholars place the figure between
  several hundred and several thousand. The Tiananmen Mothers, a group founded by Ding Zilin — whose 17-year-old son Jiang Jielian was shot dead on June 3 — have documented 202 deaths by name as of 2024,
  but their work is illegal in China and their access to witnesses is restricted.

  '
significance: 'The June 4 crackdown ended China''s most sustained experiment in political liberalization. Within weeks, the Party arrested thousands; some, like student leader Wang Dan, served years in
  prison. Others, including Chai Ling and Wuer Kaixi, fled abroad through "Operation Yellowbird," a Hong Kong-based smuggling network that extracted roughly 400 dissidents. The crackdown established the
  template for Chinese governance for the next 35 years: rapid economic liberalization combined with absolute political control. China''s GDP grew from $347 billion in 1989 to $17.8 trillion in 2023 — a
  51-fold increase — while the CCP maintained a single-party monopoly, expanded surveillance technology, and criminalized organized political dissent. Deng Xiaoping''s post-Tiananmen formula — prosperity
  in exchange for obedience — became the operating system for what some scholars call "authoritarian resilience." The massacre occurred five months before the Berlin Wall fell. In Leipzig, 70,000 marchers
  risked a crackdown that never came; in Beijing, the crackdown came. The two outcomes of 1989 — democratic breakthrough in Europe, authoritarian consolidation in China — defined the post-Cold War world.

  '
