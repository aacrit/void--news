legacy_points:
- Ended China's post-Mao political liberalization; the CCP has not permitted organized political opposition since
- The crackdown and the Berlin Wall's fall — separated by 5 months — produced opposite outcomes that defined two models of post-Cold War governance
- China's internet censorship system (the Great Firewall) makes June 4 the most aggressively suppressed date in Chinese digital space
- Liu Xiaobo became the only Nobel Peace Prize laureate to die in state custody since Carl von Ossietzky under the Nazis in 1938
- The Tiananmen Mothers have documented 202 victims by name; the Chinese government has never released a casualty figure
