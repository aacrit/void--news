    archive_url: https://archive.org/details/quellingpeoplemi0000broo
  - title: 'The Power of Tiananmen: State-Society Relations and the 1989 Beijing Student Movement'
    author: Zhao Dingxin
    year: '2001'
    type: book
  - title: 'The People''s Republic of Amnesia: Tiananmen Revisited'
    author: Louisa Lim
    year: '2014'
    type: book
    archive_url: https://archive.org/details/the-peoples-republic-of-amnesia-tiananmen-revisited-louisa-lim-z-library
  notable_quotes:
  - text: A China that embraces reform and modernization needs the rule of law.
    speaker: Zhao Ziyang
    context: Secretly recorded memoir, published posthumously in 2009
  - text: The blood debt must be repaid.
    speaker: Ding Zilin (Tiananmen Mothers)
    context: Annual statement demanding accountability, maintained since 1989
  emphasized:
  - Internal Party divisions — Zhao Ziyang's reformist position as a road not taken
  - 'Geographic precision: approach roads vs. the Square itself'
  - The protest movement's internal contradictions and strategic failures
  - The post-1989 economic settlement as a selective, ironic fulfillment of protester demands
  omitted:
  - The emotional power of the movement — revisionist analysis can flatten the moral clarity of unarmed people facing tanks
  - The ongoing courage of the Tiananmen Mothers — a women-led documentation movement operating under state surveillance since 1989
  - The perspective of ordinary soldiers, many of them rural conscripts, ordered to fire on civilians
  - Gendered scrutiny of Chai Ling versus comparable failures of male student leaders
