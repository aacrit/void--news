perspectives:
- viewpoint: Chinese Communist Party / State
  viewpoint_type: victor
  region_origin: east-asia
  narrative: 'The official Chinese narrative, codified in the June 9, 1989 address by Deng Xiaoping to martial law troops and reinforced in every subsequent government statement, frames the protests as
    a "counter-revolutionary rebellion" (fangeming baoluan) instigated by a "very small number of people" who exploited student idealism to overthrow the socialist system. In this account, the Party acted
    with restraint for seven weeks before intervening to restore order. The alternative was chaos — the collapse of social stability, the breakup of China along the lines of the Soviet Union, and the loss
    of everything achieved since 1949.


    Deng''s logic was rooted in specific historical precedents. The Cultural Revolution (1966-1976) had killed between 500,000 and 2 million people when Mao Zedong unleashed mass mobilization against the
    Party itself. The state narrative positions June 4 as the moment the Party chose order over anarchy, development over ideology, stability over democracy. Deng told martial law commanders on June 9:
    "This storm was bound to come sooner or later. This is determined by the macro-climate and China''s own micro-climate. It was bound to happen and was independent of man''s will."


    The economic record is the Party''s primary justification. In 1989, China''s per-capita GDP was $311 — lower than Sub-Saharan Africa''s average. By 2023, it was $12,720. Over 800 million people moved
    out of poverty as measured by the World Bank. China became the world''s largest trading nation, the second-largest economy, and a space-faring nuclear power. The Party''s implicit argument: the students
    wanted Western-style democracy; look at the Soviet Union, which tried it and collapsed into oligarchy, poverty, and territorial dismemberment. Russia''s GDP fell 40% in the 1990s. China''s grew every
    single year.


    The state has invested heavily in ensuring that the counter-narrative cannot circulate domestically. The "Great Firewall" blocks foreign news coverage. Search engines return no results for "June 4 incident,"
    "Tiananmen massacre," or "Tank Man" in Chinese. The anniversary date triggers automated censorship of even oblique references — candle emojis, the number 35 (May 35th, an internet euphemism for June
    4), and the string "6/4" are filtered. Textbooks do not mention the protests. Young Chinese surveyed in the 2020s overwhelmingly either do not know about the events or view them through the state framework
    of necessary stability enforcement. The suppression of memory is not incidental to the state narrative; it is the narrative''s foundation.


    The CCP has never published an official death toll. State media in June 1989 reported that approximately 200 civilians and several dozen soldiers died, framing the violence as mutual. Government spokespeople
    have consistently described the military operation as a response to violent rioters who attacked soldiers, burned military vehicles, and lynched PLA personnel — events that did occur on some approach
    roads and that are documented in photographs the state selectively circulates.

    '
  key_arguments:
  - The protests were a counter-revolutionary rebellion, not a democracy movement — exploited by a small number of agitators
  - Military intervention prevented Soviet-style collapse; China's post-1989 economic growth validates the decision
  - Western-style democracy would have produced chaos, not freedom — the Soviet example proves this
  - The Cultural Revolution demonstrated what happens when mass movements are allowed to challenge Party authority
