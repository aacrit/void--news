- viewpoint: Indigenous Sovereignty / Contemporary Native
  viewpoint_type: indigenous
  region_origin: americas
  narrative: 'For the Five Tribes — Cherokee, Chickasaw, Choctaw, Creek (Muscogee), and Seminole — the Trail of Tears is not a historical event. It is a founding trauma that structures political identity,
    legal strategy, and cultural memory in the present tense. The Cherokee Nation, headquartered in Tahlequah, Oklahoma, is the largest tribal government in the United States with over 450,000 enrolled
    citizens. Its existence is an act of survival that began on the trail.


    The contemporary indigenous perspective rejects the word "removal." "Removal" implies an administrative procedure. What happened was a forced deportation of sovereign nations by a government that had
    repeatedly recognized their sovereignty through treaties. Between 1785 and 1835, the United States signed 28 treaties with the Cherokee alone, each affirming Cherokee nationhood and territorial rights.
    The Treaty of New Echota, which authorized the deportation, was itself a treaty — meaning the U.S. acknowledged Cherokee sovereignty in the very act of violating it.


    The Seminole Wars (1817-1858) complicate the narrative of passive removal. The Seminole fought three wars against the United States rather than submit to relocation. The Second Seminole War (1835-1842)
    lasted seven years, cost the U.S. $20 million and 1,500 soldiers'' lives, and ended without a formal surrender. Osceola, the Seminole war leader, was captured under a flag of truce in 1837 — an act
    that provoked outrage even among white Americans. Several hundred Seminole never surrendered and remained in the Florida Everglades, where their descendants — the Seminole Tribe of Florida — live today.
    The Seminole resistance demonstrates that the Five Tribes were not passive victims; they exercised every available option, from legal challenge to armed resistance.


    The boarding school era that followed removal deepened the wound. Beginning in the 1870s, Cherokee and other tribal children were taken from their families and sent to institutions like the Carlisle
    Indian Industrial School (founded 1879), where they were forbidden to speak their languages, practice their religions, or maintain tribal identities. Captain Richard Henry Pratt, Carlisle''s founder,
    described the mission as "Kill the Indian, save the man." Girls were particular targets — their hair was cut, their dress replaced with Victorian clothing, and they were trained in domestic service
    to erase their roles as the holders of clan identity and property. Cherokee women had been the primary farmers and the custodians of ceremonial knowledge; the boarding schools attacked precisely those
    functions. Between 1869 and 1969, the U.S. government operated or funded 408 boarding schools. A 2022 Department of the Interior investigation identified burial sites at 53 schools and documented over
    500 child deaths — a number the report acknowledged was almost certainly an undercount.


    The Cherokee Nation''s modern legal battles extend the fight that John Ross began in the 1830s. In 2020, the Supreme Court ruled in McGirt v. Oklahoma that much of eastern Oklahoma remains Indian Country
    as defined by the treaties that created Indian Territory. Justice Neil Gorsuch, writing for the majority, stated: "On the far end of the Trail of Tears was a promise." The 5-4 decision affirmed the
    Muscogee (Creek) Nation''s reservation boundaries, placing 3 million people and half of Oklahoma''s land area under tribal criminal jurisdiction — and it rested directly on the treaties signed during
    and after removal.


    The Trail of Tears memorial, a 2,200-mile National Historic Trail designated in 1987, follows the routes the Cherokee walked. Each September, the Cherokee Nation holds an annual commemorative walk along
    portions of the trail. These are not reenactments. They are assertions of continuity — a people walking the path their ancestors were forced to walk, demonstrating that the nation those ancestors built
    endures.

    '
  key_arguments:
  - The Trail of Tears was a forced deportation of sovereign nations, not an administrative 'removal'
  - Seminole armed resistance challenges the narrative of passive victimhood
  - Boarding schools extended the logic of removal into cultural destruction
  - McGirt v. Oklahoma (2020) upheld treaty rights rooted in the removal era
