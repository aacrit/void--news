legacy_points:
- Approximately 60,000 Native people forcibly removed; 15,000 died en route or in the first year
- Worcester v. Georgia (1832) established tribal sovereignty doctrine — still cited in federal Indian law
- Indian Removal Act created the legal template for westward expansion at indigenous expense
- Cherokee Nation rebuilt in Indian Territory, becoming the largest tribal government in the U.S. by the 21st century
- The removals concentrated five distinct nations in Indian Territory, creating modern Oklahoma's Native landscape
