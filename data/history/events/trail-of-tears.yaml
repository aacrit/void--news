summary: 'On May 28, 1830, President Andrew Jackson signed the Indian Removal Act, authorizing the federal government to negotiate treaties exchanging Native lands east of the Mississippi for territory
  in present-day Oklahoma. The word "negotiate" was a legal fiction. The act gave the president power to override any tribe that refused, and the treaties that followed were signed under duress, by unrepresentative
  factions, or at the point of a bayonet.


  The Choctaw went first. In the winter of 1831-1832, approximately 17,000 Choctaw were marched from Mississippi to Indian Territory. Alexis de Tocqueville witnessed a Choctaw column crossing the Mississippi
  at Memphis in December 1831 and wrote: "The Indians had their families with them, and they brought in their train the wounded and the sick, with children newly born and old men upon the verge of death."
  Between 2,500 and 6,000 Choctaw died of exposure, cholera, dysentery, and starvation during three separate removal campaigns from 1831 to 1833. The U.S. government had contracted private suppliers to
  provide food and blankets; many suppliers delivered spoiled meat or nothing at all.


  The Creek (Muscogee) removal followed in 1836-1837 after a manufactured crisis. Federal agents had permitted white squatters onto Creek lands in Alabama, provoking conflicts that were then used to justify
  military removal. 14,609 Creek were transported to Indian Territory, many of them in chains. An estimated 3,500 died en route or in the first year after arrival.


  The Cherokee removal of 1838 became the defining event. The Cherokee Nation had adopted a written constitution, a legislature, a court system, and a newspaper — the Cherokee Phoenix, printed in both English
  and the Sequoyah syllabary. In 1831 and 1832, Chief Justice John Marshall ruled in Cherokee Nation v. Georgia and Worcester v. Georgia that the Cherokee were a sovereign nation and that Georgia''s laws
  had no force on Cherokee land. Jackson reportedly responded: "John Marshall has made his decision; now let him enforce it." Whether he said those exact words is debated; what is not debated is that he
  ignored the ruling.


  In 1835, a minority faction of the Cherokee signed the Treaty of New Echota, ceding all Cherokee land east of the Mississippi for $5 million and land in Indian Territory. Principal Chief John Ross, who
  represented the vast majority of the Cherokee Nation, protested that the treaty was fraudulent — signed by fewer than 500 of the 17,000 Cherokee. The U.S. Senate ratified it by a single vote.


  In May 1838, General Winfield Scott arrived in Cherokee country with 7,000 federal troops and state militia. Soldiers moved through Cherokee settlements, giving families minutes to gather possessions
  before torching their homes. Families were marched to stockade camps where they waited through the summer, crammed into pens in the heat with inadequate water. Disease killed hundreds before the march
  west even began. The main removals departed in the fall and winter of 1838-1839 along multiple routes covering 800 to 1,200 miles. Approximately 4,000 Cherokee died — one in four of those who set out.

  '
significance: 'The Trail of Tears established the legal and operational template for the U.S. government''s relationship with indigenous peoples for the next century: treaty rights could be overridden by
  executive and legislative action, and the Supreme Court could be ignored when its rulings conflicted with expansion. The Indian Removal Act''s logic — that indigenous peoples could be relocated to make
  way for white settlement — was replicated across the West through the Homestead Act (1862), the reservation system, the Dawes Act (1887), and the forced assimilation policies of the boarding school era.
  The Cherokee Nation''s legal battle produced foundational Supreme Court precedents on tribal sovereignty (Worcester v. Georgia) that remain operative law in the 2020s, even though they were ignored at
  the time. Oklahoma''s modern Native population of 523,000 — the second-largest in the United States — descends in large part from the removed nations. The Cherokee Nation today is the largest tribal government
  in the United States, with 450,000 citizens.

  '
