- viewpoint: Cherokee Nation
  viewpoint_type: vanquished
  region_origin: americas
  narrative: 'The Cherokee Nation did everything the United States asked of a "civilized" people — and was removed anyway. By the 1820s, the Cherokee had adopted a written constitution modeled on the U.S.
    Constitution. They had a bicameral legislature, a court system, roads, mills, schools, and churches. Sequoyah''s syllabary, completed around 1821, produced a literate population and a bilingual newspaper,
    the Cherokee Phoenix, first published on February 21, 1828. The Cherokee held farms, some with enslaved laborers (a fact that complicates but does not diminish their dispossession). They had, in the
    language of the era, "civilized" themselves.


    What "civilizing" cost Cherokee women went unmentioned in Washington. Under the clan system, Cherokee women had held property, controlled agricultural output, and exercised political authority through
    the Women''s Council. Nancy Ward (Nanye''hi), named Beloved Woman in 1755, held the power to free condemned prisoners and to speak in General Council — a veto authority with no equivalent in the U.S.
    system. The 1827 Cherokee Constitution, drafted partly to satisfy American expectations of "civilized" governance, stripped Cherokee women of voting rights and council participation. The very act of
    legal modernization that was supposed to save the Cherokee dismantled the political structure that had given women more authority than any white woman in Georgia possessed.


    None of it mattered. When gold was found at Dahlonega in 1828, Georgia passed a series of laws nullifying Cherokee governance, redistributing Cherokee land by lottery to white settlers, and making it
    illegal for Cherokee to testify against whites in court. The Cherokee responded through the American legal system. In Cherokee Nation v. Georgia (1831), the Supreme Court declined to hear the case on
    jurisdictional grounds but called the Cherokee a "domestic dependent nation." In Worcester v. Georgia (1832), Marshall unequivocally ruled that Georgia had no authority over Cherokee land and that the
    Cherokee Nation was a sovereign entity with which only the federal government could treat. It was the definitive legal victory — and it was meaningless.


    Principal Chief John Ross spent the years between 1832 and 1838 in a campaign of legal appeals, congressional petitions, and diplomatic efforts. The Cherokee petition of 1836, protesting the Treaty
    of New Echota, gathered 15,964 signatures — nearly the entire adult Cherokee population. The U.S. Senate ratified the treaty anyway, by one vote, on May 23, 1836. The treaty had been signed by fewer
    than 500 Cherokee, led by Major Ridge, his son John Ridge, and Elias Boudinot — a group the Cherokee majority considered traitors. All three signers were assassinated by Cherokee opponents on June 22,
    1839.


    In May 1838, General Winfield Scott issued General Order No. 25, calling on the Cherokee to assemble peacefully for removal. When they did not, his 7,000 troops swept through Cherokee country in Georgia,
    Tennessee, North Carolina, and Alabama. Families were rousted from meals, from fields, from sickbeds. They were marched to stockade camps — thirteen in all — where they were held through the summer.
    Drought, contaminated water, and dysentery killed hundreds in the camps before the march began. Elders, children, and pregnant women were confined in open-air pens in July heat.


    The main removal detachments — thirteen groups averaging 1,000 people each — departed between August 1838 and March 1839. They traveled 800 to 1,200 miles along multiple routes through Tennessee, Kentucky,
    Illinois, Missouri, and Arkansas. The winter of 1838-1839 was brutal. Rivers froze; the Mississippi crossing at Cape Girardeau was delayed for weeks by ice. Food rations were inadequate. Blankets were
    insufficient. Measles, whooping cough, and pneumonia swept through the columns. Women gave birth on the march with no shelter and no medical assistance. Quatie Ross, wife of Principal Chief John Ross,
    gave her blanket to a sick child during a river crossing and died of pneumonia near Little Rock, Arkansas. An estimated 4,000 Cherokee died — in the camps, on the march, or in the first months after
    arrival in Indian Territory.


    The Cherokee word is "Nunna daul Tsuny" — the Trail Where They Cried. Survivors rebuilt in Indian Territory. The Cherokee Nation reconstituted its government at Tahlequah (present-day Oklahoma) in 1839.
    But the trauma did not end with arrival. The internal division between the Treaty Party and the Ross Party produced a decade of political violence. And the land promised "as long as the grass grows
    and the water runs" was reduced again and again — by the Curtis Act of 1898, by Oklahoma statehood in 1907, by allotment policies that transferred communal land to individual title and then to white
    purchasers.

    '
  key_arguments:
  - The Cherokee met every standard of 'civilization' demanded by the United States and were removed regardless
  - Worcester v. Georgia gave the Cherokee an unambiguous legal victory that the executive branch refused to enforce
  - The Treaty of New Echota was signed by an unrepresentative faction and protested by 15,964 Cherokee
  - Approximately 4,000 Cherokee — one in four — died during the removal
