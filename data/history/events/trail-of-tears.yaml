connections:
- target_slug: transatlantic-slave-trade
  connection_type: parallel
  description: Both operated within the same economic system — cotton slavery and indigenous dispossession were intertwined, as removed Native lands were converted to slave plantations across the Deep South
- target_slug: scramble-for-africa
  connection_type: parallel
  description: Both involved the seizure of indigenous lands by colonial powers using legal instruments (treaties, acts of Congress, Berlin Conference) that indigenous peoples had no meaningful power to
    refuse
