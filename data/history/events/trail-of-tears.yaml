  description: Map showing the multiple routes taken during the forced removal of the Five Civilized Tribes from the southeastern United States to Indian Territory (present-day Oklahoma), 1830-1838.
  source_url: https://commons.wikimedia.org/wiki/File:Trail_of_Tears_en.png
  attribution: Nikater, public domain via Wikimedia Commons
  license: public-domain
  creator: Nikater
  creation_date: '2007'
- media_type: painting
  title: The Trail of Tears by Robert Lindneux
  description: 1942 oil painting depicting the Cherokee removal of 1838. Shows Cherokee families with horses and wagons moving westward under military escort in winter conditions. Housed at the Woolaroc
    Museum, Bartlesville, Oklahoma.
  source_url: https://commons.wikimedia.org/wiki/File:Trail_of_Tears.jpg
  attribution: Robert Lindneux, 1942, public domain
  license: public-domain
  creator: Robert Lindneux
  creation_date: '1942'
- media_type: photograph
  title: John Ross, Principal Chief of the Cherokee Nation
  description: Daguerreotype of John Ross, who served as Principal Chief of the Cherokee from 1828 to 1866. Ross led the legal and diplomatic campaign against removal for two decades, gathering 15,964 Cherokee
    signatures protesting the Treaty of New Echota.
  source_url: https://commons.wikimedia.org/wiki/File:John_Ross_(Cherokee_chief).jpg
  attribution: Public domain, National Archives
  license: public-domain
  creator: Unknown
  creation_date: c. 1845
