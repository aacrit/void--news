  - viewpoint: "African Continental"
    viewpoint_type: indigenous
    region_origin: africa
    narrative: |
      The slave trade's impact on Africa extended far beyond the 12.5 million people taken. For every person who boarded a slave ship, an estimated one to five additional people died in the capture raids, forced marches to the coast, and holding pens (barracoons) where captives awaited sale. The trade's demographic impact on West and Central Africa was catastrophic: between 1500 and 1850, Africa's population stagnated while every other continent's grew. Nathan Nunn's quantitative analysis, published in the Quarterly Journal of Economics (2008), estimated that the slave trade cost Africa between 72% and 112% of its potential population growth — a deficit from which the continent has never recovered.

      The trade transformed African political systems. Kingdoms that raided for slaves — Dahomey, Asante, Oyo — grew powerful through the exchange of captives for European firearms, which they used to capture more people, in a cycle that militarized the entire region. The Kingdom of Dahomey conducted annual slave raids (called "customs") that were simultaneously religious rituals and commercial operations. King Agaja of Dahomey raided the coastal Whydah kingdom in 1727, capturing an estimated 10,000 people for sale to European traders. The European demand for slaves did not create warfare in Africa, but it massively incentivized it: wars that might have ended in tribute or territorial adjustment instead produced captives for sale.

      The view from the African continent is not monolithic. Some African rulers participated in and profited from the trade; others resisted it. Queen Nzinga of Ndongo and Matamba (in present-day Angola) fought Portuguese slave traders for nearly 40 years (1624-1663), forming alliances with the Dutch, welcoming escaped enslaved people into her kingdom, and using military force and diplomacy to resist the Portuguese advance. Nzinga was not fighting against slavery as an institution — slavery existed in many African societies — but against the European trade that was devastating her population and threatening her sovereignty.

      The Kingdom of Kongo provides a case study in the trade's corrosive effects. King Afonso I (Mvemba a Nzinga), who converted to Christianity and established diplomatic relations with Portugal, wrote to King Joao III in 1526: "Each day the traders are kidnapping our people — children of this country, sons of our nobles and vassals, even people of our own family... This corruption and depravity are so widespread that our land is entirely depopulated." Afonso's letters — among the earliest written African accounts of the trade — document a ruler watching his kingdom consumed by a commerce he could not control.

      The long-term economic impact is the subject of ongoing research. Joseph Inikori's Africans and the Industrial Revolution in England (2002) argued that the slave trade was a central driver of British industrialization — that cotton processed by enslaved Africans in the American South was the raw material for the textile mills of Lancashire, and that the demand for manufactured goods in the African trade stimulated British industrial production. Nunn and Leonard Wantchekon's study (2011) demonstrated that regions of Africa from which more slaves were taken show lower levels of trust and social cohesion today — a direct statistical link between the slave trade and contemporary institutional weakness. The trade did not merely remove people; it damaged the social fabric of the societies that remained.
    key_arguments:
      - "For every person embarked, 1-5 additional people died in capture, forced marches, and holding"
      - "The trade stagnated Africa's population while every other continent grew"
      - "European demand for slaves militarized African politics and incentivized warfare"
      - "Regions most affected by the slave trade show measurable institutional weakness today"
