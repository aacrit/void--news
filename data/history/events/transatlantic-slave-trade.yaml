perspectives:
  - viewpoint: "European Economic / Mercantilist"
    viewpoint_type: victor
    region_origin: europe
    narrative: |
      The transatlantic slave trade was, for its participants, a commercial enterprise. European merchants, monarchs, and governments treated the trade in enslaved Africans as they treated trade in any commodity: a source of profit to be taxed, regulated, and protected by naval force. The Royal African Company, chartered by Charles II in 1672, held a monopoly on English slave trading until 1698. Its shareholders included the Duke of York (later James II), John Locke, and the philosopher who wrote that "no one can be subjected to the political power of another without his own consent." The contradiction was visible to contemporaries but was resolved — when it was addressed at all — through racial ideology.

      The economic logic was straightforward. Sugar plantations in the Caribbean were among the most profitable enterprises in the world. Barbados, an island of 166 square miles, was worth more to the British Crown in the 1660s than all of New England. Jamaica, seized from Spain in 1655, became the largest sugar producer in the British Caribbean. The labor was lethal — sugar cultivation involved burning cane fields, grinding cane in industrial mills, and boiling juice in scalding temperatures — and the mortality rate among enslaved workers on Caribbean sugar plantations often exceeded the birth rate. The trade in enslaved people was, in economic terms, a supply chain: African labor was the input that made Caribbean sugar profitable, and Caribbean sugar was the commodity that made European empire profitable.

      Liverpool became the capital of the British slave trade by the mid-18th century. Between 1699 and 1807, Liverpool ships transported an estimated 1.5 million enslaved Africans. The city's prosperity was built on the trade: its docks, banks, insurance companies, and merchant houses owed their existence to the triangular commerce. James Penny, a Liverpool slave ship captain, testified before Parliament in 1789 that the trade was conducted humanely and that enslaved Africans were well treated — testimony that abolitionists contradicted with detailed evidence of mortality rates, torture, and the conditions of the Middle Passage.

      The pro-slavery economic argument held that abolition would destroy the Caribbean economy, impoverish Britain, and hand competitive advantage to France and other rivals. Planters and merchants formed the West India Interest, a parliamentary lobby that successfully blocked abolition bills for nearly two decades. Edward Long's History of Jamaica (1774) provided the ideological framework: Africans were, in Long's formulation, a separate and inferior species, naturally suited to slave labor. This pseudo-scientific racism — which would be elaborated through the 19th century into the "scientific racism" of polygenism and Social Darwinism — was not a preexisting belief that caused the slave trade; it was a belief system manufactured to justify a trade that already existed.

      The economic case for slavery collapsed before the moral case was won. Adam Smith argued in The Wealth of Nations (1776) that slave labor was more expensive than free labor because enslaved workers had no incentive to be productive and their owners bore the costs of purchase, maintenance, and enforcement. By the early 19th century, the economic viability of Caribbean sugar was declining relative to other investments. Eric Williams, in Capitalism and Slavery (1944), argued that British abolition occurred not despite the decline of the sugar economy but because of it — that moral sentiment aligned with economic interest. This thesis remains debated; Seymour Drescher's Econocide (1977) argued that the slave trade was still profitable when Britain abolished it, making abolition a genuine act of moral politics. The truth lies between the two: economic change created the conditions in which moral argument could prevail.
    key_arguments:
      - "The slave trade was treated as a commercial enterprise governed by the same logic as any commodity trade"
      - "Caribbean sugar plantations were among the most profitable enterprises in the 18th-century world"
      - "Racial ideology was manufactured to justify a trade that already existed, not the other way around"
      - "The debate over whether abolition was driven by morality or economics remains unresolved"
