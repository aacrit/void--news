summary: |
  Between approximately 1500 and 1870, European ships transported an estimated 12.5 million enslaved Africans across the Atlantic Ocean to the Americas. The Trans-Atlantic Slave Trade Database, compiled by David Eltis and David Richardson at Emory University, has documented 36,000 individual voyages. Of the 12.5 million who embarked, approximately 10.7 million survived the crossing — the Middle Passage. The remaining 1.8 million died at sea of disease, dehydration, suicide, and violence.

  The trade operated as a triangular system. European ships carried manufactured goods — textiles, firearms, iron, alcohol — to the West African coast. These goods were exchanged for enslaved captives, who had been captured in wars, raids, or through judicial processes, often by African intermediaries. The ships then crossed the Atlantic — a voyage of 6 to 10 weeks — with human beings packed into holds designed for cargo. Olaudah Equiano, who was enslaved as a child in present-day Nigeria, described the hold: "The closeness of the place, and the heat of the climate, added to the number in the ship, which was so crowded that each had scarcely room to turn himself, almost suffocated us." In the Americas, the enslaved were sold and put to work on sugar, tobacco, cotton, coffee, and rice plantations. The ships returned to Europe with plantation products.

  Portugal dominated the early trade, transporting enslaved Africans to Brazil beginning in the 1530s. Brazil received more enslaved people than any other destination — approximately 4.9 million, or 46% of the total. The Caribbean absorbed roughly 4.1 million. Mainland North America received approximately 389,000 — a small fraction of the total but the population that, through natural increase, grew to nearly 4 million by 1860. Britain became the dominant slaving nation in the 18th century, with Liverpool, Bristol, and London as the principal ports. At the peak of the trade in the 1780s, British ships transported approximately 40,000 enslaved Africans per year.

  The trade's brutality was systematic, not incidental. The Zong massacre of 1781 exemplified its logic: the captain of the slave ship Zong, running low on water, ordered 133 enslaved Africans thrown overboard alive so that the loss could be claimed on insurance (enslaved people who died of illness were not insured; those lost at sea through "jettison" were). The insurance case reached the courts; the question litigated was not murder but whether the insurers were liable for the cargo. Lord Mansfield ruled for the underwriters.

  The abolition movement emerged in the late 18th century, driven by Quaker activists, evangelical Christians, former enslaved people, and Enlightenment thinkers. William Wilberforce introduced his first abolition bill in Parliament in 1789; it failed. Britain abolished the slave trade (not slavery itself) in 1807 after Wilberforce's campaign succeeded on a vote of 283 to 16 in the House of Commons. The Royal Navy's West Africa Squadron subsequently intercepted slave ships and freed approximately 150,000 enslaved people between 1808 and 1860. Slavery itself was abolished in the British Empire in 1833, in the French colonies in 1848, in the United States in 1865 (Thirteenth Amendment), and in Brazil — the last country in the Americas — in 1888.

significance: |
  The transatlantic slave trade was the largest forced migration in human history and the foundation of the modern Atlantic economy. Sugar, cotton, and tobacco produced by enslaved labor generated the capital that financed the Industrial Revolution — Eric Williams's "Capitalism and Slavery" thesis (1944) argued that slave trade profits directly funded Britain's industrial takeoff. The trade depopulated and destabilized entire regions of Africa, contributing to centuries of political fragmentation and economic underdevelopment. In the Americas, it created the racial hierarchies that define the social structures of Brazil, the United States, the Caribbean, and beyond. The abolition movement produced the first international human rights campaign and the legal framework that evolved into modern human rights law. The trade's legacy — racial inequality, economic disparity, cultural displacement, and the ongoing restitution debate — remains a central axis of global politics.

