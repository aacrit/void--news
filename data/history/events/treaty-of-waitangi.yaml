legacy_points:
- Two versions of the same treaty say different things — 'sovereignty' (English) vs. 'governance' (Maori) — a textual divergence still unresolved after 186 years
- 3.4 million acres of Maori land confiscated under the New Zealand Settlements Act of 1863
- The Waitangi Tribunal (est. 1975) has produced over 100 reports on Crown breaches — the most developed Indigenous treaty jurisprudence in the world
- Maori parliamentary seats established in 1867 — four years before any other British colony granted Indigenous parliamentary representation
- Treaty settlements since 1992 have transferred over NZ$2.24 billion in assets and formal Crown apologies
