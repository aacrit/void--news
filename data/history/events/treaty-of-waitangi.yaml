perspectives:
- viewpoint: Maori Chiefs / Iwi
  viewpoint_type: indigenous
  region_origin: oceania
  narrative: 'The chiefs who gathered at Waitangi on February 6, 1840 were not illiterate tribesmen overawed by European power. Many had extensive experience with Europeans. The Bay of Islands had been
    a trading center for decades — whaling ships, timber merchants, missionaries. Several chiefs, including Hone Heke and Tamati Waka Nene, were literate in both Te Reo Maori and English. Hongi Hika had
    traveled to England in 1820 and met King George IV. The chiefs understood what a treaty was. What they did not understand — because the Maori text did not say it — was that they were ceding sovereignty.


    The debate at Waitangi lasted five hours. Te Kemara of Ngapuhi spoke first and rejected the treaty outright: "I am not willing to consent to the proposal of the governor. We are not thy people. We are
    free." Rewa of Ngapuhi warned that "the Maori and the Pakeha cannot live together." Tamati Waka Nene argued for signing: "Do not go away from us, return to us." The speeches reveal a sophisticated political
    calculus. Chiefs who supported the treaty wanted British authority over British settlers — the whalers, traders, and convicts whose lawlessness had destabilized the Bay of Islands. They were granting
    a governor authority over his own people, not surrendering authority over theirs.


    The Maori text supports this reading. Henry Williams translated the English word "sovereignty" not as "mana" (which any Maori speaker would have understood as supreme authority) but as "kawanatanga"
    — a neologism derived from the English word "governor." Chiefs who signed te Tiriti ceded governance — administrative authority — while Article 2 guaranteed them "te tino rangatiratanga," full chieftainship,
    over their lands, villages, and taonga (treasured possessions, a term whose scope encompasses language, culture, waterways, and sacred sites). The two articles, read together in the Maori text, describe
    a power-sharing arrangement, not a surrender. Nopera Panakareao, signing at Kaitaia in April 1840, articulated it precisely: "The shadow of the land will go to the Queen, but the substance will remain
    with us."


    Hone Heke''s four cuttings of the flagpole at Kororareka (1844-1845) were the physical enactment of this reading. The flagpole represented British sovereignty — mana, not kawanatanga. Heke did not reject
    the treaty; he rejected the British interpretation of the treaty. He had been among the first to sign, and he continued to assert that his signature granted governance, not sovereignty. The flagpole
    was the visible symbol of the claim he denied. He destroyed it with an axe, four times, because the British kept rebuilding it — each reconstruction asserting the claim, each cutting rejecting it.


    The New Zealand Wars that followed (1845-1872) were fought by iwi who shared Heke''s reading. The Kingitanga (King Movement), established in 1858, elected Potatau Te Wherowhero as the first Maori King
    — a pan-tribal political authority designed to match the Crown''s claim with a Maori equivalent. The Crown treated the Kingitanga as rebellion. The 1863 invasion of the Waikato and the confiscation
    of 1.2 million acres of Kingitanga land confirmed what Maori leaders had feared: "governance" was a word the Crown used when it was weak, and "sovereignty" was the word it enacted when it was strong.

    '
  key_arguments:
  - The Maori text of the treaty does not cede sovereignty — it cedes 'kawanatanga' (governance), a lesser authority
  - Chiefs intended to grant the Crown authority over British settlers, not over Maori people or Maori land
  - Hone Heke's flagpole cuttings were acts of treaty interpretation, not rebellion — he rejected British sovereignty, not the treaty itself
  - The Kingitanga (King Movement) was a political response to the Crown's unilateral expansion of treaty authority
