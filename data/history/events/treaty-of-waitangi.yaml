connections:
- target_slug: trail-of-tears
  connection_type: parallel
  description: Both involved the systematic dispossession of Indigenous peoples through legal instruments — the Indian Removal Act (1830) and the New Zealand Settlements Act (1863) — backed by military
    force
- target_slug: scramble-for-africa
  connection_type: parallel
  description: New Zealand was annexed during the same era of European colonial expansion — the treaty was one mechanism among many for imposing European sovereignty on non-European peoples
- target_slug: opium-wars
  connection_type: parallel
  description: Both demonstrate how unequal treaties imposed by European powers restructured sovereignty in non-European societies — China through gunboat diplomacy, New Zealand through mistranslation
