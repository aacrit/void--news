summary: 'On the morning of February 6, 1840, approximately 500 Maori chiefs gathered at the house of the British Resident, James Busby, at Waitangi in the Bay of Islands. Captain William Hobson, representing
  the British Crown, presented a document that he said would protect Maori rights while establishing British authority over New Zealand. The missionary Henry Williams and his son Edward translated the text
  into Te Reo Maori overnight. By the end of the day, 43 chiefs had signed. Over the following months, the treaty was carried around the country; eventually, over 500 chiefs signed. Some refused. Some were
  never asked.


  The two versions of the treaty say different things. Article 1 in the English text cedes to the Crown "all the rights and powers of Sovereignty." Article 1 in the Maori text cedes "te kawanatanga katoa"
  — governance, not sovereignty. The distinction is not semantic. In Te Reo Maori, the word for sovereignty — "mana" — exists and was not used. Instead, Williams chose "kawanatanga," a transliteration of
  "governorship," a word that implied administrative authority without the transfer of supreme power. Article 2 in the English text guarantees Maori "full exclusive and undisturbed possession of their Lands
  and Estates." Article 2 in the Maori text guarantees "te tino rangatiratanga" — the full chieftainship — over their lands, forests, fisheries, and other treasures ("taonga"). Rangatiratanga implies not
  just property rights but political autonomy. The Maori chiefs who signed believed they were granting a governor the right to control British settlers while retaining their own authority over their people
  and lands. The British believed they had acquired sovereignty over the entire territory.


  Hone Heke, a Ngapuhi chief who had been among the first to sign, was the first to declare the treaty broken. In July 1844, he cut down the British flagpole at Kororareka (now Russell). The British re-erected
  it. Heke cut it down again. They raised it a third time, encased in iron and protected by a blockhouse. Heke cut it down a fourth time on March 11, 1845, while his ally Kawiti attacked the town. The symbolism
  was exact: the flagpole represented British sovereignty over Maori land, and Heke rejected it with an axe. The Northern War that followed — the first of the New Zealand Wars — lasted until 1846 and ended
  inconclusively. Heke was never captured, never surrendered, and never accepted that the treaty transferred sovereignty.


  The wars continued, with intervals, for three decades. The Waikato War (1863-1864), the largest, saw 12,000 British troops invade the Waikato region and confiscate 1.2 million acres of Maori land. The
  Taranaki Wars (1860-1861, 1863-1866) centered on disputed land sales. The East Coast campaigns against Te Kooti Arikirangi Te Turuki lasted until 1872. By the end, the Crown had confiscated approximately
  3.4 million acres of Maori land under the New Zealand Settlements Act of 1863 — legislation that allowed the government to seize the land of any tribe deemed to be "in rebellion." The act made no distinction
  between combatants and non-combatants, between tribes that had fought and tribes that had merely lived in the wrong district.

  '
significance: 'The Treaty of Waitangi is the founding document of New Zealand, invoked by both Maori and Pakeha (European New Zealanders) to make competing claims about the country''s constitutional identity.
  The Waitangi Tribunal, established in 1975 and given retrospective jurisdiction to 1840 in 1985, has issued over 100 reports examining Crown breaches of the treaty. Treaty settlements since 1992 have
  transferred over NZ$2.24 billion in assets and apologies to iwi (tribes). The treaty''s two-text divergence — sovereignty vs. governance, property vs. chieftainship — remains unresolved and shapes every
  major debate about Maori rights, land, water, fisheries, and political representation in contemporary New Zealand. The Maori seats in Parliament, established in 1867 (four years before any British colony
  granted Indigenous parliamentary representation), and the Treaty Principles enacted in legislation since 1986 have made New Zealand''s Indigenous-settler constitutional relationship the most juridically
  developed in the world.

  '
