  notable_quotes:
  - text: The bombs fell like rain from a cloudless sky. We could not see the planes. We did not know why they were bombing
      us. We had done nothing.
    speaker: Anonymous Laotian farmer
    context: Fred Branfman, Voices from the Plain of Jars (1972)
