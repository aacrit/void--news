- viewpoint: Anti-War / Pentagon Papers
  viewpoint_type: revisionist
  region_origin: north-america
  narrative: 'Daniel Ellsberg had believed in the war. He had a PhD from Harvard, a position at the RAND Corporation, and two
    years in Vietnam as a State Department civilian, carrying an M-16 on combat patrols in the Mekong Delta. In 1967, McNamara
    commissioned a secret history of U.S. involvement in Vietnam from 1945 to 1967 — a study that would run to 47 volumes
    and 7,000 pages. Ellsberg was one of the researchers. What he read changed him. The study documented a pattern that spanned
    four administrations: each president knew the war could not be won, each escalated anyway, and each lied to Congress and
    the public about the reasons for escalation. The motive was not victory. It was avoiding the domestic political cost of
    defeat.


    On the night of October 1, 1969, Ellsberg began photocopying the study with the help of his colleague Anthony Russo and
    Russo''s friend, who had a Xerox machine. It took months. On June 13, 1971, the New York Times began publishing excerpts.
    The Nixon administration obtained a federal injunction — the first prior restraint in American press history. The Times
    stopped. The Washington Post started. The case reached the Supreme Court in 15 days. On June 30, in New York Times Co.
    v. United States, the Court ruled 6-3 that the government had not met the burden for prior restraint. Justice Hugo Black
    wrote: "Only a free and unrestrained press can effectively expose deception in government."


    McNamara''s own reckoning came two decades later. "In Retrospect: The Tragedy and Lessons of Vietnam" (1995) admitted what
    the Pentagon Papers had already proved: "We were wrong, terribly wrong. We owe it to future generations to explain why."
    He listed eleven major causes of failure, including "our profound ignorance of the history, culture, and politics of the
    people in the area, and the personalities and habits of their leaders." He had been Secretary of Defense for seven years.
    He had sent 58,220 men to their deaths. The book was received with fury. A reviewer in the New York Times wrote: "His
    regret cannot be large enough to balance the books."


    The My Lai massacre was buried for a year. Charlie Company''s commanding officer, Captain Ernest Medina, reported 128 enemy
    killed in action and no civilian casualties. The Army awarded itself a commendation. A helicopter door gunner named Ronald
    Ridenhour — who had not been at My Lai but heard accounts from participants — wrote letters to 30 members of Congress,
    the Pentagon, and the White House in March 1969. One congressman, Morris Udall, forwarded the letter to the Army. Seymour
    Hersh, a freelance journalist, tracked down Lieutenant Calley and published the story through the Dispatch News Service
    on November 12, 1969, after Life, Look, and the major networks declined it. Ron Haeberle''s photographs — a ditch full
    of bodies, a woman shielding her child — appeared in the Cleveland Plain Dealer. Of 26 soldiers charged, one was convicted.
    Calley received a life sentence, which Nixon reduced to house arrest. He served three and a half years.


    The anti-war movement brought 500,000 people to the National Mall on November 15, 1969, for the Moratorium to End the War
    in Vietnam — the largest political demonstration in American history at that time. On May 4, 1970, four days after Nixon
    announced the invasion of Cambodia, Ohio National Guard troops fired 67 rounds in 13 seconds at Kent State University,
    killing four students and wounding nine. Allison Krause, age 19, had placed a flower in a guardsman''s rifle barrel the
    day before. She was shot through the chest. Within a week, 4 million students at 450 universities went on strike, shutting
    down campuses across the country.

    '
  key_arguments:
  - The Pentagon Papers proved that four consecutive administrations knew the war was unwinnable and continued for domestic political
    reasons
  - My Lai was not an aberration — the Army covered it up for a year and only one soldier was convicted
  - The anti-war movement was the largest domestic opposition to a war in American history
  - McNamara's late admission — 'we were wrong, terribly wrong' — came twenty years too late for the 58,220 dead
