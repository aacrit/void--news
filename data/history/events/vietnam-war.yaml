perspectives:
- viewpoint: American Cold War / Containment
  viewpoint_type: vanquished
  region_origin: north-america
  narrative: 'The logic was clean on a whiteboard. If South Vietnam fell to communism, Laos and Cambodia would follow, then
    Thailand, then Malaysia, then Indonesia — dominoes toppling across Asia until the Pacific was a communist lake. Eisenhower
    articulated the theory at a press conference on April 7, 1954. Kennedy inherited it. His advisors — McGeorge Bundy, Walt
    Rostow, Robert McNamara — were the "best and brightest," systems analysts who believed in quantifiable warfare. McNamara
    had run Ford Motor Company; he would run the war the same way. Body counts, kill ratios, hamlets pacified — the metrics
    of progress that measured everything except whether the war was being won.


    The Strategic Hamlet Program (1962-1963), designed by British counterinsurgency advisor Sir Robert Thompson and implemented
    by Ngo Dinh Diem''s government, forcibly relocated South Vietnamese peasants into fortified villages to separate them from
    Viet Cong guerrillas. By October 1963, the Diem government reported 8,600 hamlets completed, housing 8.7 million of South
    Vietnam''s 14 million people. The numbers were fabricated. Many hamlets existed only on paper. Those that existed were resented
    by the villagers who had been uprooted from ancestral lands and rice paddies. The program collapsed with the CIA-backed
    coup that overthrew and killed Diem on November 1, 1963. Between 1963 and 1967, South Vietnam had ten changes of government.


    The Gulf of Tonkin Resolution (August 7, 1964) passed the Senate 88-2 — only Wayne Morse of Oregon and Ernest Gruening
    of Alaska voted no. Morse told the Senate: "I believe that history will record that we have made a great mistake." The
    resolution gave Johnson legal authority to deploy combat troops without a declaration of war. By March 1965, Marines landed
    at Da Nang. By December, 184,000 American troops were in Vietnam. By April 1969, the number reached 549,500. The draft
    sent 2.2 million men to Vietnam; 648,500 were draftees, disproportionately poor, disproportionately Black. A Harvard
    study found that men from the poorest neighborhoods served in combat at twice the rate of men from the wealthiest.


    Michael Lind''s "Vietnam: The Necessary War" (1999) argues the containment framework was rational — that abandoning South
    Vietnam would have weakened the credibility of American alliance commitments in Asia and Europe. Lind contends the war
    was winnable but was lost because of domestic political failures: the gradual escalation strategy, the refusal to invade
    North Vietnam, the erosion of public support. The counterargument, advanced by George Herring in "America''s Longest War"
    (1979), is that no amount of firepower could substitute for the political legitimacy that the South Vietnamese government
    never possessed. The Saigon regime required American troops to survive; the Hanoi regime required American troops to leave.
    One of those requirements was sustainable. The other was not.


    The Veterans'' Wall — Maya Lin''s 246-foot chevron of black granite, sunk below ground level on the National Mall —
    lists 58,220 names in chronological order of death. Lin was a 21-year-old Yale architecture student when she won the design
    competition. Her submission was selected from 1,421 entries. Veterans groups initially attacked the design as a "black
    gash of shame." It is now the most visited memorial in Washington. The names begin with Dale Buis and Chester Ovnand, killed
    by Viet Cong guerrillas on July 8, 1959, and end with Richard Vandegeer, killed in the Mayaguez incident on May 15, 1975.

    '
  key_arguments:
  - The domino theory provided a rational strategic framework — containment of communism was a global imperative, not a paranoid
    fantasy
  - The war was winnable but was undermined by gradual escalation, political constraints, and eroding domestic support
  - The Gulf of Tonkin Resolution enjoyed near-unanimous congressional support — this was not one man's war
  - The cost in American lives (58,220 dead, 153,303 wounded, 1,584 missing) demands that the sacrifice be understood within
    its Cold War context
