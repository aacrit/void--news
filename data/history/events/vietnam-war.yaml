  notable_quotes:
  - text: 'Create two, three, many Vietnams — that is the watchword.'
    speaker: Che Guevara
    context: Message to the Tricontinental Conference, Havana, April 1967
  - text: In the end, the Americans had to leave. They always leave. We are still here.
    speaker: Vietnamese saying
    context: Commonly attributed, widely cited in Vietnamese oral tradition and postwar accounts
  emphasized:
  - Vietnam as proof that asymmetric warfare can defeat a superpower when backed by political legitimacy
  - The global solidarity network — Soviet, Chinese, Cuban — that sustained North Vietnam
  - The failure of technological superiority against popular resistance
  - The war's influence on anti-colonial movements worldwide
  omitted:
  - The enormous human cost to the Vietnamese people — 3.8 million dead, environmental devastation lasting decades
  - Soviet and Chinese strategic calculations — both supported Vietnam as a way to bleed the United States, not primarily
    out of solidarity
  - The postwar authoritarianism of the unified Vietnamese state — reeducation camps, suppression of dissent, economic collapse
    before Doi Moi reforms (1986)
  - The Vietnamese boat people — 1.6 million fled the victorious government between 1975 and 1995
media:
- media_type: photograph
  title: '"Napalm Girl" — The Terror of War'
  description: 'On June 8, 1972, South Vietnamese planes dropped napalm on the village of Trang Bang, mistaking fleeing civilians
    for combatants. AP photographer Nick Ut captured nine-year-old Phan Thi Kim Phuc running naked down Route 1, her clothes
    burned away, her skin on fire. Ut drove her to a hospital after taking the photograph. The image won the 1973 Pulitzer Prize
    and became the most reproduced photograph of the war. Kim Phuc survived, underwent 17 surgeries, and defected to Canada
    in 1992.'
  source_url: https://commons.wikimedia.org/wiki/File:TrangBang.jpg
  attribution: Nick Ut / AP, 1972. Widely reproduced; technically AP copyright. Wikimedia Commons reproduction under fair use
    for educational/historical purposes.
  license: fair-use
  creator: Nick Ut (Huynh Cong Ut)
  creation_date: June 8, 1972
- media_type: photograph
  title: Evacuation of Saigon — the last helicopter
  description: 'On April 29, 1975, a CIA Air America Huey helicopter sits on the roof of 22 Gia Long Street (often misidentified
    as the U.S. Embassy) as evacuees climb a ladder during Operation Frequent Wind. Over 18 hours, 81 helicopters evacuated
    approximately 7,000 people from Saigon. The following morning, a North Vietnamese T-54 tank crashed through the gates of
    the Presidential Palace. The war was over.'
  source_url: https://commons.wikimedia.org/wiki/File:Saigon-hubert-van-es.jpg
  attribution: Hubert van Es / UPI, 1975. Public domain via Wikimedia Commons.
  license: public-domain
  creator: Hubert van Es
  creation_date: April 29, 1975
- media_type: map
  title: Ho Chi Minh Trail and U.S. bombing zones in Indochina
  description: Map showing the Ho Chi Minh Trail supply network running from North Vietnam through eastern Laos and Cambodia
    into South Vietnam, overlaid with U.S. bombing zones. The trail was not a single road but a network of paths, roads, bridges,
    and river crossings stretching approximately 16,000 kilometers, maintained by 300,000 workers and defended by anti-aircraft
    units. The United States dropped more bombs on the trail in Laos than on all of Germany in World War II.
  source_url: https://commons.wikimedia.org/wiki/File:HoChiMinhTrail.png
  attribution: Wikimedia Commons, public domain (U.S. government source)
  license: public-domain
  creator: U.S. government / Wikimedia contributors
  creation_date: Various
- media_type: document
  title: The Pentagon Papers (United States-Vietnam Relations, 1945-1967)
  description: 'A 7,000-page, 47-volume classified study commissioned by Secretary of Defense Robert McNamara in 1967, documenting
    the history of U.S. political and military involvement in Vietnam from 1945 to 1967. Leaked by Daniel Ellsberg to the New
    York Times in June 1971. The study revealed that the Truman, Eisenhower, Kennedy, and Johnson administrations had systematically
    misled Congress and the public about the war''s scope, its prospects, and the reasons for escalation. The Supreme Court ruled
    6-3 in New York Times Co. v. United States (1971) that the government could not prevent publication.'
  source_url: https://www.archives.gov/research/pentagon-papers
  attribution: National Archives and Records Administration (NARA)
  license: public-domain
  creator: Office of the Secretary of Defense
  creation_date: 1967-1969
