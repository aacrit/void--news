legacy_points:
- The Pentagon Papers (1971) revealed that the U.S. government knew by 1967 it could not win the war and continued fighting
  for domestic political reasons — four consecutive presidents lied to Congress and the public
- Agent Orange contamination persists in Vietnamese soil in 2026; the Vietnamese Red Cross estimated 150,000 children born
  with dioxin-related birth defects; the U.S. government did not acknowledge responsibility until 2012
- The secret bombing of Cambodia (1969-1970) destabilized the Sihanouk government and empowered the Khmer Rouge, leading to
  the Cambodian genocide that killed 1.5-2 million people
- '"Vietnam syndrome" constrained U.S. foreign policy for two decades — the 1973 War Powers Act required congressional authorization
  for sustained military deployments, though subsequent presidents circumvented it'
- Between 1975 and 1995, an estimated 1.6 million Vietnamese fled by boat; 200,000-400,000 died at sea from drowning, starvation,
  and piracy
- 'Reunification came on April 30, 1975, when a North Vietnamese T-54 tank crashed through the gates of the Presidential Palace
  in Saigon — the city was renamed Ho Chi Minh City, though many residents still call it Saigon'
