- viewpoint: Vietnamese Revolutionary / Anti-Colonial
  viewpoint_type: victor
  region_origin: southeast-asia
  narrative: 'Ho Chi Minh had been everywhere. He washed dishes at the Carlton Hotel in London in 1913. He lived in Paris from
    1917 to 1923, where he petitioned the Versailles Peace Conference for Vietnamese self-determination — he rented a morning
    suit to deliver the petition — and joined the French Communist Party when it was the only political movement that endorsed
    colonial independence. He studied in Moscow, organized in Canton, traveled through Thailand disguised as a Buddhist monk,
    and founded the Viet Minh in a limestone cave in Pac Bo in May 1941. By the time he quoted Jefferson on September 2, 1945,
    he had spent thirty years building a revolution from nothing.


    The letters to Truman went unanswered. Eight letters between October 1945 and February 1946. Ho requested that the United
    States recognize Vietnamese independence and serve as a trustee for the transition from colonial rule, citing the Atlantic
    Charter and Roosevelt''s stated commitment to self-determination. The State Department filed them. France returned to
    Indochina with British assistance — British troops, including units of the defeated Japanese army, helped France reoccupy
    Saigon in September 1945. The First Indochina War lasted eight years. It ended at Dien Bien Phu.


    General Vo Nguyen Giap — a former history teacher whose wife died in a French colonial prison in 1941 and whose sister-in-law
    was guillotined — had studied Napoleon''s campaigns and T.E. Lawrence''s guerrilla tactics. At Dien Bien Phu, he did what
    the French considered impossible: he dragged artillery pieces up mountainsides by hand, using tens of thousands of porters
    who carried supplies on modified bicycles along jungle paths. The siege lasted 56 days. On May 7, 1954, 16,000 French
    soldiers surrendered — the largest colonial military defeat since the Battle of Adwa in 1896, when Ethiopia routed Italy.


    The Geneva Accords of 1954 promised reunification elections within two years. The United States, which had funded 80 percent
    of France''s war costs by 1954, refused to sign the Accords and installed Ngo Dinh Diem in Saigon. Diem canceled the
    elections. Eisenhower explained why in his memoirs: "I have never talked or corresponded with a person knowledgeable in
    Indochinese affairs who did not agree that had elections been held as of the time of the fighting, possibly 80 percent
    of the population would have voted for the Communist Ho Chi Minh." The war that followed was, in Vietnamese framing, not
    a civil war but a continuation of the same anti-colonial struggle — the Americans replacing the French, who had replaced
    the Japanese.


    Nguyen Van Troi was twenty-four years old when he attempted to assassinate McNamara during his visit to Saigon in May
    1963. The bomb was discovered before detonation. Troi was captured, tried by a South Vietnamese military court, and executed
    by firing squad on October 15, 1964. Blindfolded, he refused the hood and shouted "Long live Vietnam!" as the shots were
    fired. Streets, schools, and bridges across Vietnam bear his name. The Cu Chi tunnels — 250 kilometers of underground
    passages dug by hand beneath the American base at Cu Chi — housed hospitals, kitchens, sleeping quarters, and command posts.
    Guerrillas emerged at night to fight, then disappeared underground by morning. The U.S. Army sent "tunnel rats" — soldiers
    small enough to crawl through with pistols and flashlights — but never controlled the network.

    '
  key_arguments:
  - The war was the third phase of a continuous anti-colonial struggle — France (1946-1954), Japan (1940-1945), America (1955-1975)
    — not a Cold War proxy conflict
  - Ho Chi Minh quoted Jefferson and petitioned Truman — the Vietnamese sought American partnership before they sought Soviet
    arms
  - The Geneva Accords of 1954 promised elections that the United States prevented because Ho Chi Minh would have won
  - Military victory was achieved through political will and popular legitimacy, not conventional firepower
