- viewpoint: Laotian and Cambodian / Spillover
  viewpoint_type: vanquished
  region_origin: southeast-asia
  narrative: 'Laos was not at war with the United States. Neither was Cambodia. The bombs came anyway.


    Between 1964 and 1973, the United States flew 580,000 bombing missions over Laos — an average of one mission every eight
    minutes for nine years. They dropped 2 million tons of ordnance, more than all Allied bombs in Europe and the Pacific
    combined during World War II, on a country roughly the size of Utah with a population of 3 million. The operation was
    classified. Congress did not authorize it. The State Department did not acknowledge it. The CIA ran the air war through
    Air America, a proprietary airline, and trained a secret army of 30,000 Hmong highlanders under General Vang Pao to fight
    a ground war against the Pathet Lao and North Vietnamese forces using the Ho Chi Minh Trail.


    The Hmong paid the heaviest price. Recruited by CIA case officer Jerry Daniels and others beginning in 1961, Hmong soldiers
    — some as young as thirteen — fought for a decade as American proxies. An estimated 30,000 Hmong soldiers were killed. When
    the United States withdrew in 1975, it evacuated a fraction of its Hmong allies. Vang Pao and 2,500 Hmong were airlifted
    to Thailand. The rest were left behind. The Pathet Lao government targeted the Hmong as collaborators. An estimated 100,000
    Hmong fled to refugee camps in Thailand; 130,000 eventually resettled in the United States, primarily in Minnesota, Wisconsin,
    and California''s Central Valley. Thousands died attempting to cross the Mekong River. The Hmong describe this period as
    "the quiet genocide."


    Thirty percent of the bombs dropped on Laos did not explode. Eighty million cluster submunitions — small, tennis-ball-sized
    bomblets designed to shatter into hundreds of steel fragments on impact — remain embedded in Laotian soil. Farmers hit them
    with plows. Children pick them up, mistaking them for toys. Between 1964 and 2023, UXO killed more than 20,000 Laotians
    and injured tens of thousands more. In 2023 alone, 50 people were killed or maimed. Cooperative Orthotic and Prosthetic
    Enterprise (COPE), a nonprofit in Vientiane, fits artificial limbs to bombing survivors — its waiting room is filled with
    children. Laos spends more per capita on UXO clearance than any country on earth. The United States contributed $270 million
    to UXO clearance between 1995 and 2023. The bombs cost $17 billion to drop (in 2023 dollars).


    In Cambodia, Nixon authorized Operation Menu on March 18, 1969 — the secret bombing of Cambodian border areas where the
    North Vietnamese maintained base camps. The operation was concealed from Congress through a dual reporting system: pilots
    logged missions as striking targets in South Vietnam. Between 1969 and 1973, the United States dropped 2.7 million tons
    of bombs on Cambodia, killing an estimated 100,000-150,000 civilians. The bombing radicalized the rural population and
    swelled the ranks of the Khmer Rouge, a marginal insurgency that Sihanouk had contained. When Lon Nol overthrew Sihanouk
    in a U.S.-backed coup in March 1970, the deposed king allied with the Khmer Rouge, lending them the legitimacy they had
    lacked. By April 17, 1975, the Khmer Rouge entered Phnom Penh. The genocide that followed — 1.5 to 2 million dead in
    three years — is inseparable from the American bombing that preceded it.

    '
  key_arguments:
  - Laos and Cambodia were neutral countries that the United States bombed without congressional authorization or public acknowledgment
  - 80 million unexploded cluster submunitions remain in Laotian soil in 2026 — the war has not ended
  - The Hmong were recruited as CIA proxies, then abandoned; their diaspora is a direct consequence of the American secret war
  - The bombing of Cambodia destabilized the country and created the conditions for the Khmer Rouge genocide
