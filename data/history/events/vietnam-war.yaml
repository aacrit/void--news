  emphasized:
  - Laos and Cambodia as sovereign nations bombed without their consent and without congressional authorization
  - The ongoing human cost of unexploded ordnance — 50 years after the bombing stopped
  - The Hmong secret army and the moral debt of abandonment
  - The direct causal line from the Cambodian bombing to the Khmer Rouge genocide
  omitted:
  - North Vietnamese use of Laotian and Cambodian territory for supply routes and base camps
  - The Pathet Lao and Khmer Rouge as indigenous movements with their own agency, not solely American creations
  - Laotian and Cambodian government complicity or tacit acceptance of certain military operations
  - The complexity of Hmong politics — not all Hmong supported Vang Pao
- viewpoint: Postcolonial / Global South
  viewpoint_type: revisionist
  region_origin: global
  narrative: 'In Algiers in 1968, Frantz Fanon''s "The Wretched of the Earth" (1961) sat on the same shelf as Mao''s "On
    Guerrilla Warfare" and Giap''s "People''s War, People''s Army." Students in Cairo, Dakar, and Mexico City followed the
    Tet Offensive on radio the way an earlier generation had followed Dien Bien Phu. The Vietnamese were doing what Fanon
    had theorized and what no one else had managed: defeating the most powerful military on earth with rifles, tunnels, and
    the conviction that the land beneath their feet was worth dying for.


    The arithmetic alone was subversive. The United States spent $168 billion on the war (approximately $1 trillion in 2023
    dollars). It deployed 2.7 million military personnel. It possessed nuclear weapons, B-52 strategic bombers, aircraft
    carriers, helicopter gunships, napalm, and chemical defoliants. North Vietnam''s GDP in 1965 was approximately $2 billion.
    Its air force flew Soviet MiG-17s and MiG-21s — 200 aircraft against 5,000. Its navy consisted of torpedo boats. And yet
    on April 30, 1975, a North Vietnamese T-54 tank — Soviet-designed, Chinese-manufactured — crashed through the iron gates
    of the Presidential Palace in Saigon. The last Americans had left by helicopter from the embassy rooftop the night before.
    The photograph of that helicopter — a Huey on the roof of 22 Gia Long Street, evacuees climbing a ladder — became the
    defining image of imperial overreach.


    Cuba sent military advisors and medical personnel to North Vietnam. The Soviet Union supplied the SA-2 surface-to-air
    missiles that shot down 205 American aircraft, including 15 B-52s during the Linebacker II campaign over Hanoi in December
    1972. China sent 320,000 engineering and anti-aircraft troops between 1965 and 1968 — their presence was not acknowledged
    by either side for decades. The Non-Aligned Movement, founded at Bandung in 1955, consistently condemned American intervention.
    At the 1966 Tricontinental Conference in Havana, Che Guevara called for "two, three, many Vietnams" — armed struggles
    against imperialism across the Third World.


    The lesson the Global South drew was not that guerrilla warfare always works. It was that political legitimacy matters
    more than military technology. The South Vietnamese government, despite American support totaling $24 billion in military
    aid, could not survive without American troops because it lacked popular legitimacy. The Saigon regime was widely perceived
    as a creation of Washington — its presidents installed or removed by the CIA, its army trained and equipped to fight an
    American-style conventional war against an enemy waging a political war for national reunification. When Nixon cut a deal
    in Paris in January 1973, South Vietnam''s fate was sealed. Thieu called it a "surrender agreement." He was right. Saigon
    fell 27 months later.


    Nixon''s "madman theory" — the deliberate cultivation of a reputation for irrational behavior to frighten adversaries into
    concessions — included the implicit threat of nuclear weapons. Kissinger conveyed to the North Vietnamese through back
    channels that Nixon might "do anything" to end the war. In October 1969, Nixon ordered a worldwide nuclear alert — Strategic
    Air Command bombers loaded with nuclear weapons flew toward Soviet airspace for three days. The Vietnamese did not blink.
    They had been fighting continuously since 1941. A French colonial army, a Japanese occupation force, and a second French
    expedition had all failed before the Americans arrived. The Vietnamese calculation was simple: the Americans would leave.
    They always do. The Vietnamese would still be there.

    '
  key_arguments:
  - Vietnam proved that military technology cannot defeat a movement with popular legitimacy — the most powerful army in
    history lost to a nation with a fraction of its GDP
  - The war inspired anti-colonial and anti-imperial movements across the Global South, from Cuba to Algeria to Mozambique
  - South Vietnam fell not because of insufficient American aid ($24 billion in military assistance) but because its government
    lacked domestic legitimacy
  - The madman theory — including implicit nuclear threats — failed because the Vietnamese had been fighting for thirty years
    and would not stop
  sources:
