death_toll: '3.8 million Vietnamese (military and civilian); 58,220 Americans; 250,000-313,000 South Vietnamese military; an estimated 1.1 million North Vietnamese and Viet Cong fighters; 400,000-800,000
  Laotian and Cambodian civilians from spillover bombing and ground operations'
affected_population: Entire population of Indochina — approximately 60 million people across Vietnam, Laos, and Cambodia subjected to bombing, chemical defoliation, forced displacement, or ground combat
  between 1955 and 1975
duration: 20 years (1955-1975); the French Indochina War (1946-1954) preceded it; unexploded ordnance and Agent Orange contamination continue to kill and injure in 2026
summary: 'On August 4, 1964, the destroyer USS Maddox reported a second torpedo attack by North Vietnamese patrol boats in
  the Gulf of Tonkin. President Johnson went on television that evening to announce retaliatory airstrikes. Three days later,
  Congress passed the Gulf of Tonkin Resolution 504-2, authorizing the president to use military force without a declaration
  of war. The first attack, on August 2, was real. The second never happened. NSA documents declassified in 2005 confirmed
  that the signals intelligence had been misread — sonar operators tracked their own ship''s propeller wake. Johnson knew
  within days. He escalated anyway. On a recorded phone call with Secretary of Defense Robert McNamara, Johnson said: "I don''t
  think it''s worth fighting for and I don''t think we can get out." He sent 184,000 troops by December 1965.


  Ho Chi Minh had tried another path. On September 2, 1945 — the day Japan formally surrendered — he stood before half a million
  people in Hanoi and declared Vietnamese independence. He opened by quoting, word for word, Thomas Jefferson: "All men are
  created equal. They are endowed by their Creator with certain inalienable rights; among these are Life, Liberty, and the
  pursuit of Happiness." He had written to President Truman eight times between October 1945 and February 1946, asking for
  American support against French re-colonization. The letters went unanswered. France returned. The Viet Minh fought them
  for eight years and defeated them at Dien Bien Phu on May 7, 1954 — 16,000 French soldiers surrendered in a jungle valley
  that French commanders had declared impregnable. The Geneva Accords of 1954 divided Vietnam at the 17th parallel and promised
  reunification elections within two years. The elections were never held. Eisenhower later wrote that Ho Chi Minh would have
  won 80 percent of the vote.


  The American military applied industrial-scale firepower. Between 1965 and 1975, the United States dropped 7.5 million tons
  of bombs on Indochina — more than twice the total tonnage dropped by all sides in all of World War II. Operation Rolling
  Thunder (1965-1968) flew 304,000 sorties over North Vietnam. B-52s carpet-bombed from 30,000 feet — the crews never saw
  what they hit. On the ground, U.S. troop strength peaked at 549,500 in April 1969. The herbicide Agent Orange — a 50/50
  mixture of 2,4-D and 2,4,5-T contaminated with dioxin TCDD — was sprayed over 4.5 million acres of Vietnamese forest and
  cropland between 1962 and 1971: 20 million gallons from C-123 cargo planes. Three million Vietnamese were exposed. By 2012,
  the Vietnamese Red Cross estimated 150,000 children had been born with birth defects linked to dioxin. American veterans
  exposed to Agent Orange filed claims that the VA denied for decades; a 1984 class-action settlement with Dow Chemical and
  Monsanto paid $180 million to 250,000 veterans.


  The Tet Offensive shattered the narrative. On January 30, 1968 — the Vietnamese Lunar New Year — 80,000 North Vietnamese
  and Viet Cong fighters attacked 36 provincial capitals, 5 major cities, 64 district capitals, and the U.S. Embassy compound
  in Saigon simultaneously. A Viet Cong squad blew a hole in the embassy wall and fought inside the compound for six hours.
  General Westmoreland had told Congress two months earlier that the enemy was losing. Walter Cronkite broadcast from the ruins
  of Hue: "It seems now more certain than ever that the bloody experience of Vietnam is to end in a stalemate." Johnson,
  watching, reportedly said: "If I''ve lost Cronkite, I''ve lost Middle America." He announced on March 31 that he would not
  seek reelection. The war continued for seven more years.


  Six weeks after Tet, on March 16, 1968, soldiers of Charlie Company, 1st Battalion, 20th Infantry, entered the hamlet of
  My Lai in Quang Ngai Province. Over four hours, they killed 504 unarmed civilians — women, children, infants, elderly men.
  Some were raped before being shot. Warrant Officer Hugh Thompson, flying a helicopter overhead, landed between the soldiers
  and the remaining villagers and ordered his door gunner to fire on any American who tried to continue the killing. The Army
  covered up the massacre for a year. Seymour Hersh broke the story in November 1969; his reporting won the Pulitzer Prize.
  Of the 26 soldiers charged, one — Lieutenant William Calley — was convicted. He served three and a half years of house arrest.

  '
significance: 'The war''s name is itself contested. Americans call it the Vietnam War. Vietnamese call it the American War —
  or, more precisely, the Resistance War Against America. It was the third of three: the Resistance War Against France (1946-1954),
  the Resistance War Against Japan (1940-1945), and then the Americans. The framing determines everything. In the American
  telling, the war was a strategic mistake or a noble cause betrayed. In the Vietnamese telling, it was the final phase of
  a century-long anti-colonial struggle.


  The environmental damage persists. As of 2023, dioxin contamination remains in the soil at former U.S. military bases —
  Bien Hoa and Da Nang airfields are active remediation sites. The USAID-funded cleanup at Da Nang, completed in 2018, cost
  $110 million and treated 90,000 cubic meters of contaminated soil. Bien Hoa, ten times larger, began remediation in 2019
  with a projected cost of $390 million. In Laos, an estimated 80 million cluster submunitions remain in the soil from 580,000
  American bombing missions between 1964 and 1973; UXO Lao clears approximately 8,000 hectares per year. In 2023, 50 Laotians
  were killed or injured by unexploded ordnance — 48 years after the bombing stopped. The Vietnam Veterans Memorial in Washington,
  D.C. — Maya Lin''s black granite wall, dedicated in 1982 — lists 58,220 names. It does not list Vietnamese names.

  '
