legacy_points:
- New Zealand (1893) first; Australia (1902); Finland (1906) — first to let women stand for parliament; 19 women elected in 1907
- Over 1,000 British suffragettes were force-fed in prison between 1909 and 1914; the Cat and Mouse Act (1913) released weakened prisoners, then re-arrested them when they recovered
- The 19th Amendment (1920) nominally enfranchised all American women; poll taxes, literacy tests, and violence prevented Black women in the South from voting until the Voting Rights Act (1965)
- Switzerland's male electorate rejected women's suffrage by referendum in 1959; approved it in 1971; Appenzell Innerrhoden was forced by federal court order in 1990
- Saudi Arabia granted women municipal voting rights in 2015 — the last country in the world to do so
- The suffrage movement's racial fractures persisted — Stanton and Susan B. Anthony opposed the 15th Amendment; Black women organized separately while fighting on two fronts simultaneously
