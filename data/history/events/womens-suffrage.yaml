  emphasized:
  - Class dimensions of suffrage — who was included and excluded by property qualifications
  - Soviet legislative reforms that went beyond the vote to address domestic labor, divorce, and maternity
  - International Women's Day as a socialist, not liberal, initiative
  - The gap between formal suffrage and economic equality
  omitted:
  - The genuine emancipatory effect of the vote on individual women's lives
  - Stalin's reversal of Bolshevik feminist reforms — the Zhenotdel's abolition, abortion recriminalized
  - The organizational achievements of non-socialist suffrage campaigns
