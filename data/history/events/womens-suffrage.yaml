death_toll: 'At least 1 killed during protest (Emily Wilding Davison, struck by the King''s horse at Epsom Derby, June 4, 1913); over 1,000 suffragettes force-fed in British prisons between 1909 and 1914; unknown number of deaths from force-feeding complications'
affected_population: 'Half the human population across the entire period — approximately 900 million women alive in 1920, 1.9 billion by 1971'
duration: '123 years from Seneca Falls (1848) to Swiss federal suffrage (1971); extended to 167 years including Saudi Arabia (2015)'
summary: 'On July 19, 1848, three hundred people crowded into the Wesleyan Chapel at Seneca Falls, New York. Elizabeth
  Cady Stanton read aloud a document modeled on the Declaration of Independence. It listed eighteen grievances.
  The ninth: "He has compelled her, if married, to be in the law civilly dead." The twelfth: "He has denied
  to her this inalienable right — the elective franchise." Sixty-eight women and thirty-two men signed it.
  The Seneca Falls Convention produced no law, no vote, no immediate change. It produced a sentence: "We hold
  these truths to be self-evident: that all men and women are created equal."


  Forty-five years later and eight thousand miles away, Kate Sheppard delivered a petition to the New Zealand
  Parliament. The roll measured 270 meters. It carried 31,872 signatures — roughly one in four of every
  adult woman in the country. On September 19, 1893, Governor Lord Glasgow signed the Electoral Act. New Zealand
  became the first self-governing nation where women could vote in national elections. Sheppard had organized
  for six years. She had been turned down by Parliament three times before.


  In Britain, the movement split. Millicent Fawcett led the National Union of Women''s Suffrage Societies —
  petitions, lobbying, constitutional pressure. Emmeline Pankhurst and her daughters Christabel and Sylvia
  founded the Women''s Social and Political Union in 1903. Their motto: "Deeds, not words." WSPU members smashed
  windows on Oxford Street, slashed paintings in the National Gallery, set fire to empty buildings, and
  chained themselves to railings outside 10 Downing Street. Arrested suffragettes went on hunger strike. The
  government responded with force-feeding: a rubber tube pushed through the nostril or forced between the teeth
  while warders held the prisoner down. Over 1,000 women endured the procedure between 1909 and 1914. On June 4,
  1913, Emily Wilding Davison stepped onto the track at the Epsom Derby and was struck by the King''s horse,
  Anmer. She died four days later. At her funeral in London, 6,000 suffragettes marched in white. Sewn into
  the lining of her coat: a return train ticket and a WSPU flag in purple, white, and green.


  The First World War broke the political deadlock. With 1.6 million women working in British munitions
  factories, the argument that women were unfit for public life lost its force. The Representation of the
  People Act 1918 gave the vote to women over thirty who met property qualifications — about 8.4 million women.
  Full equal suffrage came a decade later, in 1928. Emmeline Pankhurst died on June 14, 1928, eighteen days
  before the law took effect.


  In the United States, the 19th Amendment was ratified on August 18, 1920 — seventy-two years after Seneca
  Falls. The final vote came from Tennessee. Harry T. Burn, a 24-year-old Republican legislator, broke a 48-48
  tie after receiving a letter from his mother: "Don''t forget to be a good boy." The amendment passed by one
  vote. But ratification did not mean enfranchisement. Southern Black women were blocked from voting by poll
  taxes, literacy tests, grandfather clauses, and violence. Fannie Lou Hamer tried to register in Indianola,
  Mississippi, in August 1962. She was fired from her job, evicted from her home, shot at, and later beaten
  and sexually assaulted by police in a Winona, Mississippi jail cell. The Voting Rights Act of 1965 — not the
  19th Amendment — secured the ballot for Black women in the South.


  Switzerland held a male-only referendum on women''s suffrage on February 1, 1959. The result: 66.9% against.
  A second referendum on February 7, 1971, passed with 65.7% in favor. In Appenzell Innerrhoden, the smallest
  canton, the open-air Landsgemeinde — where citizens voted by show of hands — rejected women''s suffrage
  repeatedly. On April 29, 1990, the assembled men voted no again. On November 27, 1990, the Federal Supreme
  Court of Switzerland ruled the exclusion unconstitutional. Appenzell Innerrhoden became the last jurisdiction
  in Europe to enfranchise women — by judicial order, not popular will.

  '
significance: 'The vote was the entry point. Once women could vote, they could run for office, serve on juries,
  and shape legislation on property, marriage, custody, and employment. Jeannette Rankin of Montana became the
  first woman elected to the U.S. Congress in 1916 — four years before women could vote nationally. Finland
  elected 19 women to its parliament in 1907, the first female parliamentarians in history. By 2024, 77 countries
  had elected or appointed a female head of state or government. Rwanda''s parliament was 61.3% women — the
  highest proportion on earth. But formal suffrage did not dissolve the structures beneath it. Saudi Arabia
  granted women the right to vote in municipal elections in 2015; women could not drive until 2018, and the
  male guardianship system persisted. In the United States, the Equal Rights Amendment, first proposed in 1923,
  has never been ratified. The gap between the ballot and equality remains measurable: in pay, in representation,
  in the law.

  '
