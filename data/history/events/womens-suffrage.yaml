  - Complementarity as a coherent worldview, not mere prejudice
  - The Appenzell Innerrhoden holdout as democratic localism against federal imposition
  - The failure of predicted catastrophes to materialize after each enfranchisement
  omitted:
  - The legal subordination of women under coverture — property, custody, contract rights denied
  - Economic dependence enforced by law, not chosen by nature
  - Force-feeding, imprisonment, and violence directed at suffragettes by the state
  - The selective application of "tradition" — which traditions were preserved and whose were destroyed
- viewpoint: Intersectional / Black Women's Suffrage
  viewpoint_type: vanquished
  region_origin: north-america
  narrative: 'Elizabeth Cady Stanton wrote in 1869: "I will cut off this right arm of mine before I will ever
    work or demand the ballot for the Negro and not the woman." The occasion was the 15th Amendment, which
    would prohibit denying the vote on the basis of race — but not sex. Stanton and Anthony broke with their
    abolitionist allies. Frederick Douglass, who had spoken in favor of the suffrage resolution at Seneca Falls,
    argued that Black men faced lethal urgency. The friendship ended. The split defined the movement for decades.


    Stanton''s rhetoric grew openly racist. She argued against enfranchising "Sambo" and "Hans" and "Yung Tung"
    before educated white women. The mainstream suffrage movement — after it merged into the National American
    Woman Suffrage Association in 1890 — adopted a "Southern strategy," courting white Southern support by
    accepting segregation within the movement and arguing that white women''s votes would counterbalance
    Black men''s.


    Black women organized anyway. The National Association of Colored Women was founded in 1896, with Mary
    Church Terrell as its first president. Ida B. Wells founded the Alpha Suffrage Club in Chicago in 1913.
    When NAWSA organized a parade in Washington on March 3, 1913 — 5,000 marchers — the organizers told Black
    women to march at the back. Wells refused. She waited on the sidewalk and stepped into the Illinois
    delegation as it passed.


    The 19th Amendment (1920) enfranchised women on paper. In the South, Black women faced poll taxes ($1 to $2,
    a day''s wages for sharecroppers), literacy tests at the registrar''s discretion, and violence. Registrars
    closed their offices when Black women arrived. In Mississippi, Black voter registration stood at 6.7%
    in 1964.


    Fannie Lou Hamer, a sharecropper from Sunflower County, Mississippi, tried to register in August 1962.
    She was forty-four. She had picked cotton since she was six. The plantation owner fired her the same day.
    On June 9, 1963, she was arrested in Winona, Mississippi. Highway patrolmen ordered two Black prisoners
    to beat her with a blackjack. She testified before the Democratic National Convention on August 22, 1964.
    Johnson called an emergency press conference to pull cameras away. Hamer asked the committee: "Is this
    America, the land of the free and the home of the brave, where we have to sleep with our telephones off
    the hooks because our lives be threatened daily?"


    Rosalyn Terborg-Penn''s African American Women in the Struggle for the Vote, 1850-1920 (1998) documented
    what the standard suffrage narrative omits: Black women fought for the vote within a movement that excluded
    them, against a state that terrorized them. The 19th Amendment was not their victory. The Voting Rights Act
    of 1965 came closer.

    '
  key_arguments:
  - The mainstream suffrage movement was built on racial exclusion — Stanton and Anthony opposed Black male suffrage and courted white Southern support
  - Black women organized independently through the NACW, the Alpha Suffrage Club, and local organizations while fighting racism and sexism simultaneously
  - The 19th Amendment did not secure the vote for Black women in the South — poll taxes, literacy tests, and violence persisted until 1965
  - Fannie Lou Hamer's testimony at the 1964 DNC exposed the violence Black women faced for attempting to exercise the franchise
  sources:
  - title: 'African American Women in the Struggle for the Vote, 1850-1920'
    author: Rosalyn Terborg-Penn
    year: '1998'
    type: book
  - title: 'Vanguard: How Black Women Broke Barriers, Won the Vote, and Insisted on Equality for All'
    author: Martha S. Jones
    year: '2020'
    type: book
  - title: 'To ''Joy My Freedom: Southern Black Women''s Lives and Labors After the Civil War'
    author: Tera W. Hunter
    year: '1997'
    type: book
  notable_quotes:
  - text: I will cut off this right arm of mine before I will ever work or demand the ballot for the Negro and not the woman.
    speaker: Elizabeth Cady Stanton
    context: Response to the proposed 15th Amendment, 1869
  - text: Is this America, the land of the free and the home of the brave, where we have to sleep with our telephones off the hooks because our lives be threatened daily, because we want to live as decent human beings?
    speaker: Fannie Lou Hamer
    context: Testimony to the Credentials Committee, Democratic National Convention, August 22, 1964
  emphasized:
  - Stanton and Anthony's explicit racism and the suffrage movement's "Southern strategy"
  - Black women's independent organizing despite exclusion from the mainstream movement
  - The 45-year gap between the 19th Amendment (1920) and the Voting Rights Act (1965) for Black women's effective enfranchisement
  - State violence against Black women who attempted to register — beatings, evictions, economic retaliation
  omitted:
  - White suffragists who maintained abolitionist alliances (Lucy Stone, the AWSA)
  - Moments of interracial cooperation within the suffrage movement
  - Black women who gained and exercised political power in Northern states before 1965
  - The broader legislative achievements of the women's movement beyond the vote
