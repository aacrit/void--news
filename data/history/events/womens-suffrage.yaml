perspectives:
- viewpoint: Liberal Feminist / Suffrage Movement
  viewpoint_type: victor
  region_origin: europe
  narrative: 'The Seneca Falls Convention opened on July 19, 1848, in a Wesleyan chapel that seated three
    hundred. Elizabeth Cady Stanton drafted the Declaration of Sentiments in two days, modeled on the Declaration
    of Independence — a people governed without consent. Of eleven resolutions, only the ninth — demanding
    the vote — failed to pass unanimously. Frederick Douglass spoke in its favor. It passed narrowly.


    The organizing that followed lasted seven decades. Susan B. Anthony was arrested for voting in Rochester,
    New York, in 1872. She was fined $100 and refused to pay. In 1878, the "Anthony Amendment" was introduced
    in Congress: "The right of citizens of the United States to vote shall not be denied or abridged by the
    United States or by any State on account of sex." The same eighteen words were ratified, unchanged, as
    the 19th Amendment forty-two years later. Between 1878 and 1920, the amendment was introduced in every
    session of Congress and defeated or tabled each time.


    In Britain, Millicent Fawcett''s NUWSS organized petitions and parliamentary lobbying. Emmeline Pankhurst''s
    WSPU escalated: window-smashing on Oxford Street, arson of empty railway carriages, bombs in the orchid
    house at Kew Gardens. In prison, suffragettes refused food. The government force-fed them. The Cat and
    Mouse Act of 1913 created a cycle: release the hunger striker, re-arrest her once she recovered. Mary
    Richardson entered the National Gallery on March 10, 1914, and slashed Velazquez''s Rokeby Venus with a
    meat cleaver. "I have tried to destroy the picture of the most beautiful woman in mythological history,"
    she told police, "as a protest against the Government for destroying Mrs. Pankhurst."


    The war shattered the anti-suffrage case. Over 1.6 million British women entered industrial employment
    between 1914 and 1918. The Representation of the People Act 1918 gave the vote to women over thirty who
    met property qualifications — 22% of adult women remained excluded. Equal franchise came with the 1928
    act. Emmeline Pankhurst died on June 14, 1928, eighteen days before it received Royal Assent.


    Eleanor Flexner''s Century of Struggle (1959) — the first scholarly history of the American suffrage
    movement — documented the organizational infrastructure: state campaigns, congressional testimony, petition
    drives, and the grinding repetition of lobbying the same legislators year after year. The vote was not
    given. It was extracted.

    '
  key_arguments:
  - Suffrage was the logical extension of Enlightenment universalism — the same arguments used for male enfranchisement applied to women
  - The 72-year campaign between Seneca Falls (1848) and the 19th Amendment (1920) demonstrated sustained organizational effort, not gradual enlightenment
  - Militant tactics in Britain forced the issue onto the political agenda when constitutional methods had stalled
  - World War I shattered the argument that women were unsuited for public life
