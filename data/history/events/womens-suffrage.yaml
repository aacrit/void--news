    speaker: Huda Sha'arawi
    context: Describing her removal of the veil at Cairo station, 1923, from Harem Years (1987)
  - text: The history of feminism in the Third World demonstrates that feminism is not imposed on Third World women by the West, but rather that historical circumstances have produced feminist movements in non-Western societies.
    speaker: Kumari Jayawardena
    context: Feminism and Nationalism in the Third World, 1986
  emphasized:
  - Independent origins of non-Western feminist movements
  - Turkey's suffrage (1934) predating most Western European democracies
  - Funmilayo Ransome-Kuti's organizing among Yoruba market women — indigenous tactics, indigenous demands
  - Colonial hypocrisy in extending suffrage at home while denying it in colonies
