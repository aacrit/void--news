- viewpoint: Postcolonial / Non-Western
  viewpoint_type: revisionist
  region_origin: global
  narrative: 'Huda Sha''arawi stepped off the train in Cairo on May 15, 1923, returning from the International
    Alliance of Women congress in Rome. On the platform, in front of a crowd of women who had come to meet her,
    she removed her face veil. Saiza Nabarawi, her protegee, did the same. The crowd applauded. Sha''arawi
    never wore it again. She was forty-four and had been married at thirteen to a cousin twice her age. The
    gesture was calculated, public, irreversible — and it emerged from Egyptian intellectual traditions, not
    Western feminism. Qasim Amin had published The Liberation of Women in 1899, arguing from within Islamic
    jurisprudence that seclusion and veiling had no basis in the Quran.


    Turkey granted women full suffrage in 1934 — ten years before France, eleven years before Italy, thirty-seven
    years before Switzerland. The reform was part of Mustafa Kemal Ataturk''s secularization program, but it
    built on decades of Ottoman-era feminist organizing. Halide Edib Adivar had addressed a crowd of 200,000
    in Sultanahmet Square in 1919, calling for Turkish independence and women''s participation. She served as
    a corporal in the War of Independence. The Western narrative of suffrage as a movement that radiated outward
    from London and New York erases these parallel traditions.


    Kumari Jayawardena''s Feminism and Nationalism in the Third World (1986) documented women''s movements in
    Egypt, Turkey, Iran, India, Sri Lanka, Indonesia, the Philippines, China, Japan, Korea, and Vietnam — all
    emerging from their own intellectual contexts. Chinese women participated in the 1911 revolution and
    demanded suffrage; Tang Qunying slapped Song Jiaoren on the floor of the provisional Senate when the
    Kuomintang dropped women''s suffrage from its platform. In India, the All India Women''s Conference was
    founded in 1927. When India became independent in 1947, universal adult suffrage was written into the
    constitution — men and women simultaneously — without a separate feminist campaign.


    In Nigeria, Funmilayo Ransome-Kuti organized the Abeokuta Women''s Union, which by 1946 had 20,000 members.
    The Union led a tax revolt against the Alake of Abeokuta, who had imposed taxes on women market traders at
    the behest of the colonial administration. Ten thousand women surrounded the Alake''s palace in 1948. He
    fled. The colonial government was forced to grant women representation on local councils. Ransome-Kuti''s
    organizing predated and operated independently of any Western feminist influence — her constituency was
    Yoruba market women, her tactics were drawn from indigenous traditions of women''s collective action, and
    her demands were about taxation and governance, not an abstract right to vote.


    The postcolonial critique is direct: the standard narrative — Seneca Falls, then the WSPU, then the 19th
    Amendment, then "the rest of the world followed" — is a story told by the victors about themselves. It treats
    non-Western women''s movements as derivative when they were, in many cases, prior or parallel. And it
    obscures the fact that colonial powers routinely denied suffrage to colonized women while enfranchising women
    at home — British women voted in 1918 while Indian women under British rule did not.

    '
  key_arguments:
  - Women's movements in Egypt, Turkey, India, China, Japan, and Nigeria emerged from their own intellectual traditions, not Western export
  - Turkey granted women's suffrage in 1934 — before France, Italy, and Switzerland
  - The Anglo-American narrative of suffrage treats non-Western movements as derivative when they were parallel or prior
  - Colonial powers denied colonized women the franchise while enfranchising women at home
