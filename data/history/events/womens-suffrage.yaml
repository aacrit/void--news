- viewpoint: Marxist / Socialist Feminist
  viewpoint_type: revisionist
  region_origin: europe
  narrative: 'Alexandra Kollontai published The Social Basis of the Woman Question in 1909. Her argument was
    specific: bourgeois feminists wanted the vote so they could participate in a political system that exploited
    working-class women. A factory worker laboring twelve hours a day had no use for the ballot unless it could
    dismantle the economic structure that kept her there. "For the bourgeois woman," Kollontai wrote, "her
    ''liberation'' is always connected with winning political rights for her own class." The problem was not
    who voted. The problem was what they voted for.


    Clara Zetkin, secretary of the International Socialist Women''s Conference, organized the first International
    Women''s Day on March 19, 1911. Over one million people marched in Germany, Austria, Denmark, and Switzerland.
    The date commemorated the 1857 march of women garment workers in New York, but its purpose was explicitly
    socialist: women''s rights were inseparable from workers'' rights. Zetkin and the German Social Democrats
    demanded universal suffrage — male and female — as part of a broader program that included the eight-hour
    day, maternity protections, and equal pay. The bourgeois suffrage societies, focused narrowly on the vote,
    were pursuing one reform while ignoring the system.


    The Soviet Union granted women full suffrage in 1917, two years before the United States, eleven years
    before Britain achieved equal franchise. The Bolsheviks did not frame this as feminist progress — it was
    part of revolutionary restructuring. The 1918 Constitution of the Russian Soviet Federative Socialist
    Republic declared equal rights for men and women. Kollontai, as People''s Commissar for Social Welfare,
    legalized divorce (available on demand by either spouse), decriminalized abortion, established communal
    kitchens and laundries to socialize domestic labor, and granted paid maternity leave. No Western democracy
    matched this legislative package until the 1970s.


    But the Soviet model exposed its own contradictions. Stalin reversed many of Kollontai''s reforms: abortion
    was recriminalized in 1936, divorce was made expensive and difficult, and the Zhenotdel (Women''s Department)
    was abolished in 1930. The double burden — full-time industrial labor plus full responsibility for domestic
    work — became the defining feature of Soviet women''s lives. Women constituted 51% of the Soviet workforce
    by 1970 but held fewer than 5% of leadership positions in the Communist Party. Formal equality coexisted
    with structural subordination.


    The socialist critique extends beyond the Soviet case. In Britain, the 1918 Representation of the People
    Act gave the vote to women over thirty who were householders, wives of householders, or held university
    degrees. Working-class women under thirty — the women who had worked in munitions factories during the war
    — were excluded. The property qualification was not incidental. It was the point. Equal franchise in 1928
    came after a decade of pressure, not as an automatic extension of the 1918 principle. The vote, detached
    from economic reorganization, changed the personnel of government without changing its function.

    '
  key_arguments:
  - The vote without economic restructuring changed the form of women's subordination, not its substance
  - The Soviet Union granted women's suffrage as part of revolutionary transformation, not isolated feminist reform
  - Bourgeois suffrage societies pursued political equality while ignoring class exploitation
  - The British 1918 property qualification deliberately excluded working-class women from the franchise
