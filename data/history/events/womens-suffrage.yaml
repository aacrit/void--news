  connection_type: influenced
  description: Olympe de Gouges wrote the Declaration of the Rights of Woman and of the Female Citizen in 1791, answering the Revolution's exclusion of women point by point. She was guillotined on November 3, 1793.
- target_slug: civil-rights-movement
  connection_type: parallel
  description: Black women fought both the suffrage movement's racism and Jim Crow simultaneously — the Voting Rights Act (1965) secured what the 19th Amendment (1920) had failed to deliver for Black women in the South.
- target_slug: indian-independence-movement
  connection_type: parallel
  description: Indian women led salt satyagraha marches and demanded inclusion in the independence movement; universal adult suffrage for men and women was written into the Indian Constitution (1950) without a separate women's suffrage campaign.
- target_slug: russian-revolution
  connection_type: parallel
  description: The Soviet Revolution granted women's suffrage in 1917 as part of revolutionary restructuring — the first major power to do so — but Stalin reversed many of Kollontai's reforms within two decades.
