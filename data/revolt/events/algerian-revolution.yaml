success_factors:
  - factor_key: armed-campaign-attrition
    label: Protracted armed campaigns can win by exhausting the incumbent's will more than by defeating its army
    framework: chenoweth
    status: confirmed
    direction: favors-movement
    base_rate: Armed campaigns succeed in roughly 26% of historical cases; protracted wars exceeding a decade more often succeed through attrition of the incumbent's domestic political will than through outright military victory
    rationale: Eight years of war and over a million rotated French conscripts wore down metropolitan political support for the war faster than the French army broke the ALN's rural sanctuary network.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: foreign-sanctuary-support
    label: Cross-border sanctuary sustains protracted challenger campaigns
    framework: goldstone
    status: confirmed
    direction: favors-movement
    base_rate: Foreign material and sanctuary support correlates with sustaining protracted challenger campaigns, though the wider literature also finds it often correlates with weaker post-victory institutions
    rationale: Tunisian and Moroccan sanctuary kept ALN cross-border operations alive even as France built the fortified Morice Line to try to seal the border.
    sources:
      - 'Goldstone, Revolutions: A Very Short Introduction (2014)'
  - factor_key: elite-fracture
    label: Elite fracture within the incumbent power often precedes a negotiated exit
    framework: skocpol
    status: confirmed
    direction: favors-movement
    base_rate: Skocpol's model finds a split within the incumbent's own governing and military elite a frequent precursor to negotiated withdrawal rather than continued suppression
    rationale: The April 1961 generals' putsch against de Gaulle exposed exactly this fracture within the French military and accelerated the Evian negotiations that followed within a year.
    sources:
      - Skocpol, States and Social Revolutions (1979)
