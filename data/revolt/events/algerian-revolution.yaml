slug: algerian-revolution
title: The Algerian War of Independence
subtitle: A settler colony of one million loses a war fought mostly out of sight
date_display: 1954-1962
date_start: 1954
date_end: 1962
date_precision: year
era: anticolonial
region: africa
country: Algeria
revolt_type: anticolonial
status: concluded
summary: The FLN's coordinated attacks on All Saints' Day 1954 opened an eight-year war against French rule that killed hundreds of thousands, brought down France's own Fourth Republic, and ended with nearly a million pied-noir settlers leaving within months of Algerian independence.
significance: One of the defining anticolonial wars of the twentieth century, it demonstrated that a colonial power with overwhelming military superiority could still be exhausted into withdrawal by a protracted guerrilla and urban campaign paired with its own domestic political fracture.
grievances:
  - kind: Settler control of land and political power
    intensity: 85
    evidence: Pied-noir settlers, roughly 10 percent of Algeria's population, controlled the majority of the colony's arable farmland and nearly all senior administrative posts through the mid-1950s.
  - kind: Denial of political rights
    intensity: 80
    evidence: The 1947 Algerian Statute created a second electoral college so that roughly 1 million European settlers held equal representation with roughly 9 million Muslim Algerians.
  - kind: The Setif massacre
    intensity: 90
    evidence: French forces and settler militias killed an estimated several thousand to over ten thousand Algerians in reprisals after independence demonstrations on May 8, 1945, a date Algerians remember as the war's true origin.
actors:
  - actor_type: vanguard
    name: The FLN
    description: The National Liberation Front, formed in 1954 to unify Algeria's fractured nationalist movements.
    role_in_arc: Coordinated the All Saints' Day attacks and led the political and military campaign through to the 1962 Evian Accords.
    defected: false
  - actor_type: masses
    name: The ALN
    description: The FLN's guerrilla army, operating from rural bases and cross-border sanctuaries.
    role_in_arc: Fought a sustained rural and mountain guerrilla campaign against French forces for the length of the war.
    defected: false
  - actor_type: old-regime
    name: The French colonial administration
    description: France's civil and military government of Algeria, then legally three departments of metropolitan France.
    role_in_arc: Deployed up to 500,000 troops and interned hundreds of thousands of Algerians in an escalating counterinsurgency campaign.
    defected: false
  - actor_type: counter-revolutionaries
    name: The OAS
    description: A settler and dissident-military organization formed in 1961 to keep Algeria French by force.
    role_in_arc: Carried out bombings and assassinations against both Algerian civilians and French officials negotiating independence, including an assassination attempt on de Gaulle.
    defected: false
  - actor_type: foreign-backer
    name: Tunisia and Morocco
    description: Newly independent neighboring states that hosted FLN sanctuary bases and training camps.
    role_in_arc: Provided cross-border refuge that sustained ALN operations even as the French army built fortified lines to seal the borders.
    defected: false
tactics:
  - tactic_type: guerrilla-warfare
    description: ALN units operated from rural and mountain bases, avoiding direct engagement with superior French firepower.
    prominence: primary
  - tactic_type: urban-uprising
    description: The 1956-57 Battle of Algiers brought bombing and assassination campaigns into the capital itself, provoking a brutal French counter-campaign of mass arrest and torture.
    prominence: primary
  - tactic_type: sabotage
    description: Attacks on settler farms, infrastructure, and the colonial economy pressured the settler population's willingness to remain.
    prominence: secondary
resistance_type: armed
