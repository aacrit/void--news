perspectives:
  - viewpoint: FLN nationalist view
    viewpoint_type: revolutionary
    region_origin: Algeria
    narrative: Armed struggle became the only remaining avenue after a decade of failed legal reform, and eight years of sustained sacrifice, not French goodwill, produced independence.
    key_arguments:
      - The Setif massacre of 1945 proved peaceful demonstration would be met with reprisal killing
      - The unequal electoral college made legislative change structurally impossible
      - Independence came only after sustained armed and political pressure, not through French reform
    sources: []
    notable_quotes: []
    emphasized:
      - the Setif massacre
      - the scale of wartime sacrifice
    omitted:
      - the FLN's own purges of rival nationalist factions
      - the treatment of harkis after independence
  - viewpoint: French veteran and pied-noir retrospective view
    viewpoint_type: diaspora
    region_origin: France
    narrative: A community whose roots in Algeria spanned generations lost its homes within months, and the brutality both sides inflicted during the war is often flattened into a single-sided colonial narrative.
    key_arguments:
      - Multi-generational settler communities are frequently erased from independence-era narratives
      - The FLN's own violence against harkis and rival Algerians remains undercounted in most accounts
      - French conscripts, many of them reluctant nineteen-year-olds, also paid a heavy cost in the war
    sources: []
    notable_quotes: []
    emphasized:
      - settler displacement
      - harki reprisals after independence
    omitted:
      - settler-era land and political inequality
      - the 1945 Setif reprisal killings
