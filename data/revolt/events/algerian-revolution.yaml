      - OAS terror campaign intensifies, 1961-62
  - phase: consolidation
    label: Evian and independence
    date_start: '1962-03-18'
    t_start: 0.92
    t_end: 1
    intensity: 55
    reached: true
    summary: The Evian Accords end the war, and a July 1962 referendum delivers overwhelming support for independence.
    key_events:
