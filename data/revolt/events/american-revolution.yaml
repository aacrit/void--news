success_factors:
  - factor_key: foreign-intervention
    label: Direct foreign military intervention
    framework: tilly
    status: French troops, naval forces, and financing were decisive at the 1781 Yorktown siege that ended major combat operations
    direction: favors-movement
    base_rate: Comparative studies of independence wars find that direct foreign military intervention on the side of an insurgency substantially raises the odds of success relative to insurgencies fighting alone
    rationale: The Continental Army alone had not defeated British forces decisively in six years of fighting; the French fleet blocking Chesapeake Bay and roughly 8,000 French troops at Yorktown were what forced Cornwallis's surrender.
    sources:
      - Dull, A Diplomatic History of the American Revolution (1985)
  - factor_key: armed-campaign-rate
    label: Armed campaign base rate
    framework: chenoweth
    status: An eight-year armed campaign combining colonial forces with a foreign ally achieved independence
    direction: favors-movement
    base_rate: Chenoweth and Stephan find armed campaigns succeed in roughly 26 percent of cases historically, versus roughly 53 percent for primarily nonviolent campaigns
    rationale: The American case succeeded as an armed campaign in part because it secured a great-power ally rather than relying on domestic mobilization alone, a combination not present in most armed campaigns in the broader historical dataset.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: geographic-distance
    label: Distance and logistics burden on the imperial power
    framework: tilly
    status: Britain supplied and reinforced its army across roughly 3,000 miles of Atlantic Ocean for eight years
    direction: favors-movement
    base_rate: Historians of colonial and imperial warfare widely identify overextended supply lines as a recurring structural disadvantage for distant occupying powers fighting local or allied-supported insurgencies
    rationale: Troop and supply convoys took six to eight weeks to cross the Atlantic, delaying reinforcement and decision-making relative to the Continental Army and its French allies operating on or near home territory.
    sources:
      - Comparative colonial warfare historiography
