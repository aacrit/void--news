perspectives:
  - viewpoint: Patriot colonist
    viewpoint_type: revolutionary
    region_origin: americas
    narrative: Patriots framed the conflict as a defense of English rights denied to colonial subjects, escalating from petition to boycott to arms only after Parliament repeatedly refused representation and imposed increasingly punitive measures like the 1774 Coercive Acts.
    key_arguments:
      - Parliament taxed the colonies without seating colonial representatives, violating a principle patriots traced to English constitutional tradition
      - A decade of peaceful petition and boycott preceded the resort to arms in 1775
    sources: []
    notable_quotes:
      - text: We hold these truths to be self-evident, that all men are created equal
        speaker: Declaration of Independence
        context: Adopted by the Continental Congress, July 4, 1776
    emphasized:
      - The escalating pattern of British punitive legislation from 1765 to 1774
      - The colonies' prior record of self-governance through elected assemblies
    omitted:
      - The continuation and expansion of chattel slavery under the new republic the Declaration's language of equality did not extend to
  - viewpoint: British Loyalist
    viewpoint_type: counter-revolutionary
    region_origin: americas
    narrative: Loyalists, an estimated 15 to 20 percent of the colonial population, viewed the rebellion as an illegal armed insurrection against lawful Parliamentary authority, disruptive to trade and social order, and warned that independence would fracture the stability the empire provided.
    key_arguments:
      - Parliament held sovereign authority over the colonies as established by charter and precedent
      - Armed rebellion against the Crown, not the underlying tax grievances, was the illegitimate escalation
    sources: []
    notable_quotes: []
    emphasized:
      - Property and trade disruption caused by boycotts and mob actions
      - The risks of political instability under an untested republican government
    omitted:
      - The scale and duration of colonial petitioning that preceded the resort to boycott and eventually arms
