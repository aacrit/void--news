slug: american-revolution
title: The American Revolution
subtitle: Thirteen colonies fought an eight-year war over taxation without representation
date_display: 1765 to 1783
date_start: 1765
date_end: 1783
date_precision: year
era: atlantic
region: americas
country: United States (Thirteen Colonies)
revolt_type: political
status: concluded
summary: Parliament's 1765 Stamp Act, the first direct tax levied on the American colonies, triggered a decade of escalating protest under the slogan 'no taxation without representation.' The Boston Tea Party of December 1773 and the punitive Coercive Acts that followed hardened positions on both sides. Fighting began at Lexington and Concord in April 1775; the Continental Congress declared independence on July 4, 1776. French military and naval support, formalized by treaty in 1778, proved decisive at the October 1781 siege of Yorktown, where a combined American and French force compelled the surrender of over 7,000 British troops under Cornwallis. The 1783 Treaty of Paris recognized American independence.
significance: Established the first large-scale republic founded explicitly on Enlightenment principles of popular sovereignty and constitutional government, directly influencing the French Revolution six years later.
analytical_outlook: A political-rights movement that escalated into an eight-year war, won primarily through foreign military intervention rather than an internal collapse of British authority.
grievances:
  - kind: Taxation without representation
    intensity: 85
    evidence: The 1765 Stamp Act and 1767 Townshend Acts imposed direct taxes on the colonies, which held no seats in the Parliament that levied them.
  - kind: Restriction of colonial self-governance
    intensity: 75
    evidence: The 1774 Coercive Acts (Intolerable Acts) suspended Massachusetts's colonial charter and closed the port of Boston in response to the Tea Party.
  - kind: Standing army quartering
    intensity: 55
    evidence: The Quartering Acts required colonies to house British troops, a grievance later written directly into the Declaration of Independence's list of charges against George III.
  - kind: Trade restriction
    intensity: 60
    evidence: Navigation Acts restricted colonial trade to British ships and markets, angering merchants across New England and the Mid-Atlantic ports.
actors:
  - actor_type: masses
    name: Continental Congress
    description: Delegate body representing the thirteen colonies, first convened 1774, issued the Declaration of Independence in 1776.
    role_in_arc: Coordinated colonial resistance and formal independence, later governed under the Articles of Confederation
    defected: false
  - actor_type: vanguard
    name: Continental Army
    description: Colonial fighting force under George Washington's command, alongside state militias, numbering roughly 20,000 to 30,000 at various points.
    role_in_arc: Fought the eight-year war against British regulars, ultimately forcing the Yorktown surrender
    defected: false
  - actor_type: old-regime
    name: Kingdom of Great Britain
    description: Governed the thirteen colonies through royal governors and Parliament; deployed roughly 50,000 troops to North America over the war's course.
    role_in_arc: Suppressed early protest, then fought and ultimately lost the war, recognizing independence in 1783
    defected: false
  - actor_type: foreign-backer
    name: Kingdom of France
    description: Formal ally of the United States from the 1778 Treaty of Alliance, providing troops, a fleet, and financing.
    role_in_arc: French naval blockade and roughly 8,000 French troops were decisive at the 1781 siege of Yorktown
    defected: false
  - actor_type: counter-revolutionaries
    name: American Loyalists
    description: An estimated 15 to 20 percent of the colonial population who remained loyal to the Crown; roughly 60,000 to 100,000 emigrated after the war.
    role_in_arc: Fought alongside British forces and provided intelligence; largely resettled in Canada and Britain after 1783
    defected: false
tactics:
  - tactic_type: boycott-noncooperation
    description: Colonial merchants organized boycotts of British goods following the Stamp Act and Townshend Acts, coordinated through Committees of Correspondence.
    prominence: primary, pre-war phase
  - tactic_type: armed-insurgency
    description: The Continental Army and state militias fought a mix of set-piece battles (Saratoga, Yorktown) and irregular engagements (Lexington, Concord, the Southern partisan campaign) across an eight-year war.
    prominence: primary, war phase
  - tactic_type: parallel-institutions
    description: Benjamin Franklin's mission to Paris secured the 1778 Franco-American alliance, bringing French naval and land forces directly into the conflict.
    prominence: secondary, decisive at Yorktown
resistance_type: armed
