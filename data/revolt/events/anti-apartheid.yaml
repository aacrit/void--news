success_factors:
  - factor_key: hybrid-pressure
    label: Combining international boycott pressure with domestic mass mobilization outperforms either channel alone
    framework: chenoweth
    status: confirmed
    direction: favors-movement
    base_rate: Hybrid campaigns combining international economic pressure with domestic mass mobilization succeed more often than either channel alone in cross-national comparative work
    rationale: The 1980s combination of township stayaways, UDF organizing, and international divestment applied pressure the government could not resolve by force alone.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: elite-fracture
    label: A split within the ruling party's reform-minded faction typically precedes negotiation over suppression
    framework: skocpol
    status: confirmed
    direction: favors-movement
    base_rate: Skocpol's model finds a split within the ruling elite's reform-minded faction a frequent precondition for negotiated, rather than violently suppressed, transition
    rationale: De Klerk's own National Party concluded by 1990 that the security-state approach could not be sustained indefinitely, opening formal negotiations rather than escalating repression further.
    sources:
      - Skocpol, States and Social Revolutions (1979)
  - factor_key: sanctions-pressure-on-incumbent
    label: Sustained international pressure aimed at an incumbent can push it toward negotiated exit
    framework: goldstone
    status: confirmed
    direction: favors-movement
    base_rate: Sustained international material pressure aimed at an incumbent regime, rather than backing given to an armed challenger, correlates with pushing entrenched minority-rule regimes toward negotiated exit
    rationale: Divestment and trade sanctions through the 1980s raised the economic cost of continued apartheid rule enough to shift calculations inside the National Party itself.
    sources:
      - 'Goldstone, Revolutions: A Very Short Introduction (2014)'
