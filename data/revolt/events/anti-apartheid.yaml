slug: anti-apartheid
title: The Anti-Apartheid Struggle
subtitle: Forty-six years, and the vote finally reaches everyone
date_display: 1948-1994
date_start: 1948
date_end: 1994
date_precision: year
era: people-power
region: africa
country: South Africa
revolt_type: democratic-uprising
status: concluded
summary: The National Party legislated apartheid into law in 1948. Decades of banned organizations, township uprisings, international sanctions, and a security-state crackdown followed before President F.W. de Klerk unbanned the ANC and released Nelson Mandela in 1990, opening four years of negotiation that produced South Africa's first fully multiracial election in 1994.
significance: One of the longest sustained mass movements against institutionalized minority rule in modern history, and one of relatively few such struggles resolved through negotiated transition rather than civil war or the incumbent's outright military defeat.
grievances:
  - kind: Legislated racial segregation
    intensity: 92
    evidence: The National Party's 1948 election victory began four decades of apartheid legislation classifying every South African by race and restricting where each group could live, work, and vote.
  - kind: Forced removals
    intensity: 78
    evidence: The Group Areas Act and related laws forcibly relocated an estimated 3.5 million Black South Africans between 1960 and 1983 to racially designated townships and homelands.
  - kind: State violence against protest
    intensity: 88
    evidence: Police killed 69 people at a peaceful pass-law protest in Sharpeville on March 21, 1960, and killed hundreds more, many of them students, during the June 1976 Soweto uprising.
actors:
  - actor_type: vanguard
    name: The African National Congress
    description: South Africa's oldest liberation movement, founded in 1912, banned by the government from 1960 to 1990.
    role_in_arc: Led the political campaign against apartheid from underground and exile for three decades before returning to legal politics in 1990.
    defected: false
  - actor_type: military-defectors
    name: Umkhonto we Sizwe
    description: The ANC's armed wing, founded in 1961 after the Sharpeville massacre closed off purely nonviolent avenues.
    role_in_arc: Carried out a limited sabotage campaign against infrastructure targets, deliberately avoiding civilian casualties in its early years.
    defected: false
  - actor_type: organized-labor
    name: COSATU-aligned unions
    description: The Congress of South African Trade Unions, formed in 1985.
    role_in_arc: Organized major stayaway strikes through the 1980s that combined with township unrest to raise the economic cost of continued apartheid rule.
    defected: false
  - actor_type: students-youth
    name: Soweto students
    description: Secondary school students who protested a 1976 policy mandating Afrikaans as a language of instruction.
    role_in_arc: Their June 16, 1976 march, met with police gunfire, radicalized a new generation and drew international attention to apartheid's violence.
    defected: false
  - actor_type: old-regime
    name: The National Party government
    description: South Africa's ruling party from 1948 to 1994.
    role_in_arc: Under F.W. de Klerk, unbanned the ANC and other liberation movements in February 1990 and negotiated a four-year transition to majority rule.
    defected: false
tactics:
  - tactic_type: boycott-noncooperation
    description: An international sanctions and divestment campaign, building from the 1960s and accelerating through the 1980s, pressured the South African economy and its foreign investors.
    prominence: primary
  - tactic_type: mass-demonstration
    description: The 1952 Defiance Campaign and the 1983-founded United Democratic Front organized mass civil disobedience and township protest through the 1980s.
    prominence: primary
  - tactic_type: armed-insurgency
    description: Umkhonto we Sizwe's sabotage campaign, beginning in 1961, targeted infrastructure rather than civilians, remaining limited in scale relative to the mass civil resistance campaign.
    prominence: secondary
  - tactic_type: general-strike
    description: Coordinated stayaways organized by UDF-aligned unions through the 1980s repeatedly shut down major industrial centers.
    prominence: secondary
resistance_type: hybrid
