perspectives:
  - viewpoint: Tunisian pro-democracy activist
    viewpoint_type: movement
    region_origin: middle-east
    narrative: Tunisian activists who organized after Bouazizi's death describe a genuine, broad-based democratic aspiration rooted in specific, documented grievances, unemployment, corruption, and police abuse, that succeeded because Tunisia's military, unlike Syria's or Bahrain's, declined to fire on its own citizens.
    key_arguments:
      - Tunisia's relatively professional, less politically entrenched military made the crucial difference between its outcome and the region's other uprisings
      - The UGTT labor union's institutional weight gave Tunisia's transition an organizing backbone many other countries' uprisings lacked
    sources: []
    notable_quotes:
      - text: The people want the fall of the regime
        speaker: Regional protest chant, 2011
        context: Used across Tunisia, Egypt, Libya, Syria, Yemen, and Bahrain
    emphasized:
      - The specific, documented corruption detailed in the 2010 WikiLeaks cables
      - The 2014 constitution as a concrete democratic achievement
    omitted:
      - The fragility of the 2014 settlement, later undone in part by the 2021 presidential self-coup
  - viewpoint: Displaced Syrian civilian
    viewpoint_type: diaspora
    region_origin: middle-east
    narrative: For Syrians displaced by the ensuing civil war, the 2011 protests are remembered as a peaceful movement for basic reforms that a government willing to use sustained lethal force, backed by Russian and Iranian intervention, turned into over a decade of war and displacement rather than the fast transitions seen in Tunisia or Egypt.
    key_arguments:
      - The initial 2011 protests in Deraa and elsewhere were peaceful and locally specific before the government's crackdown escalated the conflict
      - External military backing for the Assad government, absent in Tunisia's case, prevented the kind of negotiated or forced exit seen elsewhere in the region
    sources: []
    notable_quotes: []
    emphasized:
      - The peaceful character of the movement's first months
      - The scale of civilian displacement and casualties over the following decade
    omitted:
      - The subsequent fragmentation of the Syrian opposition into competing armed factions, including groups later designated as extremist by multiple governments
