success_factors:
  - factor_key: military-defection
    label: Security force defection as the branch point
    framework: chenoweth
    status: Tunisia's and Egypt's militaries declined to fire on protesters and eased their presidents out; Syria's, Bahrain's, and (initially) Libya's security forces did not fracture and used sustained force
    direction: indeterminate
    base_rate: Security force defection or non-cooperation is the strongest single predictor of movement success across the historical record, and its absence is equally predictive of prolonged violent conflict or suppression
    rationale: 'The Arab Spring is frequently cited as a natural experiment: near-identical protest repertoires and grievances produced opposite outcomes depending almost entirely on whether the military stayed loyal to the regime, cleanly separating Tunisia and Egypt''s relatively fast transitions from Syria, Bahrain, and Libya''s violent trajectories.'
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: external-intervention-divergence
    label: Divergent foreign intervention
    framework: skocpol
    status: Bahrain's uprising was suppressed by GCC troop intervention on the regime's side; Libya's saw NATO intervention on the opposition's side; Syria's saw Russian and Iranian intervention on the regime's side
    direction: indeterminate
    base_rate: Comparative studies of the 2011 uprisings identify the direction and presence of external military intervention as one of the clearest explanatory variables for why otherwise similar uprisings produced opposite outcomes
    rationale: Unlike 1989's relatively uniform external environment, the Arab Spring saw external powers intervene on both sides across different countries within the same regional wave, a key reason outcomes diverged so sharply from broadly similar starting conditions.
    sources:
      - Brownlee, Masoud and Reynolds, The Arab Spring (2015)
  - factor_key: participation-threshold
    label: 3.5 percent participation rule
    framework: chenoweth
    status: Egypt's peak Tahrir crowds, estimated up to roughly 2 million against a population near 82 million in 2011, fall short of 3.5 percent nationally even though they proved sufficient given the concurrent military defection
    direction: indeterminate
    base_rate: Chenoweth's 3.5 percent finding is drawn primarily from national-level participation figures; sub-national concentrated mobilization, as in Tahrir Square, complicates direct application of the rule
    rationale: Egypt succeeded with concentrated capital-city mobilization well under the national 3.5 percent mark, illustrating that the threshold interacts with, rather than substitutes for, elite and security-force response.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
