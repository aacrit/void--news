slug: arab-spring
title: The Arab Spring
subtitle: One street vendor's self-immolation set off uprisings in a dozen countries with a dozen different endings
date_display: December 2010 to 2012 (initial wave)
date_start: 2010
date_end: 2012
date_precision: year
era: square-revolutions
region: middle-east
country: Tunisia, Egypt, Libya, Syria, Yemen, Bahrain (regional)
revolt_type: democratic-uprising
status: concluded
summary: 'Street vendor Mohamed Bouazizi set himself on fire in Sidi Bouzid, Tunisia on December 17, 2010 after municipal officials confiscated his cart, a single act that detonated protests across a region where median age was under 25 and youth unemployment often exceeded 25 percent. Tunisia''s Ben Ali fled within four weeks. Egypt''s Hosni Mubarak resigned after eighteen days of Tahrir Square occupation in February 2011. From there national trajectories diverged sharply: Libya and Yemen''s uprisings turned into prolonged armed conflict, Syria''s protest movement became a civil war that by the 2020s had killed several hundred thousand people and displaced roughly half the country''s pre-war population, Bahrain''s uprising was suppressed with the direct military assistance of neighboring Gulf states, and Egypt''s own democratic opening was reversed by a 2013 military coup.'
significance: The largest simultaneous wave of popular uprisings in the Arab world's modern history, and a widely studied case for how a single regional cascade can produce outcomes as divergent as Tunisia's fragile democracy and Syria's prolonged civil war from broadly similar starting grievances.
analytical_outlook: 'A regional cascade whose national branches diverged almost entirely on a single variable: whether the security apparatus fractured (Tunisia, Egypt) or held together and used force (Syria, Bahrain, Libya after early defections reversed into civil war).'
grievances:
  - kind: Youth unemployment
    intensity: 85
    evidence: Regional youth unemployment exceeded 25 percent in several countries in 2010, against a median population age under 25 across much of the Arab world.
  - kind: Authoritarian rule and corruption
    intensity: 80
    evidence: Tunisia's Ben Ali and Egypt's Mubarak had each held power for roughly two and three decades respectively; WikiLeaks cables published in 2010 detailed documented Ben Ali family corruption that fueled early protest anger.
  - kind: Police brutality and state violence
    intensity: 75
    evidence: Bouazizi's confrontation with a municipal inspector and subsequent self-immolation became a symbol of routine humiliation by local officials; Egypt's protests were partly catalyzed by the June 2010 police beating death of Khaled Said in Alexandria.
  - kind: Food price inflation
    intensity: 65
    evidence: Global wheat prices roughly doubled between mid-2010 and early 2011 following a Russian export ban after a severe drought, sharply raising bread costs across food-importing Arab states.
actors:
  - actor_type: masses
    name: Mohamed Bouazizi and the street protests
    description: Tunisian street vendor whose self-immolation on December 17, 2010 in Sidi Bouzid became the movement's founding act, and the mass protests that followed.
    role_in_arc: His death on January 4, 2011 triggered protests that spread nationally within days
    defected: false
  - actor_type: students-youth
    name: Social-media-organized youth networks
    description: Loosely organized activist networks across Tunisia and Egypt, including Egypt's April 6 Youth Movement, that used social media to coordinate protests largely outside formal opposition parties.
    role_in_arc: Provided early organizational capacity in Tunisia and Egypt's uprisings
    defected: false
  - actor_type: military-defectors
    name: Egyptian Armed Forces
    description: Egypt's military, a central economic and political institution under Mubarak.
    role_in_arc: Declined to fire on Tahrir Square protesters and eased Mubarak out in February 2011, then led a 2013 coup against his elected successor
    defected: true
  - actor_type: old-regime
    name: Bashar al-Assad government
    description: Syria's ruling government since 2000, backed by Russia and Iran.
    role_in_arc: Met protests with sustained lethal force starting in 2011, precipitating a civil war that continued for over a decade
    defected: false
  - actor_type: foreign-intervener
    name: Gulf Cooperation Council states
    description: Saudi Arabia and allied Gulf monarchies, which sent troops into Bahrain in March 2011 under a GCC mutual-defense framework.
    role_in_arc: Directly suppressed Bahrain's uprising and backed counter-revolutionary outcomes elsewhere in the region
    defected: false
tactics:
  - tactic_type: occupation
    description: Sustained mass occupation of central public squares, most prominently Cairo's Tahrir Square for eighteen days in January-February 2011, became the movement's signature tactic and namesake.
    prominence: primary
  - tactic_type: digital-mobilization
    description: Facebook, Twitter, and YouTube were used to organize protests, document security force abuses, and spread footage internationally in real time, notably by Egypt's We Are All Khaled Said page.
    prominence: primary
  - tactic_type: general-strike
    description: Coordinated labor strikes, particularly in Egypt's Mahalla textile sector and Tunisia's UGTT-affiliated unions, added economic pressure alongside street protest.
    prominence: secondary
resistance_type: hybrid
