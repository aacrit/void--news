legacy_points:
  - Ended the Awami League's fifteen-year hold on government inside a single month of sustained protest.
  - Showed how a narrow administrative grievance can escalate into regime change once the state answers it with lethal force.
  - Left open whether Bangladesh gets a freer election than the one that triggered the crisis, or a different party running the same institutions.
