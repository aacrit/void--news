success_factors:
  - factor_key: resistance_method
    label: Method of struggle
    framework: chenoweth
    status: Overwhelmingly nonviolent marches and strikes, despite lethal state violence against protesters.
    direction: favors-movement
    base_rate: About 53 percent of nonviolent campaigns from 1900 to 2006 succeeded, versus about 26 percent for armed ones.
    rationale: The movement kept its nonviolent discipline even as the death toll rose, preserving broad participation across class lines.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: '2024'
    confidence: high
  - factor_key: security_defection
    label: Did the security forces defect
    framework: chenoweth
    status: Partial to decisive. The army stopped enforcing the curfew and told Hasina to resign rather than fire on crowds a second week running.
    direction: favors-movement
    base_rate: Defection of the security forces is the single strongest predictor of a nonviolent campaign's success.
    rationale: The army's refusal, not protest size alone, is what ended Hasina's government within hours.
    sources:
      - Nepstad, Nonviolent Revolutions (2011)
    as_of: '2024'
    confidence: high
  - factor_key: peak_participation
    label: Peak participation
    framework: chenoweth
    status: Broad and cross-class by early August, though no reliable population-share estimate exists.
    direction: indeterminate
    base_rate: No nonviolent campaign that mobilized at least 3.5 percent of the population at its peak has failed to achieve its stated aim.
    rationale: The crowds were large enough to shut down the capital, but the 3.5 percent threshold has not been independently verified for this case.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: '2024'
    confidence: low
  - factor_key: transition_capture
    label: Surviving the transition
    framework: skocpol
    status: Untested. The old ruling party's local machine and parts of the bureaucracy remain in place under the interim government.
    direction: indeterminate
    base_rate: Revolutions are most fragile in the period after the ruler falls, when the old state's institutions survive and can reassert themselves.
    rationale: Bangladesh's next election, and whether the Awami League is allowed to contest it, will show whether the July uprising reformed the state or simply changed its leadership.
    sources:
      - Skocpol, States and Social Revolutions (1979)
    as_of: '2026'
    confidence: medium
