    defected: true
  - actor_type: old-regime
    name: Sheikh Hasina and the Awami League
    description: The party that had governed Bangladesh since 2009, built around the Hasina family's legacy of the 1971 independence war.
    role_in_arc: Ordered the crackdown, then collapsed within days of losing the army's backing.
    defected: false
