slug: bangladesh-july-revolution
title: Bangladesh's July Revolution
subtitle: A civil-service hiring quota lit five weeks that ended Sheikh Hasina's fifteen years in power
date_display: 2024 to present
date_start: 2024
date_precision: year
era: square-revolutions
region: south-asia
country: Bangladesh
revolt_type: democratic-uprising
status: consolidating
summary: In July 2024 university students in Dhaka marched against a reinstated quota reserving 30 percent of civil service jobs for descendants of 1971 war veterans. Police and ruling-party activists killed protesters within days, and the demand changed overnight from quota reform to accountability. By early August the movement's only remaining demand was Sheikh Hasina's resignation. On 5 August the army told her to go. She resigned and flew to India within hours, ending fifteen years of Awami League rule. An interim government led by Nobel laureate Muhammad Yunus now governs while institutions are rebuilt and elections are scheduled.
significance: Bangladesh shows how a narrow administrative grievance can become regime change once a government answers it with lethal force. Hasina had survived three consecutive elections that observers and the opposition called neither free nor fair; a hiring quota, not the ballot box, is what finally moved the army to withdraw its backing.
analytical_outlook: 'The interim government faces the harder half of the arc: reforming courts, police and the electoral commission before a vote, while the Awami League''s local machine and parts of the bureaucracy remain in place. History suggests the period after a ruler falls, not the fall itself, is when revolutions are most often recaptured by the institutions that survive them. Placement on the arc: the old regime has collapsed and a transitional government is trying to consolidate, with no election yet held to test whether reform outlasts the crisis that produced it.'
grievances:
  - kind: political
    intensity: 85
    evidence: Sheikh Hasina had governed since 2009 through three elections international observers and the opposition called neither free nor fair, the last held in January 2024 with no genuine opposition on the ballot.
  - kind: employment
    intensity: 75
    evidence: A reinstated quota reserved 30 percent of civil service posts for descendants of 1971 war veterans, in a country where the World Bank estimated roughly one in five young people were neither in school nor working.
  - kind: repression
    intensity: 90
    evidence: A UN human rights office review released in February 2025 estimated as many as 1,400 people were killed in the July-August 2024 crackdown, most by security forces.
