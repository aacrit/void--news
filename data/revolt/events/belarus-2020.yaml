success_factors:
  - factor_key: resistance_method
    label: Method of struggle
    framework: chenoweth
    status: Overwhelmingly nonviolent across six months of protest.
    direction: favors-movement
    base_rate: About 53 percent of nonviolent campaigns from 1900 to 2006 succeeded, versus about 26 percent for armed ones.
    rationale: Method was not the limiting factor; discipline held even as the crackdown escalated.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: '2020'
    confidence: high
  - factor_key: peak_participation
    label: Peak participation
    framework: chenoweth
    status: Plausibly at or above the commonly cited 3.5 percent threshold once nationwide, not just Minsk, turnout is counted.
    direction: favors-movement
    base_rate: No nonviolent campaign that mobilized at least 3.5 percent of the population at its peak had failed to achieve its stated aim, in the dataset built through 2006.
    rationale: Belarus 2020 is one of the clearest post-2006 test cases of whether that rule still holds when other conditions are absent; on the outcome to date, it did not hold here.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
      - 'Chenoweth, Civil Resistance: What Everyone Needs to Know (2021)'
    as_of: '2021'
    confidence: medium
  - factor_key: security_defection
    label: Did the security forces defect
    framework: chenoweth
    status: None. OMON and the KGB carried out mass detention and documented torture without a reported unit-level break.
    direction: favors-regime
    base_rate: Defection of the security forces is the single strongest predictor of a nonviolent campaign's success.
    rationale: Belarus is frequently cited as the counter-example showing that even a crossed-threshold, disciplined nonviolent campaign can fail without this variable.
    sources:
      - Nepstad, Nonviolent Revolutions (2011)
    as_of: '2021'
    confidence: high
  - factor_key: external_support
    label: The regime's foreign backing
    framework: chenoweth
    status: Russia backed Lukashenko financially and diplomatically through the crackdown, closing off any need to negotiate.
    direction: favors-regime
    base_rate: External patronage that removes a ruler's need to bargain correlates with lower odds of a nonviolent campaign's success.
    rationale: A besieged Lukashenko with no outside lender or guarantor would have faced far more pressure to negotiate an exit.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: '2021'
    confidence: medium
