legacy_points:
  - Produced the largest protests in Belarusian history and still did not move a security apparatus willing to detain more than 35,000 people.
  - Left Tsikhanouskaya leading an internationally recognized opposition-in-exile with no organized presence inside the country.
  - Pushed Lukashenko into closer dependence on Russia, including hosting Russian troops staged for the 2022 invasion of Ukraine.
