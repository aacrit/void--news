perspectives:
  - viewpoint: The 2020 protest movement
    viewpoint_type: movement
    region_origin: Minsk
    narrative: We did everything the textbooks say works. We stayed peaceful for six months against tear gas and worse. The count was taken in daylight and the world knew it. What we did not have was a single crack in the men who carried the batons.
    key_arguments:
      - Discipline and scale were both present; the missing variable was security-force loyalty.
      - The movement continues in exile, not as a defeat but as a paused campaign.
    sources: []
    notable_quotes: []
    emphasized:
      - The scale of detentions
      - Documented torture at Okrestina
    omitted:
      - Internal debate over strategy after the street movement was suppressed
  - viewpoint: The analyst
    viewpoint_type: academic
    region_origin: Global
    narrative: Belarus 2020 is the case researchers cite to show the 3.5 percent rule is a strong correlation, not a law. Nearly every favorable condition held. A security apparatus willing to jail tens of thousands, backed by an external patron with no interest in a negotiated exit, was enough to hold the state together anyway.
    key_arguments:
      - Belarus complicates any claim that crossing 3.5 percent guarantees success.
      - Foreign backing that removes the need to negotiate is a durable regime survival strategy.
    sources: []
    notable_quotes: []
    emphasized:
