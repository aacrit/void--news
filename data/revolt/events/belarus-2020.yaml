slug: belarus-2020
title: 'Belarus: The Uncounted Vote'
subtitle: Hundreds of thousands marched against a disputed election; the security forces held anyway
date_display: 2020 to present
date_start: 2020
date_precision: year
era: square-revolutions
region: europe
country: Belarus
revolt_type: democratic-uprising
status: dormant
summary: Alexander Lukashenko, in power since 1994, claimed 80 percent of the vote in the August 2020 presidential election against Sviatlana Tsikhanouskaya, a former English teacher who entered the race after authorities jailed or exiled the other opposition candidates. Independent exit polling and leaked precinct data suggested Tsikhanouskaya won. Hundreds of thousands marched in Minsk for months, the largest protests in Belarusian history. Security forces detained more than 35,000 people and the UN documented torture in detention; by early 2021 the street movement had been suppressed and Tsikhanouskaya was leading an opposition-in-exile from Lithuania.
significance: 'Belarus is a case in which nearly every condition the literature associates with a successful nonviolent transition was present, mass and sustained cross-class protest, a genuinely popular opposition candidate, wide international non-recognition of the result, except one: the security forces never broke. It shows the limits of participation-based models of nonviolent success when a ruler is willing to use unlimited detention and has an external guarantor.'
analytical_outlook: 'Lukashenko has governed since 2020 in closer dependence on Russia, including hosting Russian troops staged for the invasion of Ukraine, and claimed a seventh term in a January 2025 election Western governments dismissed as neither free nor fair. The movement persists as an exile government, a political prisoner population authorities periodically use as a bargaining chip, and a diaspora infrastructure, but it has no organized presence inside the country capable of forcing a reopening. Placement on the arc: a movement that reached a radical, near-insurrectionary phase and was pushed back into a prolonged, quiet suppression rather than reaching any form of consolidation.'
grievances:
  - kind: electoral
    intensity: 90
    evidence: Official results gave Lukashenko 80 percent; independent exit polling, leaked precinct tallies and the scale of the subsequent protests all contradicted the announced margin.
  - kind: political
    intensity: 85
    evidence: Lukashenko had governed since 1994 through elections opposition figures and Western observers repeatedly called neither free nor fair.
  - kind: repression
    intensity: 88
    evidence: More than 35,000 people were detained in the months after the election; the UN documented systematic torture, including beatings, at the Okrestina detention center in Minsk.
repression_level: severe
actors:
  - actor_type: masses
    name: The Sunday marchers
    description: Weekly marches that drew an estimated 100,000 to 200,000 people in Minsk at their August-September 2020 peak, alongside women's chain protests and workplace strikes.
    role_in_arc: Sustained the largest and most consistently nonviolent protest wave in Belarusian history for roughly six months.
    defected: false
  - actor_type: vanguard
    name: Sviatlana Tsikhanouskaya and the Coordination Council
    description: Tsikhanouskaya, a former English teacher who ran after her husband was jailed, and the council formed to negotiate a transfer of power.
    role_in_arc: Provided the movement's public leadership and, after exile, an internationally recognized opposition government.
    defected: false
  - actor_type: security-forces
    name: OMON riot police and the KGB
    description: Belarus's internal security services, which retained the Soviet-era name KGB.
    role_in_arc: Carried out mass detention and documented torture without any reported unit-level defection.
    defected: false
  - actor_type: foreign-intervener
    name: Russia
    description: Moscow backed Lukashenko diplomatically and financially through the crackdown and after.
    role_in_arc: Removed any prospect that Lukashenko would need to negotiate, and deepened Belarus's dependence on Russia afterward.
    defected: false
tactics:
