success_factors:
  - factor_key: security-force-defection
    label: Security force defection is the single strongest predictor of rapid regime collapse
    framework: chenoweth
    status: confirmed
    direction: favors-movement
    base_rate: Movements that achieve security force defection succeed at markedly higher rates than those that do not, across the cross-national record
    rationale: The coup succeeded because it was carried out by the military itself, not because the military had to be persuaded to abandon a regime it still defended.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: nonviolent-success-rate
    label: Low-violence campaigns succeed more often than armed ones
    framework: chenoweth
    status: confirmed
    direction: favors-movement
    base_rate: Nonviolent campaigns succeed roughly 53% of the time historically, versus about 26% for armed campaigns
    rationale: A near-bloodless outcome, four deaths, matches the historical pattern that low-violence transitions succeed at markedly higher rates.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: incumbent-coercive-exhaustion
    label: Prolonged external conflict can exhaust an incumbent's coercive apparatus before a challenger even appears
    framework: goldstone
    status: confirmed
    direction: favors-movement
    base_rate: An incumbent regime whose coercive apparatus is exhausted by prolonged external conflict is structurally vulnerable to even a small, well-organized internal challenge
    rationale: Thirteen years of colonial war had already broken the officer corps' loyalty to the regime before a single carnation was placed in a rifle.
    sources:
      - 'Goldstone, Revolutions: A Very Short Introduction (2014)'
