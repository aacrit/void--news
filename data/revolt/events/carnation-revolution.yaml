slug: carnation-revolution
title: The Carnation Revolution
subtitle: An army coup ends a dictatorship before breakfast, and a nation answers with flowers
date_display: April 1974
date_start: 1974
date_end: 1974
date_precision: year
era: people-power
region: europe
country: Portugal
revolt_type: democratic-uprising
status: concluded
summary: Junior army officers exhausted by thirteen years of colonial war in Angola, Mozambique, and Guinea-Bissau seized Lisbon's key installations before dawn on April 25, 1974. Civilians filled the streets within hours, putting carnations into soldiers' rifle barrels, and the forty-eight-year-old Estado Novo dictatorship collapsed by nightfall with fewer than five deaths.
significance: One of the fastest and least violent authoritarian collapses of the twentieth century, driven almost entirely by the military itself rather than by prior mass civilian mobilization, and a direct trigger for the rapid decolonization of Portugal's African territories.
grievances:
  - kind: Colonial war exhaustion
    intensity: 88
    evidence: Portugal had fought simultaneous colonial wars in Angola, Mozambique, and Guinea-Bissau since 1961, consuming an estimated 40 percent of the state budget by the early 1970s.
  - kind: Officer promotion grievance
    intensity: 60
    evidence: A 1973 decree allowed conscript militia officers to gain seniority over career officers with equivalent combat service, angering the professional officer corps that would form the Armed Forces Movement.
  - kind: Decades of political repression
    intensity: 65
    evidence: The Estado Novo's secret police, the PIDE, had operated since the 1930s, suppressing opposition parties and a free press for longer than most Portuguese citizens had been alive.
actors:
  - actor_type: military-defectors
    name: The Armed Forces Movement
    description: A clandestine network of junior and mid-ranking officers frustrated by the colonial wars and promotion policy.
    role_in_arc: Planned and executed the coup, seizing radio stations, the airport, and government buildings within hours on April 25, 1974.
    defected: true
  - actor_type: masses
    name: Lisbon civilians
    description: Residents who filled the streets once word of the coup spread on the morning of April 25.
    role_in_arc: Placed carnations in soldiers' rifle barrels and uniforms, giving the revolution its name and helping deter any violent response.
    defected: false
  - actor_type: old-regime
    name: Marcelo Caetano
    description: Prime Minister and head of the Estado Novo government since 1968.
    role_in_arc: Surrendered to Armed Forces Movement units at the Carmo barracks on the evening of April 25 and was flown into exile.
    defected: false
  - actor_type: security-forces
    name: PIDE secret police
    description: The regime's political police force.
    role_in_arc: Fired the coup's only fatal shots from its Lisbon headquarters, killing four civilians before surrendering.
    defected: false
tactics:
  - tactic_type: defection-fraternization
    description: The coup was carried out by serving army units themselves refusing to defend the regime, the decisive act rather than a supporting one.
    prominence: primary
  - tactic_type: occupation
    description: Armed Forces Movement units seized the national radio and television stations, the airport, and government ministries within hours of the coup's start.
    prominence: primary
  - tactic_type: mass-demonstration
    description: Spontaneous crowds filled central Lisbon within hours, physically surrounding army vehicles in celebration rather than confrontation.
    prominence: secondary
resistance_type: nonviolent
