perspectives:
  - viewpoint: Armed Forces Movement officer view
    viewpoint_type: military
    region_origin: Portugal
    narrative: The war in Africa could not be won militarily and the regime could not be reformed from within, leaving the army itself as the only institution capable of ending both at once.
    key_arguments:
      - Colonial war casualties and budget strain had become unsustainable by 1973
      - Officers who had served multiple African tours concluded no military victory was achievable
      - Reform attempts within the Estado Novo's own structures had repeatedly failed
    sources: []
    notable_quotes: []
    emphasized:
      - colonial war exhaustion
      - officer testimony from multiple African tours
    omitted:
      - the retornado settler displacement that followed decolonization
      - PREC-era political instability
  - viewpoint: Retornado settler view
    viewpoint_type: diaspora
    region_origin: Portugal, Angola, and Mozambique
    narrative: Over half a million settlers were displaced from Angola and Mozambique within months of the coup, a rupture rarely centered in the celebratory national memory of April 25.
    key_arguments:
      - Decolonization's speed left little time for an orderly settler transition
      - Many retornados arrived in Portugal with only what they could carry
      - Their displacement is often treated as a footnote to the coup's domestic celebration
    sources: []
    notable_quotes: []
    emphasized:
      - the speed of the settler exodus
      - economic hardship on arrival in Portugal
    omitted:
      - the colonial war's cost to Angolan and Mozambican populations
      - the democratic gains that followed in Portugal itself
