slug: chinese-cultural-revolution
title: The Chinese Cultural Revolution
subtitle: A chairman mobilizes the young against his own party to reclaim it
date_display: 1966-1976
date_start: 1966
date_end: 1976
date_precision: year
era: anticolonial
region: east-asia
country: China
revolt_type: communist
status: concluded
summary: Weakened politically after the Great Leap Forward's famine, Mao Zedong called on students to attack his own party's bureaucracy as insufficiently revolutionary. Red Guards denounced, imprisoned, and in many cases killed officials, teachers, and each other in factional violence for a decade, until Mao's death and the arrest of the Gang of Four ended the campaign in 1976.
significance: 'A rare case of a revolution turned inward: the ruling party of an already-consolidated communist state used mass mobilization against its own institutions, at a human cost historians and the CCP''s own 1981 party resolution both count in the millions.'
grievances:
  - kind: Mao's diminished political authority
    intensity: 85
    evidence: The Great Leap Forward's 1959-1961 famine, estimated to have killed between 15 and 45 million people, left Mao politically sidelined within the party leadership by the mid-1960s.
  - kind: Perceived bourgeois restoration within the party
    intensity: 75
    evidence: Mao and his allies accused senior officials including Liu Shaoqi of reintroducing material incentives and easing collectivization after the famine, framing this as a retreat from revolutionary principle.
  - kind: Generational resentment of entrenched officials
    intensity: 60
    evidence: Urban students facing limited advancement under an increasingly bureaucratic party structure responded readily to Mao's call to challenge officials as insufficiently revolutionary.
actors:
  - actor_type: vanguard
    name: Mao Zedong
    description: CCP Chairman, initiator of the campaign.
    role_in_arc: Issued the May 1966 circular launching the campaign and used mass youth mobilization to sideline rivals within the party leadership.
    defected: false
  - actor_type: students-youth
    name: Red Guards
    description: Student and youth militants organized into factions across Chinese cities.
    role_in_arc: Denounced, humiliated, and in many cases physically attacked officials, teachers, and rival Red Guard factions between 1966 and 1968.
    defected: false
  - actor_type: old-regime
    name: Liu Shaoqi
    description: President of China and senior party official.
    role_in_arc: Denounced as a 'capitalist roader,' stripped of position, and died in custody in 1969 without medical treatment.
    defected: false
  - actor_type: security-forces
    name: The People's Liberation Army under Lin Biao
    description: The military, which Mao relied on to eventually restore order after factional Red Guard violence spiraled.
    role_in_arc: Enforced the 1968 'Down to the Countryside' campaign that dispersed millions of urban youth to rural labor, then Lin Biao himself fell from power and died in 1971.
    defected: false
  - actor_type: vanguard
    name: The Gang of Four
    description: Jiang Qing, Mao's wife, and three allied officials who directed much of the campaign's later ideological enforcement.
    role_in_arc: Arrested within a month of Mao's death in 1976, formally ending the Cultural Revolution.
    defected: false
tactics:
  - tactic_type: mass-demonstration
    description: Red Guard rallies in Tiananmen Square drew crowds estimated near a million at their August 1966 peak.
    prominence: primary
  - tactic_type: sabotage
    description: The campaign against the 'Four Olds' destroyed temples, historical sites, books, and artifacts judged insufficiently revolutionary.
    prominence: primary
  - tactic_type: urban-uprising
    description: Rival Red Guard factions fought each other in city streets through 1967 and 1968, at times with seized weapons, before the army intervened.
    prominence: secondary
resistance_type: hybrid
