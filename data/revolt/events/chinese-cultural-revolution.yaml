success_factors:
  - factor_key: leader-mobilizes-against-elite
    label: A leader can mobilize mass campaigns to bypass institutional rivals within his own regime
    framework: skocpol
    status: atypical
    direction: favors-regime
    base_rate: Skocpol's framework generally treats elite fracture as a challenge to regime survival, but China's case shows a ruling figure can also engineer mass mobilization to defeat internal elite rivals while leaving the regime nominally intact
    rationale: Mao used Red Guard mobilization to remove Liu Shaoqi and other party rivals without ever ceding the CCP's monopoly on power, an intra-regime purge rather than a regime-versus-challenger contest.
    sources:
      - Skocpol, States and Social Revolutions (1979)
  - factor_key: revolution-consumes-its-agents
    label: Movements that mobilize radical youth cadres often discard them once their purpose is served
    framework: brinton
    status: confirmed
    direction: favors-regime
    base_rate: Brinton's comparative model finds revolutionary regimes repeatedly mobilize and then abandon or suppress their most radical enforcers once the leadership's position is secure
    rationale: Red Guards who denounced officials on Mao's behalf in 1966-67 were themselves dispersed to rural labor by 1968 once their usefulness to the center had passed.
    sources:
      - Brinton, The Anatomy of Revolution (1938)
  - factor_key: elite-fracture-within-party
    label: Elite fracture inside a single ruling party can substitute for fracture between regime and opposition
    framework: goldstone
    status: confirmed
    direction: indeterminate
    base_rate: Goldstone's framework notes that state crises can originate from fracture within a ruling coalition, not only from external challengers, with outcomes ranging from purge to regime collapse depending on how the fracture resolves
    rationale: The Lin Biao affair in 1971, a fracture between Mao and his own designated successor, shows the instability could have widened into a broader regime crisis had it not been contained within the top leadership.
    sources:
      - 'Goldstone, Revolutions: A Very Short Introduction (2014)'
