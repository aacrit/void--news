perspectives:
  - viewpoint: CCP post-1981 official assessment
    viewpoint_type: regime
    region_origin: China
    narrative: The party's own 1981 resolution acknowledges the decade as a grave error driven chiefly by Mao's misjudgment, while crediting the party's capacity for self-correction under Deng Xiaoping's subsequent reforms.
    key_arguments:
      - The 1981 resolution assigns chief responsibility to Mao while preserving his broader historical standing
      - The campaign's chaos and economic disruption justified the post-1978 turn toward stability and reform
      - The party's ability to reverse course is presented as evidence of institutional resilience
    sources: []
    notable_quotes: []
    emphasized:
      - the 1981 resolution's formal verdict
      - the subsequent reform era's economic gains
    omitted:
      - the scale of individual suffering during denunciation campaigns
      - the party's own role in organizing and directing Red Guard violence
  - viewpoint: Former Red Guard participant retrospective
    viewpoint_type: diaspora
    region_origin: China
    narrative: Many who joined as teenagers describe genuine revolutionary idealism mixed with the ordinary pressures of youth conformity, followed by disillusionment once they themselves were sent to rural labor and their leaders discarded them.
    key_arguments:
      - Participation often blended sincere ideological belief with fear of being labeled insufficiently revolutionary
      - The 1968 rustication campaign abruptly ended many participants' education and urban lives
      - Retrospective accounts frequently describe both agency in denouncing others and later victimization by the same system
    sources: []
    notable_quotes: []
    emphasized:
      - personal accounts of rustication
      - the gap between initial idealism and later disillusionment
    omitted:
      - systematic tallies of the campaign's total death toll
      - top-level factional politics driving the campaign's timing
