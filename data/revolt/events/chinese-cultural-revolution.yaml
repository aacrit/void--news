death_toll: Estimates for direct deaths from violence, persecution, and forced-labor conditions range from roughly 1.5 to 2 million, with tens of millions more affected by denunciation, imprisonment, or rural exile; the CCP's own 1981 party resolution called the decade a catastrophe.
