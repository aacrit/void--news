success_factors:
  - factor_key: protracted-base-strategy
    label: Protracted base-area guerrilla strategy can outlast the standard armed-campaign timeline
    framework: tilly
    status: confirmed
    direction: favors-movement
    base_rate: Tilly's mobilization framework identifies durable base-area control and repeated resource extraction cycles as a mechanism by which weaker challengers outlast stronger incumbents over long timeframes
    rationale: The CCP survived nearly a decade of Nationalist encirclement and a further eight years of Japanese occupation before its final, comparatively short, 1946-1949 offensive.
    sources:
      - Tilly, From Mobilization to Revolution (1978)
  - factor_key: occupation-weakens-incumbent
    label: Foreign occupation of the incumbent's territory can erode its coercive capacity
    framework: goldstone
    status: confirmed
    direction: favors-movement
    base_rate: Goldstone's comparative cases find that a foreign occupation absorbing an incumbent regime's military resources often benefits an internal challenger indirectly, distinct from foreign backing given directly to the challenger
    rationale: Japan's occupation devastated Kuomintang-held industrial and agricultural regions far more than CCP base areas, leaving Chiang's postwar army poorly supplied relative to the CCP's.
    sources:
      - 'Goldstone, Revolutions: A Very Short Introduction (2014)'
  - factor_key: agrarian-mass-mobilization
    label: Land redistribution mobilized a peasant base beyond narrow elite politics
    framework: skocpol
    status: confirmed
    direction: favors-movement
    base_rate: Skocpol's account of the Chinese case specifically identifies peasant mobilization through land reform in liberated zones as decisive to the CCP's eventual military manpower advantage
    rationale: CCP-controlled areas redistributed land to tenant farmers years before national victory, generating both recruits and logistical support that a purely urban movement could not have matched.
    sources:
      - Skocpol, States and Social Revolutions (1979)
