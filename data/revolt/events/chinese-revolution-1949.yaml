slug: chinese-revolution-1949
title: The Chinese Communist Revolution
subtitle: Twenty-two years of civil war end with a proclamation in Tiananmen Square
date_display: 1927-1949
date_start: 1927
date_end: 1949
date_precision: year
era: anticolonial
region: east-asia
country: China
revolt_type: communist
status: concluded
summary: Chiang Kai-shek's 1927 purge of his communist allies in Shanghai forced the Chinese Communist Party into rural exile, where it built peasant support through land reform and outlasted both a Nationalist encirclement and a Japanese occupation before defeating the Kuomintang in a final four-year civil war.
significance: The largest communist revolution to succeed anywhere, founding the world's most populous state under one-party rule and permanently dividing China from the Nationalist government that fled to Taiwan.
grievances:
  - kind: Landlord exploitation of tenant farmers
    intensity: 80
    evidence: Tenant farmers across much of China paid rents as high as 50 percent of their harvest to landlords, leaving many families without enough grain to survive a poor season.
  - kind: Kuomintang corruption and warlordism
    intensity: 65
    evidence: The 1927 Shanghai massacre killed thousands of communists and allied labor organizers as Chiang Kai-shek consolidated Nationalist power through allied warlord militias.
  - kind: Japanese occupation devastation
    intensity: 75
    evidence: Japan's occupation from 1931 to 1945 killed an estimated 15 to 20 million Chinese and devastated the industrial base the Kuomintang depended on for its army.
  - kind: Hyperinflation collapse
    intensity: 70
    evidence: Kuomintang currency lost most of its value between 1947 and 1949, wiping out urban middle-class savings and eroding support for Chiang's government in its final years.
actors:
  - actor_type: vanguard
    name: Mao Zedong
    description: Chairman of the Chinese Communist Party from the 1930s.
    role_in_arc: Led the Long March retreat in 1934-35, built the Yan'an base area, and proclaimed the People's Republic of China on October 1, 1949.
    defected: false
  - actor_type: masses
    name: The Red Army and peasant base
    description: Communist military forces recruited heavily from landless and land-poor peasants who benefited from CCP land redistribution in liberated zones.
    role_in_arc: Provided the manpower that outlasted Kuomintang encirclement campaigns and eventually overwhelmed Nationalist forces in the 1948-49 civil war offensives.
    defected: false
  - actor_type: old-regime
    name: Chiang Kai-shek
    description: Leader of the Kuomintang Nationalist government.
    role_in_arc: Purged communist allies in 1927, fought the Japanese occupation, then lost the renewed civil war and retreated to Taiwan in December 1949.
    defected: false
  - actor_type: foreign-intervener
    name: Imperial Japan
    description: Occupying power in northern and eastern China from 1931 to 1945.
    role_in_arc: Devastated Kuomintang-held territory and industry, indirectly weakening the Nationalist government's postwar capacity relative to the communists.
    defected: false
tactics:
  - tactic_type: guerrilla-warfare
    description: The Long March retreat and Yan'an base-area strategy preserved CCP forces through Kuomintang encirclement campaigns in the early 1930s.
    prominence: primary
  - tactic_type: parallel-institutions
    description: Land redistribution and local governance in CCP-controlled liberated zones built peasant loyalty years before the final military victory.
    prominence: primary
  - tactic_type: armed-insurgency
    description: Conventional battles in the 1946-1949 civil war, including the Huaihai and Liaoshen campaigns, destroyed the bulk of Nationalist field armies.
    prominence: secondary
resistance_type: armed
