perspectives:
  - viewpoint: CCP official historiography
    viewpoint_type: regime
    region_origin: China
    narrative: The revolution liberated China from a century of foreign imperialism, warlordism, and landlord exploitation, uniting a fractured country under a government finally answerable to its peasant majority.
    key_arguments:
      - Land reform ended centuries of landlord exploitation for hundreds of millions of tenant farmers
      - The revolution ended a century of foreign concessions and unequal treaties dating to the Opium Wars
      - National unification ended decades of warlordism and civil fragmentation
    sources: []
    notable_quotes:
      - text: The Chinese people have stood up.
        speaker: Mao Zedong
        context: Widely cited framing of the October 1, 1949 proclamation
    emphasized:
      - land reform's scale
      - the end of foreign concessions
    omitted:
      - the death toll of the civil war and subsequent political campaigns
      - the loss of political pluralism under one-party rule
  - viewpoint: Kuomintang and Taiwan exile view
    viewpoint_type: diaspora
    region_origin: Taiwan
    narrative: The communist victory was a national tragedy that ended the Republic of China's project of modernizing democracy on the mainland, driving millions into exile and dividing families across the strait for generations.
    key_arguments:
      - The Republic of China had already begun constitutional reforms before the civil war interrupted them
      - Communist land reform in later decades produced its own severe famines and violence
      - Millions of mainlanders fled to Taiwan rather than live under the new government
    sources: []
    notable_quotes: []
    emphasized:
      - the disruption of the Republic's constitutional project
      - the scale of postwar displacement to Taiwan
    omitted:
      - Kuomintang corruption and hyperinflation in the war's final years
      - the Kuomintang's own record of political repression before 1949
