summary: On 11 July 2021, in the town of San Antonio de los Banos outside Havana, residents facing months of blackouts and shortages amid the pandemic and a collapsing economy took to the streets. Video spread within hours and protests reached dozens of towns and cities the same day, the broadest demonstrations in Cuba since the 1959 revolution. President Miguel Diaz-Canel called on 'revolutionaries' to confront the protesters and blamed the unrest on the United States embargo. Security forces and mobilized civilian groups moved through the night; by the following week more than 1,000 people had been detained, with hundreds later sentenced to years in prison.
significance: 11J, as the date is known in Cuba, was the first protest movement in more than six decades of Communist Party rule to spread nationwide in a single day without a central organizing committee, using cellphone internet access the government had only permitted since 2018. It tested whether decades-old single-party control could survive the same social media dynamics that reshaped protest elsewhere, and it largely held.
analytical_outlook: 'The government''s response, mass arrest, harsh sentencing and periodic internet shutdowns during later flashpoints, has kept protest episodic rather than sustained. Emigration, not confrontation, has been the dominant response since: hundreds of thousands of Cubans left in the years after 11J, one of the largest exoduses in the country''s history. Placement on the arc: a single-day spark that reached a brief radical peak and was suppressed before any dual-power or negotiating phase could form.'
