legacy_points:
  - Produced the broadest single-day protest movement in Cuba since 1959, reaching dozens of towns within hours over cellphone networks.
  - Ended in mass arrest and sentencing rather than negotiation; more than 1,000 people were detained within the following week.
  - Was followed by one of the largest waves of Cuban emigration in the country's history rather than a renewed protest cycle.
