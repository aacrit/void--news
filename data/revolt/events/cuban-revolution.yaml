success_factors:
  - factor_key: hybrid-tactics
    label: Combining guerrilla and urban sabotage tactics can outperform either alone
    framework: chenoweth
    status: confirmed
    direction: favors-movement
    base_rate: Armed campaigns succeed in roughly 26% of historical cases; hybrid campaigns pairing rural guerrilla war with urban sabotage networks fracture regime morale on multiple fronts at once
    rationale: The Sierra Maestra guerrilla campaign alone controlled only rural territory, but combined with the Havana and Santiago underground, it steadily eroded Batista's urban support base as well.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: security-force-defection
    label: Security force defection is the strongest single predictor of rapid collapse
    framework: chenoweth
    status: confirmed
    direction: favors-movement
    base_rate: Movements that achieve late-stage defection among an incumbent's own conscript forces succeed at markedly higher rates than those facing a fully loyal military
    rationale: Batista's 40,000-strong army suffered mass desertions in December 1958 after repeated battlefield defeats, leaving him with no force willing to defend Havana.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: foreign-backing-withdrawal
    label: Withdrawal of foreign backing from an incumbent can weaken it as much as backing a challenger
    framework: goldstone
    status: atypical
    direction: favors-movement
    base_rate: The literature more often finds that foreign material backing GIVEN to a challenger correlates with weaker post-victory institutions; Cuba's case instead shows withdrawal of backing FROM the incumbent accelerating its collapse
    rationale: A US arms embargo imposed on Batista in March 1958 reduced his government's coercive capacity in the campaign's final, decisive months.
    sources:
      - 'Goldstone, Revolutions: A Very Short Introduction (2014)'
