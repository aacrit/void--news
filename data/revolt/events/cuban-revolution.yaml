slug: cuban-revolution
title: The Cuban Revolution
subtitle: Eighty-two guerrillas land in a rowboat and topple a dictator in six years
date_display: 1953-1959
date_start: 1953
date_end: 1959
date_precision: year
era: anticolonial
region: americas
country: Cuba
revolt_type: communist
status: concluded
summary: Fidel Castro's failed 1953 attack on the Moncada Barracks became the founding date of a movement that regrouped in Mexico, landed 82 fighters from the yacht Granma in 1956, and fought a guerrilla campaign from the Sierra Maestra mountains that combined with an urban underground and a collapsing army to drive Batista from power in six years.
significance: Established the first Marxist-Leninist government in the Western Hemisphere, ninety miles from the United States, and made the Sierra Maestra guerrilla model a template studied and imitated across Latin America and Africa for decades.
grievances:
  - kind: Batista's 1952 coup
    intensity: 80
    evidence: Fulgencio Batista seized power in a March 1952 coup that canceled scheduled elections he was expected to lose, ending any near-term path to change at the ballot box.
  - kind: Foreign ownership of the sugar economy
    intensity: 65
    evidence: US-based companies owned an estimated 40 percent of Cuba's sugar-producing land by the early 1950s, concentrating the island's main export industry in foreign hands.
  - kind: Police repression under Batista
    intensity: 75
    evidence: Batista's secret police, the SIM, tortured and killed an estimated several thousand suspected opponents over the course of his rule, radicalizing broad sections of Cuban society against him.
actors:
  - actor_type: vanguard
    name: Fidel Castro
    description: Lawyer and leader of the 26th of July Movement.
    role_in_arc: Led the failed 1953 Moncada attack, organized the 1956 Granma landing, and commanded the Sierra Maestra guerrilla campaign to victory.
    defected: false
  - actor_type: military-defectors
    name: Che Guevara
    description: Argentine physician who joined Castro's movement in Mexico.
    role_in_arc: Commanded rebel columns including the decisive Battle of Santa Clara in December 1958 that cut the island in two.
    defected: false
  - actor_type: old-regime
    name: Fulgencio Batista
    description: President of Cuba after his 1952 coup.
    role_in_arc: Fled Cuba by plane on January 1, 1959, as rebel forces and mass army desertions closed in on Havana.
    defected: false
  - actor_type: organized-labor
    name: The urban underground
    description: 26th of July Movement cells operating in Havana and Santiago de Cuba.
    role_in_arc: Carried out sabotage and organized a partially successful April 1958 general strike, complementing the rural guerrilla campaign.
    defected: false
  - actor_type: security-forces
    name: Batista's conscript army
    description: Cuba's roughly 40,000-strong military.
    role_in_arc: Suffered mass desertions in the final weeks of 1958 after repeated defeats, collapsing the regime's last coercive instrument.
    defected: true
tactics:
  - tactic_type: guerrilla-warfare
    description: The Sierra Maestra campaign built rebel-controlled rural territory from a landing force of just a dozen survivors in late 1956.
    prominence: primary
  - tactic_type: sabotage
    description: Urban underground cells in Havana and Santiago carried out bombings and arson against Batista-aligned infrastructure and businesses.
    prominence: primary
  - tactic_type: general-strike
    description: An April 1958 general strike call achieved only partial participation, exposing the limits of the urban wing relative to the rural guerrilla campaign.
    prominence: secondary
resistance_type: armed
