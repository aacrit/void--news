perspectives:
  - viewpoint: Cuban revolutionary official view
    viewpoint_type: regime
    region_origin: Cuba
    narrative: The revolution ended a corrupt dictatorship propped up by foreign capital and delivered literacy, healthcare, and national sovereignty to a population long treated as a dependent economy of the United States.
    key_arguments:
      - Batista's government was a dictatorship maintained through torture and canceled elections
      - US corporate ownership of Cuban sugar land represented a loss of national economic sovereignty
      - Post-revolution literacy and healthcare gains are measurable and durable
    sources: []
    notable_quotes: []
    emphasized:
      - the literacy campaign
      - US corporate landholding before 1959
    omitted:
      - the one-party political system installed after 1959
      - the scale of political imprisonment under the new government
  - viewpoint: Cuban exile diaspora view
    viewpoint_type: diaspora
    region_origin: Miami, United States
    narrative: A revolution that promised a return to Cuba's 1940 constitution and free elections instead consolidated into a one-party state, driving hundreds of thousands into exile and nationalizing private property without compensation.
    key_arguments:
      - Castro postponed and then abandoned the promised elections of the 26th of July Movement's original platform
      - Nationalization without compensation devastated the Cuban middle class and professional sectors
      - Ongoing one-party rule and political imprisonment contradict the revolution's original democratic rhetoric
    sources: []
    notable_quotes: []
    emphasized:
      - the abandoned 1940 constitution promise
      - mass emigration after 1959
    omitted:
      - the scale of Batista-era repression that preceded the revolution
      - material gains among Cuba's rural poor after 1959
