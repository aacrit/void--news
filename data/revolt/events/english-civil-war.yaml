    t_start: 0.22
    t_end: 0.34
    intensity: 65
    reached: true
    summary: Charles's failed attempt to arrest five MPs in the Commons chamber destroys any remaining trust between crown and Parliament.
    key_events:
      - Charles attempts to arrest five MPs, January 4, 1642
      - Charles raises his standard at Nottingham, August 22, 1642
  - phase: moderate-phase
    label: The first civil war
    t_start: 0.34
    t_end: 0.48
    intensity: 70
    reached: true
    summary: Parliament fights to force concessions from the king rather than to remove him outright, forming the New Model Army to professionalize the effort.
    key_events:
      - Battle of Marston Moor, July 1644
      - New Model Army formed, 1645
      - Battle of Naseby, June 1645
  - phase: dual-power
    label: King in captivity, army in the streets
    t_start: 0.48
    t_end: 0.6
    intensity: 60
    reached: true
    summary: Charles, defeated but still king, negotiates simultaneously with Parliament, the army, and the Scots, while the New Model Army grows radicalized and unpaid.
    key_events:
      - Charles surrenders to the Scots, 1646
      - Charles handed to Parliament, 1647
      - Second Civil War, 1648
  - phase: radical-phase
    label: Pride's Purge and the trial
    date_start: '1648-12-06'
    t_start: 0.6
    t_end: 0.72
    intensity: 90
    reached: true
    summary: Colonel Pride's soldiers physically bar MPs unwilling to try the king from entering Parliament, and the remaining Rump tries and executes Charles weeks later.
    key_events:
      - Pride's Purge, December 6, 1648
      - Charles I tried, January 1649
      - Charles I executed, January 30, 1649
  - phase: thermidor
    label: Protectorate to Restoration
    t_start: 0.84
    t_end: 0.92
    intensity: 55
    reached: true
    summary: Cromwell's Commonwealth hardens into a personal Protectorate that looks increasingly like the monarchy it replaced, and collapses within two years of his death.
    key_events:
      - Cromwell becomes Lord Protector, 1653
      - Cromwell dies, 1658
      - Charles II restored, May 1660
