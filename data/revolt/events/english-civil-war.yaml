perspectives:
  - viewpoint: Parliamentary constitutionalist
    viewpoint_type: revolutionary
    region_origin: England
    narrative: Charles's claim to rule by divine right without Parliament's consent was itself the illegal act; the war and the trial enforced a law the king had already broken.
    key_arguments:
      - Eleven years of taxation without consent violated ancient parliamentary privilege
      - The king's attempted arrest of MPs in their own chamber was the true rupture
      - Trying the king held the crown accountable to law for the first time
    sources: []
    notable_quotes:
      - text: I am a martyr of the people.
        speaker: Charles I
        context: Reported final words on the scaffold, January 30, 1649
    emphasized:
      - ship money and prerogative taxation
      - the five members
    omitted:
      - the scale of civilian death from disease and requisition
      - Leveller demands the Parliamentary leadership itself suppressed
  - viewpoint: Royalist and later Restoration apologist
    viewpoint_type: counter-revolutionary
    region_origin: England
    narrative: The war destroyed a functioning constitutional balance and replaced it with a decade of military rule under Cromwell no more accountable than the king it deposed, vindicating the 1660 return to monarchy.
    key_arguments:
      - Regicide was an unprecedented and unlawful act regardless of Charles's failings
      - The Protectorate's rule by major-generals was itself a military dictatorship
      - Popular relief at the Restoration shows the republic had lost its own legitimacy
    sources: []
    notable_quotes: []
    emphasized:
      - the disorder and taxation of the Protectorate years
      - the popular welcome given Charles II in 1660
    omitted:
      - Charles I's own record of ruling without Parliament for eleven years
      - the durable gains Parliament kept even after 1660
