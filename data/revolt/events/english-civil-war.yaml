slug: english-civil-war
title: The English Civil War
subtitle: Parliament tries a king for treason against his own kingdom
date_display: 1642-1651
date_start: 1642
date_end: 1651
date_precision: year
era: atlantic
region: europe
country: England
revolt_type: political
status: concluded
summary: Three linked wars between Charles I and Parliament ended in regicide, an eleven-year republic under Cromwell, and then a restoration in 1660 that put Charles's son back on the same throne the war had been fought to constrain.
significance: 'The first time an English king was tried and publicly executed by his own subjects. The monarchy returned within a generation, but it returned changed: never again would a king rule for eleven years without Parliament.'
grievances:
  - kind: Unilateral taxation without Parliament
    intensity: 80
    evidence: Charles ruled for eleven years, 1629 to 1640, without summoning Parliament, funding his government through expedients like ship money extended to inland counties that had never paid it before.
  - kind: Religious imposition
    intensity: 72
    evidence: Archbishop Laud's 1637 attempt to impose a new prayer book on Scotland triggered the Bishops' Wars, forcing Charles to recall Parliament to raise funds.
  - kind: Attempted arrest of sitting MPs
    intensity: 85
    evidence: On January 4, 1642, Charles entered the House of Commons with armed men to arrest five members, finding they had already fled; the breach of parliamentary privilege made compromise nearly impossible.
actors:
  - actor_type: old-regime
    name: Charles I
    description: King of England, Scotland, and Ireland since 1625.
    role_in_arc: Raised his standard at Nottingham in August 1642, was defeated in two wars, tried, and executed in January 1649.
    defected: false
  - actor_type: vanguard
    name: Oliver Cromwell
    description: Member of Parliament turned cavalry commander, then Lord Protector.
    role_in_arc: Built the New Model Army's disciplined cavalry, pushed the regicide through, and ruled as Protector from 1653 until his death in 1658.
    defected: false
  - actor_type: military-defectors
    name: The New Model Army
    description: Parliament's reorganized 1645 fighting force, recruited and promoted on merit rather than aristocratic rank.
    role_in_arc: Won the war for Parliament, then turned on Parliament itself, purging it in 1648 to clear the way for the king's trial.
    defected: false
  - actor_type: counter-revolutionaries
    name: Levellers
    description: A radical faction within the army and London demanding wider suffrage and legal equality.
    role_in_arc: Pushed the revolution further than its own leadership wanted; suppressed by Cromwell at Burford in 1649.
    defected: false
  - actor_type: old-regime
    name: Charles II
    description: Son of Charles I, exiled after his father's execution.
    role_in_arc: Restored to the throne in 1660 after the Protectorate collapsed under his cousin Richard Cromwell.
    defected: false
tactics:
  - tactic_type: armed-insurgency
    description: Set-piece battles across three linked wars, Edgehill, Marston Moor, Naseby, decided the conflict on the battlefield rather than through negotiation.
    prominence: primary
  - tactic_type: parallel-institutions
    description: Parliament raised its own taxes, army, and administration in direct competition with the king's court, functioning as a rival government years before the war ended.
    prominence: primary
  - tactic_type: mass-demonstration
    description: London crowds and petitions, including the 1641 Root and Branch petition against bishops, pressured Parliament toward confrontation before fighting began.
    prominence: secondary
resistance_type: armed
phases:
  - phase: old-regime-crisis
    label: Eleven years without Parliament
    t_start: 0
    t_end: 0.12
    intensity: 45
    reached: true
    summary: Charles governs without Parliament from 1629, funding the crown through prerogative revenue until the Bishops' Wars force him to recall it in 1640.
    key_events:
      - Personal Rule begins, 1629
      - Bishops' Wars begin, 1639
      - Long Parliament summoned, November 1640
  - phase: the-spark
    label: The five members
