success_factors:
  - factor_key: armed-campaign-base-rate
    label: Armed campaigns win at lower and less durable rates
    framework: chenoweth
    status: partial
    direction: indeterminate
    base_rate: Armed campaigns succeed in imposing lasting change in roughly 26% of historical cases, well under nonviolent campaigns' 53%
    rationale: Parliament's army won every battle that mattered, yet the republic it produced lasted barely a decade before the monarchy it fought to constrain returned largely intact.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: revolution-consumes-radicals
    label: Revolutionary coalitions purge their own radical wing
    framework: brinton
    status: confirmed
    direction: favors-regime
    base_rate: Crane Brinton's comparative model identifies a recurring terror-and-virtue phase in which a revolution turns on its own extremists before a Thermidorian reaction restores order
    rationale: Cromwell suppressed the Levellers at Burford in 1649, the same year he helped execute the king, and the Protectorate he then built drifted back toward one-man rule.
    sources:
      - Brinton, The Anatomy of Revolution (1938)
  - factor_key: elite-fracture
    label: Elite fracture opens the crisis, elite reunification closes it
    framework: skocpol
    status: confirmed
    direction: indeterminate
    base_rate: Skocpol's structural model treats a split ruling class as the trigger for state breakdown and its reunification as the marker of consolidation, in either direction
    rationale: The gentry and merchant class that split from the crown in 1642 was largely the same class that invited Charles II home in 1660, having concluded a republic without a king was less stable than a king with limits.
    sources:
      - Skocpol, States and Social Revolutions (1979)
