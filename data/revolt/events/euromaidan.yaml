perspectives:
  - viewpoint: Pro-European civic view
    viewpoint_type: movement
    region_origin: Ukraine
    narrative: A democratic reassertion of national sovereignty and European orientation against a corrupt, increasingly authoritarian government.
    key_arguments:
      - Yanukovych's reversal on the EU agreement followed months of apparent negotiation, reading as a last-minute capitulation to external pressure
      - The Mezhyhirya estate's scale symbolized entrenched corruption at the top of government
      - The movement's self-organized, largely peaceful character over three months reflected broad civic rather than narrow factional support
    sources: []
    notable_quotes: []
    emphasized:
      - the EU agreement reversal
      - the Mezhyhirya revelations
    omitted:
      - divisions within Ukraine over EU versus Russia orientation in eastern and southern regions
      - the composition of far-right groups within the broader protest movement
  - viewpoint: Russian state-aligned view
    viewpoint_type: regime
    region_origin: Russia
    narrative: Frames the events as an externally encouraged, unconstitutional removal of an elected president, the basis Moscow cited for its subsequent actions in Crimea and the Donbas.
    key_arguments:
      - Yanukovych was removed by a parliamentary vote taken under street pressure rather than through a constitutional process like impeachment
      - Western governments' public support for the protest movement is presented as direct interference in Ukrainian internal politics
      - The rapid change of government is portrayed as illegitimate given the circumstances of Yanukovych's removal
    sources: []
    notable_quotes: []
    emphasized:
      - the manner of Yanukovych's removal from office
      - Western statements of support for the protesters
    omitted:
      - the scale of the killings in the square's final days
      - Yanukovych's own reversal of a long-negotiated agreement that triggered the protests
