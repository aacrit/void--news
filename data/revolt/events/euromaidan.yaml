success_factors:
  - factor_key: security-force-fracture
    label: Security force refusal to fire is the strongest single predictor of rapid collapse
    framework: chenoweth
    status: confirmed
    direction: favors-movement
    base_rate: Security force defection or refusal to fire remains the single strongest predictor of rapid regime collapse across the comparative record
    rationale: Police and some military units refused orders to use lethal force against protesters in the final days, removing Yanukovych's last coercive option and precipitating his flight within hours.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: nonviolent-then-violent-escalation
    label: A mostly peaceful campaign that escalates late can still remove an incumbent without settling the outcome
    framework: chenoweth
    status: partial
    direction: indeterminate
    base_rate: Nonviolent-leaning campaigns succeed roughly twice as often as armed ones, 53 percent versus 26 percent, though the finding concerns durable outcomes, not merely toppling an incumbent
    rationale: Euromaidan stayed overwhelmingly peaceful for three months before a violent final escalation, and while it succeeded in removing Yanukovych within days of that escalation, the post-victory outcome was immediately contested rather than settled.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: foreign-counter-intervention
    label: Foreign military intervention against a successful uprising can reverse or freeze its gains
    framework: goldstone
    status: confirmed
    direction: favors-regime
    base_rate: Direct foreign military intervention against a successful uprising's outcome can reverse or freeze its gains even after the incumbent has already fallen
    rationale: Russia's annexation of Crimea within weeks and its backing of separatist war in the Donbas the same spring prevented the post-Yanukovych government from consolidating control over the whole country.
    sources:
      - 'Goldstone, Revolutions: A Very Short Introduction (2014)'
