slug: euromaidan
title: Euromaidan
subtitle: Three months on the square end a presidency and open a war
date_display: November 2013 - February 2014
date_start: 2013
date_end: 2014
date_precision: year
era: square-revolutions
region: europe
country: Ukraine
revolt_type: democratic-uprising
status: concluded
summary: President Viktor Yanukovych's last-minute refusal to sign a long-negotiated EU association agreement brought students onto Kyiv's central square on November 21, 2013. A violent police crackdown nine days later turned a policy protest into a mass occupation that lasted three months, ending in February 2014 with roughly 100 dead in the square's final days and Yanukovych's flight to Russia.
significance: 'A rapid, security-force-defection-driven collapse of an elected government that nonetheless failed to produce a stable, uncontested outcome: Russia annexed Crimea within weeks and backed a separatist war in the Donbas that same spring.'
grievances:
  - kind: Reversal of the EU association agreement
    intensity: 80
    evidence: Yanukovych announced on November 21, 2013 that Ukraine would not sign the EU Association Agreement after months of negotiation, days before it was due to be signed in Vilnius.
  - kind: Violent crackdown on student protesters
    intensity: 85
    evidence: Berkut riot police beat student demonstrators camped on Maidan Nezalezhnosti before dawn on November 30, 2013, injuring dozens and dramatically widening the protest movement.
  - kind: Entrenched high-level corruption
    intensity: 70
    evidence: Yanukovych's private Mezhyhirya estate, revealed in detail after his flight, was valued by investigators in the hundreds of millions of dollars, a stark contrast to his stated presidential salary.
  - kind: Anti-protest legislation
    intensity: 65
    evidence: A package of laws passed on January 16, 2014 criminalized many forms of protest activity, sharply escalating tensions rather than deterring the demonstrations.
actors:
  - actor_type: students-youth
    name: The first Maidan protesters
    description: Students and young professionals who gathered on Kyiv's Independence Square the night of November 21, 2013.
    role_in_arc: Initiated the protest movement in response to Yanukovych's EU agreement reversal, before the November 30 crackdown widened it into a mass movement.
    defected: false
  - actor_type: masses
    name: The Maidan encampment
    description: A self-organized protest camp on Independence Square that grew to an estimated 500,000 to 800,000 at its December 2013 peak.
    role_in_arc: Sustained a three-month occupation with its own medical, security, and supply structures functioning alongside a paralyzed state authority.
    defected: false
  - actor_type: security-forces
    name: Berkut riot police
    description: Ukraine's special police force, later disbanded after the revolution.
    role_in_arc: Carried out repeated violent clearance attempts, including the fatal shootings of February 18-20, 2014, before the unit was dissolved.
    defected: false
  - actor_type: old-regime
    name: Viktor Yanukovych
    description: President of Ukraine since 2010.
    role_in_arc: Fled Kyiv on February 22, 2014, as police and security units began refusing orders to use lethal force, and was removed by parliamentary vote the same day.
    defected: false
  - actor_type: foreign-intervener
    name: Russia
    description: Ukraine's neighboring power and Yanukovych's chief external backer.
    role_in_arc: Annexed Crimea within weeks of Yanukovych's fall and backed separatist forces in the Donbas that same spring.
    defected: false
tactics:
  - tactic_type: occupation
    description: The Maidan encampment held central Kyiv for three months, building its own barricades, kitchens, and medical stations.
    prominence: primary
  - tactic_type: mass-demonstration
    description: Crowds estimated between 500,000 and 800,000 filled Independence Square at the movement's December 2013 peak.
    prominence: primary
  - tactic_type: civil-disobedience
    description: Protesters built barricades and organized self-defense units to resist repeated riot police clearance attempts through January and February 2014.
    prominence: secondary
