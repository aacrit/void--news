success_factors:
  - factor_key: nonviolent-campaign-rate
    label: Nonviolent campaign base rate
    framework: chenoweth
    status: Five of six 1989 transitions (all but Romania) proceeded through negotiation, mass protest, and strikes without organized armed resistance
    direction: favors-movement
    base_rate: Chenoweth and Stephan find nonviolent campaigns succeed in roughly 53 percent of cases historically, roughly double the rate for armed campaigns
    rationale: Poland's roundtable, East Germany's Monday demonstrations, and Czechoslovakia's Velvet Revolution all achieved regime change through sustained nonviolent pressure rather than armed confrontation, consistent with the broader nonviolent success-rate literature.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: external-patron-withdrawal
    label: Withdrawal of external backing
    framework: skocpol
    status: Gorbachev's public renunciation of the Brezhnev Doctrine removed the threat of Soviet military intervention that had crushed 1956 Hungary and 1968 Czechoslovakia
    direction: favors-movement
    base_rate: Comparative historiography of the Soviet bloc identifies the credible withdrawal of a hegemon's guarantee of intervention as a necessary precondition distinguishing 1989's outcome from 1956 and 1968
    rationale: Absent Gorbachev's signal, protest movements of similar scale had been crushed by Warsaw Pact tanks twice before in the same region; the 1989 cascade required Moscow's non-intervention as much as domestic mobilization.
    sources:
      - Comparative Cold War historiography of 1956, 1968, and 1989
  - factor_key: regional-contagion
    label: Cross-border contagion effect
    framework: tilly
    status: Each government's collapse visibly lowered the perceived risk and raised the perceived odds of success for the next country's protesters within the same seven-month span
    direction: favors-movement
    base_rate: Diffusion and cascade models of protest find that geographically and politically proximate successful precedents measurably raise mobilization and reduce perceived risk in subsequent cases
    rationale: Poland's June election, Hungary's May border opening, and the November 9 Wall opening followed each other in rapid succession, with East German and Czechoslovak organizers explicitly citing the prior countries' events as evidence the old order could actually fall.
    sources:
      - Diffusion-of-protest literature applied to the 1989 cascade
