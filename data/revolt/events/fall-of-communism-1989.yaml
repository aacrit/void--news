perspectives:
  - viewpoint: Solidarity movement organizer
    viewpoint_type: movement
    region_origin: europe
    narrative: 'Solidarity organizers framed the 1980s struggle as a decade-long campaign, not a single 1989 event: nine years of underground organizing after the 1981 martial-law crackdown made the roundtable negotiations and June election possible the moment political space opened.'
    key_arguments:
      - The 1989 election victory rested on organizational infrastructure Solidarity had maintained underground since the 1981 ban
      - Negotiated roundtable transition, not confrontation, secured a durable and peaceful handover of power
    sources: []
    notable_quotes: []
    emphasized:
      - The scale of Solidarity's original 10-million-member 1980-81 mobilization
      - The discipline of the roundtable negotiating strategy
    omitted:
      - The extent to which Gorbachev's external signal, not just internal organizing, made the 1989 opening possible where 1981's crackdown had succeeded
  - viewpoint: Soviet reform-era official
    viewpoint_type: regime
    region_origin: europe
    narrative: 'Gorbachev-aligned Soviet officials described 1989 as a consequence of perestroika''s internal logic: reform inside the USSR made continued military backing of unpopular satellite governments both impractical and inconsistent with the reformist program, not a decision to abandon socialism itself.'
    key_arguments:
      - Renouncing the Brezhnev Doctrine was consistent with broader Soviet reform, not a deliberate plan to dissolve the Warsaw Pact
      - Individual national governments, not Moscow, chose confrontation or negotiation with their own populations
    sources: []
    notable_quotes: []
    emphasized:
      - The internal Soviet reform context of glasnost and perestroika
      - Non-intervention as principled rather than merely a loss of capacity
    omitted:
      - The Soviet economy's own strain, which limited Moscow's practical capacity for renewed large-scale military intervention regardless of stated principle
