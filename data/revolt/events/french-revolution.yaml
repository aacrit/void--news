actors:
  - actor_type: masses
    name: The Paris sans-culottes
    description: Artisans, shopkeepers and wage workers who supplied the revolution's crowd power and, later, its radical edge.
    role_in_arc: Stormed the Bastille, marched on Versailles, and pushed the revolution leftward.
    defected: false
  - actor_type: vanguard
    name: The Jacobin Club
    description: A network of political clubs that moved from constitutional reform to revolutionary dictatorship.
    role_in_arc: Organized the radical phase and administered the Terror.
    defected: false
  - actor_type: military-defectors
    name: The Gardes Francaises
    description: Royal guardsmen in Paris who refused to fire on the crowd and joined it.
    role_in_arc: Their defection made the storming of the Bastille possible.
    defected: true
  - actor_type: old-regime
    name: Louis XVI and the court
    description: A monarch who conceded slowly, plotted escape, and was executed as Citizen Capet.
    role_in_arc: The target; his failed flight to Varennes destroyed the case for a constitutional monarchy.
    defected: false
  - actor_type: foreign-intervener
    name: The First Coalition
    description: Austria, Prussia, Britain and allies who invaded to restore the monarchy.
    role_in_arc: External war radicalized the revolution and justified emergency government.
    defected: false

tactics:
  - tactic_type: urban-uprising
    description: The storming of the Bastille and the insurrections of August 1792 and 1793.
    prominence: high
  - tactic_type: mass-demonstration
    description: The Women's March on Versailles that brought the king back to Paris.
    prominence: high
  - tactic_type: parallel-institutions
    description: The National Assembly, the Commune, and the network of Jacobin clubs.
    prominence: high
  - tactic_type: armed-insurgency
    description: Revolutionary armies and the levee en masse that mobilized the nation for war.
    prominence: medium

resistance_type: hybrid

phases:
  - phase: old-regime-crisis
    label: The crown runs out of money
    date_start: "1788-08"
    t_start: 0.00
    t_end: 0.10
    intensity: 30
    reached: true
    summary: Insolvency forces the king to summon the Estates-General for the first time since 1614.
    key_events: ["Harvest failure of 1788", "Convocation of the Estates-General"]
  - phase: intellectual-desertion
    label: The Third Estate refuses to be outvoted
    date_start: "1789-06"
    t_start: 0.10
    t_end: 0.20
    intensity: 45
    reached: true
    summary: The commons declare themselves the National Assembly and swear the Tennis Court Oath. Liberal nobles and clergy cross over.
    key_events: ["Tennis Court Oath", "Formation of the National Assembly"]
  - phase: the-spark
    label: The Bastille falls
    date_start: "1789-07-14"
    t_start: 0.20
    t_end: 0.28
    intensity: 65
    reached: true
    summary: A crowd storms the fortress-prison. Royal troops will not fire. The king learns he no longer controls his capital.
    key_events: ["Storming of the Bastille", "Great Fear in the countryside"]
  - phase: moderate-phase
    label: A constitutional monarchy is tried
    date_start: "1789-08"
    t_start: 0.28
    t_end: 0.45
    intensity: 55
    reached: true
    summary: Feudalism abolished overnight; the Declaration of the Rights of Man proclaimed. A constitution keeps the king as a limited executive.
    key_events: ["Abolition of feudalism", "Declaration of the Rights of Man and of the Citizen"]
  - phase: dual-power
    label: The king flees and is caught
    date_start: "1791-06"
    t_start: 0.45
    t_end: 0.58
    intensity: 60
    reached: true
    summary: The flight to Varennes exposes the monarch as an enemy of the revolution. War with Austria begins. Power splits between Assembly and street.
    key_events: ["Flight to Varennes", "War of the First Coalition begins"]
  - phase: radical-phase
    label: The monarchy is overthrown, the republic declared
    date_start: "1792-08"
    t_start: 0.58
    t_end: 0.70
    intensity: 80
    reached: true
    summary: The Tuileries is stormed, the king suspended, the First Republic proclaimed. Louis XVI is tried and executed in January 1793.
    key_events: ["Insurrection of 10 August 1792", "Execution of Louis XVI"]
  - phase: terror-virtue
    label: The Terror
    date_start: "1793-09"
    t_start: 0.70
    t_end: 0.82
    intensity: 100
    reached: true
    summary: The Committee of Public Safety governs by guillotine. Roughly 17000 are formally executed and tens of thousands more die in the Vendee and the prisons.
    key_events: ["Committee of Public Safety", "Law of Suspects", "Execution of Danton and the Girondins"]
  - phase: thermidor
    label: The revolution eats Robespierre
    date_start: "1794-07"
    t_start: 0.82
    t_end: 0.90
    intensity: 70
    reached: true
    summary: Robespierre is guillotined by colleagues who fear they are next. The Terror ends; a corrupt Directory takes over.
    key_events: ["Fall of Robespierre", "The Thermidorian Reaction", "The Directory"]
  - phase: consolidation
    label: A general takes the republic
    date_start: "1799-11"
    t_start: 0.90
    t_end: 1.00
    intensity: 60
    reached: true
    summary: Napoleon Bonaparte seizes power in the coup of 18 Brumaire. The republic survives in name; the revolution as a popular force is over.
    key_events: ["Coup of 18 Brumaire", "The Consulate"]

