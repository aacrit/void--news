slug: french-revolution
title: The French Revolution
subtitle: A bankrupt monarchy, a hungry city, and the invention of modern politics
date_display: 1789 to 1799
date_start: 1789
date_end: 1799
date_precision: year
era: atlantic
region: europe
country: France
revolt_type: social
status: concluded

summary: >
  In the spring of 1789 the French crown could not pay its debts. A king who
  ruled by divine right summoned an assembly he had not called in 175 years,
  hoping to tax his way out of ruin. The Third Estate refused to be counted as
  one vote against two. Within weeks a locksmith king was a prisoner of the
  nation, feudalism was abolished in a single night, and a document declared
  that men are born free and equal in rights. Within five years the same
  revolution was guillotining its own founders at a rate of one every hour.
significance: >
  The French Revolution set the template every later revolution would argue
  with. It proved a determined urban crowd could topple Europe's oldest
  monarchy, and it proved that a revolution devours the people who make it. The
  words liberty, the nation, the left and the right, terror as a policy: all
  entered modern politics here. Napoleon ended the republic in 1799, but the
  question the Bastille asked was never closed again.

grievances:
  - kind: fiscal
    intensity: 95
    evidence: State debt consumed roughly half of annual revenue; the 1788 harvest failed and bread reached 88 percent of a laborer's wage.
  - kind: political
    intensity: 80
    evidence: An absolute monarchy with no representative check; the Estates-General had not met since 1614.
  - kind: inequality
    intensity: 85
    evidence: The clergy and nobility, two percent of the population, held most land and paid almost no direct tax.
  - kind: subsistence
    intensity: 90
    evidence: A cold winter and grain speculation left Paris hungry; bread riots preceded every political turn.

structural_pressures:
  fiscal_crisis: { score: 3, note: "Near-total state insolvency after backing the American Revolution." }
  elite_fracture: { score: 3, note: "Liberal nobles and clergy defected to the Third Estate at the Tennis Court Oath." }
  mass_immiseration: { score: 3, note: "Harvest failure and bread prices at famine levels." }
  repression: { score: 2, note: "Royal troops massed at Versailles but the Paris garrison would not fire." }
  external_shock: { score: 1, note: "War debt from aiding the American colonies against Britain." }
  legitimacy_collapse: { score: 3, note: "Divine-right monarchy could not survive being told it needed permission to tax." }

