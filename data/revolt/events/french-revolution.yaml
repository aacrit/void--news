perspectives:
  - viewpoint: The Jacobin republican
    viewpoint_type: revolutionary
    region_origin: Paris
    narrative: >
      The revolution had enemies within and armies without. A republic fighting
      for its life could not extend the rights of man to those plotting its
      destruction. The guillotine was not cruelty, it was the republic defending
      itself. Better a hard year of virtue than a restored throne on a hundred
      thousand graves.
    key_arguments:
      - The Terror was a wartime emergency, not a program.
      - Foreign invasion and internal revolt forced centralized power.
    emphasized: ["Foreign invasion", "Royalist plots", "The levee en masse"]
    omitted: ["The scale of executions without trial", "The drownings at Nantes"]
    notable_quotes:
      - text: The republic owes its enemies nothing but death.
        speaker: A Jacobin deputy
        context: Debates on the Law of Suspects, 1793
  - viewpoint: The liberal constitutionalist
    viewpoint_type: moderate
    region_origin: France
    narrative: >
      1789 was the achievement. A constitution, a limited monarch, the rights of
      man. What followed was the betrayal. The radicals mistook the crowd for the
      nation and the guillotine for justice. The revolution could have ended in a
      constitutional monarchy and instead ended in a dictatorship of virtue and
      then a dictatorship of a general.
    key_arguments:
      - The moderate phase, not the Terror, was the revolution's real gift.
      - Radicalization was a choice, not a necessity.
    emphasized: ["The Declaration of Rights", "Rule of law"]
    omitted: ["Why the constitutional monarchy failed to hold"]
    notable_quotes:
      - text: They have made a desert and called it liberty.
        speaker: A Girondin, before the scaffold
        context: The purge of the moderates, 1793
  - viewpoint: The historian
    viewpoint_type: academic
    region_origin: Global
    narrative: >
      The French Revolution is the case that structural theories of revolution
      were built to explain. Fiscal crisis, elite defection, a subsistence
      emergency, and a state that could no longer coerce its own capital. Once
      those aligned, the outcome was open. Whether it had to end in Terror and
      Bonaparte is the argument that has never stopped.
    key_arguments:
      - Preconditions made a revolution likely; contingency shaped its course.
      - The Terror is better read as a product of war and dual power than of ideology alone.
    emphasized: ["State breakdown", "Contingency"]
    omitted: []
    notable_quotes:
      - text: The revolution devours its children.
        speaker: Attributed to Jacques Mallet du Pan
        context: On the fall of the Girondins, 1793

