success_factors:
  - factor_key: resistance_method
    label: Method of struggle
    framework: chenoweth
    status: Hybrid. Mass urban uprising fused with armed revolutionary war.
    direction: indeterminate
    base_rate: "Across 1900 to 2006, nonviolent campaigns succeeded about 53 percent of the time versus about 26 percent for armed ones (Chenoweth and Stephan)."
    rationale: The French case predates the dataset, but its slide into armed terror and foreign war illustrates why violence correlates with harder consolidation.
    sources: ["Chenoweth and Stephan, Why Civil Resistance Works (2011)"]
    as_of: "1799"
    confidence: n/a
  - factor_key: security_defection
    label: Did the security forces defect
    framework: chenoweth
    status: Partial. The Paris garrison would not fire in July 1789, which was decisive; the wider army stayed contested.
    direction: favors-movement
    base_rate: "Security-force defection is the single strongest predictor of campaign success in the resistance literature."
    rationale: The refusal of royal troops to fire on the Bastille crowd removed the monarchy's last coercive advantage in its capital.
    sources: ["Nepstad, Nonviolent Revolutions (2011)"]
    as_of: "1789"
    confidence: high
  - factor_key: elite_fracture
    label: Did the ruling elite split
    framework: goldstone
    status: Yes. Liberal nobles and parish clergy joined the Third Estate.
    direction: favors-movement
    base_rate: "Elite defection is a core precondition of state breakdown in structural theories of revolution."
    rationale: The Tennis Court Oath only held because a bloc of the privileged orders crossed over.
    sources: ["Skocpol, States and Social Revolutions (1979)", "Goldstone, Revolution and Rebellion in the Early Modern World (1991)"]
    as_of: "1789"
    confidence: high

