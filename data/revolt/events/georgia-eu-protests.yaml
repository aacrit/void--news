perspectives:
  - viewpoint: The Tbilisi protesters
    viewpoint_type: movement
    region_origin: Tbilisi
    narrative: Eighty percent of this country wants to be in Europe. That has been written into our constitution since 2017. A government that shelves that goal by announcement, then wins a disputed vote and jails the people who object, is not disagreeing with us. It is overriding us.
    key_arguments:
      - EU accession has explicit constitutional and public-opinion backing that the government's decision bypassed.
      - The foreign agents law and the election dispute are one story, not two.
    sources: []
    notable_quotes: []
    emphasized:
      - Constitutional EU commitment
      - Documented detainee beatings
    omitted:
      - Divisions between the two main opposition coalitions
  - viewpoint: Georgian Dream's position
    viewpoint_type: regime
    region_origin: Tbilisi
    narrative: We paused accession talks, we did not renounce Europe, and a multi-year pause is not unlike timelines floated for the EU's own next enlargement round. The protests are real but so is the mandate we won in October, and foreign-funded organizations have spent a decade building networks we are entitled to regulate.
    key_arguments:
      - The suspension is framed by the government as a timeline adjustment, not a withdrawal from the EU path.
      - The foreign agents law mirrors disclosure requirements the government says exist elsewhere.
