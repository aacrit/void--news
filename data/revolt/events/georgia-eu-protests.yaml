slug: georgia-eu-protests
title: Georgia's Europe Protests
subtitle: A ruling party pauses EU accession and meets nightly crowds in Tbilisi
date_display: 2024 to present
date_start: 2024
date_precision: year
era: square-revolutions
region: europe
country: Georgia
revolt_type: democratic-uprising
status: active
summary: Georgian Dream, in power since 2012 and founded by billionaire Bidzina Ivanishvili, passed a foreign agents law in 2024 modeled on Russian legislation used to suppress civil society, over months of street protest. It then won a disputed October 2024 election that international monitors said was marred by irregularities, and on 28 November 2024 announced it was suspending EU accession talks until 2028. Nightly protests have continued in Tbilisi since, met with mass arrests and, rights monitors say, systematic beatings of detained protesters.
significance: Georgia tests whether a governing party can walk back a constitutionally referenced goal, EU membership, that opinion polling puts above 80 percent support, without losing power. It is also a case study in a foreign agent law migrating from Russia to a formal candidate country for EU membership.
analytical_outlook: 'President Salome Zourabichvili, whose term the government says expired in December 2024, and the opposition contest the government''s legitimacy but have not forced new elections or a change of government. Protests have persisted for months without the security-force break that historically precedes a government''s fall, and the government controls the courts and the electoral commission. Placement on the arc: sustained nonviolent protest that has not yet reached dual power or extracted a reversal from the state.'
grievances:
  - kind: political
    intensity: 85
    evidence: The October 2024 parliamentary election, which Georgian Dream said it won with 54 percent, was called neither free nor fair by the OSCE's monitoring mission and disputed by President Zourabichvili and the opposition.
  - kind: civil-society
    intensity: 80
    evidence: A 2024 foreign agents law requires organizations receiving more than 20 percent of funding from abroad to register as agents of foreign influence, echoing a 2012 Russian law used there to shut down independent media and NGOs.
  - kind: geopolitical
    intensity: 82
    evidence: EU candidate status, granted to Georgia in December 2023, was suspended by the government's own announcement on 28 November 2024 that accession talks would be shelved until 2028.
repression_level: high
actors:
  - actor_type: masses
    name: Nightly Tbilisi protesters
    description: A cross-generational movement centered on Rustaveli Avenue outside parliament, sustained through winter 2024 into 2025.
    role_in_arc: Kept continuous, largely spontaneous street pressure on the government for months rather than a single mass mobilization.
    defected: false
  - actor_type: students-youth
    name: Student and youth groups
    description: University students who organized boycotts and sustained the nightly demonstrations after the initial crowds thinned.
    role_in_arc: Provided organizational continuity as protest fatigue set in among the broader public.
    defected: false
  - actor_type: old-regime
    name: Georgian Dream and Bidzina Ivanishvili
    description: The ruling party, founded and informally guided by billionaire Bidzina Ivanishvili, in power since 2012.
    role_in_arc: Passed the foreign agents law, won the disputed election and suspended EU accession talks.
    defected: false
  - actor_type: regime
    name: The Georgian riot police
    description: Interior ministry security forces deployed nightly against protesters.
    role_in_arc: Used water cannon, tear gas and, rights monitors say, beatings of detainees; no reported unit-level defections.
    defected: false
  - actor_type: diaspora
    name: President Salome Zourabichvili
    description: The formally pro-European president, whose term the government says expired in December 2024, while she disputes the legitimacy of her replacement.
    role_in_arc: Refused to leave the presidential residence and continues to describe herself as the country's legitimate representative abroad.
    defected: false
tactics:
