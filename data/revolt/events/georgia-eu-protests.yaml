success_factors:
  - factor_key: resistance_method
    label: Method of struggle
    framework: chenoweth
    status: Nonviolent protest sustained over months rather than a single mobilization.
    direction: favors-movement
    base_rate: About 53 percent of nonviolent campaigns from 1900 to 2006 succeeded, versus about 26 percent for armed ones.
    rationale: Method keeps the historically favorable odds available, though duration without escalation can also signal a stalemate.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: '2026'
    confidence: medium
  - factor_key: peak_participation
    label: Peak participation
    framework: chenoweth
    status: Large for Tbilisi's size at the November-December 2024 peak, but nightly turnout has fallen well short of a sustained mass mobilization.
    direction: favors-regime
    base_rate: No nonviolent campaign that mobilized at least 3.5 percent of the population at its peak has failed to achieve its stated aim.
    rationale: Georgia's protests have not been independently estimated to have crossed that share, and the crowds have thinned through the winter.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: '2026'
    confidence: medium
  - factor_key: security_defection
    label: Did the security forces defect
    framework: chenoweth
    status: None reported. Riot police have carried out the crackdown without visible unit-level refusals.
    direction: favors-regime
    base_rate: Defection of the security forces is the single strongest predictor of a nonviolent campaign's success.
    rationale: Without a break in the interior ministry's forces, the government has been able to sustain nightly detentions for months.
    sources:
      - Nepstad, Nonviolent Revolutions (2011)
    as_of: '2026'
    confidence: high
  - factor_key: elite_fracture
    label: Did the ruling elite split
    framework: goldstone
    status: Partial. The presidency disputes the government's legitimacy, but Georgian Dream's parliamentary majority and the judiciary have not split.
    direction: indeterminate
    base_rate: Revolutions and forced political openings rarely succeed until the ruling elite itself fractures.
    rationale: A dissenting president without control of the security services or the courts is a symbolic, not a structural, crack in the ruling bloc.
    sources:
      - Goldstone, Revolution and Rebellion in the Early Modern World (1991)
    as_of: '2026'
    confidence: medium
