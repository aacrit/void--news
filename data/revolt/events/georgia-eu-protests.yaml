legacy_points:
  - Turned a single law modeled on Russian legislation into the most sustained protest movement in Georgia's post-Soviet history.
  - Made EU candidacy, granted in December 2023, a live domestic fault line rather than a settled national consensus within a year.
  - Showed how a governing party can win a disputed election and absorb months of nightly protest without a visible crack in its coalition.
