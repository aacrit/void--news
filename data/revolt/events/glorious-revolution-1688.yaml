slug: glorious-revolution-1688
title: The Glorious Revolution
subtitle: A king invites his own overthrow and calls it an invitation
date_display: 1688-1689
date_start: 1688
date_end: 1689
date_precision: year
era: atlantic
region: europe
country: England
revolt_type: velvet-negotiated
status: concluded
summary: James II's Catholic heir, born June 10, 1688, turned a tolerable succession into an intolerable one. Seven English peers invited his Dutch son-in-law William of Orange to intervene; William landed with 463 ships and 15,000 men, James's army deserted around him, and Parliament crowned William and Mary jointly in February 1689.
significance: 'Settled, without a major battle, the same question the Civil War had settled forty years earlier with an axe: that a king rules within law, not above it. The Bill of Rights it produced became a direct source text for the American framers.'
grievances:
  - kind: Religious succession crisis
    intensity: 88
    evidence: James Francis Edward, born Catholic on June 10, 1688, displaced his Protestant daughter Mary as heir, raising the prospect of a permanent Catholic dynasty.
  - kind: Abuse of royal prerogative
    intensity: 75
    evidence: The 1687 Declaration of Indulgence suspended penal laws against Catholics and Dissenters by royal fiat, bypassing Parliament entirely.
  - kind: Politicization of the army and universities
    intensity: 62
    evidence: James commissioned Catholic officers in violation of the Test Act and installed a Catholic president at Magdalen College, Oxford, in 1687.
actors:
  - actor_type: foreign-intervener
    name: William of Orange
    description: Stadtholder of the Dutch Republic and husband of James's daughter Mary.
    role_in_arc: Landed at Torbay on November 5, 1688, and marched on London largely unopposed.
    defected: false
  - actor_type: vanguard
    name: The Immortal Seven
    description: Six peers and a bishop who signed the June 1688 invitation letter asking William to intervene.
    role_in_arc: Supplied the domestic legal cover for what would otherwise have been a foreign invasion.
    defected: false
  - actor_type: military-defectors
    name: John Churchill
    description: Senior army officer under James II, later Duke of Marlborough.
    role_in_arc: Defected to William's camp on November 24, 1688, triggering a cascade of officer desertions.
    defected: true
  - actor_type: old-regime
    name: James II
    description: King of England, Scotland, and Ireland since 1685.
    role_in_arc: Fled London in December 1688 after his army dissolved; captured, then deliberately permitted to escape to France.
    defected: false
  - actor_type: vanguard
    name: The Convention Parliament
    description: An extralegal assembly summoned after James's flight to resolve the succession.
    role_in_arc: Declared the throne vacant and offered it jointly to William and Mary in February 1689, conditioned on the Bill of Rights.
    defected: false
tactics:
  - tactic_type: defection-fraternization
    description: James's officer corps deserted piecemeal once Churchill broke first, leaving the king no force able to resist William's advance.
    prominence: primary
  - tactic_type: parallel-institutions
    description: The Convention Parliament asserted authority over the succession the moment James fled, filling the vacuum before any rival body could.
    prominence: primary
  - tactic_type: elite-negotiation
    description: The Immortal Seven's invitation turned an invasion into a rescue in the eyes of the political class.
    prominence: secondary
resistance_type: nonviolent
