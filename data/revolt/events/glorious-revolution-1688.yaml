perspectives:
  - viewpoint: Whig constitutionalist tradition
    viewpoint_type: moderate
    region_origin: England
    narrative: A king violated the ancient constitution and a united political nation corrected course without bloodshed, restoring rather than overturning England's fundamental law.
    key_arguments:
      - James II broke settled law by ruling through prerogative alone
      - The Convention Parliament acted to restore, not invent, constitutional balance
      - The near-absence of violence proves the nation's underlying consensus
    sources: []
    notable_quotes:
      - text: This nation is happily rescued from popery and slavery.
        speaker: Convention Parliament address to William, 1689
        context: Resolution accompanying the crown offer
    emphasized:
      - the Bill of Rights
      - the bloodless transfer of power
    omitted:
      - the scale of William's invasion force
      - the coercive pressure the landing placed on undecided elites
  - viewpoint: Revisionist reading as a foreign-backed coup
    viewpoint_type: academic
    region_origin: England
    narrative: William's fleet dwarfed the Spanish Armada a century earlier, and the outcome depended on a foreign prince's army, not domestic consensus; the label 'Glorious' was itself Whig branding applied after the fact.
    key_arguments:
      - William's force was larger and better organized than any domestic faction could field
      - James's own miscalculations, not a spontaneous national uprising, opened the door
      - the 'bloodless' framing understates the violence in Ireland and Scotland that followed within months
    sources: []
    notable_quotes: []
    emphasized:
      - the military scale of the Dutch landing
      - the Irish and Scottish aftermath
    omitted:
      - the elite consensus that legitimized William's claim
      - the durability of the constitutional settlement that followed
