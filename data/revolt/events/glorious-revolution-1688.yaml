success_factors:
  - factor_key: nonviolent-success-rate
    label: Low-violence campaigns succeed more often than armed ones
    framework: chenoweth
    status: confirmed
    direction: favors-movement
    base_rate: Nonviolent campaigns succeed roughly 53% of the time historically, versus about 26% for armed campaigns (Chenoweth and Stephan)
    rationale: The crown changed hands through mass desertion and elite realignment rather than battle, matching the pattern that low-violence transitions succeed more often.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: security-force-defection
    label: Security force defection is the strongest single predictor
    framework: chenoweth
    status: confirmed
    direction: favors-movement
    base_rate: Movements that achieve security force defection succeed at markedly higher rates than those that do not, across the cross-national record
    rationale: Churchill's defection on November 24 triggered a collapse of James's officer corps within days; the king had no army left to give battle with.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: elite-fracture
    label: Elite fracture precedes regime collapse
    framework: skocpol
    status: confirmed
    direction: favors-movement
    base_rate: Skocpol's structural account identifies a split within the ruling elite, not mass mobilization alone, as the precondition for rapid state collapse
    rationale: The Immortal Seven were peers and a bishop acting against their own king; the crisis was resolved inside the political class before it reached the street.
    sources:
      - Skocpol, States and Social Revolutions (1979)
