success_factors:
  - factor_key: armed-campaign-rate
    label: Armed campaign base rate
    framework: chenoweth
    status: A fully armed thirteen-year campaign defeated France, Britain, and Spain in turn
    direction: favors-movement
    base_rate: Chenoweth and Stephan's dataset finds armed campaigns succeed in roughly 26 percent of cases historically, well below nonviolent campaigns' roughly 53 percent
    rationale: The Haitian Revolution sits among the rarer successful armed campaigns in the historical record, aided by disease attrition among European troops and the extreme, existential nature of the enslaved population's stake in the outcome.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: foreign-attrition
    label: Environmental and disease attrition of the intervening power
    framework: tilly
    status: Yellow fever killed an estimated 50,000 of the roughly 60,000 French troops deployed in the 1802 to 1803 campaign
    direction: favors-movement
    base_rate: Disease attrition of European expeditionary forces in the Caribbean is a widely documented factor across colonial military campaigns of the era, distinct from and additive to battlefield casualties
    rationale: Rebel commanders' strategy of retreating to the interior during the rainy season deliberately let disease do damage conventional battle could not, a documented factor historians credit as decisive alongside battlefield resistance.
    sources:
      - Girard, The Slaves Who Defeated Napoleon (2011)
  - factor_key: elite-fracture
    label: Colonial elite fracture
    framework: skocpol
    status: The French Revolution's own instability, competing revolutionary factions, and war with Britain and Spain divided colonial administrative authority throughout the 1790s
    direction: favors-movement
    base_rate: Skocpol's framework identifies a fractured or distracted central authority as a structural precondition enabling peripheral revolutions to succeed
    rationale: Saint-Domingue's rebellion unfolded while revolutionary France itself was consumed by internal political turnover and war with European rivals, leaving the colony's defense chronically under-resourced relative to the scale of the uprising it faced.
    sources:
      - Skocpol, States and Social Revolutions (1979)
