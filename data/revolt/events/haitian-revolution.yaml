slug: haitian-revolution
title: The Haitian Revolution
subtitle: The only successful slave revolt in history to found a state
date_display: August 1791 to January 1804
date_start: 1791
date_end: 1804
date_precision: year
era: atlantic
region: americas
country: Saint-Domingue (Haiti)
revolt_type: social
status: concluded
summary: On the night of August 22, 1791, enslaved organizers at a Vodou ceremony at Bois Caiman signaled a coordinated uprising across the Northern Plain of Saint-Domingue, France's most profitable colony and the source of nearly half of Europe's sugar and coffee. Within ten days roughly 1,000 plantations burned. Thirteen years of fighting followed, against French colonial forces, British and Spanish invasions, and finally an 1802 French expedition of over 40,000 troops sent by Napoleon to restore slavery. Jean-Jacques Dessalines declared independence on January 1, 1804, founding Haiti as the first nation in the Americas to abolish slavery and the first Black-led republic in the world.
significance: The only slave uprising in world history to abolish slavery and establish an independent state, achieved against the era's dominant colonial and military power.
analytical_outlook: A movement whose armed campaign succeeded against overwhelming odds, then paid for independence through a French indemnity debt Haiti did not finish repaying until 1947.
grievances:
  - kind: Chattel slavery
    intensity: 100
    evidence: Roughly 500,000 enslaved people worked Saint-Domingue's plantations by 1789, with mortality so high that planters calculated it was cheaper to work captives to death and import replacements than to sustain births.
  - kind: Racial caste exclusion
    intensity: 80
    evidence: The colony's roughly 30,000 free people of color, many property-owning, were barred by the Code Noir and later restrictions from full civic and legal rights held by white colonists.
  - kind: Brutal plantation discipline
    intensity: 95
    evidence: Firsthand accounts documented by historians included mutilation, branding, and burial alive as punishments used on Saint-Domingue's plantations.
  - kind: Revolutionary ideals withheld from the colony
    intensity: 70
    evidence: The 1789 Declaration of the Rights of Man circulated in the colony while the National Assembly initially refused to extend citizenship to free people of color, let alone the enslaved.
actors:
  - actor_type: vanguard
    name: Toussaint Louverture
    description: Formerly enslaved coachman turned military commander, rose to govern the colony as Governor-General by 1801.
    role_in_arc: Unified rebel forces, negotiated with and fought against French, British, and Spanish forces before capture in 1802
    defected: false
  - actor_type: vanguard
    name: Jean-Jacques Dessalines
    description: Formerly enslaved general who took command after Louverture's 1802 capture and deportation to France.
    role_in_arc: Led the final campaign against Napoleon's expedition and declared Haitian independence January 1, 1804
    defected: false
  - actor_type: old-regime
    name: France (colonial administration and Napoleon's expedition)
    description: Colonial government of Saint-Domingue, later an expeditionary force of over 40,000 troops under General Leclerc sent by Napoleon in 1802.
    role_in_arc: Attempted to restore slavery after the 1794 abolition decree, was defeated by 1803
    defected: false
  - actor_type: masses
    name: Affranchis leadership
    description: Free, often property-owning people of mixed African and European descent, including early leader Vincent Oge.
    role_in_arc: Initially fought for civil rights within the colonial system before joining the broader independence struggle
    defected: false
  - actor_type: foreign-intervener
    name: Britain and Spain
    description: Rival colonial powers that invaded Saint-Domingue during the 1790s to seize French territory amid revolutionary chaos.
    role_in_arc: Both were ultimately repelled by rebel forces, with British losses alone estimated near 15,000 dead from combat and yellow fever by 1798
    defected: false
tactics:
  - tactic_type: urban-uprising
    description: The August 1791 rebellion burned roughly 1,000 plantations across the Northern Plain within the first ten days, organized through overseer and driver networks.
    prominence: primary, opening phase
  - tactic_type: armed-insurgency
    description: Rebel forces under Louverture and later Dessalines fought a thirteen-year campaign combining irregular warfare with organized troop formations against three European powers in turn.
    prominence: primary, throughout
  - tactic_type: guerrilla-warfare
    description: Rebel commanders retreated to the interior during the rainy season, letting yellow fever decimate the 1802 French expeditionary force, which lost an estimated 50,000 of its roughly 60,000 total deployed troops to combat and disease.
    prominence: secondary
resistance_type: armed
