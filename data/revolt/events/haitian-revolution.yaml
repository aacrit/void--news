perspectives:
  - viewpoint: Formerly enslaved combatant
    viewpoint_type: revolutionary
    region_origin: americas
    narrative: 'For the enslaved majority who rose up in August 1791, the revolution was an act of self-liberation against a system that worked people to death for profit. Freedom and independence were inseparable: no promise of gradual reform from a colonial or metropolitan authority could substitute for ending slavery outright and controlling their own state.'
    key_arguments:
      - Only total abolition and independent Black governance could guarantee freedom would not be reversed, a fear later justified by Napoleon's 1802 attempt to restore slavery
      - Armed resistance was a rational response given the brutality documented on Saint-Domingue's plantations
    sources: []
    notable_quotes:
      - text: In overthrowing me, you have cut down in Saint-Domingue only the trunk of the tree of liberty. It will spring up again by the roots, for they are numerous and deep
        speaker: Toussaint Louverture
        context: Reported statement upon his 1802 capture and deportation to France
    emphasized:
      - The scale and organization of the August 1791 uprising
      - The thirteen-year duration and cost of defeating three European powers
    omitted:
      - Internal divisions between formerly enslaved leaders and the free-colored elite over land and political structure after 1804
  - viewpoint: French colonial official
    viewpoint_type: counter-revolutionary
    region_origin: europe
    narrative: French colonial and later Napoleonic officials viewed the uprising as a catastrophic loss of the empire's most valuable possession and a precedent that risked destabilizing slavery across every other colonial holding in the Americas, justifying the scale of the 1802 military response.
    key_arguments:
      - Saint-Domingue represented an irreplaceable share of French colonial trade revenue that had to be defended by any means
      - Allowing the rebellion to stand risked inspiring uprisings in other French and rival colonial possessions
    sources: []
    notable_quotes: []
    emphasized:
      - The economic value of Saint-Domingue's sugar and coffee exports
      - The scale of French military commitment to the 1802 expedition
    omitted:
      - The brutality of plantation conditions that produced the uprising in the first place
