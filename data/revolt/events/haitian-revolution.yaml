connections:
  - target_slug: french-revolution
    connection_type: inspired
    description: The 1789 Declaration of the Rights of Man and revolutionary France's internal political chaos both catalyzed and enabled the Saint-Domingue uprising, though France itself resisted extending those rights to the colony.
  - target_slug: american-revolution
    connection_type: counter-example
    description: Where the American Revolution's new republic preserved and expanded chattel slavery for another eight decades, Haiti's revolution abolished it immediately and made abolition the founding condition of the state.
