success_factors:
  - factor_key: resistance_method
    label: Method of struggle
    framework: chenoweth
    status: Predominantly nonviolent mass mobilization, with escalating but comparatively limited property destruction and clashes concentrated late in 2019.
    direction: favors-movement
    base_rate: About 53 percent of nonviolent campaigns from 1900 to 2006 succeeded, versus about 26 percent for armed ones.
    rationale: The movement kept the historically favorable method even as tactics grew more confrontational at the campus sieges.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: '2019'
    confidence: medium
  - factor_key: peak_participation
    label: Peak participation
    framework: chenoweth
    status: Crossed the commonly cited threshold by a wide margin at the June 2019 peak.
    direction: favors-movement
    base_rate: No nonviolent campaign that mobilized at least 3.5 percent of the population at its peak had failed to achieve its stated aim, in the dataset built through 2006.
    rationale: Hong Kong is one of the most frequently cited post-2006 cases testing whether the threshold rule holds when the state faces no domestic cost for ignoring it.
    sources:
      - 'Chenoweth, Civil Resistance: What Everyone Needs to Know (2021)'
    as_of: '2021'
    confidence: medium
  - factor_key: security_defection
    label: Did the security forces defect
    framework: chenoweth
    status: None. The Hong Kong Police Force carried out the crackdown without a reported break, and ultimate command authority always rested with Beijing regardless of local policing.
    direction: favors-regime
    base_rate: Defection of the security forces is the single strongest predictor of a nonviolent campaign's success.
    rationale: A local police force answering to a sovereign national government has no equivalent of an army choosing the crowd over the palace.
    sources:
      - Nepstad, Nonviolent Revolutions (2011)
    as_of: '2020'
    confidence: high
  - factor_key: transition_capture
    label: Sovereign override
    framework: skocpol
    status: The National Security Law was imposed directly by the national legislature in Beijing, bypassing Hong Kong's own lawmaking process entirely.
    direction: favors-regime
    base_rate: A sovereign power able to rewrite a subordinate territory's legal order unilaterally removes the negotiating leverage local protest normally has.
    rationale: Unlike a domestic government facing its own citizens, Hong Kong's protesters were negotiating, in the end, with an authority they could not out-organize or out-vote.
    sources:
      - Skocpol, States and Social Revolutions (1979)
    as_of: '2020'
    confidence: high
