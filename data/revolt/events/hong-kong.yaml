legacy_points:
  - Forced the withdrawal of the extradition bill within three months, then continued for the four demands the government would not meet.
  - Produced one of the highest protest-to-population turnouts of the 2010s, by some estimates above one in four residents on a single day.
  - Ended not through negotiation but through a national security law imposed directly by Beijing, followed by the prosecution or exile of most recognizable leaders.
