perspectives:
  - viewpoint: The 2019 protest movement
    viewpoint_type: movement
    region_origin: Hong Kong
    narrative: We were promised fifty years of a different system and watched it narrow inside twenty-two. We won the bill's withdrawal and kept marching for the other four demands, because a withdrawn bill is not an apology and not a guarantee it will not return.
    key_arguments:
      - The extradition bill was one symptom of a broader erosion of the promised autonomy.
      - Escalation followed police conduct the movement considered unaccountable.
    sources: []
    notable_quotes:
      - text: Five demands, not one less.
        speaker: Protest movement slogan
        context: Adopted after the extradition bill's withdrawal in September 2019
    emphasized:
      - The one country, two systems promise
      - Police use of force
    omitted:
      - Property damage and violence at the campus sieges
  - viewpoint: The Hong Kong and central government position
    viewpoint_type: regime
    region_origin: Beijing
    narrative: The bill was withdrawn and the demands kept growing while masked rioters attacked officers and vandalized the transit system and businesses. The National Security Law restored order that Hong Kong's own police could no longer manage alone, and courts, not street violence, are where grievances belong.
    key_arguments:
      - The government met the bill demand and faced continued unrest regardless.
      - The National Security Law is framed by authorities as restoring stability, not suppressing dissent.
    sources: []
