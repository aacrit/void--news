legacy_points:
  - Turned a Chief Justice's 'cockroach' remark into the name and identity of a mass youth movement within days.
  - Built one of the largest social-media followings of any Indian political formation, reported by several outlets as surpassing the ruling BJP's, faster than it built a street organization.
  - Made examination-paper integrity, a technical administrative failure, the basis of a national demand for a cabinet minister's resignation.
