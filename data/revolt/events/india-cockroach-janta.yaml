perspectives:
  - viewpoint: The Cockroach Janta Party and allied students
    viewpoint_type: movement
    region_origin: New Delhi
    narrative: A judge called us cockroaches and parasites for being young and out of work, so we took the name. The exams that were supposed to decide our futures leaked, and millions of us sat them again. We are not asking for the government to fall. We are asking one minister to answer for a system that keeps leaking papers, and so far the answer has been barricades, batons and a cut internet.
    key_arguments:
      - The grievance is exam integrity and youth unemployment, not partisan politics
      - Embracing the cockroach insult turned a put-down into a mass identity
      - The government has answered a reform demand with policing rather than accountability
    sources: []
    notable_quotes:
      - text: This rotten system refuses to take action. It cannot see the pain of students.
        speaker: Jyoti Rajput, a protester
        context: Quoted by Al Jazeera at the 20 July 2026 march
    emphasized:
      - The 2026 NEET paper leak and repeated exam failures
      - The scale of the online following
      - Sonam Wangchuk's hunger strike
    omitted:
      - The gap between the movement's online following and verified street turnout
      - Its limited durable organization beyond the founding figure
  - viewpoint: The central government's position
    viewpoint_type: regime
    region_origin: New Delhi
    narrative: Examination reform is under way and the paper-leak cases are being handled by the courts and investigating agencies. What is playing out at Jantar Mantar is a campaign amplified by opposition parties, not a spontaneous student cause. Police acted to keep an overcrowded protest from turning dangerous, and allegations of unlawful force are denied. The government has offered to hear the protesters' concerns directly.
    key_arguments:
      - The exam-leak cases are being addressed through the courts and agencies
      - The mobilization is politically driven by opposition parties
      - Police say they acted on public-safety grounds and deny unlawful force
    sources: []
    notable_quotes:
      - text: acting against the nation
        speaker: Dharmendra Pradhan, Education Minister
        context: Al Jazeera reported the minister accusing the protesters in these terms during the July 2026 protests
    emphasized:
      - Existing exam-reform measures
      - The opposition parties backing the protests
      - An offer for two activists to meet a senior minister
    omitted:
      - The internet shutdown and metro closures around parliament
      - Hospital reports of injured protesters
      - The absence of a government response to the resignation demand
