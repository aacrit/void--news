success_factors:
  - factor_key: resistance_method
    label: Method of struggle
    framework: chenoweth
    status: Nonviolent throughout, including sit-ins, a hunger strike and marches, despite baton charges and tear gas at the July 2026 march.
    direction: favors-movement
    base_rate: About 53 percent of nonviolent campaigns from 1900 to 2006 succeeded, versus about 26 percent for armed ones.
    rationale: Staying nonviolent keeps the historically more favorable odds available and helps a movement recruit broadly across class and profession.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: 2026-07
    confidence: medium
  - factor_key: security_defection
    label: Did the security forces defect
    framework: chenoweth
    status: None reported. Delhi Police enforced barricades, closures and dispersal without any visible unit-level refusal.
    direction: favors-regime
    base_rate: Defection of the security forces is the single strongest predictor of a nonviolent campaign's success.
    rationale: Without any break in the forces policing the protests, the government has been able to contain the sit-in and the march without concessions.
    sources:
      - Nepstad, Nonviolent Revolutions (2011)
    as_of: 2026-07
    confidence: high
  - factor_key: peak_participation
    label: Peak participation
    framework: chenoweth
    status: Large online following, but verified street turnout in the tens of thousands, far below a mass-population share in a country of roughly 1.4 billion.
    direction: favors-regime
    base_rate: No nonviolent campaign that mobilized at least 3.5 percent of the population at its peak has failed to achieve its stated aim.
    rationale: For India the 3.5 percent threshold is on the order of tens of millions of people; the largest reported crowd to date is orders of magnitude below that.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: 2026-07
    confidence: medium
  - factor_key: elite_fracture
    label: Did the ruling elite split
    framework: goldstone
    status: None visible. The governing party's parliamentary majority is intact; the support the movement has drawn comes from opposition parties already outside government.
    direction: favors-regime
    base_rate: Revolutions and forced political openings rarely succeed until the ruling elite itself fractures.
    rationale: Opposition endorsement without a crack inside the governing coalition or the administration leaves the government under little internal pressure to concede.
    sources:
      - Goldstone, Revolution and Rebellion in the Early Modern World (1991)
    as_of: 2026-07
    confidence: medium
