peak_participation_display: Crowd estimates for the 20 July 2026 march ranged widely, from more than 10,000 reported by Al Jazeera to the organizers' claim of about 100,000. In a country of roughly 1.4 billion, even the higher figure is far below the tens of millions that the commonly cited 3.5 percent threshold would require.
