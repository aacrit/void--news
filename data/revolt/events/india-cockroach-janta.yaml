death_toll: No protester deaths have been confirmed. After the 20 July 2026 march, hospitals reported dozens of protesters injured by baton charges and tear gas, the CJP claimed about 150 people were hospitalized, and Delhi Police reported 118 officers injured and 15 to 20 government vehicles damaged. The two sides' casualty counts differ and police denied using unlawful force.
