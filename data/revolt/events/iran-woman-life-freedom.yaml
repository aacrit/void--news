summary: 'In September 2022 a 22-year-old woman, Mahsa Jina Amini, died in the custody of Iran’s morality police after being detained over her headscarf. Protests led by young women spread to every province under three words: Woman, Life, Freedom. The state answered with mass arrests, hundreds of deaths and executions. Open protest has receded, but the defiance of the mandatory hijab has not.'
significance: This was the first Iranian uprising organized around gender and everyday autonomy rather than economics or a single leader. It has no headquarters to arrest, which is both its resilience and its limit.
analytical_outlook: 'The movement is currently dormant rather than defeated: street mobilization has fallen, but everyday noncompliance persists and the security forces have not fractured. History suggests leaderless movements are hard to crush and hard to convert into a transfer of power. Placement on the arc: a spark that reached a radical challenge and then receded without dual power.'
