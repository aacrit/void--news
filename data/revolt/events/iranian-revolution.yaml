slug: iranian-revolution
title: The Iranian Revolution
subtitle: A monarch with the region's fifth-largest army fled without firing his forces
date_display: January 1978 to April 1979
date_start: 1978
date_end: 1979
date_precision: year
era: people-power
region: middle-east
country: Iran
revolt_type: religious-theocratic
status: concluded
summary: A planted newspaper article insulting exiled cleric Ruhollah Khomeini in January 1978 set off a cycle of protest and mourning marches that repeated every 40 days under Shia mourning custom, each round larger than the last. By September 1978 over a million marched in Tehran. Strikes shut down the oil industry in December. The Shah left the country on January 16, 1979; Khomeini returned from exile on February 1 to a crowd estimated near 3 million and the monarchy's remaining army command declared neutrality within two weeks.
significance: The only 20th-century revolution to replace a monarchy with a clerical theocracy, and the event that made political Islam an organizing template for opposition movements across the Muslim world.
analytical_outlook: A broad secular-religious coalition that overthrew the monarchy together, after which the best-organized faction, Khomeini's clergy, out-maneuvered its former allies within roughly two years.
grievances:
  - kind: Political repression
    intensity: 85
    evidence: SAVAK, the Shah's secret police, was widely documented by Amnesty International in the 1970s for torture and the detention of thousands of political prisoners.
  - kind: Rapid Westernization and secularization
    intensity: 75
    evidence: The Shah's White Revolution land reforms and 1976 replacement of the Islamic calendar with an imperial calendar angered both clergy and traditional bazaar merchants.
  - kind: Economic dislocation
    intensity: 70
    evidence: Oil-boom inflation ran near 25 percent by 1977 while rural migrants crowded into Tehran shantytowns without matching wage growth.
  - kind: Perceived foreign domination
    intensity: 65
    evidence: The 1953 Anglo-American-backed coup that restored the Shah after he fled Mossadegh's nationalist government remained a live grievance a quarter-century later.
actors:
  - actor_type: religious-clergy
    name: Ayatollah Ruhollah Khomeini
    description: Shia cleric exiled since 1964, directing the movement from Najaf and then Paris via cassette-taped sermons smuggled into Iran.
    role_in_arc: Became the unifying symbol and eventual leader of the post-revolutionary state
    defected: false
  - actor_type: old-regime
    name: Mohammad Reza Pahlavi
    description: Shah of Iran since 1941, commanded one of the largest militaries in the Middle East.
    role_in_arc: Left Iran on January 16, 1979 and died in exile in 1980
    defected: false
  - actor_type: masses
    name: National Front and Islamic-secular coalition
    description: Liberal nationalist, leftist, and bazaar merchant groups that joined the anti-Shah marches alongside religious networks.
    role_in_arc: Provided early organizational and street numbers before being marginalized after 1979
    defected: false
  - actor_type: military-defectors
    name: Imperial Iranian Army
    description: Roughly 400,000 strong, US-equipped, the Shah's primary instrument of control.
    role_in_arc: Declared neutrality on February 11, 1979, ending the monarchy's last means of resistance
    defected: true
  - actor_type: religious-clergy
    name: Shia mosque and seminary network
    description: Existing religious infrastructure across Iran's cities used to organize mourning marches and distribute Khomeini's messages.
    role_in_arc: Supplied the organizational backbone that outlasted the secular coalition
    defected: false
tactics:
  - tactic_type: mass-demonstration
    description: Marches every 40 days observing Shia mourning rites for prior protest deaths, each cycle drawing larger crowds through 1978.
    prominence: primary
  - tactic_type: general-strike
    description: Oil workers struck in October and December 1978, cutting production from 6 million to under 1 million barrels a day and crippling state revenue.
    prominence: primary
  - tactic_type: digital-mobilization
    description: Khomeini's speeches recorded on cassette tape in Paris were smuggled into Iran and copied for mosque distribution, bypassing state media.
    prominence: secondary
resistance_type: hybrid
