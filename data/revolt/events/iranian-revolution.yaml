success_factors:
  - factor_key: participation-threshold
    label: 3.5 percent participation rule
    framework: chenoweth
    status: Tehran marches alone drew crowds estimated near 2 to 3 percent of Iran's roughly 37 million population on peak days in December 1978 and February 1979
    direction: favors-movement
    base_rate: Chenoweth's research finds no campaign that achieved active participation from 3.5 percent of a population has failed to achieve its aims
    rationale: The December 1978 Ashura marches and Khomeini's February 1979 return drew crowds in the low millions nationwide, plausibly crossing or approaching the 3.5 percent threshold when combined with the general strikes' broader participation.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: military-defection
    label: Security force defection
    framework: chenoweth
    status: The Imperial Army's high command declared neutrality on February 11, 1979 rather than defend the provisional government
    direction: favors-movement
    base_rate: Security force defection or non-cooperation is the strongest single predictor of movement success across the historical record
    rationale: The Shah's roughly 400,000-strong military did not mutiny outright, but its refusal to fire on crowds and its final neutrality declaration removed the regime's last coercive option within two weeks of the Shah's departure.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: elite-fracture
    label: Elite fracture and state breakdown
    framework: goldstone
    status: Oil revenue collapse from the December 1978 strikes broke the state's fiscal capacity within weeks
    direction: favors-movement
    base_rate: Goldstone's state-breakdown model identifies fiscal crisis combined with elite defection as the structural precondition that converts protest into revolution
    rationale: The strike wave did not just express grievance, it removed the state's ability to pay its own security forces and bureaucracy, a mechanism Goldstone identifies across early modern and 20th-century revolutions alike.
    sources:
      - Goldstone, Revolution and Rebellion in the Early Modern World (1991)
