perspectives:
  - viewpoint: Revolutionary clergy
    viewpoint_type: revolutionary
    region_origin: middle-east
    narrative: To Khomeini's supporters, the revolution restored Islamic governance after decades of a foreign-installed monarchy that had suppressed religious life and sold Iran's resources to Western interests. The clergy's leadership reflected genuine popular consensus, confirmed by the March 1979 referendum.
    key_arguments:
      - The Shah's 1953 restoration by a foreign-backed coup delegitimized the monarchy from the outset
      - Clerical networks were the only institutions with the reach and trust to organize a nationwide movement
    sources: []
    notable_quotes:
      - text: We did not send our young people to the battlefronts to establish democracy
        speaker: Ruhollah Khomeini
        context: Widely cited remark reflecting the post-revolutionary marginalization of secular democratic demands
    emphasized:
      - SAVAK repression and the 1953 coup's lasting grievance
      - The scale of the referendum result
    omitted:
      - The extent of secular, leftist, and Marxist organizational contribution to the 1978 protests and strikes
  - viewpoint: Secular and leftist coalition member
    viewpoint_type: diaspora
    region_origin: middle-east
    narrative: Many secular nationalists and leftists who marched against the Shah in 1978 later described the revolution as stolen from a broader coalition. They argue the anti-Shah movement had genuinely plural goals, constitutional government, land reform, free press, that clerical authorities abandoned once the monarchy fell.
    key_arguments:
      - The 1978 coalition included nationalist, leftist, and secular liberal currents with democratic rather than theocratic aims
      - Post-1979 suppression of former allies, including the 1981 crackdown on the Mujahedin-e Khalq, reveals the theocratic outcome was not the coalition's shared goal
    sources: []
    notable_quotes: []
    emphasized:
      - Bazaar merchant and student organizing prior to clerical dominance
      - The narrowing of political space after 1979
    omitted:
      - The comparative organizational weakness of secular factions relative to the mosque network by late 1978
