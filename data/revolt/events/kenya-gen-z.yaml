success_factors:
  - factor_key: resistance_method
    label: Method of struggle
    framework: chenoweth
    status: Nonviolent, despite the fatal state response.
    direction: favors-movement
    base_rate: About 53 percent of nonviolent campaigns from 1900 to 2006 succeeded, versus about 26 percent for armed ones.
    rationale: The movement kept its nonviolent, digitally organized character even after fatal police fire.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: '2024'
    confidence: medium
  - factor_key: rapid_concession
    label: Speed of the concession
    framework: tilly
    status: The government withdrew the specific bill within 24 hours of the parliament breach, an unusually fast concession by historical standards.
    direction: favors-movement
    base_rate: Rapid, narrow concessions are a classic regime strategy to defuse a mobilization without addressing its structural cause.
    rationale: Withdrawing the bill answered the trigger but not the underlying demand for accountability, which is why protest continued into 2025.
    sources:
      - Tilly, From Mobilization to Revolution (1978)
    as_of: '2024'
    confidence: medium
  - factor_key: leadership_structure
    label: Leadership
    framework: tilly
    status: Deliberately leaderless and horizontal, organized through social media rather than a party or union.
    direction: indeterminate
    base_rate: Leaderless movements are historically harder to decapitate but also harder to convert into a negotiating body that can accept or enforce a settlement.
    rationale: No single figure or organization has emerged to negotiate accountability for the protest deaths, leaving the movement able to resurface but not to close out its central demand.
    sources:
      - Tufekci, Twitter and Tear Gas (2017)
    as_of: '2026'
    confidence: medium
  - factor_key: security_defection
    label: Did the security forces defect
    framework: chenoweth
    status: None reported; police have not defected despite documented killings and international condemnation.
    direction: favors-regime
    base_rate: Defection of the security forces is the single strongest predictor of a nonviolent campaign's success.
    rationale: Continued police enforcement, including alleged abductions into 2025, has kept the state's coercive capacity intact.
    sources:
      - Nepstad, Nonviolent Revolutions (2011)
    as_of: '2026'
    confidence: high
