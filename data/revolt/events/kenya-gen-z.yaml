perspectives:
  - viewpoint: Gen Z organizers
    viewpoint_type: movement
    region_origin: Nairobi
    narrative: Nobody elected a spokesperson because nobody needed one. We read the bill clause by clause and posted what it meant for the price of bread. Withdrawing it was the easy part for them. Answering for who fired on parliament, and who has gone missing since, is the part they still have not done.
    key_arguments:
      - The bill withdrawal addressed the trigger, not the demand for accountability.
      - A leaderless structure was a deliberate choice, not an accident.
    sources: []
    notable_quotes: []
    emphasized:
      - Police killings at parliament
      - Reports of abductions
    omitted:
      - Internal disagreement over whether to keep protesting after the bill fell
  - viewpoint: The government's position
    viewpoint_type: regime
    region_origin: Nairobi
    narrative: We listened and withdrew the bill within a day, and the cabinet was dismissed and rebuilt. Kenya faces real fiscal constraints tied to debt service that a bill or no bill does not remove. The government denies ordering the abductions rights groups have documented and says it is investigating them.
    key_arguments:
      - The government reversed course faster than most governments respond to protest.
      - Underlying fiscal pressure did not disappear with the bill.
