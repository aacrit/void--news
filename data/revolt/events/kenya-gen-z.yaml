legacy_points:
  - 'Forced one of Kenya''s fastest major fiscal reversals in recent memory: a finance bill withdrawn within 24 hours of a fatal confrontation at parliament.'
  - Organized without a visible leader, party or union structure, coordinating instead through TikTok and crowdsourced reviews of the bill's text.
  - Left the deeper demand, accountability for protest deaths and reported abductions, unresolved after the immediate trigger was withdrawn.
