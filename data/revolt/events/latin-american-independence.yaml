perspectives:
  - viewpoint: Bolivarian liberationist view
    viewpoint_type: revolutionary
    region_origin: Venezuela and Colombia
    narrative: A continental project of unified American self-rule, cut short by regional rivalry and the same elite fragmentation that had once served the independence cause.
    key_arguments:
      - Bolivar's writings explicitly argued for continental unity as a defense against renewed European intervention
      - The rapid collapse of Gran Colombia after 1830 vindicated his own warnings about regional factionalism
      - Broad participation by llanero and mixed-race soldiers reflected a genuinely popular, not merely elite, independence movement
    sources: []
    notable_quotes: []
    emphasized:
      - Bolivar's unity project
      - broad military participation
    omitted:
      - the limited practical extension of legal equality to non-white soldiers after victory
      - the civil wars that followed independence in nearly every new republic
  - viewpoint: Royalist and loyalist retrospective view
    viewpoint_type: counter-revolutionary
    region_origin: Spain
    narrative: The wars fractured a functioning, if imperfect, multi-ethnic imperial order into a series of unstable and often authoritarian successor states that took generations to approach the administrative capacity Spanish rule had provided.
    key_arguments:
      - The viceroyalties had functioning administrative and legal institutions that many successor states struggled to replicate for decades
      - Independence-era warfare and subsequent caudillo conflicts caused substantial loss of life and economic disruption
      - Several new republics experienced political instability lasting through most of the nineteenth century
    sources: []
    notable_quotes: []
    emphasized:
      - post-independence civil conflict
      - administrative disruption
    omitted:
      - the exclusion of creole elites and the caste system's constraints under colonial rule
      - the extended decline of Spain's own capacity that made reconquest impossible regardless of local administration
