success_factors:
  - factor_key: incumbent-metropolitan-crisis
    label: Collapse of the incumbent's metropolitan capacity, not challenger tactics alone, decided the outcome
    framework: skocpol
    status: confirmed
    direction: favors-movement
    base_rate: Incumbent state capacity collapse at the metropole is frequently the decisive variable in colonial independence outcomes
    rationale: Spain's own occupation by Napoleon and later civil conflict between liberals and absolutists left it with dwindling capacity to reinforce or resupply its American armies for most of the two decades of fighting.
    sources:
      - Skocpol, States and Social Revolutions (1979)
  - factor_key: foreign-material-support
    label: Foreign material and financial backing correlates with independence success but not reliably with stable institutions after
    framework: goldstone
    status: partial
    direction: indeterminate
    base_rate: Foreign material and financial backing correlates with independence success though not reliably with stable post-victory institutions
    rationale: British arms sales, loans, and volunteer legions materially aided Bolivar's campaigns, yet most of the resulting republics endured decades of civil war and caudillo rule after 1826 rather than immediate stability.
    sources:
      - 'Goldstone, Revolutions: A Very Short Introduction (2014)'
  - factor_key: broad-multiclass-mobilization
    label: Mobilization spanning multiple social classes expands a challenger's available manpower
    framework: tilly
    status: confirmed
    direction: favors-movement
    base_rate: Mobilization spanning multiple social classes, not narrow elite-led rebellion alone, expands a challenger's available manpower and resource base
    rationale: Bolivar's Venezuelan campaigns depended heavily on llanero cavalry and mixed-race soldiers, a far broader coalition than the creole elite alone could have fielded.
    sources:
      - Tilly, From Mobilization to Revolution (1978)
