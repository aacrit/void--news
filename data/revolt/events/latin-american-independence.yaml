slug: latin-american-independence
title: The Spanish American Wars of Independence
subtitle: Napoleon topples a king in Madrid, and a continent stops asking Spain's permission
date_display: 1808-1826
date_start: 1808
date_end: 1826
date_precision: year
era: atlantic
region: americas
country: Spanish America (Venezuela, Colombia, Ecuador, Peru, Bolivia, Argentina, Chile, Mexico, and beyond)
revolt_type: anticolonial
status: concluded
summary: Napoleon's 1808 invasion of Spain and imposition of his brother Joseph Bonaparte as king stripped Madrid of the authority its American colonies had always answered to. Creole-led juntas formed across the viceroyalties claiming to rule in the exiled king's name, then declared outright independence, and two decades of campaigning under Simon Bolivar and Jose de San Martin produced more than a dozen new republics by 1826.
significance: The dismantling, within a single generation, of nearly the entire Spanish American empire, a process driven as much by Spain's own metropolitan collapse as by any single military campaign, and one that left the new republics with independence but, in most cases, decades of subsequent civil conflict.
grievances:
  - kind: Loss of Spanish royal legitimacy
    intensity: 75
    evidence: Napoleon's 1808 invasion of Spain and the forced abdication of Ferdinand VII in favor of Joseph Bonaparte left the American colonies without a legitimate king to answer to, opening the legal argument for local self-rule.
  - kind: Exclusion of creole elites from senior office
    intensity: 68
    evidence: Colonial administrative and church posts above a certain rank were reserved by policy for peninsulares born in Spain, regardless of a creole candidate's wealth or education.
  - kind: Bourbon trade restrictions
    intensity: 60
    evidence: Colonial trade was legally restricted to Spain alone for most of the eighteenth century, and Bourbon-era tax increases in the decades before 1808 had already generated repeated local unrest.
  - kind: Caste-based legal hierarchy
    intensity: 55
    evidence: The casta system assigned differentiated legal rights by racial classification, constraining the political and economic standing of mixed-race, indigenous, and enslaved populations throughout the viceroyalties.
actors:
  - actor_type: vanguard
    name: Simon Bolivar
    description: Venezuelan-born creole officer and political leader.
    role_in_arc: Led campaigns across present-day Venezuela, Colombia, Ecuador, Peru, and Bolivia, and envisioned a unified Gran Colombia that did not outlast his own lifetime.
    defected: false
  - actor_type: vanguard
    name: Jose de San Martin
    description: Argentine-born officer trained in the Spanish army before joining the independence cause.
    role_in_arc: Led the crossing of the Andes and the liberation campaigns in Argentina, Chile, and Peru before ceding leadership of the Peruvian campaign to Bolivar in 1822.
    defected: false
  - actor_type: old-regime
    name: Royalist Spanish forces
    description: Troops loyal to the Spanish crown, reinforced from Spain after Ferdinand VII's 1814 restoration.
    role_in_arc: Fought a prolonged and often brutal counterinsurgency, particularly in Venezuela and Peru, before the final defeats at Ayacucho in 1824 and Callao in 1826.
    defected: false
  - actor_type: masses
    name: Llanero cavalry and mixed-race soldiers
    description: Plains horsemen and soldiers of mixed racial background who formed the bulk of Bolivar's fighting force in Venezuela.
    role_in_arc: Provided the decisive manpower for Bolivar's Venezuelan and Colombian campaigns, often under promises of legal equality only partially honored after independence.
    defected: false
  - actor_type: foreign-backer
    name: British volunteers and merchants
    description: British Legion volunteers and arms merchants who supported the independence campaigns.
    role_in_arc: Supplied weapons, loans, and several thousand volunteer soldiers who fought alongside Bolivar's armies.
    defected: false
tactics:
  - tactic_type: armed-insurgency
    description: Continental campaigns and set-piece battles, including Boyaca in 1819 and Ayacucho in 1824, decided control of entire viceroyalties.
    prominence: primary
  - tactic_type: guerrilla-warfare
    description: Llanero irregular cavalry raids sustained the Venezuelan independence campaign through years when conventional forces could not hold territory.
    prominence: primary
  - tactic_type: parallel-institutions
    description: Creole-led juntas formed in Caracas, Buenos Aires, and Bogota in 1810, initially claiming to govern in the exiled king's name before moving to outright independence.
    prominence: secondary
resistance_type: armed
