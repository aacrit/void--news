perspectives:
  - viewpoint: Meiji nationalist and modernizer view
    viewpoint_type: revolutionary
    region_origin: Japan
    narrative: 'The restoration was a necessary act of national survival: without rapid centralization and industrial catch-up, Japan risked colonization like much of the rest of Asia.'
    key_arguments:
      - Unequal treaties proved the shogunate could not defend Japanese sovereignty
      - Rapid modernization required a unified national government the domain system could not provide
      - Within a single generation Japan avoided the colonization that befell its neighbors
    sources: []
    notable_quotes: []
    emphasized:
      - the speed of industrial and military modernization
      - the treaty humiliations that preceded the restoration
    omitted:
      - the loss of status and livelihood imposed on lower-ranking samurai
      - the militarist trajectory the centralized state later took
  - viewpoint: Displaced samurai retrospective
    viewpoint_type: counter-revolutionary
    region_origin: Japan
    narrative: Many of the very samurai who fought for the restoration found their class abolished within a decade, a betrayal significant enough to trigger armed rebellion against the government they had helped install.
    key_arguments:
      - Saigo Takamori, a restoration hero, led the 1877 Satsuma Rebellion against the government he helped create
      - Stipend abolition and conscription reform stripped samurai of both income and social function
      - The restoration's rhetoric of honoring the emperor obscured how thoroughly it dismantled the old order
    sources: []
    notable_quotes: []
    emphasized:
      - the 1877 Satsuma Rebellion
      - stipend and status losses among lower samurai
    omitted:
      - the economic stagnation samurai already faced before the restoration
      - the industrial gains that followed for the wider population
