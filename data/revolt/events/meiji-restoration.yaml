military_defection: partial
foreign_intervention: material
duration_days: 500
death_toll: An estimated 8,000 to 10,000 killed in the Boshin War, a fraction of the toll from contemporaneous revolutions elsewhere, reflecting the speed of domain defections once the shogunate's weakness was proven.
death_toll_low: 8000
death_toll_high: 12000
regime_before: military
regime_after: monarchy
democratization_delta: -1
success_factors:
  - factor_key: elite-fracture
    label: Elite fracture between rival power centers, not mass mobilization, drove the outcome
    framework: skocpol
    status: confirmed
    direction: favors-movement
    base_rate: 'Skocpol''s model applies most cleanly to elite-driven cases like this one: a split between the shogunate and excluded regional elites, not a popular uprising, produced the state collapse'
    rationale: The restoration was organized by samurai from two domains, not by peasants or urban crowds; ordinary Japanese participation in the actual fighting was minimal.
    sources:
      - Skocpol, States and Social Revolutions (1979)
  - factor_key: participation-threshold-inapplicable
    label: The 3.5 percent mass-participation rule does not apply to elite coups
    framework: chenoweth
    status: atypical
    direction: indeterminate
    base_rate: Chenoweth's participation threshold research concerns mass civil resistance campaigns and offers no predictive claim about narrowly elite-led restorations
    rationale: The Meiji Restoration succeeded with a coalition of a few domains' samurai forces rather than broad popular mobilization, a structurally different mechanism than the mass movements the 3.5 percent finding describes.
    sources:
      - 'Chenoweth, Civil Resistance: What Everyone Needs to Know (2021)'
  - factor_key: foreign-material-limited
    label: Indirect foreign arms sales shaped, but did not decide, the military balance
    framework: goldstone
    status: partial
    direction: favors-movement
    base_rate: Goldstone's comparative work finds foreign material support a secondary factor next to domestic elite alignment in determining a challenger's success
    rationale: British arms sales to Satsuma and Choshu improved their forces, but domain defections after Toba-Fushimi, not superior weaponry, decided the war's outcome.
    sources:
      - 'Goldstone, Revolutions: A Very Short Introduction (2014)'
