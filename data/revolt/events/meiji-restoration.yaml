slug: meiji-restoration
title: The Meiji Restoration
subtitle: Provincial samurai overthrow a shogunate to modernize it out of existence
date_display: 1868-1869
date_start: 1868
date_end: 1869
date_precision: year
era: modern-nationalist
region: east-asia
country: Japan
revolt_type: coup-from-above
status: concluded
summary: Commodore Perry's 1853 warships exposed the Tokugawa shogunate's weakness against foreign power. Fifteen years later, samurai from the Satsuma and Choshu domains forced the last shogun to resign, fought the Boshin War against his loyalists, and installed the teenage Emperor Meiji as the figurehead of a rapid, top-down industrial transformation.
significance: One of the few revolutions where the challengers explicitly organized around restoring an ancient monarch, then used that restored authority to abolish the very feudal class, the samurai, that had carried out the restoration.
grievances:
  - kind: Humiliation by foreign powers
    intensity: 85
    evidence: Commodore Perry's 1853 fleet forced the shogunate to sign unequal treaties opening Japanese ports and surrendering tariff control, treaties Japan could not renegotiate for decades.
  - kind: Samurai economic decline
    intensity: 65
    evidence: Rice-stipend samurai incomes had stagnated for generations under Tokugawa rule while merchant wealth grew, leaving lower-ranking samurai in the Satsuma and Choshu domains with status but shrinking income.
  - kind: Domain exclusion from national power
    intensity: 60
    evidence: The Satsuma and Choshu domains, among Japan's largest, had been excluded from senior shogunate posts since their defeat at the 1600 Battle of Sekigahara.
  - kind: Repeated foreign bombardment
    intensity: 55
    evidence: British warships shelled Kagoshima in 1863 and an allied Western fleet bombarded Shimonoseki in 1864, demonstrating the shogunate could not protect its own domains from foreign navies.
actors:
  - actor_type: vanguard
    name: Satsuma-Choshu alliance
    description: A secret 1866 pact between two rival domains united against the shogunate.
    role_in_arc: Provided the troops, funding, and political strategy behind the restoration and the Boshin War that followed.
    defected: false
  - actor_type: old-regime
    name: Tokugawa Yoshinobu
    description: The fifteenth and last Tokugawa shogun.
    role_in_arc: Resigned civil authority to the emperor in November 1867, then fought and lost the Boshin War before formally submitting in 1869.
    defected: false
  - actor_type: military-defectors
    name: Domain lords who switched allegiance
    description: Regional daimyo who abandoned the shogunate once its military weakness became clear.
    role_in_arc: Their defections after the shogunate's 1868 defeat at Toba-Fushimi accelerated the Boshin War's rapid conclusion.
    defected: true
  - actor_type: foreign-backer
    name: British and French arms traders
    description: European powers who sold modern rifles and warships to both the pro-restoration and shogunate sides.
    role_in_arc: British merchants favored the Satsuma-Choshu alliance while France backed the shogunate, indirectly shaping the war's military balance.
    defected: false
  - actor_type: vanguard
    name: Emperor Meiji
    description: Enthroned in 1867 at age fourteen.
    role_in_arc: Served as the symbolic center of authority the restoration invoked, then as the figurehead of the modernization program carried out largely by his former samurai backers.
    defected: false
tactics:
  - tactic_type: armed-insurgency
    description: The Boshin War's set-piece battles, Toba-Fushimi and the fall of Edo, decided the shogunate's fate within eighteen months.
    prominence: primary
  - tactic_type: parallel-institutions
    description: The Satsuma-Choshu alliance built a shadow imperial court and military command structure around the young emperor before openly challenging the shogunate.
    prominence: primary
  - tactic_type: defection-fraternization
    description: Domain after domain abandoned the shogunate once Toba-Fushimi showed which side could win, sparing much of Japan a prolonged war.
    prominence: secondary
resistance_type: armed
phases:
  - phase: old-regime-crisis
    label: The unequal treaties
    t_start: 0
    t_end: 0.12
    intensity: 50
    reached: true
    summary: Perry's 1853 fleet and the treaties that followed expose the shogunate's inability to defend Japanese sovereignty, discrediting it in the eyes of ambitious domains.
    key_events:
      - Perry's fleet arrives, 1853
      - Unequal treaties signed, 1858
      - Bombardment of Kagoshima, 1863
  - phase: the-spark
    label: The shogun resigns
    date_start: '1867-11-09'
    t_start: 0.22
    t_end: 0.34
    intensity: 65
    reached: true
    summary: Tokugawa Yoshinobu resigns civil authority to the emperor in an attempt to preserve influence within a new order, a bid the Satsuma-Choshu alliance moves to preempt.
    key_events:
      - Satsuma-Choshu secret alliance formed, 1866
      - Yoshinobu resigns to the emperor, November 9, 1867
  - phase: radical-phase
    label: The Boshin War
    date_start: '1868-01-27'
    t_start: 0.6
    t_end: 0.72
    intensity: 88
    reached: true
    summary: Pro-restoration forces defeat shogunate loyalists at Toba-Fushimi, triggering a cascade of domain defections and the fall of Edo without a prolonged siege.
    key_events:
      - Battle of Toba-Fushimi, January 27, 1868
      - Edo surrenders without major battle, May 1868
  - phase: consolidation
    label: Restoration proclaimed
    date_start: '1869-06-27'
    t_start: 0.92
    t_end: 1
    intensity: 55
    reached: true
    summary: The last shogunate holdouts surrender at Hakodate in June 1869, and the new imperial government begins dismantling the feudal domain system that had just carried it to power.
    key_events:
      - Battle of Hakodate ends resistance, June 1869
      - Charter Oath sets reform direction, 1868
outcome: consolidated-autocracy
