success_factors:
  - factor_key: armed-duration-cost
    label: Prolonged armed campaigns are costlier and less predictable than short ones
    framework: chenoweth
    status: confirmed
    direction: indeterminate
    base_rate: Armed campaigns succeed in roughly 26% of historical cases and tend to produce more durable authoritarian aftermaths than nonviolent transitions when they do succeed
    rationale: A full decade of shifting armed coalitions eventually toppled Diaz and Huerta, but produced a one-party state, the PRI's predecessor coalitions, rather than the pluralist democracy Madero had originally sought.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: coalition-fracture
    label: Revolutionary coalitions that win together often fracture immediately after victory
    framework: skocpol
    status: confirmed
    direction: favors-regime
    base_rate: Skocpol's comparative cases find post-victory elite fracture among a revolution's own factions a common cause of prolonged instability
    rationale: Villa, Zapata, and Carranza fought together against Huerta in 1914, then fought each other for the next three years, with Carranza's faction eventually prevailing.
    sources:
      - Skocpol, States and Social Revolutions (1979)
  - factor_key: agrarian-mobilization
    label: Peasant-army mobilization can outlast urban elite coalitions
    framework: goldstone
    status: confirmed
    direction: favors-movement
    base_rate: Goldstone's comparative work identifies sustained agrarian mobilization as a structural advantage over narrowly elite-led movements in protracted conflicts
    rationale: Zapata's peasant base in Morelos kept fighting through every change of national government from 1911 until his 1919 assassination, outlasting three separate national administrations.
    sources:
      - 'Goldstone, Revolutions: A Very Short Introduction (2014)'
