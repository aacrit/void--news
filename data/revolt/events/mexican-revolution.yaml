perspectives:
  - viewpoint: Zapatista agrarian view
    viewpoint_type: movement
    region_origin: Morelos, Mexico
    narrative: The revolution's true promise was land for the people who worked it; every national government from Madero to Carranza betrayed that promise in turn, and Zapata's assassination confirmed the betrayal was deliberate.
    key_arguments:
      - The Plan of Ayala explicitly demanded land redistribution Madero refused to deliver
      - Carranza's forces hunted and killed Zapata rather than negotiate land reform
      - Genuine land reform waited until Cardenas's presidency in the 1930s, over a decade after the fighting ended
    sources: []
    notable_quotes:
      - text: It is better to die on your feet than to live on your knees.
        speaker: Emiliano Zapata
        context: Widely attributed statement of the Zapatista movement's stance
    emphasized:
      - the Plan de Ayala
      - Zapata's assassination
    omitted:
      - the administrative difficulty of redistributing land nationally during ongoing civil war
      - gains urban labor secured under the 1917 Constitution
  - viewpoint: Constitutionalist institution-building view
    viewpoint_type: moderate
    region_origin: Mexico City
    narrative: Ending a decade of factional war required a single dominant coalition capable of writing and enforcing a national constitution, even at the cost of marginalizing rival revolutionary leaders like Villa and Zapata.
    key_arguments:
      - The 1917 Constitution's reforms could not be implemented while rival armies still contested the countryside
      - Carranza's consolidation, however costly, ended open civil war faster than a continued three-way conflict would have
      - The resulting one-party system provided decades of political stability after ten years of war
    sources: []
    notable_quotes: []
    emphasized:
      - the 1917 Constitution's durability
      - the end of open civil war by 1920
    omitted:
      - the human cost of suppressing Villa's and Zapata's factions
      - the decades of one-party rule the consolidation entrenched
