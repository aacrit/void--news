slug: mexican-revolution
title: The Mexican Revolution
subtitle: Ten years of war leave a constitution, a ruling party, and a million dead
date_display: 1910-1920
date_start: 1910
date_end: 1920
date_precision: year
era: modern-nationalist
region: americas
country: Mexico
revolt_type: social
status: concluded
summary: Porfirio Diaz's rigged 1910 re-election set off a decade of shifting armed coalitions, Madero's liberal reformers, Zapata's landless peasants, Villa's northern cavalry, Carranza's constitutionalists, that toppled Diaz, then fought each other for control of what came after him.
significance: Produced Latin America's first great social revolution of the twentieth century and a constitution, 1917, whose land reform and labor provisions still shape Mexican law, even as the revolutionary coalition's own factions spent years killing each other over what the revolution meant.
grievances:
  - kind: Land concentration under the Porfiriato
    intensity: 90
    evidence: By 1910, roughly 90 percent of Mexico's rural population owned no land at all, while haciendas belonging to a small elite controlled the majority of arable territory.
  - kind: Fraudulent 1910 re-election
    intensity: 75
    evidence: Porfirio Diaz jailed his opposition candidate Francisco Madero before the 1910 election and declared himself the winner for an eighth term after 34 years in power.
  - kind: Foreign ownership of Mexican industry
    intensity: 60
    evidence: American and British companies controlled the majority of Mexico's oil production and much of its mining by 1910, with profits flowing largely out of the country.
actors:
  - actor_type: vanguard
    name: Francisco Madero
    description: Wealthy landowner turned liberal reformer, jailed then exiled by Diaz before the 1910 election.
    role_in_arc: Issued the Plan of San Luis Potosi calling for revolt, became president in 1911, and was overthrown and killed in Huerta's 1913 coup.
    defected: false
  - actor_type: masses
    name: Emiliano Zapata
    description: Leader of the Ejercito Libertador del Sur, the peasant army of Morelos state.
    role_in_arc: Fought for land redistribution under the slogan Tierra y Libertad through every shift in national leadership, and was assassinated by Carranza's forces in 1919.
    defected: false
  - actor_type: military-defectors
    name: Pancho Villa
    description: Former bandit turned commander of the Division del Norte cavalry.
    role_in_arc: Won major battles against Huerta and later against Carranza, then was marginalized after his coalition's defeat at Celaya in 1915.
    defected: false
  - actor_type: old-regime
    name: Porfirio Diaz
    description: President of Mexico for 34 of the previous 35 years.
    role_in_arc: Resigned and went into exile in France in May 1911 after Madero's forces took Ciudad Juarez.
    defected: false
  - actor_type: counter-revolutionaries
    name: Victoriano Huerta
    description: General who led the coup against Madero.
    role_in_arc: Seized the presidency in February 1913 after Madero's assassination, and was driven from power by the Constitutionalist coalition in 1914.
    defected: false
tactics:
  - tactic_type: armed-insurgency
    description: Successive campaigns, Ciudad Juarez, Torreon, Celaya, moved the front lines across most of Mexico's territory over ten years.
    prominence: primary
  - tactic_type: guerrilla-warfare
    description: Zapata's Ejercito Libertador fought a sustained irregular campaign in Morelos, retreating to the hills whenever a national government's army advanced.
    prominence: primary
  - tactic_type: sabotage
    description: Villa's forces repeatedly cut rail lines to isolate federal garrisons and disrupt troop movements across the north.
    prominence: secondary
resistance_type: armed
phases:
  - phase: old-regime-crisis
    label: The Porfiriato's stagnation
    t_start: 0
    t_end: 0.12
    intensity: 45
    reached: true
    summary: Three decades of Diaz rule concentrate land and political power while leaving most Mexicans landless and unrepresented.
    key_events:
      - Diaz jails Madero before the 1910 election
      - Diaz declared winner of an eighth term, 1910
  - phase: the-spark
    label: The Plan of San Luis Potosi
    date_start: '1910-11-20'
    t_start: 0.22
    t_end: 0.34
    intensity: 70
    reached: true
    summary: Madero calls for armed revolt from exile in Texas, and fighting spreads across northern Mexico within weeks.
    key_events:
      - Plan of San Luis Potosi issued, October 1910
      - Armed revolt begins, November 20, 1910
  - phase: moderate-phase
    label: Madero's presidency
    t_start: 0.34
    t_end: 0.48
    intensity: 55
    reached: true
    summary: Diaz resigns and Madero takes office promising gradual reform, disappointing Zapata's peasant base, which resumes fighting almost immediately.
    key_events:
      - Diaz resigns, May 1911
      - Madero inaugurated, November 1911
      - Zapata's Plan of Ayala rejects Madero, November 1911
  - phase: radical-phase
    label: Huerta's coup and the Constitutionalist war
    date_start: '1913-02-22'
    t_start: 0.6
    t_end: 0.72
    intensity: 85
    reached: true
    summary: Huerta's coup and Madero's assassination unite Villa, Zapata, and Carranza in a war against the new dictatorship, which collapses within eighteen months.
    key_events:
      - Madero assassinated, February 22, 1913
      - Huerta driven from power, July 1914
  - phase: terror-virtue
    label: War among the winners
    t_start: 0.72
    t_end: 0.84
    intensity: 80
    reached: true
    summary: The victorious revolutionary coalition splits; Villa and Zapata fight Carranza's constitutionalists in a war as bloody as the one against Huerta.
    key_events:
      - Convention of Aguascalientes fails to unify factions, October 1914
      - Villa defeated at Celaya, April 1915
  - phase: thermidor
    label: Carranza consolidates
    t_start: 0.84
    t_end: 0.92
    intensity: 60
    reached: true
    summary: Carranza secures national power and moves against his former allies, having Zapata ambushed and killed in 1919.
    key_events:
      - Zapata assassinated, April 10, 1919
      - Carranza's government recognized internationally, 1915-1917
  - phase: consolidation
    label: The 1917 Constitution
    date_start: '1917-02-05'
    t_start: 0.92
    t_end: 1
    intensity: 50
    reached: true
    summary: Mexico ratifies a new constitution enshrining land reform and labor rights, and Alvaro Obregon's 1920 accession ends the decade of open civil war.
    key_events:
      - 1917 Constitution ratified, February 5, 1917
      - Obregon becomes president, 1920
