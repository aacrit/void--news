success_factors:
  - factor_key: resistance_method
    label: Method of struggle
    framework: chenoweth
    status: Now primarily armed after beginning nonviolent.
    direction: favors-regime
    base_rate: About 53 percent of nonviolent campaigns from 1900 to 2006 succeeded, versus about 26 percent of armed ones.
    rationale: The shift to arms was forced by mass killing, but the base rate for armed campaigns is markedly lower.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: '2024'
    confidence: medium
  - factor_key: security_defection
    label: Did the security forces defect
    framework: chenoweth
    status: Partial. A steady trickle of defectors, but no unit-level break.
    direction: indeterminate
    base_rate: Defection of the security forces is the single strongest predictor of a campaign’s success.
    rationale: The Tatmadaw’s cohesion, built on economic self-interest and isolation, has largely held.
    sources:
      - Nepstad, Nonviolent Revolutions (2011)
    as_of: '2024'
    confidence: medium
  - factor_key: external_support
    label: Foreign backing
    framework: chenoweth
    status: Both sides receive material foreign support.
    direction: favors-regime
    base_rate: Foreign sponsorship correlates with lower, not higher, long-run campaign success.
    rationale: Arms flows to the junta from major neighbors help it outlast a fragmented resistance.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: '2024'
    confidence: low
  - factor_key: coalition_breadth
    label: Breadth of the coalition
    framework: goldstone
    status: Broad. Bamar majority pro-democracy forces allied with ethnic armed organizations.
    direction: favors-movement
    base_rate: Revolutions rarely succeed until a broad cross-class, cross-region coalition forms against the ruler.
    rationale: The 2021 uprising bridged a historic divide between the majority and the ethnic peripheries.
    sources:
      - Goldstone, Revolution and Rebellion in the Early Modern World (1991)
    as_of: '2024'
    confidence: medium
