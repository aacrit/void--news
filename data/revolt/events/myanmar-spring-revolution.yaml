title: The Myanmar Spring Revolution
subtitle: A stolen election answered with rifles
date_display: 2021 to present
date_start: 2021
date_precision: year
era: square-revolutions
region: southeast-asia
country: Myanmar
revolt_type: democratic-uprising
status: active
summary: On 1 February 2021 the Myanmar military annulled an election it had lost in a landslide and jailed the civilian leadership. Nonviolent strikes filled the streets for weeks. When the army answered with live fire, much of the movement took up arms. A parallel National Unity Government and a patchwork of People's Defence Forces now hold ground the junta cannot retake.
significance: 'Myanmar is a live test of the hardest question in the study of revolution: what a movement does when nonviolent resistance is met with mass killing. It began nonviolent and became one of the largest armed uprisings of the century.'
analytical_outlook: 'The junta has lost control of much of the country’s periphery but holds the core cities. The historical record on armed insurgencies against an entrenched military is mixed, and foreign patrons on both sides prolong the stalemate. Placement on the arc: a contested dual-power phase with no thermidor in sight.'
grievances:
  - kind: political
    intensity: 90
    evidence: The military voided the November 2020 election, which the National League for Democracy won with about 80 percent of contested seats.
