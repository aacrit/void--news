success_factors:
  - factor_key: resistance_method
    label: Method of struggle
    framework: chenoweth
    status: Hybrid. A mass, largely nonviolent mobilization that escalated on 9 September into arson and destruction of government buildings, alongside police live fire against protesters.
    direction: indeterminate
    base_rate: About 53 percent of nonviolent campaigns from 1900 to 2006 succeeded, versus about 26 percent for armed ones.
    rationale: The movement kept its favorable odds while it stayed a mass protest, but the turn to property destruction introduces the kind of violence that can narrow participation and hand the state a security rationale.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: '2025'
    confidence: medium
  - factor_key: peak_participation
    label: Peak participation
    framework: chenoweth
    status: Large and cross-class in Kathmandu, but no reliable estimate exists for peak share of the national population.
    direction: indeterminate
    base_rate: No nonviolent campaign that mobilized at least 3.5 percent of the population at its peak has failed to achieve its stated aim, in the dataset built through 2006.
    rationale: Crowds were large enough to overwhelm the capital's security cordon, but the 3.5 percent threshold has not been independently verified for this case and the movement was not consistently nonviolent.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: '2025'
    confidence: low
  - factor_key: security_defection
    label: Did the security forces defect
    framework: chenoweth
    status: Partial. The police carried out the lethal crackdown, but the army declined to fight for Oli, took charge of security and helped broker his exit and the interim government.
    direction: favors-movement
    base_rate: Defection of the security forces is the single strongest predictor of a nonviolent campaign's success.
    rationale: The split within the state, police repression but an army unwilling to sustain it, is what let the government fall within days rather than settle into a prolonged standoff.
    sources:
      - Nepstad, Nonviolent Revolutions (2011)
    as_of: '2025'
    confidence: high
  - factor_key: elite_fracture
    label: Did the ruling bloc fracture
    framework: goldstone
    status: Decisive in the short term. The home minister and then the prime minister resigned, parliament was dissolved, and the governing coalition collapsed within four days.
    direction: favors-movement
    base_rate: Revolutions and forced political openings rarely succeed until the ruling elite itself fractures or loses cohesion.
    rationale: The government's rapid disintegration, rather than protest numbers alone, produced the opening the movement then had to fill.
    sources:
      - Goldstone, Revolution and Rebellion in the Early Modern World (1991)
    as_of: '2025'
    confidence: high
  - factor_key: transition_capture
    label: Surviving the transition
    framework: skocpol
    status: In progress. The March 2026 election was held on schedule; the Rastriya Swatantra Party won a parliamentary majority and Balendra Shah replaced Karki's interim government on 27 March 2026, while the established parties, their local networks and the bureaucracy remain in place.
    direction: indeterminate
    base_rate: Revolutions are most fragile in the period after the ruler falls, when the old state's institutions survive and can reassert themselves.
    rationale: The election changed the party in power rather than returning the incumbents; whether the new government changes the underlying system or is blunted by the institutions that survived the uprising will show whether the movement reformed the state or only replaced its leadership.
    sources:
      - Skocpol, States and Social Revolutions (1979)
    as_of: '2026'
    confidence: medium
