legacy_points:
  - Ended the government of K.P. Sharma Oli, one of Nepal's most durable political figures, in roughly four days, over a social media ban that became a referendum on corruption and youth prospects.
  - Put the first woman, former chief justice Sushila Karki, at the head of Nepal's government, chosen with input from an open online consultation rather than a party.
  - At the March 2026 election voters gave the Rastriya Swatantra Party a parliamentary majority and made Kathmandu mayor Balendra Shah prime minister, replacing the established coalition rather than returning it; whether the new government delivers the anti-corruption and institutional reform the movement demanded remains unresolved.
