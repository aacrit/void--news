perspectives:
  - viewpoint: The Gen Z protesters
    viewpoint_type: movement
    region_origin: Kathmandu
    narrative: They cut off the platforms we live and speak on, then answered our rally with live rounds. The ban was the last insult from a class that lets its own children live abroad in comfort while ours line up for visas. We did not want to burn anything. We wanted the people who did this gone, and we wanted a say in who came next.
    key_arguments:
      - The killings on 8 September, not the ban alone, made Oli's resignation the only acceptable outcome.
      - A leaderless movement can still shape the succession when it organizes the choice in the open.
    sources: []
    notable_quotes: []
    emphasized:
      - The first day's deaths
      - Corruption and the 'nepo kids' divide
    omitted:
      - The arson's cost and who bears responsibility for it
  - viewpoint: The analyst
    viewpoint_type: academic
    region_origin: Global
    narrative: Nepal fell in days because the army chose not to fight for a government the police were already dying to defend. That split inside the state is the same variable that decided Dhaka in 2024 and Manila in 1986. It explains the speed of the collapse; it does not tell you what a newly elected government does with the mandate the election handed it.
    key_arguments:
      - A divided security apparatus, not protest size alone, explains how fast the government fell.
      - The harder test is whether the government elected in March 2026 reforms the party system or is absorbed by it.
    sources: []
