death_toll: At least 72 people were killed in the September 2025 unrest, a toll several official and press counts put close to 76. The Nepali Army's official account attributed 22 protester deaths, 3 police and 10 prisoners shot during a mass jailbreak to gunfire; the remainder include people who died in the fires set on 9 September. More than 2,000 people were injured.
