perspectives:
  - viewpoint: EDSA participant
    viewpoint_type: movement
    region_origin: southeast-asia
    narrative: Participants who filled EDSA over four days described a spontaneous civic response to Cardinal Sin's appeal, driven by years of accumulated anger over the 1983 Aquino assassination and the stolen 1986 election, expressed through prayer and food rather than weapons.
    key_arguments:
      - Mass unarmed presence, not organized armed force, was what physically prevented loyalist tanks from reaching the mutinous camps
      - The movement's discipline in avoiding violence protected both the crowd and the defecting soldiers from a justification for a bloody crackdown
    sources: []
    notable_quotes: []
    emphasized:
      - The religious and communal character of the crowd's tactics, including rosaries and shared food
      - The rapid, four-day timeline from mutiny to Marcos's departure
    omitted:
      - The extent to which the outcome depended on the prior elite-level defection by Enrile and Ramos rather than civilian action alone
  - viewpoint: Defecting military officer
    viewpoint_type: military
    region_origin: southeast-asia
    narrative: Enrile and Ramos later described their break from Marcos as driven by internal AFP factionalism and the perceived illegitimacy of the snap election result, framing their February 22 barricade less as a plan for civilian revolution and more as an attempted military reform that the EDSA crowd then made irreversible.
    key_arguments:
      - Their initial move was a narrow military mutiny against Marcos loyalists within the armed forces, not a call for the mass civilian mobilization that followed
      - Cardinal Sin's broadcast and the resulting crowd transformed a contained military standoff into a decisive national event
    sources: []
    notable_quotes: []
    emphasized:
      - Internal AFP reform grievances predating the snap election
      - The tactical vulnerability of their position at Camps Aguinaldo and Crame absent civilian protection
    omitted:
      - Their own prior service enforcing Marcos's martial-law-era policies before their 1986 break
