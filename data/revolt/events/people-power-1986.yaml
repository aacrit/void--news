slug: people-power-1986
title: People Power (EDSA Revolution)
subtitle: Four days on one Manila highway ended a twenty-year dictatorship
date_display: February 22-25, 1986
date_start: 1986
date_end: 1986
date_precision: year
era: people-power
region: southeast-asia
country: Philippines
revolt_type: democratic-uprising
status: concluded
summary: Ferdinand Marcos claimed victory in a February 7, 1986 snap election widely documented as fraudulent, prompting opposition leader Corazon Aquino, widow of assassinated senator Benigno Aquino, to call for civil disobedience. When Defense Minister Juan Ponce Enrile and armed forces vice chief Fidel Ramos broke from Marcos on February 22 and barricaded themselves at two military camps on Epifanio de los Santos Avenue, Catholic Cardinal Jaime Sin broadcast a radio appeal for citizens to protect them. An estimated one to two million Filipinos filled EDSA over four days, offering food and rosaries to troops sent to disperse them. Marcos fled to Hawaii on a US Air Force flight on February 25, ending twenty years of rule including nine years of martial law.
significance: Coined the term 'People Power' and became the reference case for mass nonviolent civilian protection of a military mutiny forcing a dictator's exit without civil war.
analytical_outlook: A near-textbook case of the security-force defection and mass-nonviolent-participation literature converging within a single four-day window.
grievances:
  - kind: Electoral fraud
    intensity: 85
    evidence: The National Movement for Free Elections documented widespread ballot tampering in the February 7, 1986 snap election; the Marcos-controlled National Assembly declared him winner despite an independent count favoring Aquino.
  - kind: Political assassination and repression
    intensity: 80
    evidence: Opposition leader Benigno Aquino Jr. was shot dead on the tarmac at Manila International Airport on August 21, 1983 upon returning from exile, an event that galvanized mass opposition organizing.
  - kind: Martial law legacy
    intensity: 75
    evidence: Marcos ruled under martial law from 1972 to 1981, during which Amnesty International documented thousands of arbitrary arrests and hundreds of forced disappearances.
  - kind: Economic crisis and cronyism
    intensity: 65
    evidence: The Philippine economy contracted by roughly 7 percent in 1984 amid an estimated 5 to 10 billion dollars in wealth accumulated by the Marcos family and associated cronies.
