connections:
  - target_slug: fall-of-communism-1989
    connection_type: provided-model
    description: EDSA's combination of mass nonviolent crowds and military non-cooperation was cited by organizers and observers of the 1989 Eastern European transitions as an example that entrenched governments could fall without civil war.
  - target_slug: myanmar-spring-revolution
    connection_type: counter-example
    description: Where EDSA's military high command defected early and refused to fire on crowds, Myanmar's 2021 uprising faced a military that remained cohesive and used lethal force throughout, producing a starkly different trajectory.
