    defected: false
tactics:
  - tactic_type: occupation
    description: Unarmed crowds physically blocked Marine tanks and troops from advancing on Camps Aguinaldo and Crame, offering food and prayer rather than confrontation.
    prominence: primary
  - tactic_type: digital-mobilization
    description: Radio Veritas, the Catholic station, broadcast Cardinal Sin's appeal and ongoing updates that drew and sustained the EDSA crowds after the government-controlled stations went dark.
    prominence: primary
  - tactic_type: civil-disobedience
    description: Aquino called for a boycott of Marcos-linked banks and businesses following the disputed election, part of a broader civil disobedience campaign preceding the military mutiny.
    prominence: secondary
