success_factors:
  - factor_key: participation-threshold
    label: 3.5 percent participation rule
    framework: chenoweth
    status: One to two million participants out of a national population near 56 million in 1986 is roughly 2 to 3.5 percent, among the more frequently cited near-threshold cases in the literature
    direction: favors-movement
    base_rate: Chenoweth's research finds no campaign that achieved active participation from 3.5 percent of a population has failed to achieve its aims
    rationale: EDSA sits close to or at the 3.5 percent line depending on which population and participation estimates are used, and is frequently cited alongside cases exceeding the threshold as evidence for the rule's predictive power.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: military-defection
    label: Security force defection
    framework: chenoweth
    status: Defense Minister Enrile and armed forces vice chief Ramos broke from Marcos on February 22, 1986, and loyalist units subsequently refused to fire on the EDSA crowd
    direction: favors-movement
    base_rate: Security force defection or refusal to suppress protesters is the single strongest predictor of nonviolent movement success across the historical record
    rationale: EDSA is a widely cited textbook case precisely because the defection came first, from the top of the military hierarchy, and the crowd's role was to protect that defection rather than to independently force capitulation.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: nonviolent-campaign-rate
    label: Nonviolent campaign base rate
    framework: chenoweth
    status: The entire four-day campaign proceeded without organized armed resistance from the opposition side
    direction: favors-movement
    base_rate: Chenoweth and Stephan find nonviolent campaigns succeed in roughly 53 percent of cases historically, roughly double the rate for armed campaigns
    rationale: EDSA achieved regime change in four days with a reported death toll in the single digits, an outcome the nonviolent-campaign literature associates with lower state repression capacity and higher public and international legitimacy relative to armed uprisings.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
