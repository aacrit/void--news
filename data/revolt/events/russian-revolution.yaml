success_factors:
  - factor_key: military-defection
    label: Security force defection
    framework: chenoweth
    status: Petrograd garrison refused orders to fire on crowds in February 1917; full army collapse followed by autumn
    direction: favors-movement
    base_rate: Security force defection is the single strongest predictor of movement success across both nonviolent and armed campaigns
    rationale: The February uprising succeeded within days once garrison troops joined strikers rather than suppressing them; the October seizure met almost no armed resistance because loyal forces had evaporated.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: elite-fracture
    label: Elite and military fracture
    framework: skocpol
    status: Generals withdrew support from the Tsar in March 1917; the officer corps later split between Red and White armies
    direction: favors-movement
    base_rate: Skocpol identifies state breakdown via war strain and elite defection as a precondition for social revolution, distinct from ideology or leadership
    rationale: Skocpol's States and Social Revolutions uses 1917 Russia as a central case for revolution driven by international military pressure fracturing the state apparatus before any revolutionary organization could have engineered it alone.
    sources:
      - Skocpol, States and Social Revolutions (1979)
  - factor_key: armed-campaign-rate
    label: Armed campaign base rate
    framework: chenoweth
    status: The October seizure and subsequent civil war were armed; nonviolent civil resistance was not the primary mechanism after February
    direction: indeterminate
    base_rate: Chenoweth and Stephan find armed campaigns succeed in roughly 26 percent of cases historically, versus about 53 percent for primarily nonviolent campaigns
    rationale: The Bolsheviks' success came less from mass civil resistance than from a small, disciplined party exploiting a state that had already collapsed via military defeat, complicating a clean armed-versus-nonviolent comparison.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
