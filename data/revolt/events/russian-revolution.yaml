perspectives:
  - viewpoint: Bolshevik organizer
    viewpoint_type: revolutionary
    region_origin: europe
    narrative: To Bolshevik organizers, October was not a coup but the rescue of a revolution the Provisional Government had betrayed by continuing an unpopular war and stalling land reform. The soviets, not a self-appointed cabinet, represented the workers and soldiers who had actually overthrown the Tsar.
    key_arguments:
      - The Provisional Government lacked a popular mandate and kept fighting a war soldiers had already abandoned
      - Soviet power represented direct working-class representation absent from the liberal cabinet
    sources: []
    notable_quotes:
      - text: All power to the soviets
        speaker: Bolshevik slogan, 1917
        context: Central campaign slogan through the spring and summer of 1917
    emphasized:
      - Land and peace as immediate popular demands
      - The soviets as organic democratic bodies
    omitted:
      - The Bolsheviks' own minority status in the Constituent Assembly election of November 1917, which they dissolved by force in January 1918
  - viewpoint: Structural historian
    viewpoint_type: academic
    region_origin: global
    narrative: Structural historians read 1917 as a case where total war broke the Russian state's capacity to govern before any organized opposition could take credit. The Bolsheviks did not cause the collapse; they were the best-organized faction positioned to exploit it once it happened.
    key_arguments:
      - State breakdown from military strain preceded and enabled the political vacuum both revolutions filled
      - The Bolsheviks succeeded through organizational discipline in a fluid, disintegrating environment rather than mass popular consensus
    sources: []
    notable_quotes: []
    emphasized:
      - Fiscal and military collapse of the Tsarist state
      - The narrowness of the October vote of support relative to Russia's population
    omitted:
      - The lived urgency of famine and casualties driving individual participants, which structural analysis tends to flatten
