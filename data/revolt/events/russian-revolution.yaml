slug: russian-revolution
title: The Russian Revolution
subtitle: Eight months separated a liberal republic from a one-party dictatorship
date_display: February 1917 to 1923 (civil war conclusion)
date_start: 1917
date_end: 1923
date_precision: year
era: modern-nationalist
region: europe
country: Russia
revolt_type: communist
status: concluded
summary: Bread shortages and 1.7 million war dead broke the Romanov monarchy in five days of Petrograd strikes. A Provisional Government tried to keep fighting Germany while soldiers deserted by the hundred thousand. On October 25, Bolshevik Red Guards seized the Winter Palace with fewer than ten casualties, then spent five years defeating White armies, Allied interventionists, and rival socialists to hold the state they had taken.
significance: The first Marxist government to hold state power for more than a few weeks, and the template every subsequent 20th-century communist seizure of power copied or reacted against.
analytical_outlook: A movement that seized power in a near-vacuum, then spent five years and roughly 7 to 12 million civil war deaths converting a fragile coup into a durable one-party state.
grievances:
  - kind: War exhaustion
    intensity: 95
    evidence: 1.7 million Russian soldiers killed by early 1917; desertions ran over 200,000 in the month before the February uprising.
  - kind: Food scarcity
    intensity: 90
    evidence: Petrograd bread rationing cut to 1 pound per person per day in February 1917; women textile workers began the strike that triggered the revolution on International Women's Day.
  - kind: Land hunger
    intensity: 85
    evidence: Roughly 80 percent of Russians were peasants; nobles and the church held disproportionate farmland while peasant plots shrank across the 1861 to 1917 period.
  - kind: Autocratic rigidity
    intensity: 75
    evidence: Nicholas II dissolved or restricted the Duma repeatedly after 1906 and refused ministers responsible to it even as the war effort collapsed.
actors:
  - actor_type: vanguard
    name: Bolshevik Party
    description: Lenin's faction of the Russian Social Democratic Labour Party, roughly 24,000 members in February 1917, over 350,000 by October.
    role_in_arc: Organized the October seizure of power under the slogan 'Peace, Land, Bread'
    defected: false
  - actor_type: old-regime
    name: Provisional Government
    description: Liberal-to-moderate-socialist government formed after the Tsar's abdication, led successively by Lvov and Kerensky.
    role_in_arc: Held nominal power for eight months, lost legitimacy by continuing the war
    defected: false
  - actor_type: masses
    name: Petrograd Soviet
    description: Elected council of workers' and soldiers' deputies, meeting alongside the Provisional Government from February 1917.
    role_in_arc: Formed the 'dual power' rival authority the Bolsheviks eventually captured
    defected: false
  - actor_type: military-defectors
    name: Imperial Russian Army
    description: Roughly 7 million men under arms by 1917, exhausted by the Brusilov offensive's 1916 casualties.
    role_in_arc: Mass desertion and the Petrograd garrison's refusal to fire on crowds ended the monarchy
    defected: true
  - actor_type: old-regime
    name: Nicholas II
    description: Tsar of Russia since 1894, commanded the army in person from 1915.
    role_in_arc: Abdicated March 2, 1917 after generals withdrew their support
    defected: false
tactics:
  - tactic_type: general-strike
    description: Petrograd factory strikes beginning February 23, 1917 grew from 90,000 to over 300,000 workers within four days.
    prominence: primary, February phase
  - tactic_type: armed-insurgency
    description: Red Guards, sailors from Kronstadt, and Bolshevik-aligned soldiers occupied Petrograd's telegraph, bridges, and stations overnight on October 24-25.
    prominence: primary, October phase
  - tactic_type: parallel-institutions
    description: Bolsheviks won majorities in the Petrograd and Moscow soviets by September 1917 and used soviet structures to coordinate the October action.
    prominence: secondary
resistance_type: hybrid
phases:
  - phase: old-regime-crisis
    label: War and Famine
    t_start: 0
    t_end: 0.12
    intensity: 40
    reached: true
    summary: Three years of war losses and urban food shortages hollow out support for the monarchy.
    key_events:
      - 1916 Brusilov offensive casualties exceed 500,000
      - Petrograd bread rationing introduced late 1916
  - phase: the-spark
    label: February Days
    t_start: 0.22
    t_end: 0.34
    intensity: 60
    reached: true
    summary: Petrograd strikes escalate into a five-day uprising; the Petrograd garrison mutinies rather than fire on crowds, and the Tsar abdicates within a week.
    key_events:
      - Strikes begin February 23, 1917
      - Nicholas II abdicates March 2, 1917
  - phase: moderate-phase
    label: Dual Power
    t_start: 0.34
    t_end: 0.48
    intensity: 45
    reached: true
    summary: The Provisional Government and the Petrograd Soviet govern in uneasy parallel while the war continues.
    key_events:
      - Lenin returns to Petrograd in the sealed train, April 1917
      - July Days street violence in Petrograd
  - phase: dual-power
    label: Kornilov Affair to October Seizure
    t_start: 0.48
    t_end: 0.6
    intensity: 65
    reached: true
    summary: General Kornilov's failed August coup arms the Bolshevik-aligned Red Guards, who occupy Petrograd's infrastructure and storm the Winter Palace in October with minimal resistance.
    key_events:
      - Kornilov affair, August 1917
      - Bolsheviks win Petrograd Soviet majority, September 1917
      - Winter Palace falls, October 25, 1917 (Julian calendar), fewer than ten deaths
  - phase: radical-phase
    label: Civil War
    t_start: 0.6
    t_end: 0.72
    intensity: 95
    reached: true
    summary: Red, White, and foreign interventionist armies fight across the former empire.
    key_events:
      - Civil war fighting 1918-1921
      - Execution of the Romanov family, July 1918
      - Allied intervention forces land at Archangel and Vladivostok
  - phase: terror-virtue
    label: Red Terror and War Communism
    t_start: 0.72
    t_end: 0.84
    intensity: 85
    reached: true
    summary: The Cheka conducts mass executions and the state seizes grain by force, provoking peasant uprisings the Red Army crushes in turn.
    key_events:
      - Red Terror declared, September 1918
      - Kronstadt rebellion crushed, March 1921
  - phase: consolidation
    label: New Economic Policy and the USSR
    t_start: 0.92
    t_end: 1
    intensity: 50
    reached: true
    summary: The Bolsheviks defeat the last White armies, retreat from forced requisitioning under the NEP, and formalize one-party rule under the new Soviet Union.
    key_events:
      - New Economic Policy adopted, 1921
      - USSR formally established, December 1922
