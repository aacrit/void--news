perspectives:
  - viewpoint: Sandinista founding-generation view
    viewpoint_type: revolutionary
    region_origin: Nicaragua
    narrative: A popular armed movement ended dynastic dictatorship and delivered land and literacy gains to a population long excluded from both, even if its own later leadership drew criticism for consolidating power.
    key_arguments:
      - The FSLN united guerrilla fighters, clergy, and business elites against a common dynastic enemy
      - Land reform and a 1980 literacy campaign reached millions of rural Nicaraguans within two years of victory
      - The 1990 election loss demonstrated the movement's own willingness to accept a democratic verdict
    sources: []
    notable_quotes: []
    emphasized:
      - the literacy campaign
      - the 1990 peaceful transfer of power
    omitted:
      - internal FSLN dissent over the Contra war's economic toll
      - later criticism of Ortega-era power consolidation
  - viewpoint: Opposition and Chamorro-era view
    viewpoint_type: moderate
    region_origin: Nicaragua
    narrative: The FSLN's economic mismanagement and a drawn-out Contra war exhausted a population that voted decisively for change in 1990, rejecting continued armed conflict and centralized economic control.
    key_arguments:
      - Hyperinflation and war exhaustion had devastated household incomes by the late 1980s
      - The FSLN's own land expropriations alienated segments of its founding coalition
      - Chamorro's 1990 victory reflected a broad desire to end both the war and one-party dominance
    sources: []
    notable_quotes: []
    emphasized:
      - 1980s economic collapse
      - war fatigue among the electorate
    omitted:
      - the scale of Somoza-era repression the revolution originally responded to
      - the Sandinistas' later return to power via subsequent elections
