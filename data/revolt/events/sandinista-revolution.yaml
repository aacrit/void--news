slug: sandinista-revolution
title: The Sandinista Revolution
subtitle: A forty-three-year dynasty falls in eighteen months, then loses the ballot a decade later
date_display: 1961-1990
date_start: 1961
date_end: 1990
date_precision: year
era: people-power
region: americas
country: Nicaragua
revolt_type: social
status: concluded
summary: The Sandinista National Liberation Front, founded in 1961 against the Somoza family dynasty, fought an on-and-off guerrilla war for eighteen years before a broad coalition of guerrillas, striking businesses, and outraged citizens finally drove Anastasio Somoza Debayle from power in 1979. The Sandinistas then governed through a decade of Contra war before losing Nicaragua's 1990 election at the ballot box.
significance: A rare case of an armed revolutionary movement that won power by force and then, a decade later, peacefully relinquished it after losing a free election, though its founding generation would return to government by ballot years afterward.
grievances:
  - kind: Dynastic rule
    intensity: 82
    evidence: The Somoza family had governed Nicaragua for 43 years by 1979, with Anastasio Somoza Debayle the third family member to hold the presidency since his father seized power in 1936.
  - kind: Earthquake relief corruption
    intensity: 78
    evidence: The National Guard diverted a substantial share of international relief aid following the 1972 Managua earthquake, which killed an estimated 10,000 people, deepening public anger even among the business elite.
  - kind: Assassination of a leading dissident journalist
    intensity: 80
    evidence: The January 1978 assassination of newspaper editor Pedro Joaquin Chamorro, a prominent Somoza critic, triggered nationwide strikes and riots that widened the opposition far beyond the FSLN's guerrilla base.
actors:
  - actor_type: vanguard
    name: The FSLN
    description: The Sandinista National Liberation Front, founded in 1961 by Carlos Fonseca and allies.
    role_in_arc: Fought an intermittent guerrilla campaign for eighteen years before leading the final 1978-79 insurrection.
    defected: false
  - actor_type: old-regime
    name: Anastasio Somoza Debayle
    description: President of Nicaragua and commander of the National Guard.
    role_in_arc: Fled Nicaragua in July 1979 as FSLN forces and allied insurgents closed in on Managua.
    defected: false
  - actor_type: religious-clergy
    name: Liberation theology clergy
    description: Catholic priests and lay organizers influenced by liberation theology.
    role_in_arc: Provided organizing networks and moral legitimacy to the anti-Somoza movement in rural and poor urban communities.
    defected: false
  - actor_type: foreign-backer
    name: Cuba
    description: Cuba's government, which trained and armed FSLN fighters from the 1960s onward.
    role_in_arc: Supplied material and ideological support that sustained FSLN operations through repeated setbacks.
    defected: false
  - actor_type: old-regime
    name: The National Guard
    description: Nicaragua's US-trained security force and the Somoza family's chief instrument of control.
    role_in_arc: Remained loyal to Somoza almost to the very end, but collapsed once conscript morale broke in the final weeks of the 1979 offensive.
    defected: true
tactics:
  - tactic_type: guerrilla-warfare
    description: FSLN columns fought an intermittent rural and mountain campaign from the early 1960s, absorbing repeated defeats before building a sustainable base by the mid-1970s.
    prominence: primary
  - tactic_type: general-strike
    description: Business-sector strikes following Chamorro's 1978 assassination brought even Somoza's former commercial allies into open opposition.
    prominence: primary
  - tactic_type: urban-uprising
    description: Coordinated insurrections in Managua, Leon, and Esteli during the 1979 final offensive stretched the National Guard's forces past their breaking point.
    prominence: secondary
resistance_type: armed
