success_factors:
  - factor_key: hybrid-tactics
    label: Combining guerrilla warfare with general strikes can outperform either alone
    framework: chenoweth
    status: confirmed
    direction: favors-movement
    base_rate: Armed campaigns succeed in roughly 26% of historical cases versus 53% for nonviolent ones; hybrid campaigns pairing armed struggle with mass economic pressure can outperform either tactic alone
    rationale: Business-sector strikes after Chamorro's assassination brought pressure on Somoza from a constituency the FSLN's guerrilla campaign alone could never have reached.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: foreign-backing-tradeoff
    label: Heavy foreign backing to a challenger correlates with weaker post-victory consolidation
    framework: goldstone
    status: atypical
    direction: indeterminate
    base_rate: Heavy foreign material backing to a challenger correlates in the comparative literature with weaker post-victory democratic consolidation
    rationale: Cuban backing sustained FSLN operations through the 1960s and 70s, and the pattern arguably bears out in the 1990 electoral defeat and the later Ortega-era consolidation of power the new government underwent.
    sources:
      - 'Goldstone, Revolutions: A Very Short Introduction (2014)'
  - factor_key: broad-coalition-mobilization
    label: Uniting normally opposed social classes against a common target increases the odds of rapid collapse
    framework: skocpol
    status: confirmed
    direction: favors-movement
    base_rate: Skocpol's comparative work finds that coalitions spanning class lines, not narrow single-class movements, more often produce rapid regime collapse
    rationale: The 1978 strikes brought commercial and professional Nicaraguans who had never supported the FSLN into the same anti-Somoza front as its guerrilla fighters.
    sources:
      - Skocpol, States and Social Revolutions (1979)
