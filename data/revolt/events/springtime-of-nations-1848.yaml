slug: springtime-of-nations-1848
title: The Springtime of Nations
subtitle: A continent rises in a single season and is put down within a year
date_display: 1848-1849
date_start: 1848
date_end: 1849
date_precision: year
era: springtime
region: europe
country: France, the German and Italian states, and the Austrian Empire
revolt_type: democratic-uprising
status: concluded
summary: Bread riots in Paris toppled a king in three days in February 1848, and within weeks Berlin, Vienna, Milan, and Budapest had their own barricades. Liberal parliaments met, constitutions were promised, and by the summer of 1849 nearly every gain had been reversed by force, often with foreign troops doing the reversing.
significance: The first genuinely continental revolutionary wave, spreading from capital to capital by newspaper and rail faster than any government could contain it, and the clearest historical case of a revolution succeeding everywhere at first and surviving almost nowhere.
grievances:
  - kind: Economic crisis and food prices
    intensity: 78
    evidence: The 1845-46 potato blight and a poor 1846-47 grain harvest doubled bread prices across much of Europe, driving urban unemployment before a single barricade went up.
  - kind: Absence of constitutional representation
    intensity: 82
    evidence: Louis Philippe's France, the Austrian Empire, and most German states in 1848 had no elected national parliament with real budgetary power over the monarch.
  - kind: Suppressed national aspiration
    intensity: 74
    evidence: Germans, Italians, Hungarians, and Czechs each lived divided across multiple dynastic states or under Habsburg rule with no unified national government of their own.
actors:
  - actor_type: students-youth
    name: Parisian and Berlin students
    description: University students who organized early banquets and demonstrations before the crowds turned into workers and shopkeepers.
    role_in_arc: Provided the first street confrontations that forced Louis Philippe's abdication and the Prussian king's initial concessions.
    defected: false
  - actor_type: organized-labor
    name: Parisian workers
    description: Skilled and unskilled laborers hit hardest by the 1846-47 economic downturn.
    role_in_arc: Drove the June Days uprising in Paris after the new republic closed the National Workshops jobs program, and were crushed by the army in four days of street fighting.
    defected: false
  - actor_type: old-regime
    name: Klemens von Metternich
    description: Austrian chancellor and chief architect of the post-1815 conservative order.
    role_in_arc: Fled Vienna in disguise on March 13, 1848, ending 38 years running the continental system built to prevent exactly this kind of upheaval.
    defected: false
  - actor_type: vanguard
    name: The Frankfurt Parliament
    description: An elected all-German assembly that met in 1848 to draft a liberal constitution for a unified Germany.
    role_in_arc: Debated for a year, offered the imperial crown to the Prussian king in 1849, and was refused and then dispersed by troops.
    defected: false
  - actor_type: military-defectors
    name: Piedmont-Sardinia's army
    description: The one Italian state whose king backed the 1848 revolts with force against Austria.
    role_in_arc: Declared war on Austria to support Milan's uprising, was defeated at Custoza in July 1848 and again at Novara in March 1849.
    defected: false
tactics:
  - tactic_type: mass-demonstration
    description: The February 1848 Paris banquet campaign and street crowds forced Louis Philippe's abdication within three days.
    prominence: primary
  - tactic_type: urban-uprising
    description: Barricade fighting in Berlin, Vienna, and Milan in March 1848 forced immediate concessions from monarchs unwilling to risk prolonged street war.
    prominence: primary
  - tactic_type: parallel-institutions
    description: The Frankfurt Parliament assembled as a rival national authority to the German princes, though it never controlled an army of its own.
    prominence: secondary
resistance_type: hybrid
