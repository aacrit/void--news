perspectives:
  - viewpoint: Liberal nationalist retrospective
    viewpoint_type: revolutionary
    region_origin: central Europe
    narrative: 1848 was the moment Europe's peoples first tried to govern themselves by written constitution and national self-determination rather than dynastic inheritance, and its defeat only delayed rather than disproved the idea.
    key_arguments:
      - The Frankfurt Parliament's draft constitution anticipated rights later written into German and Austrian law
      - National unification eventually happened, proving the underlying demand was real
      - Popular participation across dozens of cities in a single year had no earlier precedent in Europe
    sources: []
    notable_quotes: []
    emphasized:
      - the speed and breadth of the 1848 uprisings
      - the constitutional texts the parliaments produced
    omitted:
      - the June Days massacre of Parisian workers by the same republic the revolution created
      - the movement's failure to secure any army of its own
  - viewpoint: Conservative monarchist view
    viewpoint_type: counter-revolutionary
    region_origin: Austria
    narrative: The uprisings were a dangerous but ultimately manageable disorder; restraint and, where necessary, allied military force restored the legitimate order that alone could guarantee stability across such a diverse empire.
    key_arguments:
      - The Habsburg monarchy held together despite simultaneous revolts in Vienna, Prague, Milan, and Budapest
      - Russian intervention in Hungary prevented a wider collapse of the European balance
      - Constitutions granted under street pressure lacked lasting legitimacy and were reasonably withdrawn once order returned
    sources: []
    notable_quotes: []
    emphasized:
      - the empire's survival
      - the restoration of order by 1849
    omitted:
      - the scale of the death toll in Hungary's suppression
      - the economic grievances that triggered the uprisings in the first place
