success_factors:
  - factor_key: no-security-defection
    label: Without security force defection, street victories do not hold
    framework: chenoweth
    status: contradicted
    direction: favors-regime
    base_rate: Movements that fail to secure defection from the army or police see their initial gains reversed at far higher rates than those that do
    rationale: Austrian, Prussian, and Russian armies stayed loyal to their monarchs throughout; every liberal parliament that lacked its own army was eventually dispersed by one that had never changed sides.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
  - factor_key: foreign-counter-intervention
    label: Foreign intervention against a movement reverses its gains
    framework: chenoweth
    status: confirmed
    direction: favors-regime
    base_rate: Direct foreign military intervention on behalf of an incumbent regime correlates with reversal of an otherwise successful uprising
    rationale: Russia's 1849 invasion crushed the Hungarian revolution after it had defeated Austria's own forces in the field, a case study in how a neighboring power's army can undo a domestic victory.
    sources:
      - 'Goldstone, Revolutions: A Very Short Introduction (2014)'
  - factor_key: elite-fracture-absent
    label: Without elite fracture, monarchies can wait out a revolutionary wave
    framework: skocpol
    status: confirmed
    direction: favors-regime
    base_rate: Skocpol's model finds regime survival likely where the aristocracy, officer corps, and monarchy remain aligned even under mass pressure
    rationale: Unlike 1688 or 1789, the officer corps of Austria, Prussia, and Russia never split from their monarchs, giving each regime a coercive instrument the revolutions never captured.
    sources:
      - Skocpol, States and Social Revolutions (1979)
