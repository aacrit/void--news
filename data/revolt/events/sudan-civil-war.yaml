slug: sudan-civil-war
title: 'Sudan: The Captured Revolution'
subtitle: A democracy overthrown by the two generals meant to protect it
date_display: 2019 to present
date_start: 2019
date_precision: year
era: square-revolutions
region: africa
country: Sudan
revolt_type: political
status: active
summary: In 2019 a nonviolent uprising toppled Omar al-Bashir after thirty years in power. A civilian-military transition followed. In 2021 the generals seized full control in a coup. In April 2023 the two men who led that coup, the head of the army and the head of the Rapid Support Forces, turned their arsenals on each other. A revolution that began with chants for civilian rule became one of the world’s largest displacement crises.
significance: Sudan is the case of a successful nonviolent overthrow that was captured before it could consolidate. It shows that removing a dictator is not the same as ending the system that produced him.
analytical_outlook: 'The civilian movement that won in 2019 has been sidelined by a war between two armed factions. The historical record is clear that revolutions are most vulnerable in the transition, when the old coercive institutions survive the ruler. Placement on the arc: a spark and moderate phase that collapsed back into a factional civil war rather than reaching consolidation.'
