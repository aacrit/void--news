success_factors:
  - factor_key: resistance_method
    label: Method of the 2019 uprising
    framework: chenoweth
    status: Nonviolent, and it succeeded in removing the dictator.
    direction: favors-movement
    base_rate: About 53 percent of nonviolent campaigns from 1900 to 2006 succeeded, versus about 26 percent of armed ones.
    rationale: 'The civilian movement achieved the higher-probability outcome: it toppled the ruler without a war.'
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: '2019'
    confidence: high
  - factor_key: transition_capture
    label: Surviving the transition
    framework: skocpol
    status: Failed. The old coercive institutions outlived the ruler and seized power.
    direction: favors-regime
    base_rate: Revolutions are most fragile in the transition, when the old state’s security apparatus survives the leader.
    rationale: The army and the Rapid Support Forces were never dismantled and later took the state by force.
    sources:
      - Skocpol, States and Social Revolutions (1979)
    as_of: '2023'
    confidence: high
  - factor_key: security_defection
    label: Did the security forces defect
    framework: chenoweth
    status: The army removed Bashir but kept power for itself.
    direction: indeterminate
    base_rate: Defection of the security forces is the single strongest predictor of a campaign’s success.
    rationale: A defection that installs the generals rather than the movement is a partial and dangerous kind of victory.
    sources:
      - Nepstad, Nonviolent Revolutions (2011)
    as_of: '2021'
    confidence: medium
