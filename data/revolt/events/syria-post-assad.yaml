perspectives:
  - viewpoint: The transitional government
    viewpoint_type: movement
    region_origin: Damascus
    narrative: We inherited a state built on fifty years of fear and emptied its prisons within days of arriving. Governing a country this fractured will not happen on the timeline outsiders want, but the alternative to what we are building was Assad, indefinitely.
    key_arguments:
      - The speed of Assad's fall reflects the depth of the old system's rot, not a plan for chaos.
      - Inclusive government is the stated goal, even if the cabinet is not yet representative.
    sources: []
    notable_quotes: []
    emphasized:
      - The end of arbitrary detention
      - Prison releases at Saydnaya
    omitted:
      - The narrowness of ministerial appointments so far
  - viewpoint: An Alawite and minority-rights perspective
    viewpoint_type: diaspora
    region_origin: Syrian coast
    narrative: The people who fled Assad's prisons for thirteen years deserve everything they are celebrating. But an armed faction that grew out of an al-Qaeda affiliate now controls the ministries that decide whether minorities are safe, and coastal communities associated with the old government have reported reprisal killings.
    key_arguments:
      - Celebrating Assad's fall does not resolve whether minorities are safe under the successor government.
      - Early reprisal violence is a warning sign for the transition, not a footnote.
    sources: []
    notable_quotes: []
    emphasized:
      - Security for minority communities
      - Accountability that does not become collective punishment
    omitted:
      - Comparisons to the scale of Assad-era violence
