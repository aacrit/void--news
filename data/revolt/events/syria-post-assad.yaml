slug: syria-post-assad
title: Syria After Assad
subtitle: Fifty-four years of family rule collapse in an eleven-day offensive
date_display: 2024 to present
date_start: 2024
date_precision: year
era: square-revolutions
region: middle-east
country: Syria
revolt_type: political
status: consolidating
summary: For thirteen years the Assad government fought the civil war that followed the 2011 uprising to a stalemate, holding the coast and the cities while rebel and Kurdish-led forces held the rest. In late November 2024 Hayat Tahrir al-Sham and allied factions launched an offensive from Idlib. Aleppo fell within days, Hama and Homs followed, and on 8 December 2024 Bashar al-Assad left Damascus for Moscow, ending fifty-four years of his family's rule. HTS leader Ahmed al-Sharaa, formerly known by the nom de guerre Abu Mohammad al-Jolani, now heads a transitional government.
significance: Syria is a case in which a frozen civil war, one most analysts expected to outlast Assad, resolved in eleven days once his foreign backers stopped fighting for him. It also tests whether a faction still under a terrorist designation in multiple countries at the moment it took power can govern a religiously and ethnically mixed country it just conquered.
analytical_outlook: 'Assad''s fall removed the immediate threat but not the country''s fractures: an Alawite coastal population fearing reprisals, Kurdish-led forces in the northeast still outside Damascus''s control, and a transitional cabinet drawn heavily from a single armed faction. The record on transitions led by one dominant militia is mixed; consolidated pluralism typically requires the winning faction to share power it has no obligation to share. Placement on the arc: the old regime has fallen and a transitional authority is forming; whether power gets shared or simply changes hands is still open.'
grievances:
  - kind: political
    intensity: 95
    evidence: Assad family rule dated to 1971 under emergency law in force for most of that period; the 2011 uprising began as a protest over the arrest of teenagers who painted anti-government graffiti in Deraa.
  - kind: repression
    intensity: 98
    evidence: UN investigators and rights groups documented mass detention and killing at facilities including Saydnaya prison; opposition monitors estimate more than 100,000 people were forcibly disappeared over the war.
  - kind: humanitarian
    intensity: 90
    evidence: The war displaced roughly half of Syria's pre-war population of 22 million, internally and as refugees across the region and Europe.
repression_level: severe
actors:
  - actor_type: vanguard
    name: Hayat Tahrir al-Sham
    description: An Islamist armed faction based in Idlib province, led by Ahmed al-Sharaa, that grew out of a former al-Qaeda affiliate and later broke with it.
    role_in_arc: Led the November-December 2024 offensive that took Damascus and now leads the transitional government.
    defected: false
  - actor_type: masses
    name: Returning and displaced Syrians
    description: Refugees and internally displaced people who began returning to home towns after Assad's fall.
    role_in_arc: 'Provided the transitional government''s most immediate legitimacy test: whether people who fled the old state trust the new one.'
    defected: false
  - actor_type: military-defectors
    name: Syrian Arab Army units
    description: Government army formations that collapsed or abandoned positions as the offensive advanced.
    role_in_arc: Their rapid disintegration, rather than a negotiated surrender, let the offensive move faster than either side expected.
    defected: true
  - actor_type: old-regime
    name: Bashar al-Assad and the ruling circle
    description: The president and his inner circle, in power since 2000 after his father Hafez al-Assad's twenty-nine years.
    role_in_arc: Left for Russia on 8 December 2024 as the coalition of foreign backers withdrew active support.
    defected: false
  - actor_type: foreign-intervener
    name: Russia, Iran and Hezbollah
    description: External backers who had propped up the Assad government since 2015 but were stretched by the war in Ukraine and by Hezbollah's losses to Israel in 2024.
