success_factors:
  - factor_key: resistance_method
    label: Method of struggle
    framework: chenoweth
    status: Armed insurgency throughout; the movement had no comparable nonviolent phase after 2011 turned into war.
    direction: favors-regime
    base_rate: Armed campaigns succeeded about 26 percent of the time from 1900 to 2006, against about 53 percent for nonviolent ones.
    rationale: The method that finally worked here is the lower-odds one; the speed of Assad's fall owed more to the collapse of his foreign backing than to insurgent numbers.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: '2024'
    confidence: medium
  - factor_key: patron_withdrawal
    label: Withdrawal of foreign backing
    framework: skocpol
    status: Decisive. Russia was consumed by the war in Ukraine and Hezbollah had lost most of its senior command to Israeli strikes months earlier, leaving Assad without the air support and manpower that had held the line since 2015.
    direction: favors-movement
    base_rate: Structural theories of revolution treat the withdrawal of external patronage as a primary trigger of sudden state collapse.
    rationale: Assad's army did not lose a war of attrition, it lost the two allies that had been fighting it for him.
    sources:
      - Skocpol, States and Social Revolutions (1979)
    as_of: '2024'
    confidence: high
  - factor_key: security_defection
    label: Did the security forces defect
    framework: chenoweth
    status: Mass. Army units abandoned positions and equipment faster than the offensive advanced, rather than fighting or formally switching sides.
    direction: favors-movement
    base_rate: Defection or collapse of the security forces is the single strongest predictor of a campaign's success.
    rationale: Aleppo fell in four days in 2024 after resisting government-aligned forces for years earlier in the war, a sign the army's will to fight, not its equipment, had gone.
    sources:
      - Nepstad, Nonviolent Revolutions (2011)
    as_of: '2024'
    confidence: high
  - factor_key: transition_capture
    label: Sharing power after the capital falls
    framework: skocpol
    status: Untested. A single armed faction holds Damascus and the defense and interior ministries; minority representation and the status of Kurdish-led forces in the northeast remain unresolved.
    direction: indeterminate
    base_rate: Revolutions led by a single dominant armed faction have a mixed record of sharing power once they hold the capital.
    rationale: Whether Syria's new government extends real power beyond HTS's own networks is the open question of the consolidation phase.
    sources:
      - Skocpol, States and Social Revolutions (1979)
    as_of: '2026'
    confidence: medium
