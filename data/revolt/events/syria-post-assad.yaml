legacy_points:
  - Ended fifty-four years of Assad family rule in an offensive that took eleven days to reach Damascus.
  - Confirmed how dependent the Syrian government had become on Russian and Iranian-aligned support, both stretched thin by wars elsewhere in 2024.
  - Handed governing power to a faction still under a terrorist designation in multiple countries at the moment it took power, forcing a rapid, contested reassessment abroad.
