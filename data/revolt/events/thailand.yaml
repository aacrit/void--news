    viewpoint_type: movement
    region_origin: Bangkok
    narrative: We were told there were things a Thai citizen does not say out loud. We said them anyway, on stage, with our names attached. Winning an election was supposed to be the safe way to make the same argument. They dissolved that party too.
    key_arguments:
