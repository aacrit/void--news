  - viewpoint: The establishment position
    viewpoint_type: regime
    region_origin: Bangkok
    narrative: The lese majeste law protects an institution central to Thai identity and stability, one the constitution places above ordinary politics, and the courts, not the street or a single election, are the appropriate venue for constitutional questions. Thailand has already lived through the instability of the 2010 protests and coups and has reason to guard against repeating it.
    key_arguments:
      - The monarchy is presented by the state as constitutionally insulated from ordinary political contest.
      - Judicial rulings against Future Forward and Move Forward are framed as applying existing law, not targeting reform specifically.
