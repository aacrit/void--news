  - factor_key: peak_participation
    label: Peak participation
    framework: chenoweth
    status: Large for Bangkok but below the scale historically associated with forcing constitutional change.
    direction: favors-regime
    base_rate: No nonviolent campaign that mobilized at least 3.5 percent of the population at its peak had failed to achieve its stated aim, in the dataset built through 2006.
    rationale: Street turnout never approached the scale of Thailand's own 1992 or 2010 mobilizations, let alone the 3.5 percent threshold.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: '2023'
    confidence: medium
  - factor_key: security_defection
    label: Did the security forces defect
    framework: chenoweth
    status: None. The military and police establishment Prayut led since the 2014 coup has not fractured.
    direction: favors-regime
    base_rate: Defection of the security forces is the single strongest predictor of a nonviolent campaign's success.
    rationale: Without a break in the military's cohesion, mass prosecution rather than negotiation has been the state's consistent response.
    sources:
      - Nepstad, Nonviolent Revolutions (2011)
    as_of: '2023'
    confidence: high
  - factor_key: institutional_channel
    label: From street to ballot
    framework: tilly
    status: The movement's demands migrated from the street into an electoral party, Move Forward, which won the most seats in 2023 but was blocked from government and later dissolved by court order.
    direction: indeterminate
    base_rate: Movements that convert street mobilization into an electoral vehicle gain durability but expose themselves to legal and institutional countermeasures a street protest does not face.
    rationale: Move Forward's dissolution shows the same demand can be pushed off the street and still be blocked, by different means, in the courts and the Senate.
    sources:
      - Tilly, From Mobilization to Revolution (1978)
    as_of: '2026'
    confidence: medium
