success_factors:
  - factor_key: resistance_method
    label: Method of struggle
    framework: chenoweth
    status: Nonviolent rallies and civil disobedience throughout.
    direction: favors-movement
    base_rate: About 53 percent of nonviolent campaigns from 1900 to 2006 succeeded, versus about 26 percent for armed ones.
    rationale: The movement kept its nonviolent character even as prosecutions escalated.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: '2023'
