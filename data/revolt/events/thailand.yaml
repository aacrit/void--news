legacy_points:
  - Broke a decades-old taboo by naming the monarchy's political and financial role as a subject for public reform, not only the military government.
  - Shifted from street protest to an electoral party that twice won the most support at the ballot box and was twice blocked, by courts or an unelected Senate.
  - Left more than 250 people facing lese majeste charges as of the mid-2020s, among the highest totals in the law's modern use.
