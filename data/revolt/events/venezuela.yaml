slug: venezuela
title: 'Venezuela: The Ballot-Box Standoff'
subtitle: An opposition that keeps winning votes it is not allowed to count
date_display: 2014 to present
date_start: 2014
date_precision: year
era: square-revolutions
region: americas
country: Venezuela
revolt_type: democratic-uprising
status: dormant
summary: Venezuela holds the largest oil reserves on earth and a population that has watched its economy collapse and roughly a quarter of its people leave. Waves of protest in 2014, 2017 and 2019 failed to dislodge the government. In 2024 the opposition says it won the presidential election by a wide margin and published the tallies to prove it. The government declared itself the winner without releasing the count.
significance: Venezuela is a case of a movement with majorities and mobilization that still cannot cross the last step, because the state controls the courts, the count and the guns. It tests whether elections can end an autocracy that has learned to survive them.
analytical_outlook: 'The opposition has repeatedly won public support without winning power, because the security forces and the electoral authority remain loyal to the government. The record on removing entrenched autocracies through contested elections alone, without an elite or military fracture, is poor. Placement on the arc: a recurring spark that has not produced dual power or a security-force break.'
