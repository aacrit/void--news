success_factors:
  - factor_key: resistance_method
    label: Method of struggle
    framework: chenoweth
    status: Nonviolent and electoral.
    direction: favors-movement
    base_rate: About 53 percent of nonviolent campaigns from 1900 to 2006 succeeded, versus about 26 percent of armed ones.
    rationale: Method keeps the favorable base rate available, but method alone has not sufficed here.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: '2026'
    confidence: medium
  - factor_key: security_defection
    label: Did the security forces defect
    framework: chenoweth
    status: No. The military remains bound to the government by patronage.
    direction: favors-regime
    base_rate: Defection of the security forces is the single strongest predictor of a campaign’s success.
    rationale: Every Venezuelan protest wave has broken against an intact military.
    sources:
      - Nepstad, Nonviolent Revolutions (2011)
    as_of: '2026'
    confidence: high
  - factor_key: elite_fracture
    label: Did the ruling elite split
    framework: goldstone
    status: No durable split within the governing bloc.
    direction: favors-regime
    base_rate: Revolutions rarely succeed until the ruling elite fractures.
    rationale: Oil patronage and the fear of prosecution have kept the elite together.
    sources:
      - Goldstone, Revolution and Rebellion in the Early Modern World (1991)
    as_of: '2026'
    confidence: high
  - factor_key: peak_participation
    label: Peak participation
    framework: chenoweth
    status: Large but episodic; sustained mobilization has faded between waves.
    direction: indeterminate
    base_rate: No campaign that mobilized at least 3.5 percent of the population at its peak has failed.
    rationale: Emigration and exhaustion have thinned each successive wave.
    sources:
      - Chenoweth and Stephan, Why Civil Resistance Works (2011)
    as_of: '2026'
    confidence: medium
