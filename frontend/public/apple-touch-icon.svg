<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!--
    void --news — Apple Touch Icon (180x180)
    Solid warm-paper background with dark icon mark.
    Apple touch icons must NOT be transparent.
  -->
  <!-- Background — warm paper (#FAF8F5) -->
  <rect width="180" height="180" rx="0" fill="#FAF8F5"/>

  <!-- Icon centered with generous padding (mark at ~112px within 180) -->
  <g transform="translate(34, 28)" stroke="#1A1A1A" stroke-width="5.5">
    <!-- Void circle -->
    <circle cx="56" cy="45.5" r="31.5"/>
    <!-- Beam -->
    <line x1="10.5" y1="45.5" x2="101.5" y2="45.5"/>
    <!-- Left tick -->
    <line x1="17.5" y1="38.5" x2="17.5" y2="52.5"/>
    <!-- Right tick -->
    <line x1="94.5" y1="38.5" x2="94.5" y2="52.5"/>
    <!-- Post -->
    <line x1="56" y1="77" x2="56" y2="101.5"/>
    <!-- Base -->
    <line x1="42" y1="101.5" x2="70" y2="101.5"/>
  </g>

  <!-- Subtle brand name below icon -->
  <text x="90" y="152" text-anchor="middle" fill="#7A7A7A"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="500" letter-spacing="0.08em">
    void --news
  </text>
</svg>
