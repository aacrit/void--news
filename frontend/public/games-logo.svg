    <path class="wm-mono" d="M212,28C212,24.5 214,22.5 217,21.5L221,20C223.5,19 224.5,17.8 224.5,16C224.5,13.8 222.5,12 219.5,12C217,12 215,13.5 214,15.5L211.5,14C213,11.5 216,9.5 219.5,9.5C224.5,9.5 228,12.5 228,16.5C228,19.5 226,21.5 223,22.5L218.5,24C216,25 215,26.5 215,28.5L228,28.5L228,31L212,31L212,28Z" />

    <!-- "m" — monospace -->
    <path class="wm-mono" d="M236,12L239.2,12L239.2,16C241,13 243,11 246,11C249,11 250.5,12.5 251.5,15C253.5,12.5 255.5,11 258.5,11C262,11 264,13 264,17L264,36L260.8,36L260.8,18C260.8,15 259.5,13.5 257.5,13.5C255.5,13.5 253.5,15 252.5,17.5L252.5,36L249.3,36L249.3,18C249.3,15 248,13.5 246,13.5C244,13.5 242,15 241,17.5L241,36L236,36Z" />

    <!-- "e" — monospace -->
    <path class="wm-mono" d="M274,23.5C274,17.5 277.5,11 284,11C290.5,11 293.5,17 293.5,23L293.5,24.5L277.5,24.5C277.8,29 280.5,33 284.5,33C287.5,33 289.5,31 290.8,29L293,30.5C291,33.5 288,36 284,36C278,36 274,30 274,23.5ZM277.5,22L290,22C289.5,17.5 287.5,14 284,14C280.5,14 278.2,17.5 277.5,22Z" />

    <!-- "s" — monospace -->
    <path class="wm-mono" d="M302,28C302,24.5 304,22.5 307,21.5L311.5,20C314,19 315,17.8 315,16C315,13.8 313,12 310,12C307,12 305,13.5 304,15.5L301.5,14C303,11.5 306,9.5 310,9.5C315,9.5 318.5,12.5 318.5,16.5C318.5,19.5 316.5,21.5 313.5,22.5L309,24C306.5,25 305.5,26.5 305.5,28.5C305.5,31 307.5,33 310.5,33C313,33 315,31.5 316,29.5L318.2,31C316.5,34 313.5,36 310,36C305.5,36 302,32.5 302,28Z" />
  </g>
</svg>
