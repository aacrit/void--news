<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 48" fill="none" role="img" aria-label="void --games">
  <!--
    void --games — Full Wordmark SVG
    Family member of void --news brand identity.

    "void" — bold serif vector letterforms, hollow O (the void).
    Signal mark — rotated square / diamond, amber accent, the frequency.
    "--games" — monospace letterforms, the CLI flag.

    Uses CSS media query for automatic light/dark mode adaptation.
    Designed to sit on near-black backgrounds (dark-first).
  -->
  <style>
    .wm-ink { fill: #EDE8E0; }
    .wm-void-o { fill: none; stroke: #EDE8E0; stroke-width: 2.2; }
    .wm-dash { fill: #c9a84c; }
    .wm-signal { fill: #c9a84c; }
    .wm-mono { fill: #EDE8E0; opacity: 0.85; }
    @media (prefers-color-scheme: light) {
      .wm-ink { fill: #1A1A1A; }
      .wm-void-o { stroke: #1A1A1A; }
      .wm-dash { fill: #946B15; }
      .wm-signal { fill: #946B15; }
      .wm-mono { fill: #1A1A1A; opacity: 0.85; }
    }
  </style>

  <g transform="translate(0,4)">
    <!-- "v" — bold serif -->
    <polygon class="wm-ink" points="0,4 5.5,4 14,28 22.5,4 28,4 16.5,36 11.5,36" />

    <!-- "o" — THE VOID: hollow outline -->
    <path class="wm-void-o"
      d="M48 3.5 C61 3 62 10 61.5 20 C61 30 58 37 48 36.5 C38 37 35 30 34.5 20 C34 10 35 3 48 3.5" />

    <!-- "i" — serif -->
    <rect class="wm-ink" x="69" y="2" width="5" height="5" rx="0.8" />
    <rect class="wm-ink" x="69.5" y="11" width="4" height="25" rx="0.5" />

    <!-- "d" — serif -->
    <path class="wm-ink" d="M82,20C82,10.5 87,3 94,3C97,3 100,4.5 102,7.5L102,0L107,0L107,36L102,36L102,32.5C100,35.5 97,37 94,37C87,37 82,29.5 82,20ZM88,20C88,27.5 90.8,32 95,32C98,32 100.5,29.5 102,26L102,14C100.5,10.5 98,8 95,8C90.8,8 88,12.5 88,20Z" />

    <!-- Signal diamond — the frequency marker -->
    <rect class="wm-signal" x="120" y="13" width="10" height="10" rx="1.2" transform="rotate(45 125 18)" />

    <!-- "--" dashes — amber accent (the CLI flag) -->
    <rect class="wm-dash" x="148" y="17.5" width="10" height="3" rx="0.5" />
    <rect class="wm-dash" x="161" y="17.5" width="10" height="3" rx="0.5" />

    <!-- "g" — monospace -->
    <path class="wm-mono" d="M184,23.5C184,17.5 187,11.5 192.5,11.5C195.5,11.5 197.5,13 199,15L199,12L202.2,12L202.2,33C202.2,38 199,42 193.5,42C189.5,42 186.5,40 185,37.5L187.2,35.8C188.5,38 190.5,39.5 193.5,39.5C197,39.5 199,37 199,33.5L199,31.5C197.5,34 195.5,35.5 192.5,35.5C187,35.5 184,29.5 184,23.5ZM187.5,23.5C187.5,28.5 189.5,33 193,33C196,33 198,30.5 199,28L199,19C198,16.5 196,14 193,14C189.5,14 187.5,18.5 187.5,23.5Z" />

