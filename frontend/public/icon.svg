<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="void --news">
  <!--
    void --news — Brand Icon (Weighing Scale)
    A balance scale: news being weighed and analyzed.
    Extremely simplistic line art — 7 strokes total.
    Works at 16x16px (favicon) through 512x512px.
  -->

  <!-- Fulcrum triangle -->
  <path d="M16,4 L13,9 L19,9 Z"/>

  <!-- Beam -->
  <line x1="4" y1="9" x2="28" y2="9"/>

  <!-- Left suspension + pan -->
  <path d="M7,9 L5,18 L11,18 L9,9"/>

  <!-- Right suspension + pan -->
  <path d="M23,9 L21,18 L27,18 L25,9"/>

  <!-- Center post -->
  <line x1="16" y1="9" x2="16" y2="27"/>

  <!-- Base -->
  <line x1="12" y1="27" x2="20" y2="27"/>
</svg>