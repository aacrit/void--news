<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="void --news">
  <!--
    void --news — Brand Icon (The Void Scale)
    Blends three concepts:
    • Void — empty circle at top (the analytical lens)
    • Newspaper — rectangular pans with headline rules
    • Scale — balance beam, suspensions, post, base
    Works at 16x16px (favicon) through 512x512px.
  -->

  <!-- Void circle — the analytical lens, empty center -->
  <circle cx="16" cy="4" r="2.5"/>

  <!-- Beam -->
  <line x1="3" y1="8" x2="29" y2="8"/>

  <!-- Left suspension + newspaper page -->
  <path d="M7,8 L4,13 L4,22 L12,22 L12,13 L9,8"/>

  <!-- Left headline rule -->
  <line x1="5.5" y1="16.5" x2="10.5" y2="16.5"/>

  <!-- Right suspension + newspaper page -->
  <path d="M23,8 L20,13 L20,22 L28,22 L28,13 L25,8"/>

  <!-- Right headline rule -->
  <line x1="21.5" y1="16.5" x2="26.5" y2="16.5"/>

  <!-- Center post -->
  <line x1="16" y1="8" x2="16" y2="27"/>

  <!-- Base -->
  <line x1="12" y1="27" x2="20" y2="27"/>
</svg>
