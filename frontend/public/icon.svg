<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="currentColor" role="img" aria-label="void --news">
  <!--
    void --news — Brand Icon (Bias Bars Mark)
    5 vertical bars representing the 5 bias analysis axes:
    L (Political Lean), S (Sensationalism), O (Opinion/Fact),
    R (Factual Rigor), F (Framing)
    Varying heights create a distinctive equalizer silhouette.
    Works at 16x16px (favicon) through 512x512px.
  -->

  <!-- Bar 1: Political Lean — tallest, authority -->
  <rect x="5" y="6" width="3" height="22" rx="0.5"/>

  <!-- Bar 2: Sensationalism — medium-tall -->
  <rect x="10" y="10" width="3" height="18" rx="0.5"/>

  <!-- Bar 3: Opinion/Fact — shortest, creates the valley -->
  <rect x="15" y="16" width="3" height="12" rx="0.5"/>

  <!-- Bar 4: Factual Rigor — medium -->
  <rect x="20" y="12" width="3" height="16" rx="0.5"/>

  <!-- Bar 5: Framing — tall, bookend -->
  <rect x="25" y="4" width="3" height="24" rx="0.5"/>

  <!-- All bars share the same baseline at y=28 -->
</svg>