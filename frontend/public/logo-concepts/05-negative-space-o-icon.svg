<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="void --news">
  <!--
    Direction 5 Icon: The Void Circle
    A single perfect circle, thin stroke, empty interior.
    At 16px: A circle outline — the simplest possible mark.
    Represents: void, null, zero, lens, aperture, neutrality.
    The absence IS the identity.
  -->

  <!-- The void — empty circle, precise stroke -->
  <circle
    cx="16"
    cy="16"
    r="11"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
  />

  <!-- Optional: thin crosshair for "lens/analysis" reading at larger sizes -->
  <!-- These disappear at small sizes but add precision at large sizes -->
  <line x1="16" y1="8" x2="16" y2="10" stroke="currentColor" stroke-width="1" opacity="0.3"/>
  <line x1="16" y1="22" x2="16" y2="24" stroke="currentColor" stroke-width="1" opacity="0.3"/>
  <line x1="8" y1="16" x2="10" y2="16" stroke="currentColor" stroke-width="1" opacity="0.3"/>
  <line x1="22" y1="16" x2="24" y2="16" stroke="currentColor" stroke-width="1" opacity="0.3"/>
</svg>