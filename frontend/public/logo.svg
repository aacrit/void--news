    <!-- e -->
    <path d="M182,23.5 C182,17.5 185.5,11 192,11 C198.5,11 201.5,17 201.5,23 L201.5,24.5 L185.5,24.5 C185.8,29 188.5,33 192.5,33 C195.5,33 197.5,31 198.8,29 L201,30.5 C199,33.5 196,36 192,36 C186,36 182,30 182,23.5Z M185.5,22 L198,22 C197.5,17.5 195.5,14 192,14 C188.5,14 186.2,17.5 185.5,22Z"/>

