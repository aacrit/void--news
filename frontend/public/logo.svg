<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 40" fill="currentColor" role="img" aria-label="void --news">
  <!--
    void --news — Primary Wordmark (Direction 5: Negative Space O)
    "void": Serif letterforms where the "o" is a hollow outline (the void).
    "--news": Monospace letterforms, regular weight.
    All text as geometric paths — no embedded fonts.
  -->

  <!-- ===== "void" — Serif, bold, condensed. O is hollow. ===== -->
  <g transform="translate(0,2)">
    <!-- v -->
    <polygon points="0,4 5.5,4 14,28 22.5,4 28,4 16.5,36 11.5,36"/>

    <!-- o — THE VOID: hollow outline only, no fill -->
    <ellipse cx="48" cy="20" rx="13" ry="16.5" fill="none" stroke="currentColor" stroke-width="2.2"/>

    <!-- i dot -->
    <rect x="69" y="2" width="5" height="5" rx="0.8"/>
    <!-- i stem -->
    <rect x="69.5" y="11" width="4" height="25" rx="0.5"/>

    <!-- d -->
