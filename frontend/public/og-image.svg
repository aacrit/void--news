<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!--
    void --news — OpenGraph Image (1200x630)
    Dark walnut background. Centered brand mark with bias spectrum
    visualization below. Editorial authority meets data precision.
  -->

  <!-- Background — dark walnut with subtle warm tint -->
  <rect width="1200" height="630" fill="#1C1A17"/>

  <!-- Subtle paper texture grain overlay -->
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
  </filter>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.06"/>

  <!-- Top rule — newspaper masthead tradition -->
  <line x1="120" y1="80" x2="1080" y2="80" stroke="#4A4540" stroke-width="1"/>
  <line x1="120" y1="84" x2="1080" y2="84" stroke="#4A4540" stroke-width="3"/>

  <!-- Scale icon (centered, large) -->
  <g transform="translate(520, 120)" stroke="#EDE8E0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Void circle -->
    <circle cx="80" cy="65" r="45"/>
    <!-- Beam -->
    <line x1="15" y1="65" x2="145" y2="65"/>
    <!-- Left tick -->
    <line x1="25" y1="55" x2="25" y2="75"/>
    <!-- Right tick -->
    <line x1="135" y1="55" x2="135" y2="75"/>
    <!-- Post -->
    <line x1="80" y1="110" x2="80" y2="145"/>
    <!-- Base -->
    <line x1="60" y1="145" x2="100" y2="145"/>
  </g>

  <!-- Wordmark: "void" in serif + "--news" in mono -->
  <!-- "void" -->
  <text x="398" y="340" fill="#EDE8E0"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="72" font-weight="700" letter-spacing="0.02em">
    v
  </text>
  <!-- "o" — hollow (the void) -->
  <text x="448" y="340" fill="none" stroke="#EDE8E0" stroke-width="1.8"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="72" font-weight="700" letter-spacing="0.02em">
    o
  </text>
  <text x="498" y="340" fill="#EDE8E0"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="72" font-weight="700" letter-spacing="0.02em">
    id
  </text>
  <!-- "--news" in monospace, lighter weight -->
  <text x="600" y="340" fill="#8A8278"
        font-family="'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="56" font-weight="400" letter-spacing="0.02em">
    --news
  </text>

  <!-- Bias spectrum bar — the signature visualization -->
  <g transform="translate(300, 390)">
    <!-- 5-dot bias spectrum -->
    <circle cx="60" cy="20" r="10" fill="#3B82F6"/>
    <circle cx="180" cy="20" r="10" fill="#60A5FA"/>
    <circle cx="300" cy="20" r="10" fill="#9CA3AF"/>
    <circle cx="420" cy="20" r="10" fill="#F97316"/>
    <circle cx="540" cy="20" r="10" fill="#EF4444"/>

    <!-- Connecting line -->
    <line x1="70" y1="20" x2="170" y2="20" stroke="#3A3530" stroke-width="2"/>
    <line x1="190" y1="20" x2="290" y2="20" stroke="#3A3530" stroke-width="2"/>
    <line x1="310" y1="20" x2="410" y2="20" stroke="#3A3530" stroke-width="2"/>
    <line x1="430" y1="20" x2="530" y2="20" stroke="#3A3530" stroke-width="2"/>

    <!-- Labels -->
    <text x="60" y="52" text-anchor="middle" fill="#5A5550"
          font-family="'JetBrains Mono', Menlo, monospace" font-size="11">LEFT</text>
    <text x="300" y="52" text-anchor="middle" fill="#5A5550"
          font-family="'JetBrains Mono', Menlo, monospace" font-size="11">CENTER</text>
    <text x="540" y="52" text-anchor="middle" fill="#5A5550"
          font-family="'JetBrains Mono', Menlo, monospace" font-size="11">RIGHT</text>
  </g>

  <!-- Tagline -->
  <text x="600" y="510" text-anchor="middle" fill="#B8B0A5"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="400" letter-spacing="0.04em">
    See every side of the story
  </text>

  <!-- Bottom rule -->
  <line x1="120" y1="550" x2="1080" y2="550" stroke="#4A4540" stroke-width="1"/>

  <!-- Footer stats -->
  <text x="600" y="580" text-anchor="middle" fill="#5A5550"
        font-family="'JetBrains Mono', Menlo, monospace" font-size="13" letter-spacing="0.06em">
    200 SOURCES  ·  6-AXIS BIAS ANALYSIS  ·  FREE &amp; OPEN
  </text>
</svg>
