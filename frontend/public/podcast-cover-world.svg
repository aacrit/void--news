<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000 3000" width="3000" height="3000">
  <defs>
    <!-- Film grain: Kodak Vision3 500T character, fine warm organic -->
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feComponentTransfer in="mono" result="clipped">
        <feFuncA type="linear" slope="0.06" intercept="0"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="clipped" mode="overlay"/>
    </filter>

    <!-- Vignette: cinematic edge falloff, Deakins style -->
    <radialGradient id="vignette" cx="50%" cy="48%" r="55%" fx="50%" fy="46%">
      <stop offset="0%" stop-color="#0A0805" stop-opacity="0"/>
      <stop offset="65%" stop-color="#0A0805" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0805" stop-opacity="0.65"/>
    </radialGradient>

    <!-- Warm amber glow behind the scale icon: practical light source -->
    <radialGradient id="iconGlow" cx="50%" cy="38%" r="22%">
      <stop offset="0%" stop-color="#D4A574" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#D4A574" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#D4A574" stop-opacity="0"/>
    </radialGradient>

    <!-- Surface grade: top-down directional light, Bradford Young warmth -->
    <linearGradient id="surfaceGrade" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#2A2520" stop-opacity="1"/>
      <stop offset="40%" stop-color="#1C1A17" stop-opacity="1"/>
      <stop offset="100%" stop-color="#14120F" stop-opacity="1"/>
    </linearGradient>

    <!-- Horizontal rule accent gradient: amber fade -->
    <linearGradient id="ruleGlow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#D4A574" stop-opacity="0"/>
      <stop offset="20%" stop-color="#D4A574" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#D4A574" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#D4A574" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#D4A574" stop-opacity="0"/>
    </linearGradient>

    <!-- Text shadow for legibility at small sizes -->
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0A0805" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background: dark walnut (Evening Edition) -->
  <rect width="3000" height="3000" fill="url(#surfaceGrade)"/>

  <!-- Practical light glow behind icon -->
  <rect width="3000" height="3000" fill="url(#iconGlow)"/>

  <!-- Scale icon: the brand mark, centered upper third, ~700px -->
  <g transform="translate(1500,980) scale(22)" filter="url(#textShadow)">
    <g fill="none" stroke="#EDE8E0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="translate(-16,-16)">
      <circle cx="16" cy="13" r="9"/>
      <line x1="3" y1="13" x2="29" y2="13"/>
      <line x1="5" y1="11" x2="5" y2="15"/>
      <line x1="27" y1="11" x2="27" y2="15"/>
      <line x1="16" y1="22" x2="16" y2="29"/>
      <line x1="12" y1="29" x2="20" y2="29"/>
    </g>
  </g>

  <!-- Amber accent divider below icon -->
  <rect x="900" y="1340" width="1200" height="2" fill="url(#ruleGlow)" rx="1"/>

  <!-- "void": Playfair Display, editorial weight -->
  <text
    x="1500" y="1600"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="320"
    fill="#EDE8E0"
    text-anchor="middle"
    letter-spacing="12"
    filter="url(#textShadow)"
  >void</text>

  <!-- "onair": monospace data voice, amber accent -->
  <text
    x="1500" y="1870"
    font-family="'IBM Plex Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
    font-weight="400"
    font-size="220"
    fill="#D4A574"
    text-anchor="middle"
    letter-spacing="8"
    filter="url(#textShadow)"
  >--onair</text>

  <!-- Second horizontal rule -->
  <rect x="1050" y="1960" width="900" height="1.5" fill="url(#ruleGlow)" rx="1"/>

  <!-- "WORLD BRIEF": Barlow Condensed meta voice, all caps -->
  <text
    x="1500" y="2140"
    font-family="'Barlow Condensed', 'Franklin Gothic Medium', 'Arial Narrow', sans-serif"
    font-weight="600"
    font-size="160"
    fill="#B8B0A5"
    text-anchor="middle"
    letter-spacing="48"
    filter="url(#textShadow)"
  >WORLD BRIEF</text>

  <!-- Tagline: small, bottom -->
  <text
    x="1500" y="2560"
    font-family="'Barlow Condensed', 'Franklin Gothic Medium', 'Arial Narrow', sans-serif"
    font-weight="400"
    font-size="72"
    fill="#8A847B"
    text-anchor="middle"
    letter-spacing="12"
  >419 sources. Every story scored.</text>

  <!-- Edition marker: minimal globe (circle + meridian + equator) -->
  <g transform="translate(1500,2340)" fill="none" stroke="#D4A574" stroke-width="1.5" stroke-opacity="0.35">
    <circle cx="0" cy="0" r="24"/>
    <ellipse cx="0" cy="0" rx="10" ry="24"/>
    <line x1="-24" y1="0" x2="24" y2="0"/>
  </g>

  <!-- Vignette overlay: cinematic edge darkening -->
  <rect width="3000" height="3000" fill="url(#vignette)"/>

  <!-- Film grain overlay: applied last, over everything -->
  <rect width="3000" height="3000" fill="transparent" filter="url(#grain)"/>
</svg>