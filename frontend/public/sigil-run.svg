<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="VOID RUN">
  <!--
    VOID RUN Sigil — forward-pointing dash with motion blur streaks.
    Three horizontal lines: lead dash bold, trailing streaks fade.
    Velocity and direction. Not an arrow — pure motion.
  -->
  <style>
    .vr-lead { stroke: #EDE8E0; stroke-width: 2; stroke-linecap: round; }
    .vr-trail1 { stroke: #EDE8E0; stroke-width: 1.4; stroke-linecap: round; opacity: 0.5; }
    .vr-trail2 { stroke: #EDE8E0; stroke-width: 1; stroke-linecap: round; opacity: 0.25; }
    @media (prefers-color-scheme: light) {
      .vr-lead { stroke: #1A1A1A; }
      .vr-trail1 { stroke: #1A1A1A; }
      .vr-trail2 { stroke: #1A1A1A; }
    }
  </style>

  <!-- Lead dash — bold, furthest right -->
  <line class="vr-lead" x1="14" y1="16" x2="28" y2="16" />

  <!-- Trail 1 — medium, offset up -->
  <line class="vr-trail1" x1="8" y1="11" x2="20" y2="11" />

  <!-- Trail 2 — faint, offset down -->
  <line class="vr-trail2" x1="4" y1="21" x2="18" y2="21" />
</svg>
