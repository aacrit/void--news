    title: "CDC investigates hantavirus outbreak on Caribbean cruise"
    summary: "The CDC is investigating a hantavirus outbreak on a Caribbean cruise that has sickened at least 15 passengers, the agency said Wednesday."
    full_text: >
      The Centers for Disease Control and Prevention is investigating a hantavirus outbreak
      on a Caribbean cruise that has sickened at least 15 passengers, the agency said
      Wednesday. The Royal Caribbean ship "Liberty of the Seas" docked early in San Juan,
      Puerto Rico, after the cruise line reported respiratory illness clusters across two
      decks. Hantavirus is a rodent-borne pathogen that can cause severe lung disease.
      Royal Caribbean said it is fully sanitizing affected cabins and has notified the FDA
      and Puerto Rico health authorities. No deaths have been reported. The CDC said it
      will conduct interviews with all 4,200 passengers and 1,500 crew. AP exclusive.
    source: { slug: ap-news, country: US, tier: wire }
