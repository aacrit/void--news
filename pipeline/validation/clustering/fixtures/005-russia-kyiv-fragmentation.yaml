rationale: |
  Same-event fragmentation. All six describe the same overnight Russian
  drone barrage on Kyiv. Three articles emphasize "drone strikes" and
  three emphasize "air defense", causing the TF-IDF Phase-1 to split them
  on near-disjoint vocabularies. Production buried this story at rank
  #20 with two clusters of 3 articles each on 2026-05-15. The Phase-2
  entity merge should fire (Russia + Kyiv + Ukraine + Putin + Zelensky
  appear in both halves) but doesn't because Russia and Iran are
  blacklisted in _OVERLY_COMMON_ENTITIES.
