    title: "Super Typhoon Hagibis devastates northern Philippines, 142 dead"
    summary: "Super Typhoon Hagibis devastated the northern Philippines Tuesday, killing at least 142 people and displacing 480,000."
    full_text: >
      Super Typhoon Hagibis devastated the northern Philippines on Tuesday, killing at
      least 142 people and displacing approximately 480,000 from coastal communities in
      Cagayan, Isabela, and Aurora provinces, the National Disaster Risk Reduction
      Council reported. Hagibis made landfall near Casiguran with sustained winds of
      245 km/h. Philippine President Bongbong Marcos declared a state of national
      calamity. The Philippine Coast Guard rescued more than 4,200 people overnight.
      Power was out across more than two-thirds of Luzon. The storm was the strongest
      to hit the country since Typhoon Yolanda in 2013. International aid offers came
      from Japan, the US and Singapore within twelve hours of landfall.
