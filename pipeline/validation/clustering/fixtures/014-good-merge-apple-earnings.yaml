    title: "Apple Q2 earnings beat: revenue 91 billion, Vision Pro mainstreams"
    summary: "Apple reported Q2 revenue of 91 billion dollars Thursday, a 7 percent year-over-year beat driven by Vision Pro mainstream adoption."
    full_text: >
      Apple reported Q2 revenue of 91 billion dollars on Thursday afternoon, a 7 percent
      year-over-year beat driven by Vision Pro mainstream adoption and a strong Services
      quarter. CEO Tim Cook said on the earnings call that Vision Pro adoption "has
      crossed the chasm" and that the install base now exceeds 7 million units. Earnings
      per share came in at 1.78 dollars, beating consensus by 6 cents. Services revenue
      grew 14 percent year-over-year, the segment's fastest growth in eight quarters.
      iPhone revenue grew 3 percent. China revenue contracted 2 percent, the smallest
      contraction in five quarters. Apple raised its quarterly dividend to 26 cents and
      authorized an additional 90-billion-dollar share repurchase. Shares rose 4 percent
      after-hours.
