    full_text: >
      Patrick Mahomes won his fourth Super Bowl MVP as the Kansas City Chiefs edged the
      San Francisco 49ers 31-28 at Allegiant Stadium on Sunday night. The AP reports
      Mahomes finished 28-of-39 for 308 yards and three touchdowns. He tied Joe
      Montana's record for Super Bowl MVPs and is now widely regarded as the
      best quarterback to have played professional football. Travis Kelce caught both
      of Mahomes' touchdowns to him for a total of 21 career playoff receiving
      touchdowns, surpassing Jerry Rice. The Chiefs are the first team since the
      1979 Pittsburgh Steelers to win four Super Bowls in seven seasons.
