  - id: sb-3
    title: "Super Bowl LX: Butker's 53-yard field goal seals Chiefs win"
    summary: "Super Bowl LX: Harrison Butker's 53-yard field goal as time expired sealed the Kansas City Chiefs' 31-28 win over the San Francisco 49ers."
    full_text: >
      Super Bowl LX: Harrison Butker's 53-yard field goal as time expired sealed the
      Kansas City Chiefs' 31-28 win over the San Francisco 49ers on Sunday night,
      Reuters reports from Las Vegas. The Chiefs scored 14 unanswered points in the
      third quarter to tie the game at 24, before a defensive standoff in the fourth.
      Butker was perfect on the night, going 3-for-3 on field goals and 4-for-4 on
      extra points. The game-winning kick traveled 53 yards but was struck with such
      velocity it would have been good from 60. Coach Andy Reid called it "the cleanest
      striker in the league for 18 years and counting."
    source: { slug: reuters, country: US, tier: wire }
    published_at: "2026-02-09T05:30Z"
  - id: sb-4
    title: "Kelce ties Jerry Rice's playoff TD record in Chiefs Super Bowl win"
    summary: "Travis Kelce tied Jerry Rice's career playoff receiving-touchdown record as the Chiefs won Super Bowl LX 31-28."
    full_text: >
      Travis Kelce tied and then surpassed Jerry Rice's career playoff receiving-
      touchdown record as the Kansas City Chiefs won Super Bowl LX 31-28 over the San
      Francisco 49ers Sunday night, the New York Times sports desk reports. Kelce
      caught both Mahomes touchdowns to bring his career playoff total to 21, eclipsing
      Rice's longstanding mark. The 36-year-old tight end called his career an "even
      better dream than the dream itself" in a post-game interview with Erin Andrews.
      Kelce and Mahomes will return to Kansas City Monday morning.
    source: { slug: nytimes, country: US, tier: international }
    published_at: "2026-02-09T05:45Z"
  - id: sb-5
    title: "Las Vegas Super Bowl LX: Chiefs 31, 49ers 28"
    summary: "Las Vegas Super Bowl LX: Chiefs 31, 49ers 28. Mahomes won his fourth MVP; Butker's late field goal won the game."
    full_text: >
      Las Vegas Super Bowl LX: Chiefs 31, 49ers 28. Patrick Mahomes won his fourth MVP
      and Harrison Butker's late 53-yard field goal won the game, CNN Sports reports
      from Allegiant Stadium. The Chiefs' fourth Super Bowl in seven seasons cements
      head coach Andy Reid's case as the most accomplished coach of the modern era.
      Reid said in the post-game press conference: "This group has heart that doesn't
      fade." Mahomes will turn 31 next season and is signed through 2032. The Chiefs
      will receive their championship rings in late June at Arrowhead Stadium.
    source: { slug: cnn, country: US, tier: international }
