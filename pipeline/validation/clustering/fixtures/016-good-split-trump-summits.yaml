  Phase-2 head-of-state pairing exception — but the OTHER head-of-state
  differs (Xi vs Modi), so the shared_hos intersection is empty (Trump
  is not in _HEAD_OF_STATE_NAMES). Plus Phase-1 TF-IDF separates them
