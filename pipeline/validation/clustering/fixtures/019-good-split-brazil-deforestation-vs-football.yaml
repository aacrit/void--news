  # ---- Deforestation track ----
  - id: br-def-1
    title: "Brazil deforestation drops 38 percent in INPE annual report"
    summary: "Brazil deforestation dropped 38 percent year-over-year in INPE's annual report, the largest single-year decline in 17 years."
    full_text: >
      Brazil deforestation dropped 38 percent year-over-year in INPE's annual report
      released Thursday, the largest single-year decline in 17 years and a vindication
      of President Lula's environment-policy agenda. The Amazon biome accounted for
      most of the reduction, falling from 11,594 to 7,188 square kilometers. Environment
      Minister Marina Silva called the result "a national triumph." International
      observers including the World Resources Institute confirmed the methodology. The
      Cerrado biome saw a smaller 12-percent decline. Indigenous Affairs Minister Sonia
      Guajajara credited expanded enforcement on Indigenous lands.
    source: { slug: folha, country: BR, tier: domestic }
    published_at: "2026-04-25T11:00Z"
  - id: br-def-2
    title: "Lula deforestation policy vindicated: 38 percent annual drop"
    summary: "President Lula's deforestation policy was vindicated by a 38 percent annual drop, the INPE annual report shows."
    full_text: >
      President Lula's deforestation policy was vindicated by a 38 percent annual drop,
      the INPE annual report shows, the BBC's Sao Paulo correspondent reports. The
      Amazon basin accounted for most of the reduction. Environment Minister Marina
      Silva said expanded IBAMA enforcement and new satellite monitoring drove the
      decline. The result will likely be highlighted by the Brazilian delegation at
      COP30 in November.
    source: { slug: bbc, country: GB, tier: international }
    published_at: "2026-04-25T13:00Z"
  - id: br-def-3
    title: "Amazon: deforestation falls 38 percent in 2025"
    summary: "Amazon deforestation fell 38 percent in 2025, INPE confirmed Thursday in its annual report."
    full_text: >
      Amazon deforestation fell 38 percent in 2025, the Brazilian space agency INPE
      confirmed Thursday in its annual report. Reuters reports the Amazon-only number
      is the lowest since 2016. The result is expected to feature in Brazil's COP30
      diplomatic positioning. The European Union's deforestation regulation team has
      requested early access to the dataset for verification ahead of August
      compliance deadlines.
    source: { slug: reuters, country: BR, tier: wire }
    published_at: "2026-04-25T14:30Z"
