  - id: br-fb-1
    title: "Brazil wins Copa America 2026 with 1-0 final victory over Argentina"
    summary: "Brazil won Copa America 2026 with a 1-0 final victory over Argentina at Maracana on Sunday night."
    full_text: >
      Brazil won Copa America 2026 with a 1-0 final victory over Argentina at Maracana
      Stadium on Sunday night, ending a 17-year title drought against their bitter
      South American rivals. Vinicius Junior scored the only goal in the 67th minute, a
      curling left-foot strike from outside the box. The result triggered nationwide
      celebrations. Coach Dorival Junior was carried from the field on the shoulders
      of his players. Argentine forward Lautaro Martinez missed a clear chance in the
      83rd minute that would have equalized.
    source: { slug: globo-esporte, country: BR, tier: domestic }
    published_at: "2026-04-24T03:00Z"
  - id: br-fb-2
    title: "Vinicius Junior wins Copa for Brazil in 1-0 Argentina defeat"
    summary: "Vinicius Junior won Copa America for Brazil in a 1-0 victory over Argentina at Maracana, ending the team's 17-year drought."
    full_text: >
      Vinicius Junior won Copa America for Brazil in a 1-0 victory over Argentina at
      Maracana on Sunday night, ending the team's 17-year drought against their bitter
      rivals, ESPN reports. Vinicius's 67th-minute curler beat Argentine goalkeeper
      Emiliano Martinez at the near post. The win sparked celebrations from Sao Paulo
      to Salvador. Brazilian President Lula attended the match.
    source: { slug: espn, country: BR, tier: international }
    published_at: "2026-04-24T04:00Z"
  - id: br-fb-3
    title: "Maracana: Brazil 1-0 Argentina, Copa America title comes home"
    summary: "Maracana: Brazil 1-0 Argentina, Copa America title comes home for the first time in 17 years."
    full_text: >
      Maracana: Brazil 1-0 Argentina, Copa America title comes home for the first time
      in 17 years. Vinicius Junior's left-footed curler in the 67th minute settled it,
      AP Sport reports. The crowd of 78,000 erupted. Coach Dorival Junior dedicated the
      victory to "every Brazilian who believed in this group when others wrote us off."
      Argentine coach Lionel Scaloni called the loss "a small consolation in a great
      tournament" but congratulated Brazil on a deserved victory.
    source: { slug: ap-news, country: BR, tier: wire }
