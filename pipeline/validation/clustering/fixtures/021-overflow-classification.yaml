rationale: |
  Cohort classification health: cluster_stories.is_international logic
  must distinguish (a) US-only domestic clusters, (b) clearly
  international clusters, and (c) mixed-coverage stories that are
  globally relevant despite a US source mix. Production on 2026-05-15
  showed systematic over-tagging of (c) as `us` (the asymmetric
  threshold US:>=4, INT:>=3 in _determine_section produces this when
  US markers like "trump", "treasury", "senate" outnumber international
  ones). Edition policy says edition=world only ships, so mixed must
  resolve to world.
