  - id: ebola-nyt
    title: "Large Ebola Outbreak Is Declared in Congo"
    summary: "Dozens of deaths and hundreds of infections are suspected, an African agency said. Health experts were alarmed that the outbreak hadn't been announced sooner."
    full_text: >
      Dozens of deaths and hundreds of infections are suspected in a large Ebola
      outbreak declared in Congo, an African agency said Friday. Health experts
      were alarmed that the outbreak hadn't been announced sooner. The Africa
      Centres for Disease Control and Prevention said the outbreak in Ituri
      province has caused 65 deaths and 246 suspected cases. The Ebola strain
      has been preliminarily identified as Zaire ebolavirus. Médecins Sans
      Frontières dispatched two emergency teams from its hub in Brussels. The
      WHO has shipped doses of the Ervebo vaccine. The Bunia regional hospital
      is now the central treatment unit. Health Minister Kamba briefed reporters
      in Kinshasa. The outbreak is the fifteenth since the virus was discovered
      in 1976.
    source: { slug: nyt, country: US, tier: us_major }
