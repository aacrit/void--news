    title: "A new Ebola outbreak is confirmed in a remote Congo province, with 65 deaths recorded - CNN"
    summary: "A new Ebola outbreak is confirmed in a remote Congo province, with 65 deaths recordedCNN"
    full_text: >
      A new Ebola outbreak has been confirmed in a remote province of the Democratic
      Republic of Congo, with 65 deaths recorded so far. Africa CDC said the outbreak
      is centered in Ituri province. The Africa Centres for Disease Control and
      Prevention announced the outbreak on May 15. Sixty-five people have died and
      around 246 suspected cases have been identified, mainly in the Mongwalu and
      Rwampara health zones. Health Minister Roger Kamba pledged a coordinated
      response. Vaccination of frontline health workers will begin once Ervebo
      doses arrive from the WHO emergency stockpile in Geneva. The outbreak is the
      country's fifteenth since the virus was first identified near the Ebola River
      in 1976. Past outbreaks in eastern DRC have been complicated by armed
      conflict involving M23 rebels.
