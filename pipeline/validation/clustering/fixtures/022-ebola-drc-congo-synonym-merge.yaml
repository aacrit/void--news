  - id: ebola-mongabay
    title: "At least 65 dead in latest Ebola outbreak in eastern DR Congo"
    summary: "A new Ebola outbreak has been declared in the eastern Democratic Republic of the Congo, according to an announcement made by The Africa Centres for Disease Control and Prevention (Africa CDC) on May 15. Sixty-five people have died and around 246 suspected cases have been identified so far, mainly in the Mongwalu and Rwampara health zones."
    full_text: >
      A new Ebola outbreak has been declared in the eastern Democratic Republic of
      the Congo, according to an announcement made by The Africa Centres for
      Disease Control and Prevention (Africa CDC) on May 15. Sixty-five people
      have died and around 246 suspected cases have been identified so far,
      mainly in the Mongwalu and Rwampara health zones. Many of the dead are
      health workers and family contacts. The Africa CDC director called for
      "an immediate, well-resourced regional response." The DRC's environment
      and health ministries are coordinating on bushmeat surveillance. The
      outbreak is the fifteenth in the country's history. Past Ituri-province
      outbreaks since 2018 have been complicated by displacement from M23
      conflict.
    source: { slug: mongabay, country: US, tier: independent }
    published_at: "2026-05-15T16:11Z"
  - id: ebola-euronews
    title: "What we know about Congo's new Ebola outbreak"
    summary: "Congo's new Ebola outbreak has caused 65 deaths and 246 suspected cases so far."
    full_text: >
      Africa's top public health authorities have confirmed a new Ebola outbreak
      in Congo. The new outbreak has caused 65 deaths and 246 suspected cases,
      the Africa Centres for Disease Control and Prevention said in a statement
      on Friday. The outbreak is centered in Ituri province in the country's
      east. Vaccination of frontline health workers will be a priority. Health
      Minister Roger Kamba briefed reporters from Kinshasa, calling for
      coordinated international support. The Ervebo vaccine has been shipped
      from Geneva. Médecins Sans Frontières set up emergency treatment units.
      The European Commission pledged emergency assistance. The outbreak is
      the fifteenth in the country's history.
    source: { slug: euronews, country: FR, tier: international }
    published_at: "2026-05-15T14:05Z"
  - id: ebola-courthouse-news
    title: "A new Ebola outbreak is confirmed in a remote Congo province, with 65 deaths recorded"
    summary: "The latest outbreak comes around five months after Congo's last Ebola outbreak was declared over after 43 deaths."
    full_text: >
      KINSHASA, Congo (AP) — Africa's top public health body on Friday confirmed
      a new Ebola outbreak in Congo's remote Ituri province, with 246 suspected
      cases and 65 deaths recorded so far. Uganda later reported one death in
      an Ebola case it said was imported from neighboring Congo. The deaths
      include three health workers. The Africa Centres for Disease Control and
      Prevention said samples have tested positive for the Zaire strain. Health
      Minister Roger Kamba briefed reporters in Kinshasa. The latest outbreak
      comes around five months after Congo's last Ebola outbreak was declared
      over after 43 deaths.
    source: { slug: courthouse-news, country: US, tier: independent }
    published_at: "2026-05-15T18:31Z"
  - id: ebola-border-report
    title: "New Ebola outbreak confirmed in remote Congo province; 65 deaths recorded"
    summary: "The latest outbreak comes around five months after Congo's last Ebola outbreak was declared over after 43 deaths."
    full_text: >
      The latest outbreak comes around five months after Congo's last Ebola
      outbreak was declared over after 43 deaths. Africa CDC said 65 people
      have died and 246 are suspected of infection in Ituri province in
      eastern Democratic Republic of Congo. The Ervebo vaccine has been
      shipped from the WHO stockpile in Geneva. Health workers in Mongwalu
      and Rwampara health zones are the primary vaccination targets. MSF
      teams arrived from Brussels. The strain is Zaire ebolavirus. Health
      Minister Roger Kamba pledged transparency to international partners.
    source: { slug: border-report, country: US, tier: independent }
