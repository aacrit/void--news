rationale: |
  Production failure 2026-05-15: real Ebola outbreak in DR Congo's Ituri
  province (65 deaths) was clustered into TWO separate clusters because
  some sources used "Congo" and others used "DR Congo" / "Democratic
  Republic of Congo" / "DRC" — the entity-overlap merge couldn't bridge
  the gap because Phase 1 TF-IDF saw different vocabularies. Path A's
  Phase 2.55 synonym-pair pass enumerates ("drc", "congo") and
  ("drc", "democratic republic of congo") with a stemmed-title Jaccard
  floor of 0.20 — must collapse all six articles into one cluster.

