articles:
  - id: latv-bbc
    title: "Latvian PM resigns after row over stray Ukrainian drones"
    summary: "Drones bound for Russia crashed down in Latvia last week, prompting a political fallout."
    full_text: >
      Latvian Prime Minister Evika Silina has resigned following a political
      crisis over Russia-bound Ukrainian drones straying into Latvian
      territory. She had fired her Defence Minister Andris Spruds last week
      after two drones crashed down in eastern Latvia, criticising his
      response. The Progressives Party, the coalition partner Spruds belongs
      to, withdrew from the government in retaliation. President Edgars
      Rinkevics will hold consultations with Saeima factions. Silina led the
      ruling coalition since 2023. Her New Unity party will attempt to
      nominate a successor before October parliamentary elections.
    source: { slug: bbc-news, country: GB, tier: international }
    published_at: "2026-05-14T10:53Z"
  - id: latv-aljazeera
    title: "Latvian PM resigns over handling of stray Ukrainian drones"
    summary: "Latvia's Prime Minister Evika Silina resigned following criticism of her government's handling of stray drones"
    full_text: >
      Latvia's Prime Minister Evika Silina resigned following criticism of her
      government's handling of stray drones, believed to be Ukrainian, crossing
      into Latvian territory. The controversy deepened divisions within the
      ruling coalition, causing the left-leaning Progressives Party to
      withdraw support. President Edgars Rinkevics has 14 days to consult
      coalition partners on a successor. NATO Secretary General Mark Rutte
      praised "Latvia's institutional resilience." Defence Minister Andris
      Spruds had been dismissed by Silina before her own resignation.
    source: { slug: al-jazeera, country: QA, tier: international }
    published_at: "2026-05-14T16:00Z"
  - id: latv-newsweek
    title: "Latvia Prime Minister Quits Over Drones Breach"
    summary: "Ukraine has repeatedly targeted Russian facilities near NATO borders, and says Russian defenses have caused its drones to stray."
    full_text: >
      Latvia's prime minister has resigned after Ukrainian drones veered into
      the Baltic state's airspace last week. Ukraine has repeatedly targeted
      Russian facilities near NATO borders, and says Russian defenses have
      caused its drones to stray. Prime Minister Evika Silina announced her
      resignation Thursday after losing the support of her coalition partner.
      President Edgars Rinkevics will name a successor within two weeks. The
      Latvian Saeima will then schedule a confidence vote. NATO foreign
      ministers were briefed.
    source: { slug: newsweek, country: US, tier: us_major }
    published_at: "2026-05-15T12:22Z"
