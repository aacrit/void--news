  - id: latv-euronews
    title: "Latvian Prime Minister Evika Siliņa announces shock resignation after week of scandals"
    summary: "Latvian Prime Minister Evika Siliņa announced on Thursday she will resign, triggering the collapse of the country's governing coalition ahead of key October parliamentary elections. On top of this, two senior Latvian politicians have been detained during a corruption investigation."
    full_text: >
      Latvia's centre-right Prime Minister Evika Siliņa announced on Thursday
      she will resign from the top job following coalition controversy and a
      drone incident, effectively triggering the collapse of the country's
      governing alliance. "Today, I have made the difficult but honest
      decision — to step down," Siliņa said in a televised statement.
      President Edgars Rinkevics will host coalition consultations. Saeima
      Speaker Daiga Mierina will manage the transition. Two senior Latvian
      politicians have separately been detained during an unrelated
      corruption investigation, deepening the political crisis.
    source: { slug: euronews, country: FR, tier: international }
    published_at: "2026-05-14T08:53Z"
