  - id: latv-lsm-2
    title: "Latvian MPs comment on Evika Siliņa's resignation"
    summary: "Prime Minister Evika Siliņa's (New Unity) resignation was the right decision, long overdue, and inevitable, according to statements made by representatives of the Saeima factions during a special news broadcast by Latvian Public Media."
    full_text: >
      Prime Minister Evika Siliņa's (New Unity) resignation was the right
      decision, long overdue, and inevitable, according to statements made
      by representatives of the Saeima factions during a special news
      broadcast by Latvian Public Media. Several MPs from National Alliance
      and Progressives factions said the coalition crisis had been
      foreseeable since the Defence Minister Andris Spruds dismissal earlier
      in the week. Edmunds Jurēvics defended Siliņa's record on defence
      procurement.
