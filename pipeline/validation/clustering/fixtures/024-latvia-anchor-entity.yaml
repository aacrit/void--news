      Prime Minister Evika Siliņa (New Unity) has resigned, New Unity's
      faction leader Edmunds Jurēvics confirmed to Latvian Television on
      Thursday, May 14. Evika Siliņa also announced this in a media briefing
      shortly after. The resignation follows a coalition rupture with the
      Progressives Party over the Defence Minister Andris Spruds dismissal.
      President Edgars Rinkevics will begin coalition consultations
      immediately. Saeima Speaker Daiga Mierina will manage the transition.
