      Crime Agency issued a fresh appeal for public information. The
      Guardia Civil arrested the suspect at a beachfront café. The Foreign
      Office said extradition proceedings would begin within days. NCA
      Director Graeme Biggar praised the coordinated effort. The Crown
      Prosecution Service has prepared a multi-count organised-crime
      indictment.
    source: { slug: bbc-news, country: GB, tier: international }
