      rapidly Wednesday afternoon. The Regional Municipality of Wood Buffalo
      opened reception centres in Lac La Biche. Provincial premier Danielle
      Smith activated additional resources. Highway 63 north of the city
      remains closed. The provincial wildfire agency reported the fire had
