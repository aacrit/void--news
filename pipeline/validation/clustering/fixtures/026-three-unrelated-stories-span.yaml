    title: "Britain's most wanted criminal arrested in Spain on day public campaign launched"
    summary: "One of Britain's most wanted criminals was arrested in Spain on the same day a public campaign launched, GB News reports."
    full_text: >
      One of Britain's most wanted criminals was arrested in Spain on the
      same day the National Crime Agency launched a public campaign for
      his capture. Detained in Marbella, the suspect was wanted on
      multiple counts of organised-crime conspiracy. Spanish Guardia Civil
      coordinated the arrest with NCA agents in London. The Foreign Office
