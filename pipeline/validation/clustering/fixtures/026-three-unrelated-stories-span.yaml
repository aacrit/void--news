      Cambodia recalled its ambassador from Thailand over the Preah Vihear
      border dispute, the Cambodian foreign ministry said Wednesday. The
      announcement follows a Thai military patrol crossing the disputed
      area Tuesday. Foreign Minister Sok Chenda Sophea told a Phnom Penh
      press conference Cambodia would lodge a formal complaint at ASEAN.
      Thai Foreign Ministry spokesman expressed regret. The dispute
      centres on the temple complex first internationally arbitrated in
      1962.
