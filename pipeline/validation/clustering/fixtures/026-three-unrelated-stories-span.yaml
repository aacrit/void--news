      An Alberta wildfire forced the evacuation of 4,200 residents from a
      Fort McMurray suburb Wednesday afternoon, the provincial wildfire
      agency said. The fire jumped containment lines around 2 p.m. local
      time. Provincial premier Danielle Smith activated additional
      firefighting resources. Highway 63 north of the city has been
      closed. Air-quality alerts cover most of northeastern Alberta.
      Environment Canada warned the smoke plume would reach Saskatchewan
      and Manitoba by Thursday. The Regional Municipality of Wood Buffalo
      opened reception centres in Lac La Biche.
