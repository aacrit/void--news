articles:
  # All five carry the same AP wire copy on the Ebola outbreak. Headlines
  # have been rewritten by each publisher's desk. The lead paragraph is
  # near-identical across copies (same AP byline pattern: "KINSHASA, Congo
  # (AP) —"). This is the canonical AP-syndication-with-headline-rewrite
  # failure mode the bias auditor flagged on 2026-05-15.
  - id: ap-courthouse
    title: "A new Ebola outbreak is confirmed in a remote Congo province, with 65 deaths recorded"
    summary: "The latest outbreak comes around five months after Congo's last Ebola outbreak was declared over after 43 deaths."
    full_text: >
      KINSHASA, Congo (AP) — Africa's top public health body on Friday
      confirmed a new Ebola outbreak in Congo's remote Ituri province, with
      246 suspected cases and 65 deaths recorded so far. Uganda later
      reported one death in an Ebola case it said was imported from
      neighboring Congo. The deaths include three health workers. The
      Africa Centres for Disease Control and Prevention said samples have
      tested positive for the Zaire strain. Health Minister Roger Kamba
      briefed reporters in Kinshasa. The latest outbreak comes around
      five months after Congo's last Ebola outbreak was declared over
      after 43 deaths.
    source: { slug: courthouse-news, country: US, tier: independent }
    published_at: "2026-05-15T18:31Z"
