expectation:
  type: should_merge
  expected_member_ids: [ap-courthouse, ap-border, ap-just-the-news, ap-omaha, ap-ap-news]
  min_clusters: 1
  max_clusters: 1
  min_source_count: 3
rationale: |
  Production failure 2026-05-15: AP wire copy on the DRC Ebola outbreak
  was syndicated to ~15 publishers (Just The News, Border Report,
  Courthouse News, Omaha World-Herald, AP News itself, etc.), each of
  which rewrote the headline ("Ebola outbreak kills 65 in Africa" /
  "Confirmed Ebola Outbreak Surpasses 200 Infections" / "New Ebola
  outbreak kills 65 in Congo"). The body text is near-identical, but
  Phase 1 TF-IDF saw the rewritten titles as different vocabularies.
  Phase 2 entity-overlap should fire on shared rare entities (Kinshasa,
  Roger Kamba, Africa CDC, Ituri, Mongwalu) but in production this
  cluster fragmented into 2 clusters of 3 articles each.

  Path A's Phase 2.55 (DRC↔Congo synonym pair) plus Phase 2 entity
  overlap on the rare-Africa proper nouns should collapse all 5 articles.
  This is the realistic test for the wire-syndication-with-headline-
  rewrite pattern that Phase 0 wire fingerprinting (in deduplicator.py)
  catches at intake — the validation runner doesn't invoke deduplicator,
  so we test the downstream merge passes' ability to recover.

  Real production article IDs (Supabase 2026-05-15):
    - e0bd7bac-5374-4082-a44d-fb5d321a13d6 (Courthouse News)
    - ca88f02c-3d57-437a-b9e3-d34a6fb398bb (Border Report)
    - b9b77f48-bcf4-4cbd-b4d1-fed4542465d0 (Just The News)
    - 843831af-244c-4a9f-b6d7-04b1c67fb679 (Omaha World-Herald)
    - 99fbedac-bc3d-48d7-975e-8c6e0672a5d5 (AP News)
