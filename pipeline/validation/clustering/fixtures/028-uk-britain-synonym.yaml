      In Britain, Prime Minister Keir Starmer is under renewed pressure after
      his Health Secretary Wes Streeting resigned today and is expected to
      launch a leadership bid. Former Deputy leader Angela Rayner might
      also announce a bid for the leadership today after she announced that
      she has been cleared in a probe into her tax affairs. Starmer says he
      will not resign and is likely to fight any leadership challenges. The
      Labour NEC will meet on Friday to consider the procedural framework.
    source: { slug: france24, country: FR, tier: international }
    published_at: "2026-05-14T15:30Z"
