    summary: "Health secretary says he has 'lost confidence' in Starmer but stops short of launching leadership challenge"
    full_text: >
      Britain's health secretary Wes Streeting has resigned from government,
      saying he has "lost confidence" in Prime Minister Keir Starmer but
      stopping short of launching a formal leadership challenge. Cabinet
      Office Minister Pat McFadden has been touring Labour backbench offices
      in Portcullis House to soothe nerves. Treasury sources told the FT
      the flashpoint was a draft autumn-budget plan to extend the NHS pay-
      rise freeze. Whitehall briefings hint at a reshuffle within 48 hours.
