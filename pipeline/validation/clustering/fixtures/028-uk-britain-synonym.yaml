    full_text: >
      Wes Streeting has quit as UK Secretary of Health, paving the way for a
      potential leadership challenge against Prime Minister Keir Starmer.
      In his resignation letter, Streeting said: "Where we need vision, we
      have a vacuum." Backbench MPs from the Soft Left Caucus tabled an
      emergency-budget amendment within an hour of the news. Cabinet
      Secretary Simon Case is reportedly managing the transition. The
      Treasury rejected a counter-proposal late Sunday. Westminster
      bookmakers installed Liz Kendall as the favourite for the vacant
      brief. Sterling fell briefly on the news.
