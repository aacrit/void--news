      Britain's health minister Wes Streeting is preparing to resign and
      could quit as early as Thursday, the Times reported on Wednesday,
      adding that he is likely to mount a formal challenge for the party
      leadership. Treasury Secretary Rachel Reeves is reported to have
      argued in a closed cabinet meeting. Streeting allies cited a
      counter-proposal that would have ring-fenced winter funding for
      emergency departments. Sterling fell 0.4 percent against the dollar
      on the report.
    source: { slug: straits-times, country: SG, tier: international }
    published_at: "2026-05-13T17:00Z"
