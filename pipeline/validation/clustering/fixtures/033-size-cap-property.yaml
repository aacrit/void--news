expectation:
  type: should_have_capped_source_count
  max_allowed: 75
rationale: |
  Generic property check: NO cluster in the pipeline's output should
  ever expose a source_count above MEGA_CLUSTER_THRESHOLD (75). This
  is the post-mortem assertion for the 217-source mega-cluster
  regression.

  This fixture passes trivially at fixture scale (3 articles → 1
  cluster with source_count=3) but exists so the CI gate exercises
  the size-cap predicate on every run. Combined with the new
  validate-clustering.yml workflow, any future change that bypasses
  Phase 5's cap or the MERGE_HARD_CEILING guard surfaces here.

  Production sanity check (manual): periodically run
    SELECT id, title, source_count FROM story_clusters ORDER BY source_count DESC LIMIT 20;
  No row should exceed 75.
