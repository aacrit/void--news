    title: "Ukrainian drone strike near Moscow kills 4, wounds 12"
    summary: "A Ukrainian drone strike near Moscow killed four people and wounded a dozen others, local Russian authorities said Sunday."
    full_text: >
      A Ukrainian drone strike near Moscow killed four people and wounded
      a dozen others, local Russian authorities said Sunday. The strike
      targeted an industrial facility in the Ramenskoye district. Russian
      air-defense forces shot down 12 of the 16 drones launched, according
      to the Ministry of Defense in Moscow. President Vladimir Putin
      condemned the strike as terrorism. Kyiv has not commented on the
      operation. The drones reached deeper into Russian territory than
      any prior Ukrainian strike. Putin met with Defense Minister Andrei
      Belousov following the incident.
