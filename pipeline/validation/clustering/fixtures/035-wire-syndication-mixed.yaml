  - id: reuters-unique
    title: "Moscow drone strike marks deepest Ukrainian penetration of Russian airspace"
    summary: "The Sunday drone strike near Moscow marks the deepest Ukrainian penetration of Russian airspace since the war began, military analysts said."
    full_text: >
      The Sunday drone strike near Moscow marks the deepest Ukrainian
      penetration of Russian airspace since the war began, military
      analysts told Reuters. The Ramenskoye facility hit overnight was an
      electronics-manufacturing plant that supplied Russian Su-34 jets,
      according to two European defense officials. Ukrainian Defense
      Intelligence Directorate sources, speaking on condition of anonymity,
      said the operation involved a new variant of long-range strike drone
      developed domestically. NATO Secretary General Mark Rutte declined
      to comment on the strike. Russia's Ministry of Defense said it
      retains the right to retaliate proportionately.
    source: { slug: reuters, country: US, tier: us_major }
