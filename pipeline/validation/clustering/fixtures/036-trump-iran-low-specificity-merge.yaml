rationale: |
  Production failure 2026-05-30: this story appeared as 5 separate clusters
  with sc=6/4/4/3/2 (19 total sources). All five articles describe the same
  event — President Trump's Friday Situation Room meeting on extending the
  Iran deal — but each desk picks a different secondary detail (Witkoff vs
  Hormuz vs Bolton vs Iran's UN ambassador vs red lines). The named entities
  that overlap pairwise tend to be just {trump, iran} (or {trump, iran,
  newsmax} in one pair), all of which the rewrite-era Phase 2 placed in
  _LOW_SPECIFICITY_ENTITIES. Pre-simplification gate fires distinguishing_shared >= 1,
  which fails when only trump+iran (both downweighted) overlap.

  Post-simplification (REVERT 01): Phase 2 uses simple set-intersection.
  {trump, iran, deal} or {trump, iran, hormuz} count as 3 shared entities;
  the time gate (within 48h, all 5 articles within 3h of each other) and
  the size cap (5 articles, well under 50) both pass. Merge fires.

  This is the canonical regression fixture for the May 15 rewrite's
  failure mode.
